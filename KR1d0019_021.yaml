body:
  text: 周禮述注卷二十一安溪李光坡撰大司寇之職掌建邦之三典以佐王刑邦國詰四方注曰典法也詰謹也書曰王耄荒度作詳刑以詰四方鄭剛中曰四方與邦國一耳言刑又言詰何也諸侯之邦有不率者刑得而加之至四方之逺殊俗異域或羈縻而處之或不得而盡臣之於其不率詰責之有文告之辭詰之不改然後臨以甲兵之大刑一曰刑新國用輕典注曰新國者新辟地立君之國用輕法者為其民未習於教二曰刑平國用中典注曰平國者承平守成之國也用中典者常行之法三曰刑亂國用重典注曰亂國篡弒叛逆之國用重典者以其化惡伐滅之王介甫曰用輕典以柔乂之用中典以正直乂之用重典以剛乂之書曰惟敬五刑以成三德以五刑糾萬民注曰刑亦法也糾猶察異之疏曰此五刑與尋常正五刑墨劓之等别刑亦法也此五法者或一刑之中而含五或此五刑全不入五刑者一曰野刑上功糾力注曰功農功力勤力二曰軍刑上命糾守注曰命將命也守不失部伍三曰鄉刑上德糾孝注曰德六德也善父母為孝四曰官刑上能糾職注曰能能其事也職職事修理五曰國刑上願糾暴注曰願慤慎也暴當為恭字之誤也坡謂五者之序自遂而鄉自鄉而官而國由外以至內王氏曰鄉遂之間官軍所在故軍刑間於鄉遂之中願音願暴注作恭慤苦角反以圜土聚教罷民注曰圜土獄城也聚罷民其中困苦以教之為善也民不愍作勞有似於罷凡害人者置之圜土而施職事焉以明刑恥之注曰害人謂為邪惡已有過失麗於法者以其不故犯法置之圜土繫教之庶其困悔而能改也置置也施職事以所能役使之明刑書其罪過於大方版著其背其能改者反于國中不齒三年注曰反於國中謂舍之還於故鄉里也司圜職曰上罪三年而舍中罪二年而舍下罪一年而舍不齒者不得以年次列於平民其不能改而出圜土者殺注曰出謂逃亡罷音皮置之豉反著丁略反以兩造禁民訟入束矢於朝然後聽之注曰訟謂以財貨相告者造至也使訟者兩至既兩至使入束矢乃治之也不至不入束矢則是自服不直者也必入矢者取其直也詩曰其直如矢古者一弓百矢束矢其百個與疏曰此并下二經論禁民獄訟不使虛誣之事言禁者謂令先入束矢不實則沒入官若不入則是自服不直是禁民省事之法也以兩劑禁民獄入鈞金三日乃致于朝然後聽之注曰獄謂相告以罪名者劑今劵書也使獄者各齎劵書既兩劵書使入鈞金又三日乃治之重刑也不劵書不入金則是亦自服不直者也必入金者取其堅也三十斤曰鈞造七報反劑子隨反以嘉石平罷民注曰嘉石文石也樹之外朝門左平成也成之使善疏曰嘉善也有文乃稱嘉欲使罷民思其文理以改悔自修凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空重罪旬有三日坐期役其次九日坐九月役其次七日坐七月役其次五日坐五月役其下罪三日坐三月役使州里任之則宥而舍之注曰有罪過謂邪惡之人所罪過者也麗附也未附於法未著於法也木在足曰桎在手曰梏役諸司空坐日訖使給百工之役也役月訖使其州里之人任之乃赦之宥寬也坡謂上文以五刑糾萬民恐民有不服教以速於戾故于其將然而戒禁之過大內於圜土過小平以嘉石夫秋官諸職所列刑戮之事為類至多大司寇獨舉此二端者蓋辟以止辟莫善此也兩造兩劑以聽凡民曲直之情與圜土皆獄事也下文肺石以聽窮民寃怨之辭與嘉石皆外朝事也著直略反內音納以肺石達窮民注曰肺石赤石也窮民天民之窮而無告者凡逺近惸獨老幼之欲有復於上而其長弗達者立於肺石三日士聽其辭以告於上而罪其長注曰無兄弟曰惸無子孫曰獨復猶報也上謂王與六卿也報之者若上書詣公府言事矣長謂諸侯若鄉遂大夫鄭剛中曰路鼓以待達窮者掌於大僕大僕政官也肺石達窮民掌於司寇司寇刑官也窮民之擊鼓者豈以政之不善之故而坐肺石者無乃以刑之寃枉歟先儒以為窮民先在肺石朝士達之乃得擊鼓奚為哉肺芳廢反惸音瓊長丁丈反正月之吉始和布刑于邦國都鄙乃縣刑象之法于象魏使萬民觀刑象挾日而斂之王光逺曰先王之法若江河貴乎易避而難犯使民觀象者凡使之知所避而已縣音懸易以豉反凡邦之大盟約涖其盟書而登之于天府注曰涖臨也天府祖廟之藏疏曰大盟約者謂王與諸侯因大會同而與盟有約誓之辭大史內史司會及六官皆受其二而藏之注曰六官六卿之官也二副也會古外反凡諸侯之獄訟以邦典定之凡卿大夫之獄訟以邦法斷之凡庶民之獄訟以邦成弊之劉迎曰邦典有輕中重三典以定其罪邦法八辟之麗邦法有議親議故議賢之不同所以斷其罪邦成蓋有邦汋邦賊邦諜之不同以此八成弊萬民之罪非冢宰之六典八法八成者也汋上灼反諜音牒大祭祀奉犬牲疏曰犬屬西方金故司寇進之若禋祀五帝則戒之日涖誓百官戒于百族注曰戒之日卜之日也百族謂府史以下也郊特牲曰卜之日王立于澤親聽誓命受教諫之義也獻命庫門之內戒百官也大廟之內戒百姓也疏曰誓百官太宰掌之餘小官誓之司寇臨之也戒于百族大司寇親之及納亨前王祭之日亦如之注曰納亨致牲疏曰納亨將祭之辰祭之日旦明也奉其明水火注曰明水火所取於日月者疏曰奉此水火者水以配鬱鬯與五齊火以給㸑烹也王光逺曰書曰明清于單辭此亦刑官明清之事亨普庚反齊才細反凡朝覲會同前王大喪亦如之注曰大喪所前或嗣王大軍旅涖戮于社注曰社謂社主在軍者也凡邦之大事使其屬蹕注曰屬士師以下也蹕止行也王介甫曰小司寇國之大事使其屬蹕則事在國中而已大司寇邦之大事使其屬蹕則事之所在通國野焉小司寇之職掌外朝之政以致萬民而詢焉一曰詢國危二曰詢國遷三曰詢立君注曰外朝朝在雉門之外者也國危謂有兵寇之難國遷謂徙都改邑也立君謂無冢適選于庶也鄭司農云致萬民聚萬民也詢謀也詩曰詢于芻蕘書曰謀及庶人疏曰外朝在雉門之外則亦在庫門之外也案下文羣吏並在內而此經獨云致萬民者但羣吏在朝是常萬民不合在朝惟在大事及疑獄乃致之故特言之也其位王南鄉三公及州長百姓北面羣臣西面羣吏東面注曰羣臣卿大夫士也羣吏府史也其孤不見者孤從羣臣鄉大夫在公後小司寇擯以敘進而問焉以衆輔志而弊謀注曰擯謂揖之使前也敘更也輔志者尊王賢明也王介甫曰以王志為主而輔之以衆以衆謀為稽而弊之于王鄉許亮反長丁丈反難乃旦反適丁歷反以五刑聽萬民之獄訟附于刑用情訊之至于旬乃弊之讀書則用法注曰附猶著也訊言也用情理言之冀有可以出之者十日乃斷之王制曰刑者侀也侀者成也一成而不可變故君子盡心焉鄭司農云讀書則用法如今時讀鞫已乃論之疏曰讀書則用法者謂行刑之時當讀刑書罪狀則用法刑之凡命夫命婦不躬坐獄訟注曰為治獄吏褻尊者也躬身也不身坐者必使其屬若子弟也喪服傳曰命夫者其男子之為大夫者命婦者其婦人之為大夫妻者春秋傳曰衛侯與元咺訟寧武子為輔針嚴子為坐士榮為大理凡王之同族有罪不即市注曰鄭司農云刑諸甸師氏禮記曰刑于隱者不與國人慮兄弟咺况阮反針其廉反以五聲聽獄訟求民情疏曰案下五事惟辭聽一是聲而以五聲目之者四事雖不是聲亦以聲為本故也案吕刑云惟貌有稽在獄定之後則此五聽亦在要辭定訖恐其濫失更以五聽觀之以求民情也一曰辭聽注曰觀其出言不直則煩疏曰直則言要理深虛則辭煩義寡二曰色聽注曰觀其顔色不直則赧然三曰氣聽注曰觀其氣息不直則喘四曰耳聽注曰觀其聽聆不直則惑五曰目聽注曰觀其眸子視不直則眊然項平甫曰心者形之君辭者心之聲聲發於中不能掩於外其辭信則色定氣舒耳目不亂其辭偽則色變氣索耳目皆惑以此聽之人焉廋哉以八辟麗邦法附刑罰注曰辟法也杜子春讀麗為羅玄謂麗附也易曰日月麗乎天附猶著也疏曰案曲禮云刑不上大夫鄭注云其犯法則在八議輕重不在刑書若然此八辟為不在刑書若有罪當議議得其罪乃附邦法而附于刑罰也坡謂此承命夫命婦及王之同姓有罪而言亦是獄定之後以此八辟附於邦法而議之然後加以刑罰之所當施一曰議親之辟注曰鄭司農云若今時宗室有罪先請是也二曰議故之辟注曰故謂舊知也鄭司農云故舊不遺則民不偷三曰議賢之辟注曰鄭司農云若今時廉吏有罪先請是也玄謂賢有德行者四曰議能之辟注曰能謂有道藝者春秋傳曰夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身以棄社稷不亦惑乎五曰議功之辟注曰謂有大勳力立功者六曰議貴之辟注曰鄭司農云若今時吏墨綬有罪先請是也七曰議勤之辟注曰謂憔悴以事國疏曰自此已上七者雖以王為主諸侯一國之尊賞罰自制亦應有此議法是以議能鄭引叔向之事是其一隅也惟八曰議賔惟據王者而言不及諸侯也八曰議賓之辟注曰謂所不臣者三恪二代之後歟坡謂議親議故親親也議賢議能崇德也議功報功也議貴謂其近於賢能也議勤謂其近於功也議賓謂其近於親故辟音璧以三刺斷庶民獄訟之中注曰中謂罪正所定疏曰三刺之言當是罪定斷訖乃向外朝始行三刺庶民已上皆應有刺直言庶民者庶民賤恐不刺賤者尚刺已上刺可知鄭剛中曰凡言刺有二義刺取也殺也如春秋刺公子偃之刺則刺者殺也此云三刺則有探取之義一曰訊羣臣二曰訊羣吏三曰訊萬民注曰刺殺也三訊罪定則殺之訊言也疏曰所刺不必是殺餘四刑亦當三刺是以下文云上服下服是兼輕重皆刺也聽民之所刺宥以施上服下服之刑注曰宥寬也民言殺殺之言寬寬之鄭剛中曰上服服上刑也下服服下刑也坡謂自以五刑至此四節首言用情訊之貴有以得其理法之宜也次以五聲求民情恐理法雖似而察其容貌辭氣或有濫失則情狀微曖更當求之蓋深於訊矣然猶未可遂斷也必三刺而後施刑焉則以一時雖有罪戾而素行或未足以滅身天罰不極遽施刑殺亦傷和氣也然亦非全宥之也特服上刑服下刑因民所刺宥而輕重施之爾用情求情致其哀也三刺致其敬也故曰哀敬折獄也八辟以議親故之等所以優於凡民則又不徒三刺而已刺七賜反斷丁亂反及大比登民數自生齒以上登于天府注曰大比三年大數民之衆寡也人生齒而體備男八月而生齒女七月而生齒內史司會冢宰二之以制國用疏曰得民數乃制國用以其國用出於民故也比必里反注同小祭祀奉犬牲凡禋祀五帝實鑊水納亨亦如之注曰納亨致牲也其時鑊水當以洗解牲體肉鑊户郭反大賓客前王而辟注曰鄭司農云小司冦為王道辟除姦人也疏曰此為王辟亦謂於宫中饗燕在寢及廟時也后世子之喪亦如之疏曰謂后世子之喪當朝廟之時王出入亦為之辟也辟婢亦反小師涖戮注曰小師王不自出之師凡國之大事使其屬蹕注曰屬士師以下疏曰國之大事即士師云諸侯為賓是也孟冬祀司民獻民數於王王拜受之以圖國用而進退之注曰司民星名謂軒轅角也小司寇於祀司民而獻民數於王重民也進退猶損益也國用民衆則益民寡則損坡謂孟冬獻民數者蓋一年之內或民氣安樂或值凶飢妖孽之疾因民之登耗可知生斂之豐匱有豐匱則知所入之多少以之圖度國用量入以為出也曰上文又云大比制國用何也曰三年矣天道凶豐之數至此齊矣公私出入之經上下可較量矣民之少者則已壯未老者則及老矣故大比之而凡受田歸田之令或征或舍之差耕三餘一之法民數有稽則國用可制也圖者隨分而營度制者總成而經畫義各有指焉曰上既大比何此方言歲獻曰此以孟冬獻與下文歲終正歲為類而連之無别義也曰司寇刑官也何以職民數曰未有以必其然也或者以寓好生之德乎抑又聞之古者悼與耄不加刑而此經亦有赦幼弱赦老旄及七十與未齔者不為奴之法或者刑罰之下當知老幼以為刺宥有取此義而屬之乎歲終則令羣士計獄弊訟登中于天府注曰上其所斷獄訟之數疏曰羣士謂鄉士遂士以下皆是必登斷獄之書於祖廟天府者重其斷刑使神監之齔音襯正歲帥其屬而觀形象令以木鐸曰不用法者國有常刑令羣士坡謂令羣士三字疑衍文乃宣布于四方憲刑禁注曰宣遍也憲表也謂縣之也刑禁士師之五禁疏曰此布憲職也此官主之彼乃布之事相成也乃命其屬入會乃致事注曰得其屬之計乃令致之于王坡謂此九字當在登中于天府之下正歲之上蓋小宰小司徒文皆言考成受會致事方繼以正歲帥屬云云可見矣憲音懸注縣同會古外反士師之職掌國之五禁之法以左右刑罰一曰宫禁二曰官禁三曰國禁四曰野禁五曰軍禁皆以木鐸徇之于朝書而縣于門閭注曰左右助也助刑罰者助其禁民為非也宫王宫也官官府也國城中也古之禁書亡矣今宫門有符籍官府有無故擅入城門有離載下帷野有田律軍有囂歡夜行之禁其粗可言者疏曰凡設五刑者刑期于無刑以刑止刑以殺止殺殺一人使萬人懲是欲不使犯罪今於刑外豫施禁禁民使不犯刑是左右助刑罰無使罪麗於民也鄭剛中曰徇于朝示貴者巷門曰閭縣于門閭示賤者縣音懸粗音粗以五戒先後刑罰毋使罪麗于民一曰誓用之于軍旅二曰誥用之于會同三曰禁用諸田役四曰糾用諸國中五曰憲用諸都鄙注曰先後猶左右也誓誥於書則甘誓湯誓大誥康誥之屬禁則軍禮曰無干車無自後射此其類也糾憲未有聞焉坡謂禁是平日所遵守者使之畏戢而不為戒則一時所當行者使之知信而從命如軍禁不過各守部署若誓軍旅則更有步伐止齊是其一隅也射食亦反掌鄉合州黨族閭比之聨與其民人之什伍使之相安相受以比追胥之事以施刑罰慶賞注曰鄉合鄉所合也追追寇也胥讀如宿偦之偦偦謂司搏盜賊也疏曰士師掌鄉中合聚之法者以為有施刑賞也州黨族閭比之聨即是鄉合之事與其民人之什伍者五家為比比即一伍也二伍為什據追胥之時坡謂掌其聨者使之相安相受也掌其什伍者以比追胥之事也以施刑罰慶賞總言之夫上五禁五戒自宫中府中以至國野都鄙獨不及鄉至此方言鄉者蓋六鄉多重教事明刑所以弼教故特出而詳之與比毗志反下比追之比如字掌官中之政令注曰大司寇之官府中也劉執中曰官中政令謂秋官之屬所行政令察獄訟之辭以詔司寇斷獄弊訟致邦令疏曰獄訟辭訴各有司存謂若鄉士遂士縣士方士各主當司之獄訟其有不決來問都頭士師者則士師審察以告大司寇斷獄弊訟也致邦令者此即所察獄訟斷訖致與本官鄉士之等謂之致邦令也掌士之八成注曰鄭司農云八成者行事有八篇若今時決事比疏曰士即士師以下一曰邦汋注曰鄭司農云汋讀如酌酒尊中之酌國汋者斟汋盜取國家密事若今時刺探尚書事二曰邦賊注曰為逆亂者三曰邦諜注曰為異國反間疏曰異國欲來侵伐先遣人往間候取其委曲反來説之其言諜諜然故謂之邦諜四曰犯邦令注曰干冒王教令者五曰嬌邦令注曰稱詐以有為者六曰為邦盜注曰竊取國之寶藏者七曰為邦朋注曰朋黨相阿使政不平者八曰為邦誣注曰誣罔君臣使事失實坡謂此言斷獄弊訟其成式有此八品也邦汋邦賊邦諜悖逆作亂之事也犯邦令嬌邦令為邦盜罔上行私之事也邦朋比黨為姦逆亂之階也邦誣者誣罔造妖以惑衆私罔之漸也嬌音矯比必利反間去聲冒音墨藏才浪反若邦凶荒則以荒辨之法治之劉迎曰荒辨之法所以别其荒歲之輕重而知其中年凶年無年欲為移民通財糾守緩刑之備使凶札而無辨安知食二釜與不能人二釜者哉上飢則發上年之粟中飢則發中年之粟下飢則發下年之粟未必不自荒辨之法知之先儒既以辨為别又改為貶而援刑貶為證則荒辨豈特緩刑之一乎劉執中曰不辨其荒而槩施救政則僥幸之民出矣故士師治以荒辨之法令移民通財糾守緩刑注曰移民就賤救困也通財補不足也糾守備盜賊也緩刑舒民心也釜音脯凡以財獄訟者正之以傅别約劑注曰傅别中别手書也約劑各所持劵也鄭司農云若今時市買為劵書以别之各得其一訟則案以劵正之鄭剛中曰稱責之財則傅之以約束别而為兩人執其一買賣之財則立為限約而有劑劵以身執故以財致訟者操此以為決若祭勝國之社稷則為之尸注曰以刑官為尸略之也周謂亡殷之社為亳社易彥祥曰亳社以隂為主而刑乃隂之類媒氏以男女之隂訟而聽於勝國之社類也此祭勝國之社而刑官為之尸亦類也王燕出入則前驅而辟注曰道王且辟行人疏曰言燕出入謂宫苑皆是道音導祀五帝則沃尸及王盥洎鑊水注曰洎謂增其沃汁疏曰案特牲少牢尸尊不就洗入門北面則以盤匜盥手王盥謂將獻尸時先就洗盥鑊水亨人實之此官增之示敬而已此直言祀五帝沃尸及王盥其餘冬至夏至及祭先王先公所沃盥者案小祝職云大祭祀沃尸盥小臣職云大祭祀沃王盥如是則冬至夏至及先王先公小祝沃尸盥小臣沃王盥鬱人云凡祼事沃盥惟在宗廟為祼時洎其器反匜音移亨普庚反凡刉珥則奉犬牲注曰珥讀為衈刉衈釁禮之事用牲毛者曰刉羽者曰衈刉音機珥而志反注衈同諸侯為賓則帥其屬而蹕于王宫注曰謂諸侯來朝若燕饗時大喪亦如之大師帥其屬而禁逆軍旅者與犯師禁者而戮之注曰逆軍旅反將命也犯師禁干行陳也行户剛反陳直忍反歲終則令正要會正歲帥其屬而憲禁令于國及郊野注曰去國百里為郊郊外謂之野坡謂春官大祝云大禋祀祭示逆牲逆尸是天地有尸也五帝有尸則具於此文坡疑天地至大何人精氣道德可與之準而代為歆享乎竊謂郊以稷配所云尸者或為稷尸至祀五天帝則配以五人帝是此尸當亦人帝之尸如大皥則尸風氏之類也然或古者祭必立尸雖天地不廢則準以王父孫尸之義當以大子為尸存此二説蓋疑而不敢質言今案曲禮孫可以為王父尸經下孔疏云異義公羊説祭天無尸左氏説晉祀夏郊以董伯為尸虞夏傳云舜入唐郊以丹朱為尸是祭天有尸也許慎引魯郊祀曰祝延帝尸從左氏之説也又案橫渠張子曰節服氏言郊祀送逆尸從車則祀天有尸也天地山川之類非人鬼者恐皆難有尸節服氏言郊祀有尸不害后稷配天而有尸也是此二説先儒已有明論獨恨區區寡陋耳然以理求之則張子為長夫舜入唐郊丹朱為尸以為天尸似矣而有虞氏禘黃帝而郊嚳丹朱嚳孫也安知非舜入唐郊祀天配嚳以其孫丹朱為其王父帝嚳尸乎此張子之可據一也晉祀夏郊董伯為尸韋氏注云神不歆非類董伯或姒姓者則韋氏不以董伯為天尸而以為鯀尸又彰然矣此張子之可據二也然亦有疑本經神示五帝言尸至為何尸皆不著别則未知其天與人與可疑一也此經祭勝國社稷士師為尸夫勝國社稷有尸則社稷亦當有之五祀有尸則朱子常著之矣社稷五祀有尸則嶽瀆亦當有之周公祭泰山以大公為尸是也祭百物如迎貓迎虎之類皆有尸則祭四方亦當有之自社稷至百物皆地祭也而皆有尸則天神亦當有之可疑二也故孔疏又云天子祭天地社稷山川四方百物及七祖之屬皆有尸也諸侯祭社稷竟內山川及大夫有采地祭五祀皆有尸也外神之屬不問同姓異姓但卜吉則可為尸由此觀之張子雖長於理抑孔疏亦斷置於經者若張子曰天地山川之類非人鬼難有尸則社稷五祀亦非人鬼而何以有尸坡從子鍾倫云貓虎有尸貓虎豈死而鬼者嗚呼三代之制逺矣微矣外史雜篇苟可徵者猶將取焉况諸賢之所稽其理與事昭昭有是乎不敢妄有折衷在賢者之裁之也鄉士掌國中注曰鄭司農云謂國中至百里郊也玄謂其地則距王城百里內也言掌國中此主國中獄也六鄉之獄在國中各掌其鄉之民數而糾戒之注曰鄉士八人言各者四人而分主三鄉黃文叔曰糾戒之恐其昏迷抵誤而陷於法也聽其獄訟察其辭辨其獄訟異其死刑之罪而要之旬而職聽于朝注曰辨異謂殊其文書也要之為其罪法之要辭如今劾矣十日乃以職事治之于外朝容其自反覆疏曰劾實也正謂棄虛從實收取要辭為定容其自反覆恐囚虛承其罪十日不翻即是其實然後向外朝對衆更詢乃與之罪坡謂職多也莊子曰萬物職職職聽言諸獄官衆聽之也司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟注曰麗附也各附致其法以成議也疏曰吕刑之書聽五辭是也恐專有濫故衆獄官共聽之各麗其法者罪狀不同附法有異當如其罪狀各依其罪不得濫出濫入獄訟成士師受中協日刑殺肆之三日注曰受中謂受獄訟之成也鄭司農云士師受中若今二千石受其獄也中者刑罰之中也故論語曰刑罰不中則民無所措手足協日刑殺協合也和也和合支幹善日若今時望後利日也肆之三日故春秋傳曰三日棄疾請尸論語曰肆諸市朝玄謂士師既受獄訟之成鄉士則擇可刑殺之日至其時而往涖之尸之三日乃反也疏曰肆之三日據死者而言其四刑之類刑訖即放不須肆之若欲免之則王會其期注曰免猶赦也期謂鄉士職聽于朝司寇聽之日王欲赦之則用此時親往議之坡謂所欲免者親故之等在於八議也不中丁仲反大祭祀大喪紀大軍旅大賓客則各掌其鄉之禁令帥其屬夾道而蹕注曰屬中士以下疏曰大祭祀若祭天四時迎氣即於四郊大喪紀當葬所經道大軍旅王出行所經過大賓客四方諸侯來朝各由方而入並過六鄉路以是故各掌其鄉之禁令三公若有邦事則為之前驅而辟其喪亦如之注曰鄭司農云鄉士為三公道也若今時三公出城郡督郵道也凡國有大事則戮其犯命者疏曰大事言戮犯命者止謂征伐田獵之大事故有戮犯命之事也遂士掌四郊注曰鄭司農云謂百里外至三百里也玄謂其地則距王城百里以外至二百里言掌四郊者此主四郊獄也六遂之獄在四郊各掌其遂之民數而糾其戒令注曰遂士十二人言各者二人而分主一遂聽其獄訟察其辭辨其獄訟異其死刑之罪而要之二旬而職聽于朝疏曰去王城漸逺恐多枉濫故至二旬容其反覆也司寇聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日就郊而刑殺各於其遂肆之三日注曰就郊而刑殺者遂士也遂士擇刑殺日至其時往涖之如鄉士為之矣言各於其遂者四郊六遂遂處不同疏曰鄉士獄在國中不須言就此去郊差逺故云就郊也六鄉之獄并在國中不得言各六遂之獄分在四郊之上故須言各也若欲免之則王令三公會其期注曰令猶命也王欲赦之則用遂士職聽之時命三公往議之若邦有大事聚衆庶則各掌其遂之禁令帥其屬而蹕黃文叔曰大事即大祭祀大喪紀大軍旅大賓客也鄉舉其目遂舉其凡不必言王所親也邦之大事遂未必盡與政令及之則聚其衆庶遂士掌其禁令六鄉若有邦事則為之前驅而辟其喪亦如之疏曰六鄉近則使三公六遂差逺使六鄉凡郊有大事則戮其犯命者黃文叔曰其事在郊有犯命者遂士專戮之遂獄在郊也縣士掌野注曰鄭司農云掌三百里至四百里大夫所食晉韓須為公族大夫食縣玄謂地距王城二百里以外至三百里曰野三百里以外至四百里曰縣四百里以外至五百里曰都都縣野之地其邑非王子弟公卿大夫之采地則皆公邑也謂之縣縣士掌其獄焉言掌野者郊外曰野大總言之也獄居近野之縣獄在二百里上縣之縣獄在三百里上都之縣獄在四百里上各掌其縣之民數疏曰序官縣士三十二人縣獄既有三處蓋三百里地狹人少當十人四百里五百里地廣民多當各十一人故云各掌糾其戒令而聽其獄訟察其辭辨其獄訟異其死刑之罪而要之三旬而職聽于朝司冦聽之斷其獄弊其訟于朝羣士司刑皆在各麗其法以議獄訟獄訟成士師受中協日刑殺各就其縣肆之三日注曰刑殺各就其縣者亦謂縣士也若欲免之則王命六鄉會其期若邦有大役聚衆庶則各掌其縣之禁令疏曰直言大役不言大事又不言率其屬而蹕者則非王行征伐之事謂起人役役使民衆故直各掌其縣之禁令而已若大夫有邦事則為之前驅而辟其喪亦如之凡野有大事則戮其犯命者注曰野距王城二百里以外及縣都方士掌都家注曰鄭司農云掌四百里至五百里公所食魯季氏食於都玄謂都王子弟及公卿之采地家大夫之采地大都在疆地小都在縣地家邑在稍地不言掌其民數民不純屬王疏曰上縣士掌三等公邑之獄此方士掌三等采地之獄縣士所掌是親自掌之若方士乃遙掌之蓋采地自有都家之士掌獄有事則上於方士疆居良反聽其獄訟之辭辨其死刑之罪而要之三月而上獄訟于國注曰三月乃上要者又變朝言國以其自有君異之司寇聽其成于朝羣士司刑皆在各麗其法以議獄訟注曰成平也鄭司農説以春秋傳曰晉邢侯與雍子爭鄐田久而無成疏曰上三處直言司寇聽之此獨云聽其成者成謂采地之士所平斷文書亦異於上也獄訟成士師受中書其刑殺之成與其聽獄訟者注曰都家之吏自協日刑殺但書其成與治獄之吏姓名備反覆有失實者疏曰書之者亦是自有君異於鄉士之等鄐許六反凡都家之大事聚衆庶則各掌其方之禁令注曰方士十六人言各掌其方者四人而主一方也其方以王之事動衆則為班禁令焉以時修其縣法若歲終則省之而誅賞焉注曰縣法縣師之職也其職掌邦國都鄙稍甸郊野之地域而辨其夫家人民田萊之數及其六畜車輦之稽方士以四時修此法歲終又省之則與掌民數亦相近凡都家之士所上治則主之注曰都家之士都士家士也主之告於司寇聽平之黃文叔曰所上治者罪與法疑而讞者也讞魚竭反訝士掌四方之獄訟注曰鄭司農云四方諸侯之獄訟諭罪刑于邦國注曰告曉以麗罪及制刑之本意凡四方之有治於士者造焉注曰謂讞疑辨事先來詣乃通之於士也士主謂士士師也如今郡國亦時遣主者吏詣廷尉議者四方有亂獄則往而成之注曰亂獄謂若君臣宣淫上下相虐者也往而成之猶吕步舒使治淮南獄造七報反邦有賓客則與行人送逆之入於國則為之前驅而辟野亦如之居館則帥其屬而為之蹕誅戮暴客者客出入則道之有治則贊之注曰送逆謂始來及去也出入謂朝覲於王時也春秋傳曰晉侯受䇿以出出入三覲入國入野自以時事道音導凡邦之大事聚衆庶則讀其誓禁疏曰大事者自是在國征伐之等聚衆庶非諸侯之事也朝士掌建邦外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後左嘉石平罷民焉右肺石達窮民焉注曰樹棘以為位者取其赤心而外刺象以赤心三刺也槐之言懷也懷來人於此欲與之謀羣吏謂府史也州長鄉遂之官鄭司農云王有五門外曰臯門二曰雉門三曰庫門四曰應門五曰路門路門一曰畢門外朝在路門外內朝在路門內左九棘右九棘故易曰繫用徽纆置于叢棘玄謂明堂位説魯公宫曰庫門天子臯門雉門天子應門言魯用天子之禮所名曰庫門者如天子臯門所名曰雉門者如天子應門此名制二兼四則魯無臯門應門矣檀弓曰魯莊公之喪既葬而絰不入庫門言其除喪而反由外來是庫門在雉門外必矣如是王五門雉門為中門雉門外設兩觀與今之宫門同閽人幾出入者窮民蓋不得入也郊特牲繹之於庫門內言逺當於廟門廟在庫門之內見於此矣小宗伯職曰建國之神位右社稷左宗廟然則外朝在庫門之外臯門之內與今司徒府有天子以下大會殿亦古之外朝哉周天子諸侯皆有三朝外朝一內朝二內朝之在路門內者或謂之燕朝帥其屬而以鞭呼趨且辟注曰趨朝辟行人執鞭以威之禁慢朝錯立族談者注曰慢朝謂臨朝不肅敬也錯立族談違其位僔語也易彥祥曰王朝有三皆所以聽政此言外朝之政特詳於治朝燕朝蓋不特諸侯羣臣之咸在雖州長衆庶與夫窮民罷民之類皆得羣至於左右前後之列其可忽乎朝士以鞭呼趨則呼朝者之趨於位也且為之辟則使人避焉而止其位也位定然後為之禁其慢朝者錯立者族談者尊君故也長丁丈反罷音皮辟音闢纆亡北反僔子損反凡得獲貨賄人民六畜者委于朝告于士旬而舉之大者公之小者庶民私之注曰俘而取之曰獲委于朝十日待來識之者人民謂刑人奴𨽻逃亡者司𨽻職曰帥其民而搏盜賊鄭司農云若今時得遺物及放失六畜持詣鄉亭縣庭大者公之大物沒入公家也小者私之小物自畀也玄謂人民之小者未齔七歲以下疏曰告于士者得物之人告朝士俘音孚搏音博齔音襯畀必二反凡士之治有期日國中一旬郊二旬野三旬都三月邦國期期內之治聽期外不聽注曰鄭司農云謂在期內者聽期外者不聽若今時徒論決滿三月不得乞鞫疏曰凡士之治有期日者即上文鄉士遂士之等獄訟成來於外朝職聽逺近節之皆有一旬二旬期日期內聽期外不聽者所以省煩息訟也凡有責者有判書以治則聽注曰判半分而合者鄭司農云謂若今時辭訟有劵書者為治之鄭剛中曰責如今之理欠凡民同貨財者令以國法行之犯令者刑罰之注曰鄭司農云同貨財者謂合錢共賈者也以國法行之司市為節以遣之坡謂國法如度量淳制及偽飾之禁也犯令者刑罰之如二人同財一人犯令則惟刑罰其犯令不相及也然言同貨財則自賈者亦在其中凡屬責者以其地傅而聽其辭注曰屬責轉責使人歸之而本主死亡歸受之數相抵冒者也以其地之人相比近能為證者來乃受其辭為治之凡盜賊軍鄉邑及家人殺之無罪注曰鄭司農云謂盜賊羣輩若軍共攻盜鄉邑及家人者殺之無罪若今時無故入人室宅廬舍上人車船牽引人欲犯法者其時格殺之無罪鄭剛中曰軍鄉邑及家人者屯於鄉邑姦犯及家人也凡報仇讎者書於士殺之無罪疏曰士即朝士也坡謂此謂或孤稚羸弱長成而將復仇者或仇人始逃而今乃歸者或始無如之何而今乃可復者皆是也注疏意以殺人者會赦不死乃不辟於逺方猶與所殺之親同國將報之先書於士妄意唐虞只眚災肆赦而此經列有三宥三赦古所謂赦者如是而已豈有當誅而能會赦乎肆大眚始見於春秋漢唐方有大赦未可以為斷也責側賣反又如字賈音古比毗志反辟音避若邦凶荒札喪寇戎之故則令邦國都家縣鄙慮刑貶注曰慮謀也貶猶減也謂當圖謀緩刑且減國用為民困也所貶視時為多少之法疏曰縣鄙謂六遂不言六鄉者舉遂則鄉在其中司民掌登萬民之數自生齒以上皆書於版辨其國中與其都鄙及其郊野異其男女歲登下其死生注曰登上也男八月女七月而生齒版今户籍也下猶去也每歲更著生去死疏曰國中據六鄉在城中者都鄙據三等采地及其郊野者郊謂六鄉之民在四郊者野謂六遂及四等公邑是遍畿內矣著丁略反及三年大比以萬民之數詔司寇司寇及孟冬祀司民之日獻其數于王王拜受之登于天府內史司會冢宰二之以贊王治注曰司民軒轅角也天府主祖廟之藏者贊佐也三官以二佐王治者當以民多少黜陟主民之吏疏曰軒轅十七星如龍形有兩角角有大民小民鄭剛中曰內史司會冢宰二之以見民非特王之事而為大臣者不可不任其責小司寇二之以制國用此言二之以贊王治者司寇刑官也民至於犯刑以其貧窮而抵冒爾故言制國用意欲使三官知為民富之術不至使之犯刑也司民掌民數之官耳民之貧而犯刑非已所得而知也以為民者王所當治民有登耗則為公卿大臣者當據是數佐王以治之使之繁庶而已故曰以贊王治司刑掌五刑之法以麗萬民之罪墨罪五百劓罪五百宫罪五百刖罪五百殺罪五百注曰墨黥也先刻其面以墨窒之劓截其鼻也今東西夷或以墨劓為俗古刑人亡逃者之世類與宫者丈夫則割其勢女子閉於宫中若今宦男女也刖斷足也周改臏作刖殺死刑也書傳曰決關梁踰城郭而略盜者其刑臏男女不以義交者其刑宫觸易君命革輿服制度姦宄盜攘傷人者其刑劓非事而事之出入不以道義而誦不祥之辭者其刑墨降畔寇賊劫略奪攘嬌虔者其刑死此二千五百罪之目略也其刑書則亡夏刑大辟二百臏辟三百宫辟五百劓墨各千周則變焉所謂刑罰世輕世重者也鄭司農云漢孝文帝十三年除肉刑疏曰文帝所赦肉刑惟墨劓與刖三者其宫刑至隋乃赦劓魚器反刖音月黥其京反臏頻忍反降户江反嬌居兆反若司寇斷獄弊訟則以五刑之法詔刑罰而以辨罪之輕重注曰詔刑罰者處其所應不如今律家所署法矣司刺掌三刺三宥三赦之法以贊司寇聽獄訟注曰刺殺也訊而有罪則殺之宥寬也赦舍也疏曰刑有五一者是殺餘皆訊之獨言殺者立官名刺據重而言故也一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民疏曰此三刺之事所施謂斷獄弊訟之時一宥曰不識再宥曰過失三宥曰遺忘注曰鄭司農云不識謂愚民無所識則宥之過失若今律過失殺人不坐死玄謂識審也不審若今仇讎當報甲見乙誠以為甲而殺之者過失若舉刃欲砍伐而軼中人者遺忘若間帷薄忘有在焉而以兵矢投射之坡謂不識者僻陋之人未識國法非下文生而蠢愚者比過失無心也遺忘者疏狂之夫健忘者也一赦曰幼弱再赦曰老旄三赦曰憃愚注曰憃愚生而癡騃童昏者鄭司農云幼弱老旄若今時律令年未滿八歲八十以上非手殺人他皆不坐王介甫曰幼而不弱老而不耄愚而非蠢則不在所赦坡謂上三宥如今律所謂減等此三赦則全放之以此三法者求民情斷民中而施上服下服之罪然後刑殺王光逺曰以此三法者求民情斷民中則情盡於內而辭孚於外矣情重者上服情輕者下服或刑或殺各得其罪而無疑也刺七賜反旄耄同憃丑江反軼待結反軼中丁仲反間讀如間厠之間射食亦反癡丑之反騃五駭反司約掌邦國及萬民之約劑治神之約為上治民之約次之治地之約次之治功之約次之治器之約次之治摯之約次之注曰此六約者諸侯以下至於民皆有焉劑謂劵書也治者理其相抵冒上下之差也坡謂六約既兼邦國萬民則治神之約以邦國言之天子郊諸侯社廟制自諸侯至士各有差至於非其當祀而命之亦為之約若魯禘郊之類也以民言之所謂庶士庶民祭於寢也治民之約以邦國言之分鄉以寓軍制邑以授農各容其民不得為逋逃主也至於非所當有而授之若分晉以九宗之類者亦為之約以民言之本注謂征稅遷移仇讎既和是也治地之約以邦國言之五等封土各有定制不得相侵凌至若魯朝宿之許鄭祭泰山之祊者亦為之約以民言之則閭里版圖田首界比是也治功之約以邦國言之司勳六功是也以民言之司寇上功糾力是也治器之約以邦國言之典命所列國家宫室等之節至若非所用而頒之若魯得用四代之服器者亦為之約以民言之如庶人役車端衰喪車無等之類也治摯之約宗伯之六瑞六摯詳矣鄭剛中曰六者或為上或為次以事之大小輕重為序也劑子隨反祊音崩凡大約劑書於宗彞小約劑書於丹圖注曰大約劑邦國約也書於宗廟之六彝欲神監焉小約劑萬民約也丹圖未聞或有雕器簠簋之屬有圖象者與春秋傳曰斐豹𨽻也著於丹書今俗語有鐵劵丹書豈此舊典之遺言若有訟者則珥而辟藏其不信者服墨刑注曰訟訟約若宋仲幾嶭宰者也辟藏開府視約書不信不如約也珥讀為衈謂殺雞取血釁其户若大亂則六官辟藏其不信者殺注曰大亂謂僭約若吳楚之君晉文公請隧以葬者六官辟藏明罪大也六官初受盟約之二珥音二注衈同辟音闢隧音遂司盟掌盟載之法注曰載盟辭也盟者書其辭於䇿殺牲取血坎其牲加書於上而埋之謂之載書春秋傳曰宋寺人惠牆伊戾坎用牲加書為世子痤與楚客盟痤才戈反凡邦國有疑會同則掌其盟約之載及其禮儀北面詔明神既盟則二之注曰有疑不協也明神神之明察者謂日月山川也覲禮加方明于壇上所以依之也詔之者讀其載書以告之也二之者寫副當以授六官盟萬民之犯命者詛其不信者亦如之注曰盟詛者欲相與共惡之也犯命犯君教令也不信違約者也春秋傳曰臧紇犯門斬關以出乃盟臧氏又曰鄭伯使卒出豭行出犬雞以詛射潁考叔者疏曰凡言盟者盟將來詛者詛往過凡民之有約劑者其二在司盟注曰二之者檢其自相違約疏曰此謂司約副寫一通來入司盟檢後相違約勘之有獄訟者則使之盟詛注曰不信則不敢聽此盟詛所以省獄訟坡謂此承上文約劑而言惡烏路反紇恨發反豭音加凡盟詛各以其地域之衆庶共其牲而致焉既盟則為司盟共祈酒脯注曰使其邑閭出牲而來盟已又使出酒脯司盟為之祈明神使不信者必凶坡謂此一官見聖人防民之周夫邦國兆民情偽之出蓋千態萬貌矣邦國之間或有讒人交搆其間小將相惡大將相暴欲以王法正之則彼此各有其是難為輕重欲和之則終懷猜忌使詔於明神雖有大疑兩亦釋然矣若夫萬民之獄訟或有情事曖昧無佐證可成其罪欲赦之則受害者不肯甘心欲罰之則無惡者不服其罪計惟有盟詛使神人交疾之耳蓋聖人有以見夫逆於倫而感於氣者必召殃禍使之有所不敢又有以見夫天理民彝不容泯滅無情者必負羞而畏神使之有所不忍實善於佐法之窮者也况所對者日月山川之神豈為妖妄乎而或謂先王之世令行禁止安有誨以不經之事此似是而非可言不可行之論也嗚呼誓誥不及五帝盟詛不及三王蓋言其盛時耳聖人之法豈獨紀一時之宜哉寧使世治民淳法設而不用不可使世衰民偽值其事而無法以處之也職金掌凡金玉錫石丹青之戒令注曰青空青也疏曰此數種同出於山地官草人已主職金又主之者彼官主其取此官主其藏故二官共主之也受其入征者辨其物之媺惡與其數量楬而璽之入其金錫于為兵器之府入其玉石丹青于守藏之府注曰為兵器者攻金之工六也守藏者玉府內府也鄭司農云受其入征者謂主受采金玉錫石丹青者之租稅也楬而璽之者楬書其數量以著其物也璽者印也既楬書揃其數量又以印封之今時之書有所表識謂之楬櫫入其要注曰要凡數也入之於大府媺美同楬音竭守音狩草音礦揃音箋識音志櫫音豬掌受士之金罰貨罰入于司兵注曰給治兵及工直也貨泉貝也罰罰贖也書曰金作贖刑疏曰古者出金贖罪皆據銅為金士之金罰者謂斷獄訟者有疑即使出贖既言金罰又曰貨罰者出罰之家時或無金即出貨以當金直故兩言之旅于上帝則共其金版饗諸侯亦如之注曰鉼金謂之版此版所施未聞鉼必領反凡國有大故而用金石則掌其令注曰主其取之令也用金石者作槍雷椎梈之屬疏曰大故寇戎也槍七羊反雷郎對反椎直追反梈音烹司厲掌盜賊之任器貨賄辨其物皆有數量賈而楬之入于司兵注曰鄭司農云任器貨賄謂盜賊所用傷人兵器及所盜財物也入于司兵若今時傷殺人所用兵器盜賊贓加責沒入縣官疏曰任器多是金刃所盜財貨雖非金刃以其賊物亦入司兵給治兵刃之用故並入司兵也賈音嫁其奴男子入于罪𨽻女子入于舂稿注曰鄭司農云謂坐為盜賊而為奴者輸于罪𨽻舂人稿人之官也由是觀之今之為奴婢古之罪人也故書曰豫則奴戮女論語曰箕子為之奴罪𨽻之奴也故春秋傳曰斐豹𨽻也著於丹書請焚丹書我殺督戎恥為奴欲焚其籍也玄謂奴從坐而沒入縣官者男女同名凡有爵者與七十者與未齔者皆不為奴注曰有爵謂命士以上也齔毁齒也男八歲女七歲而毁齒鄭剛中曰盜賊之罪宜加以無餘刑故凡親戚皆從其家有爵者有老幼者特免為奴而已易彥祥曰先王之於天下固有殺未足以懲惡亦有不刑可以勸善者此之謂夫齔音襯犬人掌犬牲凡祭祀共犬牲用牷物伏瘞亦如之注曰鄭司農云牷純也物色也伏謂伏犬以王車轢之瘞謂埋祭也爾雅曰祭地曰瘞埋凡幾珥沈辜用駹可也注曰鄭司農云幾讀為庪爾雅曰祭山曰庪縣祭川曰浮沈大宗伯職曰以埋沈祭山林川澤以疈辜祭四方百物駹謂不純色也玄謂幾讀為刉珥當為衈刉衈者釁禮之事瘞於例反轢音歷駹亡江反庪音詭縣音懸凡相犬牽犬者屬焉掌其政治注曰相謂視擇知其善惡疏曰犬有三種一田犬二吠犬三食犬若田犬吠犬觀其善惡若食犬觀其肥瘠故皆相之牽犬者謂呈見之故少儀云犬則執紲是也紲音嶭司圜掌收教罷民鄭剛中曰拘之圜土而役之所以收之也勞之苦之使其善心自生所以教之也凡害人者弗使冠飾而加明刑焉任之以事而收教之能改者上罪三年而舍中罪二年而舍下罪一年而舍其不能改而出圜土者殺雖出三年不齒注曰弗使冠飾者著墨幪若古之象刑與舍釋之也鄭司農云罷民謂惡人不從化為百姓所患苦而未入五刑者也故曰凡害人者不使冠飾任之以事若今時罰作矣罷蒲宜反凡圜土之刑人也不虧體其罰人也不虧財注曰言其刑人但加以明刑罰人但任之以事耳圜土所收教者過失害人已麗於法者掌囚掌守盜賊凡囚者上罪梏拲而桎中罪桎梏下罪梏王之同族拲有爵者桎以待弊罪注曰凡囚者謂非盜賊自以他罪拘者也鄭司農云拲者兩手共一木也桎梏者兩手各一木也玄謂在手曰梏在足曰桎中罪不拲手足各一木耳下罪又去桎王同族及命士以上雖有上罪或拲或桎而已弊猶斷也疏曰此謂五刑罪人古者五刑不入圜土故使身居三木掌囚守之梏古毒反拲音鞏桎之實反及刑殺告刑于王拲而適朝士加明梏以適市而刑殺之注曰告刑于王告王以今日當行刑及所刑姓名也其死罪則曰某之罪在大辟其刑罪則曰某之罪在小辟拲而適朝者重刑為王欲有所赦則當以付士士鄉士也鄉士加明梏者謂書其姓名及其罪於梏而著之也囚時雖有無梏者至於刑殺皆設之以適市就衆也庶姓無爵者皆刑殺於市疏曰刑殺各於本獄之所今此經云以適市者此文止謂六鄉之獄在國中推問在獄行刑殺則在市若遂士以下自在本獄之處刑殺之故此云士鄉士也若遂士以下於此時掌囚亦當付士也凡有爵者與王之同族拲而適甸師氏以待刑殺注曰適甸師氏亦由朝乃往也待刑殺者掌戮將自市來也文王世子曰雖親不以犯有司正術也所以體異姓也刑于隱者不與國人慮兄弟也掌戮掌斬殺賊諜而搏之注曰斬以鈇鉞若今要斬也殺以刀刃若今棄市也諜謂姦寇反間者賊與諜罪大者斬之小者殺之搏當為膊諸城上之膊字之誤也膊謂去衣磔之凡殺其親者焚之殺王之親者辜之注曰親緦服以內也焚燒也易曰焚如死如棄如辜之言枯也謂磔之搏音博注膊同要一遙反凡殺人者踣諸市肆之三日刑盜于市注曰踣僵尸也肆猶申也陳也凡言刑盜罪惡莫大焉坡謂殺罪就市其餘四刑宫罪就蠶室餘刑就屏處所云五刑三就也若盜殺之固在市矣雖刑亦於市則異於平人之犯罪者凡罪之麗於法者亦如之唯王之同族與有爵者殺之于甸師氏注曰罪二千五百條上附下附刑五而已於刑同科者其刑殺之一也坡謂亦如之者合入死者亦踣之合入四刑者雖不於市亦刑之其處故總言之殺之于甸師氏者謂不踣踣者陳尸使人見之既刑於隱處故不踣也踣皮北反僵居良反凡軍旅田役斬殺刑戮亦如之注曰戮謂膊焚辜肆墨者使守門注曰黥者無妨於禁禦劓者使守關注曰截鼻亦無妨以貌醜逺之宫者使守內注曰以其人道絶也今世或然刖者使守囿注曰斷足驅衛禽獸無急行髠者使守積注曰此出五刑之中而髠者必王之同族不宫者宫之為翦其類髠頭而已守積積在隱者宜也髠若門反積子賜反司𨽻掌五𨽻之法辨其物而掌其政令注曰五𨽻謂罪𨽻四翟之𨽻也物衣服兵器之屬帥其民而搏盜賊役國中之辱事為百官積任器凡囚執人之事注曰民五𨽻之民也鄭司農云百官所當任持之器物此官主為積聚之也玄謂任猶用也疏曰民者上序官五𨽻皆百二十員員外皆是民也任器者除兵之外所有家具之器皆是搏音博邦有祭祀賓客喪紀之事則役其煩辱之事注曰煩猶劇也士喪禮下篇曰𨽻人涅厠涅乃結反掌帥四翟之𨽻使之皆服其邦之服執其邦之兵守王宫與野舍之厲禁注曰野舍王行所止舍也厲遮列也疏曰服其邦之服執其邦之兵者若東方南方衣布帛執刀劍西方北方衣氊裘執弓矢鄭剛中曰司𨽻正掌其事而師氏又使其屬董之而已罪𨽻掌役百官府與凡有守者掌使令之小事注曰役給其小役凡封國若家牛助為牽倣注曰鄭司農云凡封國若家謂建諸侯立大夫家也牛助為牽倣此官主為送致之也玄謂牛助國以牛助轉徙也罪𨽻牽倣之在前曰牽在旁曰倣疏曰車轅內一牛前亦一牛今還遣二𨽻前者牽前牛倣者御當車之牛故據人而言牽倣也其守王宫與其厲禁者如蠻𨽻之事倣步浪反蠻𨽻掌役校人養馬其在王宫者執其國之兵以守王宫在野外則守厲禁疏曰按校人良馬乘一師四圉不見𨽻者蓋是雜役之中閩𨽻掌役畜養鳥而阜蕃教擾之掌子則取𨽻焉坡謂役畜謂為掌畜之役也掌子則取𨽻者此句當有闕誤夷𨽻掌役牧人養牛馬與鳥言注曰鄭司農云夷狄之人或曉鳥獸之言故春秋傳曰介葛盧聞牛鳴曰是生三犧皆用之矣是以貉𨽻職掌與獸言其守王宫者與其守厲禁者如蠻𨽻之事貉𨽻掌役服不氏而養獸而教擾之掌與獸言注曰不言阜蕃者猛獸不可服又不生乳於圈檻也其守王宫者與其守厲禁者如蠻𨽻之事乳而樹反圈求阮反檻户覽反布憲掌憲邦之刑禁正月之吉執旌節以宣布于四方而憲邦之刑禁以詰四方邦國及其都鄙達于四海注曰憲表也謂縣之也刑禁者國之五禁所以左右刑罰者詰謹也使四方謹行之爾雅曰九夷八蠻六戎五狄謂之四海坡謂自執旌節至達於四海皆一時事言於司寇布刑之日執旌節適四方以宣布之而表縣其刑禁之書使四方邦國都鄙四海莫不謹行也縣音懸凡邦之大事合衆庶則以刑禁號令疏曰邦之大事合衆庶者謂征伐巡守田獵皆是大事合衆庶也禁殺戮掌司斬殺戮者凡傷人見血而不以告者攘獄者遏訟者以告而誅之注曰司猶察也察此四者告於司寇罪之也斬殺戮謂吏民相斬相殺相戮者傷人見血見血乃為傷人耳坡謂攘猶距也攘獄者法當獄官有文書追攝攘距不受捕也遏訟者遏止欲訟者也禁暴氏掌禁庶民之亂暴力正者嬌誣犯禁者作言語而不信者以告而誅之注曰民之好為侵陵稱詐謾誕此三者亦刑所禁也力正以力強得正也吳氏曰力正謂脅衆從已以邪為正也嬌其表反凡國聚衆庶則戮其犯禁者以徇凡奚𨽻聚而出入者則司牧之戮其犯禁者注曰奚𨽻女奴男奴也其聚出入有所使疏曰聚衆庶者謂征伐之等奚𨽻聚而出入者謂國有煩辱之處使奚𨽻野廬氏掌達國道路至于四畿注曰達謂巡行通之使不陷絶也去王城五百里曰畿比國郊及野之道路宿息井樹注曰比猶較也宿息廬之屬賓客所宿及晝止者也井共飲食樹為蕃蔽疏曰此經所云王為賓客在道須得共丞守衛之事國郊謂近郊逺郊野謂百里外至畿宿謂十里有廬三十里有宿五十里有市直言宿者舉中言之若有賓客則令守塗地之人聚柝之有相翔者誅之注曰守塗地之人道所出廬宿旁民也相翔猶昌翔觀伺者也鄭司農云聚柝之聚擊柝以宿衛之也有姦人相翔於賓客之側則誅之不得令寇盜賓客柝音託凡道路之舟車轚互者敘而行之注曰舟車轚互謂於迫隘處也車有轘轅坻閣舟有砥柱之屬其過之者使以次敘之鄭剛中曰轚者相值而礙也互者交互而不行也凡有節者及有爵者至則為之辟注曰辟辟行人亦使守塗地者轚音計轘户關反禁野之橫行徑踰者注曰皆為防姦也橫行妄由田中徑踰射邪趨疾越隄渠也射食亦反凡國之大事比修除道路者注曰比校治道者名若今次金敘大功疏曰大事謂若征伐巡守田獵郊祀天地王親行所經並須修除道路掌凡道禁注曰禁謂若今絶蒙布巾持兵杖之屬邦之大師則令掃道路且以幾禁行作不時者不物者注曰不時謂不夙則莫者也不物謂衣服操持非比常人也幾禁之者備姦人內賊及反間蠟氏掌除胔注曰曲禮四足死者曰漬胔鄭司農云謂死人骨也月令曰掩骼埋胔骨之尚有肉者也及禽獸之骨皆是坡謂胔有掩埋而無除去此除胔二字各自為義蓋除一事也胔一事也下文自明詳之蠟音娶胔似賜反注漬胔皆同骼古百反凡國之大祭祀令州里除不蠲禁刑者任人及凶服者以及郊野大師大賓客亦如之注曰蠲讀如潔圭惟饎之圭圭潔也刑者黥劓之屬任人司圜所收教罷民也凶服服衰絰也此所禁除者皆為不欲見人所薉惡也疏曰大祭祀謂郊祭天地大賓客謂諸侯來朝若據天地其神位在郊至郊而已若賓客則至畿故兼言野郊外曰野大總言也坡謂此一節言掌其除之事也蠲古懸反饎昌志反薉穢同惡烏路反若有死於道路者則令埋而置楬焉書其日月焉縣其衣服任器于有地之官以待其人注曰有地之官主此地之吏也其人家人也鄭司農云楬欲令其識取之今時楬櫫是也有地之官有郡界之吏今時鄉亭是也掌凡國之胔禁注曰禁謂孟春掩骼埋胔之屬坡謂此二節言掌其胔之事也楬音竭縣音懸雍氏掌溝瀆澮池之禁凡害於國稼者春令為阱擭溝瀆之利於民者秋令塞阱杜擭注曰溝瀆澮田間通水者也池謂陂障之水道也害於國稼謂水潦及禽獸也阱穿地為􅢾所以禦禽獸其或超踰則陷焉世謂之陷阱擭柞鄂也堅地阱淺則設柞鄂於其中秋而杜塞阱擭收刈之時為其陷害人也書粊誓曰􅖏乃擭敜乃阱時秋也伯禽以出師征徐戎擭胡化反陂披宜反􅢾七艷反柞才伯反鄂五格反粊音祕􅖏音杜敜乃協反禁山之為苑澤之沈者注曰為其就禽獸魚鱉自然之居而害之鄭司農云不得擅為苑囿於山也澤之沈者謂毒魚及水蟲之屬萍氏掌國之水禁注曰水禁謂水中害人之處及入水捕魚鱉不時幾酒注曰苛察沽買過多及非時者謹酒注曰使民節用酒也書酒誥曰有政有事無彝酒黃文叔曰掌水禁而使禁酒酒亦水之害人者也禁川遊者注曰備波洋卒至沈溺也司寤氏掌夜時注曰夜時謂夜早晚若今甲乙至戊以星分夜以詔夜士夜禁注曰夜士主行夜徼候者如今都候之屬易彥祥曰此謂施於國中者蓋國中有啓閉之候國事有朝夕之禮以星分夜則星見為夜星沒為晝朝夕啓閉於是乎在以是詔夜守之士禦晨行者禁宵行者夜遊者注曰備其遭寇害及謀非公事禦亦禁也謂遏止之無刑法也晨先明也宵定昏也書曰宵中星虛春秋傳曰夜中星隕如雨徼古弔反先悉薦反司烜氏掌以夫遂取明火於日以鑒取明水於月注曰夫遂陽遂也鑒鏡屬取水者世謂之方諸取日之火月之水欲得隂陽之潔氣也鄭剛中曰或謂鑒遂之齊同用金錫之半可以取水亦可以取火何也蓋金錫半者隂陽之雜用諸晝則陽氣應之而為火用諸夜則隂氣應之而為水以共祭祀之明齍明燭共明水注曰明燭以照饌陳明水以為玄酒鄭司農云夫發聲明齍謂以明水修滌粢盛黍稷疏曰鬱鬯五齊以明水配三酒以玄酒配玄酒井水也與明水别然對則異散文通謂之玄酒烜音燬夫如字司農音符凡邦之大事共墳燭庭燎注曰故書墳為蕡鄭司農云蕡燭麻燭也玄謂墳大也樹於門外曰大燭於門內曰庭燎皆所以照衆為明疏曰大事者謂若大喪紀大賓客墳扶云反注蕡同燎音聊中春以木鐸修火禁于國中注曰為季春將出火也火禁謂用火之處及備風燥軍旅修火禁邦若屋誅則為明竁焉注曰屋讀如其形剭之剭剭誅謂所殺不於市而以適甸師氏者也明竁若今楬頭明書其罪法也司烜掌明竁則罪人夜葬與坡謂屋誅為明竁者蓋凡殺人皆肆之三日明暴其罪今殺于甸師者因不肆諸市壙埋之楬其罪於竁上中音仲竁昌鋭反剭音握條狼氏掌執鞭以趨辟王出入則八人夾道公則六人侯伯則四人子男則二人注曰趨辟趨而辟行人若今卒辟車之為也孔子曰富而可求雖執鞭之士吾亦為之言士之賤也疏曰案序官條狼氏下士六人今云天子八人少二人矣蓋取胥徒中兼充也條音滌辟音闢凡誓執鞭以趨於前且命之誓僕右曰殺誓馭曰車轘誓大夫曰敢不關鞭五百誓師曰三百誓邦之大史曰殺誓小史曰墨注曰前謂所誓衆之行前也有司讀誓辭則大言其刑以警所誓也誓者謂出軍及將祭祀時也出軍之誓誓左右及馭則書之甘誓備矣郊特牲説祭祀之誓曰卜之日王立于澤親聽誓命受教諫之義也車轘謂車裂也師樂師也大史小史主禮事者鄭司農云誓大夫曰敢不關謂不關於君也玄謂大夫自受命以出則其餘事莫不復請疏曰誓自有大官若月令田獵司徒北面誓之誓時此條狼氏為之大言使衆聞知故云且命之轘户串反一音環大音泰修閭氏掌比國中宿互柝者與其國粥而比其追胥者而賞罰之注曰國中城中也粥養也國所遊養謂羡卒也追逐寇也胥讀為偦鄭司農云宿謂宿衛也互謂行馬所以障互禁止人也柝謂行夜擊柝粥音育偦音胥禁徑踰者與以兵革趨行者與馳騁於國中者注曰皆為其惑衆徐氏曰且疑其姦非也邦有故則令守其閭互惟執節者不幾注曰令者令其閭內之閭胥里宰之屬疏曰有故謂大喪寇戎等恐有姦非則命各守閭閭巷門坡謂互亦如梐枑之枑周禮述注卷二十一
