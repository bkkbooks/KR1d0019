body:
  text: 周禮述注卷十七安溪李光坡撰夏官司馬第四鄭目録云象夏所立之官馬者武也言為武者也夏整齊萬物天子立司馬共掌邦政政可以平諸侯正天下故曰統六師平邦國坡謂司馬主兵而曰馬者軍政莫重於馬也制畿曰萬乘制國曰千乘制家曰百乘皆以馬率焉惟王建國辨方正位體國經野設官分職以為民極乃立夏官司馬使帥其屬而掌邦政以佐王平邦國注曰政正也政所以正不正者也孝經説曰政者正也正德名以行道吕氏曰夏后氏命胤侯掌六師舉政典以誓衆則邦政之掌於司馬舊矣政官之屬大司馬卿一人小司馬中大夫二人軍司馬下大夫四人輿司馬上士八人行司馬中士十有六人旅下士三十有二人府六人史十有六人胥三十有二人徒三百有二十人注曰輿衆也行謂軍行列晉作六軍而有三行取名於此疏曰諸官皆云史十二人胥十二人徒百二十人獨此與諸官異者以大司馬總六軍軍事尚嚴特須監察故胥徒尚多凡制軍萬有二千五百人為軍王六軍大國三軍次國二軍小國一軍軍將皆命卿二千有五百人為師師帥皆中大夫五百人為旅旅帥皆下大夫百人為卒卒長皆上士二十五人為兩兩司馬皆中士五人為伍伍皆有長注曰軍師旅卒兩伍皆衆名也伍一比兩一閭卒一旅旅一黨師一州軍一鄉家所出一人將帥長司馬者其師吏也言軍將皆命卿則凡軍帥不特置選於六官六鄉之吏自卿以下德任者使兼官焉鄭司農云王六軍大國三軍次國二軍小國一軍故春秋傳有大國次國小國又曰成國不過半天子之軍周為六軍諸侯之大者三軍可也詩大雅常武曰整我六師以修我戎大雅文王曰周王于邁六師及之此周為六軍之見于經也春秋傳曰王使虢公命曲沃伯以一軍為晉侯此小國一軍之見于傳也百人為卒二十五人為兩故春秋傳曰廣有一卒卒偏之兩一軍則二府六史胥十人徒百人疏曰此非掌也在軍則置之無則已長丁丈反司勳上士二人下士四人府二人史四人胥二人徒二十人注曰故書勳作勛鄭司農云勛讀為勳勳功也此官主功賞故曰掌六鄉賞地之法以等其功疏曰司馬主征伐軍無賞士不往凡軍以賞為先故司勳列位在前馬質中士二人府一人史二人賈四人徒八人注曰質平也主買馬平其大小之賈直疏曰司馬者主以供軍之用馬質主平馬賈買之故亦列職居前也薛平仲曰賞典所以振士氣故司勳之官不可緩馬材所以謹戎備故馬質之官亦不敢後先王於嵗時稽鄉遂之牛馬以辨其可任之物馬之在民固無不足之慮而公馬之備闕不以責乎民而取材於公以給之是以有馬質然馬質宜校人之屬今在此者蓋掌主馬之政而詳及於六馬者校人之官固在所當重量三馬之材惟急於戎馬者馬質之官實在所當先賈音古注賈直音嫁下同量人下士二人府一人史四人徒八人注曰量猶度也謂以丈尺度地小子下士二人史一人徒八人注曰小子主祭祀之小事薛平仲曰量人既量地以集師旅之衆當其將戰所以必其用命者要必有托以申誓之故大司馬誓羣吏斬牲以左右徇陳誓者司馬斬其牲者則小子也斬牲者小子共其牲者則羊人也是以小子羊人次於此焉羊人下士二人史一人賈二人徒八人度待洛反司爟下士二人徒六人注曰故書爟為燋杜子春云燋當為爟書亦或為爟爟為私火玄謂爟讀如豫若觀火之觀今燕俗名湯熱為觀則爟火謂熱火與疏曰此職行火之政令火屬南方故在此也爟音貫燋哉約反觀古喚反掌固上士二人下士八人府二人史四人胥四人徒四十人注曰固國所依阻者也國曰固野曰險易曰王公設險以守其國司險中士二人下士四人史二人徒四十人掌疆中士八人史四人胥十有六人徒百有六十人注曰疆界也候人上士六人下士十有二人史六人徒百有二十人注曰候候迎賓客之來者疏曰詩云彼候人兮何戈與祋亦是武事故在此也祋丁外反環人下士六人史二人徒十有二人黃文叔曰以環名官取巡邏周匝之義鄭剛中曰夏官環人掌軍中循環往來無所不察之事而秋官環人則掌送迎賓客循環往來之事皆以循環往來為義軍中之環人有戰攻之事則置之非如秋官掌送迎之職挈壺氏下士六人史二人徒十有二人注曰挈讀如挈髮之挈壺盛水器也世主挈壺水以為漏射人下大夫二人上士四人下士八人府二人史四人胥二人徒二十人服不氏下士一人徒四人注曰服不服不服之獸者射鳥氏下士一人徒四人羅氏下士一人徒八人注曰能以羅罔摶鳥者郊特牲曰大羅氏天子之掌鳥獸者掌畜下士二人史二人胥二人徒二十人注曰畜謂斂而養之射鳥之射食亦反司士下大夫二人中士六人下士十有二人府二人史四人胥四人徒四十人注曰其職掌詔爵詔祿與司馬進賢興功同故在此諸子下大夫二人中士四人府二人史二人胥二人徒二十人注曰諸子主公卿大夫士之子者或曰庶子司右上士二人下士四人府四人史四人胥八人徒八十人注曰右謂有勇力之士充王車右黃文叔曰左主射右持車故司右與射人聨職虎賁氏下大夫二人中士十有二人府二人史八人胥八十人虎士八百人注曰不言徒曰虎士則虎士徒之選有勇力者旅賁氏中士二人下士十有六人史二人徒八人薛平仲曰虎言其有力如虎也旅言其旅力方剛也節服氏下士八人徒四人注曰世為王節所衣服方相氏狂夫四人注曰方相猶言放想可畏怖之貌大僕下大夫二人小臣上士四人祭僕中士六人御僕下士十有二人府二人史四人胥二人徒二十人注曰僕侍御於尊者之名大僕其長也疏曰在此者凡言僕御者是武衛之事隸僕下士二人府一人史二人胥四人徒四十人注曰此吏而曰隸以其事褻辨師下士二人工四人史二人徒四人注曰辨者古冠之大稱委貌緇布曰冠辨皮彥反稱尺證反司甲下大夫二人中士八人府四人史八人胥八人徒八十人注曰甲今之鎧也司甲兵戈盾官之長司兵中士四人府二人史四人胥二人徒二十人司戈盾下士二人府一人史二人徒四人注曰戈今時句孑戟句古侯反孑音結司弓矢下大夫二人中士八人府四人史八人胥八人徒八十人注曰司弓矢弓弩矢箙官之長繕人上士二人下士四人府一人史二人胥二人徒二十人注曰繕之言徑也善也稿人中士四人府二人史四人胥二人徒二十人注曰鄭司農云稿讀為芻稿之稿箭幹謂之稿此官主弓弩箭矢故謂之稿人箙音服戎右中大夫二人上士二人注曰右者參乘此充戎路之右田獵亦為之右焉疏曰案巾車玉路居前戎路在後此右在前官又尊者夏官主事尚威武故戎右居前使官尊也齊右下大夫二人注曰充玉路金路之右道右上士二人注曰充象路之右李子華曰自戎右而下止説大夫士而無府史胥徒等人似是臨時取之司右無特置也大馭中大夫二人注曰馭之最尊戎僕中大夫二人注曰馭言僕者此亦侍御於車齊僕下大夫二人注曰古者王將朝覲會同必齊所以敬宗廟及神明道僕上士十有二人注曰王朝朝暮夕主御王以與諸臣行先王之道疏曰朝夕在朝往來駕稅難而且煩故人最多田僕上士十有二人疏曰人亦多者王有四時之田兼有園囿遊獵及取鮮獸之等亦事煩故也馭夫中士二十人下士四十人疏曰按校人良馬三十六匹一馭夫計良二千一百六十匹則六十馭夫又駑一馭夫主四百三十二匹駑千二百九十六匹則馭夫三人并前六十三人與此不合者蓋此序官脫三人也朝覲王朝在朝俱直遙反朝暮朝夕俱如字校人中大夫二人上士四人下士十有六人府四人史八人胥八人徒八十人注曰校之為言校也主馬者必仍校視之校人馬官之長薛平仲曰自戎右至馭夫凡九職掌五路之車自校人至圉人凡七職掌五路之馬先王時國馬足以共軍公馬足以稱賦周制六軍所謂馬牛車輦者皆因嵗時以數之若校人而下所謂頒馬者非分頒於民頒之卿大夫之從軍旅也趣馬下士皂一人徒四人注曰趣馬趣養者也鄭司農説以詩曰蹶維趣馬巫馬下士二人醫四人府一人史二人賈二人徒二十人注曰巫馬知馬祖先牧馬社馬步之神者馬疾若有犯焉則知之是以使與醫同職疏曰有賈者治馬死生須知馬價故有賈人牧師下士四人胥四人徒四十人注曰主牧放馬而養之鄭剛中曰地官有牧人掌牧六牲則馬亦在牧又有牧師者蓋牧人所牧以共祭祀之牲牷非以備駕車之用此牧師正掌牧馬之地不與牧人之官相通廋人下士間二人史二人徒二十人注曰廋之言數圉師乘一人徒二人圉人良馬匹一人駑馬麗一人注曰養馬曰圉四馬為乘良善也麗耦也校户教反趣清須反皂才早反廋所求反職方氏中大夫四人下大夫八人中士十有六人府四人史十有六人胥十有六人徒百有六十人注曰職主也主四方之職貢者職方氏主四方官之長疏曰在此者司馬主九畿職方制其貢事相成故在此陳君舉曰職方掌天下之圖而隸司馬者謹之也戰國䇿士每言窺周室則可案圖籍以爭天下故蕭何入秦獨收圖籍以此自漢守之司空寖以世布當時如江都淮南諸王皆案輿地謀變而王鳳亦云大史公書有地形厄塞不宜在諸侯王然則古圖志雖司徒掌之而藏在司馬祕不得見先王所以弭姦消患者其慮逺哉土方氏上士五人下士十人府二人史五人胥五人徒五十人注曰土方氏主四方邦國之土地懷方氏中士八人府四人史四人胥四人徒四十人注曰懷來也主來四方之民及其物合方氏中士八人府四人史四人胥四人徒四十人注曰合方氏主合同四方之事訓方氏中士四人府四人史四人胥四人徒四十人注曰訓道也主教道四方之民形方氏中士四人府四人史四人胥四人徒四十人注曰形方氏主制四方邦國之形體山師中士二人下士四人府二人史四人胥四人徒四十人疏曰案王制云名山大澤不以封故天子立山川之師以遙掌之使貢故與職方連類在此川師中士二人下士四人府二人史四人胥四人徒四十人邍師中士四人下士八人府四人史八人胥八人徒八十人注曰邍地之廣平者邍音原道音導匡人中士四人史四人徒八人注曰匡正也主正諸侯以法則撢人中士四人史四人徒八人注曰撢人主撢序王意以語天下李泰伯曰天下之情欲上達故訓方氏之職設人主之志欲下通故撢人之職設古者君民一體上下交孚而無壅遏之患如此撢音探語魚據反都司馬每都上士八人中士四人下士八人府二人史八人胥八人徒八十人注曰都王子弟所封及三公采地也司馬主其軍賦疏曰此王自以臣為司馬遙掌都內家司馬各使其臣以正於公司馬注曰家卿大夫采地正猶聽也公司馬國司馬也卿大夫之采地王不特置司馬各自使其家臣為司馬主其地之軍賦往聽政於王之司馬王之司馬其以王命來有事則曰國司馬周禮述注卷十七
