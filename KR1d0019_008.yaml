body:
  text: 周禮述註卷八安溪李光坡撰鄉師之職各掌其所治鄉之教而聽其治疏曰聴其治者自鄉大夫以下至伍長各自聴斷其民今鄉師又聴其治者恐鄉官有濫失平察之以國比之灋以時稽其夫家衆寡辨其老幼貴賤廢疾馬牛之物辨其可任者與其施舍者掌其戒令糾禁聴其獄訟國比之灋即小司徒之九比也可任者即上地家三人之類施舍謂免役即上廢疾老幼者是也凡所戒令糾禁者亦小司徒祭祀飲食喪紀之類也獄訟即小司徒祭祀飲食喪紀之類也獄訟即小司徒民訟地訟與大役則帥民徒而至治其政令既役則受州里之役要以攷司空之辟以逆其役事註曰而至至作部曲也既已也役要所遣民徒之數辟功作章程逆猶鈎攷也鄭司農云辟灋也疏曰大役者謂築作隄防城郭等役凡邦事令作秩叙邦事凡有營作征行之事皆是也秩常食也叙功次也凡功作之事其食之多少功之次叙皆令監督者計而作之則無冗食無相冒也辟必益反大祭祀羞其牲共茅蒩註曰鄭大夫讀蒩為藉謂祭前藉也𤣥謂蒩士虞禮所謂刌茅長五寸束之者是也祝設于几東席上命佐食取黍稷祭于苴三取膚祭祭如初此所以承祭既祭蓋束而去之守祧職云既祭藏其隋是與疏曰案甸師共蕭茅彼直共茅與此鄉師鄉師得茅束而切之長五寸立之祭前以藉祭故云茅蒩也蒩子餘反刌音忖苴子都反祧他彫反隋相恚反與音餘大軍旅㑹同正治其徒役與其輂輦戮其犯命者註曰輂駕馬輦人輓行所以載任器也止以為蕃營司馬灋曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一斤一鑿一梩一鋤周輦加二版二築又曰夏后氏二十人而輦殷十八人而輦周十五人而輦疏曰正治其徒役者六軍之外别有民徒使役皆出於鄉故鄉師治之輂音匊輓音晚梩里其反大喪用役則帥其民而至遂治之註曰治謂監督其事疏曰大喪用役謂若喪時輓六引之等及葬執纛以與匠師御匶而治役註曰匠師事官之屬其於司空若鄉師之於司徒也鄉師主役匠師主衆匠共主葬引雜記曰升正柩諸侯執綍五百人四綍皆銜枚司馬執鐸左八人右八人匠人執翿以御柩天子六引禮依此云鄭司農云翿羽葆幢也爾雅曰纛翳也以指揮輓柩之役正其行列進退及窆執斧以涖匠師註曰匠師主豐碑之事執斧以涖之使戒其事鄭司農云窆謂葬下棺也春秋傳曰日中而塴禮記所謂封者涖謂臨視也纛音道匶音舊綍音弗翿音桃幢直江反行户剛反下行列同塴補鄧反封彼騐反凡四時之田前期出田灋于州里簡其鼔鐸旗物兵器修其卒伍註曰田灋人徒及所當有及期以司徒之大旗致衆庶而陳之以旗物辨鄉邑而治其政令刑禁巡其前後之屯而戮其犯命者斷其爭禽之訟司徒致衆庶以熊虎之旗此又以之眀為司徒致之大夫致衆當以鳥隼之旟陳之謂表正其行列辨别異也鄉邑者田時非直六鄉之衆亦有公邑之民各有部曲以其所執旗物别異之前後之屯車徒異部也兵衆屯聚各有車徒各於前後而巡行之黄文叔曰致衆庶而陳之句絶旟音餘凡四時之徴令有常者以木鐸徇於市朝註曰徵令有常者謂田狩及正月命修封疆二月命雷且𤼵聲以嵗時巡國及野而賙萬民之囏阨以王命施恵註曰嵗時者隨其事之時不必四時也囏阨饑乏也鄭司農云賙讀周急之周朝直遙反囏古艱字嵗終則攷六鄉之治以詔廢置正嵗稽其鄉器比其吉凶二服閭共祭器族共喪器黨共射器州共賓器鄉共吉凶禮樂之器註曰吉服者祭服也凶服者弔服也比長主集為之祭器者簠簋鼎爼之屬閭胥主集為之喪器者夷槃素俎楬豆輁軸之屬族師主集為之此三者民所以相共也射器者弓矢楅中之屬黨正主集為之為州長或時射於此黨也賓器者尊俎笙瑟之屬州長主集為之為鄉大夫或時賓賢能於此州也吉器若閭祭器者也凶器若族喪器者也禮樂之器若州黨賓射之器者鄉大夫備集此四者為州黨族閭有故而不共也此鄉器者旁使相共則民無廢事上下相補則禮行而教成疏曰案載師職里布屋粟註云罰之以共吉凶二服及喪器鄭知必用罰物者以其不為官事眀其不用官物可知自射器已下皆為國行禮得官物所為不出民物若國大比則攷敎察辭稽器展事以詔誅賞上文嵗終攷治正嵗稽器此則大比之時鄭剛中曰攷敎則察其辭稽器則展其事設敎而辭不逆理制器而事不廢常是守職而可賞者也敎灋頒於上而為非聖之言器用制於鄉而有不舉之禮是曠職而可誅者也故以詔誅賞又不特詔廢置而已輁九勇反楅音福鄉大夫之職各掌其鄉之政教禁令註曰鄭司農云萬二千五百家為鄉正月之吉受敎灋于司徒退而頒之于其鄉吏使各以敎其所治以攷其徳行察其道藝註曰其鄉吏州長以下王介甫曰攷攷知其實偽察見其精觕朱子曰古人學校敎養徳行道藝宿衞征伐師旅田役皆只是一項事行下孟反以嵗時登其夫家之衆寡辨其可任者國中自七尺以及六十野自六尺以及六十有五皆征之其舎者國中貴者賢者能者服公事者老者疾者皆舍以嵗時入其書註曰登成也定也國中城郭中也晚征而早免之以其所居復多役少野早征而晚免之以其復少役多鄭司農云征之者給公上事也舍者謂有復除舍不收役事也貴者謂若今宗室及關内侯皆復也服公事者謂若今吏有復除也老者謂若今八十九十復羡卒也疾者謂若今癃不可事者復之𤣥謂入其書者言於大司徒坡謂郊門以内通謂之國中七尺謂謂年二十也六尺謂年十五也征之者力役之征也疏亦云所征稅者謂築作挽引道渠之役鄭解冢宰九賦引此征為口率出泉今闕之復音福三年則大比攷其徳行道藝而興賢者能者鄉老及鄉大夫帥其吏與其衆寡以禮禮賓之註曰賢者有徳行者能者有道藝者衆寡謂鄉人之善者無多少也鄭司農云興賢者謂若今舉孝廉興能者謂若今舉茂才賓敬也敬所舉賢者能者𤣥謂變舉言興者謂合衆而尊寵之以鄉飲酒之禮禮而賓之朱子曰道藝是能者盖曉得許多事物之理所以屬能厥眀鄉老及鄉大夫羣吏獻賢能之書于王王再拜受之登于天府内史貳之註曰厥其也其賓之眀日也獻猶進也王拜受之重得賢者王上其書於天府天府掌祖廟之寶藏者内史副冩其書者當詔王爵祿之時疏曰賢能之書亦是寶物故藏於天府退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞以用也以鄉射之禮者州長春秋二時習射於序名為鄉射今鄉大夫還用此鄉射之禮詢謀也問於衆庶寧復有賢能者盖當射之時民必觀焉因詢之也和内志正也容外體直也主皮中也和容容體比於禮也興舞其節比於樂也疏曰退者謂獻賢能之書於王退來鄉内此謂使民興賢出使長之使民興能入使治之註曰言是乃所謂使民自舉賢者因出之而使之長民敎以徳行道藝於外也使民自舉能者因入之而使之治民之貢賦田役之事於内也言為政以順民為本也書曰天聰眀自我民聰眀天眀威自我民眀威老子曰聖人無常心以百姓心為心如是則古今未有遺民而可為治行下孟反長丁丈反藏才浪反中去聲嵗終則令六鄉之吏皆㑹政致事正嵗令羣吏攷灋于司徒以退各憲之於其所治之國坡謂上文正月所受曰教灋専指敎而言之此所攷曰灋則小司徒所云征役弛舍祭祀飲食喪紀之禁令皆在焉㑹古外反憲音懸舎上聲大詢于衆庶則各帥其鄉之衆寡而致于朝註曰大詢者詢國危詢國遷詢立君鄭司農云大詢于衆庶洪範所謂謀及庶民疏曰朝謂外朝三槐九棘之所國有大故則令民各守其閭以待政令疏曰大故謂災變冦戎之等警急須人故使民皆聚於閭胥所治處以待國之政令以旌節輔令則達之註曰民雖以徴令行其將之者無節則不得通疏曰國有大故恐有姦寇故爾州長各掌其州之敎治政令之法註曰鄭司農云二千五百家為州正月之吉各屬其州之民而讀灋以攷其徳行道藝而勸之以糾其過惡而戒之註曰屬猶合也聚也因聚衆而勸戒之者欲其善坡謂所讀之灋即鄉之三物八刑之等也故繼之以攷其徳行道藝而勸之糾其過惡而戒之意自眀矣若以嵗時祭祀州社則屬其民而讀灋亦如之春秋以禮㑹民而射于州序註曰序州黨之學也㑹民而射所以正其志也射義曰射之為言繹也繹者各繹已之志疏曰上云嵗時皆謂嵗之四時此云嵗時惟有嵗之二時春秋耳春祭社以祈膏雨望五穀豐熟秋祭社者以百穀豐稔所以報功故云祭祀州社也春秋以禮㑹民而射于州序者州長因春秋二時皆以禮㑹聚其民而行射禮于州之序學中言以禮者亦謂先行鄉飲酒之禮乃射也屬音燭凡州之大祭祀大喪皆涖其事註曰大祭祀謂州社稷大喪鄉老鄉大夫於是卒者也涖臨也若國作民而師田行役之事則帥而致之掌其戒令與其賞罰註曰致之致之於司徒也掌其戒令賞罰則是於軍因為師帥疏曰師謂征伐田謂田獵行謂巡狩役謂役作嵗終則㑹其州之政令正嵗則讀敎灋如初註曰雖以正月讀之至正嵗猶復讀之因此四時之正重申之鄭剛中曰觀如初之言則知上正月所讀者純於敎灋三年大比則大攷州里以贊鄉大夫廢興註曰廢興所廢退所興進也鄭司農云贊助也史直翁曰不曰誅賞而曰廢興者鄉大夫之教民興賢能廢愚不肖而已至於誅賞則大司徒王之事也黨正各掌其黨之政令敎治註曰鄭司農云五百家為黨及四時之孟月吉日則屬民而讀邦灋以糾戒之註曰以四孟之月朔日讀灋者彌親民者於教亦彌數坡謂州長曰灋此曰邦灋則不止於教也凡一年政令及十二敎皆兼之矣春秋祭禜亦如之註曰禜謂雩禜水旱之神盖亦為壇位如祭社稷云禜音詠數所角反國索鬼神而祭祀則以禮屬民而飲酒于序以正齒位一命齒于鄉里再命齒于父族三命而不齒註曰國索鬼神而祭祀謂嵗十二月大蜡之時建亥之月也正齒位者鄉飲酒義所謂六十者坐五十者立侍六十者三豆七十者四豆八十者五豆九十者六豆是也必正之者為民三時務農將闕於禮至此農隙而敎之尊長養老見孝弟之道也黨正飲酒禮亡以此事屬於鄉飲酒之義微失少矣凡射飲酒此鄉民雖為鄉大夫必來觀禮鄉飲酒鄉射記大夫樂作不入士既旅不入是也齒于鄉里者以年與衆賓相次也齒于父族者父族有為賓者以年與之相次異姓雖有老者居於其上不齒者席于尊東所謂遵疏曰黨正行正齒位之禮在十二月建亥之月為之非蜡祭之禮而此云國索鬼神而祭祀者以其正齒位禮在蜡月故言之以為節耳當正齒位之時民内有為一命以上必來觀禮故須言其坐之處一命齒於鄉里者此黨正是天子之國黨正則一命亦天子之臣若有一命之人來者即於堂下鄉里之中為齒也再命齒于父族者謂父族為賓即與之為齒年大在賓東年少在賓西三命而不齒者若有三命之人來縱令父族為賓亦不與之齒若非父族是異姓為賓灼然不齒位在賓東故云不齒也問若據黨正如此雖說鄉黨莫如齒到得爵尊後又不復序齒否朱子曰古人貴貴長長並行而不悖他雖說不序亦不相壓自别設一位如今之掛位然蜡仕詐反凡其黨之祭祀喪紀昏冠飲酒敎其禮事掌其禁戒註曰其黨之民疏曰此一經並是民之所行上州之祭祀大喪義異此祭祀已下雖是民之所行民者㝠也非敎不可故黨正皆敎其禮事也因掌其戒命督禁之冠古亂反凡作民而師田行役則以其灋治其政事註曰亦於軍因為旅帥嵗終則㑹其黨政帥其吏而致事疏曰帥族師以下之吏致其所掌之事於州長正嵗屬民讀灋而書其徳行道藝疏曰三年乃一貢今毎年正嵗皆書記勸勉之三年即貢之也坡謂上讀法則糾戒之此書灋則書其徳行道藝禮既異數是正月與正嵗儼然異時而不可以正嵗即正月眀矣以嵗時涖校比註曰涖臨也鄭司農云校比族師職所謂以時屬民而校登其族之夫家衆寡辨其貴賤老幼廢疾可任者及其六畜車輦如今時小案比疏曰嵗時嵗之四時及大比亦如之族師各掌其族之戒令政事註曰政事邦政之事鄭司農云百家為族月吉則屬民而讀邦灋書其孝弟睦婣有學者註曰月吉毎月朔日也故書上句或無事字杜子春云當為正月吉書亦或為戒令政事月吉則屬民而讀邦灋疏曰有學即六藝也春秋祭酺亦如之註曰酺者為人物烖害之神也故書酺或為步杜子春云當為酺𤣥謂校人職又有冬祭馬步則未知此世所云蝝螟之酺與人鬼之步與蓋亦為壇位如雩禜云族長無飲酒之禮因祭酺而與其民以長幼相獻酬焉酺音步蝝悅全反螟覔經反以邦比之灋帥四閭之吏以時屬民而校登其族之夫家衆寡辨其貴賤老幼廢疾可任者及其六畜車輦四閭之吏閭胥比長也五家為比十家為聯五人為伍十人為聯四閭為族八閭為聯使之相保相受刑罰慶賞相及相共以受邦職以役國事以相葬埋邱氏曰既以伍灋比其居又以什灋聯其居覆云五人為伍十人為聯者眀軍灋自此出也相保是見居者則保之相受是新徙者則受之刑罰相及相共則惡者所同惡而無所比慶賞相及相共則善者所同好而無所蔽故聯比其民者所以歡洽其心也見音現同惡去聲若作民而師田行役則合其卒伍簡其兵器以鼓鐸旗物帥而至掌其治令戒禁刑罰註曰亦於軍因為卒長嵗終則㑹政致事閭胥各掌其閭之徴令註曰鄭司農云二十五家為閭疏曰徵令即下文嵗時以下之事是也以嵗時各數其閭之衆寡辨其施舍凡春秋之祭祀役政喪紀之數聚衆庶既比則讀灋書其敬敏任恤者註曰祭祀謂州社黨禜族酺也役田役也政若州射黨飲酒也喪紀大喪之事也四者及比皆㑹聚衆民因以讀灋以勅戒之疏曰喪紀王之喪也知者以其聚衆庶眀非上州之大喪黄氏曰數謂其事之有數者比謂因其叙而比之居則五家為比故讀灋亦使比而聽之以祭祀聚則讀祭祀之灋以役政聚則讀役政之灋以喪紀聚則讀喪紀之灋大抵州黨族各有灋則各以其時而讀之閭亦自有灋則因其聚而讀之王龜齡曰五家之比比有長初未有可書之事不過防其竒衺而已五比之閭則書其敬敏任恤是於六行之中可書者二四閭之族則書其孝弟睦婣是於六之中可書者四其於徳行道藝有所未備矣五族之黨書其徳行道藝然書之而未能攷之五黨之州又從而攷之攷之而未能賓興之五州之鄉於是而賓興之以見其人材之成也凡事掌其比觵撻罰之事註曰觵撻者失禮之罰也觵用酒其爵以兕角為之撻朴也故書或言觵撻之罰事杜子春云當言觵撻罰之事疏曰言凡非一則是鄉飲酒及鄉射飲酒有失禮者須罰之故云凡事掌其比者人聚則有校比之灋皆掌之觵古横反比長史直翁曰民之治自族黨州鄉為附庸為侯邦為天下其本則出於此欲治天下者必行比灋可也是故先王於此尤所加意雖合為六鄉綂為天下其灋亦必以此名之各掌其比之治王龜齡曰六鄉之吏周公命官之意其輕重皆一字間閭胥比長則於政教之事不使掌也初不過掌閭之徴令與比之治而已鄉大夫州長則詳於敎黨正族師則詳於政此政敎之所以異也禁令為上政令次之戒令又次之徴令為下比長則於令又非所掌也五家相受相和親有辠竒衺則相及疏曰相受者宅舍有故崩壞相寄託相和親者五家之内有不和親則使之自相和親有辠惡則相及者欲使不犯徙于國中及郊則從而授之徙謂不便其居也古者三嵗大比之年民有願厭於本居之處不便則任其遷徙或國中之民出徙郊或郊民入徙國中比長皆從而付所處之吏眀無罪惡若徙于他則為之旌節而行之註曰徙于他謂出居異鄉也授之者有節乃達若無授無節則唯圜土内之註曰鄉中無授出鄉無節過所則呵問繫之圜土攷辟之也圜土者獄城也獄必圜者規主仁以仁心求其情古之治獄閔於出之内音納呵呼何反辟音壁封人掌設王之社壝為畿封而樹之註曰壝謂壇及堳埓也畿上有封若今時界矣疏曰直言壝不云壇舉外以見内内有壇可知也鄭剛中曰小宗伯建國之神位右社稷左宗廟則天子之制有社而稷從之自漢以來謂之大社大稷若夫王者自為立社四方各以其色之土上冒以黄眀為天子之有土是為土示而稷無與焉封人所設之社壝謂地兹所以不立稷也示音祗凡封國設其社稷之壝封其四疆疏曰設其社稷之壝者案禹貢徐州貢五色土孔註云王者封五色土為社建諸侯則各割其方色土與之使立社燾以黄土苴以白茅茅取其潔黄取王者覆四方是封乎諸侯立社稷之灋也陳氏曰祭社必及稷以其同功均利以養人祭必有配而社配以勾龍稷配以柱商時又易柱以棄其功利足以侔社稷王與諸侯皆三社三稷其位則中門之右社主陰故也其位則北面社向陰故也其飾則不屋記所謂必受霜露風雨以達天地之氣是也其表則木𫝊所謂松栢栗是也其主則用石為之其列則社東而稷西先王之制社稷春有祈歌載芟秋有報歌良耜孟冬大割祠此祭之常也凡天地大烖之類祭大故大烖之彌祀君行有宜宮成有衈此祭之不常者也祭之常者用甲其他則惟吉而已祭之牲以太牢其遇天災則用幣而已考之於禮王之祭南面其服希冕其牲用黝其祭血祭其罇大罍其樂應鍾其舞帗舞其鼓靈鼓凡此皆因禮樂以致其義造都邑之封域者亦如之疏曰都邑者謂大都小都家邑三等采地亦如之者亦如上諸侯有四疆也唐氏曰如是則内諸侯之制與外諸侯同也芟師參反衈音二帗音拂令社稷之職註曰将祭之時令諸有職事於社稷者也郊特牲曰惟為社事單出里唯為社田國人畢出唯為社邱乗共粢乘所以報本反始也史直翁曰大司徒設屬所以教民者已備然後得以立社稷之壇壝奉其牲牢所謂先成民而後致力於神曷先社稷盖國家當以土地為重孟子言諸侯之寶三必以土地居首記亦曰家主中霤國主社凡祭祀飾其牛牲設其楅衡置其絼共其水稾註曰飾謂刷治潔清之也鄭司農云絼著牛鼻繩所以牽牛者今時謂之雉與古者名同皆謂夕牲時也𤣥謂楅設於角衡設於鼻如椵狀也水藳給殺時洗薦牲也絼字當以豸為聲疏曰言凡祭祀謂王之天地宗廟先大次小之祭祀非一故云凡以廣之歌舞牲及毛炮之豚註曰謂君牽牲入時隨歌舞之言其肥香以歆神也毛炮豚者爓去其毛而炮之以備八珍鄭司農云封人主歌舞其牲云博碩肥腯絼音雉炮薄交反著直畧反椵音加爓似鹽反腯徒忍反凡喪紀賓客軍旅大􅉀則飾其牛牲註曰大􅉀㑹同之􅉀疏曰王之喪紀有牲者除朝夕奠用脯醢以外大小斂朔月月半薦新奠祖奠大遣等皆有牲牢賓客有殺牲者唯據致飱及饔餼饗食皆有殺牲之事軍旅殺牲者謂饗獻軍吏大盟謂天子親往臨􅉀鼔人掌敎六鼓四金之音聲以節聲樂以和軍旅以正田役以鼓名官而兼敎金者金皆以鼔為主也單出曰聲雜比曰音音聲金鼓之音聲也五聲須鼓乃和故曰以節聲樂師克在和故言和田役欲正其行列故言正掌敎者凡有事於祭祀軍旅田役而用鼓皆敎之也敎為鼓而辨其聲用註曰辨聲用别其聲所用之事鄭剛中曰上言敎擊鼓之灋此言敎為鼓而用之之灋然則敎為鼓者敎䩵人為之以雷鼓鼓神祀註曰雷鼓八面鼓也神祀祀天神也以靈鼓鼓社祭註曰靈鼓六面鼓也社祭祭地祗也以路鼓鼓鬼享註曰路鼓四面鼓也鬼享享宗廟也坡謂雷天物有聲祀神之鼓象其聲因取其名故曰雷大戴禮云陽氣為精陰氣為靈故示祭之鼓名靈路大也王之寢曰路寢門曰路門車曰路車皆為大意故鬼享之鼓名路耳八面六面之等恐難施用也以鼖鼓鼓軍事註曰大鼓謂之鼖鼖鼓長八尺以鼛鼓鼓役事註曰鼛鼓長丈二尺以晉鼓鼓金奏註曰晉鼓長六尺六寸金奏謂樂作擊編鐘疏曰作樂則先擊鐘故鐘師以鐘鼔奏九夏註云先擊鐘次擊鼓則是擊鐘後即擊鼓故曰以晉鼓鼓金奏以金錞和鼓註曰錞錞于也圜如碓頭大上小下樂作鳴之與鼓相和以金鐲節鼓註曰鐲鉦也形如小鐘軍行鳴之以為鼓節司馬職曰軍行鳴鐲以金鐃止鼓註曰鐃如鈴無舌有秉執而鳴之以止擊鼓司馬職曰鳴鐃且卻以金鐸通鼓註曰鐸大鈴也振之以通鼓司馬職曰司馬振鐸疏曰通鼓者兩司馬振鐸軍将已下即擊鼓故云通也鼖音焚鼛音羔錞音純鐲音濁鐃女交反䩵音運示音祗碓音對鉦音征凡祭祀百物之神鼓兵舞帗舞者註曰兵謂干戚也帗列五采繒為之有秉皆舞者所執疏曰鼔兵舞帗舞者天地之小神所舞不過此兵舞帗舞二事案下舞師山川用兵舞社稷用帗舞今此小神等若義近山川者舞兵舞義近社稷者舞帗舞故六舞之中唯言此二舞而已凡軍旅夜鼔鼜註曰鼜夜守戒鼓也司馬灋曰昏鼓四通為大鼜夜半三通為晨戒旦眀五通為𤼵昫疏曰鼜者聲同憂戚取軍中憂懼之意故名戒守鼓為鼜也晨昫之時當𤼵為𤼵昫軍動則鼓其衆疏曰㝷常在道欲行之時所擊之鼔則五通𤼵昫是也今别言軍動據將臨陳之時軍旅始動則擊鼓以作士衆之氣田役亦如之疏曰田獵圍合之時必擊鼓象對敵故大司馬職云鼓遂圍禁是也鼜音戚昫音煦救日月則詔王鼓註曰日月食王必親擊鼔者聲大異春秋傳曰非日月之眚不鼓大喪則詔大僕鼓註曰始崩及窆時也王光逺曰自雷鼓至通鼓則鼓人之所辨自凡祭祀至亦如之則鼓人之所鼓自救日月至太僕鼓則鼓人之所詔舞師掌敎兵舞帥而舞山川之祭祀敎帗舞帥而舞社稷之祭祀敎羽舞帥而舞四方之祭祀敎皇舞帥而舞旱暵之事教敎舞徒也羽析白羽為之形如帗也四方坡謂小宗伯兆山川邱陵墳衍各因其方今山川既别言之則四方者乃邱陵墳衍原隰之等布在四方因方而祀之故曰四方之祭祀也皇析五采羽為之亦如帗旱暵之事謂雩也暵熱氣也凡祀各異其舞必有義今不可攷疏曰案春官樂師有六舞并有旄舞施于辟雍人舞施于宗廟此無此二者但卑者之子不得舞宗廟之酎祭祀之舞亦不得用卑者之子彼樂師敎國子故有二者此敎野人故無旄舞人舞凡野舞則皆敎之註曰野舞謂野人欲學舞者暵呼但反酎音宙凡小祭祀則不興舞興作也文王世子曰凡始立學者既興器用幣然後釋菜不舞不授器小祭祀不興舞者其此類與或曰子以四方為邱陵墳衍原隰亦有它據乎曰頗有之夏官山師掌山林川師掌川澤至邍師掌四方之地名而云辨其邱陵墳衍原隰之名則此三等之為四方曷疑邍音源牧人掌牧六牲而阜蕃其物以共祭祀之牲牷註曰六牲謂牛馬羊豕犬雞鄭司農云牷純也𤣥謂牷體完具疏曰物謂毛物五官各有牛人羊人犬人豕人之等擇取純毛物者以共牧人牧人又共與充人芻之三月以祭祀牷音全凡陽祀用騂牲毛之陰祀用黝牲毛之望祀各以其方色牲毛之坡謂陽祀祈穀於南郊及宗廟騂牲赤色毛之取純毛也陰祀大社也黝讀為幽幽黑也望祀兆五帝於四郊也大宗伯云蒼璧禮天黄琮禮地下云牲放其色則圜丘方丘無用騂牲黝牲者用騂牲惟祈穀於南郊用黝牲惟大社與宗伯又云青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方牲放其色望祀各以其方之色牲毛之者正謂此也郊社詳見宗伯黝讀幽放音倣凡時祀之牲必用牷物時祀四時所常祀天之時祀日月以下地之時祀五祀五嶽以下皆是也疏曰必用牷物者對上方色是隨其方色不用尨尨是雜色則此牷物者非方非雜雖不得隨方之色要於其身之中其物色須純其體須完不得雜也尨音龐凡外祭毁事用尨可也註曰外祭謂表貉及王行所過山川用事者尨謂雜色不純毁謂副辜候禳毁除殃咎之屬貉莫霸反副普逼反凡祭祀共其犧牲以授充人繫之註曰犧牲毛羽完具也授充人者當殊養之坡謂凡祭祀總上陽祀陰祀望祀時祀之等也凡牲不繫者共奉之註曰謂非時而祭祀者疏曰不繫者謂若上文凡外祭毁事用尨可也是非時而祭祀者也問陰祀註謂祭地北郊及社稷子不從何曰鄭以方丘祭崑崙北郊祭神州社稷為地之次祀然崑崙神州不見經𫝊而社稷經中多有以當地示言者坡於宗伯辨之詳矣曰望祀註謂嶽鎮四瀆不亦可乎曰嶽瀆各以其方之色牲不見於經而五方之帝牲如方色則宗伯載之安得棄經而任意曰子以四望為日月至雨師與地之四嶽四瀆胡不以解此望祀曰亦以經無因方用牲之文曰五帝何以言望祀曰或者方與望聲相近而誤讀望祀乃方祀之誤與然疑而未敢質矣示音祗牛人掌養國之公牛以待國之政令註曰公猶官也凡祭祀共其享牛求牛以授職人而芻之註曰享獻也獻神之牛謂所以祭者也求終也終事之牛謂所以繹者也宗廟有繹者孝子求神非一處職讀為樴樴謂之杙可以繫牛樴人者謂牧人充人與芻牲之芻牛人擇於公牛之中而以授養之職之式反註樴同杙餘式反凡賓客之事共其牢禮積膳之牛註曰牢禮飱饔也積所以給賓客之用若司儀職曰主國五積者也膳所以間禮賓客若掌客云殷膳大牢積于賜反饗食賓射共其膳羞之牛註曰羞進也所進賓之膳燕禮小臣請執幕者與膳羞者至獻賓而膳宰設折俎王之膳羞亦猶此疏曰饗食有牛俎至於射禮天子諸侯皆先行燕禮其牲猶得有牛者但天子諸侯雖用燕禮直取一獻之禮未旅而行射節其用牲則左傳云公當饗雖然燕禮亦用牛與饗同若然云膳羞則庶羞也不言正爼之牛者據庶羞而言其實兼正爼矣食音嗣軍事共其犒牛註曰鄭司農云犒師之牛喪事共其奠牛註曰謂殷奠遣奠也喪所薦饋曰奠疏曰喪中自未葬以前無尸飲食直奠停置于神前故謂之為奠朝夕之奠無尊卑皆脯醢而已無牲體唯有小斂大斂朔月月半薦新祖奠及遣奠時有牲體遣奠非直牛亦有馬牲凡㑹同軍旅行役共其兵車之牛與其牽徬以載公任器註曰牽徬在轅外輓牛也人御之居其前曰牽居其旁曰徬任猶用也疏曰會同軍旅兼言行役謂王行巡守皆六軍從也共其兵車之牛者但兵車駕四馬之外别有兩轅駕牛以載任器者亦謂之為兵車故云兵車之牛也徬旁去聲凡祭祀共其牛牲之互與其盆簝以待事註曰鄭司農云互謂楅衡之屬盆簝皆器名盆所以盛血簝受肉籠也𤣥謂互若今屠家縣肉格史直翁曰觀周官牛人所共非祭祀則賓客燕享軍旅初非為食用禮曰天子無故不殺牛所謂故其祭祀之時與簝音尞盛音成縣音懸充人掌繫祭祀之牷牲祀五帝則繫于牢芻之三月註曰牢閑也必有閑者防禽獸觸齧養牛羊曰芻三月一時節氣成疏曰上云掌繫祭祀之牲牷則總養天地宗廟之牲下别言祀五帝則畧舉五帝而已其實昊天及地祗與四望社稷之等外神皆繫之也享先王亦如之凡散祭祀之牲繫于國門使養之註曰散祭祀謂司中司命山川之屬國門謂城門司門之官鄭司農云使養之使守門者養之疏曰散祭之牲直言繫于國門使養之不言三月則或一旬之内而已不必三月也案楚昭王問于觀射父曰芻豢幾何對曰逺不過三月近不過浹日註曰逺牛豕羊近犬雞之屬則諸侯祭祀養牲亦得三月及旬則天子亦有浹日之義若然此散祭祀亦可浹日而已展牲則告牷王光逺曰肆師言祭祀展犧牲則展牲者肆師也充人告牷而已坡謂展牲亦兼祭義所云朔月月半君巡牲是也穀梁子郊牛日展觓角而知傷可見矣告牷告以完具無傷也碩牲則贊王光逺曰碩大也所以告其體之充若左傳奉牲以告曰博碩肥腯是已蓋君牽牲宗人告碩而充人則贊之饋食之禮宗人視牲告充則碩牲為贊宗人眀矣觓音虯周禮述註卷八
