body:
  text: 周禮述注卷六安溪李光坡撰地官司徒第二坡聞之兄曰地者民也司徒所司者民之事故曰地官徒衆也即民也司徒掌乂民之食擾民之性所謂盡制度品節之詳極裁成輔相之道也惟王建國辨方正位體國經野設官分職以為民極乃立地官司徒使帥其屬而掌邦教以佐王安擾邦國注曰教所以親百姓訓五品有虞氏五而周十有二焉擾亦安也言饒衍之教官之屬大司徒卿一人小司徒中大夫二人鄉師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人注曰師長也司徒掌六鄉鄉師分而治之二人者共三鄉之事相左右也鄉老二鄉則公一人鄉大夫每鄉卿一人州長每州中大夫一人黨正每黨下大夫一人族師每族上士一人閭胥每閭中士一人比長五家下士一人注曰老尊稱也王置六鄉則公有三人也三公者內與王論道中參六官之事外與六鄉之教其要為民是以屬之鄉焉州黨族閭比鄉之屬别正師胥皆長也正之言政也師之言帥也胥有才知之稱載師職曰以官田牛田賞田牧田任逺郊之地司勳職曰掌六鄉之賞地六鄉地在逺郊之內則居四同鄭司農云百里內為六鄉外為六遂何氏曰鄉遂雖有官而非在職之選也何以明之一鄉不過萬二千五百家比長以下士為之一鄉則二千五百下士矣閭胥以中士為之一鄉則五百中士矣族師以上士為之一鄉則一百二十五上士矣黨正以下大夫一鄉則有二十五下大夫也州長中大夫一鄉又有五中大夫也而鄉大夫則卿之秩也合一鄉之官巳有三千一百五十五人矣六鄉不過七萬五千家而官則有一萬八千餘也又以祿言之下士視上農祿食九人是五家則官賦一上家之食也中士倍下士祿食十八人是二十五家而復賦七上家之食也上士倍中士祿食三十六人是百家復賦其三十二上家之食也推此言之積而至于一鄉又積而至于畿內又以共朝廷之百需又以共王之九賦是在官之祿反倍于在民之耕則服南畝者其家皆不衣不食悉以共上猶為不足矣蓋考司徒之職設官府以治鄉遂者惟鄉師遂師以治六鄉六遂載師閭師則居鄉遂之中縣師則居于都鄙而専治焉故鄉遂之中惟此四官各有府史胥徒為操刑政之權以治民事之正官自鄉大夫至比長自遂大夫至鄰長無官府之設無府史胥徒之役皆鄉遂之民使為保伍使相教治異其爵秩别其貴賤謂之教官謂之鄉吏不操刑政之權者也然則其祿何如比長雖統五家即上農也閭胥受二家之田也為二十五家之長族師雖統百家亦受四家之田又有士田以益之也此皆農人之中德行才能足兼五人二十五人百人之上者為其田以處之為其秩以等之所謂下士即上農中士倍之上士又倍者亦合其子弟授之士田令其自耕以共一家之衣食耳固不如在職之上中下士食民賦稅以為治也黨正州長鄉大夫則已嘗為大夫者其家既受田矣别有宅田士田以賦其祿或又有賞田以益之乎賢者以次而升不賢者以次而降升者加其爵秩益其田祿降者下之減之此小司徒所以考屬官之治而誅賞鄉師考六鄉之治以詔廢置以詔誅賞是也比毗志反與音預封人中士四人下士八人府二人史四人胥六人徒六十人注曰聚土曰封謂壝堳埒及小封疆也疏曰封人與大司徒設社稷之壝相左右故在地官為職首胥徒多者以畿封事廣故也鼓人中士六人府二人史二人徒二十人舞師下士二人胥四人舞徒四十人注曰舞徒給繇役能舞者以為之坡謂鼓人舞師二職在此無屬當在春官鏄師之下韎師之上牧人下士六人府一人史二人徒六十人注曰牧人養牲于田野者牛人中士二人下士四人府二人史四人胥二十人徒二百人注曰主牧公家之牛者詩云誰謂爾無牛九十其犉犉者九十其餘多矣充人下士二人史二人胥四人徒四十人注曰充猶肥也養繫牲而肥之堳音眉埒音劣繇音遙鏄音博犉而純反音眴或問移鼓人舞師二官何也曰太師所掌之樂鐘磬笙鎛莫不有師若鼓者五聲不得不和安無専職今以次之鎛師職下則金奏鼓鼜之掌適與相類而且其官皆中士也韎樂散樂夷樂猶設韎師旄人以教豈山川等祀之舞舞之正者而獨缺此今以首之韎師職上則教舞之掌適與相類而且其官皆下士也況乎上封人之職有掌祭祀諸禮牛牲與牧人牛人充人諸官為類間此二職實為錯綜舉而歸之各得其從庶或可歟鼜音戚載師上士二人中士四人府二人史四人胥六人徒六十人注曰載之言事也事民而稅之載師者閭師縣師遺人均人官之長閭師中士二人史二人徒二十人注曰鄉官有州黨族閭比正言閭者徴民之稅宜督其親民者凡其賦貢入大府穀入倉人縣師上士二人中士四人府二人史四人胥八人徒八十人注曰主天下土地人民已下之數徴野賦貢也名曰縣師者自六鄉以至邦國縣居中焉鄭司農云四百里曰縣坡謂載師徴九賦者閭師徴九貢者縣師徴野之賦所以左右載師也徴野之貢者閭師惟掌鄉貢故縣師職野焉遺人中士二人下士四人府二人史四人胥四人徒四十人注曰遺謂以物有所饋遺均人中士二人下士四人府二人史四人胥四人徒四十人注曰均猶平也主平土地之力政者薛平仲曰取之于民而不知所以豫之則施報之義乖豫之于民而不知所以均之則公平之義泯遺人在此者所以示施報之義均人繼之者所以示公平之義師氏中大夫一人上士二人府二人史二人胥十有二人徒百有二十人注曰師教人以道者之稱也保氏司諫司救官之長陳及之曰徒百二十人者蓋居虎門之左司王朝帥四夷之隸守王門其徒不得不多也程子曰古者自天子達于庶人必須師氏以成其德業故舜禹文武之聖亦皆有所從學後世師傅之職不修友臣之義未著所以尊德樂道之風未成於天下保氏下大夫一人中士二人府二人史二人胥六人徒六十人注曰保安也以道安人者也司諫中士二人史二人徒二十人注曰諫猶正也以道正人行邱氏曰司諫即今之提學官將以扶植正學而維持公論者也司救中士二人史二人徒二十人注曰救猶禁也以禮防禁人之過者也鄭剛中曰王者處心自一身而達天下巳之德己成而無過亦欲天下之民有德行而無過惡為民設司諫猶已有詔媺之師為民設司救猶已有諫惡之保調人下士二人史二人徒十人注曰調猶和合也媒氏下士二人史二人徒十人注曰媒之言謀也謀合異類使和成者今齊人名麴􅨠曰媒王氏曰調人和難教睦媒氏陰禮教親故屬師保氏朝直遙反媺音美後同麴起六反􅨠魚列反難去聲司市下大夫二人上士四人中士八人下士十有六人府四人史八人胥十有二人徒百有二十人注曰司市市官之長薛平仲曰男女人之大欲存焉其次則財利之所交先王既為之設媒氏以遂人之大欲矣而就利之心容可不致其規畫哉故次以司市等官質人中士二人下士四人府二人史四人胥二人徒二十人注曰質平也主平定物價者廛人中士二人下士四人府二人史四人胥二人徒二十人注曰廛民居區域之稱胥師二十肆則一人皆二史賈師二十肆則一人皆二史司暴十肆則一人司稽五肆則一人胥二肆則一人肆長每肆則一人注曰自胥師以及司稽皆司市所自辟除也胥及肆長市中給繇役者胥師領羣胥賈師定物價司暴禁暴亂司稽察留連不時去者泉府上士四人中士八人下士十有六人府四人史八人賈八人徒八十人注曰鄭司農云故書泉或作錢賈音古暴音暴辟必亦反司門下大夫二人上士四人中士八人下士十有六人府二人史四人胥四人徒四十人每門下士二人府一人史二人徒四人注曰司門若今城門校尉主王城十二門疏曰以其掌貨賄與司市相連故在此司關上士二人中士四人府二人史四人胥八人徒八十人每關下士二人府一人史二人徒四人注曰關界上之門疏曰王畿千里王城在中面有五百里界首面置三關則亦十二關其職掌國貨之節以聨門市故在此掌節上士二人中士四人府二人史四人胥二人徒二十人注曰節猶信也行者所執之信疏曰節連于門市故亦連類在此遂人中大夫二人遂師下大夫四人上士八人中士十有六人旅下士三十有二人府四人史十有二人胥十有二人徒百有二十人注曰遂人主六遂若司徒之于六鄉也六遂之地自逺郊以達于畿中有公邑家邑小都大都焉鄭司農云遂謂王國百里外劉執中曰遂大夫各居其遂以施政教遂師則贊遂人居司徒之府以治六遂之政令猶鄉師贊小司徒居于內以治六鄉遂大夫每遂中大夫一人縣正每縣下大夫一人鄙師每鄙上士一人酇長每酇中士一人里宰每里下士一人鄰長五家則一人注曰縣鄙酇里鄰遂之屬别也旅師中士四人下士八人府二人史四人胥八人徒八十人注曰主斂縣師所徴野之賦穀者也旅猶處也六遂之官里宰之師也正用里宰者亦斂民之稅宜督其親民坡謂賦穀不入倉人而在此者倉人所謂餘法用是也稍人下士四人史二人徒十有二人注曰主為縣師令都鄙丘甸之政也距王城三百里曰稍家邑小都大都自稍以出焉委人中士二人下士四人府二人史四人徒四十人注曰主斂甸稍芻薪之賦以共委積者也土均上士二人中士四人下士八人府二人史四人胥四人徒四十人注曰均猶平也主平土地之政令者也酇作管反草人下士四人史二人徒十有二人注曰草除草稻人上士二人中士四人下士八人府二人史四人胥十人徒百人薛平仲曰均一之政既行則斯民之從事于耕稼者是雖有地利之難致且將為之致力所謂土化之法下地之稼孰不各興其事而使地之無遺利哉此固草人稻人列于土均之後也土訓中士二人下士四人史二人徒八人注曰訓謂能訓説土地善惡之勢誦訓中士二人下士四人史二人徒八人注曰能訓説四方所誦習及人所作為久時事薛平仲曰遂自草人稻人之官設而治地之事舉矣土訓之地圖誦訓之方志凡其載九州之所有土物之所生風氣之所宜於是乎為王訓之然後制其賦而各因其有施其教而不易其俗其所關蓋甚大也山虞每大山中士四人下士八人府二人史四人胥八人徒八十人中山下士六人史二人胥六人徒六十人小山下士二人史一人徒二十人注曰虞度也度知山之大小及所生者林衡每大林麓下士十有二人史四人胥十有二人徒百有二十人中林麓如中山之虞小林麓如小山之虞注曰衡平也平林麓之大小及所生者竹木生平地曰林山足曰麓疏曰胥徒多于山虞者以林麓在平地盜竊材木者多故須巡行者衆川衡每大川下士十有二人史四人胥十有二人徒百有二十人中川下士六人史二人胥六人徒六十人小川下士二人史一人徒二十人注曰川流水也禹貢曰九川滌源疏曰官及胥徒多者以其川路長逺巡行勞役故也易氏曰林衡正于山虞川衡正于澤虞然林列于山後川列于澤前者以山林川澤為序也澤虞每大澤大藪中士四人下士八人府二人史四人胥八人徒八十人中澤中藪如中川之衡小澤小藪如小川之衡注曰澤水所鍾也水希曰藪禹貢曰九澤既陂爾雅有八藪薛平仲曰山澤天地之藏財用之淵國家之所資者厚民生之所賴者衆如使括而歸之于上適以開斯民競利之心縱而委之于下重以啓斯民忘本之念是以為之虞以嚴其法為之衡以平其政使民知利之為可資而不知利之為可餌則土物愛而厥心臧皆教化也迹人中士四人下士八人史二人徒四十人注曰迹之言迹知禽獸處草人中士二人下士四人府二人史二人胥四人徒四十人注曰草之言礦也金玉未成器曰礦麓音祿草音礦虢猛反度徒洛反陂彼宜反藏才浪反角人下士二人府一人徒八人羽人下士二人府一人徒八人掌葛下士二人府一人史一人胥二人徒二十人掌染草下士二人府一人史二人徒八人注曰染草藍蒨象斗之屬掌炭下士二人史二人徒二十人掌荼下士二人府一人史一人徒二十人注曰荼茅莠掌蜃下士二人府一人史一人徒八人注曰蜃大蛤月令孟冬雉入大水為蜃囿人中士四人下士八人府二人胥八人徒八十人注曰囿今之苑場人每場下士二人府一人史一人徒二十人注曰場築地為墠季秋除圃中為之詩云九月築場圃十月納禾稼疏曰言每場者以其九穀别場故言每以殊之荼音徒蒨千見反墠音善廩人下大夫二人上士四人中士八人下士十有六人府八人史十有六人胥三十人徒三百人注曰藏米曰廩廩人舍人倉人司祿官之長舍人上士二人中士四人府二人史四人胥四人徒四十人注曰舍猶宫也主平宫中用穀者也倉人中士四人下士八人府二人史四人胥四人徒四十人司祿中士四人下士八人府二人史四人徒四十人注曰主班祿司稼下士八人史四人徒四十人注曰種穀曰稼如嫁女以有所生坡謂廪人倉人入之舍人司祿出之廪人將以歲之上下數邦用以節其斂發故次司稼舂人奄二人女舂抭二人奚五人注曰女舂抭女奴能舂與抭者抭抒臼也詩云或舂或抭饎人奄二人女饎八人奚四十人注曰鄭司農云饎人主炊官也特牲饋食禮曰主婦視饎爨故書饎作􅐪疏曰案其職凡祭祀共盛共王及后六食賓客共簠簋不在天官而在此者以其因舂人又因地道之成故在此稿人奄八人女稿每奄二人奚五人注曰鄭司農云稿讀為犒師之犒主冗食者故謂之犒舂書中反抭音由饎音熾稿注音犒同苦報反抒時女反􅐪饎同爨七亂反周禮述注卷六
