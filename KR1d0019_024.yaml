body:
  text: 周禮述註卷二十四安溪李光坡撰玉人之事王龜齡曰玉人一職與典瑞同但典瑞言其名以及其用玉人言其名而又及其所制之尺寸豈非玉人為之典瑞掌之乎然文經秦大非錯則闕不若典瑞之文為有倫理也鎮圭尺有二寸天子守之命圭九寸謂之桓圭公守之命圭七寸謂之信圭侯守之命圭七寸謂之躬圭伯守之註曰命圭者王所命之圭也朝覲執焉居則守之子守榖璧男守蒲璧不言之者闕耳故書或云命圭五寸謂之躬圭杜子春云當為七寸𤣥謂五寸者璧文之闕亂存焉信音身朝直遥反天子執冒四寸以朝諸侯註曰名玉曰冒者言徳能覆盖天下也四寸者方以尊接卑以小為貴趙氏曰冒所以冒諸侯圭以齊信瑞方四寸邪刻之盖冒圭之制邪刻其下以為驗其形則方正其大則四寸天子命臣為諸侯則班瑞玉與之使守之以為寶及其來朝則輯而合之以為驗故諸侯瑞圭則邪鋭其首天子冒圭則邪刻其下以邪鋭之圭首合天子之冒陳用之曰天子諸侯之玉用則執之居則守之或言守或言執相備也天子用全上公用龍侯用瓚伯用將註曰鄭司農云全純色也龍當為尨尨謂雜色𤣥謂全純玉也瓚讀為􅊡􅖸之􅖸龍瓚將皆雜名也卑者下尊以輕重為差玉多則重石多則輕公侯四玉一石伯子男三玉二石疏曰此經因天子以下執玉遂説尊卑之玉善惡不同繼子男執皮帛註曰謂公之孤也見禮次子男贄用束帛而以豹皮表之為飾天子之孤表帛以虎皮此説玉及皮帛者遂言見天子之用䞇疏曰此公之孤上不言子男而此云繼子男者以子男與伯同用三玉二石故空其文見子男與伯等以是得言以皮帛繼子男也龍莫江反瓚才旱反􅊡􅖸俱音饘天子圭中必註曰必讀如鹿車縪之縪謂以組約其中央為執之以備失隊疏曰案聘禮記五等諸侯及聘使所執圭璋皆有繅藉及絢組絢組所以約圭中央即此中必之類若然圭之中必尊卑皆有此不言諸侯圭舉上以明下可知縪音畢絢許縣反四圭尺有二寸以祀天註曰郊天所以禮其神也典瑞職曰四圭有邸以祀天旅上帝趙氏曰典瑞疏謂用一大玉琢出中央為璧形亦肉倍好孔四面琢出四圭各尺二寸與鎮圭同其璧為邸徑六寸總三尺與大圭三尺等皆一玉俱成兩圭祀地者亦然據此則四圭是就璧平出不是植立起者邸則於璧中琢成寓穴坡謂爾雅獸屬為寓寓穴獸窠也琢成寓穴非以注酒而何則坡於典瑞謂邸亦瓚類者信與邸丁禮反又音帝窠音科大圭長三尺杼上終葵首天子服之註曰王所搢大圭也或謂之珽終葵椎也為椎於其杼上明無所屈也杼閷也相玉書曰珽玉六寸明自照疏曰三尺圭上除六寸之下兩畔殺去之使已上為椎頭言六寸據上不殺者而言服之者以其搢於衣帶之間同於衣服故以服言之杼直吕反珽他頂反椎直追反閷色界反相色亮反土圭尺有五寸以致日以土地註曰致日度日景至不夏日至之景尺有五寸冬日至之景丈有三尺土猶度也建邦國以度其地而制其域度待洛反景音影祼圭尺有二寸有瓚以祀廟註曰祼之言灌也或作淉或作果祼謂始獻酌奠也瓚如盤其柄用圭有流前注疏曰鄭注小宰云唯人道宗廟有祼天地大神至尊不祼故此唯云以祀廟祼古亂反注淉果皆同琬圭九寸而繅以象徳註曰琬猶圜也諸侯有徳王命賜之使者執琬圭以致命焉繅藉也琬於阮反繅音早琰圭九寸判規以除慝以易行註曰凡圭琰上寸半琰圭琰半以上又半為瑑飾諸侯有為不義使者征之執以致命也除慝誅惡逆也易行去煩苛趙氏曰琰之為言剡也謂此圭剡一半至首為鋒芒取戈兵之象半則圓焉判言半也規言圓也半其圓而剡之故曰判規琰餘再反易音異行去聲璧羡度尺好三寸以為度註曰鄭司農云羡徑也好璧孔也爾雅曰肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環𤣥謂羡猶延其袤一尺而廣狹焉薛士龍曰璧員九寸好三寸延其袤為一尺旁各損半寸則廣八寸矣然則璧羡袤十寸廣八寸同謂之度尺以十寸之尺起度則十尺為丈十丈為引以八寸之尺起度則八尺為尋倍尋為常故鬴深十寸内方八寸而為嘉量幣長一尺八寸而為制幣凡此皆璧羡縱橫之尺數然也度必為璧以起之則圍三徑一之制又寓乎其中矣羡以善反瑗于眷反袤音茂圭璧五寸以祀日月星辰註曰禮其神也䟽曰圭璧謂以璧為邸旁有一圭璧琮九寸諸侯以享天子註曰享獻也聘禮享君以璧享夫人以琮疏曰此據上公九命若侯伯當七寸子男當五寸穀圭七寸天子以聘女註曰納徴加於束帛大璋中璋九寸邊璋七寸射四寸厚寸黃金勺青金外朱中鼻寸衡四寸有繅天子以巡守宗祝以前馬註曰射琰出者也勺杜子春云謂酒尊中勺也鄭司農云鼻謂勺龍頭鼻也衡謂勺柄龍頭也𤣥謂鼻勺流也凡流皆為龍口也衡古文橫假借字也衡謂勺徑也三璋之勺形如圭瓚天子巡守有事山川則用灌焉於大山川則用大璋加文飾也於中山川用中璋殺文飾也於小山川用邊璋半文飾也其祈沈以馬宗祝亦執勺以先之禮王過大山川則大祝用事焉將有事於四海山川則挍人飾黃駒疏曰三璋據為勺柄黃金勺已下據為勺頭大璋亦如之諸侯以聘女註曰亦納徴加於束帛也大璋者以大璋之文飾之也亦如之者如邊璋七寸射四寸陳用之曰以文攷之當繼天子以聘女之後亦如之者亦如穀圭之七寸盖聘女天子以圭諸侯以璋是為降殺之等若以繼邊璋之後則邊璋與黃金勺用以酌者聘女加於束帛非酌事禮安所用哉射食亦反下同勺上灼反殺色界反大祝音泰瑑圭璋八寸璧琮八寸以覜聘註曰瑑文飾也頫視也聘問也衆來曰頫特來曰聘聘禮曰凡四器者唯其所寶以聘可也疏曰此謂上公之臣執以頫聘用圭璋享用璧琮於天子及后也若两諸侯自相聘亦執之侯伯之臣宜六寸子男之臣宜四寸頫吐弔反牙璋中璋七寸射二寸厚寸以起軍旅以治兵守註曰二璋皆有鉏牙之飾於剡側先言牙璋有文飾也疏曰此與典瑞文同彼無中璋者以其大小等故不見也趙氏曰言軍旅則必有征誅之事也以治兵守則用兵守禦去處以此璋治之使不失其備不必有征誅之事也禮書引春秋宋司馬請瑞以命其徒攻桓氏杜預註曰瑞是符節發兵者此事甚親切在哀公十四年鉏側魚反駔琮五寸宗后以為權註曰駔讀為組以組繫之因名焉鄭司農云以為稱錘以起量駔音祖錘直偽反大琮十有二寸射四寸厚寸是謂内鎮宗后守之註曰如王之鎮圭也射其外鉏牙疏曰言大琮者對上駔琮五寸為大也言十有二寸者并角徑之為尺二寸言射四寸者據角各出二寸兩相并四寸云射其外鉏牙者據八角鋒故云鉏牙也駔琮七寸鼻寸有半寸天子以為權註曰鄭司農云以為權故有鼻也疏曰上后權不言鼻者舉以見后亦有鼻可知兩圭五寸有邸以祀地以旅四望註曰邸謂之柢有邸僢共本也柢音帝僢昌絹反瑑琮八寸諸侯以享夫人註曰獻於所朝聘君之夫人也疏曰五等諸侯朝天子享用璧琮不降瑞若自相享降瑞一等此八寸據上公侯伯當六寸子男用琥璜四寸經言諸侯正是朝註兼云聘者其臣聘瑑圭璋璧琮亦皆降一等與君寸數同也此經直言瑑琮不言瑑璧以享君文畧可知也案十有二寸棗㮚十有二列諸侯純九大夫純五夫人以勞諸侯註曰純猶皆也鄭司農云案玉案也夫人天子夫人𤣥謂案玉飾案也夫人王后也記時諸侯僭稱王而夫人之號不别是以同王后於夫人也玉案十有二為列王后勞朝諸侯皆九列聘大夫皆五列則十有二列者勞二王之後也棗㮚實於器乃加於案聘禮曰夫人使下大夫勞以二竹簠方𤣥被纁裏有盖其實棗烝㮚擇兼執之以進疏曰案十有二寸者謂十有二枚棗㮚十有二列者案案皆有棗㮚為列十有二者還據案十二為數不謂一案之上十有二也坡謂寸字或个字之誤不然或言每案之制高廣寸數有此勞力報反璋邸射素功以祀山川以致稍餼註曰邸射剡而出也致稍餼造賓客納廩食也鄭司農云素功無瑑飾也疏曰剡而出者向上謂之出半圭曰璋璋首邪郤之今於邪曲之處從下向上總邪郤之名為剡而出榔人闕雕人闕磬氏為磬倨句一矩有半註曰必先度一矩為句一矩為股而求其弦既而以一矩有半觸其弦則磬之倨句也磬之制有大小此假矩以定倨句非用其度耳疏曰樂云磬前長三律二尺七寸後長二律尺八寸是磬有大小之制也此經倨句各一矩并矩半假設言之及作磬非用此度自依律長短為之其博為一註曰博謂股博也博廣也股為二鼓為三參分其股博去一以為鼓博參分其鼓博以其一為之厚註曰鄭司農云股磬之上大者鼓其下小者所當擊者也𤣥謂股外面鼓内面也假令磬股廣四寸半者股長九寸也鼓廣三寸長尺三寸半厚一寸疏曰若定尺寸自當依律為長短以四寸半為灋者直取從此以下為易計非實灋也倨音據句音鉤先度待洛反已上則摩其旁註曰鄭司農云磬聲大上則摩鑢其旁𤣥謂大上聲清也薄而廣則濁疏曰凡樂器厚則聲清薄則聲濁今大上是聲清故摩使薄薄而廣則濁也已下則摩其耑註曰大下聲濁也短而厚則清疏曰此聲濁由薄薄不可使厚故摩使短短則形小形小則厚厚則聲清也耑音端大音泰鑢音慮矢人為矢鍭矢參分茀矢參分一在前二在後註曰參訂之而平者前有鐵重也司弓矢職茀當為殺鄭司農云一在前謂箭稾中鐵莖居三分殺一以前易彦祥曰三分其稾之三尺則一尺在前二尺在後以後二尺之重與一尺相等則稾前之鐵為極重矣故其發遲而近射用焉鍭音侯茀音拂殺色黠反兵矢田矢五分二在前三在後註曰鐵差短小也兵矢謂枉矢絜矢也此二矢亦可以田田矢謂矰矢易彦祥曰五分其稾之三尺則尺有二寸在前尺有八寸在後也以後尺有八寸之重而與前尺有二寸相等則稾前之鐵比殺矢盖短而小矣故其發逺而火射用焉絜音結矰音増殺矢七分三在前四在後註曰鐵又差短小也司弓矢職殺當為茀疏曰此經直言茀矢不言矰矢者以其與茀矢同制故畧而不言也易彦祥曰七分其稾之三尺則在前者尺有二寸七分寸之六在後者尺有七寸七分寸之一也以後七分之四與前七分之三相等則稾前之鐵比兵矢又短而小矣故其𤼵髙而弋射用焉至於恒矢庳矢前後皆四分而此不言者以其無所輕重故也參分其長而閷其一註曰矢稾長三尺殺其前一尺令趣鏃也五分其長而羽其一註曰羽者六寸以其笴厚為之羽深註曰笴讀為稾謂矢幹古文假借字厚之數未聞水之以辨其陰陽註曰辨猶正也陰沈而陽浮疏曰就其浮沈刻記之夾其陰陽以設其比夾其比以設其羽註曰夾其陰陽者弓矢比在稾兩旁努矢比在上下設羽於四角鄭司農云比謂括也坡謂比者箭受弦處也參分其羽以設其刃註曰刃二寸則雖有疾風亦弗之能憚矣註曰鄭司農云憚謂風不能驚憚也趙氏曰矢之之輕重羽刃相稱則其發不可禦矣雖有疾風亦不能驚憚其矢而使緩其勢也刃長寸圍寸鋌十之重三垸註曰刃長寸脱二字鋌一尺趙氏曰此言刃長寸而上文三分其羽以設其刃乃謂二寸意者一寸刃也二寸一半刃鏃一半刃根併而言之笴古老反夾古洽反比毗志反憚音怛又都達反鋌徒頂反垸音丸殺其前殺本又作閷色界反趣音促鏃子木反前弱則俛後弱則翔中弱則紆中强則揚羽豐則遲羽殺則趮註曰言幹羽之病使矢行不正俛低也翔迴顧也紆曲也揚飛也豐大也趮旁掉也鄭剛中曰上文言其灋此又言其不中灋之狀俛同俯趮音躁是故夾而摇之以眂其豐殺之節也註曰今人以指夾矢儛衛是也疏曰此言知矢之羽病狀橈之以眂其鴻殺之稱也註曰橈搦其幹疏曰此言知矢幹之病狀鴻即上文强是也殺即上文弱是也趙氏曰上是試羽下是試笴笴體欲相稱故於鴻殺言稱羽欲有節故於豐殺言節凡相笴欲生而摶同摶欲重同重節欲疏同疏欲㮚註曰相猶擇也生謂無瑕蠹也摶讀如摶黍之摶謂圜也鄭司農云欲㮚欲其色如㮚也橈乃孝反稱尺證反相息亮反摶徒丸反儛音舞搦尼革反陶人為甗實二鬴厚半寸脣寸註曰量六斗四升曰鬴鄭司農云甗無底甑趙氏曰甗必有物以為底如今甑以竹為箄之類厚半寸言其身脣寸言其口邊又厚也甗音彦鬴音輔箄音篦盆實二鬴厚半寸脣寸毛氏曰盆以盛物亦以為量荀子謂畝數盆盆步奔反甑實二鬴厚半寸脣寸七穿鄭剛中曰制與甗同異者有底其底七孔鬲實五觳厚半寸脣寸庾實二觳厚半寸脣寸註曰鄭司農云觳讀為斛觳受三斗聘記有斛𤣥謂豆實三而成觳則觳受斗二升庾讀如請益與之庾之庾坡謂甗博古圖云上若甑可以炊下若鬲可以飪盖兼二器而有之盆所以盛甑所以炊鬲鼎屬鬲音厯觳音斛下同旊人為簋實一觳崇尺厚半寸脣寸豆實三而成觳崇尺註曰崇髙也豆實四升疏曰祭宗廟皆用木簋今此用瓦簋據祭天地及外神尚質器用陶匏之類也旊方往反凡陶旊之事髺墾薜暴不入市註曰為其不任用也鄭司農云髺讀為刮薜讀為藥黃蘗之蘗暴讀為剥𤣥謂髺讀為跀墾頓傷也薜破裂也暴墳起不堅致也疏曰髺謂器不正欹邪者也髺音刮薜音蘗暴音剝跀音月墳扶粉反欹音崎器中膊豆中縣註曰膞讀如車輇之輇既拊泥而轉其均尌膊其側以擬度端其器也縣縣繩正豆之柄膞崇四尺方四寸註曰凡器髙於此則垺不能相勝厚於此則火氣不交疏曰方四寸謂垺拊四畔各一寸也趙氏曰中義謂上文止言崇尺何用四尺髙以為式不知膊者先王特為定則燒時為準凡髙下斜曲皆就四尺内忖度如今之木匠手持五尺則子起屋量一尺高升也是此則子量一二丈柱櫨也是此則子中義未之思爾中音仲膊市専反註輇同縣音懸尌音樹度待洛反垺芳符反勝音升櫨音盧梓人為筍虡註曰樂器所縣橫曰筍植曰虡鄭司農云筍讀為竹筍之筍筍息允反虡音巨縣音懸天下之大獸五脂者膏者臝者羽者鱗者註曰脂牛羊屬膏豕屬臝者謂虎豹貔􅣝為獸淺毛者之屬羽鳥屬鱗龍蛇之屬疏曰鄭註内則云凝者曰脂釋者曰膏宗廟之事脂者膏者以為牲註曰致美味也臝者羽者鱗者以為筍虡註曰貴野聲也臝力果反貔音毗􅣝來知反外骨内骨郤行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者謂之小蟲之屬以為雕琢註曰刻畫祭器博庶物也外骨龜屬内骨蟞屬郤行螾衍之屬仄行蟹屬連行魚屬紆行蛇屬脰鳴鼃黽屬注鳴精列屬旁鳴蜩蜺屬翼鳴𤼵皇屬股鳴蚣蝑動股屬胷鳴榮原屬郤羌畧反仄音側紆乙俱反脰音豆蟞必滅反本又作鼈螾羊忍反鼃戸媧反黽其辛反蜩音條蜺五兮反蚣思容反蝑思餘反厚脣弇口出目短耳大胷燿後大體短脰若是者謂之臝屬恒有力而不能走其聲大而宏有力而不能走則於任重宜大聲而宏則於鍾宜若是者以為鍾虡是故擊其所縣而由其虡鳴註曰燿讀為哨頎小也鄭司農云宏讀為紘綖之紘謂聲音大也由若也弇於檢反燿所敎反哨音稍頎音奇鋭喙決吻數目顅脰小體騫腹若是者謂之羽屬恒無力而輕其聲清揚而逺聞無力而輕則於任輕宜其聲清揚而逺聞於磬宜若是者以為磬虡故擊其所縣而由其虡鳴註曰吻口腃也顅長脰貌疏曰烏喙長決物食之時則以近喙本決故云決吻趙氏曰騫虧少也喙況廢反吻無憤反數音促顅苦顔反聞音問下同腃音權小首而長摶身而鴻若是者謂之鱗屬以為筍註曰摶圜也鴻傭也疏曰上論鍾磬之虡用鳥獸不同此論二者之筍同用龍蛇鱗物為之也摶徒丸反傭勅龍反凡攫閷援簭之類必深其爪出其目作其鱗之而註曰謂筍虡之獸也深猶藏也作猶起也之而頰􅝋也疏曰攫閷者攫著則殺之援攬則噬之深其爪出其目作其鱗之而則於眂必撥爾而怒苟撥爾而怒則於任重宜且其匪色必似鳴矣註曰匪采貎也王光逺曰言於眂若撥動其體而怒也攫俱博反閷色界反援音袁簭音筮撥必末反􅝋音窟爪不深目不出鱗之而不作則必穨爾如委矣苟頽爾如委則加任焉則必如將廢措其匪色必似不鳴矣註曰措猶頓也疏曰此經説脂者膏者止可為牲不可以為虡之義也頽徒回反措七故反梓人為飲器王光逺曰梓人為筍虡為樂器也為飲器為禮器也勺一升爵一升觚三升獻以爵而酬以觚一獻而三酬則一豆矣註曰勺尊升也觚豆字聲之誤觚當為觶豆當為斗趙氏曰勺以酌酒今之杓是也劉氏曰一獻而三酬者獻以一升酬以三升也并而計之為四升四升為豆豆雖非飲器其計數則然食一豆肉飲一豆酒中人之食也註曰一豆酒又聲之誤當為斗勺上灼反觚依註作觶之豉反杓是若反凡試梓飲器鄉衡而實不盡梓師罪之註曰衡平也平爵鄉口酒不盡則梓人之長罪於梓人焉鄉許亮反註同長丁丈反梓人為侯廣與崇方參分其廣而鵠居一焉註曰崇髙也方猶等也髙廣等者謂侯中也天子射禮以九為節侯道九十弓弓二寸以為侯中髙廣等則天子侯中丈八尺諸侯於其國亦然鵠所射也以皮為之各如其侯也居侯中三分之一則此鵠方六尺唯大射以皮飾侯大射者將祭之射也其餘有賓射燕射上兩个與其身三下兩个半之註曰个讀若齊人搚幹之幹上个下个皆謂舌也身躬也鄉射禮記曰倍中以為躬倍躬以為左右舌下舌半上舌然則九節之侯身三丈六尺上个七丈二尺下个五丈四尺其制身夾中个夾身在上下各一幅此侯凡用布三十六丈言上个與其身三者明身居一分上个倍之耳亦為下个半上个出也个或謂之舌者取其出而左右也侯制上廣下狹盖取象於人也張臂八尺張足六尺是取象率焉上綱與下綱出舌尋縜寸焉註曰綱所以繫侯於植者也上下皆出舌一尋者亦人張手之節也鄭司農云綱連侯繩也縜籠綱者縜讀為竹中皮之縜舌維持侯者易彦祥曰綱所以持侯而繫於植縜所以持綱而繫於侯个古旦反下及註同縜音云搚力答反率音類植直吏反張皮侯而棲鵠則春以功註曰皮侯以皮所飾之侯司裘職曰王大射則共虎侯熊侯豹侯設其鵠謂此侯也春讀為蠢蠢作也出也天子將祭必與諸侯羣巨射以作其容體出其合於禮樂者與之事鬼神焉疏曰張皮侯者天子三侯用虎熊豹飾侯之側號曰皮侯而棲鵠者各以其皮為鵠春註音蠢張五采之侯則逺國屬註曰五采之侯謂以五采畫正之侯也射人職曰以射灋治射儀王以六耦射三侯三獲三容樂以騶虞九節五正下曰若王大射則以貍步張三侯明此五正之侯非大射之侯明矣其職又曰諸侯在朝則皆北面逺國屬者若諸侯朝㑹王張此侯與之射所謂賓射也正之方外如鵠内二尺五采者内朱白次之蒼次之黃次之黑次之其侯之飾又以五采畫雲氣焉䟽曰此據賓射之侯言五采是九十弓之侯若七十弓者則三正五十弓則二正逺國對畿内諸侯為逺也正音征張獸侯則王以息燕註曰獸侯畫獸之侯也鄉射記曰凡侯天子熊侯白質諸侯麋侯赤質大夫布侯畫以虎豹士布侯畫以鹿豕凡畫者丹質是獸侯之差也息者休農息老物也燕謂勞使臣若與羣臣飲酒而射疏曰獸侯者亦畫雲氣飾侯之側燕射事䙝天子已下惟有五十步侯而已無尊卑之别勞力報反使色吏反祭侯之禮以酒脯醢註曰謂司馬實爵而獻獲者于侯薦酺醢折俎獲者執以祭侯疏曰三等射皆同其辭曰惟若寧侯註曰若猶女也寧安也謂先有功徳其鬼有神疏曰祭侯祭先有功徳之侯若射侯則射不寧侯有罪者也下文母或一經是也舉有功以勸示又舉有罪以懲之故兩言之也母或若女不寧侯不屬于王所故抗而射女註曰或有也若如也屬猶朝㑹也抗舉也張也强飲强食詒女曾孫諸侯百福註曰詒遺也曾孫諸侯謂女後世為諸侯者女音汝强其丈反詒羊之反廬人為廬器戈柲六尺有六寸殳長尋有四尺車㦸常酋矛常有四尺夷矛三尋註曰柲猶柄也八尺曰尋倍尋曰常酋夷長短名酋之言遒也酋近夷長矣疏曰凡此經所云柄之長短皆通刃為尺數而言廬魯吳反柲音秘殳音殊酋在由反註遒同凡兵無過三其身過三其身弗能用也而無己又以害人註曰人長八尺與尋齊進退之度三尋用兵力之極也而無己不徒止耳疏曰人自己身也故攻國之兵欲短守國之兵欲長攻國之人衆行地逺食飲饑且涉山林之阻是故兵欲短守國之人寡食飲飽行地不逺且不涉山林之阻是故兵欲長註曰言罷羸宜短兵壯健宜長兵疏曰案司馬灋云弓矢圍殳矛守戈㦸助此言攻國之兵欲短則弓矢是也守國之兵欲長則殳矛是也言戈㦸助者攻守皆有以助弓矢殳矛以其戈㦸長短處中故也罷音皮羸劣皮反凡兵句兵欲無彈刺兵欲無蜎是故句兵椑刺兵摶註曰句兵戈㦸屬刺兵矛屬鄭司農云彈謂掉也蜎謂橈也𤣥謂蜎亦掉也謂若井中蟲蜎之蜎齊人謂柯斧柄為椑則椑隋圜也摶圜也􅌛兵同强舉圍欲細細則校刺兵同强舉圍欲重重欲𫝊人𫝊人則密是故侵之註曰改句言􅌛容殳無刃同强上下同也舉謂手所操鄭司農云校讀為絞而婉之絞重欲𫝊人謂矛柄之大者在人手中者侵之能敵也𤣥謂校疾也𫝊近也密審也正也人手操細以􅌛則疾操重以刺則正然則為矜句兵堅者在後刺兵堅者在前句音鉤彈徒旦反刺七賜反蜎於全反椑薄兮反摶徒丸反􅌛紀益反校紀巧反𫝊音附隋他果反凡為殳五分其長以其一為之被而圍之參分其圍去一以為晉圍五分其晉圍去一以為首圍凡為酋矛參分其長二在前一在後而圍之五分其圍去一以為晉圍參分其晉圍去一以為刺圍註曰被把中也圍之圜之也大小未聞凡矜八觚鄭司農云晉謂矛㦸下銅鐏也刺謂矛刃胷也𤣥謂晉讀如王搢大圭之搢矜所㨗也首殳上鐏也為戈㦸之矜所圍如殳夷矛如酋矛被皮義反把音霸鐏存悶反凡試廬事置而摇之以眂其蜎也灸諸牆以眂其橈之均也橫而摇之以眂其勁也註曰置猶樹也灸猶柱也以柱兩牆之間輓而内之本末勝負可知也正於牆牆歰疏曰置而摇之謂豎之於地上以手摇之以眂其蜎蜎然均否橫而摇之謂橫置於膝上以一手執一頭摇之以眂其堅勁與否也灸音救輓音挽歰所立反六建既備車不反覆謂之國工註曰六建五兵與人也反覆猶軒輖輖音周匠人建國註曰立王國若邦國者水地以縣疏曰縣者於造城之處四角立四柱於柱四畔縣繩以正柱柱正然後去柱逺以水平之灋遥望柱高下定即知地之高下然後平高就下地乃平也乃後行下以景正四方之事鄭剛中曰天下之至平莫如水將以知地之高下則用水而視之天下之至直莫如繩將以知槷之邪正則用繩而視之謂之水地以縣者既度地而築之未知其高下乃用水以望之也然水可以望高下必以繩而騐之用水以平地立柱以懸繩觀水矣而又觀繩則平與直皆可知也縣音懸下同置槷以縣眂以景註曰槷古文臬假借字於所平之地中央樹八尺之臬以縣正之眂之以其景將以正四方也爾雅曰在牆者謂之杙在地者謂之臬為規識日出之景與日入之景註曰日出日入之景其端則東西正也又為規以識之者為其難審也自日出而畫其景端以至日入既則為規測景兩端之内規之規之交乃審也度兩交之間中屈之以指臬則南北正槷魚列反註臬同景倚丙反杙以職反度待洛反畫參諸日中之景夜攷之極星以正朝夕註曰日中之景最短者也極星謂北辰疏曰前經之正東西南北恐其不審猶更以此二者以正南北言朝夕即東西也南北正則東西亦正故兼言東西也匠人營國方九里旁三門註曰營謂丈尺其大小天子十二門通十二子疏曰案典命云上公九命國家宫室車旗衣服禮儀以九為節侯伯子男已下皆依命數鄭云國家謂城方公之城盖方九里侯伯七里子男五里并文王有聲詩箋差之天子當十二里此云九里者案下文有夏殷則此九里通異代也鄭異義駮或云周亦九里城則公七里侯伯五里子男三里不取典命等註由鄭兩解故義有異也國中九經九緯經涂九軌註曰國中城内也經緯謂涂也經緯之涂皆容方九軌軌謂轍廣乘車六尺六寸旁加七寸凡八尺是為轍廣九軌積七十二尺則此涂十二步也旁加七寸者輻内二寸半輻廣三寸半綆三分寸之二金轄之間三分寸之一左祖右社面朝後市註曰王宫所居也祖宗廟面猶向也王宫當中經之涂也市朝一夫註曰方各百步疏曰案司市市有三期總於一市之上為之若市總一夫之地則為大狹盖市曹思次介次所居之地與天子三朝皆居一夫之地各方百步也涂音塗綆方頴反轄胡瞎反夏后氏世室堂脩二七廣四脩一註曰世室者宗廟也魯廟有世室牲有白牡此用先王之禮脩南北之深也夏度以步令堂脩十四步其廣益以四分脩之一則堂廣十七步半五室三四步四三尺註曰堂上為五室象五行也三四步室方也四三尺以益廣也木室於東北火室於東南金室於西南水室於西北其方皆三步其廣益之以三尺土室於中央方四步其廣益之以四尺此五室居堂南北六丈東西七丈趙氏曰中間既為明堂又為土室意者土室包在明堂之内也此所計丈尺係五室四角相接無路可通所以環溪圖於四室角皆約空一筵或一步者不為無見也九階註曰南面三三面各二疏曰明堂位云三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上故知南面三階也四旁兩夾窻註曰窻助戸為明每室四戸八窻白盛註曰蜃灰也盛之言成也以蜃灰堊牆所以飾成宫室門堂三之二註曰門堂門側之堂取數於正堂令堂如上制則門堂南北九步二尺東西十一步四尺爾雅曰門側之堂謂之塾坡謂門堂有二書顧命所謂左塾右塾是也因經文合計其數故註之東西步尺亦計二而合之室三之一註曰兩室與門各居一分疏曰此室即在門堂之上作之也坡謂上正堂東西十七步三尺五室東西七丈計以六尺之步為十一步四尺合二者凡二十九步一尺今門堂居正堂三之二東西十一步四尺兩室與門各居正堂三分之一共為十七步三尺合二者亦二十九步一尺盖二門堂上與五室對門與兩室上與正堂對也夾古洽反窻初江反蜃常軫反堊烏路反塾音孰殷人重屋堂脩七尋堂崇三尺四阿重屋註曰重屋者王宫正堂若大寢也其脩七尋五丈六尺放夏周則其廣九尋七丈二尺也五室各二尋崇髙也四阿若今四柱屋重屋複笮也疏曰四阿四霤者也重直龍反放方往反複音福笮側白反霤音溜周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵註曰明堂者明政教之堂周度以筵亦王者相改周堂髙九尺殷三尺則夏一尺矣相參之數禹卑宫室謂此一尺之堂與此三者或舉宗廟或舉王寢或舉明堂互言之以明其同制疏曰謂當代三者其制同非謂三代制同也度待洛反下及註同室中度以几堂上度以筵宫中度以尋野度以步涂度以軌註曰周文者各因物宜為之數室中舉謂四壁之内疏曰此記據周而作故備於周而畧於夏殷下文皆據周而説室中坐時慿几堂上行禮用筵宫中合院之内無几無筵故用手之尋也在野論里數皆以步故用步涂有三道車從中央故用車之軌坡謂春官司几筵疏曰阮諶云几長五尺宫中總堂奥阼之稱凡居度其地足以容身故取張臂八尺之尋廟門容大扃七个註曰大扃牛鼎之扃長三尺每扃為一个七个二丈一尺闈門容小扃參个註曰廟中之門曰闈門小扃膷鼎之扃長二尺參个六尺路門不容乘車之五个註曰路門者大寢之門乘車廣六尺六寸五个三丈三尺言不容者是兩門乃容之兩門乃容之則此門半之丈六尺五寸應門二徹參个註曰正門謂之應門謂朝門也二徹之内八尺三个二丈四尺扃古熒反个古賀反膷音香内有九室九嬪居之外有九室九卿朝焉註曰内路寢之裏也外路門之表也九室如今朝堂諸曹治事處九嬪掌婦學之灋以敎九御六卿三孤為九卿疏曰案内宰王有六宫九嬪已下分居之若然不得復分居九室矣此九嬪之九室與九卿九室相對而言之九卿九室是治事之處則九嬪九室亦是治事之處故與六宫不同九分其國以為九分九卿治之註曰九分其國分國之職也三孤佐三公論道六卿治六官之屬王宫門阿之制五雉宫隅之制七雉城隅之制九雉註曰阿棟也宫隅城隅謂角浮思也雉長三丈髙一丈度髙以髙度廣以廣疏曰阿者謂門之屋兩下為之其脊髙五丈隅者浮思則小樓也明堂位云疏屛註亦云今浮思也刻之為雲氣蟲獸如今闕上為之矣則門屏有屋覆之與城隅及闕皆有浮思刻畫為雲氣并蟲獸者也經涂九軌環涂七軌野涂五軌註曰廣狹之差也杜子春云環涂謂環城之道疏曰野涂國外謂之野不言緯者以與經同也門阿之制以為都城之制註曰都四百里外距五百里王子弟所封其城隅髙五丈宫隅門阿皆三丈宫隅之制以為諸侯之城制註曰諸侯畿以外也其城隅制髙七尺宫隅門阿皆五丈禮器曰天子諸侯臺門疏曰案異義古周禮説云天子城髙七雉隅髙九雉公之城髙五雉隅髙七雉侯伯之城髙三雉隅髙五雉都城之髙皆如子男之城高其天子及公城與此匠人同其侯伯已下與此匠人説異者此匠人云門阿之制以為都城之制髙五雉亦謂城隅也其城髙三雉與侯伯等如是子男豈不如都乎明子男城亦與伯等是以周禮説不云子男及都城之髙直云都城之髙皆如子男之城髙有此匠人相參明子男之城不止高一丈隅二丈而已如是則此經惟謂上公之城制環涂以為諸侯經涂野涂以為都經涂註曰經亦謂城中道諸侯環涂五軌其野涂及都環涂野涂皆三軌匠人為溝洫註曰主通利田間之水道耜廣五寸二耜為耦一耦之伐廣尺深尺謂之􅍒田首倍之廣二尺深二尺謂之遂註曰古者耜一金兩人併𤼵之其壟中曰􅍒􅍒上曰伐伐之言𤼵也􅍒畎也今之耜岐頭兩金象古之耦也田一夫之所佃百畝方百步地遂者夫間小溝遂上亦有徑鄭剛中曰古者耕種在􅍒上而水流乎􅍒中一耦之所𤼵者其土廣深各一尺名之曰􅍒則􅍒為田間流水之道矣又於田首倍其數名之曰遂遂之為言水之所道達也此言一夫所受之田如是也疏曰案遂人註云以南畝圖之遂縱溝横洫縱澮橫九澮而川周其外以彼遂在夫間故以南畝遂則縱矣此井田云田首倍之為遂以南畝圖之遂則橫矣􅍒畎同佃音電九夫為井井間廣四尺深四尺謂之溝方十里為成成間廣八尺深八尺謂之洫方百里為同同間廣二尋深二仞謂之澮註曰此畿内采地之制九夫為井井者方一里九夫所治之田也采地制井田異於鄉遂及公邑三夫為屋屋具也一井之中三屋九夫三三相具以出賦税其治溝也方十里為成成中容一甸甸方八里出田税緣邊一里治洫方百里為同同中容四都六十四成方八十里出田税緣邊十里治澮采地者在三百里四百里五百里之中載師職曰園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二謂田税也皆就夫税之輕近重逺耳滕文公問為國於孟子孟子曰夏后氏五十而貢殷人七十而莇周人百畝而徹其實皆什一也徹者徹也莇者藉也龍子曰治地莫善於莇莫不善於貢貢者校數嵗之中以為常文公又問井田孟子曰請野九一而莇國中什一使自賦卿以下必有圭田圭田五十畝餘夫二十五畝死徙無出鄉鄉田同井出入相友守望相助疾病相扶持則百姓親睦方里而井井九百畝其中為公田八家皆私百畝同養公田公事畢然後治私事所以别野人也又曰詩云雨我公田遂及我私惟莇為有公田由此觀之雖周亦莇也魯哀公問於有若曰年饑用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也春秋宣十五年秋初税畝𫝊曰非禮也穀出不過藉以豐財也此數者世人謂之錯而疑焉以載師職及司馬灋論之周制畿内用夏之貢灋税夫無公田以詩春秋論語孟子論之周制邦國用殷之莇灋制公田不税夫貢者自治其所受田貢其税穀莇者藉民之力以治公田又使收斂焉畿内用貢灋者鄉遂及公邑之吏旦夕從民事為其促之以公使不得恤其私邦國用莇灋者諸侯専一國之政為其貪暴税民無藝周之畿内税有輕重諸侯謂之徹者通其率以什一為正孟子云野九夫而税一國中什一是邦國亦異外内之灋耳圭之言珪絜也周謂之士田鄭司農説以春秋𫝊曰有田一成又曰列國一同専達於川各載其名註曰達猶至也謂澮直至于川復無所注入載其名者識水所從出莇音助雨于付反率音律識音志凡天下之地埶兩山之間必有川焉大川之上必有涂焉註曰通其壅塞疏曰此言同間有澮澮水入川其川是自然而有又非平地而出必因山間有之又大川不可輙越遂川必當有涂地勢然也易彦祥曰此言同間有澮之水入川川在兩山之間與遂人萬夫之川其説大異盖遂人夫間有遂其地百畝十夫則其首為橫溝方一里十溝則東畔為南北之洫方三里有竒十洫則於南畔為橫澮九澮則於四畔為川是萬夫之川故其為川方三十三里少半里又九之而後方一同以南畝圖之九澮而川周其外又從而九之則一同之間方八十一澮何其澮洫之稠多也此遂人之制至匠人則百里一同始有一澮達於兩山之川而已凡溝逆地阞謂之不行水屬不理孫謂之不行註曰溝謂造溝阞謂脉理屬讀為注孫順也不行謂決溢也禹鑿龍門播九河為此逆阞與不理孫也坡謂上文有畎遂溝洫澮五者此舉中而言則凡畎遂洫溝皆不可逆阞與不理孫耳自是以下凡言溝者皆舉一例餘也梢溝三十里而廣倍註曰謂不墾地之溝也鄭司農云梢讀為桑螵蛸之蛸梢謂水潄齧之溝故三十里而廣倍坡謂郭明龍云梢溝句當有誤字妄意三十里之三乃至字磨滅之餘也盖遂橫溝縱溝行一里受九遂之水行十里受九十遂之水水勢愈大則潄齧必力故至十里為之洫廣八尺深八尺使倍於溝以受其水而殺其勢也阞音勒屬之樹反孫音遜梢音簫潄音瘦齧音臬俱下同殺色界反凡行奠水磬折以參伍註曰坎為弓輪水行欲紆曲也鄭司農云奠讀為停謂行停水溝形當如磬直行三折行五以引水者疾焉欲為淵則句於矩註曰大曲則流轉流轉則其下成淵疏曰凡川溝欲得使教淵之深當句曲於矩使水勢到向上句曲尺則為迴涹自然深為淵騐今皆然也奠音停句音鉤迴音潰涹於偽反凡溝必因水埶防必因地埶善溝者水潄之善防者水淫之註曰潄猶齧也鄭司農云淫讀為廞謂水淤泥土留著助之為厚𤣥謂淫讀為淫液之淫凡為防廣與崇方其閷參分去一註曰崇高也方猶等也閷者薄其上大防外閷註曰又薄其上厚其下疏曰外閷三分去一之外更去也閷色界反凡溝防必一日先深之以為式註曰程人功也疏曰將欲造溝防先以人數一日之中所作尺數後則以此功程賦其丈尺步數言深者謂深淺尺數里為式然後可以𫝊衆力註曰里讀為己聲之誤也凡任索約大汲其版謂之無任註曰約縮也汲引也築防若牆者以繩縮其版大引之言版橈也版橈築之則鼓土不堅矣詩云其繩則直縮版以載又曰約之格格椓之橐橐里音以𫝊音附格音各椓丁角反葺屋參分瓦屋四分葺屋草屋也三分屋之南北深以其一為屋脊髙四分亦然鄭剛中曰草之去水為遲瓦之去水甚疾故其峻之勢宜有差也陳用之曰自此至堂涂十有二分皆隨其宜而閷之之勢主以去水而已囷窌倉城逆牆六分註曰逆猶郤也築此四者六分其髙郤一分以為閷囷圜倉穿地曰窌疏曰郤牆六分者六分其髙去一以為殺假令髙丈二尺下厚四尺則於上去二尺為殺上惟二尺其囷倉城地上為之須為此殺其窌入地亦為此殺者雖入地口宜寛則牢固也堂涂十有二分註曰謂階前若今令甓祴也分其督旁之脩以一分為峻也爾雅曰堂涂謂之陳竇其崇三尺註曰宫中水道牆厚三尺崇三之註曰髙厚以是為率足以相勝葺七入反囷􅉌貧反窌古孝反竇音豆閷音殺色界反令音零甓薄厯反裓音階勝音升車人之事半矩謂之宣註曰矩灋也所灋者人也人長八尺而大節三頭也腹也脛也以三通率之則矩二尺六寸三分寸之二頭髪皓落曰宣半矩尺三寸三分寸之一人頭之長也柯欘之木頭取名焉易巽為宣髪一宣有半謂之欘註曰欘斲斤柄長二尺爾雅曰句欘謂之定一欘有半謂之柯註曰伐木之柯柄長三尺詩云伐柯伐柯其則不逺鄭司農云蒼頡篇有柯欘一柯有半謂之磬折註曰人帶以下四尺五寸磬折立則上俛玉藻曰三分帶下紳居二焉紳長三尺欘張玉反句音劬俛音免車人為耒庛長尺有一寸中直者三尺有三寸上句者二尺有二寸註曰鄭司農云耒讀為耕耒庛讀為其顙有疵之疵謂耒下岐𤣥謂庛讀為棘刺之刺刺耒下前曲接耜疏曰中直者謂手執處為句故謂庛上句下為中直句者謂人手執之處自其庛緣其外以至于首以弦其内六尺有六寸與步相中也註曰緣外六尺有六寸内弦六尺應一步之尺數耕者以田器為度宜耜異材不在數中疏曰弦其内者據庛面至句下望直量之内謂上下兩曲之内中應也庛音刺句音鉤下同緣悦戰反中丁丈反疵似斯反堅地欲直庛柔地欲句庛直庛則利推句庛則利𤼵倨句磬折謂之中地註曰中地之耒其庛與直者如磬折則調矣調則弦六尺鄭剛中曰推者推而前也𤼵者舉而起也推湯雷反車人為車柯長三尺博三寸厚一寸有半五分其長以其一為之首註曰首六寸謂若金剛闗頭斧柯其柄也鄭司農云柯長三尺謂斧柯因以為度疏曰此車人謂造車之事凡造作皆用斧因以量物故先論斧柄長短及刃之大小也轂長半柯其圍一柯有半註曰大車轂徑尺五寸輻長一柯有半其博三寸厚三之一註曰輻厚一寸也渠三柯者三註曰渠二丈七寸謂罔也其徑九尺鄭司農云渠謂車輮所謂牙疏曰渠二丈七尺者案上輻長一柯有半兩兩相對則九尺尚有轂空壺中於二丈七尺不合者云輻長一柯有半兩相九尺者通計轂而言其實輻無一柯有半也註故書博為摶杜子春云當為博牙五稼反行澤者欲短轂行山者欲長轂短轂則利長轂則安註曰澤泥若其大安山險苦其大動疏曰此總言大車柏車所利之事以大車在平地并行澤柏車山行各有所宜也行澤者反輮行山者仄輮反輮則易仄輮則完註曰鄭司農云反輮謂輪輮反其木裏需者在外澤地多泥柔也山地剛多沙石𤣥謂反輮為泥之黏欲得心在外滑仄輮謂沙石破碎之欲得表裏相依堅刃六分其輪崇以其一為之牙圍註曰輪髙輪徑也牙圍尺五寸毛氏曰此大車之輪宜在渠三柯者三之下故知其簡脱也輮人九反仄音側易以豉反大音泰需人兖反柏車轂長一柯其圍二柯其輻一柯其渠二柯者三五分其輪崇以其一為之牙圍註曰柏車山車輪髙六尺牙圍尺二寸疏曰其輻一柯其渠二柯者三兩輻相對六尺渠圍丈八尺亦謂通轂空壺中并數而言也大車崇三柯綆寸牝服二柯有參分柯之二註曰大車平地載任之車轂長半柯者也綆輪箄牝服長八尺謂較也鄭司農云牝服謂車箱服讀為負綆方頴反服音負箄薄厯反較音角羊車二柯有參分柯之一註曰鄭司農云羊車謂車羊門也𤣥謂羊善也善車若今定張車較長七尺柏車二柯註曰較六尺也柏車輪崇六尺其綆大半寸凡為轅三其輪崇參分其長二在前一在後以鑿其鉤徹廣六尺鬲長六尺註曰鄭司農云鉤鉤心鬲謂轅端厭牛領者疏曰輪崇雖不同其轅各自三其輪崇鬲長六尺者以其兩轅一牛在轅内故狹四馬車鬲六尺六寸者以其一轅兩服馬在轅外故鬲長也坡謂鉤謂轅之鉤心也就中而鑿之以鉤車箱也徹轍同鬲於革反厭於甲反弓人為弓取六材必以其時註曰取幹以冬取角以時絲漆以夏筋膠未聞六材既聚巧者和之註曰聚猶具也幹也者以為逺也角也者以為疾也筋也者以為深也膠也者以為和也絲也者以為固也漆也者以為受霜露也註曰六材之力相得而足王光逺曰弓以幹為質以漆為文角附幹以安膠得漆以完筋則施於角之外絲則用於膠之内弓所以及逺者其力在幹故幹以為逺弓所以疾𤼵者其勢在角故角以為疾角幹資筋以為堅刃以射則中深故筋以為深三者得膠然後相合以為和故膠以為和結而固之在絲故絲以為固飾而堅之在漆故漆以受霜露凡取幹之道七柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下註曰鄭司農云檍讀為億萬之億爾雅曰杻檍又曰檿桑山桑國語曰檿弧箕箙坡謂檍梓屬葉如杏而尖木瓜狀如柰凡相幹欲赤黒而陽聲赤黒則鄉心陽聲則逺根註曰陽猶清也木之類近根者奴趙氏曰上既辨其材之善否取之矣然後相眂而用之凡析幹射逺者用埶射深者用直註曰鄭司農云埶謂形埶假令木性自曲則當反其曲以為弓故曰審曲面埶𤣥謂曲埶則宜薄薄則力少直則可厚厚則力多王光逺曰既相之而得其材之美然後可以析之而為弓之幹居幹之道菑栗不迆則弓不𤼵註曰鄭司農云菑讀為不菑而畬之菑栗讀為榛栗之栗謂以鋸副析幹迆讀為倚移從風之移謂邪行絶理者弓𤼵之所從起𤣥謂栗讀為裂繻之裂疏曰居謂居處解析弓幹之灋但菑栗皆謂以鋸剖析弓幹之時不邪迆失理則弓後不𤼵傷也柘音蔗檍於力反檿於簟反相息亮反下同鄉許亮反逺於愿反菑側其反栗音烈迆羊氏反杻女丑反箙音服畬音餘鋸音據副普逼反繻音需凡相角秋閷者厚春閷者薄稺牛之角直而澤老牛之角紾而昔註曰鄭司農云紾讀為抮縳之抮昔讀為交錯之錯謂牛角觕理錯也𤣥謂昔讀履錯然之錯王光逺曰稺牛方少而氣血剛則角之文正直而澤潤老牛有疾而氣血衰則其文麤紾而交錯疢疾險中註曰牛有久病則角裏傷疏曰險傷也中角裏瘠牛之角無澤註曰少潤氣角欲靑白而豐末夫角之本蹙於􅑠而休於氣是故柔柔故欲其埶也白也者埶之徴也註曰蹙近也休讀為煦鄭司農云欲其形之自曲反以為弓𤣥謂色白則埶夫角之中恒當弓之畏畏也者必橈橈故欲其堅也青也者堅之徴也註曰故書畏作威杜子春云當為威威謂弓淵角之中央與淵相當𤣥謂畏讀如秦師入隈之隈夫角之末逺於􅑠而不休於氣是故脃脃故欲其柔也豐末也者柔之徵也註曰末之大者􅑠氣及煦之鄭剛中曰所不休則必脃而易折此所以貴其柔柔則不折矣角長二尺有五寸三色不失理謂之牛戴牛註曰三色本白中青末豐鄭司農云牛戴牛角直一牛稺音治閷色界反紾音軫註抮同昔七各反下同疢丑刃反瘠音籍􅑠乃老反又作腦休音煦畏烏回反脃七嵗反縳符約反凡相膠欲朱色而昔昔也者深瑕而澤紾而摶亷摶圜也亷瑕嚴利也欲朱色案下諸膠惟牛膠火赤則牛膠為善矣深瑕而澤者言其表裡皆有文而其色潤澤紾而摶亷者其理紾密而摶圜又亷瑕嚴利鹿膠靑白馬膠赤白牛膠火赤䑕膠黒魚膠餌犀膠黃註曰皆謂煮用其皮或用角餌色如餌坡謂餌粉餅也許氏說文曰餌之言堅潔若玉珥也魚膠餌近之凡昵之類不能方註曰鄭司農云謂膠善戾故書昵或作樴杜子春云樴讀為不義不昵之昵或為䵑䵑黏也𤣥謂樴脂膏䐈敗之䐈䐈亦黏也坡謂上文畧舉數者之膠色此言凡膠黏之類衆多不能盡比方之也相息亮反摶徒丸反昵音暱註䵑同樴音職䐈同黏女亷反凡相筋欲小簡而長大結而澤小簡而長大結而澤則其為獸必剽以為弓則豈異於其獸簡讀如簡札之簡盖竹間一條為一札謂筋條之直相似也結謂細聚而不散筋之小者貴乎條直而長筋之大者貴乎稹密而潤剽疾也筋欲敝之敝註曰鄭司農云嚼之當孰剽芳妙反嚼才略反漆欲測註曰測讀如測度之測測猶清也絲欲沈註曰如在水中時色得此六材之全然後可以為良註曰全無瑕病良善也凡為弓冬析幹而春液角夏治筋秋合三材註曰三材膠絲漆鄭司農云液讀為醳疏曰醳者漬液之義寒奠體註曰奠讀為定至冬膠堅内之檠中定往來體冰析灂註曰大寒中下於檠中復内之陳用之曰上文既明相幹相角相膠相筋之理矣於是始言為弓之灋王光逺曰材美工巧不得天時則不可以為良故弓有六材而治之各以其時也冬析幹則易註曰理致滑鄭剛中曰木至冬堅凝治之節目易去其理滑易矣春液角則合註曰合讀為洽夏治筋則不煩註曰煩亂鄭剛中曰筋本攣結不紓宜緩而治之夏者解緩之時於斯治之則筋埶慢易不煩亂矣秋合三材則合註曰合堅密也寒奠體則張不流註曰流猶移也疏曰體既定則後用時雖張不流移謂不失往來之體也冰釋灂則審環註曰審猶定也疏曰納之檠中析其漆灂其漆之灂環則定後不鼓動故冰析之也春被弦則一年之事註曰期嵗乃可用奠音定灂子召反易以豉反醳音亦檠音景内音納復扶又反析幹必倫註曰順其理也析角無邪註曰亦正之斲目必荼註曰鄭司農云荼讀為舒舒徐也目幹節目鄭剛中曰幹有節目斲而去之宜紆徐而勿急則節目可盡斲目不荼則及其大脩也筋代之受病註曰脩猶久也夫目也者必强强者在内而摩其筋夫筋之所由幨恒由此作註曰摩猶隐也幨絶起也故角三液而幹再液註曰重醳治之使相稱王光逺曰液謂以水治之使其液作而耎也角則以火灸而治之欲其和也故三液幹則以火揉而治之欲其堅也故再液厚其帤則木堅薄其帤則需註曰需謂不充滿鄭司農云帤讀為襦有衣絮之絮帤謂弓中裨疏曰造弓之灋弓幹雖用整木仍於幹上裨之乃得調適也是故厚其液而節其帤註曰厚猶多也節猶適也鄭剛中曰厚其液則或三或再其數之多也節其帤則不厚不薄其處之得中約之不皆約疏數必侔註曰不皆約纏之繳不相次也皆約則帤侔猶均也疏曰約謂以絲膠橫纏之今之弓猶然不皆約謂不比次為之疏數必侔須稀疎必均也荼音舒下同幨昌廉反帤女居反需人兖反數音朔侔莫侯反重直龍反稱尺證反下同耎音軟襦音儒絮周易作袽禆音卑繳音灼斲摯必中膠之必均註曰摰之言致也中猶均也疏曰斲幹厚薄必均調為之施膠亦均不得偏厚也自此以下説弓之隈裏施膠之事斲摯不中膠之不均則及其大脩也角代之受病夫懐膠於内而摩其角夫角之所由挫恒由此作註曰幹不均則角蹴折也凡居角長者以次需註曰當弓之隈也長短各稱其幹短者居簫趙氏曰次者處於此之意如師左次是也故居角之灋必以長者安頓在隈弓隈謂之需恒角而短是謂逆橈引之則縱釋之則不校註曰恒讀為搄搄竟也竟其角而短于淵幹引之角縱不用力若欲反橈然校疾也既不用力放之又不疾疏曰竟角而短謂施角竟滿兩畔而上下短於隈者也恒角而達辟如終紲非弓之利也註曰達謂長於淵幹若達於簫頭紲弓䪐角過淵接則送矢大疾若見紲於䪐矣弓有䪐者為𤼵弦時備頓傷詩云竹䪐緄縢鄭剛中曰若其角長自隈而通過於簫頭則其弓必堅而不可引譬如終紲謂若見繫束於弓䪐之上今夫茭解中有變焉故校註曰茭解謂接中也變謂簫臂用力異校疾也疏曰記人别起義端故言今夫茭解中謂隈與弓簫角接之處有變者即異也謂弓簫與臂用力異異者引之則臂中用力故矢則簫用力既用力異故校於挺臂中有柎焉故剽註曰挺直也柎側骨剽亦疾也鄭司農云剽讀為湘漂絮之漂疏曰直臂中正謂弓把處有柎者謂角弓於把處兩畔有側骨骨堅强所以與弓為力故剽疾也恒角而達引如終紲非弓之利註曰重明達角之不利變辟言引字之誤挫子臥反需汝逺反恒角之恆古鄧反註搄同校古卯反辟音譬紲息列反茭音交解戸隘反挺勅頂反柎方輔反引如註改作譬蹴子六反䩛音祕緄古本反縢徒登反漂匹妙反撟幹欲孰於火而無贏撟角欲孰於火而無燂引筋欲盡而無傷其力䰞膠故孰而水火相得然則居旱亦不動居濕亦不動註曰贏過孰也燂灸爛也不動者謂弓也疏曰不言漆絲者用力少趙氏曰此段説幹角筋膠得所不得所之事幹角有曲直之勢必以火撟之使正筋有緩急拳縮之埶必用引之凡所攻治必水火相得不可過不可不及角三液幹再液者以此爾筋欲敝之敝不盡則有生硬處而不軟過則傷其力而不强膠以水浸以火燒水火相得則體熟而質化苟有賤工必因角幹之濕以為之柔善者在外動者在内雖善於外必動於内雖善亦弗可以為良矣註曰苟愉也濕猶生也撟居兆反贏音盈燂音尋䰞章吕反愉吐侯反凡為弓方其峻而高其柎長其畏而薄其敝宛之無已應註曰宛謂引之也引之不休止常應弦言不罷需也峻謂簫也鄭司農云敝讀為蔽塞之蔽謂弓人所握持者趙氏曰弓稍頭要叩弦方而不員則健而有力稍頭尖削而不平闊故謂之峻柎乃把處兩頭兩側畔稍髙接角畏者弓彎謂之畏畏言曲處敝即把處稍細者下柎之弓末應將興註曰末猶簫也興猶動也𤼵也疏曰下柎者謂把骨大下為之由弓隈下短故簫應弦則柎將動𤼵也趙氏曰柎正當弓之要惟髙其柎以壯其力故引之而弓稍不能以橈之若柎骨大卑下為之簫方應弦則柎𤼵動由柎力弱撐壓弓隈不住故也為柎而𤼵必動於閷註曰閷接中疏曰此重釋上文末應將興若如上為柎而𤼵動則接中亦動也趙氏曰接是敝接畏處柎揷在兩旁雖相襯貼作一柄其實是兩木凑合成柎與閷相為表裏柎動則閷亦動理之必然弓而羽閷末應將𤼵註曰羽讀為扈扈緩也接中動則緩緩簫應弦則角幹將𤼵趙氏曰此段先言峻柎畏敝至論病處止説柎一節全不及峻畏敝則所重在柎柎當弓之要正是制壓一弓之接處最要强固柎壞則其餘都壞所以特詳言之畏烏回反下及註同閷色界反羽音戸註扈同罷音皮需汝逺反撐丑庚反弓有六材焉雖幹强之張如流水註曰無難易也疏曰無難易則强弱得所也趙氏曰此統論弓之成體維體防之引之中參註曰體謂内之於檠中定其體防深淺所止謂體定張之弦居一尺引之又二尺疏曰深淺所止者若王弧之弓往體寡來體多弛之乃有五寸張之一尺五寸夾庾之弓往體多來體寡弛之一尺五寸張之得五寸唐弓大弓往來體若一弛之一尺張之亦一尺是防之深淺所止弦居一尺引之又二尺者據唐大中者而言餘四者弛之張之雖多少不同及其引之皆三尺以其矢長三尺須滿故也維角䟫之欲宛而無負弦引之如環釋之無失體如環註曰負弦辟戾也負弦則不如環如環亦謂無難易鄭司農云䟫讀如牚距之牚車牚之牚疏曰牚正也謂置角於隈屮而正也宛順也鄭剛中曰無負弦言不與弦相反也非惟不與弦相反又且引之則如環環言其勢之圓也非特引之勢圓及其釋而不引之時其體不失常如環然此皆角有以䟫之之力材美工巧為之時謂之參均角不勝幹不勝筋謂之參均量其力有三均均者三謂之九和註曰有三讀為又參量其力又參均者謂若幹勝一石加角而勝二石被筋而勝三石引之中三尺假令弓力勝三石引之中三尺弛其弦以繩援擐之毎加物一石則張一尺故書勝或作稱鄭司農云當言稱謂之不參均𤣥謂不勝無負也九和之弓角與幹權筋三侔膠三鋝絲三邸漆三斞上工以有餘下工以不足註曰權平也侔猶等也角幹既平筋三而又與角幹等也鏘鍰也邸斞輕重未聞鄭剛中曰良工能調使多寡適平而拙工雖足用之物其用之無灋毎每見其不足也䟫直庚反註牚同勝音升鋝音劣邸丁禮反斞羊主反易以豉反内之音納辟匹亦反擐戸串反鍰音環為天子之弓合九而成規為諸侯之弓合七而成規大夫之弓合五而成規士之弓合三而成規註曰材良則句少也疏曰此據角弓形不張而言句居侯反弓長六尺有六寸謂之上制上士服之弓長六尺有三寸謂之中制中士服之弓長六尺謂之下制下士服之註曰人各以其形貌大小服此弓凡為弓各因其君之躬志慮血氣註曰又隨其人之情性王光逺曰射之道其中在巧其至在力巧存乎志慮力出乎血氣躬者血氣志慮之所寓焉者也人之躬有長短志慮有緩急血氣有强弱故為弓者必因之也且射者必内志正外體直然後持弓矢審固而可以觀徳焉苟不因其志慮則志慮有不和於心内志其能正乎苟不因其血氣則血氣有不調於體外體其能直乎為弓者各因君之躬志慮血氣者凡以此也豐肉而短骨直以立所謂弓有長短也寛緩以荼忿勢以奔所謂志慮有緩急血氣有强弱也豐肉而短寛緩以荼若是者為之危弓危弓為之安矢骨直以立忿埶以奔若是者為之安弓安弓為之危矢註曰言損贏濟不足危奔猶疾也骨直謂强毅荼古文舒假借字鄭司農云荼讀為舒疏曰此以下説君之躬與志慮所宜危弓則夾庾弱者為言安弓謂王弧之類强者而言若然危矢據恒矢安矢據殺矢者也其人安其弓安其矢安則莫能以速中且不深註曰鄭司農云速疾也三舒不能疾而中言矢行短也中又不能深其人危其弓危其矢危則莫能以愿中註曰愿慤也三疾不能慤而中言矢行長也長謂過去肉如字又而樹反荼依註音舒埶同勢中丁丈反愿音願往體多來體寡謂之夾臾之屬利射侯與弋註曰射逺者用埶夾臾之弓合五而成規侯非必逺顧埶弓者材必薄薄則弱弱則矢不深中侯不落大夫士射侯矢落不獲弋繳射也往體寡來體多謂之王弓之屬利射革與質註曰射深者用直此又直焉於射堅宜也王弓合九而成規弧弓亦然革謂干盾質木椹天子射侯亦用此弓大射曰中離維綱揚觸捆復君則釋獲其餘則否往體來體若一謂之唐弓之屬利射深註曰射深用直唐弓合七而成規大弓亦然春秋𫝊曰盗竊寶玉大弓夾古洽反臾音庾射食亦反除繳射大射如字餘竝同繳諸若反椹張林反捆苦本反大和無灂其次筋角皆有灂而深其次有灂而疏其次角無灂註曰大和尤良者也深謂灂在中央兩邊無也角無灂謂隈裏疏曰其次有灂而疏者以上參之此謂兩邊亦有但疏之不皆有也其次角無灂謂隈裏無灂簫頭及背有之鄭剛中曰灂者漆之文理也大和之弓六材至善不見其文理其次於背上之筋隈中之角有之雖有而文理深不甚著也其次皆有文理但疏而逺又有次者於角不見文理他皆有也合灂若背手文註曰弓表裏灂合處若人合手背文相應鄭司農云如人手背文理角環灂牛筋蕡灂麋筋斥蠖灂註曰蕡枲實也斥蠖屈蟲也疏曰此言弓表及弓裡灂文也角環灂謂隈裏灂文如環牛筋蕡灂者謂弓背用牛筋之漆如麻子文若用麋則如斥蠖灂子肖反有灂而疏之上石經有角字背補内反蕡扶文反斥音尺蠖於郭反和弓􅌛摩註曰和猶調也􅌛拂也將用弓必先調之拂摩之大射禮曰小射正授弓大射正以袂順左右隈上再下一覆之而角至謂之句弓註曰句於三體材敝惡不用之弓也覆猶察也謂用射而察之至猶善也但角善則矢雖疾而不能逺疏曰此以下論弓六材角幹筋用力多故特言之易彦祥曰弓以角幹筋為主三者皆善則為弓之上二善為次一善者為下覆之而幹至謂之侯弓註曰射侯之弓也幹又善則矢疾而逺覆之而筋至謂之深弓註曰射深之弓也筋又善則矢既疾而逺又深鄭剛中曰不言王弧王弧則六材俱善故也王光逺曰弓有六材獨言角幹筋者盖六材以角幹筋為主而膠絲漆則為之輔而已古人所以冬折幹春液角夏治筋至於合三材則一於秋者亦以此也􅌛紀益反覆孚屋反句音鉤大射小射用射如字餘射俱食亦反善本或作譱同善周禮述註卷二十四
