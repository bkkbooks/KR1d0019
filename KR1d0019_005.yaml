body:
  text: 周禮述注卷五安溪李光坡撰九嬪掌婦學之法以教九御婦德婦言婦容婦功各帥其屬而以時御敘于王所注曰婦德謂貞順婦言謂辭令婦容謂婉娩婦功謂絲枲自九嬪以下九九而御于王所九嬪者既習于四事又備于從人之道是以教女御也教各帥其屬者使亦九九相與從于王所息之燕寢御猶進也勸也進勸王息亦相次敘凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕亦十五日而遍云自望後反之孔子云日者天之明月者地之理陰契制故月上屬為天使婦從夫放月紀娩音晚見賢遍反上時掌反放方往反凡祭祀贊玉齍贊后薦徹豆籩注曰玉齍玉敦受黍稷器后進之而不徹疏曰助后薦玉齍也豆籩之薦與徹皆助后敦音對若有賓客則從后注曰當贊后事疏曰后之有事于賓客者唯諸侯來朝王親饗燕之后當從王大喪帥敘哭者亦如之注曰亦從后帥猶道也后哭之衆次敘者乃哭世婦掌祭祀賓客喪紀之事帥女宫而濯溉為齍盛注曰溉拭也為猶差擇疏曰案少牢饔人溉鼎俎廩人溉甑甗司宫溉豆籩彼以大夫家無婦官及無刑女故并使男子官此天子禮及祭之日涖陳女宫之具凡內羞之物注曰涖者臨也內羞謂房中之羞疏曰案春官世婦宫卿云掌女宫之宿戒及祭祀比其具此官直臨之而已溉古愛反注同拭音式掌弔臨于卿大夫之喪注曰王使往弔疏曰案司服公卿大夫皆王親弔之此文使世婦往弔者此蓋使世婦致禮物但弔是大名雖致禮亦名為弔此所弔不言三公與孤者文不具也女御掌御敘于王之燕寢注曰言掌御敘防上之専妬者于王之燕寢則王不就后宫息也以歲時獻功事注曰絲枲成功之事凡祭祀贊世婦注曰助其帥涖女宫大喪掌沐浴注曰王及后之喪疏曰王及后喪沐用潘浴用湯始死為之于南牖下但男子不死于婦人之手今王喪亦使女御浴者案士喪禮浴時男子抗衾則不使婦人今王喪沐或使婦人而浴未必婦人或亦供給湯物而已亦得謂之掌也潘鋪官切音拌后之喪持翣翣棺飾也漢禮翣方扇以木為匡廣二尺兩角高二尺四寸柄長五尺以布覆之天子八翣后同女御持而從柩車左右各四人翣所甲反後同從世婦而弔于卿大夫之喪注曰從之數蓋如使者之介云疏曰王之妃妾夫人象公嬪象孤卿世婦象大夫女御象元士但介數依命數為差王之大夫四命世婦之從亦四人女祝掌王后之內祭祀凡內禱祠之事注曰內祭祀六宫之中竈門戶禱疾病求瘳也祠報福疏曰月令春祀戶夏祀竈秋祀門后祀之時亦當依此也婦人無外事無行與中霤之等掌以時招梗禬禳之事以除疾殃疏曰以時者謂隨其事時不必要在四時也招謂招取善祥梗禦捍惡之未至也除災害曰禬禬猶刮也刮去見在之災禳攘也推卻見在之變異陳君舉曰胡五峯謂宫闈不當有此是蓋未察先王之意古人通天人徹幽明動則有祭故食則祭先食桑則祭先蠶農則祭先嗇與夫門行户竈表貉先牧馬祖等類不一不唯不忘初之意蓋神所在有之故所在祭之皆先王謹微之意所以自盡焉外朝有司巫男巫女巫內朝有女祝所掌者大氐類後世淫祀祈望非福然先王不以為不可必設官以掌之者交三才之道也若曰人事既盡此等事一切勿講則非聖人之意梗古猛反禬古外反禳如羊反貉與禡同音罵朝直遙反氐古抵字女史掌王后之禮職王光逺曰王后之禮各有所職若祭祀則有薦徹賓禮則有獻酬其職女史掌之掌內治之二以詔后治內政注曰內治之法本在內宰書而二之逆內宫逆內宫者謂六宫所有功事及費用財物粟米皆鉤考之書內令內令后令也書而宣布于六宫凡后之事以禮從疏曰太史以書協禮事執書以詔王此女史亦執禮書以從后典婦功掌婦式之法以授嬪婦及內人女功之事齎注曰婦式婦人事之模範嬪婦九嬪世婦事齎謂以女功之事來取絲枲鄭司農云內人謂女御坡謂內宰以作二事唯據女御不見九嬪世婦有絲枲之事此言嬪婦者蓋王后所蠶北郊以為祭服故使嬪婦率先有事焉齎音咨凡授嬪婦功及秋獻功辨其苦良比其小大而賈之物書而楬之獨舉嬪婦不言內人省文也鄭司農苦讀為盬枲曰苦絲曰良而苦良之中人功又有良善粗盬皆當辨之也比方也小大長短廣狹也賈估其直也楬解見職幣上文既言授嬪婦以女功此承之言凡授功者至秋獻功時則分别其縑帛布紵與其粗細皆比方其大小書其賈數而著其物也以共王及后之用頒之于內府賈音嫁楬其列反盬音古縑音兼問授注以當作受如何曰注以嬪婦為國中嬪婦似與上文抵牾又以國中嬪婦所作成即送之不須獻功時更于上下文理疑不相蒙且上未嘗言授國中嬪婦以女功安得突然受其功乎故坡謂凡授嬪婦功此句蓋重上文之意以起下文及秋獻功耳曰苦良司農後鄭異說子兼之何也曰絲曰良枲曰苦司農為是然以此官不藏布帛而使典絲主良典枲主苦則于下文頒內府以共王后者解將不行後鄭之意則于下文得矣然以此官主良則經明兼苦良至改典絲之良為苦又恐牽合實多坡謂禮言躬桑詩言刈葛宫中所成自有此苦良二事至典絲之良典枲之苦又自以貢入之物為之各不相涉也宫中所成藏內府以共王后貢入所成藏二官以待政令云抵音底牾音吾重直龍反刈音藝典絲掌絲入而辨其物以其賈楬之注曰絲入謂九職之嬪婦所貢絲疏曰后宫所蠶之絲自后宫用之以為祭服不入典絲其歲之常貢之絲若禹貢兗州貢漆絲之等考餘官更無絲入之文亦當入此典絲也物謂絲有善惡粗細不同賈音嫁掌其藏與其出以待興功之時注曰絲之貢少藏之出之可同官也時者若溫暖宜縑帛清涼宜文繡頒絲于外內工皆以物授之注曰外工外嬪婦也內工女御疏曰以物授之者若縑帛則授以素絲文繡則授以綵絲凡上之賜豫亦如之注曰王以絲物賜人及獻功則受良功而藏之辨其物而書其數以待有司之政令上之賜豫政令謂禮物之幣帛及司服辨師法物所宜用皆是也鄭司農云良功絲功縑帛凡祭祀共黼畫組就之物黼畫衣服及依巾幂也組就以組為就冕旒也白與黑謂之黼采色一成曰就喪紀共其絲纊組文之物絲以給線縷纊以充衣縟組者士喪禮曰握手𤣥纁裏著組繫內則曰屨著綦綦屨繫是用組之事也青與赤謂之文著直略反凡飾邦器者受文織絲組焉注曰謂茵席屏風之屬歲終則各以其物㑹之注曰種别為計鄭司農云各以其所飾之物計會傅著之織音志茵音因會古外反典枲掌布緦縷紵之麻草之物以待時頒功而授齎緦十五升布抽其半者白而細疏曰紵縷線也麻枲苴也草葛檾之屬授齎謂授給麻草使為布緦縷紵線先見反檾音萌及獻功受苦功以其賈楬而藏之以待時頒注曰鄭司農云苦功謂麻功布紵疏曰以待時頒者即下文頒衣服及賜豫是也頒衣服授之賜豫亦如之注曰授之授受頒者帛言待有司之政令布言頒衣服互文苦音古歲終則各以其物㑹之內司服掌王后之六服褘衣揄狄闕狄鞠衣展衣緣衣素沙注曰鄭司農云褘衣畫衣也祭統曰夫人副褘揄狄闕狄畫羽飾展衣白衣也喪大記曰復夫人以屈狄世婦以袒衣屈音與闕相似袒與展相似鞠衣黃衣也𤣥謂狄當為翟翟雉名伊雒而南素質五色皆備成章曰翬江淮而南青質五色皆備成章曰搖王后之服刻繒為之形而采畫之綴於衣以為文章褘衣畫翬者揄翟畫搖者闕翟刻而不畫此三者皆祭服從王祭先王則服褘衣祭先公則服揄翟祭羣小祀則服闕翟今世有圭衣者蓋三翟之遺俗鞠衣黃桑服也色如鞠塵象桑葉始生月令三月薦鞠衣于先帝告桑事展衣以禮見王及賓客之服字當為袒袒之言亶亶誠也詩國風曰玼兮玼兮其之翟也下云胡然而天也胡然而帝也言其德當神明又曰瑳兮瑳兮其之展也下云展如之人兮邦之媛也言其行配君子二者之義與禮合矣雜記曰夫人服稅衣揄狄又喪大記曰士妻以褖衣言褖者甚衆字或作稅此緣衣者實作褖衣也褖衣御于王之服亦以燕居男子之褖衣黑則是亦黑也六服備于此矣褘揄狄展聲相近緣字之誤也以下推次其色則闕狄赤揄狄青褘衣𤣥婦人尚専一德無所兼連衣裳不異其色素沙者今之白縳也六服皆袍制以白縳為裏使之張顯今世有沙縠者名出于此疏曰王之吉服有九韋辨以下常服有三與后鞠衣以下三服同但王之祭服有六后祭服唯三翟者天地山川社稷之等后夫人不與故三服而已褘音暉揄音遙展同袒俱張彥反緣同褖俱吐亂反翬音暉見王之見賢遍反亶丹但反玼音此瑳倉我反行下孟反稅吐亂反縳音絹縠音斛與音預辨外內命婦之服鞠衣展衣緣衣素沙注曰內命婦之服鞠衣九嬪也展衣世婦也緣衣女御也外命婦者其夫孤也則服鞠衣其夫卿大夫也則服展衣其夫士也則服緣衣三夫人及公之妻其闕狄以下乎侯伯之夫人搖狄子男之夫人亦闕狄唯二王後褘衣凡祭祀賓客共后之衣服及九嬪世婦凡命婦共其衣服共喪衰亦如之注曰凡者凡女御與外命婦也言及言凡殊貴賤也春秋之義王人雖微者猶序乎諸侯之上所以尊尊也臣之命者再命以上受服則下士之妻不共也外命婦唯王祭祀賓客以禮佐后得服此上服自于其家則降焉疏曰喪衰亦如之者外命婦喪衰為王服齊衰于后無服若九嬪以下及女御于王服斬衰于后服齊衰也后之喪共其衣服凡內具之物注曰內具紛帨線纊鞶袠之屬疏曰后喪所共衣服者謂襲時十二稱小斂十九稱大斂百二十稱帨如鋭反鞶音盤袠陳乙反稱去聲縫人掌王宫之縫線之事以役女御以縫王及后之衣服注曰女御裁縫王及后之衣服則為役助之宫中餘裁縫事則専為之鄭司農云線縷也喪縫棺飾焉注曰孝子既啓見棺猶見親之身既載飾而以行遂以葬若存時居于帷幕而加文繡喪大記曰飾棺君龍帷三池振容黼荒火三列黻三列素錦褚加帷荒纁紐六齊五采五貝黼翣二黻翣二畫翣二皆戴圭魚躍拂池君纁戴六纁披六此諸侯禮也禮器曰天子八翣諸侯六翣大夫四翣漢禮器制度飾棺天子龍火黼黻皆五列又有龍翣二其戴皆加璧衣翣柳之材注曰必先纒衣其材乃以張飾也柳之言聚諸飾之所聚疏曰鄭喪大記注引漢禮翣方扇以木為匡廣二尺兩角髙二尺四寸柄長五尺以布覆之柳即帷荒是也衣于既反注同掌凡內之縫事染人掌染絲帛凡染春㬥練夏纁𤣥秋染夏冬獻功注曰㬥練練其素而㬥之鄭司農云纁謂絳也𤣥謂纁𤣥者謂始可以染此色者𤣥纁者天地之色以為祭服石染當及盛夏熱潤始湛研之三月而後可用考工記鍾氏則染纁術也染𤣥則史傳闕矣染夏者染五色謂之夏者其色以夏狄為飾禹貢曰羽􅍒夏狄是其總名其類有六曰翬曰搖曰􅔧曰災曰希曰蹲其毛羽五色皆備成章染者擬以為深淺之度是以放而取名焉掌凡染事史直翁曰天下之染必因草木土石而成先王取其色以配四時之宜以定上下之分皆所以為禮然先王取色以為禮後世因色以起妄故𫝊曰五色令人目盲使知所謂色者出于草木土石不足為吾損益則目不盲而視天下之色姑以為禮設耳㬥步卜反􅍒畎同􅔧音儔放方往反追師掌王后之首服為副編次追衡筓為九嬪及外內命婦之首服以待祭祀賓客注曰鄭司農云副者婦人之首服衡維持冠者𤣥謂副之言覆所以覆首為之飾其遺象若今步繇矣服之以從王祭祀編編列髮為之其遺象若今假紒矣服之以桑也次次第髮長短為之所謂髲髢服之以見王王后之燕居亦纚筓總而已追猶治也詩云追琢其璋王后之衡筓皆以玉為之唯祭服有衡垂于副之兩旁當耳其下以紞縣瑱笄卷髮者外內命婦衣鞠衣展衣者服編衣緣衣者服次外內命婦非王祭祀賓客佐后之禮自於其家則亦降焉少牢饋食禮曰主婦髲鬄衣移袂特牲饋食禮曰主婦纚筓宵衣是也昏禮女次純衣攝盛服耳主人爵辨以迎移袂緣衣之袂凡諸侯夫人于其國衣服與王后同追丁回反下同繇音遙紒音計髲皮寄反髢大計反纚所綺反縣音懸瑱他見反卷眷免反鬄大計反純側其反喪紀共筓絰亦如之屨人掌王及后之服屨為赤舄黑舄赤繶黃繶青句素屨葛屨注曰屨自明矣必連言服者著服各有屨也復下曰舄襌下曰屨舄屨有絇有繶有純者飾也凡屨舄各象其裳之色士冠禮曰𤣥端黑屨青絇繶純素積白屨緇絇繶純爵辨纁屨黑絇繶純是也王吉服有九舄有三等赤舄為上冕服之舄詩云王錫韓侯𤣥衮赤舄則諸侯與王同下有白舄黑舄王后吉服六唯祭服有舄𤣥舄為上褘衣之舄也下有青舄赤舄鞠衣以下皆屨耳句當為絇聲之誤也絇繶純者同色今云赤繶黃繶青絇雜互言之明舄屨衆多反覆以見之凡舄之飾如繢之次赤繶者王黑舄之飾黃繶者王后𤣥舄之飾青絇者王白舄之飾言繶必有絇純言絇亦有繶純三者相將王及后之赤舄皆黑飾后之青舄白飾凡屨之飾如繡次也黃屨白飾白屨黑飾黑屨青飾絇謂之拘著舄屨之頭以為行戒繶縫中紃純緣也天子諸侯吉事皆舄其餘唯服冕衣翟著舄耳士爵辨纁屨黑絇繶純尊祭服之屨飾從繢也素屨者非純吉有凶去飾者言葛屨明有用皮時疏曰素屨者大祥時所服去飾也葛屨自赤舄以下夏則用葛為之若冬則用皮為在素屨下者欲見素屨亦用葛與皮也繶於力反句音劬著服之著丁庶反絇音劬純章允反下同緣悅面反著舄之著知略反辨外內命夫命婦之命屨功屨散屨注曰命天之命屨纁屨命婦之命屨黃屨以下功屨次命屨于孤卿大夫則白屨黑屨九嬪內子亦然世婦命婦以黑屨為功屨女御士妻命屨而已士及士妻謂再命受服者散屨亦謂去飾鄭志趙商問司服王后六服之制目不解請圖之答曰大裘袞衣鷩衣毳衣絺衣𤣥衣此六服皆纁裳赤舄韋辨衣以韎皮辨衣以布此二辨皆素裳白舄冠辨服黑衣裳而黑舄冠辨𤣥端褘衣𤣥舄首服副從王見先王揄翟青舄首服副從王見先公闕翟赤舄首服副從王見羣小祀鞠衣黃屨首服編以告桑之服袒衣白屨首服編以禮見王之服緣衣黑屨首服次以御于王之服后服六翟三等三舄𤣥青赤鞠衣以下三屨黃白黑婦人質不殊裳屨舄皆同裳色也韎音妹凡四時之祭祀以宜服之注曰祭祀而有素屨散屨者惟大祥時王光逺曰夏葛冬皮此隨時之宜吉祭用赤舄命屨之等喪祭有素屨散屨此隨事之宜夏采掌大喪以冕服復于大祖以乘車建綏復于四郊注曰求之王平生常所有事之處乘車玉路于太廟以冕服不出宫也四郊以綏出國門此行道也鄭司農云復謂始死招魂復魄大祖始祖廟也故書綏為􅩽杜子春云當為綏􅩽非是也𤣥謂明堂位曰凡四代之服器魯兼用之有虞氏之旗夏后氏之綏則旌旗有是綏者當作緌字之誤也緌以旄牛尾為之綴於橦上所謂注旄于干首者王祀四郊乘玉路建大常今以之復去其旒異之于生亦因先王有徒緌者士冠禮及玉藻冠緌之字故書亦多作綏者今禮家定作㽔疏曰復者各依命數天子則十二人各服朝服黃文叔曰夏采掌復無他事也特建一官者生事盡而死事始也曾子曰而今而後吾知免夫宋穆公曰䙷保首領以沒于地人主能保其身至此而冢宰之責盡矣復扶又反􅩽音維橦直江反朝直遙反䙷得同朱子曰冢宰一官兼領王之膳服嬪御此最是設官之深意蓋天下之事無重于此又曰冢宰一篇周公輔道成王垂法後世用意最深切處欲知三代人主正心誠意之學于此可見其實坡謂自冢宰至此六十三職或掌其要焉或専而司焉或聨而治焉則分職之事也夫冢宰二王經理天下而諸官所掌不越于居處服御財賦絲麻之事嗚呼此聖人之議道自已者也夫飲食男女人之大欲存焉然等而下之至于庶人推而進之至于公卿或有所制故不敢縱或有所求而未必逞若王者尊為天子富有四海何求而不應哉何憚而不為哉以是大欲而勢足以恢其邪心無制節謹度于以治天下國家焉吾不知其可也周公立冢宰以統百官以均四海而知百官之得其統四海之得其均其要在王身而不外也先以宫室安其身焉次以飲食理其體焉繼以賦式節其用焉終以內宫佐其德焉析其事則至纎至悉若無關于政治之要合其大則本末兼修內外交飭其至醇至備者乎一之以大宰之權分之以小宰內宰之任一起居一飲食一貨用一擇採進御多寡豐約用舍去取大臣皆得與聞之而天子不得以自私女子小人不得以竊惑而又司是官者或以德進或以藝揚無邪辟以蕩王心無壬人以道其惡則上知之君就焉而益正中材之主守焉而寡過蓋正心誠意之極功而天下之治本于此人主所宜深思而躬行哉辟芳益反上知之知音智坡又謂有文字來首部為易而上經始于飲食下經始于男女皆根本于天地而推其極于世變故禮運究論天道人情得失死生要歸于飲食男女內則言后王降德兆民亦委折陳此二事之數皆與冢宰之職不少異焉然則自羲皇以迄三古墳典微言聖聖相授所以議道自已錫福于民舍是無大者矣深察乎此斯為格致深體乎此斯為誠正藏恕而行斯為齊治均平君人修之則建極有柄持為臣知之則致主有本末儒者辨此則講學有實義故齊宣病好貨好色不能至王孟子教以好與民同于王何有古者人上之所以自審聖賢之所以格非不能外此而他有所指也程朱發太極西銘之理尊大學為入德之門不過欲天子至于庶人明于天性知其不容已與不可易而安處善樂循理耳朱子曰所以為教皆本于人君躬行心得之餘不待求之民生日用彝倫之之外不既明且至乎後儒詆冢宰輔王當啓以窮理正心此經所職皆非其要似矣然坡考數百年中學者恃理橫豎鮮有要領徒以搜章劀句為格致𡨕目端坐為誠正彼又未必能然即或能之亦何所至所以達而進說適以激人主之厭怒隱而授經適以誤後生若存若亡而無精明的確親切至到之效噫發口必罵漢儒豈知所執又出其下之下乎至王于王俱去聲詆音邸周禮述注卷五
