body:
  text: 周禮述註卷四安溪李光坡撰宫人掌王之六寢之脩註曰六寢者路寢一小寢五路寢以治事小寢以時燕息焉疏曰諸侯則三寢路寢一燕寢一側室一脩掃除也為其井匽除其不蠲去其惡臭井漏井所以受穢今之滲坑匽豬今之陰溝説文匽匿也蠲猶潔也匽於建反蠲古𤣥反滲所䜟反豬音諸共王之沐浴凡寢中之事埽除執燭共爐炭凡勞事註曰勞事勞褻之事埽掃本字四方之舍事亦如之註曰從王適四方及會同所舍易氏曰夙興夜寐洒掃庭内衛武以為荒耽之警子有庭内弗洒弗掃晉昭以不能修正國之道朝廷内外之肅正君臣上下儆戒之機豈細故哉掌舍掌王之會同之舍設梐枑再重梐枑謂行馬設三木中聨之交互樹之以為遮欄行馬再重者以周衛有内外别疏曰此梐枑所施唯據下文車宫壝宫止宿而言其帷宫無宫暫止之間未必有此梐枑也設車宫轅門註曰謂王行止宿險阻之處備非常次車以為藩則仰車以其轅表門為壇壝宫棘門謂王行止宿平地築壇壇邊低垣圍繞者曰壝棘門以㦸為門為帷宫設旌門註曰謂王行晝止有所展肆若食息張帷為宫則樹旌以表門無宫則共人門註曰謂王行有所逢遇若住遊觀陳列周衛則立長大之人以表門凡舍事則掌之註曰王行所舍止梐步禮反枑戸故反重直龍反壝唯季反幕人掌帷幕幄帟綬之事王出宫則有是事帷在旁施之像土壁也幕則帷上張之像舍屋也帷幕皆以布為之四合像宫室曰幄王所居之帳也帷幕之内設之帟主在幕若幄中坐上承塵幄帟皆以繒為之綬絛也凡四物者以綬連繫焉幄烏學反帟音亦絛音叨凡朝覲會同軍旅田役祭祀共其帷幕幄帟綬註曰共之者掌次當以張大喪共帷幕帟綬註曰為賓客飾也帷以帷堂或與幕張之于庭帟在柩上三公及卿大夫之喪共其帟註曰唯士無帟王有恵則賜之檀弓曰君於士有賜帟疏曰此云三公不云諸侯與孤下掌次云諸侯與孤不云三公者三公即是諸侯再重此不云孤孤與卿大夫同不重幕人不張故畧不言掌次掌王次之灋以待張事註曰灋大小丈尺疏曰待張事者王出則幕人以帷與幕等送至停所掌次張之王大旅上帝則張氊案設皇邸註曰大旅上帝祭天於圜丘國有故而祭亦曰旅此以旅見祀也張氊案以氊為牀于幄中鄭司農云皇羽覆上邸後版也𤣥謂後版屏風與染羽象鳳皇羽色以為之疏曰案謂牀也牀上著氊即謂之氊案鄭云于幄中則知不徒設氊案皇邸而已明知并有大次小次之幄與下祀五帝互見之也朝日祀五帝則張大次小次設重帟重案合諸侯亦如之註曰朝日春分拜日于東門之外祀五帝于四郊次謂幄也大幄初往所止居也小幄謂接祭退俟之處祭義曰周人祭日以朝及闇雖有强力孰能支之是以退俟與諸臣代有事焉合諸侯于壇王亦以時休息重帟復帟重案牀重席也鄭司農云五帝五色之帝疏曰大幄小幄幄在幕中既有幄明有帷幕可知云重案不言氊及皇邸亦有可知上氊案不言重席亦有重席可知互見為義邸當禮反朝直遙反註同著直畧反師田則張幕設重帟重案註曰不張幄者於是臨誓衆王或回顧瞻察諸侯朝覲會同則張大次小次註曰大次亦初往所止居小次即宫待事之處疏曰此謂與諸侯張之四時常朝在國内今言朝覲㑹同為會同而來故在國外與大宰大朝覲㑹同一也王於合諸侯如祭祀則諸侯從王祭祀亦與㑹同同師田則張幕設案疏曰承上諸侯謂諸侯從王而師田者則掌次為張之案不言重則無重席亦應有單席也孤卿有邦事則張幕設案註曰有邦事謂以事從王若以王命出也孤王之孤三人副三公論道者不言公公如諸侯禮從王祭祀合諸侯張大次小次師田亦張幕設案凡喪王則張帟三重諸侯再重孤卿大夫不重註曰張帟柩上承塵疏曰言凡者以其王已下至大夫兼有后及三夫人已下后與王同三重世子三夫人與諸侯再重九嬪二十七世婦與孤卿大夫同不重一而已八十一御妻與士同無帟有賜乃得帟也此諸侯謂三公王子母弟若畿外諸侯掌次不張之凡祭祀張其旅幕尸次註曰旅衆也公卿以下即位所祭祀之門外以待事為之張大幕尸則有幄鄭司農云尸次祭祀之尸所居更衣帳射則張耦次註曰耦俱升射者次在洗東大射曰遂命三耦取弓矢于次疏曰天子大射六耦在西郊賓射亦六耦在朝燕射三耦在寢此六耦三耦據諸侯射者若衆耦則多但無常數耳掌凡邦之張事史直翁曰帷幕幄帟所用非一處用罷則徹之而復用其為費亦小矣後世離宫别館竭萬家生養之資為一日巡幸之備嗚呼無惑乎生民息肩之無日也大府掌九貢九賦九功之貳以受其貨賄之入頒其貨于受藏之府頒其賄于受用之府九功謂九職也内府曰受藏外府曰受用凡貨賄皆藏以給用耳或言受藏或言受用又雜言貨賄皆互文凡官府都鄙之吏及執事者受財用焉執事謂為官執掌其事須有營造合用官物者三者皆受于大府而大府頒之故下文遂言頒財藏才浪反註受藏同凡頒財以式灋授之闗市之賦以待王之膳服邦中之賦以待賓客四郊之賦以待稍秣家削之賦以待匪頒邦甸之賦以待工事邦縣之賦以待幣帛邦都之賦以待祭祀山澤之賦以待喪紀幣餘之賦以待賜予註曰待猶給也此九賦之財給九式者膳服即羞服也稍秣即芻秣也謂之稍稍用之物也喪紀即喪荒也賜予即好用也鄭司農云幣餘使者有餘來還也坡謂以九賦待九式者酌其所費之豐約而以所入之多少當之闗市之賦列于首尊王者之膳服也邦甸序在家削之先今次于下恐或文錯秣音末削梢去聲予音與後凡賜予同好呼報反使色吏反凡邦國之貢以待弔用註曰此九貢之財所給也給弔用給凶禮之五事疏曰案大行人六服因朝所貢之物與大宰九貢歲之常貢雖曰時節不同貢物有異要亦入弔用之數凡萬民之貢以充府庫註曰此九職之財充猶足疏曰九貢言入弔用九賦言入九式有餘財亦入府庫凡式貢之餘財以共玩好之用凡邦之賦用取具焉此謂先給九式及弔用足府庫而有餘財乃可以共玩好玩好非共耳目之玩也宗廟之鎮器天府之守器諸侯之分器皆取于是以其可玩也故曰玩好言式言貢互文賦用用賦也凡邦之賦用取具如軍旅之費田役施恵之費百府有司禄廩之費凡九式所不載者皆取具于式貢之餘財也歲終則以貨賄之入出會之會古外反或問此官有九賦九功之别司會有田野民職之令取于民者有二焉鄭君以九功為九職之貢以九賦為口率出泉信乎曰口率出泉漢灋也秦廢井田始舍地而税人漢因而不改豈可以為斷于經乎班固食貨志曰有賦有税税謂公田什一及工商虞衡之入也顔師古註之曰賦謂訏口𤼵財合斯二者與鄭君之云不少異焉朱子井田類説中引用班顔之言是然之與雖然愚竊疑之既借其力以税什一復計其口而算之泉乃追求無藝即頭會箕斂不當復譏之是乃先王之制矣愚嘗攷諸司徒政斂之官所得于民似有貢賦二事載師職云園廛二十而一之等即此九賦也閭師職云命農以耕事貢九穀之等即此九功也園廛二十而一之等曰任地與司會以九賦令田野之財用一也命農貢九穀之等曰任民與司㑹以九功令民職之財用一也聞之曰不責之賦則將有地不毛有田不耕而不能無曠土不使之貢則將不畜不種不耕不蠶而不能無游民斯言殆得之矣曰既有地畝之征又有九穀之貢是取于公而又斂其私也然則魯宣税畝何以譏其初曰九賦所稅入者上之宜得也於私田非有取焉百畝之産其制民厚矣彼農于四時之間高原下隰所宜種而有得者則貢之等諸烹葵剝棗致其愛耳等諸工商嬪婦致其有耳豈横斂歟且不著其數盖惟視有無不責多寡是亦微矣税畝之云未之思耶曰似矣九賦有山澤之賦有闗市之賦而閭師又有商貢貨賄衡貢山物虞貢澤物然則賦貢將何别曰九賦之山澤者山農澤農也闗市之征廛布也閭師山澤之貢則絺紵羽翮之等闗市之貢則財征也是亦别矣曰言邦中四郊甸稍縣都則山田澤田舉之矣何以特出山澤而别為賦目與曰有二説焉山澤髙下其經界制畝之方與夫天期地澤之利皆不同平土故楚司馬蒍掩度山林鳩藪澤牧隰臯井沃衍皆别為經治猶此意也又王者封國名山大澤不以封山澤利遍九州為賦至廣不盡于畿内所有而已此所以别也或問九賦以待九式九貢以待弔用其用悉矣藉有所餘何足以當師田禄廩之大事乎曰以某財待某事先王示人有節之道耳非必盡用也王畿百同之地所入至廣邦國之貢為財亦多如九式者天子既儉于自奉至子待人事神禮雖從豐亦灋無過濫邦國弔用不時之舉度其財之所出未足以費其所入之四五也曰師田禄廪何以不為式曰禄廩至繁不可限以一賦軍旅無常不可待似經賦故不為式也曰或謂周官軍旅之行皆人自齎糧信乎曰是何言與軍旅之行廩人給之米穀外府與之邦布遺人待以委積委人共其薪蒸木材皆上之為之也言自齎者徴以何文乎嗚呼語焉不詳厲民者豈徒國服之息蒍音委玉府掌王之金玉玩好兵器凡良貨賄之藏註曰良善也此物皆式貢之餘財所作好呼報反藏才浪反共王之服玉佩玉珠玉記云大圭長三尺天子服之服玉大圭也佩玉佩于革帶之上佩玉有葱衡衡横也以葱玉為横梁又以組縣于衡之兩頭兩組之末皆有半璧曰璜以一組縣于衡之中央于末著衝牙使前後觸璜衡璜之外别有琚瑀琚瑀所置在縣衝牙組之中央又以兩組穿于琚瑀之内角斜繫于衡之兩頭于組末繫于璜凡組繩五皆蠙珠以内其間珠玉琢玉為珠也王之五冕旒數不同而玉皆十二又有皮弁韋弁冠弁其㑹玉亦十二著直畧反琚音居瑀音羽縣音懸以内之内音納王齊則共食玉註曰玉是陽精之純者食之以禦水氣鄭司農云王齊當食玉屑齊音齋大喪共含玉復衣裳角枕角柶含玉璧形而小以為口實復招魂也衣裳生時服角枕以枕尸角柶角匕也以楔齒楔齒者令可飯含含戸暗反註同楔先結反飯扶晚反掌王之燕衣服衽席牀笫凡褻器註曰燕衣服者巾絮寢衣袍襗之屬皆良貨賄所成笫簀也鄭司農云衽席單席也褻器溲器虎子之屬笫側美反襗音澤若合諸侯則共珠槃玉敦註曰敦槃類珠玉以為飾合諸侯者必割牛耳取其血㰱之以盟珠槃以盛牛耳尸盟者執之玉敦㰱血玉器疏曰合諸侯者謂時見曰㑹鄭剛中曰周公當成周盛時六服羣辟罔不承徳而設官使共合諸侯㰱血之器何耶聖人防患之意以為盛者有時而衰合者有時而散故盟㑹㰱血之事亦有時而不免然則待衰世慮後患逺矣敦音對盛牛之盛音成見音現凡王之獻金玉兵器文織良貨賄之物受而藏之註曰謂百工為王所作可以獻遺諸侯古者致物於人尊之則曰獻通行曰饋春秋傳曰齊侯來獻戎捷尊魯也文織畫及繡錦織音志凡王之好賜共其貨賄疏曰謂王于羣臣有恩好因燕飲而賜之者也王介甫曰此既言共王好賜之貨賄内府又言共王及冢宰之好賜予者凡王以玉府所受好賜玉府共之以内府所受好賜内府共之内府掌受九貢九賦九功之貨賄良兵良器以待邦之大用受受之大府也良兵謂弓矢殳矛戈㦸五兵之良者良器謂車乘及禮樂器之善者此冬官所作亦由大府而來大用九式及弔用也殳音殊凡四方之幣獻之金玉齒革兵器凡良貨賄入焉註曰諸侯朝聘所獻國珍疏曰此因朝聘而貢先入子掌貨賄入其要于大府乃始通之于内府也陳及之曰玉府内府所掌金玊兵器良貨賄一也必分于二官者盖玉府所掌皆式貢餘財所作及獸人漁人所入之物専以共王玩好及賜予耳邦之大用不與焉内府所掌乃九貢九功之貨賄及諸侯所獻國珍皆公家物以待邦之大用所以分于二官好呼報反下同與音預凡適四方使者共其所受之物而奉之適四方使者謂使公卿大夫聘問諸侯若大行人間問省頫之等物疏云即玉府王之獻金玉巳下是也或云即所受之幣獻以貽之盖各以國之所無者分錯交送坡謂二説相須其義始備使所吏反頫音眺凡王及冢宰之好賜予則共之註曰冢宰待四方賓客之小治或有所善亦賜予之外府掌邦布之入出以共百物而待邦之用凡有灋者註曰布泉也布讀為宣布之布其藏曰泉其行曰布取名于水泉其流行無不徧入出謂受之復出之共百物者或作之或買之待猶給也坡謂邦用有灋者如下文所云皆是也此官掌藏國家鼓鑄之布然九賦九功之税民有不出粟米麻絲而或以布代者當亦入于此府共王及后世子之衣服之用凡祭祀賓客喪紀會同軍旅共其財用之幣齎賜予之財用註曰齎行道之財用也聘禮曰問幾月之齎鄭司農云齎或為資今禮家定齎作資𤣥謂齎資同耳其字以齊次為聲從貝變易古字亦多或疏曰賜予之財用亦謂王于羣臣有所恩好賜予之也齎音咨好呼報反凡邦之小用皆受焉註曰皆來受疏曰外府所内泉布所積既少有小用則給之若大用即取餘府内音納歲終則會唯王及后之服不㑹司㑹掌邦之六典八灋八則之貳以逆邦國都鄙官府之治以九貢之灋致邦國之財用以九賦之灋令田野之財用以九功之灋令民職之財用以九式之灋均節邦之財用九賦令田野者有田則有賦也九功令民職者有職則有貢也詳在地官載師閭師二職自六典至九式七者皆冢宰掌其正司會則執其貳以佐之如此也㑹古外反下同掌國之官府郊野縣都之百物財用凡在書契版圖者之貳以逆羣吏之治而聴其會計註曰郊四郊去國百里野甸稍也甸去國二百里稍三百里縣四百里都五百里書謂簿書契其最凡也版戸籍也圖土地形象田地廣狹疏曰此書契版圖下文司書掌其正此司會主鉤攷故掌其副貳徐氏曰百物財用皆有書契版圖焉案以鉤校其征斂之虧完放散存積之多少吏治之寛刻亷貪也坡謂此節承九賦九功九式三者上既令之此則逆而聴之也鉤居侯反以參互攷日成以月要攷月成以歲會攷歲成坡謂宰夫職歲終則令羣吏正歲會月終則令正月要旬終則令正日成而以攷其治則此經不獨言㑹計財用之灋乃承上文掌八灋八則以逆官府都鄙之治者如此也參互相參交互也以周知四國之治坡謂周猶徧也承上文以六典逆之以九貢致之所以周知四國之治否也以詔王及冢宰廢置坡謂總結上文司書掌邦之六典八灋八則九職九正九事邦中之版土地之圖九正謂九貢九賦正税也九事九式也以用財言之則曰式以用財所為之事言之則曰事一也此一經為下文之總目疏曰此所掌與司會同者以其司㑹主鉤攷司書掌書記之司書所記司會鉤攷之故二官所掌其事通焉正音征註同以周知入出百物以敘其財受其幣使入于職幣敘猶比次也受謂受錄其餘幣而為之簿書使之入于職幣也夫九職九正百物之入也知其入以敘其財者職内事也九事百物之出也知其出以敘其財者職歲事也受其餘幣而藏之者職幣事也司書為三官書記之長故周知之受之凡上之用財用必攷于司會註曰上謂王與冢宰王雖不會亦當知多少而闕之司會以九式均節邦之財用坡謂以周知至此即司會所掌官府之百物財用也長音掌三歲則大計羣吏之治以知民之財器械之數以知田野夫家六畜之數以知山林川澤之數以逆羣吏之徴令註曰械猶兵也逆受而鉤攷之山林川澤童枯則不税疏曰三年一閏天道小成攷校羣吏須有黜陟知民之財器已下川澤已上恐其羣吏濫徴斂萬民故知此本數乃鉤攷其徴令也坡謂此一經即司會所掌郊野縣都之百物財用也以知民財巳下以書契版圖知之也李景齊曰豳風陳王業孟子論王道可見古人皆以民事為先吾觀冢宰三歲大計意其必功過之大者至司書之職而後知其所計者但如此耳先王之致意于民事何如也後世課羣吏者責辦賦税與夫簿書獄訟之末民生之厚與否田野之闢與否不恤也安識成周計吏之本意凡税斂掌事者受灋焉及事成則入要貳焉註曰灋猶數也應當税者之數成猶畢也疏曰凡税斂者謂若地官閭師旅師徴斂之官必來受灋又入要貳者以司書知財器已下之數擬後鉤攷之也凡邦治攷焉以其自六典至版圖無不掌其書故皆此乎攷也職内掌邦之賦入辨其財用之物而執其總以貳官府都鄙之財入之數以逆邦國之賦用掌賦入者謂九職九貢九賦之税入皆掌之賦乃總名下言賦者皆此類也辨財用之物處之使種類相從總謂簿書之種别與大凡官府財入謂内府外府之屬凡入貨賄者皆是都鄙財入蓋縣都財賦留其處以待用而其副皆在職内賦用用賦也凡受財者受其貳令而書之受財受于大府也貳令者大府一令與其人為信至某府受財一為副令下職内登書以備鉤攷若今時之有存案及會以逆職歲與官府財用之出疏曰職歲主出職内主入以已入財之數鉤攷職歲出財之數與職歲出財與官府所用之數竝鉤攷之也㑹古外反而敘其財以待邦之移用註曰亦鉤攷今藏中餘見為之簿移用謂轉運給他坡謂詳此官竝非職藏之府夫内府掌貢賦外府掌邦布財之良不良皆舉之矣安得更有不良者藏自職内乎且内府外府掌其入亦掌其出則未知職歲之所出又果何財也然則職内職歲二官與司會司書為類明是掌文書以鉤攷出内之會計竝無府義也鄭子以為府者盖因職幣振斂餘財以例此二官故以為府耳然而可疑矣藏才浪反藏自之藏讀本字内音納職歲掌邦之賦出以貳官府都鄙之財出賜之數以待會計而攷之註曰以貳者亦如職内書其貳令而編存之出出以給用也賜用以賜予也凡官府都鄙羣吏之出財用受式灋于職歲註曰百官之公用式灋多少職歲掌出之舊用事存焉坡謂以出數之貳在此也凡上之賜予以敘與職幣授之註曰敘受賜者之尊卑坡謂以賜數之貳在此也及會以式灋贊逆會疏曰司會逆羣吏之治而聴其會計此官主式灋出財用故以此助之職幣掌式灋以斂官府都鄙與凡用邦財者之幣註曰幣謂給公用之餘凡用邦財者謂軍旅振掌事者之餘財振收也掌事謂以王命有所作為上斂幣者日用經費之餘也此振財者有興作之事而餘也言斂言振變易句名皆辨其物而奠其錄以書楬之以詔上之小用賜予註曰奠定也定其錄籍鄭司農云楬之若今時為書以著其幣楬其列反著張恕反歲終則會其出凡邦之會事以式灋贊司裘掌為大裘以共王祀天之服註曰鄭司農云犬裘黑羔裘服以祀天示質疏曰祭服皆𤣥上纁下明此裘亦羔之黑者大裘之上又有𤣥衣與裘同色坡謂直言祀天不及于地經既無文註亦不言惟疏云崑崙神州亦用大裘程子曰元祐時議北郊只為五月間天子不可服大裘皆以為難行案宗伯司服云祀昊天上帝則服大裘而冕祀五帝亦如之若以五月祀地大裘難服則四月赤帝六月黄帝服之其可乎盖祀地之時其冕如大裘之冕其服如大裘上之𤣥衣𤣥衣之内不復有大裘也赤帝黄帝疑亦當爾故楊氏曰蒼璧黄琮以象天地之性者不容不異冕服王之所服以事天地不容不同但夏至不用大裘耳屨人之屨猶辨四時之宜則冕服可知矣斯言是也又聞之兄云社者祭地司服云祭社稷以希冕則希冕祭地昭然矣若以父天母地冕服不宜下于四望山川則諸侯相待子男醯醢八十罋至待聘卿子男之卿亦百罋臣乃多君何與禮有損之而益王者尊天親地未可以是泥也存此二説以俟正焉纁音熏中秋獻良裘王乃行羽物註曰良善也中秋鳥獸㲝毨因其良時而用之鄭司農云良裘王所服也𤣥謂良裘玉藻所謂黼裘與羽物小鳥鶉雀之屬鷹所擊者中秋鳩化為鷹中春鷹化為鳩順其始殺與其將止而大班羽物疏曰為八月誓獮田所用故獻之季秋獻功裘以待頒賜註曰功裘人功微觕謂狐青麛裘之屬鄭司農云功裘卿大夫所服中音仲註同㲝音毛毨先典反鶉音淳獮息淺反觕麤同音粗麛音迷王大射則共虎侯熊侯豹侯設其鵠諸侯則共熊侯豹侯卿大夫則共麋侯皆設其鵠註曰大射者為祭祀射王將有郊廟之事以射擇諸侯及羣臣與邦國所貢之士可以與祭者射者可以觀徳行其容體比于禮其節比于樂而中多者得與於祭諸侯謂三公及王子弟封于畿内者卿大夫亦皆有采地焉其將祀其先祖亦與羣臣射以擇之凡大射各于其射宫侯者其所射也以虎熊豹麋之皮飾其側又方制之以為準謂之鵠著于侯中所謂皮侯王之大射虎侯王所自射也熊侯諸侯所射豹侯卿大夫以下所射諸侯之大射熊侯諸侯所自射豹侯羣臣所射卿大夫之大射麋侯君臣共射焉凡此侯道虎九十弓熊七十弓豹麋五十弓列國之諸侯大射大侯亦九十糝七十豻五十逺尊得伸可同耳所射正謂之侯者天子中之則能服諸侯諸侯以下中之則得為諸侯侯中之大小取數于侯道鄉射記曰弓二寸以為侯中則九十弓者侯中廣丈八尺七十弓者侯中廣丈四尺五十弓者侯中廣一丈考工記曰梓人為侯廣與崇方參分其廣而鵠居一焉然則侯中丈八尺者鵠方六尺侯中丈四尺者鵠方四尺六寸大半寸侯中一丈者鵠方三尺三寸少半寸謂之鵠者取名于鳱鵠鳱鵠小鳥而難中是以中之為雋亦取鵠之言較較者直也射所以直巳志用虎熊豹麋之皮示服猛討迷惑者射者大禮故取義衆也士不大射士無臣祭無所擇疏曰此經不云孤孤六命亦與卿同與音預下得與同行下孟反比毗志反下同中丁仲反下天子中之以下中之而難中以中皆同所射之射食亦反下自射所射共射皆同正音征下同豻音鴈鳱音鴈大喪廞裘飾皮車註曰皮車遣車之革路廞興也若詩之興謂象似而作之凡為神之偶衣物必沽而小耳疏曰裘謂明器中之裘即上良裘功裘等飾皮車者亦謂明器之車以皮飾之廞音歆興去聲凡邦之皮事掌之歲終則會唯王之裘與其皮事不會掌皮掌秋斂皮冬斂革春獻之註曰皮革踰歲乾久乃可用獻之獻其良者于王以入司裘給王用疏曰獸皮治去其毛曰革秋歛皮者鳥獸毛毨之時其皮善故秋斂之革須治用功深故冬斂之遂以式灋頒皮革于百工疏曰良者入司裘其餘入百工因上事故云遂也式灋作物所用多少故事百工者冬官裘氏韋氏函人之類用皮者也共其毳毛為氈以待邦事毳毛毛細縟者共與冬官使作氈與掌次也邦事祭祀合諸侯之事歲終則會其財齎註曰財斂財本數及餘見者齎所給予人以物曰齎今時詔書或曰齎計吏疏曰財與齎二者竝據皮革而言見賢遍反予音與内宰掌書版圖之灋以治王内之政令均其稍食分其人民以居之註曰版謂宫中閽寺之屬及其子弟錄籍也圖王及后世子之宫中吏官府之形象也政令謂施閽寺者稍食吏禄廩也人民吏子弟分之使衆者就寡均宿衛疏曰書書之于版也内宰所均稍食謂閽寺及子弟宿衛後宫者宫正所均謂宿衛王宫者易彦祥曰秋官掌戮云宫者使守内盖王内之職惟内小臣奄四人為上士其餘皆非命士則皆人民也以陰禮敎六宫註曰鄭司農云陰禮婦人之禮𤣥謂六宫謂后也婦人稱寢曰宫宫𨼆蔽之言后象王立六宫而居之亦正寢一燕寢五敎者不敢斥言之謂之六宫若今稱皇后為中宫矣昏禮母戒女曰夙夜毋違宫事以陰禮敎九嬪註曰敎以婦人之禮不言敎夫人世婦者舉中省文以婦職之灋敎九御使各有屬以作二事正其服禁其竒衺展其功緒註曰婦職謂織紝組紃縫線之事九御女御也九九而御于王因以號焉使之九九為屬同時御又同事也正其服止踰侈竒衺若今媚道展猶錄也緒業也二事謂絲枲之事疏曰上文世婦以上皆直言陰禮不言職此言職者以其世婦已上貴無絲枲等職業之灋故也案詩註云王后織𤣥紞公侯夫人紘綖卿之内子大帶大夫命婦成祭服士妻朝服庶人已下各衣其夫貴賤皆有職者彼示雖貴無得遊手率先之意非如此絲枲二事責其功緒也毋違之毋音無紝女金反組音祖紃似倫反紞都感反紘音横綖音延大祭祀后祼獻則贊瑤爵亦如之註曰謂祭宗廟王既祼后乃從後祼也祭綂曰君執圭瓚祼尸大宗執璋瓚亞祼謂夫人不與而攝耳獻謂王薦腥薦熟后亦從後獻也瑤爵謂尸卒食王既酳尸后亞獻之其爵以瑤為飾正后之服位而詔其禮樂之儀註曰薦徹之禮當與樂相應位謂房中戸内及阼所立處疏曰服謂褘衣已下六服正之使服當其用贊九嬪之禮事註曰助九嬪贊后之事九嬪者贊后薦玉齍薦徹豆籩不與之與音預褘音揮凡賓客之祼獻瑤爵皆贊註曰謂王同姓及二王之後來朝覲為賓客者祼之禮亞王而禮賓獻謂王饗燕亞王獻賓也瑤爵所以亞王酬賓也坊記曰陽侯殺繆侯而竊其夫人故大饗廢夫人之禮致后之賓客之禮賓客謂諸侯來朝覲及畿内同姓諸侯之夫人會見王后皆是也禮謂牢禮致禮者使下大夫此内宰下大夫也繆音穆凡喪事佐后使治外内命婦正其服位註曰使使其屬之上士内命婦謂九嬪世婦女御鄭司農云外命婦卿大夫之妻王命其夫后命其婦𤣥謂士妻亦為命婦疏曰喪言凡則王及后世子以下皆是服位者服之精觕位之先後凡建國佐后立市設其次置其敘正其肆陳其貨賄出其度量淳制祭之以陰禮市朝者君所以建國也建國者必面朝後市王立朝而后立市陰陽相承之義次謂吏所治舍司次介次也敘市行列也正其肆者物各異肆正之使不雜也陳猶處也謂有諸物皆陳列之度丈尺也量豆區之屬淳謂幅廣也制謂匹長淳制天子巡狩禮所云制幣丈八尺純四咫也陰禮婦人之祭禮一曰陰禮者市中之祍先后所立社也王次㸃曰此特體地道以始立市耳既立則后何預其事純諸允反中春詔后帥外内命婦始蠶于北郊以為祭服註曰蠶于北郊婦人以純陰為尊郊必有公桑蠶室焉張敬夫曰嘗攷周家立國自后稷以農為務厯世相𫝊其君子則重稼穡之事其室家則躬織紝之勤相與咨嗟嘆息服習乎艱難咏歌乎勞苦此實王業之根本也故誦服之無斁之章則知周之所以興誦休其蠶織之章則知周之所以衰以是意而攷後世治亂成敗之原皆可得而見矣中音仲斁音亦歲終則㑹内人之稍食稽其功事内人主謂九御功事絲枲之事既均其稍食歲終則會之既展其功緒歲終則稽之佐后而受獻功者比其小大與其麤良而賞罰之註曰獻功者九御之屬典婦功曰及秋獻功王介甫曰小大比其制麤良比其功會内宫之財用註曰計夫人已下所用財正歲均其稍食施其事功憲禁令于王之北宫而糾其守註曰均猶調度也施猶班也北宫后之六宫謂之北宫者繫于王言之明用王之禁令令之守宿衛者憲音懸度待洛反或如字上春詔王后帥六宫之人而生穜稑之種而獻之于王註曰六宫之人夫人以下分居后之六宫者古者使后宫藏種以其有𫝊類蕃孶之祥必生而獻之示能育之使不傷敗且以佐王耕事共禘郊也鄭司農云先種後熟謂之穜後種先熟謂之稑王當以耕種于藉田𤣥謂詩云黍稷穜稑是也夫人以下分居后之六宫者每宫九嬪一人世婦三人女御九人其餘九嬪三人世婦九人女御二十七人從后唯其所燕息焉從后者五日而沐浴其次又上十五日而徧云夫人如三公從容論婦禮疏曰上春者亦謂正歲以其春事將興故云上春也穜直龍反稑音六種章勇反孳音兹内小臣掌王后之命正其服位註曰命謂使令所為或言王后或言后通耳后出入則前驅疏曰此小臣是奄人與后導道是其常也若有祭祀賓客喪紀則擯詔后之禮事相九嬪之禮事正内人之禮事徹豆之俎註曰擯為后𫝊辭有所求為詔相正者異尊卑也俎謂后受尸之爵飲于房中之俎疏曰詔相正皆是上擯但據尊卑不同故以詔相别之相息諒反註同后有好事于四方則使往有好令于卿大夫則亦如之註曰后於其族親所善者使往問遺之邱氏曰好事以財問遺也好令以言問勞也好呼報反下同遺唯季反勞去聲掌王之陰事陰令註曰陰事羣妃御見之事若今掖庭令晝漏不盡八刻日錄所記推當御見者陰令王所求為于北宫見賢遍反閽人掌守王宫之中門之禁中門于外内為中雉門也王有五門外曰臯門二曰庫門三曰雉門四曰應門五曰路門路門一曰畢門坡謂上序官言毎門此言中門者盖舉中以例之喪服凶器不入宫潛服賊器不入宫竒服怪民不入宫註曰喪服衰絰也凶器明器也潛服若衷甲者賊器盜賊之任器兵物皆有刻識竒服衣非常怪民狂易識式志反易以豉反凡内人公器賓客無帥則幾其出入以時啓閉註曰三者之出入當須使者符節乃行鄭司農云公器將持公家器出入者幾謂無將帥引之者則苛其出入時漏盡使色吏反將子匠反苛呼河反凡外内命夫命婦出入則為之闢註曰辟行人使無干也内命夫卿大夫士之在宫中者掌埽門庭註曰門庭門相當之地疏曰閽人掌中門唯中門外之地謂之門庭也若餘門庭則各有守門者埽之大祭祀喪紀之事設門燎蹕宫門廟門註曰燎地燭也蹕止行者廟在中門之外疏曰喪紀朝廟及出葬之時燎天子百公五十侯伯子男皆三十所作之狀盖百根葦皆以布纒之以蜜塗其上若今蠟燭矣凡賓客亦如之疏曰賓客在宫中廟中謂若享食在廟燕在寢寺人掌王之内人及女宫之戒令相道其出入之事而糾之註曰内人女御也女宫刑女之在宫中者糾猶割察也相息亮反下同道徒報反若有喪紀賓客祭祀之事則帥女宫而致於有司註曰有司謂宫卿世婦佐世婦治禮事註曰世婦二十七世婦掌内人之禁令内小臣於祭祀三者正内人之禮事此則禁令之使之如小臣所正也凡内人弔臨於外則帥而往立于其前而詔相之註曰從世婦所弔或自哭其族親立其前者賤也賤而必詔相之者出入于王宫不可以闕于禮内豎掌内外之通令凡小事註曰内后六宫外卿大夫也使童豎通王内外之命給小事者以其無與為禮出入便疾内外以大事聞王則俟朝而自復朝直遙反下同若有祭祀賓客喪紀之事則為内人蹕註曰内人從世婦有事于廟者内豎為六宫蹕者以其掌内小事疏曰此豎於三事為内人蹕者皆謂在廟時祭祀在廟謂禘祫四時之祭也賓客在廟謂享食時也喪紀在廟謂喪朝廟為祖奠遣奠時也王后之喪遷于宫中則前蹕及葬執褻器以從遣車註曰喪遷者將葬朝于廟褻器振飾頮沐之器疏曰及葬執褻器以從遣車者謂朝七廟訖且將行在天祖廟中為大遣奠苞牲取下體天子九牢苞九個遣車九乘后亦同使人持之往如墓遣車載牲體鬼神依之故使執褻器從之頮呼内反周禮述註卷四
