body:
  text: 周禮述註卷十安溪李光坡撰司門掌授管鍵以啓閉國門管籥鍵牡也入者為牡容者為牝管以閉而鍵以啓鍵其展反幾出入不物者正其貨賄凡財物犯禁者舉之註曰不物衣服視占不與衆同及所操物不如品式者正讀為征征税也犯禁謂商所不資者舉之沒入官陳及之曰犯禁即司市偽飾之灋在民商賈工者十有二是也正音征賈音古以其財養死政之老與其孤註曰財謂門闗之委積也死政之老死國事者之父母也孤其子祭祀之牛牲繫焉監門養之散祭祀之牲則不在牢繫于門使監門養之不必三月也監門門徒凡嵗時之門受其餘註曰鄭司農云受祭門之餘疏曰嵗之四時祭門非一故云凡以總之若月令秋祭門者是祭廟門此門亦謂國門十二者除四時祭外仍有為水祈禱故莊公二十五年秋大水有用牲于門之事監古銜反凡四方之賓客造焉則以告註曰造猶至也告告於王而止客以俟逆疏曰謂四方諸侯來朝覲至闗闗人告王至郊郊人告王至國門門人告王王得告皆遣人往迎司闗掌國貨之節以聯門市註曰貨節謂商本所𤼵司市之璽節也自外來者則案其節而書其貨之多少通之國門國門通之司市自内出者司市為之璽節通之國門國門通之闗門參相連以檢猾商猾音滑司貨賄之出入者掌其治禁與其征廛註曰征廛者貨賄之税與所止邸舍也闗下亦有邸舍其出布如市之廛疏曰司貨賄出入即上經以聫門市者也凡貨不出於闗者舉其貨罰其人註曰不出於闗謂從私道出辟税者則沒其財而撻其人辟音避凡所達貨賄者則以節傳出之註曰商或取貨於民間無璽節者至闗闗為之璽節及傳出之其有璽節亦為之傳傳如今移過所文書疏曰此文重釋上文國貨之節上直云璽節此經兼有傳國凶札則無闗門之征猶幾註曰鄭司農云凶謂凶年饑荒也札謂疾疫死亡也越人謂死為札春秋傳曰札瘥夭昏無闗門之征者出入闗門無租税猶㡬謂無租税猶苛察不得令姦人出入疏曰此司闗所掌兼言門者門闗同類無征是同司門既不言故於闗并言門也瘥才何反凡四方之賓客敂闗則為之告註曰謂朝聘者也敂闗猶謁闗人也敂猶至也鄭司農説以國語曰周之秩官有之曰敵國賓至闗尹以告行理以節逆之敂音叩有外内之送令則以節傳出内之有送令謂奉貢獻及文書以常事往來自王國來者以節傳出之自畿外入者以節傳内之出内傳内俱音納掌節掌守邦節而辨其用以輔王命註曰王有命則别其節之用以授使者輔王命者執以行為信王龜齡曰邦節者下文所謂玉節角節用之於内外諸侯虎節龍節人節用之於邦國使者符節璽節用之於司門司闗司市及鄉遂之間總而言之皆邦節也鄭以典瑞之珍圭牙璋等為邦節未知是否别彼列反使所吏反下同守邦國者用玉節守都鄙者用角節註曰玉節之制以命數為小大角用犀角其制未聞鄭剛中曰命為諸侯使守邦國者用玉節以輔之命為君長使守都鄙者用角節以輔之凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之註曰使節行道所執之信也土平地也山多虎平地多人澤多龍以金為節鑄象焉必自以其國所多者於以相别為信明也今漢有銅虎符杜子春云蕩當為帑謂以函器盛此節或曰英蕩畫函鄭剛中曰前言玉節角節則王命之守此言虎節人節龍節則王使者執行以為信王光逺曰掌節所掌謂之邦節以輔王命所謂邦國之使節使邦國者所執也小行人所達謂之天下之節則邦國都鄙使者所執非王官所掌坡謂雖非王官所掌其灋式亦必自掌節出帑吐黨反盛音成門闗用符節貨賄用璽節道路用旌節皆有期以反節註曰門闗司門司闗也貨賄者主通貨賄之官謂司市也道路主治五涂之官謂鄉遂大夫也凡民逺出至於邦國邦國之民若入來由門者司門為之節由闗者司闗為之節其商則司市為之節其以徵令及家徙則鄉遂大夫為之節唯時事而行不出闗不用節也變司市言貨賄者璽節主以通貨賄貨賄非必由市或􅓵於民家焉變鄉遂言道路者容公邑及小都大都之吏皆主治五涂亦有民也符節者如今宫中諸官詔符也璽節者今之印章也旌節今使者所擁節是也將送者執此節以送行者皆以道里日時課如今郵行有程矣以防容姦擅有所通也凡節有灋式藏於掌節黃文叔曰節皆邦節有守節有行節玉節邦國守之角節都鄙守之是謂守節使節及門闗道路之節皆行節也必自掌節出付使隨事用之註言闗市通路之官皆得為節如此則雜主掌節何以設專職哉涂音途凡通達於天下者必有節以𫝊輔之註曰必有節言逺行無有不得節而出者也輔之以𫝊者節為信耳𫝊說所齎操及所適疏曰此經總解上經門闗諸有節并有𫝊輔成信騐或有節無𫝊或有𫝊無節或節𫝊俱無則不得通達於天下也無節者有幾則不達註曰圜土内之疏曰此亦總解上文門闗已下應有節𫝊今無節者非直被㡬又不通達前所也齎音賫内音納遂人掌邦之野註曰郊外曰野此野為甸稍縣都疏曰不言掌遂又下文云以達于畿明遂人掌野通至畿疆也以土地之圖經田野造縣鄙形體之灋五家為鄰五鄰為里四里為酇五酇為鄙五鄙為縣五縣為遂皆有地域溝樹之使各掌其政令刑禁以嵗時稽其人民而授之田野簡其兵器敎之稼穡註曰經形體皆為制分界也鄰里酇鄙縣遂猶郊内比閭族黨州鄉也鄭司農云田野之居其比伍之名與國中異制故五家為鄰𤣥謂異其名者示相變耳遂之軍灋追胥起徒役如六鄉疏曰以土地之圖經田野所經者即造縣鄙以下是也造縣鄙者此與下五家為鄰之等為總目五家以下有六等畧言二者耳使各掌其政令刑禁者五家則鄰長施政令五鄰則里宰施政令已上皆施之其以歲時以下亦使各掌者以之酇作管反長丁丈反凡治野以下劑致甿以田里安甿以樂昏擾甿以土宜敎甿稼穡以興耡利甿以時器勸甿以疆予任甿以土均平政上節言經理其居人民之灋此則詳安集其人民之道也變民言甿異外内也甿猶懵懵無知貌也致猶㑹也民雖受上田中田下田及㑹之以下劑為凖謂可任者家二人田謂百畝之田里謂五畝之宅安甿者民得業則安樂昏勸其昏姻如媒氏㑹男女也擾順也高田種黍稷下田種稻麥是以土宜敎稼穡也杜子春讀耡為助謂起民人令相佐助是與民為利也時器制作耒耜錢鎛之屬先時修之及時用之所以勸功也疆予謂民有餘力復予之田若餘夫然政讀為征土均掌均平其税八者之序以下劑致民受田多而征役少使其民皆說而願為之甿也然後田里以安之樂昏以擾之則民入有家室之依其心安焉土宜以敎之興耡以利之則民出有作息之樂其業成焉又恐其廢時失事也復時器以勸之又恐其有曠土游民也復疆予以任之則征税由此而出更以土均平之而民無不均之嘆矣甿音萌耡音助後同予音與政音征懵音䝉猶㑹及㑹均古外反鎛音博辨其野之土上地中地下地以頒田里上地夫一廛田百畮萊五十畮餘夫亦如之中地夫一廛田百畮萊百畮餘夫亦如之下地夫一廛田百畮萊二百畮餘夫亦如之註曰萊謂休不耕者鄭司農云戸計一夫一婦而賦之田其一戸有數口者餘夫亦受此田也廛居也𤣥謂廛城邑之居孟子所云五畝之宅樹之以桑麻者也六遂之民餘夫竒受一廛雖上地猶有萊皆所以饒逺也坡謂此詳言分田里以安甿之制也其餘七者則田里中事耳竒居宜反凡治野夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿註曰十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水于川也遂廣深各二尺溝倍之洫倍溝澮廣二尋深二仞徑畛涂道路皆所以通車徒於國都也徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌都之野涂與環涂同可也萬夫者方三十三里少半里九而方一同以南畝圖之則遂從溝横洫從澮橫九澮而川周其外焉去山陵林麓川澤溝瀆城郭宫室涂巷三分之制其餘如此以至于畿則中雖有都鄙遂人盡主其地疏曰九澮則於四畔為大川此川亦人造雖無丈尺之數盖亦倍澮耳坡謂此承上文一夫受田百畝而詳言田野形體之制也以嵗時登其夫家之衆寡及其六畜車輦辨其老幼廢疾與其施舍者以頒職作事以令貢賦以令師田以起政役註曰登成也猶定也夫家猶言男女也施讀為弛職謂民九職也分其農牧虞衡之職使民為其事也載師職云以物地事授地職互言矣貢九貢也賦九賦也政役出士徒役坡謂自此以下承上文田有定制民有常業而使之供貢賦給繇役之事施音弛舎音捨政音征繇音遥若起野役則令各帥其所治之民而至以遂之大旗致之其不用命者誅之註曰役謂師田若有功作也遂之大旗熊虎疏曰起野役若小司徒凡起徒役毋過家一人之類也令者謂令縣正已下凡國祭祀共野牲令野職註曰共野牲入於牧人以待事也野職薪炭之屬疏曰令令委人斂之凡賓客令脩野道而委積註曰委積於廬宿市疏曰令令遺人也大喪帥六遂之役而致之掌其政令及葬帥而屬六綍及窆陳役註曰致役致於司徒給墓上事及竁也綍舉棺索也葬舉棺者謂載與説時也用綍旁六執之者天子其千人與陳役者主陳列之耳匠師帥監之鄉師以斧涖焉大喪之正棺殯啓朝及引六鄉役之載及窆六遂役之亦即逺相終始也鄭司農云窆謂下棺時遂人主陳役也禮記謂之封春秋謂之塴皆塟下棺也聲相似屬音燭綍音弗窆貶去聲竁昌絹反説始鋭反封彼騐反塴補鄧反凡事致野役而師田作野民帥而至掌其政治禁令註曰此居職末總結之言也王光逺曰言事而又言師田則事乃力政之事政音征遂師各掌其遂之政令戒禁易彦祥曰政若頒職作事以起政役之類令若令野職野賦令野脩道之類戒與禁則輔此而已註政役音征以時登其夫家之衆寡六畜車輦辨其施舍與其可任者經牧其田野辨其可食者周知其數而任之以徵財征作役事則聽其治訟註曰施讀亦弛也經牧制田界與井也可食謂今年所當耕者也財征賦稅之事疏曰周知其數而任之以徵財征者謂周徧知其夫家六畜及田野之等任之據人民之數徵財征據田野之數也作役事則聽其治訟者役事中可兼軍役田獵功作之等皆聽其治訟巡其稼穡而移用其民以救其時事註曰移用其民使轉相助救時急事也四時耕耨斂艾芟地之宜晚早不同而有天期地澤風雨之急凡國祭祀審其誓戒共其野牲註曰審亦聽也疏曰案冢宰大祭祀掌百官之誓戒大司寇涖誓百官并戒百族此官主審其戒戒遂之民故不同也王光逺曰共野牲贊遂人也入野職野賦于玉府註曰民所入貨賄以當九職九賦中玉府之用者疏曰自甸稍縣都之等以其在逺郊之外故皆以野言之中丁仲反賓客則巡其道脩庀其委積註曰巡其道脩行治道路也庀具也大喪使帥其屬以幄帟先道野役及窆抱磨共丘籠及蜃車之役註曰使以幄帟先者大宰也其餘司徒也幄帟先所以為塟窆之間先張神座也道野役帥以至墓也邱籠之役竁復土也其器曰籠蜃車柩路也柩路載栁四輪廹地而行有似於蜃因取名焉行至壙乃説復更載以龍輴蜃禮記或作槫或作輇役謂執綍者磨者適歴執綍者名也遂人主陳之而遂師以名行校之磨音歴説音脱輴勅倫反槫輇俱市専反軍旅田獵平野民掌其禁令比敘其事而賞罰註曰平謂正其行列部伍也疏曰比敘者校比次敘其行伍而行賞罰遂大夫各掌其遂之政令以嵗時稽其夫家之衆寡六畜田野辨其可任者與其可施舍者以敎稼穡以稽功事掌其政令戒禁聽其治訟註曰施讀亦為弛功事九職之事民所以為功業疏曰此一經與遂師職意同但互見其義耳王龜齡曰遂師遂大夫言政令戒禁縣正至里宰則特言政令而戒禁無與鄰長於政令又無與令為邑者嵗終則㑹政致事註曰不言其遂之吏而言為邑者容公邑及卿大夫王子弟之采邑政令戒禁遂大夫亦施焉㑹古外反與音預正嵗簡稼器脩稼政註曰簡猶閲也稼器耒耜鎡基之屬稼政孟春之月令所云皆脩封疆審端徑術善相邱陵阪險原隰土地所宜五榖所殖以敎道民必躬親之術音遂相息亮反道音𨗳三嵗大比則帥其吏而興甿明其有功者屬其地治者註曰興甿舉民賢者能者如六鄉之為也興猶舉也屬猶聚也又因舉吏治有功者而聚勅其餘以職事屬音燭凡為邑者以四達戒其功事而誅賞廢興之註曰四達者治民之事大通者有四夫家衆寡也六畜車輦也稼穡耕耨也旗鼓兵革也縣正各掌其縣之政令徵比以頒田里以分職事掌其治訟趨其稼事而賞罰之徴徴召也比案比頒田里者如夫一廛田百畮也分職事者九職之功事也李嘉㑹曰頒田里分職事慮有不得其平於是掌其治訟趨其稼事必有勤惰之分故有賞罰趨音促若將用野民師田行役移執事則帥而至治其政令註曰移執事移用其民鄭司農云謂轉相佐助既役則稽功㑹事而誅賞疏曰此經結上文功役之事王氏曰縣正即鄉州長州長有讀灋攷行此互備也無之則遂大夫興甿將安稽㑹古外反行下孟反鄙師各掌其鄙之政令祭祀註曰祭祀祭禜也鄭剛中曰掌其祭祀則祭祀之時亦如黨正敎其禮事明矣凡作民則掌其戒令註曰作民謂起徒役也以時數其衆庶而察其媺惡而誅賞註曰時四時也易氏曰媺謂成於三物者惡謂陷於八刑者嵗終則㑹其鄙之政而致事酇長各掌其酇之政令以時校登其夫家比其衆寡以治其喪紀祭祀之事註曰校猶數也疏曰治其喪紀謂民之喪紀若鄉師所云族共喪器之類治其祭祀者謂若族祭酺之類若然縣當祭社與州同縣正鄙師酇長皆不言所祭神者六遂與六鄉互見其義也若作其民而用之則以旗鼓兵革帥而至若嵗時簡器與有司數之註曰簡器簡稼器也兵器亦存焉有司遂大夫疏曰作其民而用之者謂師田及巡守之等直言以旗鼓兵革不言車輦文不具守音狩凡歲時之戒令皆聽之趨其耕耨稽其女功嵗時戒令出於遂人者也聽受而行之也女功絲枲之事疏曰酇長彌親民故趨其耕耨并稽攷女功之事趨音促里宰掌比其邑之衆寡與其六畜兵器治其政令註曰邑猶里也以嵗時合耦于耡以治稼穡趨其耕耨行其秩敘以待有司之政令而徵斂其財賦註曰攷工記曰耜廣五寸二耜為耦此言兩人相助耦而耕也杜子春云耡讀為助謂相佐助也𤣥謂鋤者里宰治處也若今街彈之室於此合耦使相佐助因放而為名季冬之月令命農師計耦耕事脩表耜具田器是其嵗時合人耦則牛耦亦可知也疏曰六遂賦税縣師徴之旅師斂之此財賦言待有司徴斂者謂縣師旅師也周未有牛耦漢趙過始教民牛耕今鄭云牛耦者或周末兼有牛耦至趙過乃絶人耦専用牛鄭剛中曰宫伯行其秩敘註云秩祿稟敘才等此農民耳所謂秩敘者何也盖力田之賞也如漢世力田者賜爵一級二級之類趨音促放音倣鄰長掌相糾相受註曰相糾相舉察疏曰鄰長不命之士為之凡邑中之政相贊註曰長短使相補助疏曰謂一里之内有上政令徴求則五鄰共相贊助徙于他邑則從而授之註曰從猶隨也授猶付也旅師掌聚野之耡粟屋粟閒粟野謂甸稍縣都也耡粟民相助作所出之粟即九賦之税粟也所貢九榖亦存焉屋粟民有田不耕所罰三夫之税粟閒粟閒民無職事者所出一夫之征粟閒音閑而用之以質劑致民平頒其興積施其恵散其利而均其政令註曰而讀為若聲之誤也若用之謂恤民之囏阨委積於野如遺人於鄉里也以質劑致民案入税者名㑹而貸之興積所興之積謂三者之粟也平頒之不得偏頗有多少縣官徵聚物曰興今云軍興是也是粟縣師徴之旅師斂之而用之以賙衣食曰恵以作事業曰利坡謂簿書若市劵有長短故云質劑也均其政令者視囏阨之甚否均施散之厚薄也凡用粟春頒而秋斂之註曰困時施之饒時收之坡謂上節言施恵散利此則言其𤼵斂之時也積子賜反凡新甿之治皆聽之使無征役以地之媺惡為之等註曰新甿新徙來者也治謂有所求乞也使無征役復之也王制曰自諸侯來徙家期不從政坡謂征役力役之征也以地媺惡為之等者坡從子倫云無征役暫耳以地之媺惡為之等不易之地一年後征役之一易者二年再易者三年或問徴斂賦貢條目之詳曰司徒載師徴畿内之九賦閭師徴六鄉之九功縣師所徴野賦貳載師也其徴野貢以閭師不掌及也外此有遂師聚别功賦貨賄中玉府用者委人斂甸稍芻薪徴税之官盡於是矣其斂之也賦功之物榖入于倉人金玉玩好凡民貨賄入于玉府貨賄入于内府邦布入於外府畜獸入于牧人牛人絲枲入于典絲典枲是斂之也若乃遺人之委積旅師之賦粟則註所云廩人倉人計九榖之數足國用以其餘共之所謂餘灋用也遺人註王氏所論㑹同軍旅委積一節最為得之可以類推其餘稍人掌令丘乘之政令註曰邱乘四邱為甸甸讀與維禹敶之之敶同其訓曰乘由是改云是掌令都鄙脩治井邑邱甸縣都之溝涂云邱甸者舉中言之溝涂之人名井别邑異則民之家數存焉敶音陣若有㑹同師田行役之事則以縣師之灋作其同徒輂輦帥而以至治其政令以聽於司馬註曰有軍旅㑹同田役之戒縣師受灋於司馬邦國都鄙稍甸郊里唯司馬所調以其灋作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至是以書令之耳其所調若在家邑小都大都則稍人用縣師所受司馬之灋作之帥之以致於司馬也同徒司馬所調之同凡用役者不必一時皆徧以人數調之使勞逸遞焉輂居錄反遞徒禮反大喪帥蜃車與其役以至掌其政令以聽於司徒註曰蜃車及役遂人共之稍人者野監是以帥而致之既夕禮曰既正柩賓出遂匠納車于階間則天子以至于士柩路皆從遂來委人掌斂野之賦斂薪芻凡疏材木材凡畜聚之物註曰野謂逺郊以外也所斂野之賦謂野之園圃山澤之賦也凡疎材草木有實者也凡畜聚之物瓜瓠葵芋禦冬之具也野之農賦旅師斂之工商嬪婦遂師以入玉府其牧則遂師又以共野牲芋于附反以稍聚待賓客以甸聚待羇旅註曰聚凡畜聚之物也凡其余聚以待頒賜註曰余當為餘聲之誤也餘謂縣都畜聚之物疏曰上已云稍甸此言餘聚是縣都中畜聚之物以式灋共祭祀之薪蒸木材賓客共其芻薪喪紀共其薪蒸木材軍旅共其委積薪芻凡疏材共野委兵器與其野囿財用註曰式灋故事之多少也薪蒸給炊及燎麤者曰薪細者曰蒸木材給張事委積薪芻者委積之薪芻也軍旅又有疏材以助禾粟野委謂廬宿止之薪芻也其兵器謂守衛陳兵之器也野囿之財用者苑囿藩蘿之材凡軍旅之賓客館焉註曰館舍也必舎此者就牛馬之用疏曰言軍旅賔客者謂諸侯以軍旅助王征討者故謂之軍旅之賓客也土均掌平土地之政以均地守以均地事以均地貢註曰政讀為征所平之税邦國都鄙也地守虞衡之屬地事農圃之職地貢諸侯之九貢疏曰案下文云以和邦國都鄙故知此平者亦據邦國都鄙若六鄉六遂及公邑征税自均人平之政音征以和邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地媺惡為輕重之灋而行之掌其禁令註曰施讀亦為弛也禮俗邦國都鄙民之所行先王舊禮也君子行禮不求變俗隨其土地厚薄為之制豐省之節耳禮器曰禮也者合於天時設於地財順於鬼神合於人心理於萬物項平甫曰和之如何以地媺惡為輕重之灋而行之政令之緩急刑禁之寛猛施舍之宜否禮俗之沿革喪紀祭祀之豐約宜者令之不宜者禁之使適於和而已草人掌土化之灋以物地相其宜而為之種註曰土化之灋化之使美若汜勝之術也以物地占其形色為之種黃白宜以種禾之屬疏曰土化之灋者即下經糞種是也相息亮反汜音凡凡糞種騂剛用牛赤緹用羊墳壤用麋渇澤用鹿鹹潟用貆勃壤用狐埴壚用豕疆㯺用蕡輕爂用犬糞種者燒獸骨為灰以漬其種而植之今南方田皆然騂剛謂地色赤而土剛强也赤緹縓色也墳壤潤解者渇澤故水處也潟鹵也貆貉類似貍鋭頭尖鼻勃壤粉解者埴壚黏疏者疆㯺疆堅者蕡麻也輕爂輕脆者緹音抵渇其列反潟音昔貆音丸埴音實壚音盧疆强上聲㯺音㩜爂音票縓七絹反黏音粘脆音毳稻人掌稼下地註曰以水澤之地種榖也謂之稼者有似嫁女相生以瀦畜水以防止水以溝蕩水以遂均水以列舍水以澮冩水以涉揚其芟作田註曰鄭司農説瀦防以春秋傳曰町原防規偃瀦杜子春讀蕩為和蕩謂以溝行水也𤣥謂偃瀦者畜流水之陂也防瀦旁隄也遂田首受水小溝也列田之畦㽟也澮田尾去水大溝作猶治也開遂舍水於列中因涉之揚去前年所芟之草而治田種稲瀦音諸列禄計反町徒頂反陂音披畦音奚㽟音劣凡稼澤夏以水殄草而芟夷之註曰殄病也絶也鄭司農説芟夷以春秋傳曰芟夷藴崇之今時謂禾下麥為荑下麥言芟刈其禾於下種麥也𤣥謂將以澤地為稼者必於夏六月之時大雨時行以水病絶草之後生者至秋水涸芟之明年乃稼澤草所生種之芒種註曰鄭司農云澤草之所生其地可種芒種疏曰水鍾曰澤有水及鹹鹵皆不生草即不得芒種故云草所生易彦祥曰芒種稻之有芒者芒種之種章勇反旱暵共其雩斂註曰稻人共雩斂稻急水者也鄭司農云雩事所𤼵斂疏曰此旱雩據夏五月已後修雩者暵者旱之熱氣若四月龍見而雩未必旱暵也然二種雩皆共雩斂也喪紀共其葦事註曰葦以闉壙禦濕之物暵音漢闉音因土訓掌道地圖以詔地事註曰道説也説地圖九州形勢山川所宜告王以施其事也若云荆揚地宜稻幽并地宜麻疏曰其九州地圖乃是諸國所獻以入職方今土訓乃於職方取九州地圖依而説向王使依而責其貢獻之物道地慝以辨地物而原其生以詔地求註曰地慝若瘴蠱然也辨其物者别其所有所無原其生生有時也以此二者告王之求也地所無及物未生則不求也鄭司農云地慝地所生惡物害人者若虺蝮之屬虺虚鬼反蝮孚目反王巡守則夾王車註曰巡守行視所守也天子以四海為守疏曰夾王車者亦在國掌道地圖以下之事誦訓掌道方志以詔觀事註曰說四方所識久逺之事以告王觀博古所識若魯有大庭之庫殽之二陵掌道方慝以詔辟忌以知地俗註曰方慝四方言語所惡也不辟其忌則其方以為苟於言語也知地俗博事也鄭司農云以詔辟忌不違其俗也疏曰誦訓掌道方慝以詔王辟忌所以然者使王博知地俗言語之事也辟音避識音志王巡守則夾王車註曰此亦與土訓同各以所掌以告王也魏氏曰古左圖右書土訓圖學誦訓書學山虞掌山林之政令物為之厲而為之守禁註曰物為之厲每物有藩界也為之守禁為守者設禁令也守者謂其地之民占伐林木者也鄭司農云厲遮列守之疏曰下文林自有衡官掌之今山虞兼云林者彼林是竹木生平地者林衡掌之此山林并云者自是山内之林即山虞兼掌之山内林木金玉錫石禽獸所有不同每物各有藩界設禁亦不同仲冬斬陽木仲夏斬陰木註曰陽木生山南者陰木生山北者冬斬陽夏斬陰堅濡調凡服耜斬季材以時入之服謂牝服即車箱皆有鑿孔以軨子貫之故謂之牝服季猶穉也服與耜宜用穉材尚柔忍也時入者以其須堅故須依仲冬仲夏之時也軨音陵令萬民時斬材有期日註曰時斬材斬材之時也有期日入出有日數為久盡物疏曰案王制云草木零落然後入山林彼據萬民伐木之時謂十月之中此云萬民時斬材亦謂十月時凡邦工入山林而掄材不禁註曰掄猶擇也不禁者山林國之有不拘日也春秋之斬木不入禁註曰非冬夏之時不得入所禁之中斬木也斬四野之木可疏曰上文據國家使工取擇木故非冬夏亦得入山林此據萬民取木故十月入山春秋之斬木不入禁凡竊木者有刑罰若祭山林則為主而脩除且蹕為主主供時用相禮儀也脩除治道路場壇疏曰此山林在畿内王國四方各依四時而祭相息亮反若大田獵則萊山田之野及弊田植虞旗于中致禽而珥焉註曰萊除其草萊也弊田田者止也植猶樹也田止樹旗令𫉬者皆致其禽而校其耳以知𫉬數也山虞有旗以其主山得畫熊虎其仞數則短也鄭司農云珥者取禽左耳以效功也大司馬職曰𫉬者取左耳疏曰大田獵者謂王親行珥音二林衡掌巡林麓之禁令而平其守註曰平其守者平其地之民守林麓之部分疏曰此林衡兼麓者以爾雅山足曰麓雖連於山山虞不掌以麓上有林故屬林衡也以時計林麓而賞罰之註曰計林麓者計其守之功也林麓蕃茂民不竊盜則有賞否則罰之若斬木材則受灋于山虞而掌其政令註曰灋萬民入出時日之期川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之註曰舍其守者時案視守者於其舍申戒之疏曰川注瀆者皆是也水鍾曰澤澤與川不同官今川衡兼云澤者澤與川連者則川衡兼掌之謂若濟水溢為滎澤滎澤則與濟連則管濟川者兼滎澤掌之如此之類皆是滎音榮祭祀賓客共川奠註曰川奠籩豆之實魚鱐蜃蛤之屬鱐所留反澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入之于玉府頒其餘于萬民註曰其地之人占取澤物者因以部分使守之以時入之于玉府謂皮角珠貝也入之以當邦賦然後得取其餘以自為也入出亦有時日之期疏曰以時入之于玉府頒其餘于萬民亦據中所出入玉府者多故特言之無妨山虞川衡之等亦入玉府互見其義也萬民入澤雖無正文案王制獺祭魚然後虞人入澤梁草木零落然後入山林則萬民入澤可同時凡祭祀賓客共澤物之奠註曰澤物之奠亦籩豆之實芹茒菱芡之屬喪紀共其葦蒲之事註曰葦以闉壙蒲以為席若大田獵則萊澤野及弊田植虞旌以屬禽註曰澤虞有旌以其主澤澤鳥所集故得注析羽疏曰案山虞致禽之義謂輸之於公當致之於虞旗之中而珥焉以効功此屬禽者謂百姓致禽訖虞人屬聚之别其等類每禽取三十焉致與屬不同山虞澤虞文皆不足互見為義也陳君舉曰古者金玉之所出皆掌之王官侯國不得擅而有也闗譏所禁皆歸之公上侯國不得擅而私也是以名山大澤畿外不以封列土之諸侯畿内不以頒禄仕之王臣皆天子使吏治之而納其貢賦諸侯自食税田之外餘不敢過而問焉盖先王不以予諸侯之意所以抑制其强而防閑其侈心也考之周禮凡山澤之數司書掌之以計吏治山澤之賦大府掌之以待邦用九州之川浸山藪職方掌收天下之圖而諸侯無所隸焉至於伯禽侯于東魯而錫之山川乃天子之加賜是固異㤙而非可以例觀也人謂周制山林川澤有虞衡之官為之厲禁疑若専利於上而無遺利在民矣攷之山虞令萬民時斬材有期日未嘗不與民共之而有司特禁其不使戕賊而已澤虞則使人守其財物以時入于玉府則實為民守之王官特以其賦入于玉府而推本先王領於王官之意盖使侯國不得以障管云爾非不知與民共財也周徳既衰凡王國所恃者諸侯皆得専利之齊幹山海之藏晏子告之以山澤各有所守不可為也是猶知守先王之灋至於桃林之塞古函谷也晉守之郇瑕之地古解池也晉實有之凡天下之塞邑皆不領於王官而惟私意是取春秋之作於鄭不系虎牢於衛不系楚邱其類非一盖所以别天下之重慮侯國擅而兼之也予音與塞音賽解音懈迹人掌邦田之地政為之厲禁而守之註曰田之地若今苑也凡田獵者受令焉註曰令謂時與處也疏曰受令者謂夏官主田獵者禁麛卵者與其毒矢射者註曰為其夭物且害必多也麛麋鹿子疏曰此謂四時常禁麛音迷卝人掌金玉錫石之地而為之厲禁以守之註曰錫鈏也易彦祥曰天地之寶生於山澤金玉錫石之貴饑不可食寒不可衣先王不盡以予民設之官為厲禁以守之非私之也上以資邦用下以使斯民之棄末厚本而已卝音礦鈏以忍反予音與若以時取之則物其地句圖而授之註曰物地占其形色知鹹淡也授之敎取者之處巡其禁令註曰行其禁明其令角人掌以時徵齒角凡骨物於山澤之農以當邦賦之政令註曰山澤出齒角骨物大者犀象其小者麋鹿陳及之曰自此下凡所謂山農澤農盖平時以射田獵取絺綌及染草為業者非此則不徴坡謂自此至掌蜃皆閭師山澤之貢也言賦者疏云賦其總名是也平地無它産其農惟貢九榖而已此農近山澤有是骨物齒角採而入官雖不貢榖以此當之故云以當邦賦也以度量受之以共財用註曰骨入漆浣者受之以量其餘以度度所中浣戸翫反度上如字下待洛反中丁仲反羽人掌以時徵羽翮之政于山澤之農以當邦賦之政令註曰翮羽本疏曰此羽人所徵羽者當入於鍾氏染以為后之車飾及旌旗之屬也凡受羽十羽為審百羽為摶十摶為縳註曰審摶縳羽數束名也爾雅曰一羽謂之箴十羽謂之縳百羽謂之緷其名音相近也一羽有名盖失之矣摶音篆縳音衮緷古本反掌葛掌以時徴絺綌之材于山農凡葛征徵草貢之材于澤農以當邦賦之政令註曰草貢出澤䔛紵之屬可緝績者疏曰絺綌之材即葛是也又云凡葛征者總結之也以權度受之註曰以知輕重長短也䔛苦迥反掌染草掌以春秋斂染草之物註曰染草茅蒐橐蘆豕首紫茢之屬以權量受之以待時而頒之註曰權量以知輕重多少時染夏之時蒐音搜茢音列掌炭掌灰物炭物之徵令以時入之註曰灰炭皆山澤之農所出也灰給澣練炭之所共多以權量受之以共邦之用凡炭灰之事掌荼掌以時聚荼以共喪事註曰共喪事者以著物也既夕禮曰茵著用荼徴野疏材之物以待邦事凡畜聚之物註曰荼茅莠疏材之類也因使掌焉徴者徴於山澤入於委人掌蜃掌斂互物蜃物以共闉壙之蜃註曰互物蚌蛤之屬闉猶塞也將井椁先塞下以蜃禦濕也鄭司農說以春秋傳曰始用蜃炭言僭天子也祭祀共蜃器之蜃註曰飾祭器之屬也鬯人職曰凡四方山川用蜃器春秋定十四年秋天王使石尚來歸蜃蜃之器以蜃飾因名焉鄭司農云蜃可以白器令色白共白盛之蜃註曰盛猶成也謂飾墻使白之蜃也今東萊用蛤謂之叉灰云盛音成叉音釵囿人掌囿游之獸禁註曰囿游囿之離宫小苑觀處也養獸以宴樂視之禁者其蕃衛也鄭司農云囿游之獸游牧之獸牧百獸註曰備養衆物也今掖庭有鳥獸自熊虎孔雀至於狐狸鳬鶴備焉祭祀喪紀賓客共其生獸死獸之物吳氏曰生獸死獸之物獸人既共之而囿人又共之盖獸人共者田獵所𫉬也囿人共者苑囿所養也場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之註曰果棗李之屬蓏瓜瓠之屬珍異蒲桃枇杷之屬疏曰場圃連言場圃同地耳春夏為圃秋冬為場其場因圃而為之故并言之也坡謂閭師任圃以樹事貢草木此場人又掌之者此官之斂國圃所樹也閭師之徴百姓所貢也凡祭祀賓客共其果蓏享亦如之疏曰亨謂祭祀宗廟二灌後君迎牲納之於庭時后夫人薦朝事之豆籩豆籩中有果蓏之物故云亨亦如之若然上言祭祀餘祭祀也廩人掌九榖之數以待國之匪頒賙賜稍食註曰匪讀為分分頒謂委人之職諸委積也賙賜謂王所賜予給好用之式稍食祿廩疏曰廩人掌米倉人掌榖今云九榖者以廩人雖専主米亦兼掌榖也天子有御廩單云廩則平常藏米之廩此不言御廩則廩中可以兼之矣食音嗣予音與以嵗之上下數邦用以知足否以詔榖用以治年之凶豐數猶計也詔詔告在上用榖之灋項平甫曰以嵗之升降得榖之多少計國之所用多則足少則否乃詔在上用榖之隆殺以治年之凶豐故年適豐雖粒米狼戾不侈於有餘年適凶雖饑饉薦臻不苦於不足則以有治之術也殺所賣反下同凡萬民之食食者人四鬴上也人三鬴中也人二鬴下也註曰此皆謂一月食米也六斗四升曰鬴疏曰此謂給萬民糧食之灋故云凡萬民之食食者謂民食國家糧食者若食不能人二鬴則令邦移民就榖詔王殺邦用註曰就榖就都鄙之有者殺猶減也鬴音輔凡邦有㑹同師役之事則治其糧與其食註曰行道曰糧謂糒也止居曰食謂米也糒音備大祭祀則共其接盛註曰接讀為一扱再祭之扱扱以授舂人舂之大祭祀之榖藉田之收藏於神倉者也不以給小用疏曰此即廩人兼掌御廩所藏藉田之收以共祭祀之用者也接音扱扱初洽反盛音成舍人掌平宮中之政分其財守以灋掌其出入平謂平其給米之多少也政謂用榖之政也財即米也喪大記云納財朝一溢米亦謂米為財分其財守者計其用榖之數分送宫正内宰使守而頒之也出謂米出於廩人以出給入謂其有空缺則還入廩人皆當以灋不可虚也凡祭祀共簠簋實之陳之簠内圓外方簋内方外圓皆受斗二升儀禮公食大夫簠盛稻粱簋盛黍稷祭祀言凡則天地宗廟大次小祭皆有黍稷食音嗣下同盛音成賓客亦如之共其禮車米筥米芻禾註曰禮致饔餼之禮疏曰亦如之者亦有簠簋實之陳之之事言實之陳之則據饔餼及饗食之時也喪紀共飯米熬穀註曰飯所以實口不忍虚也君用粱大夫用稷士用粱皆四升實者唯盈熬榖者錯于棺旁所以惑蚍蜉也喪大記曰熬君四種八筐大夫三種六筐士二種四筐加魚腊焉飯扶晚反蚍鼻夷反蜉音孚以嵗時縣穜稑之種以共王后之春獻種註曰縣之者欲其風氣燥達也鄭司農云春王當耕于籍則后獻其種也后獻其種見内宰職縣音懸穜直龍反稑音陸掌米粟之出入辨其物米六米也六米者九榖之中黍稷稻粱苽大豆六者皆有米麻與小豆小麥三者無米粟九榖也辨其物别為書也歲終則㑹計其政註曰政用榖之多少倉人掌粟入之藏註曰九榖盡藏焉以粟為主辨九榖之物以待邦用若榖不足則止餘灋用有餘則藏之以待凶而頒之註曰止猶殺也殺餘灋用謂道路之委積所以豐優賓客之屬殺所賣反凡國之大事共道路之榖積食飲之具註曰大事謂喪戎司祿闕司稼掌巡邦野之稼而辨穜稑之種周知其名與其所宜地以為灋而縣于邑閭註曰周猶徧也徧知種所宜之地縣以示民後年種榖用為灋也疏曰巡邦野之稼者謂秋熟之時觀之巡野觀稼以年之上下出斂灋註曰斂灋者豐年從正凶荒則損若今十傷二三實除減半疏曰此觀稼亦謂秋熟時掌均萬民之食而賙其急而平其興註曰均謂度其多少賙稟其艱阨興所徴賦疏曰平其興者當各計什一而税不得特多特少也王氏曰後世倉廩之官知為國斂儲而已周公於倉廩之下特設司稼周知地所宜種為耕灋以示民使榖之所出自倍巡行年之上下為斂灋以示吏使榖之徴斂不頗又周其急平其興焉此所以異於後世也舂人掌共米物註曰米物言非一物祭祀共其齍盛之米註曰齍盛謂黍稷稻粱之屬可盛以為簠簋實賓客共其牢禮之米註曰謂可以實筐筥凡饗食共其食米註曰饗有食米則饗禮兼燕與食掌凡米事􅐪人掌凡祭祀共盛註曰炊而共之􅐪音熾共王及后之六食註曰六食六榖之食凡賓客共其簠簋之實註曰謂致飱饔饗食亦如之槀人掌共外内朝宂食者之食註曰外朝司寇斷獄弊訟之朝也今司徒府中有百官朝㑹之殿云天子與丞相舊決大事焉是外朝之存者與内朝路門外之朝也宂食者謂留治文書若今尚書之屬諸直上者疏曰天子三朝路寢庭朝是圖宗人嘉事之朝大僕掌之又有路門外朝是常朝之處司士掌之又有外朝在臯門内庫門外三槐九棘之朝朝士掌之宂戎上聲若饗耆老孤子士庶子共其食註曰士庶子卿大夫之子弟宿衛王宫者掌豢祭祀之犬註曰養犬豕曰豢不於􅐪人言其共至尊雖其潘瀾戔餘不可䙝也坡謂冢宰總百官以治舉其要耳其僚屬庶尹皆經理王宫之政至於明遂生復性以寵綏斯民者未遑也故設司徒之職焉是職也任大而責重舉天王作君作師之事而致之于民乃順承天萬物資生故曰地官也凡此七十八官之序或先或後各有攸理大司徒長官不待言矣敎始於郊里故自小司徒至比長八職専主六鄉而牧田牛田在鄉中者故封人牧人牛人充人四職次之亦以牲者祭事之重也鄉之政有二曰征役施舍曰徳行道藝載師至均人五職詳征役施舍之事也師氏至媒氏六職詳徳行道藝之教也然則教養之道備矣施之天下何以加兹故曰觀于鄉而知王道也王國面朝後市王門十二在六鄉之内十二闗門則臨畿上今次於鄉之下遂之上者市雖在國容五百里疆界中凡五十里之市皆在焉門闗則連於市以達貨賄者闗市有譏用節為多故司市至掌節十三職相為一類以次於此遂人至里宰専及田野之制稼穡之緒與六鄉互見為義旅師如鄉之閭師也稍人如鄉之縣師也委人土均如鄉之遺人均人也此鄉遂之制豈惟鄉遂與鄉之封人載師縣師遂之稍人土均通公邑都鄙邦國之政皆舉之矣草人稻人教民以耕與諌救調媒諸官道民以善類也土訓之詔地圖誦訓之道方志與師保之詔媺惡亦類也若夫山林川澤賦貢之末者而其財用國家於是有取資焉故自山虞至場人十有五職又次之冢宰所列九賦九貢之目盡於此矣賓祭之所取軍旅喪紀之所共膳羞祿廩凡為九式用財者將於是乎在故廩人至稾人八職終焉斯其先後本末或以内外或以羣分單舉以見義互文以相足錯其一則非倫類分之為二者未審其條貫之同歸也或曰司徒敷教也而敎職惟鄉官師保等十數人耳其間所措理者養民之事居多焉先儒疑為司空之錯簡將無信然否也是不然夫先王之世辨物居方秀者為士而樸者為農下及工商各有常居皆有守灋使之父以此敎其子兄以此敎其弟習其耳目而定其心思閑其道藝而世其家業無非神道設敎之深意豈必東膠西序始名敎哉抑又聞之孟子曰無恒産而有恒心者惟士為能若民則無恒産因無恒心苟無恒心放僻邪侈無不為巳故制民之産然後驅而之善此所謂物畜然後有禮不養則不可動者也天下不由養而能敎者希矣力能為長厚之行而民者㝠也左右曲成君相不先則士農工商生者不得其情死者不盡其常相與矍矍然喪其降衷秉彝之心其鈍頑無耻者固已率而歸於乖戾悖逆不可復制即常性未移者亦頽墮委靡消沮而不復振嗚呼道之不行從可知矣司徒一篇教養相侔盖聖人酌乎天理人情之安措之天下既竝舉而相成著之為經亦貫通而匪二是是乃盡倫盡制之道也何疑其錯簡哉然則司空所司之職者何與竊疑周禮為書委曲周詳無不備者獨至壇兆廟社之灋井田長廣之方附庸間田所餘之多寡山林川澤城郭宫室涂巷三分之乘除天時有生耕穫何以無失其序地理有宜髙下何以無拂其性山川沮澤民居有度焉興事任力逺近有量焉宫室之制器皿之宜舟車之用凡數事者雖略見於諸官未詳其規度意司空之職必如前所云者而春秋戰國之世强凌弱下替上開阡陌盡地力相兼以力相侈以僭司空一篇必最其所深病而急欲去其籍者也其失盖已久矣若夫竄綴紛紜離散全經區區之心則病其援周公以從已也周禮述註卷十
