body:
  text: 周禮述注卷十九安溪李光坡撰大僕掌正王之服位出入王之大命注曰服王舉動所當衣也位立處也出大命王之教也入大命羣臣所奏行掌諸侯之復逆注曰鄭司農云復謂奏事也逆謂受下奏王視朝則前正位而退入亦如之注曰前正位而退道王王既立退居路門左待朝畢疏曰入亦如之王退入路寢聽事時亦前正王位郤位立也建路鼓于大寢之門外而掌其政注曰大寢路寢也其門外則內朝之中如今宫殿端門下矣政鼓節與早晏疏曰此鼓所用或擊之以聲早晏或有窮遽者擊之以聲寃枉故建之正朝之所以待達窮者與遽令聞鼓聲則速逆御僕與御庶子注曰鄭司農云窮謂窮寃失職則來擊此鼓以達於王若今時上變事擊鼓矣遽傳也若今時驛馬軍書當急聞者亦擊此鼓玄謂達窮者謂司冦之屬朝士掌以肺石達窮民聽其辭以告於王遽令郵驛上下程品御僕御庶子直事鼓所者大僕聞鼓聲則速逆此二官當受其事以聞疏曰御庶子者御僕有下士十二人分之為御庶子總名曰御僕也傳張戀反郵音尤祭祀賓客喪紀正王之服位詔法儀贊王牲事注曰詔告也牲事殺割七載之屬王光逺曰法見於度數者儀見於動容者皆大僕以言告之王出入則自左馭而前驅注曰前驅如今道引也道而居左自馭不參乘辟王也亦有車右焉疏曰王出入者謂朝覲會同并凡祭祀巡守征伐皆是辟音避凡軍旅田役贊王鼓疏曰軍旅田役王執路鼓路鼓四面將居鼓下則前面不得擊之惟有三面王自擊其一大僕佐擊一面戎右擊一面故二官皆言贊王鼓救日月亦如之注曰日月食時春秋傳曰非日月之眚不鼓疏曰日食隂侵陽當與鼓神祀同用雷鼓月食當用靈鼓大喪始崩戒鼓傳達于四方窆亦如之注曰戒鼓擊鼓以警衆也鄭司農云窆謂葬下棺也春秋傳所謂日中而塴禮記謂之封皆葬下棺也音相似窆讀如慶封汜祭之汜疏曰傳達于四方謂以鼓聲相傳聞達四方縣喪首服之法于宫門注曰首服之法謂免髽笄總廣狹長短之數縣其書于宫門示四方疏曰案小宗伯云縣衰冠之式彼云冠専據男子云衰則兼婦人此云首服明無衰與男子冠直是婦人首服小宗伯云縣于路門此宫門亦路門也掌三公孤卿之弔勞注曰王使往疏曰此等皆王合親往或有故故使大僕也窆彼驗反注之封音塴補鄧反汜與泛同免音問髽莊瓜反王燕飲則相其法注曰相左右疏曰此燕飲謂與諸侯燕或與羣臣燕皆是其法有主獻賓賓酢主主酬賓洗爵升降之法皆相助之王射則贊弓矢注曰贊謂授之受之疏曰此謂大射也知者見小臣職曰賓射掌事如大僕之法則知大射此大僕所掌者是也王眂燕朝則正位掌擯相注曰燕朝朝於路寢之庭王圖宗人之嘉事則燕朝王光逺曰擯則相賓相則助王皆大僕掌之王不眂朝則辭於三公及孤卿注曰辭謂以王不眂朝之意告之春秋傳曰公有疾不眂朔小臣掌王之小命詔相王之小法儀注曰小命時事所敕問也小法儀趨行拱揖之容掌三公及孤卿之復逆疏曰不見大夫士者孤卿中兼之矣正王之燕服位注曰謂燕居時也玉藻曰王卒食玄端而居王之燕出入則前驅注曰燕出入若今遊於諸觀苑大祭祀朝覲沃王盥疏曰大祭祀天地宗廟皆是王龜齡曰鬱人云凡祼事沃盥此云大祭祀朝覲沃王盥者蓋大饗不入牲其他皆如祭祀九獻七獻五獻皆須盥也鬱人之沃盥但於祼獻事耳其朝踐饋獻卒食之獻所以沃盥者小臣也小祭祀賓客饗食賓射掌事如大僕之法注曰賓射與諸侯來朝者射掌士大夫之弔勞凡大事佐大僕祭僕掌受命于王以眂祭祀而警戒祭祀有司糾百官之戒具注曰謂王有故不親祭也祭祀有司有事於祭祀者糾謂校録所當供之牲物既祭帥羣有司而反命以王命勞之誅其不敬者大喪復于小廟注曰小廟高祖以下也始祖曰大廟春秋僖八年秋七月禘于大廟疏曰此祭僕復小廟夏采復大廟下𨽻僕復小寢大寢其二祧不言復亦應此祭僕復但無寢耳凡祭祀王之所不與則賜之禽都家亦如之注曰王所不與同姓有先王之廟疏曰都家謂畿內三等采地則上云祭祀是畿外同姓魯衛之屬者也凡祭祀致福者展而受之注曰臣有祭祀必致祭肉於君所謂歸胙也展謂録視其牲體數體數者大牢則以牛左肩臂臑折九個少牢則以羊左肩七個特牲則以豕左肩五個臑奴報反御僕掌羣吏之逆及庶民之復與其弔勞注曰羣吏府史以下坡謂羣吏庶民王亦有弔勞者蓋死於王事則有弔力於師役則有勞與大祭祀相盥而登注曰相盥者謂奉槃授巾與登謂為王登牲體於爼特牲饋食禮主人降盥出舉入乃七載大喪持翣注曰翣棺飾也持之者夾蜃車掌王之燕令注曰燕居時之令以序守路鼓注曰序更隸僕掌五寢之掃除糞灑之事注曰五寢五廟之寢也周天子七廟惟祧無寢詩云寢廟繹繹相連貌也前曰廟後曰寢汜掃曰掃掃席前曰拚灑灑也鄭司農云灑當為灑汜音泛拚音奮灑所買反祭祀修寢注曰於廟祭寢或有事焉月令凡新物先薦寢廟王行洗乘石注曰鄭司農云乘石王所登上車之石也掌蹕宫中之事注曰宫中有事則蹕鄭司農云蹕謂止行者清道若今時警蹕坡謂宫中之事祭事也詳見冢宰宫正大喪復于小寢大寢注曰小寢髙祖以下廟之寢也始祖曰大寢辨師掌王之五冕皆玄冕朱裏延紐注曰冕服有六而言五冕者大裘之冕蓋無旒不聮數也延冕之覆在上是以名焉紐小鼻在武上笄所貫也今時冠卷當簮者廣袤以冠縰其舊象焉疏曰古者績麻三十升布染之上以玄下以朱延者以版廣八寸長尺六寸以此上玄下朱衣之覆在冕上以爵辨前後平則得辨稱冕則前低一寸餘得冕名冕則俯也紐綴於冕兩傍垂之武傍孔相當以笄貫之陸農師曰大裘襲裘則戴冕繅十有二旒大裘與衮同一冕故服六而冕五五采繅十有二就皆五采玉十有二玉笄朱紘注曰繅雜文之名也合五采絲為之繩垂於延之前後各十二所謂邃延也就成也繩之每一匝而貫五采玉十有二斿則十二玉也每就間蓋一寸朱紘以朱組為紘也紘一條屬兩端於武繅不言皆有不皆者此為衮衣之冕十二斿則用玉二百八十八鷩衣之冕繅九斿用玉二百一十六毳衣之冕七斿用玉百六十八希衣之冕五斿用玉百二十玄衣之冕三斿用玉七十二繅音藻數所主反卷起全反袤音茂縰所買反斿音留鷩必滅反諸侯之繅斿九就瑉玉三采其餘如王之事繅斿皆就玉瑱玉笄注曰侯當為公字之誤也三采朱白蒼也其餘謂延紐皆玄覆朱裏與王同也出此則異繅斿皆就皆三采也每繅九成則九旒也公之冕用玉百六十二玉瑱塞耳者故書瑉作璑鄭司農云繅當為藻繅古字也藻今字也同物同音璑惡玉名疏曰上王冕繅玉别文則繅有差降玉無差降此諸公繅玉同文則惟有一冕而已故鄭計一冕為九旒旒各九玉據冕九旒不别計鷩冕已下以其一冕而已冠五服故也已下侯伯子男亦皆一冕冠數服也王不言玉瑱於此言之者王與諸侯互見為義瑉本又作珉亡貧反瑱吐練反璑音無王之皮辨會五采玉璂象邸玉笄注曰會縫也綦結也皮辨之縫中每貫結五采玉十二以為飾謂之綦詩云會辨如星又曰其辨維綦是也邸下柢也以象骨為之徐氏曰皮辨以皮六方縫之邸抵也謂辨內上頂輳處以象骨飾之易彥祥曰王之吉服其辨三皮辨用之於眂朝韋辨用之於兵事冠辨用之於田獵兵田之辨有時而用之者也皮辨眂朝則日眂朝之禮其用數矣此所以特言皮辨之制王之辨絰辨而加環絰注曰辨絰王弔所服也其辨如爵辨而素所謂素冠也而加環絰環絰者大如緦之麻絰纒而不糾司服職曰凡弔事辨絰服會古外反璂音其邸丁禮反綦音其柢音帝諸侯及孤卿大夫之冕韋辨皮辨辨絰各以其等為之而掌其禁令注曰各以其等繅斿玉璂如其命數也冕則侯伯繅七就用玉九十八子男繅五就用玉五十繅玉皆三采孤繅四就用玉三十二三命之卿繅三就用玉十八再命之大夫繅再就用玉八繅玉皆朱緑韋辨皮辨則侯伯璂飾七子男璂飾五玉亦三采孤則璂飾四三命之卿璂飾三再命之大夫璂飾二玉亦二采辨絰之辨其辟積如冕繅之就然庶人弔者素委貌一命之大夫冕而無旒士變冕為爵辨其韋辨皮辨之會無結飾辨絰之辨不辟積禁令者不得相僣踰也玉藻曰君未有命不敢即乘服不言冠辨冠辨兼於韋辨皮辨矣不言服辨服辨自天子以下無飾無等疏曰上天子與公不言韋辨此言之亦是互見之義各以其等為之不言爵而言等則依命數矣爵辨制如冕但無旒為異則無旒之冕亦與爵冕不殊得謂冕者亦前低一寸餘故得冕名辟必亦反司甲闕司兵掌五兵五盾各辨其物與其等以待軍事注曰五盾干櫓之屬其名未盡聞也等謂功沽上下鄭司農云五兵者戈殳戟酋矛夷矛及授兵從司馬之法以頒之及其受兵輸亦如之及其用兵亦如之注曰從司馬之法令師旅卒兩人數所用多少也兵輸謂師還有司還兵也用兵謂出給衛守陳及之曰周制甸出革車一乘凡兵甲盾戈旗物鼓鐸悉備焉在農則四時田獵合其卒伍治其徒役簡其兵器與夫旗物鼓鐸一一治之其調發則各以其具行此所頒者頒諸卿大夫士從軍旅會同者也祭祀授舞者兵注曰授以朱干玉戚之屬疏曰案此則春官司干所授者又是羽籥之等非干戚可知也大喪廞五兵注曰廞興也興作明器之役器五兵也士喪禮下篇有甲胄干笮笮側白反軍事建車之五兵會同亦如之注曰車之五兵鄭司農所云者是也步卒之五兵則無夷矛而有弓矢疏曰凡器在車皆有鐵器屈之在車較及輿以兵插而建之故有出先刃入後刃之事插測洽反司戈盾掌戈盾之物而頒之注曰分與授用祭祀授旅賁殳故士戈盾授舞者兵亦如之注曰亦頒之也故士王族故士也與旅賁當事則衛王也殳如杖長尋有四尺王光逺曰旅賁氏執戈盾而趨者謂軍旅會同之時也若祭祀則執殳而已鄭剛中曰舞者執戈盾未嘗執殳所謂亦如之者亦如授故士以戈盾也軍旅會同授二車戈盾建乘車之戈盾授旅賁及虎士戈盾注曰乘車王所乘車也軍旅則革路會同則金路及舍設藩盾行則斂之注曰舍止也藩盾盾可以藩衛者如今之扶蘇與疏曰天官掌舍王行止不言設藩盾者當宿衛之事非止一重除彼梐枑車宫之外别有此藩盾之等也司弓矢掌六弓四弩八矢之法辨其名物而掌其守藏與其出入注曰法曲直長短之數中春獻弓弩中秋獻矢箙注曰箙盛矢器也以獸皮為之坡謂弓人為弓夏秋冬造至春被弦故弓弩中春獻之稿人職矢箙春作秋成故矢箙中秋獻之藏才浪反中音仲箙音服及其頒之王弓弧弓以授射甲革椹質者夾弓庾弓以授射犴侯鳥獸者唐弓大弓以授學射者使者勞者注曰王弧夾庾唐大六者弓異體之名也往體寡來體多曰王弧往體多來體寡曰夾庾往體來體若一曰唐大甲革革甲也春秋傳曰蹲甲而射之質正也樹椹以為射正射甲與椹試弓習武也犴侯五十步及射鳥獸皆近射也近射用弱弓則射大侯者用王弧射參侯者用唐大矣學射者弓用中後習強弱則易也使者勞者弓亦用中逺近可也勞者勤勞王事若晉文侯文公受王弓矢之賜者其矢箙皆從其弓注曰從弓數也每弓者一箙百矢凡弩夾庾利攻守唐大利車戰野戰注曰攻城壘者與其自守者相迫近弱弩發疾也車戰野戰進退非強則不及弩無王弧王弧恆服弦往體少者使矢不疾疏曰弓用則服弦不用則弛惟弩則用與不用一張之後竟不弛故恆服弦用弱者以其強弓久不弛則就弦弱則隨體不就弦也椹張林反夾古洽反庾師儒相傳讀庚本或作庚犴音岸使者所吏反參素感反凡矢枉矢潔矢利火射用諸守城車戰殺矢鍭矢用諸近射田獵矰矢茀矢用諸弋射恆矢痺矢用諸散射注曰此八矢者弓弩各有四焉枉矢殺矢矰矢恆矢弓所用也潔矢鍭矢茀矢痺矢弩所用也枉矢者取名變星飛行有光今之飛矛是也或謂之兵矢潔矢象焉二者皆可結火以射敵守城車戰前於重後微輕行疾也殺矢言中則死鍭矢象焉鍭之言候也二者皆可以司候射敵之近者及禽獸前尤重中深而不可逺也結繳於矢謂之矰矰髙也茀矢象焉茀之言刜也二者皆可以弋飛鳥刜羅之也前於重又微輕行不低也詩云弋鳬與鴈恆矢安居之矢也痺矢象焉二者皆可以散射也謂禮射及習射也前後訂其行平也凡矢之制枉矢之屬五分二在前三在後殺矢之屬三分一在前二在後矰矢之屬七分三在前四在後恆矢之屬軒輖中所謂志也王龜齡曰上文云四弩用於攻守與戰此枉矢潔矢用諸守城車戰是以二矢而當四弩之用明矣二矢既當四弩其餘六矢當六弓之用豈不曉然經曰王弧以授射甲革椹質者甲革椹質軍射也殺矢鍭矢用於田獵之射也田獵所以治兵講武則軍射田射一事也故考工記矢人之兵矢田矢亦同其制則以此二矢而當二弓明矣經曰夾庾以授射犴侯鳥獸者今矰矢茀矢用諸弋射則此二矢而當二弓明矣唐大授學射者使者勞者即散射也今恆矢痺矢用於散射則此二矢而當二弓明矣潔苦結反鍭音候矰音增茀扶弗反痺必二反繳音酌刜孚物反輖定周反天子之弓合九而成規諸侯合七而成規大夫合五而成規士合三而成規句者謂之弊弓注曰體往來之衰也往體寡來體多則合多往體多來體寡則合少而圜弊猶惡也句者惡則直者善矣疏曰此皆據角弓反張不被弦而合之句音鉤凡祭祀共射牲之弓矢注曰射牲示親殺也殺牲非尊者所親惟射為可國語曰禘郊之事天子必自射其牲疏曰言凡語廣則天地宗廟皆有射牲之事澤共射椹質之弓矢注曰鄭司農云澤澤宫也所以習射選士之處也射義曰天子將祭必先習射於澤澤者所以擇士也已射於澤而後射於射宫射中者得與於祭大射燕射共弓矢如數並夾注曰如數如當射者之數也每人一弓乘矢並夾矢籋也夾音甲籋音聶大喪共明弓矢注曰弓矢明器之用器也士喪禮下篇曰用器弓矢凡師役會同頒弓弩各以其物從授兵甲之儀注曰物弓弩矢箙之屬王光逺曰從授兵甲之儀凡頒弓弩其多寡之數一視兵甲之儀而已田戈充籠箙矢共矰矢注曰籠竹箙也矰矢不在箙者為其相繞亂將用乃共之凡亡矢者弗用則更吳氏曰更償也用而棄之則不償若不用而亡之則償也繕人掌王之用弓弩矢箙矰弋抉拾注曰鄭司農云抉謂引弦彄也拾謂鞲扞也玄謂抉挾矢時所以持弦飾也著右手巨指士喪禮曰抉用正王棘若擇棘則天子用象骨與鞲扞者左臂裏以韋為之疏曰此繕人所掌謂司弓矢選擇大善者入繕人以共王用也抉古穴反彄苦侯反鞲古侯反扞胡旦反著丁略反擇音宅掌詔王射注曰告王當射之節疏曰王射先行燕禮以大夫為賔賔與王為耦所告之事亦如大射禮大射正告公之儀贊王弓矢之事注曰授之受之疏曰案大僕職已授之受之此又贊者大僕尊大僕贊時此官助贊也凡乘車充其籠服載其弓弩注曰充籠箙以盛矢疏曰繕人惟主王所乘之車而言既射則斂之注曰斂藏之也詩云彤弓弨兮受言藏之疏曰所斂者惟據王所乘車上有弓矢者既射還斂取藏之無會計注曰亡敗多少不計會古外反弨昌遙反稿人掌受財于職金以齎其工注曰齎其工者給市財用之直弓六物為三等弩四物亦如之注曰三等者上中下人各有所宜弓人職曰弓長六尺六寸謂之上制上士服之弓長六尺三寸謂之中制中士服之弓長六尺謂之下制下士服之弩及矢箙長短之制未聞矢八物皆三等箙亦如之春獻素秋獻成注曰矢箙春作秋成疏曰案司弓矢弓弩各有四矢應作四等而言三等蓋據長短為三等法齎音咨書其等以饗工注曰鄭司農云書工功拙高下之等以制其饗食也玄謂饗酒肴勞之也上工作上等其饗厚下工作下等其饗薄乘其事試其弓弩以上下其食而誅賞注曰鄭司農云乘計也計其事之成功也故書試為考玄謂考之而善則上其食尤善又賞之否者反是乃入功于司弓矢及繕人注曰功成凡齎財與其出入皆在稿人以待會而考之亡者闕之注曰皆在稿人者所齎工之財及弓弩矢箙出入其簿書稿人藏之闕猶除也弓弩矢箙棄亡者除之計今見在者戎右掌戎車之兵革使注曰使謂王使以兵有所誅斬也春秋傳曰戰於殽晉梁𢎞御戎萊駒為右戰之明日襄公縳秦囚使萊駒以戈斬之詔贊王鼓注曰既告王當鼓之節又助擊之疏曰大僕已贊王鼓此亦同是助擊其餘面也傳王命于陳中注曰為王大言之也會同充革車注曰會同王雖乘金路猶以革車從行也充之者謂居左也曲禮曰乘君之乘車不敢曠左盟則以玉敦辟盟遂役之鄭剛中曰以玉敦而辟盟者奉以告神乃辟開盟載之書也猶大史辟法之辟注曰役之者傳敦授當歃者贊牛耳桃茢注曰鄭司農云贊牛耳春秋傳所謂執牛耳者玄謂尸盟者割牛耳取助為之及血在敦中以桃茢拂之又助之也耳者盛以珠盤尸盟者執之桃鬼所畏也茢苕帚所以掃不祥疏曰殺牲取血旁有不祥故執此桃茢於血側也敦音對辟音闢苕音條帚之受反齊右掌祭祀會同賔客前齊車王乘則持馬行則陪乘注曰齊車金路王自整齊之車也前之者已駕王未乘之時陪乘參乘謂車右也齊右與齊僕同車而有祭祀之事則兼玉路之右然則戎右兼田右歟凡有牲事則前馬注曰王見牲則拱而式居馬前郤行備驚奔也曲禮曰國君下宗廟式齊牛齊側皆反下齊車齊僕齊牛同乘繩證反一音繩道右掌前道車王出入則持馬陪乘如齊車之儀注曰道車象路也王行道德之車疏曰言象據飾為名言道據行道為稱自車上諭命于從車詔王之車儀疏曰禮云式視馬尾顧不過轂皆是車上威儀故須詔之齊右不云者文不具王式則下前馬王下則以蓋從注曰以蓋從表尊疏曰蓋有二種一者禦雨二者表尊此則表尊之蓋也大馭掌馭玉路以祀及犯軷王自左馭馭下祝登受轡犯軷遂驅之注曰行山曰軷犯之者封土為山象以菩芻棘柏為神主既祭之以車轢之而去喻無險難也春秋傳曰跋涉山川自由也王由左馭禁制馬使不行也疏曰此據祭天之時故有犯軷之事及祭酌僕僕左執轡右祭兩軹祭軓乃飲注曰杜子春云軹謂兩轊也軓當為􅓶􅓶謂車軾前也疏曰及祭酌僕者即上文將犯軷之時當祭左右轂末及軾前乃犯軷而去酌僕者使人酌酒與僕僕即大馭也大馭則左執轡右祭三處訖乃飲始轢軷而去軷蒲末反軹音止軓音犯菩音員轢音厯轊音衛凡馭路行以肆夏趨以采薺注曰凡馭路謂五路也肆夏采薺樂章也行謂大寢至路門趨謂路門至應門凡馭路儀以鸞和為節注曰舒疾之法也鸞在衡和在軾皆以金為鈴薺才私反戎僕掌馭戎車注曰戎車革路也帥出王乘以自將掌王倅車之政正其服注曰倅副也服謂衆乘戎車者之衣服疏曰鄭注坊記云僕右恆朝服據非在軍時若在軍則服韋辨服犯軷如玉路之儀凡巡守及兵車之會亦如之注曰如在軍疏曰謂如其犯軷倅七內反掌凡戎車之儀注曰凡戎車衆之兵車也書序曰武王戎車三百兩易彥祥曰上文言馭戎車則王之革路此言戎車則衆之兵車也武王戎車三百兩其進退之節不愆於六步七步不愆於四伐五伐六伐七伐乃止齊焉則戎車之儀可知至大司馬於搜田之時亦有所謂坐作進退疾徐疏數之節戎僕所以掌其儀者此也齊僕掌馭金路以賓注曰以待賔客朝覲宗遇饗食皆乘金路其法儀各以其等為車送逆之節注曰節謂王乘車迎賓客及送相去逺近之數上公九十步侯伯七十步子男五十步司儀職曰車逆拜辱又曰及出車送疏曰春夏受贄於朝無迎法受享則有之秋冬一受之於廟受贄受享皆無迎法今言朝覲宗遇饗食皆乘金路者謂因此朝覲宗遇而與諸侯行饗食在廟即有乘金路迎賔客之法也道僕掌馭象路以朝夕燕出入其法儀如齊車注曰朝夕朝朝莫夕疏曰在正朝來往而言燕者以其在宫中行事皆稱燕掌二車之政令注曰二亦副田僕掌馭田路以田以鄙注曰田路木路也田田獵也鄙循行縣鄙掌佐車之政注曰佐亦副設驅逆之車注曰驅驅禽使前趨獲逆衙還之使不出圍令獲者植旌注曰以告獲也植樹也鄭剛中曰山虞植虞旗澤虞植虞旌為屬禽設此則令獲禽自植以告獲也及獻比禽注曰田弊獲者各獻其禽比種物相從次數之凡田王提馬而走諸侯晉大夫馳注曰提猶舉也晉猶抑也使人扣而舉之抑之皆止奔也馳放不扣王介甫曰提節之晉進之馳則亟進之尊者安舒卑者戚速馭夫掌馭二車從車使車王介甫曰二車副車從車謂屬車也使車謂使者所乘之車分公馬而駕治之注曰乘調六種之馬校人掌王馬之政注曰政謂差擇養乘之數也月令曰班馬政辨六馬之屬種馬一物戎馬一物齊馬一物道馬一物田馬一物駑馬一物注曰種謂上善似母者以次差之玉路駕種馬戎路駕戎馬金路駕齊馬象路駕道馬田路駕田馬駑馬給宫中之役王光逺曰其毛其足其力皆所謂物也司馬法曰宗廟齊毫尚純也田事齊足尚疾也戎事齊力尚強也此其物不可不辨校戶校反齊馬側皆反凡頒良馬而養乘之乘馬一師四圉三乘為皂皂一趣馬三皂為繫繫一馭夫六繫為廏廏一僕夫六廏成校校有左右鴑馬三良馬之數麗馬一圉八麗一師八師一趣馬八趣馬一馭夫注曰良善也善馬五路之馬鄭司農云四匹為乘養馬為圉故春秋傳曰馬有圉牛有牧玄謂二耦為乘師趣馬馭夫僕夫帥之名也趣馬下士馭夫中士則僕夫上士也自乘至廏其數二百一十六匹易乾為馬此應乾之䇿也至校變為言成者明六馬各一廏而王馬小備也校有左右則良馬一種者四百三十二匹五種合二千一百六十匹鴑馬三之則為千二百九十六匹五良一鴑凡三千四百五十六匹然後王馬大備詩云騋牝三千此謂王馬之大數與麗耦也鴑馬自圉至馭夫凡馬千二十四匹與三良馬之數不相應八皆宜為六字之誤也師十二匹趣馬七十二匹則馭夫四百三十二匹矣然後而三之既三之無僕夫者不駕於五路卑之也疏曰言養乘之者已下皆四四為耦是因養馬而乘習之乘繩證反皂才早反趣倉走反繫音計廏音救騋音來天子十有二間馬六種邦國六間馬四種家四間馬二種注曰降殺之差每廏為一間諸侯有齊馬道馬田馬大夫有田馬各一間其鴑馬則皆分為三焉趙商問大夫采地四甸一甸稅又給王其餘三甸才有馬十二匹與校人職相校甚異曰此馬皆君所制為非謂民賦司馬法甸有戎馬四匹長轂一乘此為民出軍賦無與於天子國馬之數事條未理而多紛紜凡馬特居四之一注曰欲其乘之性相似也物同氣則心一鄭司農云四之一者三牝一牡殺音曬春祭馬祖執駒注曰馬祖天駟也孝經説曰房為龍馬鄭司農云執駒無令近母猶攻駒也二嵗曰駒三嵗曰駣玄謂執猶拘也春通淫之時駒弱氣未定為其乘匹傷之疏曰春時通淫求馬蕃息故祭馬祖夏祭先牧頒馬攻特注曰先牧始養馬者其人未聞夏通淫之後攻其特為其蹄齧不可乘用鄭司農云攻特謂騬之疏曰祭先牧者夏草茂求肥充秋祭馬社臧僕注曰馬社始乘馬者世本作曰相士作乘馬鄭司農云臧僕謂簡練馭者令皆善也玄謂僕馭五路之僕疏曰秋時馬肥盛可乘用故祭始乘馬者冬祭馬步獻馬講馭夫注曰馬步神為災害馬者獻馬見成馬於王也馭夫馭二車從車使車者講猶簡習駣音肇騬音繩相息亮反凡大祭祀朝覲會同毛馬而頒之注曰毛馬齊其色也頒授當乘之疏曰此三者皆須馬從王毛馬者案毛詩傳云宗廟齊毫尚純也戎事齊力尚強也田獵齊足尚疾也爾雅亦云雖據宗廟至於田獵軍旅既尚疾尚力亦尚色也詩云四騵彭彭武王所乘又云四鐵孔阜秦襄公以田是齊色不専據宗廟飾幣馬執撲而從之注曰鄭司農云校人主飾之也幣馬以馬遺人當幣處者也聘禮曰馬則北面奠幣于其前士喪禮下篇曰薦馬纓三就入門北面交轡圉人夾牽之馭者執䇿立于馬後撲普卜反遺惟季反凡賓客受其幣馬注曰賓客之幣馬來朝覲而享王者大喪飾遣車之馬及葬埋之注曰言埋之則是馬塗車之芻靈田獵則帥驅逆之車注曰帥猶將也凡將事於四海山川則飾黃駒注曰四海猶四方也王巡守過大山川則有殺駒以祈沈禮與玉人職有宗祝以黃金勺前馬之禮疏曰山川地神土色黃故用黃駒凡國之使者共其幣馬注曰使者所用私覿疏曰使者王使之下聘問諸侯者上文飾幣馬是以馬遺人法非聘故無私覿前賓客來朝聘不言私覿者諸侯之臣於天子不敢行私覿故也凡軍事物馬而頒之注曰物馬齊其力陳及之曰亦頒於官府共軍事者耳不然校人六廏安能及庶民乎等馭夫之祿注曰馭夫於趣馬僕夫為中舉中見上下宫中之稍食注曰師圉府史以下也鄭司農云稍食曰廩項平甫曰廏庫皆近王宫一云馬有養于內非也趣馬掌贊正良馬而齊其飲食簡其六節注曰贊佐也佐正者謂校人臧僕講馭夫之時簡差也節猶量也差擇王馬以為六等掌駕説之頒注曰用馬之次第疏曰凡用馬當均勞逸故駕説須依次第説音稅辨四時之居治以聽馭夫注曰居謂收庌所處治謂執駒攻特之屬疏曰馬二月已前八月已後在廏二月已後八月已前在牧故云四時也趣馬下士屬馭夫中士故云聽馭夫庌音雅後同巫馬掌養疾馬而乘治之相醫而藥攻馬疾受財于校人注曰乘謂驅步以發其疾知所疾處乃治之相助也疏曰巫知馬祟醫知馬疾疾則以藥治之祟則辨而祈之二者相須故巫助醫也受財者謂共祈具及藥直馬死則使其賈粥之入其布于校人注曰布泉也鄭司農云賈謂其屬官小吏賈二人粥賣也相息亮反注同疏如字賈音古粥音育祟音嵗牧師掌牧地皆有厲禁而頒之注曰頒馬授圉者所牧處疏曰厲禁謂可牧馬之處亦使其地之民遮護禁止不得使民輒放牛馬孟春焚牧注曰焚牧地以除陳生新草也中春通淫注曰中春隂陽交萬物生之時可以合馬之牝牡也月令季春乃合纍牛騰馬遊牝于牧秦時書也秦地寒涼萬物後動掌其政令凡田事贊焚萊注曰焚萊者山澤之虞中音仲廋人掌十有二間之政教以阜馬佚特教駣攻駒及祭馬祖祭間之先牧及執駒散馬耳圉馬注曰九者皆有政教焉阜盛壯也詩云四牡孔阜杜子春云佚當為逸鄭司農云馬三嵗曰駣二嵗曰駒散讀為中散大夫之散謂聒馬耳母令善驚也玄謂逸者用之不使甚勞安其血氣也教駣始乘習之也攻駒騬其蹄齧者間之先牧先牧制間者散馬耳以竹括押其耳頭動搖則括中物後遂串習不復驚鄭剛中曰考此文二及字之義當為七事耳廋人職卑安得主馬祖之祭於校人祭馬祖之時已則祭間之先牧於校人命執駒之時已則散馬耳圉馬王介甫曰圉馬則成馬而圉之圉馬以校人執駒為節也佚音逸聒古活反正校人員選注曰校人謂師圉也王介甫曰正其員使員稱馬數正其選使選惟其能馬八尺以上為龍七尺以上為騋六尺以上為馬注曰大小異名爾雅曰騋牝驪牡玄駒裊驂鄭司農云以月令曰駕蒼龍王介甫曰小大異名使各從其類以待乘頒及以為種鄭剛中曰校人不辨六馬之屬廋人職卑乃於此言龍騋之尺寸何耶蓋十二間之廣二千五百餘匹之多馬有超然卓異藏乎其中人所不見自非主者表而出之則神駿之才逐電之足誰其知之故特於廋人言之裊奴了反圉師掌教圉人養馬春除蓐釁廏始牧夏庌馬冬獻馬射則充椹質茨牆則剪闔注曰蓐馬兹也馬既出而除之新釁焉神之也春秋傳曰凡馬日中而出日中而入庌廡也廡所以庇馬涼也充猶居也茨蓋也闔苫也椹質剪闔圉人所習也徐氏曰椹質以木為之縛草以代侯者銼草為苫苫之以蓋牆也蓐音辱庌五稼反茨在私反闔戶獵反廡亡甫反縳房入聲銼千臥反苫傷占反圉人掌養馬芻牧之事以役圉師注曰役者圉師使令焉凡賓客喪紀牽馬而入陳注曰賓客之馬王所以賜之者詩云雖無豫之路車乘馬喪紀之馬啓後所薦馬疏曰雖同牽馬入陳賓客與喪紀所陳有異賓客則在館天子使人就館而陳之若喪紀則天子將葬朝廟時在祖廟中陳設明器之時遣人薦馬及纓入廟陳之廞馬亦如之注曰廞馬遣車之馬人捧之亦牽而入陳職方氏掌天下之圖以掌天下之地辨其邦國都鄙四夷八蠻七閩九貉五戎六狄之人民與其財用九榖六畜之數要周知其利害注曰天下之圖如今司空輿地圖也鄭司農云東方曰夷南方曰蠻西方曰戎北方曰貉狄玄謂閩蠻之别也國語曰閩芊蠻矣四八七九五六周之所服國數也財用泉榖貨賄也利金錫竹箭之屬害神姦鑄鼎所象百物也爾雅曰九夷八蠻六戎五狄謂之四海坡謂周知其利害者周知其山川江湖之支湊可以設險之利與要害之處也乃辨九州之國使同貫利注曰貫事也疏曰使同其事利不失其所也鄭剛中曰自中國以至夷狄兼舉而周知之矣乃若國之有九州為五政之所加七賦之所養王者所治之區域也必使貫無不同則九州共貫利無不同則四海蒙利閩梅巾反貉孟白反芈音弭東南曰揚州易彥祥曰禹貢揚州之域東距海北據淮故曰淮海惟揚州殷人以淮入徐故揚州止謂之江南周人復以淮入揚而循禹之舊不言淮海而曰東南者變禹貢之文也其山鎮曰會稽其澤藪曰具區其川三江其浸五湖其利金錫竹箭其民二男五女其畜宜鳥獸其榖宜稻注曰鎮名山安地德者也大澤曰藪浸可以為陂灌溉者錫鑞也箭蓧也鳥獸孔雀鸞鵁鶄犀象之屬顧景范曰會稽山在浙江紹興府城東南十二里具區即太湖也亦曰震澤在江南蘇州府西南五十里接常州府及浙江湖州府界三江一曰松江自太湖分流出蘇州吳江縣南長橋口至嘉定縣東南四十里吳松口入海一曰婁江亦自太湖分流經蘇州城東至太倉州東南七十里劉家河口入海一曰東江亦自太湖分流從吳江縣東南入浙江嘉興府境至海鹽縣東北三十五里乍浦入海今由江南松江府合松江入海五湖孔氏云太湖東岸五彎曰菱湖遊湖莫湖貢湖胥湖水瀰漫而灘淺者曰藪窪下而鍾水者曰浸王介甫曰九州之序禹貢始於冀次以兖而終於雍職方始於揚次以荆而終於并者蓋禹貢言治水之序職方言逺近之序治水自帝都而始然後順水性所便自下而上故自兖至雍而止以逺近言之則周之化自北而南以南為逺故關睢鵲巢之詩分為二南漢廣亦言文王之道被于南國德化所及以逺為至故也始於揚州則以揚在東南次以荆則以荆在正南終於并則以并在正北先逺而後近也會古外反陂彼冝反鑞音獵篠素了反鵁音交鶄音精正南曰荆州易彥祥曰禹貢荆及衡陽惟荆州殷之荆州南不言衡陽循禹之舊也其北境則曰漢南以地志考之荆山在南郡臨沮縣即今荆門軍當陽縣之地漢水又在其北正屬襄陽言漢南則殷之荆州實跨荆山之北至周復以荆門之北屬豫復禹封域以荆及衡陽為荆州荆山即南條衡山即南嶽皆在正南之地故曰正南其山鎮曰衡山其澤藪曰雲瞢其川江漢其浸潁湛其利丹銀齒革其民一男二女其畜宜鳥獸其榖宜稻注曰潁出陽城宜屬豫州在此非也齒象齒也革犀兕革也杜子春云湛或為淮顧景范曰衡山在湖廣衡州府衡山縣西三十里雲瞢在湖廣德安府城南五十里江水發原四川成都府茂州西北之岷山厯梁荆揚三州之域至今江南揚州府海門縣東入海漢水發原于陜西漢中府沔縣西嶓冢山至湖廣漢陽府城東北入大江潁水發原河南府登封縣東陽乾山至江南鳯陽府潁州潁上縣界入淮湛未詳今河南汝州境內有湛水二水本在禹貢豫州之域瞢鳴鳯反湛直減反河南曰豫州昜彥祥曰禹貢荆河惟豫州其封在大河之南南條荆山之北故曰荆河殷之豫州則南境距漢北境接河故曰河南周人於豫州亦曰河南而南境則仍禹貢之舊不曰荆河互文以見也其山鎮曰華山其澤藪曰圃田其川滎雒其浸波溠其利林漆絲枲其民二男三女其畜宜六擾其榖宜五種注曰波讀為播禹貢曰滎播既都春秋傳曰楚子除道梁溠營軍臨隨則溠宜屬荆州在此非也林竹木也六擾馬牛羊豕犬雞五種黍稷菽麥稻顧景范曰華山在陜西西安府華州華陰縣南十里圃田在開封府中牟縣西北七里滎滎澤也今開封府鄭州滎澤縣是洛水出陜西西安府商州南冢嶺山至河南府鞏縣北入河波水通典云出歇馬嶺在今汝州魯山縣西北溠水通典云出黃山在今湖廣襄陽府棗陽縣東北滎戶扃反溠音詐播音波都張魚反正東曰青州易彥祥曰禹貢有青有兖有徐殷并青於徐而徐兼揚州之淮故江南曰揚州周復以淮歸揚而并徐於青正在畿東故曰正東其山鎮曰沂山其澤藪曰望諸其川淮泗其浸沂沭其利蒲魚其民二男二女其畜宜雞狗其榖宜稻麥注曰二男二女數等似誤也蓋當與兖州同二男三女鄭司農云淮或為睢沐或為洙顧景范曰沂山在青州府臨朐縣南百五十里孟豬在河南歸德府虞城縣禹貢屬豫州淮水發原河南南陽府唐縣東南桐柏山至江南淮安府安東縣東北入海泗水出兖州府泗水縣東陪尾山至江南淮安府清河縣南入淮今名南清河沂水出青州府莒州沂水縣西北雕崖山至淮安府邳州南入泗沭水出臨朐縣沂山至淮安府安東縣西入淮沭音述朐音劬崖音崖河東曰兖州易彥祥曰夏殷皆言濟河惟兖州謂東河之東濟水之北也周人以青兼徐而兖州又得越乎濟之東南故徐之岱山職方以為兖之所鎮徐之大野職方以為兖之澤藪是也故曰河東其山鎮曰岱山其澤藪曰大野其川河泲其浸廬維其利蒲魚其民二男三女其畜宜六擾其榖宜四種注曰廬維當為雷雍字之誤也禹貢曰雷夏既澤雍沮會同雷夏在城陽四種黍稷稻麥顧景范曰岱泰山也在濟南府泰安州北五里大野在兖州府濟寧州巨野縣東五里河從西域崑崙山至陜西西寧衛積石山乃入中國厯雍豫冀兖四州之域東北入海今從東南合淮入海濟水發原河南懷慶府濟源縣西王屋山至山東濟南府濵州利津縣東入海亦曰大清河廬水在濟南府長清縣西廢盧縣境濰水出青州府莒州西北箕屋山至萊州府濰縣東北入海禹貢屬靑州泲子禮反沮七餘反正西曰雍州易彥祥曰禹貢有雍有梁故梁為正西而雍為西北殷周皆省梁入雍故雍州為正西其山鎮曰嶽山其澤藪曰弦蒲其川涇汭其浸渭洛其利玉石其民三男二女其畜宜牛馬其榖宜黍稷注曰鄭司農云弦或為汧蒲或為浦顧景范曰嶽山在陜西鳯翔府隴州南百四十里弦蒲在隴州西四十里涇水出陜西平涼府城西南笄頭山至西安府高陵縣西南入渭汭水出弦蒲藪東北厯平涼府境至西安府邠州長武縣而合于涇渭水出陜西臨洮府渭原縣西鳥鼠山至西安府華州華陰縣北入大河洛水出慶陽府城東北廢洛原縣南流合漆沮二水至西安府同州朝邑縣南而入渭通典曰洛即漆沮也汭如鋭反汧口千反東北曰幽州易彥祥曰舜十二州本有幽州水土既平以冀為帝都省幽入冀殷人南都河南之亳復舜幽州之名周人又以幽州兼殷之營州實禹貢青州隔海東北之境故曰東北其山鎮曰醫無閭其澤藪曰貕養其川河泲其浸災時其利魚鹽其民一男三女其畜宜四擾其榖宜三種注曰四擾馬牛羊豕三種黍稷稻杜子春讀貕為奚顧景范曰醫無閭山在遼東廣寧衛西五里貕養在山東登州府萊陽縣在禹貢屬青州災水在濟南府淄川縣東南七十里時水在靑州府臨淄縣西二十五里易彥祥曰經於兖州言其川河泲蓋兖州北距河而南據泲禹貢言濟河惟兖州則惟兖州之川宜也幽州逺在東北於河泲何與蓋幽州雖跨有遼水為東北而實西南越海兼有青州之東北境所以琅琊郡之貕養澤泰山郡之淄水千乘郡之時水皆在幽州之域光武十三年以遼東屬青州二十四年還屬幽州是知幽州實可以有青州王璜張楫云九河陷海中是九河未陷之前凡登萊海岸及濵滄二州之東境皆在幽州之地與兖州東西分界故其川同於河泲貕音兮災禹貢作淄河內曰冀州易彥祥曰舜十有二州有幽有并有冀水土既平之後以冀為堯都省十有二州之幽并入焉以餘州凖之則知禹貢冀州東西南之三面距河南而北境則越平常山今之燕雲營平諸州皆其地也殷人復以冀州北境復舜之幽州而東西南皆禹迹之舊蓋東河之西西河之東南河之北也故曰兩河間周人又分冀而復舜之并州故曰河內而已其山鎮曰霍山其澤藪曰楊紆其川漳其浸汾潞其利松柏其民五男三女其畜宜牛羊其榖宜黍稷顧景范曰霍山在今山西平陽府霍州東南三十里爾雅秦有楊紆未詳漳水有二濁漳出山西潞安府長子縣西發鳩山清漳出太原府平定州樂平縣西南少山至河南彰德府臨漳縣西合焉其下流復分為二或從直隸河間府獻縣合滹沱河或從山東東昌府館陶縣合衛河汾水出太原府靜樂縣北管涔山至平陽府蒲州榮河縣西入太河潞水闞駰曰即濁漳水也今潞安府城西南二十里濁漳經焉土人猶呼為潞水通典曰潞河在密雲縣即今順天府境內之白河也滹喚胡反沱唐何反涔鋤林反正北曰并州易彥祥曰舜有并州禹貢以并入冀州殷因之周復分冀復舜并州以天下之勢言之冀州在西河之東雍州在西河之西并州介乎雍冀之間故曰正北其山鎮曰恆山其澤藪曰昭餘祁其川呼池嘔夷其浸淶易其利布帛其民二男三女其畜宜五擾其榖宜五種注曰五擾馬牛羊犬豕五種黍稷菽麥稻也凡九州及山鎮澤藪言曰者以其非一曰其大者耳此州界揚荆豫兖雍冀與禹貢略同青州則徐州地也幽并則青冀之北也無徐梁顧景范曰恆山在直𨽻真定府定州曲陽縣西北百四十里昭餘祁在太原府祈縣東七里呼沱水出太原代州繁畤縣東北秦戲山至直𨽻河間府靜海縣北小直沽入海嘔夷水出山西大同府蔚州靈丘縣西北高是山一名唐河至直𨽻保定府安州北合于易水淶水在保定府易州淶水縣東北三十里亦名北易水易水在保定府安州城北亦名南易水李氏曰禹貢無幽并職方無梁徐蓋周合梁徐于雍靑分冀野為幽并考工記言天下之大勢兩山之間必有川焉兩川之間必有塗焉廣谷大川風俗之所以分故推其高且大者先正之然後九州可别如大山定而山之西為兖大河定而河之南為豫此分畫之要也陳氏曰九州山川澤藪各在職方不屬諸侯之版觀詩不以圃田係鄭春秋不以沙麓係晉略可覩矣周季諸侯始擅不朌之利齊幹山海而桃林之塞郇瑕之地晉實私之此諸侯所以僭侈王室所以衰微也并卑盈反呼喚胡反池徒多反嘔焉侯反朌頒同塞音賽乃辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衛服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五里曰藩服注曰服事天子也詩云侯服于周凡邦國千里封公以方五百里則四公方四百里則六侯方三百里則七伯方二百里則二十五子方百里則百男以周知天下注曰以此率遍知四海九州邦國多少之數也方千里者為方百里者百以方三百里之積以九約之得十一有竒云七伯者字之誤也周九州之界方七千里七七四十九方千里者四十九其一為畿內餘四十八八州各有方千里者六周公變殷湯之制雖小國地皆方百里是每事言則者設法也設法者以待有功而大其封一州之中以其千里封公則可四又以其千里封侯則可六又以其千里封伯則可十一又以其千里封子則可二十五又以其千里封男則可百公侯伯子男亦不是過也州二百一十國以男備其數焉其餘以為附庸四海之封黜陟之功亦如之雖有大國爵稱子而已鄭司農云此制亦見大司徒職坡謂此九法所謂制畿封國以正邦國也有公侯伯子男之異爵則設儀辨位以等邦國亦在中焉凡邦國小大相維注曰大國比小國小國事大國各有屬相維聫也疏曰王制云五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯彼雖是殷制亦可證各有屬相維聫之意王設其牧注曰選諸侯之賢者為牧使牧理之坡謂此與上節即九法所謂建牧立監以維邦國也而比小事大以和邦國亦在其中焉比毗志反制其職各以其所能注曰牧監參伍之屬用能所任秩次坡謂制其職各以所能則賢與功可得有為而所以作邦國在此矣制其貢各以其所有注曰國之地物所有坡謂此一節即九法所謂施貢分職以任邦國也王將巡守則戒于四方曰各修平乃守考乃職事無敢不敬戒國有大刑注曰乃猶女也守謂國竟之內職事所當共具及王之所行先道帥其屬而巡戒令注曰先道先由王所從道君前行其前日所戒之令王殷國亦如之注曰殷猶衆也十二歲王若不巡守則六服盡朝謂之殷國其戒四方諸侯與巡守同疏曰王殷國所在無常或在畿內國城外即為之或向畿外諸侯之國行之故有戒令之事巡守音狩女音汝竟音境土方氏掌土圭之法以致日景注曰致日景者夏至景尺有五寸冬至景丈三尺其間則日有長短以土地相宅而建邦國都鄙注曰土地猶度地知東西南北之深而相其可居者宅居也坡謂邦國都鄙兼王國侯邦畿內畿外皆在焉相息亮反度待洛反深音諗以辨土宜土化之法而授任地者注曰土宜謂九榖植稚所宜也土化地之輕重糞種所宜用也任地者載師之屬疏曰既為土方氏非直度地相宅亦當相地所宜故須辨之授謂以書作法授之黃文叔曰所謂景短多寒景長多暑景朝多陰景夕多風土宜土化由是而有其法焉王巡守則樹王舍注曰為之藩羅疏曰謂若掌舍設梐枑之時則此官亦為王於外周匝樹藩羅懷方氏掌來逺方之民致方貢致逺物而送逆之達之以節注曰逺方之民四夷之民也諭德延譽以來之逺物九州之外無貢法而至者達民以旌節達貢物以璽節坡謂逺方之民非直四夷也自他州而來者皆是逺物非直藩國之貨也凡貿遷有無者皆是上土方既使其有奠居此官主綏懷之令相來往也治其委積館舍飲食注曰續食其往來疏曰案遺人云十里有廬廬有飲食三十里有宿宿有委五十里有市市有積合方氏掌達天下之道路注曰津梁相湊不得陷絶通其財利注曰茂遷其有無同其數器注曰權衡不得有輕重一其度量注曰尺丈釜鍾不得有大小除其怨惡注曰怨惡邦國相侵虐同其好善注曰所好所善謂風俗所高尚坡謂馮弱犯寡則眚之司馬之九伐也以俗教安司徒之十二教也妄意此官皆柔逺人之事抑文承通財利之後則除其怨惡者禁土著為孤客患同其好善者彼此地産交相好善則茂遷者利其息上懷方來逺方之民此官達其道路以濟不通也懷方致逺物此官為之均平使樂來往也訓方氏掌道四方之政事與其上下之志注曰道猶言也為王説之四方諸侯也上下君臣也誦四方之傳道注曰傳道世世所傳説往古之事也為王誦之若今論聖德堯舜之道矣疏曰政事及上下之志知則向玊道未必誦之古昔之善道恆誦之在口王問則為王誦之正嵗則布而訓四方注曰布告以教天下使知世所善惡坡謂四方政事與上下之志皆有善惡王既知之則布而訓之使善者知勉惡者知改且以傳道訓之使則古昔而觀新物注曰四時於新物出則觀之以知民志所好惡志淫行辟則當以政教化正之黃文叔曰布而訓四方使述其舊美也觀新物察風俗之變也形方氏掌制邦國之地域而正其封疆無有華離之地注曰華讀為􅏠哨之􅏠正之使不􅏠邪離絶疏曰形方氏主知四方土地形勢故使掌作邦國之地域大小形勢又當正其封疆勿使相侵􅏠者兩頭寬中狹邪者一頭寬一頭狹使小國事大國大國比小國注曰比猶親也鄭剛中曰其所以使地不華離者蓋使小國近大國事之以自立大國近小國比之以自固然非形方氏制其地形使各相聫屬雖欲使小大相事相比不相侵其疆埸亦不可得也華音誇􅏠若哇反哨羊售反山師掌山林之名辨其物與其利害而頒之于邦國使致其珍異之物注曰山林之名與物若岱畎絲枲嶧陽孤桐矣利其中人用者害毒物及螫噬之蟲獸疏曰此山師及下川師原師等皆是遙掌畿外邦國之內山川原隰之等使出稅珍異以供王家也畎古犬反嶧音亦螫音釋川師掌川澤之名辨其物與其利害而頒之于邦國使致其珍異之物注曰川澤之名與物若泗濱浮磬淮夷蠙珠暨魚澤之萑蒲萑音丸邍師掌四方之地名辨其丘陵墳衍邍隰之名注曰地名謂東原大陸之屬物之可以封邑者注曰物之謂相其土地可以居民立邑疏曰小司徒云四井為邑據田中千室之邑據城二者皆須物色其善惡然後封民劉執中曰此謂五等封國之餘地未有邑以管其民者不爾則諸侯吞之矣可以贊司馬正邦國之封疆邍同原匡人掌達法則匡邦國而觀其慝使無敢反側以聽王命注曰法則八法八則也邦國之官府都鄙亦用焉慝姦偽之惡也反側猶背違法度也書曰無反無側王道正直撢人掌誦王志道國之政事以巡天下之邦國而語之注曰道猶言也以王之志與政事諭説諸侯使不迷惑使萬民和説而正王面注曰面猶鄉也使民之心曉而正鄉王疏曰以上二事向諸侯説之使諸侯化民而萬民正鄉于王撢音探語魚據反和説音悅鄉音向都司馬掌都之士庶子及其衆庶車馬兵甲之戒令注曰庶子卿大夫士之子車馬兵甲備軍發卒疏曰士適子庶子其支庶若王家有軍事徴兵于采地都鄙則都司馬以書致於士庶子有此衆庶車馬兵甲之戒令士庶子受而行之以國法掌其政學政謂軍之賦稅也學修德學道王次點曰古者國之子弟無時不知教無處不有學退在學校受教於司樂大胥諸子進在王所受教於師保氏入而宿衛有宫伯案其在版者而教之出而守禦有都司馬掌其政學以教之出入進退教未嘗不行乎其間非若後世之教止於庠序而庠序之教又為具文以聽國司馬注曰聽者受行其所徴為也國司馬大司馬之屬皆是家司馬亦如之注曰大夫家臣為司馬者春秋傳曰叔孫氏之司馬􅎦戾􅎦子公反坡謂大司馬掌邦政而以兵事為先故凡兵甲車馬之政隸僕御從之官九州邦國之形勝厄塞要害皆屬焉軍無賞士不往凡軍以賞為先故首司勳軍行以馬故馬質次之軍舍有壘故量人次之小子斬羊牲徇陳示罰也次之羊人共羊牲又次之繼以司爟者火政兵事之要也設險守固制勝於未形故掌固司險掌疆候人次之譏察非常簫勺羣慝故環人之察巡挈壺之序柝又次之射以習戰兵事所急故射人次之服不射鳥羅氏掌畜四職皆因射而及故并屬之焉司士辨論官材進退爵祿古司馬之遺也抑朝為卿士大夫軍為將帥司馬師中丈人得賢非要乎而諸子之治國子司右之治戎右皆此意也自是以下至圉人數十職則詳衛王之政虎賁旅賁夾衛王車節服方相皆因衛車而及故相次焉大僕小臣祭僕御僕隸僕王之出入或駟乘或先後皆武衛之官又次之王車有五路乘車之冕辨各有宜故辨師次之車中甲兵戈盾弓矢具故司甲司兵司戈盾司弓矢繕人稿人次之戎右齊右道右為車右者所謂勇士也大馭戎僕齊僕道僕田僕馭夫御車者所謂僕夫也馬以駕車次之校人趣馬巫馬牧師廋人圉師圉人皆掌馬官也然馬質不列此者蓋馬質所給者軍馬此所共者王馬職掌不同文亦異設宜矣職方土方懷方合方訓方形方以及山師川師原師匡人撢人皆所以柔逺人懷諸侯且秉天下之土地形勢山川林澤原野之險易而遏其僭侈施訓道匡正之法以釋其悖心可銷兵於未形止亂於未萌者都家司馬在食邑采地中故附見焉蓋愚聞於元兄而推廣其意如此自大司馬至職末為官凡七十周禮述注卷十九
