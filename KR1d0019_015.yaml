body:
  text: 周禮述註卷十五安溪李光坡撰大卜掌三兆之灋一曰玉兆二曰瓦兆三曰原兆註曰兆者灼龜𤼵於火其形可占者其象似玉瓦原之璺鏬是用名之焉上古以来作其灋可用者有三原原田也杜子舂云玉兆帝顓頊之兆瓦兆帝堯之兆原兆有周之兆疏曰大卜所掌先三兆後三易次三夢者筮短龜長夢以叶卜筮故以先後為次趙商問杜子春所云并下子春云連山宓戲歸蔵黄帝敢問子春何由知之鄭答云此數者非無眀文改之無據故著子春説而已近師皆以為夏殷周其經兆之體皆百有二十其頌皆千有二百註曰頌謂繇也三灋體繇之數同其名占異耳百二十毎體十繇體有五色又重之以墨坼也五色者洪範所謂曰雨曰濟曰圛曰蟊曰尅坡謂疏云龜兆有五而為百二十者則兆别分為二十四分此言是也盖以木火土金水與春夏秋冬相乘一嵗有二十四氣五行運於其間各有生死以此視其衰死王相以決吉凶也璺音問鏬火嫁反宓戲讀伏羲坼勅白反圛音亦蟊音濛掌三易之灋一曰連山二曰歸藏三曰周易註曰易者揲蓍變易之數可占者也名曰連山以山出内氣也歸藏者萬物莫不歸而藏於其中杜子春云連山宓戲歸藏黄帝其經卦皆八其别皆六十有四註曰三易卦别之數亦同其名占異也毎卦八别者重之數坡伯兄曰龜象也筮數也求象於兆求數於變其灋不同體有百二卦有六十其道亦異蓋卜書之亡久矣學者因莫之見遂曰卜筮皆出於易而援易繫卜筮蓍龜之言以證之考之春秋内外𫝊先秦古書所舉卜筮之繇其繫於筮者皆今周易文也卜繇别為言語絶無隻句與易相似者豈可溷乎愚則以為卜書五行也筮書隂陽也洪範曰卜五占用二此卜筮之大要也春秋傳晉卜救鄭遇水適火而史趙輩皆舉五行尅勝之義占之卜之畧例於此可見溷音混掌三夢之灋一曰致夢二曰觭夢三曰咸陟註曰夢者人精神所寤可占者鄭剛中曰有心而夢出於有所因故曰致觭從角從竒盖角出竒異所謂怪異之夢無心感物謂之咸升而有至者謂之陟咸陟言無心所感精神升降有所致而得夢也其經運十其别九十註曰運或為緷當為煇是眂祲所掌十煇也王者於天日也夜有夢則晝視日旁之氣以占其吉凶凡所占者十煇每煇九變此術今亡坡伯兄曰三夢舊註亦分三代其說無據且直云其經運十其别九十異於前文則知三夢一灋致夢者有以致之如晝所思為夜則成夢是致夢也觭杜讀為竒竒夢亦思為所致而詭異不測衛玠謂夢有想有因致夢觭夢之謂也咸感也陟升也精神感而上通與鬼神合其吉凶以其無心焉故謂之咸也此三者足以盡夢之變矣觭居綺反緷煇同音運以邦事作龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳註曰國之大事待蓍龜而決者有八定作其辭於將卜以命龜也鄭司農云征謂征伐人也象謂災變雲物如衆赤烏之屬有所象似易曰天垂象見吉凶春秋傳曰天事恒象皆是也與謂予人物也謀謂謀議也果謂事成與不也至謂至不也雨謂雨不也瘳謂疾瘳不也𤣥謂征亦云行廵守也與謂所與共事也果謂以勇決為之坡謂八命之序征者存亡所係象者休咎所關國之大故也次以曰與曰謀事之從内出而未決者也曰果曰至事之從外來而未決者也次以曰雨曰瘳則一時一身事耳盖以大小内外為序也以八命者贊三兆三易三夢之占以觀國家之吉凶以詔救政疏曰以上文八事命龜之辭贊佐也佐明三兆三易三夢之占辭將此辭演出其意以觀國家之吉凶詔告也凶則告凶救其政使王改過自新凡國大貞卜立君卜大封則眡髙作龜註曰卜立君君無冢適卜可立者卜大封謂竟界侵削卜以兵征之若魯昭元年秋叔弓帥師疆鄆田是也眡高以龜骨高者可灼處示宗伯也大事宗伯涖卜卜因龜之腹骨骨近足者其部高貞問也問於正者必先正之乃從問焉作龜謂以火灼之以作其兆也春灼後左夏灼前左秋灼前右冬灼後右士喪禮曰宗人受卜人龜示高涖卜受視反之又曰卜人坐作龜疏曰貞正也凡國家有大事正問於龜之事有二則卜立君卜大封是也云則眡髙作龜者凡卜灋在襧廟廟門閾外闑西南北面有席先陳龜於廟門外之西塾上又有貞龜謂正龜於閾外席上又有涖卜命龜眡髙作龜六節尊者宜逸卑者宜勞從下向上差之作龜眂髙二者勞事以大貞事大故大卜身為勞事則大宗伯臨卜其餘陳龜貞龜皆小宗伯為之也適丁歴反竟音境鄆音運大祭祀則眂髙命龜註曰命龜告龜以所卜之事不親作龜者大祭祀輕於大貞也士喪禮曰宗人即席西面坐命龜凡小事涖卜註曰代宗伯疏曰小事既大卜涖卜則陳龜貞龜命龜眂髙皆卜師為之其作龜則卜人也國大遷大師則貞龜註曰正龜於卜位也士喪禮曰卜人抱龜燋先奠龜西面是也又不親命龜亦大遷大師輕於大祭祀也疏曰貞龜上有涖卜亦大宗伯為之陳龜亦宜小宗伯也其眡髙命龜卜師作龜卜人燋哉約反凡旅陳龜註曰陳龜於饌處也士喪禮曰卜人先奠龜于西塾上南首是也不親貞龜亦以卜旅祭非常輕於大遷大師也疏曰涖卜仍是大宗伯貞龜命龜眂髙皆卜師亦卜人作龜凡喪事命龜註曰重喪禮次大祭祀也士喪禮則筮宅卜曰天子卜葬兆凡大事大卜陳龜貞龜命龜眂髙其他以差降焉疏曰命龜之上有陳龜貞龜亦小宗伯涖卜還是大宗伯眂髙作龜卜師也卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆註曰方功義弓之名未聞黄文叔曰卜師揚火作龜開龜之四兆正謂作龜其兆有四方功義弓璺坼之象龜筴𫝊首足俯仰開跲盖其餘灋坡伯兄曰舊註開出其占書而以占者下占人之事也卜師所掌在於作龜而不在於占龜所謂開龜者盖若鑿龜之義云耳四兆者鑿龜之四方上篇鄭氏云春灼後左夏灼前左秋灼前右冬灼後右以正此四兆者為得其實筴策同凡卜事眂髙疏曰凡卜眂髙者謂大卜不眂髙者皆卜師眂髙以龜髙處示涖卜也揚火以作龜致其墨註曰揚猶熾也致其墨者爇灼之明其兆坡伯兄曰墨者墨其將灼之處而灼之以致其兆也書曰惟洛食蓋食墨之謂愚謂卜蓋有龜焦者有不食墨者皆不待兆成而知其凶也夫墨水也燋契火也火過而陽則焦矣火過而隂則不食矣凡卜辨龜之上下左右隂陽以授命龜者而詔相之註曰所卜者當各用其龜也大祭祀喪事大卜命龜則大貞小宗伯命龜其他卜師命龜卜人作龜則亦辨龜以授卜師上仰者也下俯者也左左倪也右右倪也隂後弇也陽前弇也詔相告以其辭及威儀龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之註曰屬言非一也色謂天龜𤣥地龜黄東龜青西龜白南龜赤北龜黒龜俯者靈仰者繹前弇果後弇獵左倪靁右倪若是其體也東龜南龜長前後在陽象經也西龜北龜長左右在隂象緯也天龜俯地龜仰東龜前南龜郤西龜左北龜右各從其耦也杜子春讀果為羸果魯火反凡取龜用秋時攻龜用春時各以其物入于龜室註曰六龜各異室也秋取龜及萬物成也攻治也治龜骨以春是時乾解不發傷也疏曰六龜各入於一室以其蓍龜嵗易秋取春攻訖即欲易去前龜也解音懈上春釁龜祭祀先卜註曰釁者殺牲以血之神之也先卜始用卜筮者言祭言祀尊焉天地之也世本作曰巫咸作筮卜未聞其人也是上春者夏正建寅之月月令孟冬云釁祠龜策相互矣秦以十月建亥為嵗首則月令秦世之書亦或欲以嵗首釁龜耳若有祭事則奉龜以往註曰奉猶送也送之所當於卜旅亦如之喪亦如之菙氏掌共燋契以待卜事註曰士喪禮曰楚焞置于燋在龜東楚焞即契所用灼龜也燋謂炬其存火凡卜以眀火爇燋遂龡其焌契以授卜師遂役之註曰杜子春云眀火以陽燧取火於日𤣥謂焌讀如戈鐏之鐏謂以契柱燋火而吹之也契既然以授卜師用作龜也役之使助之王光逺曰焌者契之鋭頭也焌音俊鐏存悶反占人掌占龜以八簭占八頌以八卦占簭之八故以眂吉凶占人亦占筮言掌占龜者筮短龜長主於長者以八簭占八頌謂將卜八事先以筮筮之八頌者八事之將卜諸頌也簭人職所謂大事先筮而後卜也以八卦占筮之八故謂八事不卜而徒筮之也凡卜簭君占體大夫占色史占墨卜人占坼註曰體兆象也色兆氣也墨兆廣也坼兆釁也體有吉凶色有善惡墨有大小坼有微眀尊者視兆象而已卑者以次詳其餘也周公卜武王占之曰體王其無害凡卜象吉色善墨大坼明則逢吉疏曰此已下皆據卜言兼云筮者凡下皆先筮故連言之體謂金木水火土五種之兆兆之墨縱横其形體象似金木水火土也凡卜欲作龜之時灼龜之四足依四時而灼之其兆直上向背者為木兆直下向足者為水兆邪向背者為火兆邪向下者為金兆横者為土兆色兆中氣色似有雨及雨止之等墨據兆之正釁處坼就正墨傍有竒釁罅者凡卜簭既事則繫幣以比其命嵗終則計其占之中否註曰謂既卜筮史必書其命龜之事及兆於策繫其禮神之幣而合藏焉書曰王與大夫盡弁開金縢之書乃得周公所自以為功代武王之說是命龜書中丁仲反簭人掌三易以辨九簭之名一曰連山二曰歸藏三曰周易九簭之名一曰巫更二曰巫咸三曰巫式四曰巫目五曰巫易六曰巫比七曰巫祠八曰巫參九曰巫環以辨吉凶註曰此九巫讀皆當為筮字之誤也更謂筮遷都邑也咸猶僉也謂筮衆心歡否也式謂筮制作灋式也目謂事衆筮其要所當也易謂民衆不説筮所改易也比謂筮與民和比也祠謂筮牲與日也參謂筮御與右也環謂筮可致師不也劉公是曰此乃前世通於占者九人其遺灋存於書可𫝊者也古者占筮之工通謂之巫更咸式目等皆其名也巫咸見於他書多矣易疑為昜昜古陽字所謂巫陽也其它則未聞雖未聞不害其有也坡謂漢書郊祀志晉巫所祀有巫祠之名亦其一徵凡國之大事先簭而後卜註曰當用卜者先簭之即事漸也於簭之凶則止不卜上春相簭註曰相謂更選擇其蓍也蓍龜歳易者與相息亮反凡國事共簭占夢掌其歳時觀天地之㑹辨隂陽之氣註曰其嵗時今嵗四時也天地之㑹建厭所處之日辰隂陽之氣休王前後疏曰建謂斗柄所建謂之陽建故左旋於天厭謂日前一次謂之隂建故右旋於天堪輿天老曰假令正月陽建於寅隂建於戍以日月星辰占六夢之吉凶註曰日月星辰謂日月之行及合辰所在春秋昭三十一年十二月辛亥朔日有食之是夜也晉趙簡子夢童子倮而轉以歌旦而日食占諸史墨對曰六年及此月也吳其入郢乎終亦弗克入郢必以庚辰日月在辰尾庚午之日日始有適火勝金故弗克此以日月星辰占夢者其術則今八㑹其遺象也用占夢則亡一曰正夢註曰無所感動平安自夢二曰噩夢註曰杜子春云噩當為驚愕之愕謂驚愕而夢三曰思夢註曰覺時所思念之而夢四曰寤夢註曰覺時道之而夢坡謂寤寐覺也寤夢者謂如覺所見而實夢也如狐突遇太子申生然五曰喜夢註曰喜悦而夢六曰懼夢註曰恐懼而夢噩愕同王于况反倮魯火反郢以井反適直革反季冬聘王夢獻吉夢于王王拜而受之註曰聘問也夢者事之祥吉凶之占在日月星辰季冬日窮于次月窮于紀星迴于天數將幾終於是發幣而問焉若休慶之云爾因獻羣臣之吉夢于王歸美焉詩云牧人乃夢衆維魚矣旐維旟矣此所獻吉夢坡伯兄曰古者占夢必參以天地隂陽謂人感天地隂陽之氣於是乎有動於機而形於夢夫天地之㑹隂陽之氣變化於四時不可睹也故察之乎日月星辰而象見矣春秋傳趙簡子之事詳自註中史記宋元王夢一丈夫延頸而長頭衣元繡之衣而乘輜車曰我為江使於河而幕網當吾路豫且得我我不能去王有徳義故来告訴召博士衛平問之平乃援式而起仰天而視月之光觀斗所指定日處鄉四維已定八卦相望視其吉凶介蟲先見乃對元王曰今昔壬子宿在牽牛河水大㑹鬼神相謀漢正南北江河固期南風新至江使先來白雲擁漢萬物盡留斗柄指日使者當囚元服輜車其名為龜王急使人問而求之此皆以日月星辰占夢之灋也噩謂所夢可驚愕此六夢者致夢竒夢咸陟皆有焉問王之夢而獻其吉者則凶者在所脩省可知乃舎萌于四方以贈惡夢註曰舍讀為釋舎萌猶釋菜也古書釋菜釋奠多作舎字萌菜始生也贈送也欲以新善去故惡遂令始難敺疫註曰令令方相氏也難謂執兵以有難郤也方相氏掌蒙熊皮黄金四目𤣥衣朱裳執戈揚盾師百隸為之敺疫厲鬼也疏曰始難文承季冬之下是據季冬大難而言難儺同眂祲掌十煇之灋以觀妖祥辨吉凶註曰妖祥善惡之徵鄭司農云煇謂日光炁也坡伯兄曰眂祲蓋贊占夢以觀日月星辰之氣即史記所謂暈者是也大卜註以此十煇為十運愚意謂經運十者日之經運固有十耳煇氣以贊經運之占而占固不止於煇也一曰祲二曰象三曰䥴四曰監五曰闇六曰瞢七曰彌八曰敘九曰隮十曰想註曰鄭司農云祲隂陽氣相侵也象者如赤烏也䥴謂日旁氣四面反向如煇狀也監雲氣臨日也闇日月食也瞢日月瞢瞢無光也彌者白虹彌天也叙者雲有次序叙如山在日上也隮者升氣也想者煇光也𤣥謂䥴讀如童子佩䥴之䥴謂日旁氣刺日也監冠珥也彌氣貫日也隮虹也詩云朝隮于西想雜氣有似可形想煇音運本亦作暈音同䥴音攜瞢音夢隮子兮反炁音氣掌安宅叙降註曰宅居也降下也人見妖祥則不安主安其居處也次敘其凶旤所下謂禳移之疏曰人見妖祥則不安此官主安宅故敘次凶旤所下之地禳移之其心則安正嵗則行事註曰占夢以季冬贈惡夢此正月而行安宅之事所以順民嵗終則弊其事註曰弊斷也謂計其吉凶然否多少大祝掌六祝之辭以事鬼神示祈福祥求永貞一曰順祝二曰年祝三曰吉祝四曰化祝五曰瑞祝六曰筴祝註曰永長也貞正也求多福歴年得正命也徐氏曰順祝者天人和同納于大順也年祝者謂五氣時若常大有年也吉祝者斂時五福吉無不利也化祝者謂化被六極以為和氣也瑞祝者不愛道寳而形為上瑞也筴祝者龜筮不違于人是謂大同也坡謂順祝年祝天地之福祥也吉祝化祝人之福祥也瑞祝筴祝物之福祥也故其序如此掌六祈以同鬼神示一曰類二曰造三曰禬四曰禜五曰攻六曰説註曰祈嘄也謂為有災變號呼告于神以求福天神人鬼地示不和則六癘作見故以祈禮同之造祭於祖也鄭司農云類造禬禜攻説皆祭名也類祭于上帝禜日月星辰山川之祭也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之災於是乎禜之𤣥謂類造加誠肅求如志禬禜告之以時有災變也攻説則以辭責之禜如日食以朱絲禜社攻如其鳴鼓然董仲舒救日食祝曰炤炤大眀瀐滅無光奈何以隂侵陽以卑侵尊是之謂説也禬未聞焉類造禬禜皆有牲攻説用幣而已項平甫曰六祝所以求福六祈所以禳禍造七報反嘄音禱見賢遍反炤章搖反作六辭以通上下親疎逺近一曰祠二曰命三曰誥四曰㑹五曰禱六曰誄註曰鄭司農云祠當為辭謂辭令也命論語所謂為命禆諶草創之誥謂康誥盤庚之誥之屬也盤庚將遷于殷誥其世臣卿大夫道其先祖之善功故曰以通上下親疎遠迎㑹謂王官之伯命事於㑹胥命於蒲主為其命也禱謂禱於天地社稷宗廟主為其辭也春秋傳鐵之戰衛太子禱曰之屬誄謂積累生時徳行以錫之命主為其辭也春秋傳孔子卒哀公誄之此皆有文雅辭令難為者也故大祝官主作六辭𤣥謂一曰祠者交接之辭春秋傳曰古者諸侯相見號辭必稱先君以相接辭之辭也㑹謂㑹同盟誓之辭坡謂辭與命所􅊶者廣五禮皆有焉誥與㑹則各因一事而𤼵禱與誄則事起無常此其序也辨六號一曰神號二曰鬼號三曰示號四曰牲號五曰齍號六曰幣號註曰號謂尊其名更為美稱焉神號若云昊天上帝鬼號若云皇祖伯某示號若云后土地示幣號若玉云嘉玉幣云量幣鄭司農云牲號為犧牲皆有名號曲禮曰牛曰一元大武豕曰剛鬛羊曰柔毛雞曰翰音齍號為黍稷皆有名號也曲禮曰黍曰薌合粱曰薌萁稻曰嘉疏少牢饋食禮曰敢用柔毛剛鬛士虞禮曰敢用潔牲剛鬛香合齍音咨鬛力輒反薌音鄉萁音姬辨九祭一曰命祭二曰衍祭三曰炮祭四曰周祭五曰振祭六曰擩祭七曰絶祭八曰繚祭九曰共祭註曰鄭司農云擩祭以肝肺菹擩鹽醢中以祭也繚祭以手從肺本循之至于末乃絶以祭也絶祭不循其本直絶肺以祭也特牲饋食禮曰取菹擩于醢祭于豆間鄉射禮曰取肺坐絶祭鄉飲酒禮曰右取肺左郤手執本坐弗繚右絶末以祭少牢曰取肝擩于鹽振祭𤣥謂九祭皆謂祭食者命祭者玉藻曰君若賜之食而君客之則命之祭然後祭是也衍字當為延炮字當為包聲之誤也延祭者曲禮曰主人延客祭是也包猶兼也兼祭者有司曰宰夫贊者取白黑以授尸尸受兼祭于豆間是也周猶徧也徧祭者曲禮曰殽之序徧祭之是也振祭擩祭本同不食者擩則祭之將食者既擩必振乃祭也絶祭繚祭亦本同禮多者繚之禮畧者絶則祭之共猶授也主祭食宰夫授祭孝經說曰共綏執授坡謂凡此九祭祭祀及生人飲酒皆有焉命祭以祭祀言之特牲所謂尸坐祝命挼祭是也衍依作衍衍祭者尸卒食主人酳而尸祭註云酳猶衍也在生人則養老執爵而酳是也兼祭以生人言之公食大夫禮賓之兼祭庶羞是也徧祭以祭祀言之少牢尸十一飯所舉所祭見其周矣命衍炮周列祭食之式其别有四也振擩絶繚列祭食之儀亦有四者之别也共祭則凡祭皆共之故終焉炮百交反擩音㽔繚音了共音恭挼音墮辨九􅉔一曰䭫首二曰頓首三曰空首四曰振動五曰吉􅉔六曰凶􅉔七曰竒􅉔八曰襃􅉔九曰肅􅉔以享右祭祀註曰稽首拜頭至地也頓首拜頭叩地也空首拜頭至手所謂拜手也吉拜拜而後稽顙謂齊衰不杖以下者言吉者此殷之凶拜周以其拜與頓首相近故謂之吉拜云凶拜稽顙而後拜謂三年服者杜子春云竒讀為竒偶之竒謂先屈一膝今雅拜是也鄭大夫云竒拜謂一拜也襃讀為報報拜再拜是也鄭司農云肅拜但俯下手今時撎是也介者不拜故曰為事故敢肅使者𤣥謂振動戰栗變動之拜書曰王動色變一拜答臣下拜再拜拜神與尸享獻也謂朝獻饋獻也右讀為侑侑勸尸食而拜疏曰此九拜之中四種是正拜稽首頓首空首此三者相因而為之空首者先以兩手拱至地乃頭至手以其不至地故名空首頓首者為空首之時引頭至地首頓地即舉故名頓首稽稽留之字頭至地多時則為稽首也稽首拜中最重臣拜君之拜頓首平敵自相拜之拜空首君答臣下拜肅拜但屈膝鞠躬以為禮惟軍中有此婦人亦以肅拜為正其餘五者附此四種振動附稽首吉拜附頓首凶拜亦附稽首竒拜附空首襃拜亦附稽首此九拜不專為祭祀以祭事重故舉以言坡謂六祝候善氣六祈弭變氣所以交於神六辭所以交於人此治神人之文辭也六號者祭先祝祝有號既祝迎尸入食則有祭故辨九祭食必拜送拜受故辨九拜而凡生人祭拜之禮倣焉此治神人之威儀也此其序也䭫稽同音啟襃音報撎於至反凡大禋祀肆享祭示則執眀水火而號祝註曰眀水火司烜所共日月之氣以給烝享執之如以六號祝眀此圭潔也禋祀祭天神也肆享祭宗廟也疏曰號祝執眀水火眀主人圭潔之徳隋釁逆牲逆尸令鐘鼓右亦如之註曰隋釁謂薦血也凡血祭曰釁既隋釁後言逆牲容逆鼎右讀亦當為侑坡謂逆尸乃逆牲牲殺乃薦血釁薦血也薦血之後乃有膟膋隋于主前之禮盖以自下向上為立言之序也来瞽令臯舞註曰臯讀為卒嘷呼之嘷來嘷者皆謂呼之入相尸禮註曰延其出入詔其坐作既祭令徹隋許規反臯户髙反相息亮反恒况晚反膟音律膋音聊大喪始崩以肆鬯渳尸相飯贊斂徹奠註曰肆鬯所謂陳尸設鬯也鄭司農云渳尸以鬯尸疏曰浴訖即飯含故言相飯也不言相含者大宰贊含玉此故不言贊斂者冬官主斂事大祝贊之奠始死之奠小斂大斂奠並大祝徹之言甸人讀禱付練祥掌國事註曰言猶語也禱六辭之屬禱也甸人喪事代王受眚災大祝為禱辭語之使以禱於藉田之神也付當為祔祭於先王以祔後死者掌國事辨䕶之疏曰辨䕶者供時用相禮儀渳彌爾反飯扶晚反國有大故天烖彌祀社稷禱祠註曰大故兵宼也天烖疫癘水旱也彌猶徧也徧祀社稷及諸所禱既則祠之以報焉大師宜于社造于祖設軍社類上帝國將有事于四望及軍歸獻于社則前祝註曰鄭司農説設軍社以春秋傳曰所謂君以師行祓社釁鼓祝奉以從者也𤣥謂前祝者王出也歸也將有事于此神大祝居前先以祝辭告之鄭剛中曰大師必載社主與遷廟主以行故有宜社造祖之祭此二者國内之禮及軍之所在必設軍社于其地以事類而告上帝此二者國外之禮國有事于四望則將戰地之四望與夫軍有功獻㨗于社凡此六事皆大祝前辭祓芳弗反大㑹同造于廟宜于社過大山川則用事焉反行舍奠註曰用事亦用祭事告行也玉人職有宗祝以黄金勺前馬之禮是謂告大山川與㑹子問曰凡告必用牲幣反亦如之疏曰反行舍奠者王出行時造于廟將遷廟主行反行還祭七廟非時而祭曰奠舍音釋建邦國先告后土用牲幣註曰后土社神也疏曰雖告祭非常有牲有幣禮動不虚故也禁督逆祀命者註曰督正也正王之所命諸侯之所祀有逆者則形罰焉王光逺曰非所命而祀則在所禁命之祀而弗祀則在所督頒祭號于邦國都鄙註曰祭號六號王介甫曰頒其所得用之祭號小祝掌小祭祀將事侯禳禱祠之祝號以祈福祥順豐年逆時雨寧風旱彌烖兵逺辠疾註曰侯之言候也候嘉慶祈福祥之屬禳禳却凶咎寧風旱之屬順豐年而順為之祝辭逆迎也彌讀曰敉敉安也王光遠曰非祀大神享大鬼祭大示皆祭祀之小者侯以候福之將至禳以卻禍之方來者禱以先事而求之祠以後事報之言小祭祀將事而繼之以侯禳禱祠之祝號則小祭祀所奉事者亦祝號而已敉亡爾反大祭祀逆齍盛送逆沃尸盥贊隋贊徹贊奠註曰隋尸之祭也奠奠爵也祭祀奠先徹後反言之者眀所佐大祝非一疏曰逆齍盛者祭宗廟饋獻後尸將入室食小祝於廟門外迎饎人之齍盛於廟堂東實之薦於神座前送逆尸者為始祭迎尸而入祭末送尸而出沃尸盥者尸尊不就洗按特牲少牢尸入廟門盥於􅌉其時小祝沃水贊隋者按特牲少牢尸始入室拜妥尸尸隋祭以韭菹擩于鹽以祭於豆間小祝其時贊尸以授之贊徹者諸宰君婦徹時小祝贊之也贊奠者大祝酌酒奠于鉶南則郊特牲註天子奠斝諸侯奠角小祝其時贊之坡謂論禮之先後則逆齍盛當在沃尸盥之後贊奠當在贊隋之上今如此者恐或文錯至上三者小祝専職下三下三者則贊為之各以其類不可以後先言矣凡事佐大祝註曰唯大祝所有事隋許規反大喪贊渳註曰杜子春云渳謂浴尸設熬置銘註曰銘今書或作名鄭司農云銘書死者名於旌今謂之柩士喪禮曰為銘各以其物亡則以緇長半幅赬末長終幅廣三寸書名于末曰某氏某之柩竹杠長三尺置於西階上重木置于中庭參分庭一在南粥餘飯盛以二鬲縣于重幂用葦席取銘置于重𤣥謂熬者棺既蓋設於其旁所以惑蚍蜉也喪大記曰熬君四種八筐大夫三種六筐士二種四筐加魚腊焉士喪禮曰熬黍稷各二筐有魚腊饌于西坫南又曰設熬旁一筐乃塗及葬設道齎之奠分禱五祀註曰齎猶送也送道之奠謂遣奠也分其牲體以祭五祀告王去此宫中不復反故興祭祀也王七祀五者司命大厲平生出入不以告熬五羔反齎音咨赬勅貞反杠音江重直龍反粥之六反鬲音歴幂音覓蚍音毗蜉音浮大師掌釁祈號祝註曰鄭司農云釁謂釁鼓也春秋傳曰君以軍行祓杜釁鼓祝奉以從有冦戎之事則保郊祀于社註曰保祀互文郊社皆守而祀之彌烖兵黄文叔曰郊非有司所當祀也直保之祀社而已凡外内小祭祀小喪紀小㑹同小軍旅掌事焉疏曰林澤四方百物是外小祭祀其内小祭祀謂宫中七事之等小喪紀者王后以下之喪小㑹同諸侯遣臣來王王使卿大夫與之行㑹同之禮小軍旅者王不自行遣卿大夫征伐坡謂所掌之事如大祝所掌大祭大喪大師大㑹同之事但禮有等差耳喪祝掌大喪勸防之事註曰鄭司農云勸防引柩也杜子春云防當為披𤣥謂勸猶倡帥前引者防謂執披備傾戲疏曰勸即下經御柩一也執披六軍之士及辟令啓註曰鄭司農云辟謂除菆塗椁也令啟謂喪祝主命役人開之也檀弓曰天子之殯也菆塗龍輴以椁加斧於椁上畢塗屋天子之禮也及朝御匶乃奠註曰鄭司農云朝謂將葬朝於祖考之廟而後行則喪祝為御匶也𤣥謂乃奠朝廟奠疏曰言及朝者謂侵夜啟殯昧爽朝廟御匶者發殯宫輴車載至廟其時喪祝執纛居前以御正匶也乃奠者按既夕禮朝廟之時重先奠從燭從匶從彼奠昨夜夕奠至廟下棺於廟兩楹之間棺西設此宿奠至明徹去宿奠乃設此朝廟之奠於匶西故云乃奠及祖飾棺乃載遂御註曰鄭司農云祖謂將𦵏祖於庭象生時出則祖也故曰事死如事生禮也祖時喪祝主飾棺乃載遂御之喪祝為匶車御也𤣥謂祖為行始飾棺設栁池紐之屬其序載而後飾既飾當旋車向外喪祝御之御之者執翿居前郤行為節度及葬御匶出宫乃代註曰喪祝二人相與更也及壙說載除飾註曰鄭司農云壙謂穿中也說載下棺也除飾去棺飾也四歰之屬令可舉移安錯之𤣥謂除飾便其窆爾周人之葬牆置歰疏曰說載謂下棺於地除飾謂除去帷荒下棺於坎訖其帷荒還入壙張之於棺小喪亦如之註曰小喪王后世子已下之喪亦有勸防以下之事故云亦如之掌喪祭祝號註曰喪祭虞也檀弓曰𦵏日虞不忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭辟音闢朝直遙反説吐活反戲音虧菆才官反翿音道歰所甲反本亦作翣錯七故反王弔則與巫前註曰鄭司農云喪祝與巫以桃厲執戈在王前檀弓曰君臨臣喪以巫祝桃茢執戈惡之也所以異於生也疏曰桃者鬼所惡茢菼帚所以掃不祥桃茢二者祝與巫執之執戈者是小臣也檀弓言惡之也所以異於生也死者之傍有凶邪之氣故須桃茢以惡之是異於生厲記作茢音列惡烏路反掌勝國邑之社稷之祝號以祭祀禱祠焉註曰勝國邑所誅討者社稷者若毫社是矣存之者重神也蓋庵其上而棧其下為北牖棧才産反凡卿大夫之喪掌事而歛飾棺焉註曰言掌事者雖禮有隆殺勸防以下皆掌之兼主斂事故總云掌事而斂飾棺焉殺音曬甸祝掌四時之田表貉之祝號註曰杜子春讀貉為百爾所思之百書亦或為禡貉兵祭也甸以講武治兵故有兵祭詩曰是類是禡爾雅曰是類是禡師祭也𤣥謂田者習兵之禮故亦禡祭禱氣勢之十百而多獲陳氏曰古人祭貉于立表之處無壇壝置甲胄弓矢于神座之側建矟于神座之後故謂之表貉貉莫駕反禡同矟音朔舎奠于祖廟禰亦如之註曰舍讀為釋釋奠者告將時田若將征伐鄭司農云禰父廟疏曰天子將出告廟而行言釋奠於祖廟者非時而祭即曰奠以其不立尸奠之言停停饌具而已七廟俱告故祖禰竝言舎音釋下同師甸致禽于虞中乃屬禽及郊饁獸舎奠于祖禰乃斂禽禂牲禂馬皆掌其祝號註曰師田謂大起衆以田也致禽於虞中使獲者各以其禽来致於所表之處屬禽别其種類饁饋也以所獲獸饋於郊薦於四方羣兆入又以奠于祖禰薦且告反也歛禽謂取三十入腊人也杜子春云禂禱也為馬禱無疾為田禱多獲禽牲詩云既伯既禱爾雅曰既伯既禱馬祭也𤣥謂禂讀如伏誅之誅今侏大字也為牲祭求肥充為馬祭求肥健坡謂郊饁與司馬同祖廟惟言舎奠更無四仲社方礿烝文則註言因田有此四祭漏矣屬音燭禂音禱又音誅礿音藥詛祝掌盟詛類造攻說禬禜之祝號註曰八者之辭皆所以告神明也盟詛主於要誓大事曰盟小事曰詛疏曰類造以下即大祝六祈大祝不掌祝號故此詛祝與盟同為祝號秋官自有司盟之官此兼言之者司盟直掌盟載之灋不掌祝號與載辭作盟詛之載辭以叙國之信用以質邦國之劑信註曰載辭為辭而載之於策坎用牲加書於其上也國謂王之國邦國諸侯國也質正也成也鄭司農云載辭以春秋傳曰使祝為載書疏曰人多無信故為辭對神要之使用信故云以叙國之信用云以質邦國之劑信者邦國之劑謂要劵故對神成正之使不犯王氏曰詛必大聲聲感氣氣感神也人無所不至惟天不容偽故詛盟以輔政而省刑古聖王不廢焉司巫掌羣巫之政令若國大旱則帥巫而舞雩註曰雩旱祭也天子於上帝諸侯於上公之神國有大烖則帥巫而造巫恒註曰杜子春云司巫帥巫官之屬㑹聚常處以待命也祭祀則共匰主及道布及蒩館註曰杜子春云匰器名主謂木主也𤣥謂道布者為神所設巾中霤禮曰以功布為道布屬于几也蒩之言藉也祭食有當藉者館所以承蒩謂若今筐也主先匰蒩後館互言之者眀共主以匰共蒩以筐大祝取其主蒩陳之器則退也士虞禮曰苴刌茅長五寸實于筐饌于西坫上又曰祝盥取苴降洗之升入設于几東席上東縮邱氏曰主在廟則藏於石室謂之宗祏及合祭於廟則以匰盛而至匰音丹蒩子都反刌音寸祏音石凡祭祀守瘞註曰瘞謂若祭地示有埋牲玉者也守之者以祭禮未畢若有事然祭禮畢則去之凡喪事掌巫降之禮註曰降下也巫下神之禮今世或死既斂就巫下禓其遺禮坡謂巫降者神降巫身也左傳所謂將有巫者而見我焉盖申生欲馮巫身而見也近今多有之但不眀不正惟滛誣耳禓音商馮音平男巫掌望祀望衍授號旁招以茅註曰杜子春云授號以所祭之名號授之旁招以茅招四方之所望祭者𤣥謂衍讀延聲之誤也望祀謂有牲粢盛者延進也謂但用幣致其神二者詛祝所授類造攻説禬禜之神號男巫謂之招疏曰望祀者類造禬禜遙望而祀之望衍者是攻説之禮遙望延其神以言語責之衍音延冬堂贈無方無算註曰杜子春云無方四方為可也無算道里無數遠益善也𤣥謂冬歲終以禮送不祥及惡夢皆是也其行必由堂始巫與神通言當東則東當西則西可近則近可遠則遠無常數坡謂方者如所謂兆山川邱陵等各因其方此不祥之氣非可以方拘也故曰無方算者秩祀之神名號有數不祥之氣非可以衆寡計故無算也春招弭以除疾病註曰招招福也杜子春讀弭如彌兵之彌𤣥謂洱讀為敉字之誤也敉安也安凶禍也招敉皆有祀衍之禮王弔則與祝前註曰巫祝前王也故書前為先鄭司農云為先非是也女巫掌嵗時祓除釁浴註曰嵗時祓除如今三月上已如水上之類釁浴謂以香薰草藥沐浴旱暵則舞雩註曰使女巫舞旱祭崇隂也鄭司農云求雨以女巫故檀弓曰嵗旱繆公召縣子而問焉曰吾欲暴巫而奚若曰天則不雨而望之愚婦人無乃已疏乎上已詞上聲繆音穆若王后弔則與祝前註曰女巫與祝前后如王禮疏曰與天官女祝前后凡邦之大烖歌哭而請註曰有歌者有哭者冀以悲哀感神靈也疏曰歌者憂愁之歌若雲漢之詩是也周禮述註卷十五
