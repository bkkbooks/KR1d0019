body:
  text: 周禮述註卷二安溪李光坡撰太宰之職掌建邦之六典以佐王治邦國建邦猶湯誥稱造邦也後倣此典常也經也灋也國天子諸侯所理也邦疆國之境一曰治典以經邦國以治官府以紀萬民坡謂經者理使畫一也治者分職稽功也紀者詳理而不遺也二曰敎典以安邦國以敎官府以擾萬民坡謂安者治生明倫則邦本固是安之也敎者敎以善民之道也擾者順其性之固有而又敷之以寛也三曰禮典以和邦國以綂百官以諧萬民坡謂和者禮行則上下和親而不陵犯也綂者禮辨儀等所以繫合之也諧者防以中和使民無乖戾也四曰政典以平邦國以正百官以均萬民坡謂物各當其分之謂平如九灋九伐所云也正者治朝位詔爵禄之等均者均役使均賦斂使無多寡之偏也五曰刑典以詰邦國以刑百官以糾萬民註曰詰猶禁也六曰事典以富邦國以任百官以生萬民坡謂任任之以事也生猶養也六者天子所以治畿内及侯國而諸侯亦得用之以治其封内者故邦國之治可以典待之也上二典言官府下四典言百官冢宰之治司徒之敎于官府無所不行也禮政刑事百官有其職則承之夫治典立則君徳修紀綱定敎化可施矣故以敎典次之敎之而有淺深厚薄之不齊者當有禮以一之故禮典又次為禮之所不能範者大則威之以兵小則糾之以刑故政刑又次焉禮樂政刑四達不悖則君可安富民得永賴故事典終焉疏曰自此以下至職末分為二段從此職首至以富得民一段十條明經國之大綱治政之條目自正月之吉以下至職末明頒宣前灋依事而施以八灋治官府坡謂六典非官不舉故繼之以治官府也百官所居曰府一曰官屬以舉邦治註曰官屬謂六官其屬各六十二曰官職以辨邦治官職謂六官之職也官有職則事各有司存故曰辨三曰官聨以㑹官治註曰聨謂聯事通職相佐助也四曰官常以聴官治官常自領其官之常職不聨也五曰官成以經邦治註曰鄭司農曰官成謂官府之成事品式也小宰曰以八成經邦治六曰官灋以正邦治官灋謂職所主之灋度官職主祭祀朝覲㑹同賓客者則皆自有其灋度正者使得其序也七曰官刑以糾邦治刑謂五刑也八曰官計以弊邦治註曰弊斷也官討謂小宰之六計所以斷羣吏之治坡謂八灋皆云邦治官聨官常言官者官聨則取㑹合衆官乃始得治官常則取官有常職各自治其官也首之以官屬官職者設官而分職也次之以官聨官常則官職可得而修矣官成官灋聨者聨此也常者常此也官刑以糾其怠玩官計以稽其功辠故其序如此灋古法字辠古罪字俱後同以八則治都鄙由朝廷而至畿内故次以治都鄙焉則亦灋也典灋則所用異異其名耳有宗廟國邑曰都以在國郊曰鄙都鄙公卿大夫之采地王子弟所食邑周召毛聃畢原之屬在畿内者一曰祭祀以馭其神馭約使受制也祭祀其先君社稷五祀馭其神使之無僭祀無淫祀也禮庫曰鬼神本無聲與形然亦可馭只祭所當祭合於理便馭得如後世淫祀徼福先自失矣如何馭得鬼神便見出來興妖起怪此理甚明二曰灋則以馭其官灋則謂宫室車旗衣服之等皆不得僭也官伍兩殷輔也三曰廢置以馭其吏廢猶退也退其不能者舉賢而置之吏即官也四曰禄位以馭其士註曰禄若今月俸也位爵次也鄭司農云士謂學士五曰賦貢以馭其用賦什一之税也貢九職之功所貢也馭用入供其出奢不犯上儉不廢禮也六曰禮俗以馭其民註曰禮俗昏姻喪紀舊所行也七曰刑賞以馭其威刑賞皆言威者威畏服之心志也八曰田役以馭其衆田以簡衆役以任衆也坡謂八者之序其上四者自神而人自尊而卑治貴之事也其下四者富而敎之敎而用之治賤之事也以八柄詔王馭羣臣六典八灋八則以治邦國官府都鄙有政治則有功過有功過則有賞罰矣柄所執以起事也詔告也助也此與下八綂獨言詔王者餘皆羣臣職務常所依行歲終致事乃攷知得失此乃王所操持王不獨執羣臣佐之而已一曰爵以馭其貴註曰爵謂公侯伯子男卿大夫士也二曰禄以馭其富三曰予以馭其幸註曰幸謂言行偶合于善則有以賜予之以勸後也四曰置以馭其行行賢行也五曰生以馭其福生者臣之罪可殺而有八議之辟賜之更生以福之也六曰奪以馭其貧註曰奪謂臣有大罪沒入家財者七曰廢以馭其罪八曰誅以馭其過註曰廢猶放也誅責讓也坡謂爵禄予置順天命也生奪廢誅彰天討也予音與行下孟反以八綂詔王馭萬民綂者綂合于上而繫屬于下也八者民與在上同有此物事上行之下效之故曰馭萬民也一曰親親二曰敬故三曰進賢註曰賢有善行也四曰使能註曰能多材藝也五曰保庸註曰保庸安有功者六曰尊貴七曰達吏註曰達吏察舉勤勞之小吏也八曰禮賓註曰禮賓賓客諸侯坡謂此詔王敦其徳心以為賞罰之本也與秋官八議相表裏然親親敬故盡乎孝進賢使能保庸尊貴盡乎弟達吏禮賓盡乎慈人君躬行于上則民興起于下而孝弟不倍之俗成矣以九職任萬民坡謂欲民遂其興起之心必有厚生之道以處之而使之有常業者厚生之道也故以九職任之焉一曰三農生九穀三農平地山澤也九穀黍稷秫稻麻大小麥大小豆一説無秫大麥而有粱苽二曰園圃毓草木樹果蓏曰圃園其樊也圃在田畔王龜齡曰園圃藪牧舉其地以及其民三曰虞衡作山澤之材註曰虞衡掌山澤之官主山澤之民者疏曰山澤之民無名號故借虞衡之官以表其民也四曰藪牧養蕃鳥獸註曰澤無水曰藪牧牧田在逺郊皆畜牧之地坡謂園圃山澤藪牧此三者三農之兼職也五曰百工飭化八材飭勤也八材骨曰切象曰磋玉曰琢石曰磨木曰刻金曰鏤革曰剝羽曰析六曰商賈阜通財賄註曰行曰商處曰賈阜盛也金玉曰貨布帛曰賄七曰嬪婦化治絲枲嬪婦人之美稱也化絲而治之以為帛化枲而治之以為布八曰臣妾聚斂疏材臣妾男女貧賤之稱疏草實若菱芡之屬材木實若榛栗之屬九曰閒民無常職轉移執事閒民謂單丁下户無力者轉移為人執事若今傭賃也坡謂外而農工商賈内而織紝組紃則生人之事盡矣而又不遺乎疏材以備五禮之物能因乎臣妾閒民以佐人力之不逮裁成輔相可謂周且密矣此九功之所出也秫音述苽音瓜蓏力果反紃音旬以九賦斂財賄有以任之而後可以斂之財泉穀也一曰邦中之賦註曰邦中在城郭者二曰四郊之賦註曰四郊去國百里三曰邦甸之賦註曰邦甸二百里四曰家削之賦疏曰三百里名削其中有大夫采地謂之家故名家削采地中賦税入大夫家采地外其地為公邑公邑之内其民出賦入王家故舉家削以表公邑之民也五曰邦縣之賦六曰邦都之賦邦縣四百里邦都五百里卿采曰縣公采曰都舉以表公邑者如家削七曰闗市之賦闗市者王畿四面皆有闗門及王之市廛其賦廛布也八曰山澤之賦山澤山農澤農也九曰幣餘之賦註曰幣餘百工之餘自邦中至幣餘毎處為一書所待異也鄭司農云邦中之賦二十而税一各有差削本亦作稍又作所敎反以九式均節財用有以斂之則可以共用矣式謂用財之節度均之則無有餘不足之患節之則無過不及之差一曰祭祀之式疏曰謂若大祭次祭用大牢小祭用特牲之類二曰賓客之式疏曰謂若上公饔餼九牢飱五牢五積之類三曰喪荒之式喪王后世子以下及弔諸臣皆是也喪有含襚贈奠賻賵之數荒有施恵散利之等而皆有制焉四曰羞服之式疏曰謂王之膳羞衣服所用也五曰工事之式註曰工作器物者六曰幣帛之式坡謂幣帛之式謂給作幣帛之費也七曰芻秣之式芻秣養牛馬者草謂之芻穀謂之秣八曰匪頒之式鄭司農曰匪分也頒謂頒賜也九曰好用之式註曰好用燕好所賜予坡謂王之羞服至貴而列于祭祀三者之後則明人君之不為珍羞侈服而奉先思孝接下思恭其先也工事幣帛芻秣上係乎祭祀賓客喪荒羞服之典而下闗於匪頒好用之共故其序如此好呼報反積音恣含去聲賻音附賵音奉以九貢致邦國之用此諸侯邦國歲之常貢也凡貢各以其所有致者若其自至然胡五峯曰授民以田則責之賦授諸侯以國則責之貢賦者養上之禮貢者事上之義一曰祀貢鄭司農曰祀貢犧牲包茅之屬二曰嬪貢註曰嬪貢絲枲三曰器貢註曰器貢銀鐵石磬丹漆也四曰幣貢註曰幣貢玉帛皮馬也五曰材貢註曰材貢櫄榦栝栢􅪬簜也六曰貨貢註曰貨貢金玉龜貝也七曰服貢服貢絺紵𤣥纁纎纊之屬八曰斿貢註曰斿貢羽毛九曰物貢註曰物貢雜物魚鹽橘柚坡謂祀貢以歆神嬪貢以共喪祭及百用器貢禮樂之材先此三者以其尊也幣以為禮材以辦公器貨以給用次此三者以其急也服者一身之共斿者旌旗之飾物者口腹之需後此三者恭儉之主皆以為卑而可緩者也合而言之則所謂服食器用也所謂不貴異物賤用物也斿音游櫄勅倫反榦古旦反栝音括􅪬西了反簜音蕩柚羊九反以九兩繫邦國之民兩猶耦也上下相合耦也繫聨綴也一曰牧以地得民牧謂州長及諸侯各有封域以居民也二曰長以貴得民長都鄙主也采地不世襲故云貴也三曰師以賢得民師師氏賢徳行也四曰儒以道得民儒保氏道六藝也師儒所得之民學子也五曰宗以族得民宗繼别為大宗收族者所得之民其族人也六曰主以利得民主采邑宰也利者地親情熟有緩急之利也七曰吏以治得民吏鄉遂公邑之吏八曰友以任得民同志曰友任相信任也學校之友相任以道則以道而相得鄉田之友相任以事則以事而相得九曰藪以富得民註曰藪亦有虞掌其政令為之厲禁使其地之民守其材物以時入于王府頒其餘于萬民富謂藪中材物坡謂上文于萬民既言馭之任之矣然民心無常難合易暌使散而不繫與繫之而不以道將無以為施政之地也故以九兩終之焉牧與長繫其貴貴之心使肅于分而不敢離也師與保繫其賢賢之心使明于義而知不可離也宗與主繫其親親之心使洽于恩而不忍離也牧長勢逺有無牧長者復有吏以治之師保分嚴且有非士者皆有友以維之宗主之所不逮且無宗主者又有藪以利之則其不敢不可不忍之心益固結而無遺矣行下孟反正月之吉始和布治于邦國都鄙正月周之正月吉謂朔日始和者如始冰始凍之類周以建子為正一陽初動和氣之始也此一節乃下文之總目言邦國都鄙則官府萬民在其中矣朱子曰文定春秋説夫子以夏時冠周月以周正紀事謂如公即位依舊是十一月只是孔子改正作春正月某便不敢信恁地時二百四十二年夫子只證得箇行夏之時四字據今周禮有正月有正歲則周實是元改作春正月夫子所謂行夏之時只是為他不順故改從建寅乃縣治象之灋于象魏使萬民觀治象挾日而斂之象魏闕也雉門之外兩觀闕高巍巍然從甲至甲謂之挾日凡十日坡謂此布治于萬民之事也乃施典于邦國而建其牧立其監設其參傅其伍陳其殷置其輔註曰乃者更申飭之以侯伯有功徳者加命作州長謂之牧所謂八命作牧者監謂公侯伯子男各監一國書曰王啟監厥亂為民參謂卿三人伍謂大夫伍人殷衆也謂衆士也王制諸侯士二十七人上九中九下九輔府史庶人在官者也疏曰伍言傅者上有卿下有士受上政傅于下受下政傅于上故云也坡謂此布治于邦國之事也乃施則于都鄙而建其長立其兩設其伍陳其殷置其輔註曰長謂公卿大夫王子弟食采邑者兩謂兩卿不言三卿者不足于諸侯坡謂此布治于都鄙之事也疏曰上文都鄙在宫府下此在上者欲見都鄙置臣與諸侯同又見諸侯下亦有都鄙之義故進都鄙在上使文承邦國之後也乃施灋于官府而建其正立其貳設其攷陳其殷置其輔正謂冢宰大司徒之類貳謂小宰小司徒之類攷成也佐成事者謂宰夫鄉師之類坡謂此布治于官府之事也牧監長正參伍殷輔自建國時有之此謂建立者盖因施典灋則而示所以建官位事之意使君臣上下各任其職非施之後乃建之立之云云也且歲終令致事此申置之以見上慢下暴則有廢置之舉縣音賢監古銜反參七南反恁音任它音他凡治以典待邦國之治以則待都鄙之治以灋待官府之治以官成待萬民之治以禮待賓客之治總承上文言凡冢宰之治有此五者以此施之而令其治即以此待之而攷其成也成八成也禮賓禮也疏曰官成在八灋中今特出之者八成本待萬民不待官府也在八灋者欲見官府執行禮賓本在八綂今特出之者以親親七者皆是王行之于上以示于民不必更别有禮惟禮賓特别有禮若聘禮之類也此皆言以者當别有篇卷祀五帝則掌百官之誓戒與其具脩五帝五色之帝而配以大皥炎帝黄帝少昊顓頊也誓戒要之以刑重失禮也明堂位所謂各揚其職百官廢職服大刑是其辭之畧也具所當共脩掃除糞洒前期十日帥執事而卜日遂戒註曰前期前所諏之日也十日容散齋七日致齋三日執事宗伯太卜之屬既卜又戒百官以始齋疏曰四時迎氣冬至夏至郊祭等雖有常時常日猶須審慎仍卜日故表記云不犯日月不違卜筮註日月謂冬夏至正月及四時也所不違者日與牲尸也假令不吉改卜後日及執事眂滌濯註曰執事初為祭事前祭日之夕滌濯謂溉祭器及甑甗之屬及納亨贊王牲事註曰納亨納牲將告殺謂鄉祭之晨既殺以授亨人凡大祭祀君親牽牲大夫贊之疏曰此祭天無祼故先迎牲若宗廟之祭既祼而後迎牲也及祀之日贊玉幣爵之事註曰日旦明也玉幣所以禮神玉與幣各如其方之色爵所以獻齊酒不用玉爵尚質也疏曰三者執以從王至祭所而授之王親自執玉幣奠于神坐親酌爵以獻尸祀大神示亦如之註曰大神示謂天地享先王亦如之贊玉几玉爵享不言大者欲見宗廟六享同然玉几所以依神天子左右玉几宗廟獻用玉爵疏曰享用玉爵天地有爵但不用玉飾享用玉几天地亦應有質几不言之者文不具眂音視後同示音祇要一遙反溉古愛反甗魚善反鄉許亮反祼音灌古字通用齊才計反大朝覲㑹同贊玉幣玉獻玉几玉爵助王受此四者時見曰㑹殷見曰同大㑹同或于春朝或於秋覲舉春秋則冬夏可知玉幣諸侯享幣也以玉致之詳見小行人玉獻獻國珍異亦執玉以致之玉几王所依者王朝諸侯立依前南面左右玉几立而設几優尊也玉爵王祼諸侯而諸侯酢王用玉爵見賢遍反朝直遙反大喪贊贈玉含玉助嗣王為之也贈玉既窆所以送先王含玉死者口實天子以玉鄭司農云含玉璧琮含戸暗反後同窆波騐反作大事則戒于百官贊王命大事祭祀賓客喪荒軍旅田役凡稱大者大事也稱小者小治也贊王命助王為敎令王眂治朝則贊聽治註曰治朝在路門外羣臣治事之朝王眂之則助王平斷眂四方之聽朝亦如之註曰謂王巡守在外時凡邦之小治則冢宰聽之待四方之賓客之小治嶭氏曰王者眂朝于路門之内冢宰有以聴邦之小治王者眂四方之朝冢宰為之待四方賓客之小治也邱氏曰賓客小治凡資糧之費饔飱幣帛之奉以至往來出入之期皆小治也歲終則令百官府各正其治受其㑹聽其致事而詔王廢置百官府三百六十官也正治正處其所治文書受㑹受其功事財用之計聴致事者聴斷其所致功狀也三歲則大計羣吏之治而誅賞之註曰大無功不徒廢必罪之大有功不徒置必賞之鄭司農云三載攷績或問疏以經言邦國皆指諸侯子不從之何也曰舉一例之如大宗伯以玉作六瑞以等邦國而曰王執鎮圭則邦國不専為諸侯明矣曰官府萬民盡邦國之有矣然則邦國將何指而經之安之之等者又豈有出于官府萬民之外乎曰天子諸侯自君身以至百度所以受條受理使大綱小紀各得其分皆經邦國安邦國等事盖兼上下該事物而言也百官承流宣化之司也萬民則専指仰徳之倫也理雖一貫言有専指豈可混乎曰經何以為理使畫一也曰試觀冢宰諸屬自王身之食息起居以至財用出入宫府内外大小之事皆有制節謹度不敢佚縱非理使畫一乎曰紀何以為詳理不遺也曰八綂馭之九職任之九兩繫之其理之也可謂詳且盡矣曰正何以為治朝位詔爵禄之等曰夏官射人司士之職可攷或問賦貢註以賦為口泉貢為什一之税又于云上求于下為賦下納于上為貢子皆不從何也曰攷本經明有賦貢二事註説得矣然口泉之灋三代則無之若于説合賦貢為一求之于經多所未合詳見大府問目或問註以生為養言賢臣之老者王有以養之子解異是何也曰此近解也今以春官内史八枋參之内史之文自三曰廢以下皆以一善一惡相間而五曰殺繼以六曰生以生次殺故知此解長矣且註所引成王封伯禽者乃爵禄之事非養也或問三農後鄭謂原隰平地子改從司農何也曰地官角人等職明著山澤之農且今山上有田則目驗可知而地官稻人有稼澤之灋安得不以經為斷乎曰閒民非載師所云無職事之民乎曰非也彼乃指惰游好閒者故罰以夫家之征此曰無常職則非無職也有夫有婦然後為家單貧之民未有室家未能受田孑然似閒耳所指異也或問幣帛之式註為贈勞賓客子解違焉曰贈勞幣帛含在賓客式中矣且祭祀有禮神幣帛喪荒有賙委幣帛幣帛所用非止贈勞也故云然曰給作幣帛非工事之式乎曰司裘典婦功諸職自在天官或問註以牧為州長長為諸侯不亦可乎曰諸侯亦有封域不徒以貴得民也孟子言諸侯為天下之人牧而此經下文都鄙云建其長故牧中疑兼諸侯而長為都鄙主也曰主為采邑宰何據曰司徒泉府云都鄙從其主註曰謂别治大夫故據彼以解此焉問諏日何如曰出儀禮少牢文諏謀也如祭用丁則十日前謀此丁日而卜之吉則祭不吉則改卜後丁是也曰如此則郊亦卜日矣故下文云祀大神祇亦如之曰郊特牲亦有卜郊之文然曲禮曰大享不問卜僖三十一年魯卜郊左氏𫝊曰禮不卜常祀公羊𫝊亦曰卜郊非禮也則又似不卜日者又哀元年夏四月辛巳郊穀梁𫝊曰我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛如不從則不郊矣則又似有卜日者要當以經為信未可雜𫝊以疑經也小宰之職掌建邦之宫刑以治王宫之政令凡宫之糾禁宫刑在王宫中者之刑王宫路寢一小寢五凡宫兼后宫而言也既𤼵者糾舉之未𤼵者禁止之鄭剛中曰欲治其國先齊其家人君雖正身以齊家苟不用刑以威之則或恃恩而無所畏然齊家用刑則傷恩故使大臣馭之以刑也灋在大臣恩在人主家其有不齊乎掌邦之六典八灋八則之貳以逆邦國都鄙官府之治貳副也逆迎受勾攷之使知功過所在也執邦之九貢九賦九式之貳以均財節邦用均者量貢賦之入均之以應九式之用也節者非其式不之用則自節矣以官府之六敘正羣吏坡謂此即八灋之官常也敘秩次也謂先尊後卑也一曰以敘正其位正其位正其朝列上下之位也二曰以敘進其治進作之使前也進其治者尊卑各有分治以敘進之使尊者理大卑者共小也三曰以敘作其事作起也作其事者振起之使及時修舉也黄氏曰以敘進其治未嘗不欲其治也又惡其陵節犯上出位邀功故以敘進之頽靡廢曠不可以不戒也則又以敘作其事四曰以敘制其食註曰食禄之多少五曰以敘受其會疏曰歲終進會計文書受之亦先尊後卑也六曰以敘聽其情註曰情争訟之辭王介甫曰自㑹以上不得其情而至于訟訟則各以其敘聴之坡謂自一至三施功之事也自四至六程績之事也㑹古外反註同共音恭以官府之六屬舉邦治一曰天官其屬六十掌邦治大事則從其長小事則専達達決也疏曰大事從其長者謂若膳夫食官之長則下庖人内外饔亨人有事皆來諮白膳夫小事則専達者謂若宫人掌舍無大事無長官可諮自専行事以下五官皆如此類也二曰地官其屬六十掌邦敎大事則從其長小事則専達三曰春官其屬六十掌邦禮大事則從其長小事則専達四曰夏官其屬六十掌邦政大事則從其長小事則専達五曰秋官其屬六十掌邦刑大事則從其長小事則専達六曰冬官其屬六十掌邦事大事則從其長小事則専達上文言百官各有其治與事此經承之一以見官盛任使立長官必有屬官佐之然後治可立事可修也一以見為治行事之體要使卑者不至以小謀敗大作尊者無以藂脞墮庶務也故有天地春夏秋冬之屬則位列矣有治敎禮政刑事之治則治具矣大事從長小事専達則事别矣正者正此者也進者進此者也作者作此者也藂音叢以官府之六職辨邦治疏曰六官所職不同邦治得有分辨故云辨邦治也一曰治職以平邦國以均萬民以節財用治典曰經曰紀此曰平曰均者執經而理之則平循紀而治之則均也節財用者劉原父曰邦國制度由天官以裁處故以節財用為職否則制度崇而力不能供矣二曰敎職以安邦國以寜萬民以懐賓客註曰懷亦安也賓客來共其委積所以安之疏曰敎典云擾萬民此云寜擾為馴馴則寜義無異也三曰禮職以和邦國以諧萬民以事鬼神王介甫曰邦國不和則無與事其先王萬民不諧則無與致其禋祀故禮職以和邦國諧萬民而後以事鬼神也四曰政職以服邦國以正萬民以聚百物註曰聚百物者司馬主九畿職方制其貢各以其所有王介甫曰政典平邦國政官之屬推而行之然後有以服邦國五曰刑職以詰邦國以糾萬民以除盜賊六曰事職以富邦國以養萬民以生百物坡謂六職無百官者使官治典則治之教之等事在中矣承上文立長帥屬而使之各揚其職皆所以為邦國萬民也積子賜反以官府之六聨合邦治一曰祭祀之聨事二曰賓客之聨事三曰喪荒之聨事四曰軍旅之聨事五曰田役之聨事六曰斂弛之聨事凡小事皆有聨葉氏曰大宰以官聨會官治舉其要也小宰以六聨合邦治分其詳也以祭祀言之宗伯而下鬰鬯尊彞典祀等職皆聨事也而太宰則贊玉幣司徒奉牛司馬奉魚司寇奉犬此非他官之合聨乎以賓客言之行人而下司儀環人掌客等職皆聨事也而大宰則贊玉幣宰夫掌牢禮司徒修委積封人飾牛牲此非他官之合聨乎大宰贊含鄉師治役司徒荒政小行人令賙委此喪荒之聨事也司馬治軍司徒治民小宰掌具縣師受灋此軍旅之聨事也司馬敎陣司徒致民鄉師帥民徒司馬與慮事此田役之聨事也大宰掌貢賦司徒制地貢司徒弛民力鄉大夫舍賢能之類此斂弛之聨事也六官聨事不一而足以至小事莫不有聨典祀征役于司隸鼓人詔鼓于大僕掌戮致甸師之殺蠻隸執校人之役鄉師攷辟于司空稍人聴政于司馬有同寅協恭而非畔官離次有聨事合治而無分朋植黨此官治之所以㑹而邦治之所以合也坡謂上言六職此六者為事最大用人最多非一職之所能治故以六聨合之㢮音弛以官府之八成經邦治疏曰官府中有此八事皆是舊灋成事品式依而行之以經紀邦國之政治坡謂六聨行于朝家八成施于萬民者其序如此一曰聽政役以比居註曰政謂賦也凡其字或作政或作正或作征以多言之宜從征比居謂伍籍也比地為伍以伍籍者平而無遺脱也二曰聽師田以簡稽註曰簡稽士卒兵器簿書簡猶閲也稽猶計也合也合計其士之卒伍閲其兵器為之要簿也三曰聽閭里以版圖註曰鄭司農曰版户籍圖地圖也聽人訟地者以版圖決之易彦祥曰欲校登其閭里人民之數則以版圖聴之四曰聽稱責以傅别註曰稱責謂舉責生子傅傅著約束於文書别别為兩兩家各得一也五曰聽禄位以禮命坡謂禄位謂庶人在官者受禄於官視百畝之分則禄有多少有府史胥徒之别則位有先後當亦有禮命以等之六曰聽取予以書契坡謂取予者如司徒散利遺人施恵之等官予之民取之也書契謂出予受入之凡要酒正云凡有秩酒者以書契授之七曰聽賣買以質劑註曰質劑謂兩書一札同而别之長曰質短曰劑傅别質劑皆今之劵書也事異異其名耳八曰聽出入以要㑹坡謂出入如泉府之賒者貸者出也受其輸還入也旅師之春頒出也秋斂入也泉府曰歲終則㑹其出入是出入之要㑹也其上四者民治于官有公私之序焉其下四者官交于民有大小之序焉聽待也或以此待其治或以此決其争皆聽也比毗志反予音與註同㑹古外反註同著直畧反以聽官府之六計弊羣吏之治一曰廉善二曰廉能三曰亷敬四曰廉正五曰廉灋六曰廉辨聽待也弊斷也既斷以六事又以亷為本坡謂善者持身及物皆有善而無惡也能展拓有為也敬不解于位也正行無傾邪也灋守灋不失也辨辨不疑惑也六者因其學問材質之髙下各有次第今不盡釋也解音懈以灋掌祭祀朝覲㑹同賓客之戒具軍旅田役喪荒亦如之七事者令百官府共其財用治其施舍聴其治訟此大宰八灋中所謂六曰官灋者也灋謂其禮灋也祭祀以下七者即上六聨然六聨不言朝覲㑹同者以彼賓客中可以兼之耳六聨言百官聨之此言少宰以灋掌而令之也戒具戒官有事者所當共施舍不給役者治訟王介甫曰理其事謂之治争其事謂之訟財用在于官府而施舍加于人民治訟則或以財用之不共或以施舍之不治故先言其財用次言治其施舍後言聽其治訟共音恭後同施讀為弛舍音捨凡祭祀贊玉幣爵之事祼將之事大宰職祀五帝贊玉幣爵今又贊此三者是從大宰助王也將送也祼送送祼謂贊王酌鬱鬯以獻尸謂之祼祼之言灌也明不為飲主以祭祀唯人道宗廟有祼天地大神至尊不祼莫稱焉凡鬱鬯尸受祭之啐之奠之祼古亂反註同啐寸對反凡賓客贊祼凡受爵之事凡受幣之事註曰唯祼助宗伯其餘皆助大宰王不酌賓客而有受酢疏曰賓酢王爵大宰受于賓以授王王卒飲大宰受爵以授小宰受幣之時王親受以授大宰大宰以授小宰也喪荒受其含襚幣玉之事上大宰不言則此乃小宰専受之喪謂王喪諸侯諸臣有致含襚幣玉之禮口實曰含衣服曰襚凶荒有幣玉者賓客所賙委之禮襚音遂賙音周月終則以官府之敘受羣吏之要註曰主每月之小計疏曰受之當先尊後卑故言敘贊冢宰受歲㑹歲終則令羣吏致事註曰使齎歲盡文書來至若今上計坡謂歲終八字當在贊冢宰之前正歲帥治官之屬而觀治象之灋徇以木鐸曰不用灋者國有常刑註曰正歲謂夏之正月得四時之正以出教令者審也古者將有新令必奮木鐸以警衆使明聴也鐸皆以金為之以木為舌則曰木鐸也文事奮木鐸武事奮金鐸坡謂治象乃正月大宰所施于官府者至此小宰乃帥官屬觀之也正月施之者王家之典正歲觀之者人功之始也乃退以宫刑憲禁于王宫令于百官府曰各修乃職攷乃灋待乃事以聴王命其有不共則國有大刑憲謂表縣之上文専指治官之屬此宫中之官府所該者衆若師氏大僕之等凡在王宫者皆是也有職則有灋修之攷之以待其事之至而聴命于王也大刑者尊君之誠専故近君之灋嚴也此二節即八灋之官刑以糾邦治者也憲讀為懸縣同或問以六敘為官常何也曰大宰有官常而無六敘小宰之文官屬七者具列獨不著官常而别有六敘依類相當亦已明已且此經位以敘正之治以敘進之事以敘作之是使諸官各揚其常職之所當為謂之官常不亦近乎曰註以治為功狀不從何也曰治為功狀與受其㑹之㑹無别且正之作之制之受之聴之皆小宰也而獨以進其治為下進于上文既不類況進其功狀矣方曰作其事語亦非倫也曰進其治如子解與作其事何别曰以食官諸屬譬之如膳夫掌王食之治其屬庖人掌畜之治内饔掌内割亨之治外饔掌外割亨之治皆治也於一職之中如膳夫之授祭嘗食徹胙俎為獻主庖人之共王后世子共賓祭喪紀之類則治中之事也推此可見矣治其大綱也事其節目也或問稱責疏舉泉府以為民貸于官何如曰此専指在民貸于民者不兼在官故司寇朝士職云凡有責者有判書以治則聴乃指萬民言之是不當異也曰禄位如註言乃指侯伯卿士之等子何違焉曰如註言則為官府之治矣此八成乃待萬民之治也忽而雜以此言不亦不倫乎且正其位制其食上文六敘已具之藉謂争禄之多少位之先後亦當含在以敘聴其情之中不當在此也曰府史胥徒不命者也何以有禮命曰子男之士亦不命者何以在典命況諸官之下明云府史幾人胥徒幾人是皆著籍朝家者安得無禮命乎惜乎司禄既闕無從攷其由來然孟子之書猶可見其大槩也曰聴出入以要㑹疏謂官内自用物有人争此官物者以要㑹聴之如何曰無是事且官出之人有争可也官入之人何争乎宰夫之職掌治朝之灋以正王及三公六卿大夫羣吏之位掌其禁令註曰治朝在路門之外其位司士掌焉宰夫察其不如儀王龜齡曰羣吏則司士所列在路門之左右者坡謂此以敘正其位之事也敘羣吏之治以待賓客之令諸臣之復萬民之逆羣吏有事于賓者宗伯行人等官有事于復逆者大僕小臣御僕之屬宰夫恒次敘其職事三者之來則應使辨理之諸臣三公孤卿及諸侯也復之言報也反也反報于王謂于朝廷奏事萬民羣吏庶民也自下而上曰逆逆謂上書掌百官府之徴令辨其八職一曰正掌官灋以治要二曰師掌官成以治凡三曰司掌官灋以治目四曰旅掌官常以治數五曰府掌官契以治藏六曰史掌官書以贊治七曰胥掌官敘以治敘八曰徒掌官令以徴令别異諸官之八職以備王之徴召正六卿為屬之長者師六職中毎事之長官皆是為屬所受教曰師司長官之屬各司其職也旅衆下士也官成謂當司之成式成事非待萬民之八成也司亦曰掌官灋者正之官灋乃八灋治官之灋兼八灋言之也司之官灋乃官灋正邦之灋八灋中之一也治要者必持大灋大灋既得則師惟禀其成而已師有成灋則司循灋以治而已行灋有常則旅如常以共而已要事之要領也凡要中之凡事也目凡事中之節目也數目中之繁簡也尊者兼之卑者専之尊者畧之卑者詳之治藏藏文書及器物贊治若今起文書草也治敘官中須人役使則科次其徒也徴令趨走給召呼藏才浪反註治藏同别彼列反掌治灋以攷百官府羣都縣鄙之治治灋即六典八灋八則也羣都諸采邑也六遂五百家為鄙五鄙為縣言縣鄙而六鄉州黨亦存焉大宰出法以治之小宰守灋以逆之宰夫循灋以攷之乘其財用之出入凡失財用物辟名者以官刑詔冢宰而誅之其足用長財善物者賞之乘猶計也財用之出九式也財用之入九功九賦也鄭剛中曰人能于財利之際不萌貪欲之心者亷吏也故攷吏治而以乘財用為急財泉穀也用貨賄也物畜獸也辟名詐為書以空作見文書與實不相應也大宰出灋以制之小宰守法以均節之宰夫循灋以勾攷之坡謂自敘羣吏之治至此皆以敘進其治之事也辟普擊反音僻見賢遍反以式灋掌祭祀之戒具與其薦羞從大宰而眂滌濯註曰薦脯醢也羞庶羞内羞疏曰祭祀大小皆有舊灋式依而戒敕使共具之凡禮事贊小宰比官府之具註曰比校次之疏曰上小宰於七事已言以灋掌戒具此宰夫贊小宰校次之使知善惡足否也比音彼凡朝覲㑹同賓客以牢禮之灋掌其牢禮委積膳獻飲食賓賜之飱牽與其陳數牢禮之灋者多少之差與其致之之時也三牲牛羊豕具為一牢掌其牢禮者下别言委積之等則此牢禮乃饔餼也委積謂牢米芻薪給賓客道用也委積在道所設饔在聘日而先言者以饔餼是禮之大且委積非直賓來共之賓去亦共之在下亦其宜膳掌客所云上公殷膳大牢之等也獻掌客所云上公乘禽日九十雙之等也飲行人所云上公饗禮九獻之等也食行人所云上公食禮九舉之等也賓賜者以賓之故而賜其羣下也飱客始至時所致禮牽牲牢可牽而行者飱牢皆殺而曰飱牽者以掌客云積眂飱牽據積而言之也賓賜之飱牽者賓之羣下往來皆有積及國亦有飱饔餼獨言積之飱牽者舉始終以包諸禮也此等之禮皆掌客所主宰夫雖非正職以其主陳當知其數故言之耳委積之積子賜反此二字相連皆同食音嗣註同凡邦之弔事掌其戒令與其幣器財用凡所共者註曰弔事弔諸侯諸臣幣所用􅉠也器所致明器也凡喪始死弔而含襚葬而賵贈其間加恩厚則有賻焉疏曰謂王使人弔諸侯自弔諸臣須從王行者并有贈喪之具百官當共故宰夫總戒令之與幣器財用凡所共者也大喪小喪掌小官之戒令帥執事而治之註曰大喪王后世子也小喪夫人以下小官士也其大官則冢宰掌其戒令治謂共辨三公六卿之喪與職喪帥官有司而治之凡諸大夫之喪使其旅帥有司而治之旅冢宰下士官有司者有事于喪家之官有司也坡謂自以式灋至此皆以敘作其事之事也辨簿莧反歲終則令羣吏正歲㑹月終則令正月要旬終則令正日成而以攷其治治不以時舉者以告而誅之註曰歲終自周季冬正猶定也旬十日也治不時舉者謂違時令失期㑹王氏曰後世不知要㑹之灋故文書愈詳而愈不可致詰具文而已坡謂此以敘受其㑹之事也註云歲終自周季冬確矣何也周之以十一月為正月凡見于經𫝊及諸儒之説萬無可疑者獨至以仲冬為首春建亥為季冬則論者紛然惟成十七年九月辛卯用郊穀梁𫝊曰夏之始可以承春以秋之末承春之始盖不可矣夫周九月夏七月也而以為秋末自可為改時據者即前大宰正月之吉下所引朱子之言猶未斷周之果不以冬為春也故鄭註之云私心竊是焉又按豳風十月之後曰改歲則建子為正可知也十月穫稻為此春酒此者非久之辭十月為此春酒擬後月用之也古者臨事方作酒儀禮少牢先期旬有一日祭日得卜宰乃命為酒是也上十月曰為此春酒下十月曰朋酒躋堂則建子為春可知矣㑹古外反註期㑹如字正歲則以灋警戒羣吏令修宫中之職事鄭司農曰正歲之正月以灋戒勅羣吏書其能者與其良者而以告于上註曰良猶善也上謂小宰大宰也疏曰上云令修宫中之職事則此謂宫中吏也正歲則預選之擬至歲終當舉之也或問要凡目數可得辟乎曰辟于冢宰如治典是要也于治之中如小宰掌宫刑膳夫食飲之類是凡也于凡之中如宫正掌宫中官府宫伯掌士庻子庖人掌畜内饔掌内亨之類是凡之目也于目之中如宫正一職自有比官府辨内外之事是目之數也曰官成為八成不亦可乎曰師之所掌内而王身外而祭祀賓客諸大事非盡于八成而已也亦有説乎曰若必以為小宰八成則司冦士師亦有八成欲兼之乎否乎若必以官灋官成官常皆見于八灋不得有異辭則官契官書官叙官令豈嘗見于八灋將何以解乎如此之類當在攷其意義之合泥則窒矣辟音譬宫正掌王宫之戒令糾禁戒其逸怠令其當為糾其過惡禁其未然以時比宫中之官府次舎之衆寡註曰時四時比校次其人之在否官府之在宫中者若膳夫玉府内宰内史之屬次諸吏直宿若今部署諸廬者舍其所居寺為之版以待註曰版其人之名籍待待戒令及比夕擊柝而比之註曰夕莫也莫行夜以比直宿者為其有解惰離部署鄭司農云柝戒守者所擊也國有故則令宿其比亦如之註曰鄭司農云故謂禍災令宿宿衛王宫𤣥謂故凡非常也文王世子曰公有出疆之政庶子以公族之無事者守于公宫正室守大廟諸父守貴宫貴室諸子諸孫守下宫下室此謂諸侯也王之庶子職掌國子之倅國有大事則帥國子而致于太子唯所用之者令宿之事盖亦存焉坡謂自時比至此皆比官府之事柝吐各反註同莫音暮行下孟反解佳賣反倅七内反辨外内而時禁外宫中卿大夫士也内奄寺之等禁其非時出入恐外内交通伺王動静以為非也稽其功緒糾其徳行稽猶攷也計也功吏職也緒其志業在身為徳施之為行幾其出入均其稍食幾其出入謂微察羣吏之出入也稍食禄廪去其淫怠與其竒衺之民註曰民宫中吏之家人也淫放濫也怠懈慢也奇衺譎觚非常㑹其什伍而敎之道藝疏曰宫正掌宫中吏亦兼掌其子弟㑹㑹合子弟也五人為伍二伍為什㑹之者使之宿衛時語言相體服容相識是其輩作也及其學問又相親及切磋是其輩學也以相勸帥且寄宿衛之令焉道謂先王所以敎道民者藝謂禮樂射御書數坡謂自辨外内至均其稍食所以使卿士大夫之身一歸于正無迪上以非典也而又恐因隸僮子弟以奪其志行故去之㑹而敎之則官府之奉公守職益専一不紛且其子孫敎而成材則官之皆忠厚之意也月終則㑹其稍食歲終則㑹其行事行事吏職也自辨外内至此皆飭宫中吏治之事竒音羇衺似嗟反亦作邪後同則㑹古外反凡邦之大事令于王宫之官府次舍無去守而聴政令大事解見冢宰使居其處待所為春秋以木鐸修火禁大火以季春出以季秋入凡陶冶鑄銅之火因天出火民則為之因天入火民則休之此修火禁者謂宫正于宫中特宜慎火故修之凡邦之事蹕宫中廟中則執燭註曰事祭事也邦之祭社稷七祀于宫中祭先王先公於廟中隸僕掌蹕行者宫正則執燭以為明春秋傳曰有大事于大廟又曰有事于武宫蹕音畢大喪則授廬舍辨其親疏貴賤之居廬倚廬也於路門之外東壁倚木為廬舍堊室也兩下為之與廬異親者貴者居倚廬疏者賤者居堊室自凡邦之大事至此皆隨時以修宫中之政堊烏各反或問本經言社稷五祀而註言七祀何也曰宗伯之社稷五祀註依左傳蔡墨以重該修熙犂句龍五色之臣為五祀在四郊不在宫中此言宫中當是祭灋所謂司命中霤門行户竈泰厲之祀也然攷之本經司命自屬天神而泰厲又無明文是所可疑也特以天子立宫則中霤門行户竈在所當祀而諸侯祭因國之在其地而無主後者推之天子而祭泰厲理亦宜爾註説未可廢也凡此之類因仍其舊慎而闕之聊附所疑未敢臆斷矣註引春秋傳者疏云欲見隸僕蹕于宫中亦得兼廟中公羊云魯公稱世室羣公稱宫則天子之廟亦有宫稱也句音勾宫伯掌王宫之士庶子凡在版者註曰鄭司農云版名籍也以版為之今時鄉户籍謂之戸版𤣥謂王宫之士謂王宫中諸吏之適子也庶子其支庶也掌其政令行其秩敘作其徒役之事註曰秩禄稟也敘才等也作徒役之事大子所用適丁厯反授八次八舍之職事註曰衛王宫者必居四角四中於徼候便也次其宿衛所在舍其休沐之處王介甫曰職事宿衛之職事也若邦有大事作宫衆則令之註曰謂王宫之士庶子於邦有大事或選當行月終則均秩歲終則均敘宫伯掌之則為政令士庶子任之則為職事内而國中徒役之事則作之外而大事之作則令之凡秩敘行之至于月終歲終則均之徼古弔反以時頒其衣裘掌其誅賞註曰頒讀為班班布也衣裘若今賦冬夏衣陳氏曰凡環衛有二等其一是公卿大夫之子弟分置八隅宫伯領之其一是官府凡在宫庭者徒役錯置於士庶子八次八舍之間周列環衛以周王宫宫正領之二者皆環列之衛至于人主切身侍御僕從則令掌于大僕故宫正宫伯所掌是總于大宰周禮述註卷二
