body:
  text: 周禮述註卷十八安溪李光坡撰大司馬之職掌建邦國之九灋以佐王平邦國註曰平成也正也制畿封國以正邦國徐氏曰制九服之畿封五等之國則地之大小正設儀辨位以等邦國註曰儀謂諸侯及諸臣之儀辨别也别尊卑之位進賢興功以作邦國註曰興猶舉也作起也鄭剛中曰見於徳行之謂賢見於事業之謂功賢可尊也受七命者進為八命之牧受八命者進為九命之伯功可錄也或加之以地或進之以律進其賢者則不賢者自礪興其功者則無功者知奮邦國可作建牧立監以維邦國註曰牧州牧也監監一國謂君也維猶連結也制軍詰禁以糾邦國註曰詰猶窮治也糾猶正也坡謂制之詰之皆王也軍大國三軍次國二軍小國一軍也禁如葵丘五禁之類鄭剛中曰有軍以馭其亂有禁以詰其違則邦國可糾矣施貢分職以任邦國註曰職謂職税也任猶事也事以其力之所堪簡稽鄉民以用邦國註曰簡謂比數之稽猶計也均守平則以安邦國註曰諸侯有土地者均之尊者守大卑者守小則灋也疏曰平則者謂五等職貢之等皆有常灋坡謂上言制畿封國此則均其所守使之有大小之差也上言施貢分職此則平其灋則使之有輕重之等也比小事大以和邦國註曰比猶親使大國親小國小國事大國相合和也坡謂制畿封國分土也大小不同禮亦異數故設儀辨位以等之位必稱徳則人知自奮故進賢興功以作之徳足長人則加命為侯伯故建牧立監牧監立以維邦國則上下無離心有軍有禁以糾邦國則上下無悖志而奉上急公可以任之用之矣均守平則則内得其分比小事大則外通其情而凡任之用之者皆有常灋天子牧伯無過於取四方小侯無過於共則安則和也監古銜反比毗志反以九伐之灋正邦國註曰諸侯有違王命則出兵以征伐之所以正之也諸侯之于國如樹木之有根本是以言伐云馮弱犯寡則眚之註曰馮猶乘陵也言不字小而侵侮之眚猶人眚瘦也王霸記曰四面削其地賊賢害民則伐之註曰春秋傳曰觕者曰侵精者曰伐又曰有鐘鼓曰伐則伐者兵入其境鳴鐘鼓以往所以聲其罪暴内陵外則壇之註曰内謂其國外謂諸侯壇讀如同墠之墠王霸記曰置之空墠之地𤣥謂置之空墠之地以出其君更立其次賢者疏曰暴内即上云賊賢害民是也陵外即上云馮弱犯寡是也上二文各有其一故伐之眚之不奪其位此則内外之惡兼有故壇之奪其位立其次賢野荒民散則削之註曰荒蕪也田不治民不附削其地明其不能有負固不服則侵之註曰負猶恃也固險可依以固者也不服不事大也侵之者兵加其竟而已用兵淺者詩曰密人不恭敢距大邦賊殺其親則正之註曰正之者執而治其罪王霸記曰正殺之也春秋僖二十八年冬晉人執衛侯歸之于京師坐殺其弟叔武疏曰正者執而治其罪未必即是殺也放弑其君則殘之註曰放逐也殘殺也王霸記曰殘滅其為惡坡謂放如鄭突之出忽弑如楚商臣之弑頵皆放弑其君而自立者也此經専指諸侯之事而若季氏逐昭崔杼弑莊之類亦在所殘焉犯令陵政則杜之註曰令命也王霸記曰犯令者違命也陵政者輕政灋不循也杜之者杜塞使不得與鄰國交通坡謂用兵侵而不服則伐之伐而不服則圍之上文言侵伐此言杜意即圍也盖革制度者為叛叛者君討令諸侯環之杜塞使不通外内亂鳥獸行則滅之註曰王霸記曰悖人倫外内無以異於禽獸不可親百姓則誅滅去之也曲禮曰夫惟禽獸無禮故父子聚麀坡謂九者之序以王灋所加為先後曰眚曰伐曰壇差重者在先曰殘曰杜曰滅至重者在後曰削曰侵曰正輕者在中盖前三者則害及於人次三者虐止其國至後三者則滅紀灋而窮人欲矣馮皮冰反壇音善行下孟反觕音粗竟境同頵於倫反正月之吉始和布政于邦國都鄙乃縣政象之灋于象魏使萬民觀政象挾日而斂之疏曰布政謂上九灋九伐并下凡令以下皆此時布之縣音懸乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿註曰畿猶限也自王城以外五千里為界有分限者九籍其禮差之書也政職所共王政之職謂賦税也疏曰侯者候也為王伺候非常也甸者為王治田以出賦貢男者任也任王之職事采者采取美物以共王衛者為王衛守蠻者縻也以近夷狄縻係之以政敎自此以上六服是中國之九州自此已外是夷狄之諸侯此蠻服出大行人云要服亦一也言要者亦見要束以文教也夷者以夷狄而得夷稱也鎮者盖中國稍逺理須鎮守蕃者以其最逺故得蕃屏之稱此三服總號蕃服故大行人云九州之外謂之蕃國世一見指此三服也坡謂此經即施貢分職以任邦國也下文令賦即簡稽鄉民以用邦國也九灋皆經理諸侯之政惟此二事則王所得於諸侯者故特詳之蕃藩同要於遥反凡令賦以地與民制之上地食者參之二其民可用者家三人中地食者半其民可用者二家五人下地食者參之一其民可用者家二人註曰賦給軍用者也令邦國之賦亦以地之美惡民之衆寡為制如六遂矣鄭司農云上地謂肥美田也食者參之二假令一家有三頃嵗種二頃休其一頃下地食者參之一田薄惡者所休多疏曰此文承上邦國之下而云令賦是還據邦國諸侯而説也坡謂此徴兵邦國之制朱子曰賦兵也古者以田賦出兵故謂兵為賦或曰孟子云請野九一國中什一是諸侯亦有鄉遂都鄙也鄉遂都鄙兵制多少不同而天子調𤼵國兵槩如鄉遂不已悉乎曰凡天子六軍大國三軍次國二軍小國一軍皆以鄉言之而甸稍縣都不與焉即天子調兵於侯無過其鄉之軍耳故九灋云簡稽鄉民以用邦國斯其是也若諸侯有遍境出灋斯乃非常之變不為令中春敎振旅司馬以旗致民平列陳如戰之陳註曰以旗者立旗期民於其下也兵者守國之備孔子曰以不敎民戰是謂棄之兵者凶事不可空設因蒐狩而習之凡師出曰治兵入曰振旅皆習戰也四時各教民以其一焉春習振旅兵入收衆専於農平猶正也辨鼓鐸鐲鐃之用王執路鼓諸侯執賁鼓軍將執晉鼓師帥執提旅帥執鼙卒長執鐃兩司馬執鐸公司馬執鐲註曰鼓人職曰以路鼓鼓鬼享以賁鼓鼓軍事以晉鼓鼓金奏以金鐃止鼓以金鐸通鼓以金鐲節鼓鄭司農云辨鼓鐸鐲鐃之用謂鉦鐸之屬鐲讀如濁其原之濁鐃讀如讙嘵之嘵提讀如攝提之提謂馬上鼓有曲木提持鼓立馬髦上者故謂之提杜子春云公司馬謂五人為伍伍之司馬也𤣥謂王不執賁鼓尚之於諸侯也伍長謂之公司馬者雖卑同其號疏曰此春夏秋三時各教其一必春辨鼓鐸者鼓雷之類象中春雷𤼵聲於外以敎坐作進退疾徐疏數之節註曰習戰灋疏曰按下大閲禮中軍以鼙令鼓已下有此坐作等之節彼大閲具言於此畧中音仲陳直覲反鐲音濁鐃閙平聲賁扶云反數音朔蒐所留反鉦音征嘵女交反遂以蒐田有司表貉誓民鼓遂圍禁火弊獻禽以祭社註曰春田為蒐有司大司徒也掌大田役治徒庶之政令表貉立表而貉祭也誓民誓以犯田灋之罰也誓曰無干車無自後射立旌遂圍禁旌弊争禽而不審者罰以假馬禁者虞衡守禽之厲禁也既誓令鼓而圍之遂蒐田火弊火止也春田主用火因焚萊除陳草皆殺而火止獻猶致也屬也田止虞人植旌衆皆獻其所獲禽焉詩云言私其豵獻肩于公春田主祭社者土方施生也鄭司農云貉讀為禡禡謂師祭也書亦或為禡疏曰蒐搜也春時鳥獸字乳搜擇取不孕任者故以蒐為名誓民即大閲羣吏聽誓于陳前鼓者即中軍以鼙令鼓鼓人三鼓以下坡謂穀梁傳曰四時之田皆為宗廟之事是因祭方田也而因田有祭未見他文焉且此祭社與月令仲春命民社正同可謂非常祭乎然惟冬夏言享廟而春言社秋言祊者春為民祈秋為民報重民敬祀互見為義耳正祭在四孟王制孔疏詳之始終可疑今以經為正貉禡竝莫駕反祊音方中夏敎茇舍如振旅之陳羣吏撰車徒讀書契辨號名之用註曰茇讀如萊沛之沛茇舍草止之也軍有草止之灋撰讀曰算算車徒謂數擇之也讀書契以簿書校錄軍實之凡要黃文叔曰號名為夜事今軍夜有號註以為徽識披之以備死事夫徽識綴於膊上夜事將何以辨帥以門名縣鄙各以其名家以號名鄉以州名野以邑名百官各象其事以辨軍之夜事帥謂軍將及師帥旅帥至伍長也以門名者軍將皆命卿古者軍將盖為營治於國門魯有東門襄仲宋有桐門右師皆上卿為軍將者也縣鄙謂公邑大夫也家謂食采地者之臣也鄉以州名即六鄉也野以邑名即六遂也百官以其職從王者夜事戒夜守之事草止者慎於夜於是主别其部職其他皆如振旅王光逺曰若平列陳與夫以敎坐作進退疾徐疏數之節皆然中音仲撰息轉反識音志遂以苖田如蒐之灋車弊獻禽以享礿註曰夏田為苖擇取不孕仕者若治苖去不秀實者云車弊驅獸之車止也夏田主用車示所取物希皆殺而車止王制曰天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵礿宗廟之夏祭也冬夏田主于祭宗廟者隂陽始起象神之在内王光逺曰夏田為苖除禽獸之害而已如蒐之灋則其它表貉誓民鼓遂圍禁之類皆與蒐同享礿則所謂以禴夏享先王礿餘若反中秋敎治兵如振旅之陳疏曰言敎治兵者凡兵出曰治兵入曰振旅春以入兵為名尚農事秋以出兵為名秋嚴尚威故也辨旗物之用王載大常諸侯載旂軍吏載旗師都載旜鄉遂載物郊野載旐百官載旟各書其事與其號焉其他皆如振旅軍吏諸軍帥也師都孤卿也鄉遂六鄉六遂也郊野公邑之吏也百官大夫士也凡旌旗有軍旅者畫異物無者帛而已書當為畫事也號也皆畫以雲氣疏曰各書其事與其號者即仲夏百官各象其事及號名之等此秋雖不具辨號名亦畧舉之見四時皆有此物也中音仲書音畫遂以獮田如蒐田之灋羅弊致禽以祀祊註曰秋田為獮獮殺也羅弊網止也秋田主用㒺中殺者多也皆殺而㒺止祊當為方聲之誤也秋田主祭四方報成萬物詩曰以社以方獮息淺反祊音方中丁丈反中冬敎大閲註曰春辨鼓鐸夏辨號名秋辨旗物至冬大閲簡軍實凡頒旗物以出軍之旗則如秋以尊卑之常則如冬司常佐司馬時也大閲備軍禮而旌旗不如出軍之時空辟實疏曰春辨鼓鐸以下見春夏秋各敎其一至冬大閲之時總教之前期羣吏戒衆庶修戰灋註曰羣吏鄉師以下虞人萊所田之野為表百步則一為三表又五十步為一表田之日司馬建旗于後表之中羣吏以旗物鼓鐸鐲鐃各帥其民而致質明弊旗誅後至者乃陳車徒如戰之陳皆坐註曰鄭司農云虞人萊所田之野芟除其草萊令車得驅馳詩曰田卒汙萊𤣥謂萊芟除可陳之處後表之中五十步表之中央表所以識正行列也四表積二百五十步左右之廣當容三軍步數未聞致致之司馬質正也弊仆也皆坐當聽誓疏曰月令司徒北面以誓之此經云司馬建旗於後表之中車徒皆坐則此於可陳之中從南頭立表以北頭為後表也羣吏聽誓于陳前斬牲以左右徇陳曰不用命者斬之註曰羣吏諸軍帥也陳前南面向表也月令季秋天子教于田獵以習五戎司徒搢扑北面以誓之此大閲禮實正嵗之中冬而説季秋之政於周為中冬為月令者失之矣斬牲者小子也凡誓之大畧甘誓湯誓之屬是也疏曰羣吏聽誓于陳前者士卒皆於後表北面坐羣吏諸軍帥皆在士卒前南面立以聽誓中軍以鼙令鼓鼓人皆三鼓司馬振鐸羣吏作旗車徒皆作鼓行鳴鐲車徒皆行及表乃止三鼓摝鐸羣吏弊旗車徒皆坐註曰中軍中軍之將也天子六軍三三而居一偏羣吏既聽誓各復其部曲中軍之將令鼓鼓以作其士衆之氣也鼓人者中軍之將師帥旅帥也司馬兩司馬也振鐸以作衆作起也既起鼓人擊鼓以行之伍長鳴鐲以節之伍長一曰公司馬及表自後表前至第二表也三鼓者鼓人也鄭司農云摝讀如弄𤣥謂如涿鹿之鹿掩上振之為摝摝者止行息氣也司馬灋曰鼓聲不過閶鼙聲不過闒鐸聲不過琅疏曰此經總說聽誓既已將欲向南第二表象戰陳初𤼵面敵此即中春振旅疾徐坐起之事一也中軍者此六軍三軍居一偏皆自有中軍也又三鼓振鐸作旗車徒皆作鼓進鳴鐲車驟徒趨及表乃止坐作如初註曰趨者赴敵尚疾之漸也春秋傳曰先人有奪人之心及表自第二前至第三乃鼓車馳徒走及表乃止註曰及表自第三前至前表鼓戒三闋車三𤼵徒三刺註曰鼓戒戒攻敵鼓壹闋車壹轉徒壹刺三而止象敵服鄭剛中曰凡此萊野立表仆旗聽誓鼓行以至於擊刺如戰之陳皆四時敎戰之常灋不於振旅茇舍治兵述之獨詳具於此盖以明其為大閲故也乃鼓退鳴鐃且郤及表乃止坐作如初註曰鐃所以止鼓軍退卒長鳴鐃以和衆鼓人為止之也退自前表至後表鼓鐸則同習戰之禮出入一也異者廢鐲而鳴鐃疏曰此言乃鼓退者謂至南表軍吏及士卒囘身向北更從南為始也鳴鐃且郤者此鳴鐃且郤據初至南表退軍之時象在軍軍退亦鳴鐃中音仲摝音鹿闋苦穴反辟音避閶吐剛反闒吐獵反遂以狩田以旌為左右和之門羣吏各帥其車徒以敘和出左右陳車徒有司平之旗居卒間以分地前後有屯百步有司巡其前後險野人為主易野車為主註曰冬田為狩言守取之無所擇也軍門曰和今謂之壘門立兩旌以為之敘和出用次第出和門也左右或出而左或出而右有司平之鄉師居門正其出入之行列也旗軍吏所載分地調其部曲疏數前後有屯百步車徒異羣相去之數也車徒畢出和門鄉師又巡其行陳鄭司農云險野人為主人居前易野車為主車居前疏曰此一經總論敎戰訖入防田獵之事故云遂以狩田也以旌為左右和之門者六軍分三軍各處東西為左右各為一門旗居卒間者軍吏各領已之士卒執旗以表之既陳乃設驅逆之車有司表貉于陳前註曰驅驅出禽獸使趨田者也逆逆要不得令走設此車者田僕也中軍以鼙令鼓鼓人皆三鼓羣司馬振鐸車徒皆作遂鼓行徒銜枚而進大獸公之小禽私之獲者取左耳註曰羣司馬謂兩司馬也枚如箸銜之有繣結項中軍灋止語為相疑惑也進行也鄭司農云大獸公之輸之於公小禽私之以自畀也詩云言私其豵獻肩于公一嵗為豵二嵗為豝三嵗為特四嵗為肩五嵗為慎此明其獻大者於公自取其小者𤣥謂慎讀為麎爾雅曰豕生三曰豵豕牝曰豝麋牡曰麎獲得也得禽獸者取左耳當以計功及所弊鼓皆駴車徒皆譟註曰鄭司農云及所弊至所弊之處𤣥謂至所弊之處田所當於止也天子諸侯蒐狩有常至其常處吏士鼓譟象攻敵尅勝而喜也疾雷擊鼓曰駴譟讙也書曰前師乃鼓䵾譟亦謂喜也徒乃弊致禽饁獸于郊入獻禽以享烝註曰徒乃弊徒止也冬田主用衆物多衆得取也致禽饁獸于郊聚所獲禽因以祭四方神於郊月令季秋天子既田命主祠祭禽四方是也入又以禽祭宗廟疏曰致禽饁獸于郊者謂因田過郊之神位而饋之坡謂夏冬無外祀故夏惟曰享礿冬惟曰享烝春秋則有二社與祠嘗而外祀惟社有田郊特牲曰惟為社田國人畢作然春秋惟著社方者乃舉外以包内或是親祠嘗而先社如左氏所云后稷親而先帝耳四時之田皆為宗廟之事鄭豐卷欲祭請田是也既為祭有田然則田在仲月則祭在仲月明矣鄭子入於晏子春秋言正祭在孟月遂以此四祀為因田而祭不攷宗伯甸祝凡田歸僅曰饁獸于郊舍奠于祖廟而無社方礿烝之文乎因傳以改經微少失矣駴胡楷反譟素報反要於遥反繣戸卦反麎音辰䵾音符及師大合軍以行禁令以救無辜伐有罪註曰師所謂王巡守若㑹同司馬起師合軍以從所以威天下行其政也不言大者未有敵不尚武若大師則掌其戒令涖大卜帥執事涖釁主及軍器註曰大師王出征伐也涖臨也臨大卜卜出兵吉凶也司馬灋曰上卜下謀是謂參之主謂遷廟之主及社主在軍者也軍器鼓鐸之屬凡師既受甲迎主于廟及社主祝奉以從殺牲以血塗主及軍器皆神之疏曰案小子職云釁邦器及軍器彼官釁之而大司馬臨之及致建大常比軍衆誅後至者註曰致鄉師致民於司馬比校次之也及戰巡陳眂事而賞罰註曰事謂戰功也若師有功則左執律右秉鉞以先愷樂獻于社註曰功勝也律所以聴軍聲鉞所以為將威也先猶道也兵樂曰愷獻於社獻功於社也司馬灋曰得意則愷樂愷歌示喜也鄭司農云故城濮之戰春秋傳曰振旅愷以入于晉若師不功則厭而奉主車註曰鄭司農云厭謂厭冠喪服也軍敗則以喪禮故秦伯之敗于殽也春秋傳曰秦伯素服郊次鄉師而哭𤣥謂厭伏冠也奉猶送也送主歸於廟與社王弔勞士庶子則相註曰師敗王親弔士庶子之死者勞其傷者則相王之禮庶子卿大夫之子從軍者或謂之庶士厭於涉反勞力報反相息亮反從才用反道音𨗳鄉師之鄉許亮反大役與慮事屬其植受其要以待攷而賞誅註曰大役築城邑也鄭司農云國有大役大司馬與謀慮其事也植謂部曲將吏故宋城春秋傳曰華元為植巡功屬謂聚㑹之也要者簿書也攷謂攷校其功𤣥謂慮事者封人也於有役司馬與之植築城楨也屬賦丈尺與其用人數與音預註同與其如字屬音燭植直吏反楨音貞大㑹同則帥士庶子而掌其政令註曰帥師以從王若大射則合諸侯之六耦註曰大射王將祭射于射宫以選賢也王射三侯以諸侯為六耦疏曰大射是將祭而射故用諸侯為六耦若賔射射人亦用六耦但不用諸侯當用卿大夫為之燕射三耦自然用卿大夫已下為之大祭祀饗食羞牲魚授其祭註曰牲魚魚牲也祭謂尸賓所以祭也鄭司農云司馬主進魚牲食音嗣大喪平士大夫註曰平者正其職與其位疏曰必使司馬為之者司馬之屬有司士主羣吏今王喪不得使司士故司馬平之也喪祭奉詔馬牲註曰王喪之以馬祭者盖遣奠也奉猶送也送之至墓告而藏之小司馬之職掌註曰此下字脱滅札爛文闕漢興求之不得遂無識其數者凡小祭祀㑹同饗射師田喪紀掌其事如大司馬之灋軍司馬闕輿司馬闕行司馬闕疏曰軍司馬當下大夫四人輿司馬當上士八人行司馬當中士十六人餘官皆無異稱此獨有之者以軍事是重故特生别名司勲掌六鄉賞地之灋以等其功註曰賞地賞田也在逺郊之内屬六鄉焉等猶差也以功大小為差王功曰勲註曰輔成王業國功曰功註曰保全國家民功曰庸註曰灋施於民事功曰勞註曰以勞定國鄭剛中曰事功者或從主事或任國事或有所營為或有所創制黽勉從之不畏其適我也勞者經營艱苦之意也治功曰力註曰制灋成治鄭剛中曰治功者或平水土或辟草萊或任土地或疏導溝洫力謂其用力以作為也戰功曰多註曰尅敵出奇若韓信陳平司馬灋曰上多前虜鄭剛中曰多者算數過人之義人算其一我算其十人算其百我算其千出竒無窮人莫能測以多算勝者斯可以為戰功矣坡謂六者之序自君而民而事也本末偏全各有次第凡有功者銘書於王之大常祭於大烝司勲詔之註曰銘之言名也生則書于王旌以識其人與其功也死則於烝先王祭之詔謂告其神以辭也盤庚告其卿大夫曰兹予大享于先王爾祖其從與享之是也今漢祭功臣於廟庭疏曰詔之謂詔司常書之又以辭使春官告神王介甫曰大烝冬之大享當是時百物皆報焉祭有功宜矣大功司勲藏其貳註曰貳猶副也功書藏於天府又副於此者以其主賞坡謂天府無藏功書之文所謂貳貳司常也盖凡有功者書於大常大功則既書大常司勲又藏其貳也既曰凡有功又曰大功則統而觀之六功相形大小析而言之每功自有輕重矣自王功至此皆等其功之事識音志掌賞地之政令坡謂政令如下文所云者是也凡賞無常輕重眂功註曰無常者功之大小不可豫凡頒賞地參之一食註曰賞地之税參分計税王食其一也二全入於臣惟加田無國正註曰加田既賞之又加賜以田所以厚恩也鄭司農云正謂税也祿田亦有給公家之賦貢若今時侯國有司農少府錢穀矣獨加賞之田無征耳疏曰加田未知所在或可與賞田同處坡謂自掌賞地至此所謂六鄉賞地之灋也凡有功者皆頒賞地加田則待大功馬質掌質馬馬量三物一曰戎馬二曰田馬三曰駑馬皆有物賈註曰此三馬買以給官府之使無種也鄭司農云皆有物賈皆有物色及賈直易彦祥曰物云者國馬之輈深四尺有七寸田馬之輈深四尺駑馬之輈深三尺有三寸其用各有等其材各有宜故皆以三物量之有物則有價故謂之質綱惡馬註曰綱以縻索維綱狎習之賈音稼凡受馬於有司者書其齒毛與其賈馬死則旬之内更旬之外入馬耳以其物更其外否註曰鄭司農云更謂償也𤣥謂旬之内死者償以齒毛與賈受之日淺養之惡也旬之外死入馬耳償以毛色不以齒賈任之過其任也其外否者旬之外踰二十日而死不任用非用者罪疏曰所受之馬謂給公家之使更音庚馬及行則以任齊其行註曰識其所載輕重及道里齊其勞逸乃復用之坡謂及行始駕也此二句或在綱惡馬之下盖同為教馬事也若有馬訟則聽之註曰訟謂賣買之言相負禁原蠶者註曰原再也天文辰為馬𧖟書蠶為龍精月值大火則浴其種是蠶與馬同氣物莫能兩大禁再蠶者為傷馬與坡謂禁原蠶者言牧馬之處與牧馬之人皆不得再養蠶也量人掌建國之灋以分國為九州營國城郭營後宫量市朝道巷門渠造都邑亦如之註曰建立也立國有舊灋式若匠人職云分國定天下之國分也后君也言君容王與諸侯疏曰量市朝道巷者若匠人云市朝一夫經塗九軌巷及門渠亦有尺數若門容二轍三个之等造都邑但與之制度大小未必身往也分扶問反營軍之壘舍量其市朝州涂軍社之所里註曰軍壁曰壘州一州之衆二千五百人為師每師一處市也朝也州也皆有道以相之軍社社主在軍者里居也疏曰一州則一師每一師各自一處各立市朝各有道以相湊坡謂出軍有社主又有遷廟主此獨言軍社省文也或軍即宗字之誤涂本又作塗邦國之地與天下之涂數皆書而藏之註曰書地謂方圜山川之廣狹書涂謂支湊之逺近凡祭祀饗賓制其從獻脯燔之數量註曰燔從於獻酒之肉炙也數多少也量長短也疏曰饗賓獻有脯從若燕行獻賓薦脯醢是也祭禮獻以燔從故總之言也掌喪祭奠竁之俎實註曰竁亦有爼實謂所􅊶遣奠士喪禮下篇曰藏包筲於旁竁昌絹反筲所交反凡宰祭與鬱人受斝厯而皆飲之註曰言宰祭者冢宰佐王祭亦容攝祭鄭司農云斝讀如嫁娶之嫁斝器名明堂位曰爵殷以斝𤣥謂斝讀如嘏尸之嘏疏曰厯者謂與鬰人厯皆飲之也小子掌祭祀羞羊肆羊殽肉豆註曰鄭司農云羞進也羊肆體薦全烝也羊殽體解節折也肉豆者切肉也𤣥謂肆讀為鬄羊鬄者所謂豚解也坡謂周頌我將詩云維羊維牛維天其右之是祀天亦用羊則此祭祀乃兼指内外神或謂専言宗廟者非是肆鬄竝他厯反而掌珥于社稷祈于五祀坡謂易氏説詳見肆師凡沈辜侯禳飾其牲註曰鄭司農云沈謂祭川爾雅曰祭川曰浮沈辜謂磔牲以祭也月令曰九門磔禳以畢春氣侯禳者候四時惡氣禳去之也易彦祥曰飾其牲被之以文繡謂羊牲也釁邦器及軍器註曰邦器謂禮樂之器及祭器之屬鄭剛中曰小子掌用羊血以釁也凡師田斬牲以左右徇陳註曰示犯誓必殺之鄭剛中曰不用命者皆狠而不率之人令小子斬羊以示之羊者至狠之物宋義曰狠如羊强不可制者皆斬之此類是也祭祀贊羞受徹焉疏曰贊羞若司馬羞魚牲之等則贊之受徹祭畢廢徹之時則受之羊人掌羊牲凡祭祀飾羔註曰羔小羊也詩曰四之日其蚤獻羔祭韭王介甫曰飾羔若禮所謂飾羔雁者以繢也祭祀割羊牲登其首註曰登升也升首報陽也升首于室凡祈珥共其羊牲賓客共其灋羊註曰灋羊飱饔積膳之羊凡沈辜侯禳釁積共其羊牲註曰積故書為眦鄭司農云眦讀為漬謂釁國器漬軍器也𤣥謂積積柴禋祀槱燎實柴眦徐賜反若牧人無牲則受布于司馬使其賈買牲而共之司爟掌行火之政令四時變國火以救時疾註曰行猶用也變猶易也鄭司農説以鄹子曰春取榆栁之火夏取棗杏之火季夏取桑柘之火秋取柞楢之火冬取槐檀之火季春出火民咸從之季秋内火民亦如之註曰火所以用陶冶民隨國而為之鄭人鑄刑書火星未出而出火後有災鄭司農云以三月本時昏心星見于辰上使民出火九月本黄昏心星伏在戌上使民納火故春秋傳曰以出内火疏曰上經四時變國火據食火明此春秋據陶冶時則施火令註曰焚萊之時内音納凡祭祀則祭爟註曰報其為明之功禮如祭爨疏曰祭爨祭老婦也則此祭爟謂祭先出火之人凡國失火野焚萊則有刑罰焉註曰野焚萊民擅放火疏曰野焚萊有罰者大司馬中春田獵云火弊則二月後擅放火則有罰也掌固掌脩城郭溝池樹渠之固頒其士庶子及其衆庶之守註曰樹謂枳棘之屬有刺者也衆庶民遞守固者也鄭司農説樹以國語曰城守之木於是乎用之黃文叔曰士庶子守固與宿衛王宫同其事任霍光曰函谷京師之固武庫精兵所聚故以丞相弟為闗都尉子為武庫令漢人猶識此意王龜齡曰宫伯云士庶子之在版者謂守於王宫也此謂頒其士庶子之守謂守於城郭等處也設其飾器註曰兵甲之屬今城郭門之器亦然疏曰飾器若城郭門傍所執矛㦸皆有幡飾之等是也分其財用均其稍食註曰財用國以財所給守吏之用也稍食祿廩任其萬民用其材器註曰任謂以其任使之也民之材器其所用塹築及為藩落塹七豔反凡守者受灋焉以通守政有移甲與其役財用唯是得通與國有司帥之以贊其不足者註曰凡守者士庶子及他要害之守吏通守政者兵甲役財難易多少轉移相給也其他非是不得妄離部署國有司掌固也其移乏者又與掌固帥致之贊佐也疏曰甲飾器也變材器言役財者欲見材器是民役之材非財用也晝三巡之夜亦如之註曰巡行也行守者為衆庶之解惰疏曰此乃掌固設灋與所守之處非是掌固自巡行之也夜三鼜以號戒註曰鼜擊鼜警守鼓也三巡之間又三擊鼜鼜音戚解佳賣反若造都邑則治其固與其守灋註曰都邑亦為城郭凡國都之竟有溝樹之固郊亦如之註曰竟界也疏曰王國及三等都邑所在境界之上亦為溝樹以為阻固郊謂近郊逺郊民皆有職焉註曰職謂守與任疏曰此亦兼上王國及都合守之處其民皆職任使勞役遞均也若有山川則因之註曰山川若殽臯河漢竟音境司險掌九州之圖以周知其山林川澤之阻而達其道路註曰周猶徧也達道路者山林之阻則開鑿之川澤之阻則橋梁之設國之五溝五涂而樹之林以為阻固皆有守禁而達其道路註曰五溝遂溝洫澮川也五涂徑畛涂道路也樹之林作藩落也疏曰此五溝五涂而言樹之林以為阻固皆有守禁則非遂人田間五溝五涂但溝涂所作隨所須大小而為之皆準約田間五溝五涂其溝上亦皆有道路以相支湊故以五溝五涂而言也國有故則藩塞阻路而止行者以其屬守之唯有節者達之註曰有故喪災及兵也閉絶要害之道備姦寇也疏曰以其屬守之者謂使司險之下胥徒四十人之屬守其要者其餘使其地之民為守也掌疆闕候人各掌其方之道治與其禁令以設候人註曰道治治道也國語曰候不在竟譏不居其方也禁令備姦寇也以設候人者選士卒以為之詩云彼候人兮何戈與祋若有方治則帥而致于朝及歸送之于竟註曰方治其方來治國事者也春秋傳曰晉欒盈過周王使候人出諸轘轅是其送之疏曰方治謂國有事不能自決當決於王國或有國事須報在上皆是也竟音境何胡我反祋都外反環人掌致師註曰致師者致其必戰之志古者將戰先使勇力之士犯敵焉春秋傳曰楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還樂伯曰吾聞致師者左射以菆代御執轡御下􅧇馬掉鞅而還攝叔曰吾聞致師者右入壘折馘執俘而還皆行其所聞而復之察軍慝註曰慝陰姦也視軍中有為慝者則執之環四方之故坡謂環周迴也軍行慮有伏敵軍舍恐有莫夜之戎周迴四方詳其有否以為警備今行軍者重此易彦祥曰察軍慝則察其在我者環四方之故則環其在人者巡邦國摶諜賊註曰諜賊反間為國賊疏曰此諜賊即上軍慝之類據邦國故異言之訟敵國註曰敵國兵來則往之與訟曲直若齊國佐如師揚軍旅註曰為之威武以觀敵降圍邑註曰圍邑欲降者受而降之春秋傳曰齊人降鄣黃文叔曰環人掌致師志於戰也而以降圍邑終焉不殺之仁也雖然受降如受敵斯亦當察故環人掌之諜音牒降戸江反菆側留反􅧇音兩掉徒弔反馘古獲反莫音暮間去聲鄣音章挈壺氏掌挈壺以令軍井挈轡以令舍挈畚以令糧註曰鄭司農云挈壺以令軍井謂為軍穿井井成挈壺縣其上令軍中士衆皆望見知此下有井壺所以盛飲故以壺表井挈轡以令舍亦縣轡于所當舍止之處使軍中望見知當舍止于此轡所以駕舍故以轡表舍挈畚以令糧亦縣畚于所當稟假之處令軍望見知當稟假于此下也畚所以盛糧之器故以畚表稟軍中人多車騎雜㑹讙囂號令不能相聞故各以其物為表省煩趨疾于事便也畚音本縣音懸下同盛音成稟彼錦反凡軍事縣壺以序聚柝凡喪縣壺以代哭者皆以水火守之分以日夜註曰鄭司農云縣壺以為漏以序聚柝以次更聚擊柝備守也𤣥謂擊柝兩木相敲行夜時也代亦更也禮未大斂代哭以水守壺者為沃漏也以火守壺者夜則火視刻數也分以日夜者異晝夜漏也漏之箭晝夜共百刻冬夏之間有長短焉大史立成灋有四十八箭及冬則以火爨鼎水而沸之而沃之註曰鄭司農云冬水凍漏不下故以火炊水沸以沃之謂沃漏也柝音託敲苦交反射人掌國之三公孤卿大夫之位三公北面孤東面卿大夫西面其摯三公執璧孤執皮帛卿執羔大夫鴈註曰位將射始入見君之位不言士者此與諸侯之賓射士不與也燕禮曰公升即位于席西鄉小臣納卿大夫卿大夫皆入門右北面東上士立于西方東面北上大射亦云則凡朝燕及射臣見于君之禮同疏曰三公北面者君南面答陽臣北面答君三公臣中最尊故屈之使北面答君之義孤東面者西方賓位孤無職而賓客之也卿大夫西面者皆有職故在東近君居主位也諸侯在朝則皆北面詔相其灋註曰謂諸侯來朝而未歸王與之射於朝者皆北面從三公位灋其禮儀疏曰按司几筵云大饗射王立扆前南鄉司服云饗射則鷩冕此云王與之射言在朝當皮弁又何得有扆所以然者彼二者據大射在學故有著冕在扆之事此賓射在路門之外朝故與彼異也若有國事則掌其戒令詔相其事註曰謂王有祭祀之事諸侯當助其薦獻者也戒令告以齊與期掌其治達註曰謂諸侯因與王射及助祭而有所治受而達之於王王有命又受而下之坡謂司士職云凡祭祀掌士之戒令詔相其灋事彼雖掌士而文與此同故以此國事當祭事也諸侯復逆自大僕掌之故治達亦専為射祭齊側皆反以射灋治射儀王以六耦射三侯三獲三容樂以騶虞九節五正諸侯以四耦射二侯二獲二容樂以貍首七節三正孤卿大夫以三耦射一侯一獲一容樂以采蘋五節二正士以三耦射豻侯一獲一容樂以采蘩五節二正註曰射灋王射之禮治射儀謂肄之也鄭司農云容者乏也待獲者所蔽也正所射也詩云終日射侯不出正兮𤣥謂三侯者五正三正二正之侯也二侯者三正二正之侯也一侯者二正而已此皆與賓射於朝之禮也考工梓人職曰張五采之侯則逺國屬逺國謂諸侯來朝者也五采之侯即五正之侯也正之言正也射者内志正則能中焉畫五正之侯中朱次白次蒼次黃𤣥居外三正損𤣥黃二正去白蒼而畫以朱綠其外之廣皆居侯中三分之一中二尺大射禮豻作干讀如宜豻宜獄之豻豻胡犬也士與士射則以豻皮飾侯下大夫也大夫以上與賓射飾侯以雲氣用采各如其正九節七節五節者奏樂以為射節之差言節者容侯道之數也樂記曰明乎其節之志不失其事則功成而徳行立射三侯食亦反下及註射侯所射射牲射豕皆同正音征下同豻五旦反肄餘二反若王大射則以貍步張三侯註曰鄭司農云貍步謂一舉足為一步於今為半步𤣥謂貍善摶者也行則止而擬度焉其𤼵必獲是以量侯道灋之也侯道者各以弓為度九節者九十弓七節者七十弓五節者五十弓弓之下制長六尺大射禮曰大侯九十參七十干五十是也三侯者司裘所共虎侯熊侯豹侯也列國之君大射亦張三侯數與天子同大侯熊侯也參讀為糝糝雜也雜者豹鵠而麋飾下天子大夫疏曰此射人主賓射兼主大射之事故為大射張侯也弓之上制六尺六寸中制六尺三寸下制六尺六尺與步相應摶音博擬度待洛反餘如字糝素感反干豻同王射則令去侯立于後以矢行告卒令取矢註曰鄭司農云射人主令人去侯所而立于後也以矢行告射人主以矢行高下左右告于王也大射禮曰大射正立于公後以矢行告于公下曰留上曰揚左右曰方卒令取矢謂射卒射人令當取矢者使取矢也𤣥謂令去侯者命負侯者去侯也鄉射曰司馬命獲者執旌以負侯疏曰此文承賓射大射之下則王射射人皆令去侯立於後以矢行告卒令取矢祭侯則為位註曰祭侯獻服不服不以祭侯為位為服不受獻之位也大射曰服不侯西北三步北面拜受爵與大史數射中註曰射中數射者中侯之算也大射曰司射適階西釋弓去扑襲進由中東立于中南北面視算佐司馬治射正註曰射正射之灋儀也疏曰司馬所主射儀謂若命去侯命取矢乘矢之等皆當佐之祭祀則贊射牲相孤卿大夫之灋儀註曰烝嘗之禮有射豕者國語曰禘郊之事天子必自射其牲今立秋有貙劉云易彦祥曰方其迎牲於門則君執紼卿大夫從士執芻至於君親射牲而孤卿大夫從射焉此射人相孤卿大夫之灋儀以其掌射灋治射儀故也貙力朱反㑹同朝覲作大夫介凡有爵者註曰作讀如作止爵之作諸侯來至王使公卿有事焉則作大夫使之介也有爵者命士以上不使賤者疏曰㑹同朝覲王命公卿有事則射人使大夫為上介使凡有爵者命士以上為衆介也大師令有爵者乘王之倅車註曰倅車戎車之副疏曰王乘戎車副車十二乘皆從王行則使有爵者命士以上乘之倅七内反有大賓客則作卿大夫從註曰作者選使從王見諸侯疏曰大賓客不言㑹同則是秋冬覲遇并春夏受享在廟之時從王見諸侯也戒大史及大夫介註曰戒戒其當行者覲禮曰諸公奉篋服加命書于其上升自西階東面大史氏右疏曰此謂王有命使三公命諸侯及衣服就館賜之時則射人戒大史及大夫與諸公為介從才用反大喪與僕人遷尸作卿大夫掌事比其廬不敬者苛罰之註曰僕人大僕也僕人與射人俱掌王之朝位也王崩小斂大斂遷尸于室堂朝之象也檀弓曰扶君卜人師扶右射人師扶左君薨以是舉苛謂詰問之疏曰掌事謂王喪宜各有職掌比其廬如宫正云親者貴者居廬當比其本服親疏及貴賤服不氏掌養猛獸而敎擾之註曰猛獸虎豹熊羆之屬擾馴也敎習使之馴服王者之敎無不服羆比皮反凡祭祀共猛獸註曰謂中膳羞者獸人冬獻狼春秋傳曰熊蹯不熟蹯音煩賓客之事則抗皮註曰鄭司農云謂賓客來朝聘布皮帛者服不氏主舉藏之抗讀為亢其讎之亢𤣥謂抗者若聘禮曰有司二人舉皮以東射則贊張侯以旌居乏而待獲註曰贊佐也大射禮曰命量人巾車張三侯杜子春云乏讀為匱乏之乏待獲者所蔽𤣥謂待獲待射者中舉旌以獲射鳥氏掌射鳥註曰鳥謂中膳羞者鳬雁鴇鴞之屬射食亦反鴇音保鴞于苖反祭祀以弓矢敺烏鳶凡賓客會同軍旅亦如之註曰烏鳶喜鈔盜便汙人射則取矢矢在侯高則以并夾取之註曰鄭司農云并夾鍼箭具夾讀為甲故司弓矢職曰大射燕射共弓矢并夾敺起俱反鈔初教反鍼其炎反羅氏掌羅烏鳥註曰烏謂居鵲之屬蜡則作羅襦註曰作猶用也鄭司農云襦細宻之羅襦讀為繻有衣袽之襦𤣥謂蜡建亥之月此時火伏蟄者畢矣豺既祭獸可以羅網圍取禽也王制曰豺祭獸然後田又曰昆蟲已蟄可以火田今俗放火張羅其遺敎中春羅春鳥獻鳩以養國老行羽物註曰春鳥蟄而始出者若今南郡黃雀之屬是時鷹化為鳩鳩與春鳥變舊為新宜以養老助生氣行謂賦賜疏曰此文中春行羽物司裘職云中秋獻良裘王乃行羽物若然則一年二時行羽物陳及之曰天子所養之老三國老庶老死政之老是也貴胄謂之國子則貴而老者謂之國老賤者庶人則賤而老者謂之庶老又有死政者之老焉故羅氏獻鳩以養者國老也司徒以保息養之者庶老也司門以財養之者死政之老也若夫外饔酒正槁人所謂耆老者總三者而言之中音仲掌畜掌養鳥而阜蕃敎擾之註曰阜猶盛也蕃蕃息也鳥之可養使盛大蕃息者謂鵝鶩之屬祭祀共卵鳥註曰其卵可薦之鳥疏曰還謂上經鵝鴨之屬其雞亦在焉嵗時貢鳥物註曰鴞雁之屬以四時來疏曰不言鵝鶩雞者所畜非貢物故以野鳥為貢者也共膳獻之鳥註曰雉及鶉鴽之屬鴽音如司士掌羣臣之版以治其政令嵗登下其損益之數辨其年嵗與其貴賤周知邦國都家縣鄙之數卿大夫士庶子之數註曰損益謂用功過黜陟者縣鄙鄉遂之屬版名籍以詔王治註曰告王所當進退以徳詔爵以功詔祿以能詔事以久奠食註曰徳謂賢者食稍食也賢者既爵乃禄之能者事成乃食之王制曰司馬辨論官材論進士之賢者以告於王而定其論論定然後官之任官然後爵之位定然後禄之疏曰賢者試功之後其徳堪用乃詔王授以正爵有功乃詔王授以正禄也能者先試之以事事成乃定以稍食其能堪用乃後亦授以正爵禄惟賜無常註曰賜多少由王不如禄食有常品奠音定正朝儀之位辨其貴賤之等王南鄉三公北面東上孤東面北上卿大夫西面北上王族故士虎士在路門之右南面東上大僕大右大僕從者在路門之左南面西上註曰此王日視朝事於路門外之位王族故士故為士晚退留宿衞者未嘗仕雖同族不得在王宫大右司右也大僕從者小臣祭僕御僕隸僕疏曰經所云上者皆據近王為上不據隂陽左右也此王日視朝之位大僕職路寢庭有燕朝朝士職庫門外有外朝但外朝有諸侯在焉諸侯既在西方右九棘之下孤避之在東方羣臣之位西面其餘三公卿大夫等仍與此位同也司士擯註曰詔王出揖公卿大夫以下朝者孤卿特揖大夫以其等旅揖士旁三揖王還揖門左揖門右註曰特揖一一揖之旅衆也大夫爵同者衆揖之公及孤卿大夫始入門右皆北面東上王揖之乃就位羣士及故士大僕之屬𤼵在其位羣士位東面王西南鄉而揖之三揖者士有上中下王揖之皆逡遁既復位鄭司農云卿大夫士皆君之所揖禮春秋𫝊所謂三揖在下疏曰上文别三公位此不言三公直言孤卿者舉輕以明重孤卿尚特揖明三公亦特揖可知也易彦祥曰在王門左右者其位皆南向而在王後故還而揖之大僕前註曰前正王視朝之位王入内朝皆退註曰王入入路門也王入路門内朝朝者皆退反其官府治處也王之外朝則朝士掌焉玉藻曰朝服以日視朝於内朝朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢謂諸侯也王日視朝皮弁服其禮則同鄉音向遁音巡掌國中之士治凡其戒令註曰國中城中疏曰國中之士治者謂朝廷之臣及六鄉之臣皆是所有治功善惡皆掌之以擬黜陟此一職之士皆臣總號惟有作士適四方使為介是單士不兼卿大夫又作六軍之士是甲士其餘皆臣之總號耳掌擯士者膳其摯註曰擯士告見初為士者於王也鄭司農云膳其摯者王食其所執羔雁之摯𤣥謂膳者入於王之膳人凡祭祀掌士之戒令詔相其灋事疏曰戒令者齊戒告令也詔相其灋事者謂告語并擯相其行禮之事及賜爵呼昭穆而進之註曰賜爵神恵及下也此所賜王之子姓兄弟祭綂曰凡賜爵昭為一穆為一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序疏曰賜爵者謂祭末旅酬無算爵之時帥其屬而割牲羞俎豆註曰割牲制體也羞進也坡謂此割牲兼羞俎豆文承祭祀之後則據祀事也當在賜爵之前疑或錯簡凡㑹同作士從賓客亦如之註曰作士從謂可使從於王者作士適四方使為介註曰士使謂自以王命使也介大夫之介也春秋𫝊曰天王使石尚來歸脤從才用反使色吏反脤上軫反大喪作士掌事註曰事謂奠斂之屬作六軍之士執披註曰作謂使之也披柩車行所以披持棺者有紐以結之謂之戴結披必當棺束於束係紐天子諸侯載柩三束大夫士二束喪大記曰君纁披六大夫披四前纁後𤣥士二披用纁人君禮文欲其數多圍數兩旁言六耳其實旁三疏曰六軍之士即六鄉之民但天子喪用千人而此云六軍者千人出自六軍故號六軍之士非謂執披有七萬五千人也凡士之有守者令哭無去守註曰守官不可空也國有故則致士而頒其守註曰故非喪則兵災凡邦國三嵗則稽士任而進退其爵禄註曰任其所掌治王光逺曰邦國之士皆命於王其任有勤惰有功過而爵禄有進退者則司士於三嵗而稽攷之此黜陟勸沮之灋所以皆本於王朝而國無異政也春秋之時列國之爵位名號皆自已出故孔子譏之諸子掌國子之倅掌其戒令與其敎治辨其等正其位註曰故書倅為卒鄭司農云卒讀如物有副倅之倅國子謂諸侯卿大夫士之子也燕義曰古者周天子之官有庶子官與周官諸子職文同𤣥謂四民之業而士者亦世焉國子者是公卿大夫士之副貳戒令致於大子之事敎治脩徳學道也位朝位疏曰等謂才藝高下位謂朝天子時依父䕃高下為列倅七内反大子音泰下同國有大事則帥國子而致於大子惟所用之坡謂大事凡大兵大喪當警備非常及王出疆巡守征伐皆須令宿則帥致於大子惟所調用此所謂守曰監國也若有兵甲之事則授之車甲合其卒伍置其有司以軍灋治之司馬弗正註曰軍灋百人為卒五人為伍弗不也國子屬大子司馬雖有軍事不賦之坡謂此所謂從曰撫軍也凡國正弗及疏曰上文云弗正謂兵賦此云國正謂鄉遂之中所有甸徒力征之等竝不及也正音征大祭祀正六牲之體註曰正謂朼載之朼音比凡樂事正舞位授舞器註曰位佾處疏曰樂有舞之處皆使正舞人八八六十四人之位并授其舞之器文舞則羽籥武舞則干鏚黃文叔曰大胥合舞致諸子故諸子於此正舞位授舞器鏚音戚大喪正羣子之服位㑹同賓客作羣子從註曰從於王疏曰位謂在殯宫外内哭位也服者公卿大夫之子為王斬衰與父同凡國之政事國子存遊倅使之脩德學道春合諸學秋合諸射以攷其藝而進退之註曰遊倅倅之未仕者學大學也射射宫也王制曰春秋敎以禮樂冬夏敎以詩書王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉疏曰凡國之政事謂國内有繇役之事皆是也周禮若言異代之學則舉其學名即成均瞽宗之類今此直言學明是周之大學也大學在國中即夏后氏東序在王宫之左也射射宫即國之小學在西郊則虞庠是也吕芸閣曰大子君之貳國子之倅諸侯諸臣之貳也以諸侯諸臣之貳事其君之貳學相同則好相合矣王制謂敎以禮樂詩書王大子王子羣后之大子卿大夫元士之適子皆造焉是也事相同則情相信矣國有大事則帥國子而致于大子唯所用之是也故大子雖未為君也君臣之交已盡賢不肖之知已悉可任使之才已備則先王之慮後世者豫矣司右掌羣右之政令註曰羣右戎右齊右道右李子華曰戎右齊右道右天子乘車之右皆中大夫下大夫非司右之屬也司右之右乃兵車之右用以征行侵伐故凡國中之有勇力者皆屬焉一旦有事則取之以為右齊側皆反凡軍旅㑹同合其車之卒伍而比其乘屬其右註曰合比屬謂次第相安習也車亦有卒伍疏曰車之卒伍者按宣十二年𫝊云其君之戎分為二廣廣有一卒卒偏之兩司馬灋曰二十五乘為偏百二十五乘為伍凡國之勇力之士能用五兵者屬焉掌其政令註曰勇力之士屬焉者選右當於中司馬灋曰弓矢圍殳矛守戈㦸助凡五兵長以衛短短以救長虎賁氏掌先後王而趨以卒伍註曰王出將虎賁士居前後雖羣行亦有局分軍旅㑹同亦如之舍則守王閑註曰舍王出所止宿處閑梐枑王在國則守王宫註曰為周衛梐薄禮反枑戸故反國有大故則守王門大喪亦如之註曰非常之難要在門疏曰大故謂兵災及葬從遣車而哭註曰遣車王之魂魄所馮依適四方使則從士大夫註曰虎士從使者疏曰天子有下聘諸侯灋大行人所云嵗徧問之等若道路不通有徴事則奉書以使於四方註曰不通逢兵寇若泥水奉書徴師役也春秋隠公公七年冬戎伐凡伯于楚丘以歸旅賁氏掌執戈盾夾王車而趨左八人右八人車止則持輪註曰夾王車者其下士也下士十有六人中士為之帥焉凡祭祀㑹同賓客則服而趨註曰服而趨夾王車趨也㑹同賓客王亦齊服服衮冕則此士之齊服服𤣥端喪紀則衰葛執戈盾註曰葛葛絰武士尚輕軍旅則介而趨註曰介被甲節服氏掌祭祀朝覲衮冕六人維王之大常註曰服衮冕者從王服也維維之以縷王旌十二旒兩兩以縷綴連旁三人持之禮天子旌曳地鄭司農云維持之諸侯則四人其服亦如之郊祀裘冕二人執戈送逆尸從車註曰裘冕者亦從尸服也裘大裘也凡尸服卒者之上服從車從尸車送逆之往來春秋𫝊曰晉祀夏郊董伯為尸方相氏掌䝉熊皮黃金四目𤣥衣朱裳執戈揚盾帥百隸而時難以索室敺疫註曰䝉冒也冒熊皮者以驚敺疫癘之鬼如今魌頭也時難四時作方相氏以難郤凶惡也月令季冬命國難索廋也王氏曰凡陰陽之氣初則為利功成者退留則為烖月令季春國門之儺曰畢春氣恐寒氣留也仲秋天子之儺曰達秋氣恐暑氣伏也季冬大儺辟一嵗邪慝之氣也此於大虚間不過氣之宿留者而已留而中于物則為災為疫有鬼物焉居聲氣之間以主之故儺以敺使蕩而不留難同儺乃多反註同敺起俱反魌音欺廋音搜大喪先匶註曰塟使之道疏曰喪所多有凶邪故使之道也及墓入壙以戈擊四隅敺方良註曰壙穿地中也方良㒺兩也天子之椁柏黃腸為裏而表以石焉國語曰木石之怪夔㒺兩鄭剛中曰塟則用木石木石久而變怪生故始葬則敺之亦厭勝之術壙音曠方良上音㒺下音兩又竝如字道音導周禮述註卷十八
