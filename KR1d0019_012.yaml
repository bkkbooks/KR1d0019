body:
  text: 周禮述注卷十二安溪李光坡撰大宗伯之職掌建邦之天神人鬼地示之禮以佐王建保邦國坡謂邦禮有五獨言掌吉禮者禮有五經莫重於祭舉首以該終也建立也保安也正倫理則立篤恩義則安上下各得其所而後安故曰建保邦國也示音祗後同以吉禮事邦國之鬼神示注曰謂祀之祭之享之吉禮之别十有二邱氏曰上以神鬼示言上下也此以鬼神示言內外也以禋祀祀昊天上帝以實柴祀日月星辰以槱燎祀司中司命飌師雨師注曰禋之言煙周人尚臭煙氣之臭聞者槱積也詩曰芃芃棫朴薪之槱之三祀皆積柴實牲體焉或有玉帛燔燎而升煙所以報陽也鄭司農云昊天天也上帝玄天也昊天上帝樂以雲門實柴實牛柴上也故書實柴或為賓柴司中三能三階也司命文昌宮星風師箕也雨師畢也玄謂星謂五緯辰謂日月所會十二次司中司命文昌第五第四星或曰中能上能也祀五帝亦用實柴之禮云疏曰辰即二十八星也程子曰天與帝一也天言其體帝言其主朱子曰説上帝是總説帝説五帝是五方帝説昊天上帝只是説天以血祭祭社稷五祀五嶽以貍沈祭山林川澤以疈辜祭四方百物注曰不言祭地此皆地示祭地可知也陰祀自血起貴氣臭也社稷土穀之神有德者配食焉共工氏之子曰勾龍食於社有厲山氏之子曰柱食於稷湯遷之而祀棄故書祀作祀疈為罷鄭司農云祀當為祀書亦或作祀罷辜披磔牲以祭若今時磔狗祭以止風玄謂五祀者五官之神在四郊四時迎五行之氣於四郊而祭五德之帝亦食此神焉少昊氏之子曰重為勾芒食於木該為蓐收食於金修及熙為玄冥食於水顓頊之子曰黎為祝融食於火共工氏有子曰勾龍為后土食於土五嶽東曰岱宗南曰衡山西曰華山北曰恆山中曰嵩高山不見四竇者四竇五嶽之匹或省文祭山林曰貍川澤曰沈順其性之含藏疈疈牲胸也疈而磔之謂磔攘及蠟祭郊特牲曰八蠟以祀四方又曰蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也疏曰五嶽歆神雖與社稷同用血五嶽四瀆山川之類亦當貍沈也坡謂祀天神祭地示其時其地詳見於大司樂而此經下文云以蒼璧禮天以黃琮禮地典瑞云四圭有邸以祀天旅上帝兩圭有邸以祀地旅四望神祗之祀燦然並列王制云天子祭天地諸侯祭社稷則祭地祭社實難從同然此經序祭有社無示又司徒鼓人職曰以雷鼓鼓神祀以靈鼓鼓社祭是二者皆言社而不及示典瑞以圭璧禮諸神祀地之外不著社稷大司樂分樂以祭亦不别著社稷於祭地之後二者又言示而不及社似乎彼此相成各見為義而示祭社祭禮無殊也勉齋黃氏曰社祭土稷祭穀土穀之祭達於上下故方丘與社皆祭地也而宗伯序祭有社無示舉社則其禮達於上下舉示則天子獨用之鼓人職曰以雷鼓鼓神祀以靈鼓鼓社祭不曰示祭而曰社祭亦是禮之達乎上下也大司樂雷鼓雷鼗以祀天神靈鼓靈鼗以祭地示是則示祭社祭其用同矣斯言確哉較於賈疏所謂以小該大者尤為長於理而合於經也曰禮記祭法王有大社又有王社何歟曰孔氏云大社在庫門內之右王社所在書傳無文妄意大社立於王宮惟祭京師之地王社則天子祭天下之地示惟天子得行之或者兆在北郊將王社即方丘歟曰張子不云大社祭天下之地示王社祭京師之地示乎曰張子説本白虎通惟據大與王而分之則大者統天下王者自一人而言耳然京大也師衆也京師之社亦可云大王者無外社繫以王首以見此禮惟王有之諸侯以下則否次以見王者君天下則王社亦統天下矣雖然張子之言足為天子二社一及京師一及天下之眀徴也四方解見司徒舞師後倣此以肆獻祼享先王以饋食享先王以祠春享先王以禴夏享先王以嘗秋享先王以蒸冬享先王注曰宗廟之祭有此六享肆獻祼饋食在四時之上則是祫也禘也肆者進所解牲體謂薦熟時也獻獻醴謂薦血腥也祼之言灌灌以鬱鬯謂始獻尸求神時也祭必先灌乃後薦腥薦熟於祫逆言之者與下共文眀六享皆然祫言肆獻祼禘言饋食者著有黍稷互相備也魯禮三年喪畢而祫於太祖眀年春禘於羣廟自爾以後率五年而再殷祭一祫一禘疏曰天地宗廟皆樂為下神始從禋祀已下至此吉禮十二為歆神始也槱羊九反飌音風貍亡皆反後同疈孚逼反肆他力反食音嗣祀音祀罷芳皮反磔張格反重直龍反蓐音辱竇音瀆畷音綴邸音底以凶禮哀邦國之憂注曰哀謂救患分災凶禮之别有五以喪禮哀死亡注曰哀謂親者服焉疏者含禭以荒禮哀凶札注曰荒人物有害也凶嵗凶年穀不登札讀為截謂疫癘以弔禮哀禍災注曰禍災謂邅水火宋大水魯莊公使人弔焉曰天作淫雨害於粢盛如何不弔廏焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道以禬禮哀圍敗注曰同􅉀者會合財貨以更其所喪春秋襄三十年冬會于澶淵宋災故是其類以恤禮哀寇亂注曰恤憂也鄰國相憂兵作於外為寇作於內為亂坡謂自一至三天患也四五人禍也天患者先死亡次凶札由親及疏也次水火由重及輕也人禍者圍敗則喪師失地寇亂未有喪失亦先重後輕焉禍音禍禬古外反含戶暗反所喪之喪息浪反澶善然反以賓禮親邦國注曰親謂使之相親附賓禮之别有八春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰會殷見曰同注曰此六禮者以諸侯見王為文六服之內四方以時分來或朝春或宗夏或覲秋或遇冬名殊禮異遞更而遍朝猶朝也欲其來之早宗尊也欲其尊王覲之言勤也欲其勤王之事遇偶也欲其若不期而偶至時見者言無常期諸侯有不順服者王將有征討之事則既朝覲王為壇於國外合諸侯而命事焉春秋傳曰有事而會不協而􅉀是也殷衆也十二嵗王如不巡狩則六服盡朝朝禮既畢王亦為壇合諸侯以命政焉所命之政如王巡狩殷見四方四時分來嵗終則遍時聘曰問殷眺曰視注曰時聘者亦無常期天子有事乃聘之焉竟外之臣既非朝嵗不敢瀆為小禮殷眺謂一服朝之嵗以朝者少諸侯乃使卿以大禮衆聘焉一服朝在元年七年十一年疏曰此二經者是諸侯遣臣聘問天子之事上時會是當方諸侯不順服其順服者當方盡朝無遣臣來之法其餘三方諸侯不來聞天子有征伐之事則遣大夫來問天子必知時會遣大夫不使卿者以經稱問案聘禮小聘曰問使大夫此經云問眀使大夫也鄭剛中曰考行人時聘以結諸侯之好殷眺以除邦國之慝此乃王見諸侯之文與此諸侯見王之文不合合二官考之蓋聘眺之禮王與諸侯交用之但諸侯行之則曰問視天子行之則曰除慝結好見賢遍反眺他弔反竟音境以軍禮同邦國注曰同謂威其不協僭差者軍禮之别有五鄭剛中曰天子用之侯國亦用之所以謂之同大師之禮用衆也注曰用其義勇疏曰大師者謂天子六軍諸侯大國三軍次國二軍小國一軍出征之法大均之禮恤衆也注曰均其地政地守地職之賦所以憂民疏曰此大均必在軍禮者謂諸侯賦稅不均者皆是諸侯僭濫無道致有不均之事當合衆以均之故在軍禮也大田之禮簡衆也注曰古者因田習兵閲其車徒之數疏曰此謂天子諸侯親自四時田獵大役之禮任衆也注曰築宮邑所以事民力強弱大封之禮合衆也注曰正封疆溝塗之固所以合聚其民王介甫曰合衆者地有定域民有常主所以合其志坡謂兵以衛國賦以足食故居首田以習戰與大師相表裏賦役一也故大役與大均亦表裏焉凡四者皆必民聚而後可為故以大封之禮終之以嘉禮親萬民注曰嘉善也所以因人心所善者而為之制嘉禮之别有六疏曰餘四禮皆云邦國獨此云萬民者餘四禮萬民所行者少故舉邦國而言此嘉禮六者萬民所行者多故舉萬民其實上下通也以飲食之禮親宗族兄弟注曰親者使之相親人君有食宗族飲酒之法所以親之也文王世子曰族食世降一等大傳曰繫之以姓而弗别綴之以食而弗殊以昏冠之禮親成男女注曰親其恩成其性以賓射之禮親故舊朋友注曰射禮雖王亦立賓主也王之故舊朋友為世子時共在學者天子亦有友諸侯之義武王曰我友邦冡君是也司冦職有議故之辟議賓之辟以饗燕之禮親四方之賓客注曰賓客謂朝聘者疏曰此經饗燕並言殊食於上者食無獻酢之法故别言於此與私飲同科以脤膰之禮親兄弟之國注曰脤膰社稷宗廟之肉以賜同姓之國同福祿也兄弟有共先王者魯定公十四年天王使石尚來歸脤疏曰此文雖主兄弟之國至於二王後及異姓有大功者得與兄弟之國同故僖九年夏王使宰孔賜齊侯胙又僖公二十四年宋成公如楚還入於鄭鄭伯將享之問禮於皇武子對曰宋先代之後也於周為客天子有事膰焉有喪弔焉是二王後及異姓有大功者亦得脤膰之賜是以大行人直言歸脤以交諸侯之福不辨同姓異姓是亦容有非兄弟之國亦得脤膰也以賀慶之禮親異姓之國注曰異姓王昏姻甥舅疏曰大行人云賀慶以贊諸侯之喜不别同姓異姓則兼同姓可知坡謂飲食昏冠所以親於家也賓射饗燕所以親於國也脤膰賀慶所以親於天下也而家國天下之中親疏內外又各有序焉夫先王之治天下報本反始敬之至也救災恤患愛之大也吉凶之禮備矣敬之至愛之大則諸侯悅服以正王面為賓禮以賓之而謀其不協威其不軌於是又有大師之禮至若通乎上下因其所善以厚道先之親親敬故使貴賤疏戚皆維繫於厚則嘉禮之為也脤上忍反膰音煩共讀如字辟音僻以九儀之命正邦國之位注曰每命異儀貴賤之位乃正春秋傳曰命位不同禮亦異數王光逺曰命以德定其數儀以命制其節位以儀辨其分一命受職注曰始見命為正吏謂列國之士於子男為大夫王之下士亦一命鄭司農云受職治職事再命受服注曰受服受玄冕之服列國之大夫再命於子男為卿卿大夫自玄冕而下如孤之服王之中士亦再命則爵辨服三命受位注曰此列國之卿始有列位於王為王之臣也王之上士亦三命四命受器注曰此公之孤始得有祭器者也禮運曰大夫具官祭器不假聲樂皆具非禮也王之下大夫亦四命五命賜則注曰鄭司農云則者法也出為子男玄謂則地未成國之名王之下大夫四命出封加一等五命賜之以方百里二百里之地者方三百里以上為成國王莽時以二十五成為則方五十里合今俗説子男之地獨劉子駿等識古有此制焉六命賜官注曰此王六命之卿賜官者使得自置其臣治家邑如諸侯春秋襄十八年冬晉侯以諸侯圍齊荀偃為君禱河既陳齊侯之罪而曰曾臣彪將率諸侯以討焉其官臣偃實先後之七命賜國注曰王之卿六命出封加一等者鄭司農云出就侯伯之國八命作牧注曰謂侯伯有功德者加命得専征伐於諸侯鄭司農云一州之牧王之三公亦八命九命作伯注曰上公有功德者加命為二伯得征五侯九伯云鄭司農云長諸侯為方伯坡謂職服位器皆曰受者自下言之不敢自専也則與官國皆曰賜自上言之恩出非常也牧與伯皆曰作者必有過人之功德方可作而在此位也以玉作六瑞以等邦國瑞信也等猶齊等也王執鎮圭注曰鎮安也所以安四方鎮圭者蓋以四鎮之山為瑑飾圭長尺有二寸疏曰此鎮圭王祭祀時所執公執桓圭注曰公二王之後及王之上公雙植謂之桓桓宮室之象所以安其上也桓圭蓋亦以桓為瑑飾圭長九寸疏曰此所執謂朝時桓謂若屋之桓楹桓若豎之則有四稜此於圭上而言下二稜著圭不見惟有上二稜故以雙言宮室在上須桓楹乃安若天子在上須諸侯衛守乃安侯執信圭伯執躬圭注曰信當為身聲之誤也身圭躬圭蓋皆象以人形為瑑飾文有粗縟耳欲其慎行以保身圭皆長七寸子執穀璧男執蒲璧注曰穀所以養人蒲為席所以安人二玉蓋或以穀為瑑飾或以蒲為瑑飾璧皆徑五寸不執圭者未成國也坡謂圭之長短依命數其形則雜記贊大行云博三寸厚半寸剡上左右各寸半是也璧形圓內有孔謂之好外有玉謂之肉肉倍好謂之璧以禽作六贄以等諸臣注曰摯之言至所執以自致孤執皮帛卿執羔大夫執鴈士執雉庶人執鶩工商執雞注曰皮帛者束帛而表以皮為之飾皮虎豹皮帛如今璧色繒也羔小羊取其羣而不失其類鴈取其候時而行雉取其守介而死不失其節鶩取其不飛遷雞取其守時而動曲禮曰飾羔鴈者以繢謂衣之以布而又畫之者自雉以下執之無飾士相見之禮卿大夫飾摯以布不言繢此諸侯之臣與天子之臣異也然則天子之孤飾摯以虎皮公之孤飾摯以豹皮與此孤卿大夫士之摯皆以爵不以命數凡摯無庭實疏曰凡此所執王之臣尊侯之臣卑雖尊卑不同命數有異爵同則摯同此雖以王臣為主文兼侯臣是以士相見卿大夫士所執亦與此同但飾有異耳庶人府史胥徒新升之時鄭剛中曰古之工商亦有見君之理如工執藝事以諫鄭商人以乘韋先牛犒師匠慶伶州鳩之徒皆工商之得以見君者也信音身慎行之行下孟反剡音琰繢音潰以玉作六器以禮天地四方注曰禮謂始告神時薦於神坐書曰周公植璧秉圭是也疏曰此以玉禮神在作樂下神後與宗廟祼同節若然祭天當實柴之節也以蒼璧禮天以黃琮禮地以青圭禮東方以赤璋禮南方以白琥禮西方以玄璜禮北方注曰此禮天以冬至禮地以夏至者也禮東方以立春謂蒼精之帝而太昊勾芒食焉禮南方以立夏謂赤精之帝而炎帝祝融食焉禮西方以立秋謂白精之帝而少昊蓐收食焉禮北方以立冬謂黑精之帝而顓頊玄冥食焉禮神者必象其類璧圓象天琮八方象地圭鋭象春物初生半圭曰璋象夏物半死琥猛象秋嚴半璧曰璜象冬閉藏地上無物惟天半見皆有牲幣各放其器之色注曰幣以從爵若人飲酒有酬幣坡謂九儀者正尊卑之位也六瑞六摯者等尊卑相見之物也後及六器者自眀以及幽也吉凶賓軍嘉五者以治神人九儀四者以和上下故其敘如此放音倣以天産作陰德以中禮防之以地産作陽德以和樂防之坡謂産生也禮器亦曰德産天産者倫理之次第皆天生也書曰天敘有典作陰德者制為綱常截然有定故曰陰德以中禮防之者氣質不齊於綱常或有過不及故以中防之也地産者聲氣之清濁皆地生也漢書曰音聲不同係水土之風氣作陽德者制為歌詠揚詡情志故曰陽德以和樂防之者教俗各異歌詠者或即於慆淫故以和防之也言以倫理之自然作為綱常而以中防其過不及之弊也以聲氣之自然作為歌詠而以和防其慆淫之失也以禮樂合天地之化百物之産以事鬼神以諧萬民以致百物坡謂以禮樂合天地之化百物之産者推言禮樂之功用也人君建中和之極萬民服中和之教於是以中感中以和召和格于上下則天地欣合陰陽相得煦嫗覆育萬物暨于含生則草木茂區萌達羽翼奮角觡生蟄蟲昭蘇羽者嫗伏毛者孕鬻胎生者不殰而卵生者不殈合之謂也惟其可以合天地之化故以事鬼神則天神格人鬼享惟其可以教中和故以諧萬民則移風易俗天下皆寧惟其可以合百物之産故以致百物則麟鳯降龜龍格上文言治神人和上下之禮詳矣此二節推其關極天地聖人體之贊化育物還以達於天地故其志氣天人交相感動而其應如此兼言樂者禮樂一事也欣音欣煦音姁吁句切嫗音傴於語切區音勾觡音格殰音牘殈音洫凡祀大神享大鬼祭大示帥執事而卜日宿視滌濯涖玊鬯省牲鑊奉玉齍詔大號治其大禮詔相王之大禮注曰執事諸有事於祭者宿申戒也滌濯溉祭器也玉禮神之玉也始涖之祭又奉之鑊烹牲器也大號六號之大者以詔大祝以為祝辭治猶簡習也豫簡習大禮至祭當以詔相王羣臣禮為小禮涖視也疏曰此亦法三才故享大鬼在其中涖玉鬯者天地有禮神之玉無鬱鬯宗廟無禮神之玉而有鬱鬯但宗廟仍有圭瓚璋瓚亦是玉故曲禮云玉曰嘉玉郊特牲云用玉氣是也奉玉齍者此玉還是上文所涖者齍謂黍稷天地當盛以瓦簠但齍與上鬯互見為義皆始時臨之祭又奉之若王不與祭祀則攝位攝代也王不與祭祀謂有疾及哀慘之等則代行其祭事凡大祭祀王后不與則攝而薦豆籩徹注曰薦徹豆籩王后之事疏曰天地及社稷外神等后夫人不與此言凡大祭祀王后不與謂后應與而不與又云大祭祀眀非羣小祀則大祀者惟宗廟而已齍音咨相息亮反與音預大賓客則攝而載果注曰載為也果讀為祼代王祼賓客以鬯君無酌臣之禮言為者攝酌獻耳拜送則王也鄭司農云王不親為主疏曰案大行人云上公之禮再祼而酢此再祼者有后祼則亦攝為之內宰贊之侯伯一祼而酢子男一祼不酢此皆無后祼王不親酌則皆使大宰宗伯攝而為之果讀祼朝觀會同則為上相大喪亦如之王哭諸侯亦如之相詔王禮也出接賓曰擯入詔禮曰相相者五人卿為上擯大喪王后及世子也或王或嗣王為喪主哭及拜賓宗伯亦為上相也哭諸侯者謂薨於國為位而哭之檀弓曰天子之哭諸侯也爵辨絰䊷衣若來朝薨於王國則王為之緦麻不應直哭之而已相息亮反䊷側其反王命諸侯則儐注曰儐進之也王將出命假祖廟立依前南鄉儐者進當命者延之命使登內史由王右以策命之降再拜稽首登受策以出此其略也諸侯爵祿其臣則于祭焉假音格鄉許亮反國有大故則旅上帝及四望注曰故謂凶災旅陳也陳其祭事以祈焉禮不如祀之備也陳氏曰掌次大旅上帝祀五帝則上帝異乎五帝也典瑞祀天旅上帝則上帝異乎天也上帝之文既不主昊天上帝又不主於五帝而周禮所稱帝者昊天上帝與五帝而已則上帝為昊天上帝及五帝眀矣鄭氏以上帝為五帝而不及天王肅以上帝為昊天上帝而不及五帝皆非也又曰旅非常祭也國有大故然後旅於羣神而祭之陳樂而不懸廞樂而不鼓告以其凶災或言旅或言大旅蓋故有大小而旅亦隨異也坡謂四望以大司樂言之天神稱祀地示稱祭於四望曰祀則不主於嶽瀆也以典瑞言之既有日月星辰又有四望則不主於日月等之祀也鄭司農云四望日月星海許氏慎曰日月星辰河海大山坡足其説詳小宗伯廞許今反王大封則先告后土注曰后土土神也邱氏曰王封諸侯取大社之土苞之以白茅而授之故大宗伯先告焉乃頒祀于邦國都家鄉邑頒讀為班班其所當祀及其禮鄉邑鄉遂公邑也鄉邑之中亦有祀如社禜酺之類先邦國次都家次鄉邑自外至內之序也或問血祭章注以黎為祝融后土食于火土子添改非也曰鄭以為見其先師之説也然無他考而左傳蔡墨之言眀分二官鄭既據其言以解五祀獨此相悖恐未知者惑矣妄欲載傳文附己意則反覆汗浩支離無極故遂益入實仍傳舊非敢蹈僭或問以天産章注及諸儒之説詳矣而俱不從何曰諸儒之説皆不及注然觀上文以玉作六瑞以禽作六摯以玉作六器凡言作者皆為造作之作此云以天産作陰德以地産作陽德句法一也乃頓以作為作起之作故注與諸儒所解於理非不可觀僅因二作字無著四以字折轉難通而文與理上下俱窒則雖談元極奧終未敢為據也曰樂由天作禮以地制今反以禮自天産樂自地産何也曰上二句是因天性之自然而定其分非即禮也以地氣之自然而成其聲非即樂也下二句方是以禮樂防其失則又是現成之禮樂非至此方制也此與大司徒防偽教中防情教和一理然司徒主以禮樂教故自禮樂説起此主以禮樂合天地之化故自天地説來文義至眀詳之小宗伯之職掌建國之神位右社稷左宗廟注曰庫門內雉門外之左右故書位作立鄭司農云立讀為位古者立位同字古文春秋經公即位為公即立疏曰建國之神位者從內向外故據國中神位而言對下經在四郊等為外神也兆五帝於四郊四望四類亦如之坡謂兆為壇之營域五帝蒼精之帝大昊食焉赤精之帝炎帝食焉黃精之帝黃帝食焉白精之帝少昊食焉黑精之帝顓頊食焉黃帝亦於南郊四望者天神則兆日於東郊兆月與風師於西郊兆司中司命於南郊兆雨師於北郊地示則五嶽四鎮四竇也四類類上帝也類上帝者師祭也四方皆有類故云四類也類上帝在四望後者非常祀也兆山川丘陵墳衍各因其方注曰順其所在疏曰案大司徒職地有十等此不言林澤原隰亦順所在可知故略不言坡謂宗伯掌邦禮治神人自經首至此皆治神之禮也掌五禮之禁令與其用等五禮吉凶賓軍嘉也禁者不當為而為與得為而不為者皆有禁也令者令其當為與得為也用等牲器尊卑之差也辨廟祧之昭穆注曰祧遷主所藏之廟自始祖之後父曰昭子曰穆坡謂辨廟祧之昭穆者正欲以序生者之昭穆也若辨立廟之昭穆則上文建國神位左宗廟中已包之矣辨吉凶之五服車旗宮室之禁邱氏曰九章七章五章三章一章此吉服也斬衰齊衰錫衰緦衰疑衰此凶服也坡謂禁令用等禮之節也衣服宮車禮之器也掌其節辨其器皆所以眀分貴賤也掌三族之别以辨親疏其正室皆謂之門子掌其政令注曰三族謂父子孫人屬之正名喪服小記曰親親以三為五以五為九正室適子也將代父當門者也疏曰辨親疏者據已上至髙祖下至元孫傍至緦麻重服者則親輕服者則疏也正室皆謂之門子者還據九族之內但是適子正體主皆是正室亦謂之門子徐氏曰掌其政令者治其昭穆眀其適庶使不得以卑代尊以孽代宗也夫王道莫先於親親親親之道莫要於辨昭穆分族屬眀宗法故昭穆辨而世次眀尊卑序矣三族别而親疏分矣門子立而宗法正矣坡謂既辨昭穆而昭穆遞衍又各有親疏之殺既辨親疏而親疏之中在彼又各有宗支之分掌而辨之則族法明自掌五禮至此皆治人之禮也人道之大惟貴賤親疏各得其分則理故反覆言之毛六牲辨其名物而頒之于五官使共奉之注曰毛擇毛也鄭司農云司徒主牛宗伯主雞司馬主馬及羊司冦主犬司空主豕疏曰祭日之旦在廟門之前頒與五官使共奉之助王牽入廟辨六齍之名物與其用使六宮之人共奉之注曰齍讀為粢六粢謂六穀黍稷稻粱麥苽坡謂用者祭有大小則用有多寡辨六彝之名物以待果將注曰六彝雞彝鳥彝斝彝黃彝虎彝蜼彝果讀為祼辨六尊之名物以待祭祀賓客注曰待者有事則給之鄭司農云六尊獻尊象尊壺尊著尊大尊山尊疏曰案司尊彝惟為祭祀陳六彝六尊不見為賓客陳六尊此兼言賓客則在廟饗賓客時陳六尊亦依祭禮四時所用若在野外饗不用祭祀之尊故左傳云犧象不出門也若然案鬱人云掌祼器凡祭祀賓客之祼事則上六彝亦為祭祀賓客而辨之而不言祭祀賓客者舉下以眀上故略而不言坡謂毛六牲至此承首節建神示人鬼之位此則備其祀享之物也果讀祼斝音假蜼音誄獻素何反犧同著直略反掌衣服車旗宮室之賞賜注曰王以賞賜有功者書曰車服以庸掌四時祭祀之序事與其禮坡謂此承次節衣服宮車既掌其禁此因其有功而豫以所當得也昭穆親疏既掌其辨此因祭祀而次序之即中庸所謂宗廟之禮序昭穆序齒之等也舊説序事為視滌省牲等事此事眀在下文恐非矣豫音與若國大貞則奉玉帛以詔號問事之正曰貞大貞謂卜立君卜大封也玉帛所以禮神者詔詔大祝也號神號幣號大祭祀省牲視滌濯祭之日逆齍省鑊告時于王告備于王注曰逆齍受饎人之盛以入省鑊視亨腥熟時薦陳之早晚備謂饌具饎音熾亨普庚反凡祭祀賓客以時將瓚祼注曰將送也猶奉也祭祀以時奉而授王賓客以時奉而授宗伯天子圭瓚諸侯璋瓚疏曰案小宰職云凡祭祀贊祼將之事此小宗伯又奉而授王者此據授王彼小宰據授尸謂瓚既在王手小宰乃贊王授尸故二官俱言也詔相祭祀之小禮凡大禮佐大宗伯注曰小禮羣臣之禮疏曰此經所云既未至職末輒言此者此以下皆小宗伯専行事不佐大宗伯故於中言之以結上也相息亮反賜卿大夫士爵則儐注曰賜猶命也儐之如命諸侯之儀春秋文元年天王使毛伯來錫公命傳曰錫者何賜也命者何加我服也小祭祀掌事如大宗伯之禮王光逺曰大宗伯祀大神示帥執事而卜曰以至詔大號小祭祀小宗伯之所掌故其事亦如之大賓客受其將幣之齎注曰謂所齎來貢獻之財物疏曰此謂諸侯來朝覲禮畢每國於廟貢國所有行三享之禮以玉幣致享既訖其庭實之物則小宗伯受之以東故云受其將幣之齎也齎音賫若大師則帥有司而立軍社奉主車注曰有司大祝也王出軍必先有事於社及遷廟而以其主行社主曰軍社遷主曰祖春秋傳曰軍行祓社釁鼓祝奉以從曾子問曰天子巡守以遷廟主行載于齊車言必有尊也書曰用命賞于祖不用命戮于社社之主蓋用石為之奉謂將行若軍將有事則與祭有司將事于四望注曰軍將有事將與敵合戰也祭有司謂大祝之屬蓋司馬之官實典焉黃文叔曰與如字祭禱自有主者小宗伯與之偕祓孚物反齊側皆反若大甸則帥有司而饁獸于郊遂頒禽注曰甸讀曰田有司大司馬之屬饁饋也以禽饋四方之神於郊郊有羣神之兆頒禽謂以豫羣臣詩傳曰禽雖多擇取三十焉其餘以豫大夫士以習射於澤宮而分之甸音田饁于輒反豫音與大災及執事禱祠于上下神示注曰執事大祝及男巫女巫也求福曰禱得求曰祠讄曰禱爾于上下神示疏曰大災者謂國邅水火及年穀不熟讄音誄王崩大肆以秬鬯渳注曰鄭司農云大肆大浴也杜子春讀渳為泯以秬鬯浴尸玄謂大肆始陳尸伸之疏曰大祝以肆鬯渳小祝贊渳此又言之者察其不如儀也及執事涖大斂小斂率異族而佐注曰執事大祝之屬涖臨也親斂者蓋事官之屬為之喪大記曰小斂衣十九稱君大夫士一也大斂君百稱大夫五十稱士三十稱異族佐斂疏者可以相助縣衰冠之式于路門之外注曰制色宜齊同及執事視葬獻器遂哭之注曰執事蓋梓匠之屬至將葬獻明器之材又獻素獻成皆於殯門外王不親哭有官代之疏曰小宗伯哭此眀器哀其生死異也卜葬兆甫竁亦如之注曰兆墓塋域甫始也鄭大夫讀竁皆為穿杜子春讀竁為毳皆謂葬穿壙也今南陽名穿地為竁聲如腐脆之脺既葬詔相喪祭之禮注曰喪祭虞祔也檀弓曰葬日虞弗忍一日離也是日也以虞易奠卒哭曰成事是日也以吉祭易喪祭眀日祔于祖父成葬而祭墓為位注曰成葬邱已封也天子之冡蓋不一日而畢位壇位也先祖形體託於此地祀其神以安之冡人職曰大喪既有日請度甫竁遂為之尸渳亡婢反縣音懸稱去聲竁毳並昌瑞切脆脺並七嵗反凡王之會同軍旅甸役之禱祠肄儀為位注曰肄習也若今時肄司徒府也小宗伯主其位坡謂禱祠即上文將事四望饁獸于郊之等也肄儀為位此方言之者文相足也國有禍災則亦如之注曰謂有所禱祈坡謂疏云禍災謂國遭水火凶荒即上文之大災也上言禱祠此言肄儀為位亦文相足凡天地之大災類社稷宗廟則為位注曰禱祈禮輕類者依其正禮而為之疏曰天災謂日月食星辰奔殞地災謂震裂凡國之大禮佐大宗伯凡小禮掌事如大宗伯之儀疏曰凡言大禮者王親為之小禮者羣臣攝為之易彥祥曰上經言大禮小禮則祭祀之禮而已此終篇則總結之以五禮之大小者也周禮述注卷十二
