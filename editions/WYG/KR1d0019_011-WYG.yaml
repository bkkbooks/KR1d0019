body:
  text: 周禮述註卷十一安溪李光坡撰春官宗伯第三坡聞之兄曰春者其氣則天地温厚之氣其時則陰陽適均之時中和之極也宗伯掌禮以敎民中掌樂以敎民和故曰春官宗伯者鄭目録云宗尊也伯長也不言司者典禮以事神為上鬼神􅅘人之所尊不敢主之故也長丁丈反惟王建國辨方正位體國經野設官分職以為民極乃立春官宗伯使帥其屬而掌邦禮以佐王和邦國註曰禮謂曲禮五吉凶賓軍嘉其别三十有六鄭司農云宗伯主禮之官故書堯典曰帝曰咨四岳有能典朕三禮僉曰伯夷帝曰俞咨伯汝作秩宗宗官又主鬼神故國語曰使名姓之後能知四時之生犧牲之物玉帛之類采服之宜彝器之量次主之度屏攝之位壇場之所上下之神祗氏姓之所出而率舊典者為之宗春秋禘于太廟躋僖公而𫝊曰夏父弗忌為宗人又曰使宗人釁夏獻其禮禮特牲曰宗人升自西階視壺濯及豆籩然則唐虞歴三代以宗官典國之禮與其祭祀漢之大常是也徐氏曰樂主和同禮主簡别曰和者禮之用和為貴也一失其禮則瀆神悖人上下皆失其分安得而和成周合禮樂于一官和盖􅊶禮樂于其間矣禮官之屬大宗伯卿一人小宗伯中大夫二人肆師下大夫四人上士八人中士十有六人旅下士三十有二人府六人史十有二人胥十有二人徒百有二十人註曰肆猶陳也肆師佐宗伯陳列祭祀之位及牲器粢盛鬱人下士二人府二人史一人徒八人註曰鬱鬱金香草宜以和鬯疏曰鬱人為首者祭祀宗廟先灌灌用鬱王龜齡曰有秬鬯有鬱鬯鬱鬯用之于宗廟秬鬯用之於天地社稷等祀表記曰親耕粢盛秬鬯以事上帝是祭天不用祼然亦用秬鬯鬯人社祭等事亦用秬鬯但鬱鬯求諸陰用之於宗廟鬯人下士二人府一人史一人徒八人註曰鬯釀秬為酒芬香條暢於上下也秬如黒黍一稃二米稃音孚雞人下士一人史一人徒四人司尊彝下士二人府四人史二人胥二人徒二十人註曰彝亦尊也鬱鬯曰彝彝灋也言為尊之灋也司几筵下士二人府二人史一人徒八人註曰筵亦席也鋪陳曰筵藉之曰席然其言之筵席通矣疏曰在此者凡祭祀先設席天府上士一人中士二人府四人史二人胥二人徒二十人註曰府物所藏言天者尊此所藏若天物然王龜齡曰天府所藏國之寶器也然豈止於玉哉官府鄉州都鄙之治中民數榖數賢能之書皆國之寶是知先王以政事為寶以人民為寶以民食為寶以賢能為寶非特寶珠玉而已典瑞中士二人府二人史二人胥一人徒十人註曰瑞節信也典瑞若今符璽郎疏曰在此者玉瑞祭時所執玉器所以禮神雖有餘事以事神為主在此宜也典命中士二人府二人史二人胥一人徒十人註曰命謂王遷秩羣臣之書疏曰凡官之所屬義有多種以宗伯主禮及祭祀之事故凡是祭祀及禮事皆屬焉此典命遷秩羣臣亦是禮事又爵命屬陽故禮記云古者於禘也𤼵爵賜服賞以春夏不於夏官者貴始故於春見之在此司服中士二人府二人史一人胥一人徒十人疏曰公羊傳云命者何加我服也再命巳上得命即得服故司服列職於典命之下也典祀中士二人下士四人府二人史二人胥四人徒四十人守祧奄八人女祧每廟二人奚四人註曰逺廟曰祧周為文王武王廟遷主藏焉奄如今之宦者女祧女奴有才知者天子七廟三昭三穆奚女奴也疏曰奄八人者以其與女祧及奚婦人同處故須奄人通姜嫄為八廟廟一人故八人也坡謂廟祧之辨鄭氏王氏各師其說詳在禮記王制天子七廟孔疏下今不具列也祧他堯反知音智世婦每宫卿二人下大夫四人中士八人女府二人女史二人奚十有六人註曰世婦后宫官也王后六宫漢始大長秋詹事中少府大僕亦用士八人女府女史女奴有才智者坡謂婦者婦人之稱非所以名男子之官又如小宰内宰雖掌宫政皆無女府女史之等則是官非丈夫也攷之於經與女子共事者惟奄耳是以賈馬皆云奄卿然天官内小臣上士是奄為之者則曰奄上士卿大夫重官也必不使奄設或用之更宜著奄名此決非奄也或以女人為之則天官女祝女史皆著女名何此不言乎且女子而與男官同卿大夫之號尤非所宜則非女士也似當闕疑内宗凡内女之有爵者註曰内女王同姓之女謂之内宗有爵其嫁於大夫及士者凡無常數之言外宗凡外女之有爵者註曰外女王諸姑姊妹之女謂之外宗冢人下大夫二人中士四人府二人史四人胥十有二人徒百有二十人註曰冢封土為邱壠象冢而為之墓大夫下大夫二人中士八人府二人史四人胥二十人徒二百人註曰墓冢塋之地孝子所思慕之處職喪上士二人中士四人下士八人府二人史四人胥四人徒四十人註曰職主也大司樂中大夫二人樂師下大夫四人上士八人下士十有六人府四人史八人胥八人徒八十人註曰大司樂樂官之長疏曰在此者宗伯主禮禮樂相將是故列職於此大胥中士四人小胥下士八人府二人史四人徒四十人註曰胥有才知之稱禮記文王世子曰小樂正學干大胥佐之大師下大夫二人小師上士四人瞽矇上瞽四十人中瞽百人下瞽百有六十人眂瞭三百人府四人史八人胥十有二人徒百有二十人註曰凡樂之歌必使瞽矇為焉命其賢知者以為大師小師晉杜蒯云曠也大師也眂讀為虎眂之眂瞭目明者鄭司農云無目眹謂之瞽有目眹而無見謂之矇有目無眸子謂之瞍典同中士二人府一人史一人胥二人徒二十人註曰同陰律也不以陽律名官者因其先言耳大師職曰執同律以聽軍聲薛平仲曰自太師至眂瞭既以掌奏歌之節則夫因其聲之所合達其聲之所寓度數齊量要必有托而可考此典同已下之官所以繼此也磬師中士四人下士八人府四人史二人胥四人徒四十人鐘師中士四人下士八人府二人史二人胥六人徒六十人笙師中士二人下士四人府二人史二人胥一人徒十人鏄師中士二人下士四人府二人史二人胥二人徒二十人註曰鏄如鐘而大坡謂此下脱司徒鼓人舞師二職韎師下士二人府一人史一人舞者十有六人徒四十人註曰鄭司農說以明堂位曰韎東夷之樂𤣥謂讀如韎韐之韎薛平仲曰自司樂之掌樂事大師之敎樂事典同之為樂器雅樂備矣納蠻夷之樂於祭祀燕享之用豈非悦逺人之極功乎鄭剛中曰作四夷之樂當從其國不變其俗故韎師所服者赤韋示不變其所服旄人所執者牛尾示不變其所執也鞮鞻氏所履者革屨示不變其所履旄人下士四人舞者衆寡無數府二人史二人胥二人徒二十人註曰旄旄牛尾舞者所持以指麾籥師中士四人府二人史二人胥二人徒二十人註曰籥舞者所吹春秋宣八年壬午猶繹萬入去籥𫝊曰去其有聲者廢其無聲者詩云左手執籥右手秉翟籥章中士二人下士四人府一人史一人胥二人徒二十人註曰籥章吹籥以為詩章鞮鞻氏下士四人府一人史一人胥二人徒二十人註曰鞻讀如屨也鞮屨四夷舞者所屝也今時倡蹋鼓沓行者自有屝典庸器下士四人府四人史二人胥八人徒八十人註曰庸功也鄭司農云庸器有功者鑄器銘其功春秋傳曰以所得於齊之兵作林鐘而銘魯功焉司干下士二人府二人史二人徒二十人註曰干舞者所持謂楯也春秋傳曰萬者何干舞也坡伯兄曰右自大司樂以下為官二十自大司樂至小胥皆以敎國子為職而掌樂之政令焉自大師至眂瞭則専乎聲歌樂器之事故次之典同本律吕審聲音以造樂器故又次之磬師鐘師笙師鏄師其所掌之樂器盖大師以下所未備故又次之有聲歌必有舞籥師敎舞故又次之籥章韎師旄人鞮鞻氏或前世之音或列國四夷之樂王者盖常肄而時用焉故又次之典庸器聲器也司干舞器也皆藏器以待事而已故又次之然則三代樂官於是為著雖節目不能具備其大要可知也夫其用至於無所不周其效至於無所不格然乃國之所以敎師弟子之所以講古人之於樂何如哉後世樂云樂云其亦未攷諸此矣眂音視鎛音博韎音妺鞮丁兮反鞻九具反知音智眹直忍反韐音閤屝房味反蹋徒臘反楯食允反大卜下大夫二人卜師上士四人卜人中士八人下士十有六人府二人史二人胥四人徒四十人註曰問龜曰卜大卜卜筮官之長薛平仲曰禮運曰宗祝在廟三公在朝三老在學王前巫而後史卜簭瞽侑皆在左右極至於禮行於五祀而正灋則焉然則王之所以賴於左右前後者其關於禮樂甚大也卜祝巫史不列於此當何屬哉龜人中士二人府二人史二人工四人胥四人徒四十人註曰工取龜攻龜菙氏下士二人史一人徒八人註曰燋焌用荆菙之類占人下士八人府一人史二人徒八人註曰占蓍龜之卦兆吉凶簭人中士二人府一人史二人徒四人註曰問蓍曰簭其占易占夢中士二人史二人徒四人眂祲中士二人史二人徒四人註曰祲陰陽氣相侵漸成祥者魯史梓慎云吾見赤黒之祲菙時髓反簭筮同祲子鴆反燋哉灼反焌音俊大祝下大夫二人上士四人小祝中士八人下士十有六人府二人史四人胥四人徒四十人註曰大祝祝官之長薜平仲曰卜也者先王所以求諸幽以決吾心之疑祝者先王所以告諸幽以薦吾心之信此敘官之相為先後歟喪祝上士二人中士四人下士八人府二人史二人胥四人徒四十人甸祝下士二人府一人史一人徒四人註曰甸之言田也田狩之祝詛祝下士二人府一人史一人徒四人註曰詛謂祝之使沮敗也詛側慮反司巫中士二人府一人史一人胥一人徒十人註曰司巫巫官之長鄭剛中曰巫與祝異祝則以辭告神巫則神所降古者民之精爽不攜貳者神明降之在男曰覡在女曰巫是故國家用之使制神之處位次主分而言之有覡巫之異合而言之皆謂之巫巫既多故立司巫以綂之男巫無數女巫無數其師中士四人府二人史四人胥四人徒四十人註曰巫能制神之處位次主者覡音檄大史下大夫二人上士四人小史中士八人下士十有六人府四人史八人胥四人徒四十人註曰大史史官之長林氏椅曰巫史卜祝宜以鬼神為類彼六典八灋八則八枋皆治職事類也顧列于此者謂宗廟之典祏歟王龜齡曰玉藻有左史書動右史書言以左傳攷之左史即大史右史即内史襄二十五年載大史書崔杼之事非書動乎僖二十八年載王命内史䇿命晉侯之事非書言乎馮相氏中士二人下士四人府二人史四人徒八人註曰馮乘也相視也世登髙臺以視天文之次序天文屬大史月令曰乃命大史守典奉灋司天日月星辰之行宿離不貸保章氏中士二人下士四人府二人史四人徒八人註曰保守也世守天文之變馮音慿相息亮反祏音石内史中大夫一人下大夫二人上士四人中士八人下士十有六人府四人史八人胥四人徒四十人孫偉夫曰史官𨽻之宗伯以宗廟典籍具存非博古通今之士不能勝其任也外史上士四人中士八人下士十有六人胥二人徒二十人御史中士八人下士十有六人其史百有二十人府四人胥四人徒四十人註曰御猶侍也進也其史百有二十人以掌贊書人多故也巾車下大夫二人上士四人中士八人下士十有六人府四人史八人工百人胥五人徒五十人註曰巾猶衣也巾車車官之長薛平仲曰巾車一屬列於史官之後盖器之藏禮莫大於車周人所上者莫先於車典路中士二人下士四人府二人史二人胥二人徒二十人註曰路王之所乘車車僕中士二人下士四人府二人史二人胥二人徒二十人司常中士二人下士四人府二人史二人胥四人徒四十人註曰司常主王旌旗都宗人上士二人中士四人府二人史四人胥四人徒四十人註曰都謂王子弟所封及公卿所食邑家宗人如都宗人之數註曰家謂大夫所食采邑凡以神士者無數以其藝為之貴賤之等註曰以神士者男巫之俊有學問才知者藝謂禮樂射御書數高者為上士次之為中士又次之為下士疏曰在都家之下者欲見都家神亦處置之周禮述註卷十一
