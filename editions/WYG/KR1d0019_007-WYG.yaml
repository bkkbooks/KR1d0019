body:
  text: 周禮述註卷七安溪李光坡撰大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國註曰土地之圖若今司空郡國輿地圖坡謂司徒掌邦敎然必先知土地之圖與人民之數乃可區處之敎育之以佐王安擾邦國也孫偉夫曰圖之名一也而職掌不同圖亦異用司徒之圖在安擾邦國必度疆域之廣狹計五土之多寡凡土地所生風氣所宜加詳焉司馬之圖為禁㬥平亂設必記形勢阨塞可以講攻守之宜道途通阻可以達進退之便凡居重而馭輕避難而就易則加詳焉大而職方有天下之圖小而司險有九州之圖與司徒所掌敻不侔矣在司徒者可得而見在司馬者人不可得而窺也度徒洛反阨同阸於革反以天下土地之圖周知九州之地域廣輪之數辨其山林川澤丘陵墳衍原隰之名物註曰周猶徧也九州揚荆豫青兗雍幽冀并也輪從也積石曰山竹木曰林注瀆曰川水鍾曰澤土高曰邱大阜曰陵水崖曰墳下平曰衍高平曰原下溼曰隰名物者十等之名與所生之物疏曰馬融云東西為廣南北為輪案王制南北兩近一遙東西兩遙一近是南北長東西短謂知此數也坡謂以圖而周知之者將以制畿封國也以圖而辨之者將以知五地物生也溼濕同而辨其邦國都鄙之數制其畿疆而溝封之設其社稷之壝而樹之田主各以其野之所宜木遂以名其社與其野註曰千里曰畿疆猶界也溝穿地為阻固也封起土界也社稷后土及田正之神壝壇與堳埓也田主田神后土田正之所依也詩人謂之田祖所宜木謂若松栢栗也若以松為社者則名松社之野以别方面疏曰辨其邦國者謂分别畿外諸侯邦國多少之數若王制云畿外八州州二百一十國也辨其都鄙之數者謂分别畿内三等采地之數若王制畿内九十三國也制其畿疆者王畿内千里中置王城面有五百里其邦國都鄙亦皆有疆界也而溝封之者謂於疆界之上設溝溝為封樹以為阻固也設其社稷之壝者謂于中門之外右邊設大社大稷又于廟門之屏設勝國之社稷其社稷外皆有壝埓于四面也田主者謂藉田之内為田主各以其野之所宜木者王之田主唯一而已云各者總據邦國都鄙并王者而言也坡謂承上文既周知其地域遂疆理其國畿也設其社稷之壝而樹之為句社稷言樹田主言宜木互文别彼列反以土㑹之灋辨五地之物生㑹計也一曰山林其動物宜毛物其植物宜皁物其民毛而方毛物貂狐貒貉之屬縟毛者也方勁正貌鄭司農云皁物柞栗之屬今世間謂柞實為皁斗二曰川澤其動物宜鱗物其植物宜膏物其民黑而津註曰鱗物魚龍之屬膏當為櫜字之誤也蓮芡之實有櫜韜津潤也三曰丘陵其動物宜羽物其植物宜覈物其民専而長羽物翟雉之屬覈物李梅之屬専不方也四曰墳衍其動物宜介物其植物宜莢物其民皙而瘠介物龜鼈之屬水居陸生者莢物薺莢王棘之屬皙白也瘠堅瘦貌五曰原隰其動物宜臝物其植物宜叢物其民豐肉而庳註曰臝虎豹貔􅣝之屬淺毛者叢物萑葦之屬豐猶厚也庳猶短也疏曰此五地人物之等皆方以類聚物以羣分及民之所生皆因地氣所感不同故使形類有異也又民之資生取于動植之物故先言物後言民坡謂此節承上文辨五地之名物而言也夫人物之生于五地者各應五行之氣氣不能無偏則性不能無偏也先王盡人之性故有十二敎以修齊之焉盡物之性故有土宜之灋以蕃育之焉詳見下文㑹古外反皁音皂覈音核専徒丸反莢古協反臝力果反庳音婢貒土官反柞子洛反櫜古毛反貔音毗􅣝勅宜反萑音丸因此五物者民之常而施十有二敎焉上言五地此言五物者以形言曰地以地所生言曰物此承上文言民之生于五地者形質不同則氣有贏乏而性亦由之有勝負是其常也因其常而施敎焉盖所以一道徳同風俗也一曰以祀禮敎敬則民不苟以祀禮敎敬者人于鬼神不見其形多有苟且怠慢之心故制祀禮敎以致慤致存則民不敢苟也疏曰死者尚敬則生事其親不苟且也二曰以陽禮敎讓則民不争註曰陽禮謂鄉射飲酒之禮也三曰以陰禮敎親則民不怨註曰陰禮謂男女之禮昏姻以時則男不曠女不怨四曰以樂禮敎和則民不乖以樂禮敎和則民不乖者樂有聲舞使人習之循其節奏剛者不得急柔者不得緩自能化其偏以復于正無所乖戾也五曰以儀辨等則民不越註曰儀謂君南面臣北面父坐子伏之屬六曰以俗敎安則民不愉俗謂土地所生習也愉薄也以俗敎安則民不愉者因其舊俗而品節之使民安于所宜服上之化益歸于厚也七曰以刑敎中則民不虣以刑敎中者刑以弼敎使民協于中也八曰以誓敎恤則民不怠誓約信也恤謂災危相憂上有約信使之相保相受之類故民不怠于為義也九曰以度敎節則民知足度謂宫室車服之制使知節制則民無侈心十曰以世事敎能則民不失職註曰世事謂士農工商之事少而習焉其心安焉因敎以能不易其業十有一曰以賢制爵則民慎徳註曰慎徳謂矜其善徳勸為善也十有二曰以庸制禄則民興功註曰庸功也爵以顯賢禄以賞功坡謂此十二敎之序綂而言之則自一至四禮樂之事也自五至十政刑之事也析而分之則敬讓禮也親和樂也而以儀辨等以刑敎中以度敎節皆與敬讓為類以俗敎安以誓敎恤以世事敎能皆與親和為類然則禮以節之樂以和之政以行之刑以防之禮樂刑政四達不悖則爵禄所勸民皆興起于善而無復氣質不齊之可言矣愉偷同以土宜之灋辨十有二土之名物以相民宅而知其利害以阜人民以蕃鳥獸以毓草木以任土事註曰十二土分野十二邦上繫十二次各有所宜也相占視也阜猶盛也蕃蕃息也育生也任謂就地所生因民所能疏曰知其利害十二土之中利處居之害處逺之以阜以蕃以毓者皆由知利害使之然也辨十有二壤之物而知其種以敎稼穡樹蓺註曰壤亦土也變言耳以萬物自生焉則言土土猶吐也以人所耕而樹蓺焉則言壤壤和緩之貌詩云樹之榛栗又曰我蓺黍稷蓺猶蒔也坡謂此二節承上文言動植之物因五地而有異生故以所宜辨别而區置之使動植咸若而民安物阜也相息亮反種章勇反逺上聲蒔時至反以土均之灋辨五物九等制天下之地征以作民職以令地貢以斂財賦以均齊天下之政承上文言民安物息五穀其蓺可以定貢賦制國用矣均平也五物五地之物也九等騂剛赤緹之屬征税也言天下之地征則并畿外邦國所税入天子皆在其中矣辨五物之所宜九等之肥磽乃可以制地征之高下也民職九職也地貢九貢也財謂泉穀賦謂九賦及軍賦均齊天下之政者土均所云邦國都鄙之政令刑禁與其施舍禮俗喪紀祭祀皆以地之媺惡為輕重而均齊之也自篇首以天下土地之圖至此皆辨方之事而凡制畿封國復性遂生施職制貢皆因土事連類言之緹音低以土圭之灋測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多陰土圭所以致四時日月之景也土深者夏日入地中淺冬日入地中深春秋則適均以土圭之灋進退四時日景知其淺深也正日景者晝漏半而置土圭表陰陽審其南北也土圭之灋下可以測土深上可以正日景故用以求地中也餘解見下文日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也陰陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之註曰樹樹木溝上所以表助阻固也鄭司農云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然坡聞之兄曰鄭註恐理之不可通也夫夏至日道入赤道北二十四度北距嵩高弧背九度餘夏至日道下直衡岳晷無景從嵩高至衡岳夏至日道圜天之弧背以弧矢術求弦得衡岳距地中弦徑約九度餘從陽城至衡岳地平鳥道相去約二千五百里夫止二千五百里而一則尺五寸一無景是百六十餘里景已差一寸矣則鄭註所云千里而差一寸恐未然也又鄭註謂景短者中表之南千里景短一寸景長者中表之北千里景長一寸如此則日下無景當在極南萬五千里之外而衡岳之逺陽城不能萬五千里昭昭矣又言景夕者東表日昳中表景乃中景朝者西表日未中而中表景已中如此則極東之地日出方及三五尋丈日景已中極西之地日入未及三五尋丈日景方中若果地體方平四際彌天則信如所云矣不然如雞子裹黄之喻地在天中不過成形之大耳彈丸浮寄四際距天至逺四際距天之逺若一也則去日安能有逺近之殊乎雖日之出也極東先見及其入也極西先昏然隨其處各有曉午昏暮安知日東者不以吾為景朝乎日西者不以吾為景夕乎且此尺有五寸東西直此一帶中日景皆如是也何以定其為東西之中乎吾謂日南則景短多暑謂從此中表而南之地則當景短之時盛暑不堪若今廣州夏時炎赫倍于他州盖景短即夏至非短于尺有五寸之謂也日北則景長多寒者謂從此中表而北之地則當景長之時隆寒不堪若今塞外冬時凛慄亦倍盖景長即冬至非長于尺有五寸之謂也日東則景夕多風者謂從中表而東之地則景夕之時多風盖東地多水多水則多風若吾州午後即海風揚也風起于夕故以景夕言之日西則景朝多陰者謂從此中表而西之地則景朝之時多陰盖西地多山多山則雲氣盛若柳子厚所謂庸蜀之南恒雨少日是也陰霾于朝故以景朝言之如此則寒暑陰風偏而不和是未得其所求天地之所合者地中與天中氣合也合則四時交而無多暑多寒之患合則風雨會而無多風合則陰陽和而無多陰何以定之以驗寒暑陰風于五土而知惟此為不偏也然特就中國九州而奠其四方之中耳若論大地之中當在南戴赤道下之國則未知其何如也然則沖和所會無水旱昆蟲之災無凶饑妖孽之疾兆民之衆含生之類莫不阜安是乃王者之都也日至之景尺有五寸謂之地中者非謂必日景尺有五寸乃為地中是言地中之處其景尺有五寸盖用以為標識也此二節皆正位之事景音影昳音絰塞音賽霾音埋識音志凡建邦國以土圭土其地而制其域諸公之地封疆方五百里其食者半諸侯之地封疆方四百里其食者參之一諸伯之地封疆方三百里其食者參之一諸子之地封疆方二百里其食者四之一諸男之地封疆方百里其食者四之一註曰土其地猶言度其地鄭司農云土其地但為正四方耳𤣥謂其食者半參之一四之一者土均均邦國地貢輕重之等其率之也公之地以一易侯伯之地以再易子男之地以三易必足其國禮俗喪紀祭祀之用乃貢其餘大國貢重正之也小國貢輕字之也凡諸侯為牧正帥長及有徳者乃有附庸為其有禄者當取焉公無附庸侯附庸九同伯附庸七同子附庸五同男附庸三同進則取焉退則歸焉魯于周灋不得有附庸故言錫之也地方七百里者包附庸以大言之也附庸二十四言得兼此四等矣陳君舉曰公貢重子男貢輕其見于𫝊大國若衛既取于有閻之土以供王職又取于相土之東都以會王之東蒐小國若鄫則無賦于司馬畧可見矣朱子曰先儒言封建古者公侯百里伯七十里子男五十里至周公則斥大疆界始大封侯國公五百里侯四百里伯三百里子二百里男百里如此則是將那小底移動添封為大國豈有此理禹塗山之會執玉帛者萬國後來到夏商衰時皆相吞并漸漸大了至周時只有千八百國便是萬國吞并為千八百國可見其又大了周畢竟是因而封之豈有移去許多小國卻封為大國然聖人立灋亦自有低昂不如此截然謂如封五百里這一段四面大山如大行卻有六百里不成又挑出那百里外加封四百里這一段卻有三百五十里不成又去别處討一段五十里來添都不如此殺坡謂此一節皆體國之事度徒洛反相息亮反殺音曬凡造都鄙制其地域而封溝之以其室數制之不易之地家百畮一易之地家二百畮再易之地家三百畮註曰都鄙王子弟公卿大夫采地其界曰都鄙所居也王制曰天子之縣内方百里之國九七十里之國二十有一五十里之國六十有三此盖夏時采地之數周未聞矣春秋傳曰遷鄭焉而鄙留城郭之宅曰室詩云嗟我婦子曰為改歲入此室處以其室數制之謂制邱甸之屬王制曰凡居民量地以制邑度地以居民地邑民居必參相得鄭司農云不易之地歲種之地美故家百畮一易之地休一歲乃復種地薄故家二百畮再易之地休二歲乃復種故家三百畮疏曰以其室數制之者依其城内室數于四野之中制地與之謝氏曰邦國主分地故度地制域都鄙主治民故地域大小除山川邑居等虛數以居民實數計之又知受田之數知家室之數也乃分地職奠地守制地貢而頒職事焉以為地灋而待政令註曰分地職分其九職所宜也定地守謂衡麓虞候之屬制地貢謂九職所税也頒職事者分命使各為其所職之事鄭剛中曰地職巳分地守巳定地貢已制則其灋立矣乃頒職掌于都鄙之長使之循此以為灋以待王朝之政令黄文叔曰政令凡師役㑹同賓客喪紀税斂皆是坡謂此二節皆經野之事畮古畝字度徒洛反長丁丈反以荒政十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰眚禮八曰殺哀九曰蕃樂十曰多昏十有一曰索鬼神十有二曰除盜賊上文有任土敎稼分職則有年穀不登之時恐民離散故以救荒之政十有二品以聚之散利貸種食也薄征輕租税也弛力息繇役也舍禁舍山澤所遮禁者以與民同利去幾謂闗市去税而幾之眚禮殺吉禮也殺哀省凶禮也杜子春讀蕃樂為藩樂謂閉藏樂器而不作多昏不備禮而昏娶者多也索鬼神求廢祀而修之雲漢之詩所謂靡神不舉靡愛斯牲者也除盜賊急其刑以除之饑饉則盜賊多不可不除也坡謂自一至六廣上之恩以豐民食也自七至十權五禮之通以省民財也十有一十有二則理其幽治其明消厲氣以致祥也舍音捨殺音曬蕃方袁反繇音遙以保息六養萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寛疾六曰安富註曰保息謂安之使蕃息也慈幼謂愛幼少也産子三人與之母二人與之餼十四以下不從征養老七十養于鄉五十異粻之屬振窮抍救天民之窮者也窮者有四曰矜曰寡曰孤曰獨恤貧貧無財業稟貸之寛疾若今癃不可事不算卒可事者半之也安富平其繇役不専取振音拯抍同少詩照反粻音章矜古頑反癃音隆以本俗六安萬民一曰媺宫室二曰族墳墓三曰聨兄弟四曰聯師儒五曰聨朋友六曰同衣服本猶舊也媺善也謂椓約攻堅風雨攸除各有攸宇族猶類也同宗者生相近死相迫聨猶合也兄弟同姓之親也師儒設為庠序使致仕之賢以道藝敎鄉閭子弟者同師曰朋同志曰友同猶齊也民雖有富者衣服不得獨異坡謂自一至五則韓子所云安居而粒食親親而尊尊生者養而死者藏之道備矣同衣服者古者長民衣服不二以齊其民則民徳一盖貧富不相耀則民無忮心浮夸者不相慕説則民無侈志此又安之之要也故保息六者因其自有之分處以當然之理是𤼵政施仁之所必先也本俗六者疏云不依舊俗創立制度民心不安若依舊俗民心乃安此乃盡敎養品節之詳而凡萬民各得其所不惟老幼孤獨有養而已夫先王之于民也值其變則荒政以救之處其常則保息本俗以安之真經久宜民之要道而周官精意之所存也椓陟角反長丁丈反正月之吉始和布敎于邦國都鄙坡謂此節亦與下文為總目詳見冢宰乃縣敎象之灋于象魏使萬民觀敎象挾日而斂之坡謂此布敎于萬民之事也乃施敎灋于邦國都鄙使之各以敎其所治民坡謂此布敎于邦國都鄙之事也令五家為比使之相保五比為閭使之相受四閭為族使之相葬五族為黨使之相救五黨為州使之相賙五州為鄉使之相賓註曰此所以勸民者也使之者皆謂立其長而敎令使之保猶任也救救凶災也賓賓客其賢者故書受為授杜子春云當為受𤣥謂受者宅舍有故相寄託也賙者謂禮物不備相給足也閭二十五家族百家黨五百家州二千五百家鄉萬二千五百家疏曰此經説大司徒設比閭至于州鄉等第家數各立其官長敎勸于民坡謂此乃布敎于六鄉之長使敎其所治民而經文兼詳六鄉之制者盖上體國經野正言封國立家之事無文可間此因施敎乃本其始終言之與冢宰之施典于邦國方及建其牧立其監云云同一意也文承邦國後者邦國亦有鄉也嘗謂自職首至此陳保民之政凡三土宜之灋則用天因地以左右民也荒政保息本俗則制畿封國之後而為固本寜邦之計以君養民也此節所言施親睦之敎使民相養也三者相須王道始備縣音懸比毗志反賙音周頒職事十有二于邦國都鄙使以登萬民一曰稼穡二曰樹蓺三曰作材四曰阜蕃五曰飭材六曰通財七曰化材八曰斂材九曰生材十曰學藝十有一曰世事十有二曰服事註曰鄭司農云稼穡謂三農生九穀也樹蓺謂園圃毓草木作材謂虞衡作山澤之材阜蕃謂藪牧養蕃鳥獸飭材謂百工飭化八材通財謂商賈阜通貨賄化材謂嬪婦化治絲枲斂材謂臣妾聚斂疏材生材謂閒民無常職轉移執事學藝謂學道藝世事謂以世事敎能則民不失職服事謂公家服事者疏曰大司徒主天下人民之數故頒下民之職事十有二條于天下邦國及畿内都鄙使以登成萬民此經不言鄉遂及公邑者舉外以包内司徒親主鄉遂公邑頒之可知自一至九即大宰九職大宰既掌之此又重掌者以大宰尊官總知其事此司徒是主民之官親自頒行義各有異也坡謂此綂鄉遂邦國都鄙而盡其敎灋之詳也自一至九農工商賈之職十則士之職十有一則四民各世其職總言之也十有二則四民之外復有一職别言之也此經言民職者亦三曰以作民職曰乃分地職皆承土田之事而及則専指九職之民此言頒職事則凡萬民之有職者皆悉數之義各異也賈音古閒音閑别彼列反以鄉三物敎萬民而賓興之註曰物猶事也興猶舉也民三事敎成鄉大夫舉其賢者能者以飲酒之禮賓客之既則獻其書于王矣一曰六徳知仁聖義忠和明而不惑曰知公而無私曰仁無所不通曰聖裁制得宜曰義誠實曰忠𤼵而中節曰和六者皆成徳之事然以其序而言則先明于心然後能力行故知先而仁後聖者知極其精也義者仁之制也忠則四徳之在内者皆實而無偽和則四徳之外見者時出而不乖此大學之極功知之盡行之至而表裏無間民之最上者也二曰六行孝友睦婣任恤註曰善於父母為孝善於兄弟為友睦親于九族婣親于外親任信于友道恤振憂貧者坡謂此本立而學或未至者故為其次三曰六藝禮樂射御書數註曰禮五禮之義樂六樂之歌舞射五射之灋御五御之節書六書之品數九數之計坡謂此其徳行或有所未純然才足以備任使而應務不窮者故又次之此經陳敎民之道凡二十有二敎則列禮樂刑政之詳使賢愚貴賤皆範其中而不敢蕩佚所以一道徳同風俗也此乃列設科取人之目専為學士而言盖以三物敎敎成而賓之或以徳進或以行舉或以藝揚三代鄉舉之灋皆然也上文推養民也巳詳故此下遂言敎事以鄉八刑糾萬民一曰不孝之刑二曰不睦之刑三曰不婣之刑四曰不弟之刑五曰不任之刑六曰不恤之刑七曰造言之刑八曰亂民之刑註曰糾猶割察也不弟不敬師長造言訛言惑衆亂民亂名改作執左道以亂政也疏曰此不弟即上六行友是也上言友専施于兄弟此變言弟兼施于師長故退在睦婣之下呉氏曰造言亂民害吾六行之敎者以二者之刑而列于八刑之後則六行之敎修矣鄭剛中曰敎民三物糾民則止于六行者盖人之性有厚薄昏明之異則徳不可以皆同人之材有能有不能之别則藝不可以皆能夫六行者日可見之行人人所當勉者也苟不修其行則害于其身禍于其家亂人倫而傷聖治是之謂戮民也加之以刑不亦宜乎知音智行下孟反弟音悌振音拯以五禮防萬民之偽而敎之中註曰禮所以節止民之侈偽使其行得中鄭司農云五禮謂吉凶賓軍嘉以六樂防萬民之情而敎之和註曰樂所以蕩正民之情思使其心應和也鄭司農云六樂謂雲門咸池大韶大夏大􅇴大武鄭剛中曰惟五禮由中而制所以著誠而去偽故可以防其偽惟六樂由和而作所以滌邪心而全正性故可以防其情情偽已去則反其自然之中和何難之有凡萬民之不服敎而有獄訟者與有地治者聴而斷之其附于刑者歸于士服敎服禮樂之敎也争罪曰獄争財曰訟有地治者謂鄉州及治都鄙者也附麗也士司寇士師之屬上以禮樂化民民不服敎而有獄訟者將斷之時恐其不審故與其地部界所屬吏共聴斷之若有小罪則司徒決之其附于五刑則歸于士坡謂自以五禮至此推本禮樂以為立敎之要也盖民之資稟不齊其處巳為人者不能皆實而無偽故以五禮防之而敎之中焉其感物而動者不能節情而不乖故以六樂防之而敎之和焉禮樂之敎既修少而習之以為藝則氣質可化習而察之于行則有序而和久而熟之于徳則强立而和順此三代明王化民成俗所以莫善莫急于此也是故敎以型之刑以防之則人之于徳行道藝其成材也不亦易乎思悉吏反詔上朝反􅇴音䕶祀五帝奉牛牲羞其肆註曰牛能任載地類也奉猶進也鄭司農云羞進也𤣥謂進所肆解骨體士喪禮曰肆解去蹄享先王亦如之疏曰享先王者謂四時并祫禘也亦如之者亦如祀五帝但禘郊之事先全烝後豚解奉牛牲謂全烝獻腥也羞其肆謂體解而進之若宗廟四時之事則無全烝先豚解次體解奉其腥獻者豚解也羞其肆者熟獻也坡謂冢宰文祀五帝之後有祀大神􅅘乃及享先王今闕神􅅘者案宗伯禮天地及五帝牲從玉色此既言奉五帝牛牲而不及天地灼然闕文肆音剔註同􅅘音祗大賓客令野修道委積註曰令令遺人使為之也少曰委多曰積皆所以給賓客疏曰大賓客者謂諸侯來朝大喪帥六鄉之衆庶屬其六引而治其政令註曰衆庶所致役也鄭司農云六引謂引喪車索也六鄉主六引六遂主六紼疏曰在棺曰紼見繩體行道曰引見用力紼音弗大軍旅大田役以旗致萬民而治其徒庶之政令註曰旗畫熊虎者也徴衆刻日樹旗期于其下疏曰凡軍旅田獵所用民徒先起六鄉之衆若國有大故則致萬民於王門令無節者不行于天下註曰大故謂王崩及寇兵也節六節有節乃得行防姦私大荒大札則令邦國移民通財舍禁弛力薄征緩刑大札大疫病也移民辟災就賤其有守不可移者則賤處通穀米與之上文荒政乃自行于國中此言大荒大札則令天下邦國相通也辟音避歲終則令敎官正治而致事註曰歲終自周季冬也敎官其屬六十正治明處其文書致事上其計簿正歲令于敎官曰各共爾職修乃事以聴王命其有不正則國有常刑註曰正歲夏正月朔日小司徒之職掌建邦之敎灋以稽國中及四郊都鄙之夫家九比之數以辨其貴賤老幼廢疾凡征役之施舍與其祭祀飲食喪紀之禁令國中四郊皆六鄉之民所居併言都鄙者兼主采地也夫家猶言男女也九比者邦中也四郊也甸也稍也縣也都也闗市也山也澤也九比之數者九處校比人民之數也貴謂卿大夫賤謂服公事者事人則賤也廢疾謂癃病也征役力役之征也施當為弛祭祀者謂鄉中州祭社黨祭禜族祭酺飲食者謂若鄉飲酒及族食喪紀者謂若四閭為族使之相葬之等禁令者祭祀已下皆有禁令不使失禮法比毗志反禜音詠酺音步乃頒比灋于六鄉之大夫使各登其鄉之衆寡六畜車輦辨其物以歲時入其數以施政敎行徴令登成也成猶定也衆寡民之多少車謂革車及大車輦人挽行物家中之財施政敎者祭祀三者是也行徴令者征役與其施舍是也黄文叔曰政敎必觀其豐約而為之隆殺徴令必稽其有無而為之寛急故入其數而後施行之坡謂頒六鄉則六遂至邦國皆頒之矣故下惟言受邦國比要皆互文見義及三年則大比大比則受邦國之比要註曰大比謂使天下更簡閲民數及其財物也受邦國之比要則亦受鄉遂矣鄭司農云五家為比故以比為名今時八月案比是也要謂其簿坡謂上文言小司徒掌稽其數此二節詳其所以得數而稽之之要是也殺音曬乃會萬民之卒伍而用之五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍以起軍旅以作田役以比追胥以令貢賦註曰用謂使民事之伍兩卒旅師軍皆衆之名兩二十五人卒百人旅五百人師二千五百人軍萬二千五百人此皆先王所因農事而定軍令者也欲其恩足相恤義足相救服容相别音聲相識作為也役功力之事追逐寇也胥伺捕盜賊也鄉之田制與遂同疏曰小司徒佐大司徒以掌六鄉六軍之事出自六鄉故預配卒伍也而用之者即軍旅田役是也坡謂賦載師任地之賦也貢閭師任民之貢也後言貢賦者倣此朱子曰比閭族黨州鄉與鄰里酇鄙縣遂制田里之法也伍兩卒旅師軍此鄉遂出兵之法也都鄙之法則一甸出長轂一乘甲士三人步卒七十二人此二法所以不同而貢助之法亦異大率鄉遂以十為數是長連排去井田以九為數是一箇方底物事自是不同而永嘉必欲合之如何合得又曰六軍只是六鄉之衆六遂不與六遂亦有軍但不可見其數侯國三軍亦只是三郊之衆三遂不與大國三郊次國二郊小國一郊蔡季通説車一乘不止甲士三人步卒七十二人此是輕車用馬馳者更有二十五人將重車在後用牛載糗糧戈甲衣裝見七書如魯頌公徒三萬亦具其説矣李景齊曰司馬法曰兵車一乘甲士三人步卒七十二人是則一乘者七十五人也約而言之兵車一乘則三兩之數四乘則三卒之數百乘則三師之所合五百乘則三軍之所合積而至于千乘則六軍聚焉是則六軍之數適足以容千乘乃天子宿衛之兵其餘六遂都鄙之兵悉天子之畿内則為萬乘矣諸侯大國則有千乘而三鄉三軍則僅止于五百乘爾乃均土地以稽其人民而周知其數上地家七人可任也者家三人中地家六人可任也者二家五人下地家五人可任也者家二人註曰均平也周猶徧也一家男女七人以上則授之以上地所養者衆也男女五人以下則授之以下地所養者寡也正以七人六人五人為率者有夫有婦然後為家自二人以至于十為九等七六五者為其中可任謂丁强任力役之事者出老者一人其餘男女强弱相半其大數疏曰均上地下地等使得均平故曰均土地既給土地則據土地計考其人民可任不可任之事而周徧知其大數坡謂此總計户口乃明伍兩卒旅師軍之所由出也凡起徒役毋過家一人以其餘為羨唯田與追胥竭作註曰鄭司農云羨饒也田謂獵也追追寇賊也竭作盡行疏曰此謂六鄉之内上劑致民一人為正卒其餘皆為羨卒若六遂之内以下劑致民一人為正卒一人為羨卒其餘皆為餘夫饒逺故也坡謂此總結上文兩節言五家為比及有徒役則五人為伍以至五比為閭五伍為兩之等家用一人不得過也而有三人五人二人之可任者除一人為正卒其餘皆籍為羨以備大故焉自乃會萬民之卒伍至此皆六鄉之比法也夫小司徒欲稽其數必考于六鄉六鄉欲入其數必循乎比法然後六鄉可登之以入于司徒司徒可稽之以施其敎法矣别彼列反與音預凡用衆庶則掌其政敎與其戒禁聴其辭訟施其賞罰誅其犯命者註曰命所以誓告之疏曰言凡用衆庶則上經所云是也坡謂上文言會萬民而用以軍旅田役追胥之事是平日立法如此此言當用衆庶之時小司徒則掌其政敎之等也凡國之大事致民大故致餘子註曰大事謂戎事也大故謂災寇也鄭司農云國有大事當徴召會聚百姓則小司徒召聚之餘子謂羨也坡謂上文言會民卒伍以備大事籍民羨卒以防大故亦平日立法此則當大事大故之時小司徒則召而致之也乃經土地而井牧其田野九夫為井四井為邑四邑為丘四丘為甸四甸為縣四縣為都以任地事而令貢賦凡税斂之事註曰此謂造都鄙也采地制井田異于鄉遂重立國小司徒為經之立其五溝五塗之界其制似井之字因取名鄭司農云井牧者春秋傳所謂井衍沃牧隰臯者也𤣥謂隰臯之地九夫為牧二牧而當一井今造都鄙授民田有不易有一易有再易通率二而當一是之謂井牧昔夏少康在虞思有田一成有衆一旅一旅之衆而田一成則井牧之法先古然矣九夫為井者方一里九夫所治之田也此制小司徒經之匠人為之溝洫相包乃成耳邑邱之屬相連比以出田税溝洫為除水害四井為邑方二里四邑為邱方四里四邱為甸甸之言乘也讀如衷甸之甸甸方八里旁加一里則方十里為一成積百井九百夫其中六十四井五百七十六夫出田税三十六井三百二十四夫治洫四甸為縣方二十里四縣為都方四十里四都方八十里旁加十里乃得方百里為同也積萬井九萬夫其四千九十六井三萬六千八百六十四夫出田税二千三百四井二萬七百三十六夫治洫三千六百井三萬二千四百夫治澮井田之法備于一同今止于都者采地食者皆四之一其制三等百里之國凡四都一都之田税入于王五十里之國凡四縣一縣之田税入于王二十五里之國凡四甸一甸之田税入于王地事謂農牧衡虞也貢謂九穀山澤之材也賦謂出車徒給繇役也司馬法曰六尺為步步百為畮畮百為夫夫三為屋屋三為井井十為通通為匹馬三十家士一人徒二人通十為成成百井三百家革車一乘士十人徒二十人十成為終終千井三千家革車十乘士百人徒二百人十終為同同方百里萬井三萬家革車百乘士千人徒二千人坡謂賦盖兼田賦言之凡税斂者或亦有漆林及罰布之等此貢賦自入其長八則所云以馭其用也其法則小司徒令之問司馬法車乘士徒之數與周禮不同何朱子曰古制不明皆不可攷此只見于鄭氏註七書中司馬法又不是此林勲本政書錯説以為文王治岐之政曰或以周禮乃常數司馬乃調𤼵時數是否曰不通處如何硬要通不須思量枉費心力乃分地域而辨其守施其職而平其政註曰政稅也政當作征黄文叔曰域界也井邑邱甸縣都各有界域坡謂此専言造都鄙之事與大司徒之文相表裏分地域即大司徒之制其地域而封溝之也辨其守施其職平其政即大司徒之分地職奠地守制地貢也大司徒以立家為義故先言制地而後及授田小司徒以比法為重故先言井牧田野而後及分地各有當也此與上文皆都鄙夫家之比法按是而稽之則征役與其施舍者可均而祭祀飲食喪紀之禁令可齊矣政音征有當去聲凡小祭祀奉牛牲羞其肆註曰小祭祀王𤣥冕所祭疏曰小祭祀既用牛則王之祭祀無不用牛者肆音剔小賓客令野修道委積註曰小賓客諸侯之使臣大軍旅帥其衆庶註曰帥帥而致于大司徒小軍旅巡役治其政令大軍旅天子親行小軍旅謂使臣征伐役築軍壘修城塹之役宜有政令以齊一之小司徒則巡行而治之大喪帥邦役治其政令註曰喪役正棺引窆復土疏曰邦役謂六鄉衆庶役使之事凡建邦國立其社稷正其畿疆之封疏曰建邦國者謂立畿外諸侯邦國社稷者諸侯亦有三社三稷國社侯社勝社皆有稷配之立其社稷謂以文書法度與之不可國國身往也正其畿疆者謂九畿畿上皆有疆界封樹以為阻固也凡民訟以地比正之註曰鄭司農云以田畔所與比正斷其訟地訟以圖正之註曰地訟争疆界者圖謂邦國本圖疏曰凡量地以制邑初封之時即有地圖在官府後有訟者則以本圖正之歲終則攷其屬官之治成而誅賞註曰治成治事之計令羣吏正要會而致事疏曰此亦是歲終之時正要會而致事者上經成據日小成之計此言要會謂是月計歲計總為簿書而致其事之功狀以待攷也正歲則帥其屬而觀敎灋之象徇以木鐸曰不用灋者國有常刑令羣吏憲禁令修灋糾職以待邦治註曰憲表縣之及大比六鄉四郊之吏平敎治正政事攷夫屋及其衆寡六畜兵器以待政令四郊之吏謂比長閭胥以上布列在四郊主民事者夫屋即夫家也敎治政事夫屋之等各有成法以其三年大比行黜陟之禮而更平之正之攷之以待國家之政令所須則供之也上文大比者簡閲民數也此大比者廢置羣吏也更言攷夫屋之等亦猶冢宰司書三歲大計羣吏以知民財已下是也然大比六鄉則稍甸縣都邦國亦大比之矣問九比解與註異曰司農以九比為九夫為井然國中四郊乃六鄉之地六鄉為溝洫法則十夫無九夫也後鄭以九比為出九賦之人以為下文征之施舍張本得矣然口泉之法三代則無之故愚妄意但以九處之民為説分山澤而二之者本閭師文曰征役疏以征為税役為徭役子但以為力役之征何也曰以征為口泉之税則三代無是法以征為田税則田税無弛而不征之法夫粟米謂之征力役亦謂之征子不觀遂人之文乎云以令貢賦以令師田以起政役賦貢之外别言政役彼註云政役出士徒役音釋云政音征征役之説此解明矣或問治洫治澮之説如何曰甸方八里縣方十六里小都方三十二里大都方六十四里所有夫家是治田出税者註以甸旁各加一里為十里縣旁各加二里為二十里小都旁各加四里為四十里大都旁各加八里為八十里凡所加一里二里四里八里之夫家皆治洫不出税者註又謂縣加五里則二十五里為大夫采小都加十里則五十里為卿采大都加二十里則百里為公采而以此大都所加之二十里其夫家為治澮不出税坡謂以山川城郭三分乘除可見大凡如一縣方二十里四百井而四甸僅方十六里二百五十六井者則山川城郭等除一百四十四井約近三分去一之法故一縣只有四甸也縣旁又加五里得井二百二十五者容地有一易再易以為消長度此為井也牧也推之卿采四十里一千六百井而四縣方三十二里只一千竒二十四井者則山川城郭等除五百七十六井也旁加十里得井九百亦為井也牧也公采八十里六千四百井而四都方六十四里只四千竒九十六井者則山川城郭等除二千三百又四井也旁加二十里得三千六百井亦井牧法也妄意大凡多寡不能畢合故不敢附于註下坡嘗經河北及中州數日行皆平土無甚高下遇雨則四野滄溟禾稼皆淹車馬失路濘蟠十日晴尚在水居渡黄河涉漳水又至塞外見桑乾河其水渾赤河旁之地泥壅沙屯因仍汩沒乃知鄭子出税治洫之解真王道也邱甸縣都緣邊之民畀以百畝不税不役食其租竱力于溝洫長無他事之困彼出税者息然于耕鑿無水旱崩襲之災豈不兩得其利乎然通率之治洫澮之夫多于出税此李悝商鞅之徒所以必欲盡之也豈知聖人寛然餘裕多其功于除害釋其氣于陰陽歲歲有秋民足而君樂彼徒知富國而厲民盡利棄天地之性得不與善戰連諸侯者同為罪乎且蓄洩無餘所水旱傷之修其隄防補其困敗揆之先王正大之道所得所亡亦無贏餘也諸儒臆決為詆而横渠張子是之知道者所見自别朱子言其不見他據古書亡者多矣安得事求其據苟合先王廓然不盡之仁案之經久宜民之法則此即其據也王者有作出税之田少治洫澮之田多或者在所損益而此二法則不可易濘音寜塞音賽汩音滑竱音轉周禮述註卷七
