body:
  text: 周禮述註卷二十三安溪李光坡撰冬官攷工記第六鄭目錄云象冬所立官也是官名司空者冬閉藏萬物天子立司空使掌邦事亦所以富立家使民無空者也司空之篇亡漢興購求千金不得此前世識其事者記錄以備大數古周禮六篇畢矣疏曰鄭義既然今案漢書藝文志云經禮三百威儀三千及周之衰諸侯將踰灋度惡其害己皆滅去其籍孔子時而多不具以此觀之冬官一篇其亡已久有人尊集舊典錄此三十工以為攷工記雖不知其人又不知作在何日要知在於秦前是以遭秦滅焚典籍韋氏裘氏等闕也玻聞之兄曰尚書伯禹作司空而後契為司徒是唐虞之官也王制司空度地居民而後司徒脩禮明敎是夏殷之官也洪範四曰司空五曰司徒殷官又其著者帝王皆首司空而周公獨後之何蓋與易以艮成終成始義合也是故冢宰掌天司徒掌地兼總條貫是二官者包乎上下其外春夏秋冬各司一事宗伯以禮樂敎而實由司空之富邦國生萬民而後敎化行則自冬而春貞下起元之義也禮以節之樂以和之政以行之刑以防之極其效不過欲老有所終幼有所長黎民不饑不寒矜寡孤獨廢疾者有養而已則春生夏長秋收以至冬藏之義也以此為終而實王道之始以此為始而要其成何以加兹深哉周公之意豈有異於堯舜禹湯之心乎矜讀鰥國有六職百工與居一焉註曰百工司空事官之屬司空掌營城郭都邑立社稷宗廟造宮室車服器械監百工者唐虞已上曰共工疏曰六職即下云或坐而論道至治絲麻以成之是也或坐而論道或作而行之或審曲面埶以飭五材以辨民器或通四方之珍異以資之或飭力以長地財或治絲麻以成之註曰言人徳能事業之不同者也論道謂謀慮治國之政令也作起也辨猶具也資取也操也鄭司農云審曲面埶審察五材曲直方面形埶之宜以治之及隂陽之面背是也春秋𫝊曰天生五材民竝用之謂金木水火土也𤣥謂此五材金木皮玉土坐而論道謂之王公註曰天子諸侯作而行之謂之士大夫註曰親受其職居其官也審曲面執以飭五材以辨民器謂之百工註曰五材各有工言百衆言之也通四方之珍異以資之謂之商旅註曰商旅販賣之客也易曰至日商旅不行飭力以長地財謂之農夫註曰三農受夫田也疏曰飭勤也地財榖物皆是治絲麻以成之謂之婦功註曰布帛婦官之事鄭敬仲曰記之所載自王公士大夫以至於農夫婦功皆有職於國者也而百工者事職之所主故列於事官而為之屬也然上無道揆則下無灋守朝不信道則工不信度三公坐而論道則上有道揆而朝信道此道徳之所以明也士大夫作而行之則下有灋守而工信度此風俗之所以同也先王之時所以同風俗者尤謹於百工以其衣服器械之所由出也然則其可不屬之以官乎與音預長丁丈反埶音勢監古銜反共音恭販甫萬反粤無鎛燕無函秦無廬胡無弓車註曰此四國者不置是工也鎛田器詩云偫乃錢鎛又曰其鎛斯㨄鄭司農云函讀如國君含垢之含函鎧也廬讀為纑謂矛㦸柄胡今匈奴粤之無鎛也非無鎛也夫人而能為鎛也燕之無函也非無函也夫人而能為函也秦之無廬也非無廬也夫人而能為廬也胡之無弓車也非無弓車也夫人而能為弓車也註曰言其丈夫人人皆能作是器不須國工粤地塗泥多草薉而山出金錫鑄冶之業田器尤多燕近强胡習作甲胄秦多細木善作矜柲匈奴無屋宅田獵畜牧逐水草而居皆知為弓車粤越同鎛音博燕音烟廬魯吳反夫人註方無反沈音扶偫直里反錢子淺反㨄音趙鎧音愷纑音盧薉音穢矜巨巾反柲音祕知者創物註曰謂始闓端造器物若世本作者是也巧者述之守之世謂之工註曰父子世以相敎知音智闓音開百工之事皆聖人之作也註曰事無非聖人所為也鑠金以為刃凝土以為器作車以行陸作舟以行水此皆聖人之所作也註曰凝堅也坡謂此申知者創物事鑠始灼反天有時地有氣材有美工有巧合此四者然後可以為良註曰時寒温也氣剛柔也良善也材美工巧然而不良則不時不得地氣也註曰不時不得天時劉執中曰不言不得天時地氣而曰則不時不得地氣者盖東西南北之異宜在地之氣不均也而器遷乎其地而不能良者則於地之氣有得有不得之辨若天時春夏秋冬之行孰有不同之方歟其失之者非時不然也人也橘踰淮而北為枳鸜鵒不踰濟貉踰汶則死此地氣然也註曰鸜鵒鳥也春秋昭二十五年有鸜鵒來巢𫝊曰書所無也鄭司農云不踰濟無妨於中國有之貉或為猿謂善緣木之援也汶水在魯北鄭之刀宋之斤魯之削吳粤之劍遷乎其地而弗能為良地氣然也註曰去此地而作之則不能使良也疏曰若據經所言則鄭之刀以此刀之鐵移向宋而作斤宋之斤移向鄭而作刀皆不得為良鄭剛中曰言橘貉鸜鵒賦性以生者猶非其地則不能生况刀斤削劍之器出於人為者乎引彼喻此以見地氣之不可不順也燕之角荆之幹妢胡之笴吳粤之金錫此材之美者也註曰荆荆州也幹柘也可以為弓弩之幹妢胡胡子之國在楚旁笴矢幹也禹貢荆州貢櫄幹栝栢及􅙪簵楛天有時以生有時以殺草木有時以生有時以死石有時以泐水有時以凝有時以澤此天時也註曰言百工之事當審其時也鄭司農云泐讀如再扐而後掛之扐泐謂石解散也夏時盛暑大熱則然坡謂此數節皆申巧者述之事審時得氣掄材惟巧者能之枳諸氏反鸜其俱反鵒音欲濟子禮反貉音涸汶音問削思約反又思詔反妢音焚笴干上聲泐音勒澤音亦猿音袁柘音蔗櫄勅倫反􅙪其隕反簵音路楛音枯凡攻木之工七攻金之工六攻皮之工五設色之工五刮摩之工五摶埴之工二註曰攻猶治也摶之言拍也埴黏土也故書七為十刮作捖鄭司農云十當為七捖摩之工謂玉工也捖讀為刮其事亦是也毛氏曰凡此諸工以職多者上寡者次之尤寡者為下攻木之工輪輿弓廬匠車梓攻金之工築冶鳬㮚段桃攻皮之工函鮑韗韋裘設色之工畫繢鍾筐㡛刮摩之工玉楖雕矢磬摶埴之工陶旊註曰事官之屬六十此職其五材三十工畧記其事耳其曰某人者以其事名官也其曰某氏者官有世功若族有世業以氏名官者也廬矛㦸矜柲也國語曰侏儒扶廬梓榎屬也鄭司農云鮑讀為鮑魚之鮑書或為鞄蒼頡篇有鞄􅠙韗讀為歴運之運㡛讀為芒芒禹迹之芒楖讀如巾櫛之櫛旊讀為甫始之甫𤣥謂旊讀如放於此乎之放疏曰某人者若匠人梓人韗人鮑人之類此等直指事上名官曰某氏者義有二一者官有世功以官為氏若韋氏裘氏冶氏之類二者族有世業以氏名官若鳬氏㮚氏之等坡謂此二節皆申守之世謂之工也刮古八反摶音團埴時職反㮚音栗韗音運繢戸對反㡛莫黄反楖音即旊音紡拍普百反黏女亷反捖音刮侏音朱榎古馬反鞄匹學反􅠙如兖反放甫罔反有虞氏上陶夏后氏上匠殷人上梓周人上輿註曰官各有所尊王者相變也舜至質貴陶器甒大瓦棺是也禹治洪水民降丘宅土卑宮室盡力乎溝洫而尊匠湯放桀疾禮樂之壞而尊梓武王誅紂疾上下失其服飾而尊輿故一器而工聚焉者車為多註曰周所尚也陳君舉曰車制用在輪故察車自輪始輪之外輮為圍圍之中直指湊轂者為輻輻之所蓄而利轉者謂之轂轂裏之大穿謂之賢轂外之小穿謂之軹轂中空處謂之藪轂上横通通載者謂之軸軸末以防輪而固謂之牽軸上横伏而納輈者謂之轐轐上所載三面材謂之任正任正之上謂之軫輿前掩軓版謂之陰輿深謂之隊植於輿兩傍謂之輢蔽風塵謂之茀横於兩輢而為人所慿者謂之式中系驂馬内轡處謂之輢式下之植從者謂之轛兩輢之上出於式者謂之較較之下從者謂之軹以革鞔式以皮覆式謂之韈以簟衣式謂之車軓納轡之環謂之韈著車之衆環謂之指有曲轐而出從前稍曲而上謂之輈輈前持衡者謂之頸頸下衡者謂之衝衝下兩馬謂之服服外兩馬謂之驂兩服之四轡兩驂之四轡謂之八轡兩驂之内轡系於式其在手者外轡與服馬之四轡謂之六轡前系於衡後系於軫以防驂馬之入者謂之脅驅驂馬之系車四條謂之靷内兩條納於陰者謂之隂靷外系於軸者謂之外靷拘二靷以絆其背者謂之韅背為環以管外内轡謂之游環削革三就當胷謂之繁纓縷金以當盧謂之鍚著鈴於兩鑣謂之鸞置鈴於式謂之和兩驂内轡謂之勒車上之覆則有蓋蓋之斗謂之部蓋上撩謂之弓蓋之小柄謂之達常大扛長八尺謂之桯此車之通制也甒音武輮人九反輻音福轂音谷軸音逐舝音轄輈音舟轐音濮軓同􅓶音犯輢音倚鞔莫官反轛音對較音覺韈音㒝靷羊晉反韅音顯鍚音陽撩音聊扛虎項反桯音汀車有六等之數註曰車有天地之象人在其中焉六等之數灋易之三材六畫車軫四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四尺崇於人四尺謂之四等車㦸常崇於殳四尺謂之五等酋矛常有四尺崇於㦸四尺謂之六等註曰此所謂兵車也軫輿後横木崇高也八尺曰尋倍尋曰常殳長丈二戈殳㦸矛皆揷車騎鄭司農云迆讀為倚移從風之移謂著戈於車邪倚也酋𤼵聲直謂矛楊謹仲曰此以軫為輿後横木後注以軫為輿故學者惑焉軫正是輿之名蓋四畔各以木加於輿上以閑其所載詩所謂俴收也其四方則象地故曰軫方象地惟四畔皆木也故論軫之高則以後横木為度六分其廣以一為軫圍車廣六尺六寸則是輿後横木圍一尺一寸徑三寸三分寸之二輪六尺六寸故軹高三尺三寸并後軫與轐七寸其高四尺故指後横木為高之度軫之義不止後横木也車謂之六等之數註曰申言數也柲音秘迆以氏反殳音殊酋在由反著丁略反邪似嗟反俴在演反凡察車之道必自載於地者始也是故察車自輪始註曰先視輪也自從也坡謂凡車材皆載於輪上惟輪載於地凡察車之道欲其樸屬而微至不樸屬無以為完久也不㣲至無以為戚速也註曰樸屬猶附著堅固貌也齊人有名疾為戚者春秋𫝊曰盖以操之為已蹙矣速疾也㣲至謂輪至地者少言其圜甚著地者微耳著地者㣲則易轉故不㣲至無以為戚速鄭剛中曰察車之道必觀乎輪而觀輪之灋又自有術輪已崇則人不能登也輪已庳則於馬終古登阤也註曰已大也甚也崇高也齊人之言終古猶言常也阤阪也輪庳則難引毛氏曰輪樸屬而㣲至固盡善矣而高下又不可以無節故兵車之輪六尺有六寸田車之輪六尺有三寸乘車之輪六尺有六寸註曰此以馬大小為節也兵車革路也田車木路也乘車玉路金路象路也兵車乗車駕國馬田車駕田馬六尺有六寸之輪軹崇三尺有三寸也加軫與轐焉四尺也人長八尺登下以為節註曰此車之高者也軫輿也鄭司農云軹也轐讀為旃僕之僕謂伏兔也𤣥謂軹轂末也此軫與轐并七寸田車又宜減焉乗車之軌廣取數於此軌廣八尺旁出輿亦七寸也疏曰車輿六尺有六寸軌廣謂轍廣轍八尺則車輿外旁出輿兩相各七寸七寸之數取於軫轐之數也趙氏曰轐置於輪輻軸上如兩短柱以承軫者屬章欲反戚音促庳音婢阤堂何反阪音反轐音卜音衛輪人為輪斬三材必以其時註曰三材所以為轂輻牙也斬之以時材在陽則中冬斬之在隂則中夏斬之今世轂用雜榆輻以檀牙以橿也三材既具巧者和之註曰調其鑿内而合之轂也者以為利轉也輻也者以為直指也牙也者以為固抱也註曰利轉者轂以無有為用也鄭司農云牙讀如跛者訝跛之訝謂輪輮也世間或謂之罔書或作輮輪敝三材不失職謂之完註曰敝盡而轂輻牙不動牙音訝中音仲橿居良反内同枘如鋭反望而眂其輪欲其幎爾而下迆也進而眂之欲其㣲至也無所取之取諸圜也註曰輪謂牙也幎均致貌也進猶行也㣲至至地者少也非有他也圜使之然也疏曰望而視之謂車停止時下迆者謂輻轂上轂下兩兩相當正直不旁迆趙氏曰此段是分别察輪之節目據牙輻轂綆四者而言皆謂輪已成而眂其所作之善否非謂方制輪之時上文以轂為先輻次之牙次之自内言之至於外也此以輪為先輻次之轂次之自外以及内也方其制輪則自内以及外及其既成而眂之則自外以及内事之序如此幎音覔綆讀為餅音丙下同望其輻欲其揱爾而纎也進而眂之欲其肉稱也無所取之取諸易直也註曰揱纎殺小貌也肉稱𢎞殺好也鄭司農云揱讀為紛容揱參之揱𤣥謂如桑螵蛸之蛸疏曰凡輻皆向轂處大向牙處小言揱纎據牙處小而言也肉稱向轂為稱揱音蕭又音朔稱尺證反易以豉反殺色界反參所林反螵毗昭反蛸音蕭望其轂欲其眼也進而眂之欲其幬之亷也無所取之取諸急也註曰眼出大貌也幬幔轂之革也革急則裹木亷隅見鄭司農云眼讀如限切之限眼魚懇反幬音蹈一音疇幔莫干反裹音果見賢遍反眂其綆欲其蚤之正也註曰蚤讀為爪謂輻入牙中者也鄭司農云綆讀為闗東言餅之餅謂輪箄也𤣥謂輪雖箄爪牙必正也察其菑蚤不齵則輪雖敝不匡註曰菑謂輻入轂中者也菑與爪不相佹乃後輪敝盡不匡刺也鄭司農云菑讀如雜厠之厠謂建輻也泰山平原所樹立物為菑聲如胾博立梟棊亦為菑匡枉也疏曰人之牙齒參差謂之齵綆音餅蚤音爪下同菑側吏反齵五構反箄薄歴反佹九委反刺洛葛反胾則吏反梟古堯反凡斬轂之道必矩其陰陽註曰矩謂刻識之也疏曰此欲斬轂之時先就樹刻之記識其向日為陽背日為隂之處必記之者為後以火養其陰故也陽也者稹理而堅陰也者疏理而柔是故以火養其陰而齊諸其陽則轂雖敝不藃註曰稹致也火養其陰炙堅之也鄭司農云藃當作耗𤣥謂藃藃暴陰柔後必橈減幬革暴起疏曰言以火養炙陰柔之處使堅與陽齊等也轂小而長則柞大而短則摰註曰鄭司農云柞讀為迫唶之唶謂輻間柞狹也摰讀為槷謂輻危槷也𤣥謂小而長則菑中弱大而短則轂末不堅是故六分其輪崇以其一為之牙圍註曰六尺六寸之輪牙圍尺一寸參分其牙圍而漆其二註曰不漆其踐地者也漆者七寸三分寸之一不漆者三寸三分寸之二令牙厚一寸三分寸之二則内外面不漆者各一寸也椁其漆内而中詘之以為之轂長以其長為之圍註曰六尺六寸之輪漆内六尺四寸是為轂長三尺二寸圍徑一尺三分寸之二也鄭司農云椁者度兩漆之内相距之尺寸也以其圍之阞捎其藪註曰捎除也阞三分之一也鄭司農云捎讀為桑螵蛸之蛸藪讀為蜂藪之藪謂轂空壺中也𤣥謂此藪徑三寸九分寸之五壺中當輻菑者也蜂藪者猶言趨也藪者衆輻之所趨也疏曰車轂之灋其孔必大頭寛小頭狹當輻入處謂之藪寛狹處中而已阞者三分之一也於前一尺三分寸之二三分取一以除空中當藪之處使容車轂也五分其轂之長去一以為賢去三以為軹註曰鄭司農云賢大穿也軹小穿也𤣥謂此大穿徑八寸十五分寸之八小穿徑四寸十五分寸之四大穿甚大似誤矣大穿實五分轂長去二也去二則得六寸五分寸之二凡大小穿皆謂金也今大小穿金厚一寸則大穿穿内徑四寸五分寸之二小穿穿内徑二寸十五分寸之四如是乃與藪相稱也疏曰上經言轂空壺中此言轂大小兩頭容轂必直陳篆必正施膠必厚施筋必數幬必負幹註曰鄭司農云讀容上屬曰軹容𤣥謂容者治轂為之形容也篆轂約也幬負幹者革轂相應無贏不足趙氏曰轂約不專指軹而言蓋轂以革鞔之約謂鞔也於鞔之上而飾以采色如巾車孤乘夏篆注亦謂夏篆五采畫轂約也陳設其篆采之文則欲正而不邪既摩革色青白謂之轂之善註曰謂丸漆之乾而以石摩平之革色青白善之徴也疏曰此謂以革鞔轂訖將漆之先以骨丸之待乾以石摩之色青白則善也稹之忍反藃呼暴反柞莊百反摰註讀槷魚列反詘􅉌勿反阞音勒捎音簫藪素口反篆直轉反膠音交識音志耗呼報反暴步莫反橈乃孝反唶莊百反數色角反鞔莫官反乾音干參分其轂長二在外一在内以置其輻註曰轂長三尺二寸者令輻廣三寸半則輻内九寸半輻外一尺九寸凡輻量其鑿深以為輻廣註曰廣深相應則固足相任也輻廣而鑿淺則是以大扤雖有良工莫之能固註曰扤搖動貌鑿深而輻小則是固有餘而彊不足也註曰言輻弱不勝轂之所任也疏曰鑿深而輻小者謂轂大故鑿得深故竑其輻廣以為之弱則雖有重任轂不折註曰言力相稱也弱菑也今人謂蒲本在水中者為弱是其類也鄭司農云竑讀如紘綎之紘謂度之疏曰力相稱者止謂輻廣與鑿深相稱蒲本在水為蒻則此弱亦是輻入轂中者也參分其輻之長而殺其一則雖有深泥亦弗之溓也註曰殺衰小也鄭司農云溓讀為黏謂泥不黏着輻也疏曰假令輻除入轂之中其外長三尺則殺一尺以向牙以本麤末細塗則向下利故泥不黏着之參分其股圍去一以為骹圍註曰謂殺輻之數也鄭司農云股謂近轂者也骹謂近牙者也方言股以喻其豐故言骹以喻其細人脛近足者細於股謂之骹羊脛細者亦謂骹疏曰上經云殺其一者據長短之中殺一分此經三分殺一據本麤末細而言揉輻必齊平沈必均註曰揉謂以火槁之衆輻之直齊如一也平沈平漸也鄭司農云平沈謂浮之水上無輕重直以指牙牙得則無槷而固註曰得謂倨句鑿内相應也鄭司農云槷榝也蜀人言榝曰槷𤣥謂槷讀如涅從木熱省聲不得則有槷必足見也註曰必足見言槷大也然則雖得猶有􅈏但小耳鄭剛中曰輻直而倨牙曲而句倨句之勢難乎相得苟輻之直而指牙牙與輻二者相入而各得其正雖無槷亦固也况於有槷乎槷楔也若夫佹戾各不相得雖有木以槷之其槷不隠必有時而見矣足見謂其槷之大也輻之入牙未必不用槷而能固者也但二者相得則有槷而小似無槷焉其勢亦固不相得則有槷必大雖大亦不能固上云無槷而固非無也必其相得若無也量音良扤五骨反深尸鴆反下同彊其良反竑獲耕反殺色界反溓註作黏女亷反骹胡飽反揉如九反槷魚列反見賢遍反紘音宏蒻音弱麤音粗倨音據句古侯反鑿内如鋭反榝素結反涅乃結反楔音屑佹音詭六尺有六寸之輪綆參分寸之二謂之輪之固註曰輪箄則車行不掉也參分寸之二者出於輻股鑿之數也趙氏曰蓋凡造車必置綆於輻外一頭入轂一頭入牙所以遮䕶撑住著輪使行時不至於搖扤也三分寸之二謂綆在輻外近轂處輻廣三寸半輻是側安者此處甚高必礙住綆綆不容與輻一般排鑿孔使兩頭俱入牙所以鑿轂與牙之時綆鑿孔向外侵三分寸之二疏雖只説鑿牙其實兼轂而言蓋綆那頭必入轂故也所謂三分寸之二者以一寸三分之而得其二也以數計之則綆離輻菑爪鑿孔六分有竒如此則綆不被輻高處閣起又輔助住輻輻有倚靠則車行不掉輪自堅固所以謂之輪之固也據輪人為蓋疏云則向外謂近輿處綆是安在輪之内面外面無有綆或謂綆兩頭俱入於牙不入於轂此説不然蓋輻中間高閣住綆綆如何俱入於牙得若使綆一頭不入於轂皆入於牙註當言出於輻骹鑿數不當言輻股矣輻股是近轂處故也綆方頴反掉徒弔反撑丑庚反凡為輪行澤者欲杼行山者欲侔註曰杼謂削薄其踐地者侔上下等杼以行澤則是刀以割塗也是故塗不附註曰附著也侔以行山則是摶以行石也是故輪雖敝不甐於鑿註曰摶圜厚也鄭司農云不甐於鑿謂不動於鑿中也𤣥謂甐亦敝也以輪之厚石雖齧之不能敝其鑿旁使之動凡揉牙外不廉而内不挫旁不腫謂之用火之善註曰廉絶也挫折也腫瘣也疏曰古者車輞屈一木為之凡屈木多外亷絶理内挫折中旁腫負起無此三疾是用火之善也杼直呂反摶音團甐音吝挫作臥反瘣胡罪反輞音罔是故規之以眂其圜也註曰輪中規則圜矣萭之以眂其匡也註曰等為萭蔞以運輪上輪中萭蔞則不匡刺也萭鄭司農云書或作矩趙氏曰輪圜物也中規則可如何欲其中矩蓋以規合之固可驗其不員處以矩合之其四方四角有不員處亦可因矩以驗之縣之以眂其輻之直也註曰輪輻三十上下相直從旁以繩縣之中繩則鑿正輻直矣水之以眂其平沈之均也註曰平漸其輪無輕重則斲材均矣疏曰兩輪俱置水中量其藪以黍以眂其同也註曰黍滑而齊以量兩壺無贏不足則同疏曰謂兩輪俱用黍量眂其容受同不權之以眂其輕重之侔也註曰侔等也稱兩輪鈞石同則等矣輪有輕重則引之有難易故可規可萭可水可縣可量可權也謂之國工註曰國之名工易彦祥曰此又總括輪人一篇之意大抵注目而視方員不如付諸規矩之為公謄口而議平直不如付諸準繩之為審援手而度多寡輕重不如付諸權量之為當六者設則天下之為方員平直多寡輕重者皆不能外是固不容加毫末於其間也萭姜禹反縣音懸蔞良主反輪人為蓋疏曰輪輻三十蓋弓二十有八器類相似故因遣輪人造蓋達常圍三寸註曰圍三寸徑一寸也鄭司農云達常蓋斗柄下入杠中也王光遠曰蓋之制上為部中為達常下為桯旁為弓達常小於桯桯小於部故非部無以納弓於其旁非桯無以含達常於其中桯圍倍之六寸註曰圍六寸徑二寸足以舎達常鄭司農云桯蓋杠也讀如丹桓宮楹之楹信其桯圍以為部廣部廣六寸註曰廣謂徑也鄭司農云部蓋斗也疏曰此言蓋之斗四面鑿孔内蓋弓者部長二尺註曰謂斗柄達常也疏曰此部即達常以此達常上入部中遂名此達常為部其實是達常也桯長倍之四尺者二註曰杠長八尺謂達常以下也加達常二尺則蓋高一丈立乗也桯讀楹音盈信音申廣古曠反杠音江十分寸之一謂之枚註曰為下起數也枚一分故書十與上二合為二十字杜子春云當為四尺者二十分寸之一部尊一枚註曰尊高也蓋斗上隆高高一分也弓鑿廣四枚鑿上二枚鑿下四枚註曰弓蓋橑也廣大也是為部厚一寸鑿深二寸有半下直二枚鑿端一枚註曰鑿深對為五寸是以不傷達常也疏曰此經説蓋斗之上鑿孔内弓二十八孔之上下廣狹之義趙氏曰下直二枚者上云鑿下四枚今於内畔於下亦四枚與外正平故經謂之下直上云鑿上二枚今於内畔孔低二分鑿上亦四枚故經謂之二枚下直鑿之下二枚鑿之上此一句指兩事而言也鑿端一枚者謂部高一寸今鑿上鑿下俱四枚其中只有二枚在以二枚之中取一枚鑿深放尖故云鑿端一枚端謂鑿頭也所以如此以弓外畔上下方正大四枚今於弓入鑿内處平剡其弓下畔二分於弓尖處又削去一分以納入鑿中使與鑿孔恰好相應如此則弓向處頭仰郤以蓋弓三分之近部一分揉放低外二分為宇曲又以衣蒙之則弓雖低而其力常健雖曲不至一向低斜此皆仰其弓故如此若俯其弓則弓自部以下皆低而蔽目矣先儒言鑿上二枚鑿下四枚指鑿之外也下直二枚指鑿之内也鑿廣而内狹上低而下正先高而揉之使下弓本仰而覆之使俯斯言盡之矣鑿才報反橑音老弓長六尺謂之庇軹五尺謂之庇輪四尺謂之庇軫註曰庇覆也杜子春云謂覆斡也𤣥謂軹轂末也輿廣六尺六寸兩轂并六尺四寸旁減軌内七寸則兩軹之廣凡丈一尺六寸也六尺之弓倍之加部廣凡丈二尺六寸有宇曲之減可覆軹不及斡疏曰上云以其轂長二在外一在内以置其輻輻内九寸半綆三分寸之二金轄之間三分寸之一輻又三寸半總尺四寸以此計之以七寸承輿七寸為軌凡減一尺四寸則兩軹之廣才丈一尺六寸也庇筆肄反斡音管參分弓長而揉其一註曰參分之持長撓短短者近部而平長者為宇曲也六尺之弓近部二尺四尺為宇曲疏曰撓而曲之謂之揉必撓近部二尺者以其本鑿弓孔時外畔弓上二枚弓下四枚内畔上下俱四枚由弓頭仰故須近部撓之使平向下四尺持之為宇曲吐水也參分其股圍去一以為蚤圍註曰蚤當為爪以弓鑿之廣為股圍則寸六分也爪圍一寸十五分寸之一疏曰此言弓近蓋斗麤近末頭細之意參分弓長以其一為之尊註曰尊高也六尺之弓上近部平者二尺爪末下於部二尺二尺為句四尺為弦求其股股十二除之面三尺幾半也鄭剛中曰前云部尊一枚言部之高耳若弓之入部則三分其長以其一為之尊假如六尺之弓則以二尺近部為高也上欲尊而宇欲卑註曰上近部平者也隤下曰宇上尊而宇卑則吐水疾而霤逺註曰蓋者主為雨設也乘車無蓋禮所謂潦車謂蓋車與霤力又反隤大囘反蓋已崇則難為門也蓋已卑是蔽目也是故蓋崇十尺註曰十尺其中正也蓋十尺宇二尺而人長八尺卑於此蔽人目鄭剛中曰車出入乎門蓋太高則門不能容人立乘乎車蓋太卑則目無所見古人制蓋之灋欲無害于門欲不蔽乎目故以十尺為度良蓋弗冒弗紘殷畝而馳不隊謂之國工註曰隊落也善蓋者以横馳於壟上無衣若無紘而弓不落也坡謂弗紘謂有衣而弗係以組也紘戸耕反殷音隠隊直類反輿人為車輪崇車廣衡長參如一謂之參稱註曰稱猶等也車輿也衡亦長容兩服疏曰參如一者謂俱六尺六寸也驂馬别有軥鬲引車故衡唯容服馬也稱尺證反軥古侯反鬲同軶於革反參分車廣去一以為隧註曰兵車之隧四尺四寸鄭可農云隧謂車輿深也讀如鑽燧改火之燧𤣥謂讀如邃宇之邃疏曰隧謂車輿之縱參分其隧一在前二在後以揉其式註曰兵車之式深尺四寸三分寸之二薛士龍曰植於車輿兩旁為輢横於兩輢在車前為人所憑者為式以其廣之半為之式崇註曰兵車之式高三尺三寸以其隧之半為之較崇註曰較兩輢上出式者兵車自較而下凡五尺五寸疏曰較謂車輿兩相今人謂之平鬲也言兩輢謂車相兩旁豎之者二者既别而云爾者以其較之兩頭皆置于輢上二木相附故據兩輢出式言之六分其廣以一為之軫圍註曰軫輿後横者也兵車之軫圍尺一寸參分軫圍去一以為式圍註曰兵車之式圍七寸三分寸之一參分式圍去一以為較圍註曰兵車之較圍四寸九分寸之八毛氏曰輢植乎輿之四隅較式附焉而不言其圍者舉較則輢可知參分較圍去一以為軹圍註曰兵車之軹圍三寸二十七分寸之七軹輢之植者衡者也與轂末同名疏曰此軹是車較下豎直者及較下衡者竝縱横相貫也參分軹圍去一以為轛圍註曰兵車之轛圍二寸八十一分寸之十四轛式之植者衡者也轛者以其鄉人為名疏曰此轛形狀一與前經軹同但在式木之下對人為言耳隧音遂註燧邃同較古學反轛音對輢音倚鄉許亮反圜者中規方者中矩立者中縣衡者中水直者如生焉繼者如附焉註曰治材居材如此乃善也如生如木從地生如附如附枝之𢎞殺也中丁丈反縣音懸殺色界反凡居材大與小無幷大倚小則摧引之則絶疏曰上言居材得所此言不得所之事幷偏邪相就也倚則幷也凡居材當各自用力若使大材倚幷小材小材强不堪大材所倚則摧折若小幷於大大木振其小木力不堪則斷絶也棧車欲弇註曰為其無革鞔不堅易坼壞也士乘棧車疏曰無革鞔輿易可坼壞故當弇向内為之飾車欲侈註曰飾車謂革鞔輿也大夫以上革鞔輿疏曰侈謂向外侈也棧才産反弇於騐反鞔莫干反易以豉反坼勅白反輈人為輈註曰輈車轅也詩云五楘梁輈疏曰於三十工無輈人之官但車事是難故車官别主此職也輈有三度軸有三理註曰目下車度淺深之數易彦祥曰軸以貫轂特輪之一器於輈人何與而言於三度之後者軸待輈而後運輈待軸而後行其勢實相資焉輈張留反楘音木國馬之輈深四尺有七寸註曰國馬謂種馬戎馬齊馬道馬高八尺兵車乘車軹崇三尺有三寸加軫與轐七寸又幷此輈深則衡高八尺七寸也除馬之高則餘七寸為衡頸之間也鄭司農云深四尺七寸謂轅曲中薛士龍曰輈之形自從軓前梢曲而上至衡下其頸以持衡其曲如屋之梁焉田馬之輈深四尺註曰田車軹崇三尺一寸半幷此輈深而七尺一寸半今田馬七尺衡頸之間亦七寸則軫與轐五寸半則衡高七尺七寸駑馬之輈深三尺有三寸註曰輪軹與軫轐大小之減率寸半也則駑馬之車軹崇三尺加軫與轐四寸又幷此輈深則衡高六尺七寸也今駑馬六尺除馬之高則衡頸之間亦七寸率音律軸有三理一者以為媺也註曰無節目也二者以為久也註曰堅刃也三者以為利也註曰滑宻媺音美軓前十尺而䇿半之註曰謂輈軓以前之長也䇿御者之策也十或作七合七為弦四尺七寸為鉤以求其股股則短矣七非也鄭司農云軓謂式前也書或作􅓶𤣥謂軓是軓灋也謂輿下三面之材輢式之所樹持車正也疏曰軓謂車式式前十尺謂轅曲中而策半之則五策矣趙氏曰據下文軓中有灂則輿上置隧處乃是軓正在隧之下式之前蓋輈身長一丈四尺四寸入輿隧下隧以前只有十尺以此見軓即隧之下面隧外空著一分輿軓即是閣住隧版之木横子謂之軓者取其在下持住車有為則為灋之意軓音犯注􅓶音同灂子肖反凡任木註曰目車持任之材任正者十分其輈之長以其一為之圍衛任者五分其長以其一為之圍小於度謂之無任註曰任正者謂輿下三面材持車正者也輈軓前十尺與隧四尺四寸凡丈四尺四寸則任正之圍尺四寸五分寸之二衡任者謂兩軛之間也兵車乗車衡圍一尺三寸五分寸之一無任言不勝其任疏曰名任正者此木任力車輿所取正以其兩輢之所樹於此木較式依於兩輢故曰任正也衡任謂兩軛之間當輈頸之處費力之所者也軛於革反勝音升五分其軫間以其一為之軸圍註曰軸圍亦一尺三寸五分寸之一與衡任相應疏曰軫間即輿廣與衡長俱六尺六寸十分其輈之長以其一為之當兔之圍註曰輈當伏兔者也亦圍尺四寸五分寸之二與任正者相應疏曰當兔謂輿下當横軸之處參分其兔圍去一以為頸圍註曰頸前持衡者圍九寸十五分寸之九趙氏曰疏云衡在輈頸之下其頸於前向下持制衡鬲之轅觀向下二字知輈過頸處又低下去禮書亦云輈從軓前㣲曲而上至衡則向下勾之五分其頸圍去一以為踵圍註曰踵後承軫者也圍七寸七十五分寸之五十一凡揉輈欲其孫而無弧深註曰孫順理也弧木弓也凡弓引之中參中參深之極也揉輈之倨句如二可也如三則深傷其力疏曰揉者以火揉使曲也揉之欲使順理無得如弓之深弓之深太曲也今夫大車之轅摰其登又難既克其登其覆車也必易此無故惟轅直且無橈也註曰大車牛車也摯輖也登上阪也克能也疏曰牛車自在下車人今於此説大車者輈人造輈主為四馬車轅因説駕牛者亦須曲橈之意王光逺曰摰言其至謂其勢直而下至也是故大車平地既節軒摰之任及其登阤不伏其轅必縊其牛此無故惟轅直且無橈也註曰阤阪也王光逺曰軒言其高而上干摰言其輊而下至既節軒摯之任則高下適中而無上干下至之患坡謂登阤之時轅直而柔則牛挽而下之必伏其轅轅堅牛挽之不下則組急而縊牛頸以意度之自見故登阤者倍任者也猶能以登及其下阤也不援其邸必緧其牛後此無故惟轅直且無橈也註曰倍任用力倍也王光逺曰由此觀之則轅雖不可以過曲亦不可以不曲此輈之三度所以其深皆有常數也坡謂援拔也邸大車後也下阤之時苟轅直無橈牛行急則必拔車後而覆之牛行緩則必緧絆牛後亦能覆車度之亦見孫音遜弧音胡覆芳服反易以䜴反橈音閙邸丁禮反緧音秋縊於計反輖音周輊音智是故輈欲頎典註曰頎典堅刃貌鄭司農云頎讀為懇典讀為殄駟車之轅率尺所一縳懇典似謂此也疏曰此已下還説駟馬車轅輈深則折淺則負註曰揉之太深傷其力馬倚之則折也揉之淺則馬善負之輈注則利準利準則久和則安註曰故書準作水鄭司農云注則利水謂轅脊上雨注令水去利也𤣥謂利水重讀似非也注則利謂輈之揉者形如注星則利也準則久謂輈之在輿下者平如準則能久也和則安注與準者和人乗之則安坡謂注星張星也輈欲弧而無折經而無絶註曰揉輈太深則折也經亦謂順理也進則與馬謀退則與人謀註曰言進退之易與人馬之意相應馬行主於進人則有當退時王光逺曰馬所以駕車車之進則以馬行為主故進則與馬謀人所以馭馬車之退則以人馭為主故退則與人謀終日馳騁左不楗註曰杜子春云楗讀為蹇左面不便馬苦蹇輈調善則馬不蹇也書楗或作劵𤣥謂劵今倦字也輈和則久馳騁載在左者不罷倦尊者在左行數千里馬不契需註曰鄭司農云契讀為爰契我龜之契需讀為畏需之需謂不傷蹄不需道里終嵗御衣衽不敝註曰衽謂裳也此唯輈之和也註曰和則安是以然也謂進則與馬謀而下毛氏曰終日馳騁一日之事也行數千里一月之事也終嵗御一嵗之事也一日之間左可楗而不楗一月之間馬可病而不病一嵗之間衣可敝而不敝豈非輈之和而然歟上曰和則安所謂安者非特君子安乘而已馬與御者皆安焉是之謂安勸登馬力註曰登上也輈和勸馬用力馬力既竭輈猶能一取焉註曰馬止輈尚能一前取道喻易進頎苦狠反典音殄楗音倦契苦結反罷音皮良輈環灂自伏兔不至軓七寸軓中有灂謂之國輈註曰伏兔至軓蓋如式深兵車乗車式深尺四寸三分寸之二灂下至軓七寸則是半有灂也輈有筋膠之被用力均者則灂逺鄭司農云灂讀為灂酒之灂環灂謂漆沂鄂如環疏曰自伏兔不至軓七寸者是從内向外之言更云軓中有灂則七寸外軓内乃有灂灂子肖反一音在學反沂魚巾反軫之方也以象地也蓋之圜也以象天也輪輻三十以象日月也蓋弓二十有八以象星也註曰輪象日月者以其運行也日月三十日而合宿龍旂九斿以象大火也註曰交龍為旂諸侯之所建也大火蒼龍宿之心其屬有尾尾九星疏曰自此以下為上造車車上皆建旌旂故因説斿旗之義也然此以下九斿七斿六斿四斿之旌旗皆謂天子自建非謂臣下知者以此九七六四不與臣下命相當故也若臣下則皆依命數然天子以十二為節而今有九七六四者蓋謂上得兼下也鳥旟七斿以象鶉火也註曰鳥隼為旟州里之所建鶉火朱鳥宿之桞其屬有星星七星熊旗六斿以象伐也註曰熊虎為旗師都之所建伐屬白虎宿與參連體而六星龜蛇四斿以象營室也註曰龜蛇為旐縣鄙之所建營室𤣥武宿與東璧連體而四星陳用之曰旂以交龍所以寓其仁旟以鳥隼所以寓其禮而其數以九以七者為其主陽也旗以熊虎所以寓其義旐以龜蛇所以寓其智而其數以六以四者為其主陰也弧旌枉矢以象弧也註曰覲禮曰侯氏載龍旂弧韣則星旗之屬皆有弧也弧以張縿之幅有衣謂之韣又為設矢象弧星有矢也妖星有枉矢者蛇行有尾因此云枉矢蓋畫之劉執中曰龍旂以下皆所以象徳也有徳必有威故繼之以弧旌枉矢以象弧也斿音留伐扶廢反宿音秀韣音獨縿所銜反攻金之工築氏執下齊冶氏執上齊鳬氏為聲㮚氏為量段氏為鎛器桃氏為刃註曰多錫為下齊大刃削殺矢鑒燧也少錫為上齊鍾鼎斧斤戈㦸也聲鍾錞于之屬量豆區鬴也鎛器田器錢鎛之屬刃大刃刀劍之屬疏曰下齊上齊據下文六等言之四分已上為上齊三分已下為下齊若然鳬氏入上齊桃氏入下齊其㮚氏段氏亦當入上齊中齊才細反段丁亂反錞音淳區烏侯反鬴音輔錢子淺反金有六齊註曰目和金之品數六分其金而錫居一謂之鍾鼎之齊五分其金而錫居一謂之斧斤之齊四分其金而錫居一謂之戈㦸之齊參分其金而錫居一謂之大刃之齊五分其金而錫居二謂之削殺矢之齊金錫半謂之鑒燧之齊註曰鑒燧取水火於日月之器也鑒亦鏡也凡金多錫則忍白且明也鄭剛中曰攻金之工獨無為鼎為斧斤為鑒燧之工鼎亦鍾之屬可附於鳬氏之官斧斤亦上齊可附於戈㦸之列鑒燧獨無所可附意者自有鑒燧之工執中齊記者亡之爾忍柔忍之忍今作靭築氏為削長尺博寸合六而成規註曰今之書刀疏曰漢時蔡倫造紙秦蒙恬造筆古者未有紙筆則以削刻字至漢雖有紙筆仍有書刀是古之遺灋也若然則經削反張為之若弓之反張以合九合七合五成規也欲新而無窮註曰謂其利也鄭司農云常如新無窮已敝盡而無惡註曰鄭司農云謂鋒鍔俱盡不偏索也𤣥謂刄也脊也其金如一雖至敝盡無瑕惡也冶氏為殺矢刃長寸圍寸鋌十之重三垸註曰殺矢與戈㦸異齊而同其工似補脱誤在此也殺矢用諸田獵之矢也鋌讀如麥秀鋌之鋌鄭司農云鋌箭足入稾中者也垸量名讀為丸坡謂為殺矢四句當屬上築氏敝盡無惡之下錯簡在此耳蓋削殺矢皆下齊而築氏之所執觀上序可見矣鋌徒頂反垸音丸戈廣二寸内倍之胡三之援四之註曰戈今句孑㦸也或謂之鷄鳴或謂之擁頸内謂胡以内接柲者也長四寸胡六寸援八寸鄭司農云援直刃也胡其孑趙氏曰戈㦸皆刺兵也戈二刃㦸三刃戈小而㦸大㦸兵器之最健者其别於戈以此内謂胡下接柲處正是鐵筒子入木柄者這裏面謂之内胡謂矛之旁出者援謂自柲直至上尖頭刺刃也戈廣二寸總内與援與胡言三者皆徑廣二寸内倍之其長四寸胡三之其長六寸援四之其長八寸已倨則不入已句則不決長内則折前短内則不疾註曰戈句兵也主於胡也已倨謂胡㣲直而邪多也以啄人則不入已句謂胡曲多也以啄人則創不決胡之曲直鋒本必横而取圜於磬折前謂援也内長則援短援短則曲於磬折曲於磬折則引之與胡竝鉤内短則援長援長則倨於磬折倨於磬折則引之不疾疏曰已倨謂胡頭大舒已句謂胡大横也胡孑横捷㣲邪向上不倨不句似磬之折殺也内四寸援八寸竝有定數若胡内長則胡向上侵援援無八寸則短矣短則胡向上近援胡頭低則胡曲於磬折也胡既與援近故援共胡竝鉤竝鉤則援折故云折前也胡内本四寸今胡近下為之胡下無四寸則上援長踰八寸矣胡近下安之則頭舒則胡倨於磬折也以頭舒故引之不疾是故倨句外博註曰博廣也倨之外胡之裏也句之外胡之表也廣其本以除四病而便用也俗謂之曼胡似此疏曰倨謂胡上句謂胡下倨與句皆有外廣倨之外胡之裏謂胡下近本增使廣句之外胡之表謂於胡上近本增之使廣若然則胡本上下俱寛自然合於磬折無上四疾而便用矣重三鋝註曰鄭司農云鋝量名也讀為刷𤣥謂許叔重説文解字云鋝鍰也今東萊稱或以大半兩為鈞十鈞為環環重六兩大半兩鍰鋝似同矣則三鋝為一斤四兩援音袁句古侯反鋝色劣反孑音結柲音秘鍰戸關反㦸廣寸有半寸内三之胡四之援五之倨句中矩與刺重三鋝註曰㦸今三鋒㦸也内長四寸半胡長六寸援長七寸半三鋒者胡直中矩言正方也鄭司農云刺謂援也𤣥謂刺者著柲直前如鐏者也㦸胡横貫之胡中矩則援之外句磬折與疏曰刺謂於援胡之横上中使出者也但長短無文蓋與胡同六寸乃可充三鋝之數也胡六寸横貫三寸直下三寸是胡中矩也援七寸半亦以三寸為横稍舉之使不中矩以四寸半者向上為磬折磬折向外故云外句中丁仲反刺七賜反鐏祖悶反桃氏為劍臘廣二寸有寸半註曰臘謂兩刃兩從半之註曰鄭司農云謂劍脊兩面殺趨鍔趙氏曰半之自脊分斷一邉廣一寸四分寸之一以其臘廣為之莖圍長倍之鄭剛中曰莖者劍鐔也柄謂之夾莖者人所把握之處在夾之中如竹木之莖然故名曰莖長倍之則長五寸中其莖設其後註曰鄭司農云中謂穿之也𤣥謂從中以郤稍大之也後大則於把易制參分其臘廣去一以為首廣而圍之註曰首圍其徑一寸三分寸之二疏曰此首廣謂劍把接刃處之徑也圍之謂圜之故廬人皆以圍為圜之也臘力闔反莖戸耕反鐔音尋一音徒南反把音覇身長五其莖長重九鋝謂之上制上士服之身長四其莖長重七鋝謂之中制中士服之身長三其莖長重五鋝謂之下制下士服之註曰上制長三尺重三斤十二兩中制長二尺五寸重二斤十四兩三分兩之二下制長二尺重二斤一兩三分兩之一此今之匕首也人各以其形貌大小帶之此士謂國勇力之士能用五兵者也樂記曰武王克商裨冕搢笏而虎賁之士説劍説吐活反鳬氏為鍾陳用之曰鳬氏為鍾而記序言為聲者蓋凡為樂器以十二聲為之齊量而十二聲皆主於鍾故也兩欒謂之銑註曰銑鍾口兩角疏曰古之樂器應律之鍾狀如今之鈴不圜故有兩角銑間謂之于于上謂之鼓鼓上謂之鉦鉦上謂之舞註曰此四名者鍾體也鄭司農云于鍾脣之上袪也鼓所擊處鄭剛中曰鍾口兩間名于謂之袪者以鍾脣厚褰袪然舞上謂之甬甬上謂之衡註曰此二名者鍾柄鍾縣謂之旋旋蟲謂之幹註曰旋屬鍾柄所以縣之也鄭司農云旋蟲者旋以蟲為飾也𤣥謂今時旋有蹲熊盤龍辟邪鍾帶謂之篆篆間謂之枚枚謂之景註曰帶所以介其名也介在于鼓鉦舞甬衡之間凡四鄭司農云枚鍾乳也𤣥謂今時鍾乳俠鼓與舞每處有九面三十六疏曰舉漢灋一帶有九古灋亦當然鍾有兩面面皆三十六也于上之攠謂之隧註曰攠所擊之處攠弊也隧在鼓中窐而生光有似夫隧欒力端反銑先典反鉦音征甬音勇篆直轉反攠音靡隧音遂袪􅉌書反褰音愆蹲音存辟邪獸名上音僻下似嗟反俠同夾窐於蛙反十分其銑去二以為鉦以其鉦為之銑間去二分以為之鼓間以其鼓間為之舞脩去二分以為舞廣註曰此言鉦之徑居銑徑之八而銑間與鉦之徑相應鼓間又居銑徑之六與舞脩相應舞脩舞徑也舞上下促以横為脩從為廣舞廣四分今亦去徑之二分以為之間則舞間之方恒居銑之四也舞間方四則鼓間六亦其方也鼓六鉦六舞四此鍾口十者其長十六也鍾之大數以律為度廣長與圜徑假設之耳其鑄之則各隨鍾之制為長短大小也凡言間者亦為從篆以介之鉦間亦當六今時鍾或無鉦間坡謂鍾有三層銑與鼓同一層鉦一層舞一層假如銑徑一尺去二分以為銑間因於銑間内去二分以為鼓間此一層也鉦徑八分去二分以為鉦間此二層也舞徑六分去二分以為舞廣三層也鍾弇上侈下分數如此註自明矣以其鉦之長為之甬長註曰幷衡數也以其甬長為之圍參分其圍去一以為衡圍註曰衡居甬上又小疏曰以自兩欒已上至甬皆下寛上狹衡又在甬上故宜小一分參分其甬長二在上一在下以設其旋註曰令衡居一分則參分旋亦二在上一在下以旋當甬之中央是其正從子容反薄厚之所震動清濁之所由出侈弇之所由興有説註曰説猶意也故書侈作移鄭司農云當為侈坡謂上詳鍾之形制此則言其器已成則厚薄清濁弇侈之聲皆生於此蓋泛言聲出於器非言其病也有説二字宜連下文為句鍾已厚則石註曰大厚則聲不𤼵已薄則播註曰大薄則聲散侈則柞註曰柞讀為咋咋然之咋聲大外也弇則鬱註曰聲不舒揚長甬則震註曰鍾掉則聲不正疏曰典同云薄聲甄甄猶掉也掉者據鍾形薄此不據鍾體據甬長縣之不得所則鍾掉故聲不正也坡謂此乃言其病也蓋大鍾宜厚小宜薄鍾上宜狹下宜寛厚薄侈弇所不可無者但過則為病不言清濁者不外於此也柞側百反註咋同大音太下同大鍾如字是故大鍾十分其鼓間以其一為之厚小鍾十分其鉦間以其一為之厚註曰言若此則不石不播也鼓鉦之間同方六而今宜異又十分之一猶大厚皆非也若言鼓外鉦外則近之鼓外二鉦外一坡謂鼓與銑同間鼓間即銑間也銑間八鉦間六則大小鍾之厚薄異矣此言欲去其病當厚薄中灋也鍾大而短則其聲疾而短聞註曰淺則躁躁易竭也鍾小而長則其聲舒而逺聞註曰深則安安難息坡謂此言欲去其病當長短中度也不言其制者上文自銑至衡長短詳矣故惟言不合者以為戒為遂六分其厚以其一為之深而圜之註曰厚鍾厚深謂窐之也其窐圜㮚氏為量改煎金錫則不耗註曰消湅之精不復減也㮚古文或作歴𤣥謂量當與鍾鼎同齊工異者大器鄭剛中曰改煎者煎而又煎也不耗然後權之註曰權謂稱分之也雖異灋用金必齊疏曰灋謂模權之然後準之註曰準擊平正之又當齊大小鄭剛中曰準是準其金錫六分金一分錫準其多少也準平也知其輕重又欲平其多寡準之然後量之註曰鑄之於灋中也量讀如量人之量疏曰此量謂既準訖量金汁以入模中鑄作之時也為量音亮註謂量同餘量之及註量人等竝音良涷音練同齊才計反餘如字量之以為鬴深尺内方尺而圜其外其實一鬴註曰以其容為之名也四升曰豆四豆曰區四區曰鬴鬴六斗四升也鬴十則鍾方尺積千寸於今粟米灋少二升八十一分升之二十二其數必容鬴此言内方耳圜其外者謂之脣蔡氏曰案周鬴容六斗四升實一千二百八十龠計一百三萬六千八百分為一千三十六寸八分嘗考漢斛容十斗實二千龠計一百六十二萬分為一千六百二十寸蓋方尺圜其外庣旁九􅁵五毫故羃百六十二寸深尺積一千六百二十寸今攷周家八寸十寸皆為尺范蜀公曰周鬴方尺者八寸之尺深尺者十寸之尺方八寸圓其外庣其旁則羃一百三寸六分八􅁵深十寸則積一千三十六寸八分與漢斛同灋無疑也鄭氏云方尺積千寸又云圓其外者謂之脣二説皆非是方鄭之世漢斛尚在豈偶不及見與抑鄭氏以為周鬴之制異於漢斛與其臋一寸其實一豆註曰臋謂覆之其底深一寸也其耳三寸其實一升註曰耳在旁可舉也重一鈞註曰重三十斤其聲中黄鍾之宮註曰應律之首疏曰不直言中黄鍾之聲而云之宮者子上有宮商角徴羽五聲具今之所中者中其宮聲不中商角之等故以宮言之也槩而不税註曰鄭司農云令百姓得以量而不租税疏曰此官量鎮在市司所以勘當諸廛之量器以取平非是尋常所用故不税臋徒門反中丁丈反槩古愛反區烏侯反龠音藥庣音祧羃莫狄反覆方服反其銘曰時文思索允臻其極註曰銘刻之也時是也允信也臻至也極中也言是文徳之君思求可以為民立灋者而作此量信至於道之中嘉量既成以觀四國註曰以觀示四方使倣象之永啓厥後兹器維則註曰永長也厥其也兹此也又長啓道其子孫使灋則此器長用之索所白反觀古玩反啓道音導凡鑄金之狀註曰杜子春云狀謂鑄金之形狀金與錫黒濁之氣竭黄白次之黄白之氣竭青白次之青白之氣竭青氣次之然後可鑄也註曰消涷金錫精麤之候疏曰此鑄冶所候烟氣以知生熟之節段氏闕函人為甲犀甲七屬兕甲六屬合甲五屬註曰屬讀如灌注之注謂上旅下旅札續之數也革堅者札長鄭司農云合甲削革裏肉但取其表合以為甲疏曰一葉為一札上旅之中續札七節六節五節下旅之中亦有此節犀甲壽百年兕甲壽二百年合甲壽三百年註曰革堅者又支久屬音注凡為甲必先為容註曰服者之形容也鄭司農云容謂象式疏曰凡造衣甲須稱形大小長短而為之然後制革註曰裁制札之廣袤權其上旅與其下旅而重若一註曰鄭司農云上旅謂要以上下旅謂要以下疏曰謂札葉為旅者以札衆多故言旅旅即衆也以其長為之圍註曰圍謂札要廣厚疏曰此據一札之上先量上下之長乃以長中央圍之一帀如此則長短廣狹相稱也要於遙反帀音浹凡甲鍛不摰則不堅已敝則橈註曰鄭司農云鍛鍛革也摯謂質也鍛革大孰則革敝無强曲橈也𤣥謂摯之言致疏曰摯謂孰之至極也鍛丁亂反摯音至大音太凡察革之道眂其鑽空欲其惌也註曰鄭司農云惌小孔貌惌讀為宛彼北林之宛眂其裏欲其易也鄭剛中曰易者治之精而無敗薉也與孟子百畝不易之易同眂其朕欲其直也註曰鄭司農云朕謂革制坡謂線縫處曰朕櫜之欲其約也註曰鄭司農云謂卷置櫜中也春秋𫝊曰櫜甲而見子南疏曰櫜甲衣趙氏曰此是革鍛至軟熟故巻時甚少如此革宻緻而能周革内更無少生硬之處故下文曰周也舉而眂之欲其豐也註曰豐大衣之欲其無齘也註曰鄭司農云齘謂如齒齘疏曰人之齒齘前郤不齊札葉參差與之相似故以齘為喻眂其鑽空而惌則革堅也眂其裏而易則材更也眂其朕而直則制善也櫜之而約則周也舉之而豐則明也衣之無齘則變也註曰周宻致也明有光耀鄭司農云更善也變隨人身便利鄭剛中曰材不更則裏不易裏之易則知其材之累更鍛治也又曰朕之直者必其裁制之盡善鑽作官反空音孔惌於阮反易以豉反朕直忍反櫜音羔衣於既反齘戸界反更音庚硬額去聲鮑人之事註曰鮑故書或作鞄鄭司農云蒼頡篇有鞄􅠙望而眂之欲其荼白也註曰韋革逺眂之當如茅莠之色進而握之欲其柔而滑也註曰謂親手煩撋之卷而摶之欲其無迆也註曰鄭司農云卷讀為可卷而懐之卷摶讀為縳一如瑱之縳謂卷縳韋革也迆讀為既見而迆之之迆無迆謂革不眂其著欲其淺也註曰韋革調善者鋪著之雖厚如薄然察其線欲其藏也註曰線杜子春云謂縫革之縷鄭剛中曰革若堅縮則受縷也必没而不露其線若藏則革之堅縮可知荼音徒摶直轉反註縳同著直略反鞄匹學反􅠙人兖反撋人專反瑱他見反音奎線思賤反革欲其荼白而疾澣之則堅註曰鄭司農云韋革不欲久居水中趙氏曰此革既欲荼白又欲柔滑則知不為甲明矣又甲用生皮鮑人乃熟皮鮑人之革諒是為裏轂矢箙韠舃之類要柔白皮方可用韋氏郤是工於穿縳皮條為韋弁等物欲其柔滑而腛脂之則需註曰故書需作􅧶鄭司農云腛讀如沾渥之渥􅧶讀為柔需之需謂厚脂之韋革柔需引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若苟一方緩一方急則及其用之也必自其急者先裂若苟自急者先裂則是以博為帴也註曰鄭司農云帴讀為翦謂以廣為狹也鄭剛中曰革體既博一方先裂不可棄也必裁去其裂者而用其不裂者則壞廣為狹也故曰以博為帴毛氏曰引而信之以下數句當在卷而摶之之下脱誤在此卷而摶之而不迆則厚薄序也註曰序舒也謂其革均也眂其著而淺則革信也註曰信無縮緩察其線而藏則雖敝不甐註曰鄭司農云甐讀為磨而不磷之磷謂韋革縫縷没藏於韋革中則雖敝縷不傷也澣戸管反腛於角反註渥同需人兖反信音申帴音踐韠音必舃音昔􅧶而髓反甐音吝韗人為臯陶註曰鄭司農云韗書或為􅕦臯陶鼓木也𤣥謂􅕦者以臯陶名官也􅕦則陶字從革長六尺有六寸左右端廣六寸中尺厚三寸註曰版中廣頭狹為穹隆也鄭司農云謂鼓木一判者其兩端廣六寸而其中央廣尺也如此乃得有腹穹者三之一註曰鄭司農云穹讀為志無空邪之空謂鼓木腹穹隆者居鼓三之一也𤣥謂穹讀如穹蒼之穹穹隆者居鼔面三分之一則其鼓四尺者版穹一尺三寸三分寸之一也倍之為二尺六寸三分寸之二加鼓四尺穹之徑六尺六寸三分寸之二也此鼓合二十版上三正註曰鄭司農云謂兩頭一平中央一平也𤣥謂三讀為參正直也參直者穹上一直兩端又直各居二尺二寸不弧曲也此鼓兩面以六鼔差之賈侍中云晉鼓大而短近晉鼓也以晉鼓鼓金奏韗音運陶徒刀反穹區邕反上三之三七南反􅕦音陶鼓長八尺鼓四尺中圍加三之一謂之鼖鼓註曰中圍加三之一者加於面之圍以三分之一也面四尺其圍十二尺加以三分一四尺則中圍十六尺徑五尺三寸三分寸之一也今亦合二十版則版穹六寸三分寸之二耳大鼓謂之鼖以鼖鼓鼓軍事鄭司農云鼓四尺謂革所蒙者廣四尺疏曰中圍加三之一與上穹三之一者異彼據一相之穹加面三之一故兩相加二尺六寸三分寸二此則於面四尺總加三分之一則總一尺三寸三分寸一此穹隆少校晉鼓之半也版穹六寸三分寸二者亦據一相而言鼖扶云反為臯鼓長尋有四尺鼓四尺倨句磬折註曰以臯鼓鼓役事磬折中曲之不參正也中圍與鼖鼓同以磬折為異疏曰磬折者麤處近上不得參正也陳用之曰鼓之名多矣此所記者二而已蓋此一篇或言其鼓之制或言其鼓木之制或舉中圍以見上下使後人可觸類而長之然則雷鼓靈鼓之大鼙鼓鼗鼓之小皆可知矣凡冒鼓必以啓蟄之日註曰啓蟄孟春之中也蟄蟲始聞雷聲而動鼓所取象也冐蒙鼓以革良鼓瑕如積環鄭剛中曰瑕者漆之文理也冒鼓之革苟調而急則漆之也其瑕如累積玉環然鼓大而短則其聲疾而短聞鼓小而長則其聲舒而逺聞韋氏闕趙氏説見鮑人裘氏闕易彦祥曰裘氏篇亡亦不可攷然天官掌皮為大裘以至良裘功裘此經復有裘氏亦猶春官有典瑞此經復有玉人或者裘氏掌其制而掌皮言其用畫繢之事雜五色陳用之曰畫為之畫而已繢為之㑹五采焉鄭剛中曰色别有六獨言五色者自其辨而言之則𤣥淺而黑深故六自其體而言之初不甚相逺也故特以雜五色言焉畫胡卦反繢胡對反東方謂之青南方謂之赤西方謂之白北方謂之黑天謂之𤣥地謂之黄青與白相次也赤與黒相次也𤣥與黄相次也註曰此言畫繢六色所象及布采之次第繢以為衣疏曰青與白相次以下論繢於衣為對方之灋也易彦祥曰相次非次序之謂亦雜比以為設色之美而已青與赤謂之文赤與白謂之章白與黑謂之黼黑與青謂之黻五采備謂之繡註曰此言刺繡采所用繡以為裳疏曰此一經皆比方為繡次凡繡亦須畫乃刺之故畫繡二工共其職也易彦祥曰書言六章之裳宗彝藻火粉米黼黻絺繡言藻而繼之以火青與赤之文也言火而繼之以粉米赤與白之章也言粉米而繼之以黼白與黑之黼也言黼而繼之以黻黑與青之黻也惟黄之色無所見而宗彝繡以虎蜼則亦以黄為色兹實五采備之證蜼音誄土以黄其象方天時變註曰古人之象無天地也為此記者見時有之耳子家駒曰天子僭天意亦是也鄭司農云天時變謂畫天隨四時也火以圜註曰鄭司農云為圜形如火也𤣥謂形如半環然在裳山以章註曰章讀為獐獐山物也在衣齊人謂麇為獐趙氏曰章是山之草木星辰天之章草木地之章畫山雖有形須畫出草木之文而成章水以龍註曰龍水物在衣鳥獸蛇註曰所謂華蟲也在衣蟲之毛鱗有文采者疏曰言華者象章華言蟲者是有生之總號言鳥以其有翼言獸以其有毛言蛇以其有鱗以首似鷩亦謂之鷩冕也雜四時五色之位以章之謂之巧註曰章明也繢繡皆用五采鮮明之是為巧獐音章麇俱倫反鷩必列反凡畫繢之事後素功註曰素白采也後布之為其易漬汙也不言繡繡以絲也鄭司農説以論語曰繢事後素鍾氏染羽以朱湛丹秫三月而熾之註曰鄭司農云湛漬也丹秫赤粟𤣥謂湛讀如漸車帷裳之漸熾炊也羽所以飾旌旗及王后之車淳而漬之註曰淳沃也以炊下湯沃其熾烝之以漬羽漬猶染也三入為纁五入為緅七入為緇註曰染纁者三入而成又再染以黑則為緅緅今禮俗文作爵言如爵頭色也又復再染以黒乃成緇矣鄭司農云以論語曰君子不以紺緅飾又曰緇衣羔裘爾雅曰一染謂之縓再染謂之竀三染謂之纁詩云緇衣之宜兮𤣥謂此同色耳染布帛者染人掌之凡𤣥色者在緅緇之間其六入者與鄭剛中曰設色之工五畫繢鍾筐㡛今以天官染人攷之春暴練者其㡛氏歟夏纁𤣥者其鍾氏歟若夫染夏雖不見於考工而經有五采備之文不然其筐人之職乎湛子潛反秫音述淳章均反纁許云反緅側留反縓音茜竀音頳筐人闕㡛氏湅絲以涚水漚其絲七日去地尺暴之註曰涚水以灰所泲水也漚漸也楚人曰漚齊人曰涹晝暴諸日夜宿諸井七日七夜是謂水涷註曰宿諸井縣井中㡛音芒涷音練涗書鋭反漚烏豆反暴步卜反泲子禮反涹烏禾反縣音懸涷帛以欄為灰渥淳其帛實諸澤器淫之以蜃註曰渥讀如鄫人渥菅之渥以欄木之灰漸釋其帛也杜子春云淫當為涅書亦或為湛鄭司農云澤器謂滑澤之器蜃謂灰也士冠禮曰素積白屨以魁柎之説曰魁蛤也周官亦有白盛之蜃蜃蛤也𤣥謂淫薄粉之令帛白蛤今海旁有焉趙氏曰淳沃也渥漬之使厚也毛氏曰以欄為灰變生而熟以蜃為灰變質而白坡謂欄似欒欒似白槿而細華黄清其灰而盝之而揮之註曰清澄也於灰澄而出盝晞之晞而揮去其蜃而沃之而盝之而塗之而宿之註曰更渥淳之王光逺曰塗之塗以蜃灰宿經宿明日沃而盝之註曰朝更沃至夕盝之又更沃至旦盝之亦七日如漚絲也晝暴諸日夜宿諸井七日七夜是謂水湅欄音練一音蘭渥與漚同烏豆反盝音鹿柎方于反蛤古盍反晞音希周禮述註卷二十三
