body:
  text: 周禮述註卷三安溪李光坡撰膳夫掌王之食飲膳羞以養王及后世子註曰食飯也飲酒漿也膳牲肉也羞有滋味者凡養之具大畧有四疏曰養王及后世子舉尊者而言其實羣臣及三夫人以下亦養之食音嗣註同凡王之饋註曰進物於尊者曰饋此饋之盛者王舉之饌也史直翁曰饋者儲之一歲之間隨所欲食而進之非謂一日之奉而咸備食前也食用六穀膳用六牲飲用六清羞用百有二十品珍用八物醬用百有二十罋註曰六牲馬牛羊豕犬雞也羞出于牲及禽獸以備滋味謂之庶羞公食大夫禮内則下大夫十六上大夫二十其物數備焉天子諸侯有其數而物未得盡聞珍謂淳熬淳母炮豚炮牂𢷬珍漬熬肝膋也醬謂醯醢也王舉則醢人共醢六十罋以五齏七醢七菹三臡實之醯人共齏菹醯物六十罋鄭司農云羞進也六穀稌黍稷􅆝麥苽苽雕胡也六清水漿醴䣼醫酏食音嗣註同罋屋貢反熬五刀反毋莫胡反牂作郎反膋力雕反齏作西反臡奴兮反稌音杜苽古呉反䣼力涼反醫於計反酏以支反王日一舉鼎十有二物皆有俎殺牲盛􅄿曰舉王日一舉以朝食也后與王同庖鼎十有二牢鼎九牛羊豕魚腊腸胃同鼎膚鮮魚鮮腊陪鼎三膷臐膮竝陪牛羊豕鼎後物謂牢鼎之實唯牢實各在俎陪鼎三者為庶羞則在豆趙商問王日一舉鼎十有二是為三牲備焉案玉藻天子日食少牢朔月大牢禮數不同請聞其説鄭答曰禮記後人所集據時而言或以諸侯同天子或以天子與諸侯等禮數不同難以據也王制之灋與禮違者多當以經為正以樂侑食膳夫授祭品嘗食王乃食侑猶勸也王制云天子食日舉以樂祭謂刌肺脊也禮飲食必祭示有所先品者每物皆嘗之道尊者也朱子曰古人祭酒於地祭食於豆間有版盛之卒食撤去卒食以樂徹于造疏曰造作也作食之處即厨是也徹食器之時樂章未聞王齊日三舉疏曰齊謂散齊致齊齊必變食故加牲體至三大牢玉藻云朔日加日食一等則於此朔食當兩大牢不言之者文不具齊時不樂故不言以樂侑食也大喪則不舉大荒則不舉大札則不舉天地有烖則不舉邦有大故則不舉註曰大荒凶年大札疫癘也天烖日月晦食地烖崩動也大故寇戎之事及刑殺也王燕食則奉膳贊祭註曰燕食謂日中與夕食奉膳奉朝之餘膳所祭者牢肉齊音齋註同烖音災刌寸本反凡王祭祀賓客食則徹王之胙俎註曰膳夫親徹胙俎胙俎最尊也其餘則其屬徹之疏曰祭祀謂祭宗廟有胙俎者謂若特牲少牢主人受尸酢尸東西面設主人俎于席前王受尸酢禮亦當然賓客食王與賔客禮食于廟賓在户牖之間王在阼階上各有􅄿皆設俎故亦有胙俎案公食大夫主君與聘大夫禮食賓前有席君前無席退俟于廂此天子于諸侯異于諸侯與聘大夫故王前有俎公食之食音嗣凡王之稍事設薦脯醢註曰稍事有小事而飲酒王燕飲酒則為獻主註曰鄭司農云主人當獻賓則膳夫代王為主君不敵臣也燕義曰使宰夫為獻主臣莫敢與君亢禮掌后及世子之膳羞註曰亦主其􅄿之數不饋之耳疏曰内饔共后及世子之膳羞則后世子内饔饋之凡肉脩之頒賜皆掌之註曰加薑桂鍛治者謂之脩加薑桂以鹽乾之者謂之脯鍛多貫反凡祭祀之致福者受而膳之註曰致福謂諸臣祭祀進其餘肉歸胙于王薛士龍曰夏官祭僕凡祭祀之致福展而受之則膳夫之所受受于祭僕也以摰見者亦如之註曰鄭司農云以羔鴈雉為摰者亦受以給王膳薛士龍曰夏官司士掌擯士者膳其摰則膳夫之所受受于司士也歲終則會唯王及后世子之膳不㑹註曰不㑹計多少優尊者其頒賜諸臣則計之坡謂大府職云闗市之賦以共王之膳服末云歲終則以貨賄之入出㑹之是凡貢賦及九式皆會未嘗别言王之膳服不會也然則膳夫不會王后世子之膳外府不會王后之服以會之在大府耳豈可動引周官唯王不㑹哉㑹古外反庖人掌共六畜六獸六禽辨其名物六畜六牲也始養之曰畜將用之曰牲春秋傳曰卜日曰牲六獸麋鹿狼麕野豖兔六禽羔豚犢麛雉鴈凡鳥獸未孕曰禽司馬職曰大獸公之小禽私之而宗伯以禽作六摰禽中有羔可見矣或曰鴈鶉鷃雉鳩鴿為六禽夏官校人羊人地官牛人春官雞人秋官犬人冬官豖人總送六畜與庖人六獸六禽即獸人送之庖人得此共與膳夫内外饔故云掌共也名號也物物色麕居倫反麛音迷鶉音純鷃於諫反鴿古合反凡其死生鱻薧之物以共王之膳與其薦羞之物及后世子之膳羞註曰凡計數之薦亦進也備品物曰薦致滋味乃為羞王言薦者味以不褻為尊鄭司農云鱻謂生肉薧謂乾肉鱻悉然反後同薧古老反後同共祭祀之好羞祭祀尋常所共者皆在内外饔此言好羞乃非常之物進之孝也共喪紀之庶羞賓客之禽獻註曰喪紀喪事之祭謂虞祔也禽獻獻禽于賓客疏曰凡喪未葬以前無問朝夕奠及大奠皆無薦羞之灋庶羞虞祔之祭乃有之凡令禽獻以灋授之其出入亦如之註曰令令獸人也禽獸不可久處賓客至將獻之庖人乃令獸人取之必書所當獻之數與之及其來致禽亦以此書校數之至于獻賓客又以此書付使者展而行之掌客乘禽于諸侯各如其命之數聘禮乘禽于客日如其饔餼之數士中日則二雙凡用禽獻春行羔豚膳膏香夏行腒鱐膳膏臊秋行犢麛膳膏腥冬行鱻羽膳膏羶註曰用禽獻謂煎和以獻于王膏香牛脂也腒乾雉鱐乾魚膏臊犬膏也膏腥雞膏也鱻魚也羽鴈也膏羶羊脂也羔䐁物生而肥犢與麛物成而克腒鱐暵熱而乾魚鴈水涸而性定此八物者得四時之氣尤盛為人食之弗勝是以用休廢之脂膏煎和膳之牛屬司徒土也雞屬宗伯木也犬屬司寇金也羊屬司馬火也疏曰言行者義與用同腒其居反鱐所留反臊素刀反羶書然反暵呼旱反歲終則會唯王及后之膳禽不會註曰膳禽四時所膳禽獻加世子可以㑹之内饔掌王及后世子膳羞之割亨煎和之事辨體名肉物辨百品味之物註曰割肆解肉也亨煮也煎和齊以五味體名脊脅肩臂之屬肉物胾燔之屬百品味庶羞之屬言百舉成數肆託厯反齊才細反王舉則陳其鼎俎以牲體實之陳其鼎俎者陳鼎有二處初陳鼎于鑊西取牲體于鑊以實鼎後陳鼎于阼階下其俎皆陳于鼎西南取于鼎以實俎實鼎曰脀實俎曰載選百羞醬物珍物以俟饋註曰先進食之時恒選擇其中御者鑊音穫脀職升反共后及世子之膳羞註曰膳夫掌之是乃共之辨腥臊羶香之不可食者牛夜鳴則庮羊泠毛而毳羶犬赤股而躁臊鳥皫色而沙鳴貍豕盲眡而交睫腥馬黑脊而般臂螻註曰腥臊羶香可食者是别其不可食者則所謂者皆臭味也泠毛長毳總結也皫失色不澤美也沙澌也交睫腥腥當為星聲之誤也肉有如米者似星般臂臂毛有文鄭司農云庮朽木臭也螻螻蛄臭也杜子春云盲眂當為望眂庮音由泠音零毳昌瑞反皫芳表反貍音鬱盲亡亮反睫音接般音班螻音樓别彼列反澌音西凡宗廟之祭祀掌割亨之事凡燕飲食亦如之凡掌共羞脩刑膴胖骨鱐以待共膳宗廟之祭祀者内饔不掌外神也言凡者謂四時及禘祫并月祭皆在其中掌割亨不言煎和者鬼神尚質不貴褻味燕飲與諸臣燕燕食日中及夕食也掌共共當為具羞庶羞也脩鍛脯也刑鉶羮也膴䐑肉大臠所以祭者胖半體骨牲體也鱐乾魚膴火呉反後同胖普半反鉶音刑䐑直輒反臠力轉反凡王之好賜肉脩則饔人共之註曰好賜王所善而賜也好呼報反外饔掌外祭祀之割亨共其脯脩刑膴陳其鼎俎實之牲體魚腊凡賓客之飱饔饗食之事亦如之外祭祀謂天地四望山川社稷五祀凡外神皆是也飱客始至之禮饔既將幣之禮致禮于客莫盛于饔食音嗣邦饗耆老孤子則掌其割亨之事饗士庶子亦如之耆老謂死事者之祖父兼有國老庶老孤子死事者之子也士庶子衛王宫者師役則掌共其獻賜脯肉之事註曰獻謂酌其長帥凡小喪紀陳其鼎俎而實之疏曰小喪紀謂夫人以下之喪陳其鼎俎者殷奠及虞祔之祭皆有鼎俎亨人掌共鼎鑊以給水火之齊註曰鑊所以煮肉及魚腊之器既熟乃脀于鼎齊多少之量疏曰謂實水于鑊及爨之以火皆有多少之齊職外内饔之爨亨煮辨膳羞之物註曰職主也爨今之竈主于其竈煮物疏曰膳羞則牢鼎之物也齊才細反祭祀共大羮鉶羮賓客亦如之疏曰大羮肉湆盛于登謂太古之羮不調以鹽菜及五味鉶羮者皆是陪鼎膷臐膮牛用藿羊用苦豖用薇調以五味盛之于鉶器即謂之鉶羮若盛之于豆即謂之庶羞賓客亦如之者謂致饔餼及飱皆有陪鼎則鉶羮也饗食亦應有大羮湆去及反盛音成甸師掌帥其屬而耕耨王藉以時入之以共齍盛註曰其屬府史胥徒也耨芸芓也王以孟春躬耕帝藉天子三推三公五推卿諸侯九推庶人終于千畝庶人謂徒三百人藉之言借也王一耕之而使庶人芸芓終之齍盛祭祀所用穀也粢稷也穀者稷為長是以名云在器曰盛疏曰以時入之者謂麥則夏熟禾黍秋熟則十月穫之送入地官神倉帥音率耨乃豆反齍音資芓音子推出誰反祭祀共蕭茅註曰鄭大夫云蕭字或為莤莤讀為縮束茅立之祭前沃酒其上酒滲下去若神飲之故謂之縮縮浚也杜子春讀為蕭蕭香蒿也𤣥謂詩所云取蕭祭脂郊特牲云蕭合黍稷臭陽達于牆屋故既薦然後焫蕭合馨香合馨香者是蕭之謂也茅以共祭之苴亦以縮酒苴以藉祭縮酒泲酒也醴齊縮酌疏曰蕭祭宗廟時有之共茅則内外之神俱用共野果蓏之薦註曰甸在逺郊之外郊外曰野果桃李之屬蓏瓜瓞之屬滲所鴆反焫如悦反苴音租泲子禮反齊才細反喪事代王受𤯝烖其義未詳王之同姓有辠則死刑焉註曰鄭司農云文王世子曰公族有死辠則磬于甸人又曰公族無宫刑獄成致刑于甸人又曰公族無宫刑不踐其類也刑于隱者不與國人慮兄弟眚生景反辠罪本字踐音翦帥其徒以薪蒸役外内饔之事註曰役為給役也木大曰薪小曰蒸獸人掌罟田獸辨其名物冬獻狼夏獻麋春秋獻獸物罟罔也狼似犬鋭頭白頰高前廣後山獸也山是聚故狼膏聚聚則温於冬獻之麋澤獸也澤主銷散故麋膏散散則涼于夏獻之皆以救時之苦也春秋寒温適凡獸皆可獻之時田則守罟時田謂四時田獵守罟者備獸觸罟而攫則取之及弊田令禽注于虞中弊止也注聚也弊田謂春火弊夏車弊秋羅弊冬徒弊虞中謂虞人釐所田之野及弊田植虞旗于其中致禽而弭焉獸人主令田衆得禽者置虞人所立虞旗之中當以給四時廟社之祭罟音古攫俱縳反釐音來凡祭祀喪紀賓客共其死獸生獸共其完者于庖人凡獸入于腊人使乾之以為脯脩不必皆完也皮毛筋角入于玉府註曰給作器物凡田獸者掌其政令凡田凡庶民之田也政令如豺祭獸然後田獵及不麛不卵之類􅈄人掌以時􅈄為梁註曰鄭司農云梁水偃也偃水為闗空以笱承其空詩曰敝笱在梁疏曰取魚之灋歲有五月令孟春云獺祭魚此時得取一也季春云薦鮪于寢廟二也鼈人云秋獻龜魚三也王制云獺祭魚然後虞人入澤梁與孝經緯云陰用事木葉落獺祭魚是十月得取魚四也獺則春冬二時祭魚也潛詩云季冬薦魚與月令季冬漁人始漁同五也惟夏不取魯語云宣公夏濫于泗淵里革諫之以其非時春獻王鮪鮪鱣屬頭小而鋭口在頷下王鮪鮪之大者出河南鞏縣至春浮陽乃入西河至漆沮上龍門故周人取以獻新獻所無也月令季春薦鮪于寢廟辨魚物為鱻薧以共王膳羞疏曰此所共者共于膳夫以共王鮪音委空音孔笱音苟鱣音旃頷戸感反鞏弓上聲凡祭祀賓客喪紀共其魚之鱻薧疏曰此所共者共内外饔以其膳夫即不掌祭祀之事凡􅈄者掌其政令凡􅈄征入于玉府疏曰近川澤之民于十月獺祭魚之時亦得取魚水族之類其中鬚骨之事堪飾器物者所有征税漁人收之入玉府鼈人掌取互物互物有甲介者謂龜鼈之屬以時簎魚鼈龜蜃凡貍物註曰蜃大蛤鄭司農云簎謂以杈刺泥中搏取之貍物龜鼈之屬自貍藏伏于泥中者𤣥謂貍物亦謂鱴刀含漿之屬疏曰以時即下春秋若然簎魚鼈據所取下經據所獻其時一也春獻龞蜃秋獻龜魚註曰此其出在淺處可得之時魚亦謂自貍藏簎勅角反蜃時軫反貍音埋杈音叉鱴音滅祭祀共蠯蠃蚳以授醢人蠯蜯也蠃螔蝓蚳蟻子白者可為醢蠯薄佳反蠃郎戈反蚳直其反蜯蒲項反螔音夷蝓音由掌凡邦之簎事腊人掌乾肉凡田獸之脯腊膴胖之事註曰大物解肆乾之謂之乾肉薄析曰脯棰之而施薑桂曰脩腊小物全乾疏曰趙商問掌乾肉而有膴胖何鄭答雖鮮亦屬腊人肆勅力反棰之蘂反凡祭祀共豆脯薦脯膴胖凡腊物註曰脯非豆實豆當為羞聲之誤也膴䐑肉大臠所以祭者坡謂有司徹曰加膴祭于其上是也胖半體也少牢曰司馬升羊右胖司士升豖右胖是也賓客喪紀共其脯腊凡乾肉之事疏曰此所共者共内外饔也醫師掌醫之政令聚毒藥以共醫事註曰毒藥藥之辛苦者藥之物恒多毒呉氏曰凡藥有有毒者有無毒者無毒所以療病有毒所以𤼵病而藥物之性隨四時而生死金石之性禀五行而厚薄其類不一其性必偏而人之身感陰陽寒暑之偏而有病病以偏而感藥以偏而用必相攻而後相濟用之不善則無毒者亦毒矣必欲醫者知用藥之之為毒而不敢輕辨君臣佐使之制調温涼燥濕之宜審表裏吐内之方達造化性命之理則雖毒不毒矣故其職以聚毒藥為主者重之也療力弔反内音納凡邦之有疾病者疕􅅑者造焉則使醫分而治之註曰疕頭瘍亦謂秃也身傷曰瘍分之者醫各有能疕匹婢反造七報反歲終則稽其醫事以制其食十全為上十失一次之十失二次之十失三次之十失四為下註曰食禄也全猶愈也以失四為下者五則半矣或不治自愈程子曰以十全為上非謂十人皆愈為上若十人不幸皆死則奈何但知可治不可治者十人皆中即為上耳中去聲食醫掌和王之六食六飲六膳百羞百醬八珍之齊疏曰六食已下皆膳夫所掌此主調和而已其六食等義竝在膳夫凡食齊眂春時羮齊眂夏時醬齊眂秋時飲齊眂冬時註曰飯宜温羮宜熱醬宜涼飲宜寒疏曰眂猶比也和胡臥反六食以下皆音嗣齊才細反下同凡和春多酸夏多苦秋多辛冬多鹹調以滑甘註曰各尚其時味而甘以成之猶水火金木之載于土内則曰棗栗飴蜜以甘之堇荁枌榆娩槁滫瀡以滑之史直翁曰非謂四時各専一味謂之多者就五味中使一味勝焉以養其氣也如春則肝用事用則勞勞則損損則四藏勝而疾生焉曲直作酸惟酸為主可以引諸味以益肝氣而使適平夏之苦秋之辛冬之鹹莫不皆然和胡臥反飴以之反堇音謹荁音桓枌符云反娩音問滫思酒反瀡相蘂反凡會膳食之宜牛宜稌羊宜黍豕宜稷犬宜􅆝鴈宜麥魚宜苽會成也謂其味相成牛味甘平稌稻也所謂芒種味苦而温此甘苦相成也羊味甘熱黍穀名苗似蘆高丈餘穂黒色實圓重味苦而温亦甘苦相成也豕牡者味酸牝者味苦稷亦穀也一名穄似黍而小或曰粟也味甘皆甘苦相成也犬味酸而温􅆝粟類有數色味甘而微寒此氣味相成也鴈味甘平大麥味酸而温小麥味甘微寒亦氣味相成也苽生澤中葉如蔗荻莖梗秋生米即茭苗米也魚族甚多寒熱酸苦俱有而宜苽者或同是水物食音嗣穄子計反蔗之夜反荻音敵梗音庚茭音交凡君子之食恒放焉註曰放猶依也疏曰上六食六飲一節為共王者不通放也自凡和以下至魚宜苽齊和相成之事雖以王為主君子大夫巳上亦依之放甫往反疾醫掌養萬民之疾病四時皆有癘疾春時有痟首疾夏時有痒疥疾秋時有瘧寒疾冬時有𠻳上氣疾註曰癘疾氣不和之疾痟酸削也首疾頭痛也嗽咳也上氣逆喘也呉氏曰凡人四時之間冬傷于寒陽主于内春木用事而陽𤼵于外然後寒氣搏之為痟首之疾春木為肝而主色火勝于夏以子勝母故暑氣溢而為痒疥之疾夏傷于暑陰主于内秋金用事而陰𤼵于外然後暑氣搏之為瘧寒之疾秋金為肺而主聲水勝于冬以子勝母故寒氣壅而為嗽上氣疾是四者皆四時不和之氣故謂之癘痟音消痒以掌反疥音介嗽西豆反上時掌反咳音慨喘昌兗反以五味五穀五藥養其病註曰養猶治也病由氣勝負而生攻其贏養其不足者五味醯酒飴蜜薑鹽之屬五穀麻黍稷麥豆也五藥草木蟲石穀也其合治之齊則存乎神農子儀之術云王介甫曰素問曰形不足温之以氣精不足補之以味味養精者也穀養形者也藥則療病者也養精為本養形為次療病為末贏音盈齊音劑以五氣五聲五色眂其死生三者劇易之徴見于外者五氣肝氣温心氣熱脾氣和肺氣涼腎氣寒五聲肝聲呼心聲嘆脾聲歌肺聲哭腎聲呻五色面貌青赤黄白黑也察其盈虛休王吉凶可知審用此者莫若扁鵲倉公易以豉反王往放反兩之以九竅之變參之以九藏之動註曰兩參之者以觀其死生之驗竅之變謂開閉非常陽竅七陰竅二藏之動謂脈之至與不至正藏五又有胃膀胱大腸小腸脈之大候要在陽明寸口能専是者其惟秦和乎岐伯榆柎則兼彼數術者疏曰兩參之者謂九竅與所眂為兩兩與九藏為參竅苦弔反藏才浪反柎音附凡民之有疾病者分而治之死終則各書其所以而入于醫師註曰少者曰死老者曰終所以謂治之不愈之狀也醫師得以制其禄且為後治之戒王氏曰食醫灋通于下而以王為主卑者不能備物也疾醫灋通于上而以萬民為主尊者不敢斥言也少詩照反瘍醫掌腫瘍潰瘍金瘍折瘍之祝藥劀殺之齊註曰腫瘍癕而上生創者潰瘍癕而含膿血者金瘍刀創也折瘍踠跌者劀刮去膿血殺謂以藥食其惡肉鄭剛中曰王氏謂疾之惡者藥或不能攻則有祝焉乃引素問移精變氣祝由之説為證坡謂古字可通似不必改如此官既有獸醫而夏官又有巫馬疏云巫知馬祟醫知馬疾疾則以藥治之祟則辨而祈之然則祝藥竝行牛馬猶然而況于人乎王説是也折時設反劀音刮殺所賣反齊才細反創初良反踠於阮反跌待結反祟音歲凡療瘍以五毒攻之註曰止病曰療攻治也五毒五藥之有毒者今醫方有五毒之藥作之合黄堥置石膽丹砂雄黄礜石慈石其中燒之三日三夜其煙上著以雞羽掃取之以注創惡肉破骨則盡出以五氣養之以五藥療之以五味節之註曰既刮殺而攻盡其宿肉乃養之也五氣當為五穀字之誤也節節成其藥之力氣讀作穀堥音務礜音豫著直畧反凡藥以酸養骨以辛養筋以鹹養脈以苦養氣以甘養肉以滑養竅註曰以類相養也酸木味木根立地中似骨辛金味金之􅅶合異物似筋鹹水味水之流行地中似脈苦火味火出入無形似氣甘土味土含載四者似肉滑滑石也凡諸滑物通利往來似竅疏曰上文以五味節之即此經酸苦之等是也今云凡藥以酸養骨藥味合言者欲見五味節成五藥故合言之凡有瘍者受其藥焉獸醫掌療獸病療獸瘍疏曰上之人病與瘍别醫此獸之疾病及瘍療同醫者重人賤畜故畧同在一醫也凡療獸病灌而行之以節之以動其氣觀其所𤼵而養之註曰療獸必灌行之者為其病狀難知灌以緩之且强其氣也節趨驟之節也氣謂脈氣既行之乃以脈視之以知所病凡療獸瘍灌而劀之以𤼵其惡然後藥之養之食之註曰亦先攻之而後養之食音嗣凡獸之有病者有瘍者使療之死則計其數以進退之酒正掌酒之政令以式灋授酒材註曰式灋作酒之灋式作酒既有米麴之數又有功活之巧月令曰乃命大酋秫稻必齊麴糵必時湛饎必潔水泉必香陶器必良火齊必得鄭司農云授酒人以其材凡為公酒者亦如之註曰謂鄉射飲酒以公事作酒者亦以式灋及酒材授之使自釀之酋將由反齊才細反湛接㢘反饎昌志反釀女亮反辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊註曰泛者成而滓浮泛泛然醴猶體也成而滓汁相將盎猶翁也成而翁翁然葱白色緹者成而紅赤沈者成而滓沈自醴以上尤濁縮酌者盎以下差清其象類則然古之式灋未可盡聞杜子春讀齊皆為粢𤣥謂齊者毎有祭祀以度量節作之疏曰辨五齊之名者酒正不自造酒使酒人為之酒正辨其名知其清濁而已齊才細反下同緹音體翁鳴動反辨三酒之物一曰事酒二曰昔酒三曰清酒註曰鄭司農云事酒有事而飲也昔酒無事而飲也清酒祭祀之酒𤣥謂事酒酌有事者之酒其酒則今之醳酒也昔酒今之酋久白酒所謂舊醳者也清酒今中山冬釀接夏而成疏曰事酒謂于祭末卑賤執事之人竝得飲之昔酒亦祭末羣臣陪位不得行事竝得飲之清酒祭祀時賓獻尸尸酢賓不敢與王之神共尊同酌齊故酌清以自酢此三酒皆盛于罍尊在堂下醳音亦辨四飲之物一曰清二曰醫三曰漿四曰酏註曰清謂醴之泲者醫内則所謂或以酏為醴凡醴濁釀酏為之則少清矣醫之字從殹從酉省也漿今之酨漿也酏今之粥内則有黍酏酏飲粥稀者之清也疏曰漿亦是酒類酨之言載米汁相載也醫於己反下同酏以支反下同泲子禮反下同殹烏兮反酨胙再反掌其厚薄之齊以共王之四飲三酒之􅄿及后世子之飲與其酒掌其厚薄之齊者從五齊以下皆酒人漿人作之酒正不自造直辨其厚薄之齊而已􅄿謂􅄿陳具設之也后世子不言􅄿其饋食不必具設之五齊止用醴為飲者取醴恬與酒味異也其餘四齊味皆似酒凡祭祀以灋共五齊三酒以實八尊大祭三貳中祭再貳小祭壹貳皆有酌數唯齊酒不貳皆有器量註曰酌器所用注尊中者數量之多少未聞鄭司農云三貳三益副之也杜子春云齊酒不貳謂五齊以祭不益也其三酒人所飲者益也弟子職曰周旋而貳惟嗛之視𤣥謂大祭者王服大裘衮冕所祭也中祭者王服鷩冕毳冕所祭也小祭者王服希冕𤣥冕所祭也三貳再貳一貳者謂就三酒之尊而益之以飲諸臣若今常滿尊也祭祀必用五齊者至敬不尚味而貴多品疏曰凡祭祀者兼天地及宗廟之等也以灋共五齊三酒者祭有大小齊有多少各有常灋也八尊者五齊五尊三酒三尊此除明水𤣥酒若五齊加明水三酒加𤣥酒此八尊為十六尊不言之者舉其正尊而言也嗛苦簟反鷩必列反毳充芮反共賓客之禮酒共后之致飲于賓客之禮醫酏糟皆使其士奉之禮酒謂王有故不親饗燕𫝊人致酒于客館也王致酒后致飲夫婦之義糟醫酏不泲者泲曰清不泲曰糟后致飲無醴醫酏不清者與王同體屈也亦因以少為貴士謂酒人漿人奄人凡王之燕飲酒共其計酒正奉之註曰共其計者獻酬多少度當足也故書酒正無酒字鄭司農云正奉之酒正奉之也鄭剛中曰不參計于禮飲而奉于燕飲使王知其過多則自為之戒度徒洛反凡饗士庶子饗耆老孤子皆共其酒無酌數註曰要以醉為度掌酒之賜頒皆有灋以行之註曰灋尊卑之差疏曰行之者謂依灋給之凡有秩酒者以書契授之註曰鄭司農云秩常也𤣥謂所秩者謂老臣王制曰九十日有秩王介甫曰授以書者使知其所得之數授以契者使執之以取酒也酒正之出日入其成月入其要小宰聴之註曰出謂授酒材及用酒之多少也受用酒者日言其計于酒正酒正月盡言于小宰王介甫曰特謹其出異于其餘物毖酒之意也歲終則會唯王及后之飲酒不㑹以酒式誅賞註曰誅賞作酒之善惡者毖必履反酒人掌為五齊三酒祭祀則共奉之以役世婦註曰世婦謂宫卿之官掌女宫之宿戒及祭祀比其具酒人共酒因留與其奚為世婦役亦官聨齊才細反比扶利反共賓客之禮酒飲酒而奉之註曰酒正使之也禮酒饗燕之酒飲酒食之酒此謂給賓客之稍王不親饗燕不親食而使人各以其爵以酬幣侑幣致之則從而以酒往親食之食音嗣凡事共酒而入于酒府凡事謂王之三酒之􅄿及燕飲之酒也共而入于酒正之府者酒正當奉之凡祭祀共酒以往註曰不言奉小祭祀王介甫曰自有奉之者往待其令而已賓客之陳酒亦如之陳酒謂饔餼之酒使卿以韋弁歸之亦自有奉之者以酒從往雜記曰武王酒誥以祭祀為説其説為人子者當孝養父母而不敢飲為人臣者當惟王正事而不敢飲其里居者則以助成王徳顯不惟不敢亦不暇其敘所聞則以在昔商先哲王迪畏天顯小民不敢自逸是則君民臣子皆不當飲惟祭祀賓客方用之立灋之嚴正與酒正酒人相表裏漿人掌共王之六飲水漿醴涼醫酏入于酒府註曰王之六飲亦酒正當奉之醴醴清也涼今寒粥若糗飯雜水也酒正不辨水涼者無厚薄之齊糗丘酉反共賓客之稍禮註曰稍禮非飱饔之禮留間王稍所給賓客者漿人所給亦六飲而已共夫人致飲于賓客之禮清醴醫酏糟而奉之註曰亦酒正使之三物有清有糟夫人不體王得備之禮飲醴用柶者糟也不用柶者清也間如字徐音澗柶音四凡飲共之註曰謂非食時凌人掌冰正歲十有二月令斬冰三其凌註曰正歲季冬火星中大寒冰方盛之時春秋傳曰火星中而寒暑退凌冰室也三之者為消釋度也故書正為政鄭司農云掌冰政主藏冰之政也杜子春讀掌冰為主冰也政當為正正謂夏正三其凌三倍其冰疏曰周雖以建子為正行事皆用夏之正歲若據殷周則十二月冰未堅若據夏之十二月冰則堅厚故正歲據夏也春始治鑑註曰鑑如甀大口以盛冰置食物于中以禦温氣春而始治之為二月將獻羔而啓冰凡外内饔之膳羞鑑焉凡酒漿之酒醴亦如之註曰酒醴見温氣亦失味酒漿酒人漿人也甀直偽反祭祀共冰鑑賓客共冰註曰賓客不以鑑往嫌使停膳羞大喪共夷槃冰註曰夷之言尸也實冰于夷槃中置之尸􅇃之下所以寒尸漢禮器制度大槃廣八尺長丈二尺深三尺漆赤中疏曰亦謂三月以後遭大喪則共之舉王喪共后世子及三夫人以下小喪亦共之但王及后有夷槃自外當與諸侯已下同大槃等其世婦已上有冰則與大夫同女御與士同無冰見賜乃有也夏頒冰掌事註曰暑氣盛王以冰頒賜則主為之秋刷註曰刷清也鄭司農云刷除冰室當更内新冰𤣥謂秋涼冰不用可以清除其室刷所劣反籩人掌四籩之實註曰籩竹器如豆者其容實皆四升朝事之籩其實麷蕡白黑形鹽膴鮑魚鱐註曰蕡枲實也鄭司農云熬麥曰麷麻曰蕡稻曰白黍曰黑築鹽以為虎形謂之形鹽故春秋傳曰鹽虎形𤣥謂朝事謂祭宗廟薦血腥之事膴䐑生魚為大臠鮑者於楅室中糗乾之鱐者析乾之王者備物近者腥之逺者乾之因其宜也麷芳弓反蕡符文反鱐所求反楅皮逼反乾音干饋食之籩其實棗㮚桃乾䕩榛實註曰饋食薦孰也今言禮存者特牲少牢諸侯之大夫士祭禮也不祼不薦血腥而自薦孰始是以皆云饋食之禮乾䕩乾梅也有桃諸梅諸是其乾者榛似栗而小㮚古栗字乾音干䕩力到反加籩之實蓤芡㮚脯蓤芡㮚脯註曰加籩謂尸既食后亞獻尸所加之籩重言之者以四物為八籩蓤芰也芡雞頭也栗與饋食同鄭司農云蓤芡脯脩蓤音陵芡音儉重直用反芰其寄反羞籩之實糗餌粉餈疏曰羞籩謂若少牢賓長致爵受酢宰夫羞房中之羞于尸祝主人主婦之右天子之禮賓長受酢後亦當設此内羞于尸祝及王與后也糗熬大豆與米也粉豆屑也坡謂餌粉餅也説文云餌屑米為粉然後水調之餈稻餅也謂炊米爛而𢷬之粉餈以豆為粉糝餈上也餈之言滋也餌之言堅潔若玉珥也餌而志反餈昨資反炊音吹糝素感反後同珥音二凡祭祀共其籩薦羞之實疏曰祭祀言凡謂四時禘祫等薦者先薦後獻祭祀也據朝踐饋獻時未獻前所薦之籩豆是也羞者謂尸食後酳尸訖所進羞即加籩之實是也酳音孕喪事及賓客之事共其薦籩羞籩註曰喪事之籩謂殷奠時疏曰殷奠朔月月半薦新祖奠遣奠之類也為王及后世子共其内羞註曰於其飲食以共房中之羞凡籩事掌之禮運孔疏曰祭日之旦王服衮冕而入尸亦衮冕祝在後侑之王不出迎尸故祭綂云君不迎尸以别嫌也尸入室乃作樂降神故大司樂云凡樂圜鍾為宫九變而致人鬼是也乃灌故書云王入大室祼當灌之時衆尸皆同在大廟中依次而灌所灌鬱鬯小宰注云尸祭之啐之奠之是為一獻也王乃出迎牲后從灌二獻也迎牲而入至于庭故禮器云納牲詔于庭王親執鸞刀啓其毛而祝以血毛告于室故禮器云血毛詔于室凡牲則廟各别牢故公羊傳云周公白牡魯公騂犅案逸禮云毁廟之主昭共一牢穆共一牢於是行朝踐之事尸出于室大祖之尸坐于户西南面其主在右昭在東穆在西相對坐主各在其右故鄭注祭綂云天子諸侯之祭朝事延尸于户外是以有北面事尸之禮祝乃取牲膟膋燎于爐炭入以詔神于室又出以墮于主前郊特牲云詔祝于室坐尸于堂是也王乃洗肝于鬱鬯而燔之以制于主前所謂制祭次乃升牲首于室中置于北牖下后薦朝事之豆籩乃薦腥于尸主之前謂之朝踐即此禮運薦其血毛腥其俎是也其體解以湯爓之不全熟次于腥而薦之堂竝當朝踐之節王乃以玉爵酌著尊泛齊以獻尸三獻也后又以玉爵酌著尊醴齊以亞獻四獻也乃退而合烹至薦熟之時陳于堂故禮器云設􅄿于堂乃後延主入室太祖東面昭在南面穆在北面徙堂上之􅄿于室内坐前祝以斚爵酌奠于􅄿南故郊特牲註云天子奠斚諸侯奠角即此之謂也既奠之後又取腸間脂焫蕭合馨薌郊特牲註云奠謂薦熟時當此大合樂也自此以前謂之接祭乃迎尸入室舉此奠斚主人拜以安尸故郊特牲云舉斚角拜妥尸是也后薦饋獻之豆籩王乃以玉爵酌壺尊盎齊以獻尸為五獻也后又以玉爵酌壺尊醍齊以獻尸是六獻也于是尸食十五飯訖王以玉爵因朝踐之尊泛齊以酳尸為七獻也故鄭云變朝踐云朝獻尊相因也朝獻謂此王酳尸因朝踐之尊也后乃薦加豆籩尸酌酢主人主人受嘏王所以獻諸侯于是后以瑤爵因酌饋食壺尊醍齊以酳尸為八獻也鄭註司尊彝云變再獻為饋獻者亦尊相因也再獻后酳尸獻謂饋食時后之獻也于時王可以瑤爵獻卿也諸侯為賓者以瑤爵酌壺尊醍齊以獻尸為九獻九獻之後謂之加爵案特牲有三加則天子以下加爵之數依尊卑不秪三加也故特牲三加爵别有嗣子舉奠文王世子諸侯謂之上嗣舉奠亦當然其魯及王者之後皆九獻其行之灋與天子同侯伯七獻朝踐及饋獻時君皆不獻于九獻之中減二故為七獻也禮器云君親制祭夫人薦盎君親割牲夫人薦酒是也子男五獻者亦以薦腥饋熟二君皆不獻酳尸之時君但一獻而已九獻之中去其四故為五獻皆崔氏之説今案特牲少牢尸食之後主人主婦及賓備行三獻主婦因獻而得受酢今子男尸食之後但得一獻夫人不得受酢不如卿大夫理亦不通盖子男饋熟以前君與夫人竝無獻也食後行三獻通二灌為五也禮器所云據侯伯七獻之制也犅音剛膟音律膋力雕反燎音聊燔音煩爓音潛著直畧反斚音稼焫如悦反薌音香醍音醴秪祗同醢人掌四豆之實朝事之豆其實韭菹醓醢昌本麋臡菁菹鹿臡茆菹麇臡註曰醓肉汁也昌本昌蒲根切之四寸為菹三臡亦醢也作醢及臡者必先膊乾其肉乃後莝之雜以􅆝麴及鹽漬以美酒塗置瓶中百日則成矣有骨為臡無骨為醢菁蔓菁也茆鳬葵即荇菜也凡菹醢皆以氣味相成其狀未聞疏曰豆木器豆與籩竝設節數與四籩同時皆后設之韭音久醓吐感反臡乃兮反茆音卯麇京倫反膊普博反莝倉臥反饋食之豆其實葵菹蠃醢脾析蠯醢蜃蚳醢䐁拍魚醢葵菜名味甘滑蠃螔蝓脾析牛百葉也蠯蛤也蜃大蛤蚳蟻子拍為膊豚拍豚脇也拍音博加豆之實芹菹兔醢深蒲醓醢箈菹鴈醢筍菹魚醢註曰芹楚葵也鄭司農云深蒲蒲蒻入水深故曰深蒲醓醢肉醤也箈水中魚衣𤣥謂深蒲蒲始生水中子箈箭萌筍竹萌箈音迨筍息尹反蒻音弱羞豆之實酏食糝食註曰酏􅊡也内則曰取稻米舉糔溲之小切狼臅膏以與稻米為􅊡又曰糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之食音嗣􅊡之然反糔思柳反溲所柳反臅昌蜀反凡祭祀共薦羞之豆實賓客喪紀亦如之為王及后世子共其内羞王舉則共醢六十罋以五齊七醢七菹三臡實之註曰齊當為齏五齏昌本脾析蜃豚拍深蒲也七醢醓蠃蠯蚳魚兔鴈醢七菹韭菁茆葵芹箈筍菹三臡麋鹿麇臡也凡醯醬所和細切為齏全物若䐑為菹少儀曰麋鹿為菹野豖為軒皆䐑而不切麇為辟雞為宛脾皆䐑而切之切葱若薤實之醯以柔之由此言之則齏菹之稱菜肉通疏曰此以下與籩人異以其王舉不共籩實唯有豆實齊子西反軒音獻辟必亦反薤音械賓客之禮共醢五十罋註曰致饔餼時疏曰案秋官掌客上公之禮醯醢百有二十罋侯伯百罋子男八十罋此共醢五十罋并醯人所共醯五十罋共為百罋惟據侯伯饔餼之禮舉中言之明兼有上公與子男掌客上公已下乃諸侯相待禮天子待諸侯亦與之同又案聘禮待聘臣亦云醯醢百罋得與諸侯同者彼别為臣禮禮有損之而益故子男之卿百罋其數多于君凡事共醢醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賓客亦如之齊菹醬三者皆須醯成味故與醢人共掌之醬即醢臡也賓客亦如之者下云賓客之禮據饔餼此云賓客據饗食致之齊子兮反下同王舉則共齊菹醯物六十罋共后及世子之醬齊菹賓客之禮共醯五十罋凡事共醯鹽人掌鹽之政令以共百事之鹽註曰政令謂受入教所處置求者所當得祭祀共其苦鹽散鹽疏曰杜子春讀苦為盬盬謂出于鹽池今之顆鹽是也散鹽煮水為之出于東海賓客共其形鹽散鹽王之膳羞共飴鹽后及世子亦如之註曰飴鹽鹽之恬者今戎鹽有焉疏曰即石鹽也凡齊事䰞盬以待戒令註曰齊事和五味之事䰞盬湅治之鄭剛中曰先王于鹽只以為祭祀賓客膳羞之用初不以為富國之資故周禮一書理財居半鹽獨無賦自管仲以後寖以為富國之資遂至官與民争利豈先王之意哉齊才細反䰞音煮湅音練幂人掌共巾幂註曰共巾可以覆物幂莫厯反祭祀以疏布巾幂八尊註曰以疏布者天地之神尚質疏曰舉天地則四望山川社稷林澤皆用疏布皆是尚質之義也坡謂尊之名六而曰八尊者案春官司尊彝春祠夏禴獻象皆兩之則四尊也皆有罍則四罍尊也與上四尊共八尊獻象四尊以盛泛醴盎醍四齊在堂上即禮運所云醴醆在户粢醍在堂是也四罍尊一罍以盛沈齊三罍以盛三酒俱在堂下禮運云澄酒在下鄭註云澄是沈齊酒是三酒是也烝嘗間祀亦然以畫布巾幂六彝註曰宗廟可以文畫者畫其雲氣與疏曰此舉六彝對上經八尊無鬱鬯以言宗廟有鬱鬯其實天地亦有秬鬯之彝用疏布宗廟亦有八尊亦用畫布互舉以明義也獻音莎秬音矩凡王巾皆黼言凡非一四飲三酒籩豆俎簋之屬巾皆用黼黼者繪以斧形近刃白近銎黑周尚武其用文徳則黻可黼音甫銎曲恭反周禮述註卷三
