body:
  text: 周禮述註卷十四安溪李光坡撰大司樂掌成均之灋以治建國之學政而合國之子弟焉註曰董仲舒云成均五帝之學成均之灋者其遺禮可灋者國之子弟公卿大夫之子弟當學者謂之國子文王世子曰於成均以及取爵於上尊然則周人立此學之宫疏曰五帝大學總名成均當代則各有别稱若三代天子學總曰辟雍當代各有異名也坡伯兄曰灋則樂徳樂語樂舞之類皆其所以教也凡有道者有徳者使教焉死則以為樂祖祭於瞽宗註曰道多才藝者徳能躬行者若舜命夔典樂教胄子是也死則以為樂之祖神而祭之瞽宗殷學也李景齊曰有道有徳者使教焉則保氏養國子以道師氏以三徳教國子也以樂徳教國子中和祇庸孝友吕伯恭曰此所謂教之條目金石八者樂之物而已樂之徳非有道有徳者不能知之中和固是樂之本其節奏各有條理使之肅然祗敬祗之端條暢流通庸之端易直子諒之心使人事親從兄之際油然而生孝友之端此謂樂之徳鄭剛中曰中和則取六徳之終孝友則取六行之首國子徳行欲其兩全故成之以樂謂之樂徳六徳之終者能之其上可知六行之首者能之其下亦可知祇庸所以進乎徳行惟祗則於徳行不敢忽惟庸則於徳行不敢輟行下孟反以樂語教國子興道諷誦言語註曰興者以善物喻善事道讀曰導導者言古以剴今也倍文曰諷以聲節之曰誦𤼵端曰言答述曰語興許應反剴古愛反以樂舞教國子舞雲門大卷大咸大㲈大夏大􅇴大武註曰此周所存六代之樂黄帝曰雲門大卷黄帝能成名萬物以眀民共財言其徳如雲之所出民得以有族類大咸咸池堯樂也堯能殫均刑灋以儀民言其徳無所不施大㲈舜樂也言其徳能紹堯之道也大夏禹樂也禹治水傅土言其徳能大中國也大􅇴湯樂也湯以寛治民而除其邪言其徳能使天下得其所也大武武王樂也武王伐紂以除其害言其徳能成武功坡伯兄曰先儒謂義理以養其心聲音以養其耳舞蹈以養其血脈古人所謂以樂教者如此卷音權㲈上昭反傅音孚以六律六同五聲八音六舞大合樂以致鬼神􅅘以和邦國以諧萬民以安賓客以説逺人以作動物註曰六律合陽聲者也六同合隂聲者也此十二者以銅為管轉而相生黄鍾為首其長九寸各因而三分之上生者益一分下生者去一焉國語曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾言以中聲定律以律立鍾之均動物羽臝之屬疏曰以六律六同者此舉十二管以表其鍾樂器之中不用管也梁氏曰大合樂者乃成均習樂之事非用之於祭也坡伯兄曰大合樂乃肄習於學之事其用之則至於格鬼神動民物如下文祭祀饗燕之類也律以為聲之和聲以為音之節故其立文之序如此鬼神􅅘至動物其序亦自尊而卑自近而逺也又曰大司樂即尚書典樂之職國之子弟即胄子也六徳即直寛剛簡之類異其文耳興道諷誦言語則詩言志歌永言之事也於是以聲依之以律和之播之以音動之以舞則樂於是為至而用之於是乎神蓋所謂神人以和者也然則樂者其先王之所以敎而因推之於宗廟朝廷邦國以和神人書禮所稱其致一也後世不知樂為敎之具故其職領於有司而已學士先生鮮有知者其精微之旨不𫝊而徒索之鏗訇節奏以庶幾和神人之治亦不可得已説音悦度待洛反臝力果反訇音轟乃分樂而序之以祭以享以祀註曰分謂各用一代之樂坡伯兄曰自此以下皆用樂之事也乃奏黄鍾歌大吕舞雲門以祀天神註曰以黄鍾之鍾大吕之聲為均者黄鍾陽聲之首大吕為之合奏之以祀天神尊之也疏曰此黄鍾言奏大吕言歌者奏據出聲而言歌據合曲而説其實歌奏通也坡謂天神盖指春祈穀夏大雩秋眀堂及五帝四類之等也乃奏大蔟歌應鍾舞咸池以祭地示註曰大蔟陽聲第二應鍾為之合咸池大咸也坡謂地􅅘盖指大社及春祈秋報者乃奏姑洗歌南吕舞大㲈以祀四望註曰姑洗陽聲第三南吕為之合乃奏㽔賓歌函鍾舞大夏以祭山川註曰㽔賓陽聲第四函鍾為之合函鍾一名林鍾乃奏夷則歌小吕舞大􅇴以享先妣註曰夷則陽聲第五小吕為之合小吕一名中吕先妣姜嫄也姜嫄履大人跡感神靈而生后稷是周之先母也周立廟自后稷為始祖姜嫄無所妃是以特立廟而祭之謂之閟宫閟神之乃奏無射歌夾鍾舞大武以享先祖註曰無射陽聲之下也夾鍾為之合夾鍾一名圜鍾先祖謂先王先公坡伯兄曰上言祭享祀三事而乃有此六樂者蓋有祀日月星辰不繫於天祭嶽瀆山川不繫於地特祭閟宫分享羣廟之時也然其曰祀曰祭曰享則仍蒙上文其實三事而已黄鍾陽辰之始而大吕合之天主大始故以祀天也應鍾隂辰之終而大蔟合之地居成物故以祭地也姑洗陽辰之終而南吕合之四望次於天故以祀四望也函鍾隂辰之始而㽔賓合之山川次於地故以祭山川也夷則西方而小吕合之夾鍾東方而無射合之人事始於卯而終於申故以享先妣先祖也盖不特以先後之序為尊卑之等而其所取類者如此天主奏地主歌祖妣則反是者人事取其交也凡六樂者文之以五聲播之以八音註曰六者言其均皆待五聲八音乃成也播之言被也坡伯兄曰每二律歌奏則成二調然通謂之一樂者所用同也凡此二律者特為宫耳其餘四聲盖各以其律從以成一調而為八音之節六樂者調也五聲者聲也知聲調之分則知古人作樂之灋矣大蔟音太蔟七豆反㽔人誰反射音亦妃音配凡六樂者一變而致羽物及川澤之􅅘再變而致臝物及山林之􅅘三變而致鱗物及丘陵之􅅘四變而致毛物及墳衍之􅅘五變而致介物及土􅅘六變而致象物及天神註曰變猶更也樂成則更奏也每奏有所感致和以来之凡動物敏疾者地􅅘髙下之甚者易致羽物既飛又走川澤有孔竅者蛤蟹走則遲墳衍孔竅則小矣是其所以舒疾之分土􅅘原隰及平地之神也象物有象在天所謂四靈者天地之神四靈之知非徳至和則不至疏曰案大司徒五地之物生動植俱有此俱言動物不言植物者據有情可感者而言也坡伯兄曰此一條通論為樂感召之理以起下六變八變九變之端也人鬼神􅅘百物莫不有感召之理焉羽物輕清得氣之先其次則臝物為其近於人也其次則鱗次毛次介以動静之性為别也川澤之竅大山林之氣疎其次邱陵次墳衍次土􅅘以氣之通塞為叙也象物聚而成象而不可常者天神即上所祀之天神也六變而致此故下云凡樂六變則天神皆降可得而禮也由此而八變以興地􅅘由此而九變以來人鬼此不究言之者縁下有其文則此固可省也凡樂圜黄鍾為宫黄鍾為角大蔟為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬曰至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宫大蔟為角姑洗為徵南小吕為羽靈鼓靈鼗孫竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地􅅘皆出可得而禮矣凡樂黄圜鍾為宫大吕為角大蔟圜鍾為徵應鍾為羽路鼓路鼗隂竹之管龍門之琴瑟九徳之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣註曰先奏是樂以致其神禮之以玉而祼焉乃後合樂而祭之圜鍾夾鍾也函鍾林鍾也此樂無商者祭尚柔商堅剛也鄭司農云九徳之歌春秋傳所謂六府三事謂之九功九功之徳皆可歌也謂之九歌也𤣥謂孤竹竹特生者孫竹竹枝根之末生者隂竹生於山北者雲和空桑龍門皆山名九㲈讀當為大韶字之誤也王光遠曰言天神則昊天上帝日月星辰風師雨師之屬莫不以類而畢降言地􅅘則大􅅘社稷五祀五岳山林川澤四方百物之屬莫不以類而畢出坡伯兄曰上六樂者用以祭享祀各有二焉此則合二者而一之盖陽生而郊天配以日月星辰隂生而祭地配以嶽瀆山川大禘大祫有事大廟配以羣后之時也其所分以祀以祭以享之律則與前文同但錯互黄鍾圜鍾之宮又誤小吕為南吕耳此則訛舛相承原其所以則以黄鍾為角之文致疑重􅃨或者遂以意易之小之為南𫝊冩偶異以此生誤蓋所謂某律為宫者即本律為之也所謂某律為角為徵為羽者非本律為之也乃謂本律之角之徴之羽也且若黄鍾為宮宮固黄鍾也黄鍾之角角則姑洗也大蔟之徵徵則南呂也姑洗之羽羽則大呂也此四者皆所以祀天神四望故天神可得而禮也函鍾之宮宮即函鍾也大蔟之角角則㽔賓也姑洗之徵徵則應鍾也小呂之羽羽則大蔟也此四者皆所以祭地􅅘山川故地􅅘可得而禮也圜鍾之宫宫即圜鍾也大吕之角角則小吕也大蔟之徵徵則南吕也應鍾之羽羽則夷則也此四者皆所以享先妣先祖故人鬼可得而禮也此其所同者也其所異者前樂則二律為宫各具五聲此則四律一為宫一為角一為徵一為羽各不相係亦自具五聲也必名為某之角某之徵某之羽者以六律五聲之叙求之則當之者名之也如宮之下當為角自黄鍾以下求之則姑洗適當黄鍾之角矣角之下當為徵自黄鍾以下求之則南呂適當大蔟之徵矣徵之下當為羽自大蔟以下求之則大呂適當姑洗之羽矣以至方丘宗廟之樂莫不皆然無商聲者祭祀吉禮而商屬金為殺伐之聲故去人鬼之樂邜與戌合當用無射而用南呂者戌為乾維乾金也西方殺伐之盛故亦去之而用卯衝焉蓋去商者去其調也去無射者去其律之調也至於調中之聲律則雖商與無射未嘗不用焉此三樂之與前不同而實未嘗不同也其必以黄鍾函鍾圜鍾為宫者天氣始於子終於辰地氣始於未終於亥人事始於夘終於申故以三始者為宫也義既有取氣亦相應冬至祀天黄鍾冬至之律也夏至祭地林鍾夏至之律也宗廟之祭以春為首圜鍾春分之律也樂有八音而止於鼗鼓管琴瑟者堂上之樂主於琴瑟堂下之樂主於管鼗鼓故舉三者為樂綱紀其所用三舞亦與前異者在天則統以天神之所用故止用雲門也在地則統以地􅅘之所用故止用咸池也在人則亦以古樂為尊故改用大㲈焉其三樂之變數多寡不同者天動而地静動者速静者遲天地伸而人鬼屈伸者易求屈者難致也以此三樂而通上文之說則自一至九樂之每變所感愈遠作樂者各以所欲求而致之則凡在天地之間者幽明遠近無不以其類至此樂之成也坡嘗請伯兄曰此三祀四聲即上分祀六樂深得大樂必易之理可謂神合然不用商眀見於經若無射分祀奏之於此去之未有他攷竊意宗廟之大蔟為徵似複上天神之訛也請并改太蔟為圜鍾伯兄曰諾又案朱子言祭天無將許多百神一齊排下都祭然觀本經皆降皆出則註疏所云祀天則天文從祀祀地則地理從祀自是盖必多神故云皆也靁音雷凡樂事大祭祀宿縣遂以聲展之疏曰舉大祭祀而言其實中小祭祀亦宿縣也至於饗食燕賓客有樂事亦兼之矣言宿縣者皆於前宿豫縣之遂以聲展之者謂相叩使作聲而展省聽之知其完否善惡也王出入則令奏王夏尸出入則令奏肆夏牲出入則令奏昭夏註曰三夏皆樂章名帥國子而舞註曰當用舞者帥以往縣音懸下同大饗不入牲其他皆如祭祀註曰大饗饗賓客也不入牲牲不入亦不奏昭夏也其他謂王出入賓客出入亦奏王夏肆夏疏曰祭祀則君牽牲入殺今大饗亦在廟其牲在廟門外殺因即烹之升鼎乃入故云不入牲也坡伯兄曰其宿縣展聲命舞亦與祭祀同也大射王出入令奏王夏及射令奏騶虞註曰騶虞樂章名在召南之卒章王射以騶虞為節詔諸侯以弓矢舞註曰舞謂執弓挾矢揖讓進退之儀疏曰此諸侯来朝將助祭預天子大射之時王大食三侑皆令奏鍾鼓註曰大食朔月月半以樂侑食時也侑猶勸也王師大獻則令奏愷樂註曰大獻獻㨗於祖愷樂獻功之樂凡日月食四鎮五嶽崩大傀異烖諸侯薨令去樂註曰四鎮山之重大者謂揚州之㑹稽青州之沂山幽州之醫無閭冀州之霍山五嶽岱在兖州衡在荆州華在豫州嵩在雍州恒在并州傀猶怪也大怪異烖謂天地竒變若星辰奔霣及震裂為害者去樂藏之也大札大凶大烖大臣死凡國之大憂令弛縣註曰札疫癘也凶凶年也烖水火也弛釋下之若今休兵鼓之為疏曰大憂若國亡大縣邑及戰敗之類是也徐氏曰憂之日短則去樂日長則弛縣傀音怪霣于敏反凡建國禁其淫聲過聲凶聲慢聲註曰淫聲若鄭衛也過聲失哀樂之節凶聲亡國之聲若桑間濮上慢聲惰慢不恭疏曰建國謂新封諸侯之國樂者移風易俗當用其正樂以化民故禁此四者也大喪涖廞樂器註曰涖臨也廞興也臨笙師鎛師之屬興樂器也興謂作之也及𦵏藏樂器亦如之坡伯兄曰鄭氏以此六變者為大蜡之樂特因上下各言鬼神􅅘之祀中間及於百物縁文生義為此説耳夫大蜡而用樂則有之矣其索物而致之感通之理無異此所稱焉然攷之經則祭蜡而吹豳頌擊土鼓以息老物盖籥章氏之所掌非大司樂之司也又据註文四方之蜡各用其律是則四樂而已又蒙六樂之文何哉愚故曰通言樂理非為蜡也夫虞書所稱舜所以享於宗廟者耳然而百獸蹌蹌靈鳥來儀亦俟蜡之而後可致也乎或曰陽始於子終於已隂始於午終於亥人綂始於寅今曰陽終於辰隂始於未人始於卯又何說哉坡伯兄曰陽終於已而已隂辰也隂始於午而午陽辰也惟子寅辰為陽中之陽故曰陽終於辰未酉亥為隂中之隂故曰隂始於未寅雖人統然人之六辰固欲兼天地而用之自夘至申各用隂陽之半也故曰人始於夘又曰三樂四聲説者既舛且以圜鍾祀天黄鍾享廟逆於氣而乖於理其害殆有甚焉惟唐祖孝孫制十二和定以圜丘黄鍾方澤林鍾宗廟大蔟彼非不知有周官之文者其義必有所攷矣夫黄鍾律之首冬至氣之初天者羣物之始也冬至祀天而義不於黄鍾之宫則􅂚取爾或曰上六變者山林川澤邱陵墳衍原隰之􅅘皆已畢至而此謂樂八變地􅅘乃出何哉曰前所致者山川之類也經别地􅅘於山川則所謂地􅅘者必有所指八變而出又何疑乎樂師掌國學之政以敎國子小舞註曰謂以年㓜少時敎之舞内則曰十三舞勺成童舞象二十舞大夏疏曰此樂師敎小舞即下文帗舞以下是也此言小舞即大司樂敎雲門已下為大舞也凡舞有帗舞有羽舞有皇舞有旄舞有干舞有人舞註曰鄭司農云帗舞者全羽羽舞者析羽旄舞者􅈊牛之尾干舞者兵舞人舞者手舞社稷以帗辟廱以旄𤣥謂帗析五采繒今靈星舞子持之是也皇雜五采羽如鳯皇色持以舞人舞無所執以手袖為威儀四方以羽宗廟以人山川以干旱暵以皇鄭剛中曰旄即旄人所敎之舞也夷樂散樂賓客之燕樂用之辟雍用旄無所考帗音拂􅈊音貍教樂儀坡伯兄曰樂儀凡行趨登車環拜及射其節應乎樂者皆是也行以肆夏趨以采薺車亦如之環拜以鍾鼓為節註曰鄭司農云肆夏采薺皆樂名或曰皆逸詩謂人君行歩以肆夏為節趨疾於歩則以采薺為節若今時行禮於大學罷出以鼓陔為節環謂旋也拜直拜也𤣥謂行者謂於大寢之中趨謂於朝廷爾雅曰堂上謂之行門外謂之趨然則王出既服至堂而肆夏作出路門而采薺作其反入至應門路門亦如之此謂步迎賓客王如有車出之事登車於大寢西階之前反降於阼階之前尚書傳曰天子將出撞黄鍾之鍾右五鍾皆應入則撞㽔賓之鍾左五鍾皆應大師於是奏樂薺徐私反陔改才反凡射王以騶虞為節諸侯以貍首為節大夫以采蘋為節士以采蘩為節註曰騶虞采蘋采蘩皆樂章名在國風召南惟貍首在樂記射義曰騶虞者樂官備也貍首者樂㑹時也采蘋者樂循灋也采蘩者樂不失職也是故天子以備官為節諸侯以時㑹為節卿大夫以循灋為節士以不失職為節鄭司農説以天射禮曰樂正命大師曰奏貍首間若一大師不興許諾樂正反位奏貍首以射貍首曽孫凡樂掌其序事治其樂政疏曰掌其序事謂陳列樂器及作樂之次第治其樂政謂治理樂聲使得其正不淫放也坡伯兄曰凡下祭饗射獻之事凡國之小事用樂者令奏鐘鼓註曰小事小祭祀之事坡伯兄曰令奏鍾鼓則樂隨以作矣凡樂成則告備註曰成謂所奏一竟書曰簫韶九成燕禮曰大師告于樂正曰正歌備疏曰凡奏樂八音俱作一曲終則為一成則樂師告備如是者六則六成餘八變九變亦然詔来瞽臯舞註曰鄭司農云瞽當為鼓臯當為告呼擊鼓者又告當舞者持鼓與舞俱來也鼓字或作瞽詔來瞽或曰来勅也勅爾瞽率爾衆工奏爾悲誦肅肅雍雍毋怠毋凶𤣥謂詔来瞽詔眡瞭扶瞽者来入也臯之言號告國子當舞者舞及徹率學士而歌徹註曰學士國子也徹者歌雍雍在周頌臣工之什疏曰學士主舞瞽人主歌今云帥學士而歌徹者此絶讀之然後合義歌徹之時歌舞俱有謂帥學士使之舞歌者自是瞽人歌雍詩也徹者主宰君婦耳令相註曰令眂瞭扶工鄭司農云告當相瞽師者言當罷也瞽師盲者皆有相道之者饗食諸侯序其樂事令奏鐘鼓令相如祭之儀疏曰言如祭之儀者非直序樂令鐘鼓令相其中詔来瞽歌徹等皆如之但祭祀歌雍而徹饗食徹器亦歌雍知者下大師與此文皆云大饗亦如祭祀登歌下管故知皆同也燕射帥射夫以弓矢舞註曰射夫衆耦也樂出入令奏鐘鼓註曰樂出入謂笙歌舞者及其器坡謂總結上文祭祀饗食燕射三者凡其樂之出入皆令奏鐘鼔也凡軍大獻教愷歌遂倡之疏曰師還未至之時預教瞽矇愷歌入祖廟樂師倡之羣工和之也凡喪陳樂器則帥樂官註曰帥樂官往陳之疏曰樂官笙師鏄師之屬陳之者謂如既夕禮陳器於祖廟之前庭及壙道東者也及序哭亦如之註曰哭此樂器亦帥之疏曰序哭謂使人持此樂器向壙及入壙之時序哭之也凡樂官掌其政令聽其治訟疏曰凡樂官謂此已下大胥至司干大胥掌學士之版以待致諸子註曰鄭司農云學士謂卿大夫諸子學舞者版籍也今時鄉户籍世謂之户版大胥主此籍以待當召聚學舞者卿大夫之諸子則按此籍以召之漢大樂律曰卑者之子不得舞宗廟之酎除吏二千石到六百石及闗内侯到五大夫子先取適子髙七尺以上年十二到年三十顔色和順身體脩治者以為舞人與古用卿大夫子同義酎直救反春入學舍采合舞註曰春始以學士入學宫而學之合舞等其進退使應節奏舍即釋也采讀為菜始入學必釋菜禮先師也菜蘋蘩之屬秋頒學合聲註曰春使之學秋頒其才藝所為合聲亦等其曲折使應節奏疏曰春物生之時學子入學秋物成之時頒分也分其才藝髙下以六樂之㑹正舞位註曰大同六樂之節奏正其位使相應也言為大合樂習之疏曰案月令仲春上丁命樂正習舞釋菜季春云大合樂則此云六樂之㑹為季春大合樂習之也以序出入舞者註曰以長幼次之使出入不紕錯徐氏曰正舞位使左右前後之有倫序舞者使出入行綴之有序比樂官註曰比猶挍也杜子春云次比樂官也展樂器註曰展謂陳數之舍讀釋采讀菜紕匹毗反凡祭祀之用樂者以鼓徵學士註曰擊鼓以召之文王世子曰大昕鼓徵所以警衆疏曰天地宗廟之祀用樂舞之處以鼓召選之當舞者往舞焉序宫中之事坡伯兄曰兼序宫中之事其意深矣商書曰敢有恒舞于宫酣歌于室此所以大為之防也小胥掌學士之徵令而比之觵其不敬者註曰比猶挍也不敬謂慢期不時至也觵罰爵也詩云兕觵其觩玉光逺曰徴則召之使来令則使之有為巡舞列而撻其怠慢者註曰撻猶抶也抶以荆朴觵古横反觩巨樛反抶勅乙反正樂縣之位王宫縣諸侯軒縣卿大夫判縣士特縣辨其聲註曰樂縣謂鐘磬之屬縣於筍簴者鄭司農云宫縣四面縣軒縣去其一面判縣又去其一面特縣又去其一面四面象宫室四面有牆故謂之宫縣軒縣三面其形曲故春秋傳曰請曲縣繁纓以朝諸侯之禮也𤣥謂軒縣去南面辟王也判縣左右之合又空北面特縣縣於東方或於階間而已凡縣鐘磬半為堵全為肆註曰鐘磬者編縣之二八十六枚而在一簴謂之堵鐘一堵磬一堵謂之肆半之者謂諸侯之卿大夫士也諸侯之卿大夫半天子之卿大夫西縣鐘東縣磬士亦半天子之士縣磬而已鄭司農云以春秋傳曰歌鐘二肆疏曰經直言鐘磬不言鼓鎛者周人縣鼔與鎛之大鐘惟縣一而已不編縣故不言之其十二辰頭之零鐘亦縣一而已今所言縣鐘磬者謂編縣之二八十六枚共在一簴者也縣音懸簴音巨辟音避大師掌六律六同以合隂陽之聲陽聲黄鍾大蔟姑洗㽔賓夷則無射隂聲大吕應鍾南吕函鍾小吕夾鍾皆文之以五聲宫商角徵羽皆播之以八音金石土革絲木匏竹註曰以合隂陽之聲者聲之隂陽各有合黄鍾子之氣也十一月建焉而辰在星紀大吕丑之氣也十二月建焉而辰在𤣥枵大蔟寅之氣也正月建焉而辰在娵訾應鍾亥之氣也十月建焉而辰在析木姑洗辰之氣也三月建焉而辰在大梁南吕酉之氣也八月建焉而辰在夀星㽔賓午之氣也五月建焉而辰在鶉首林鍾未之氣也六月建焉而辰在鶉火夷則申之氣也七月建焉而辰在鶉尾中吕己之氣也四月建焉而辰在實沈無射戌之氣也九月建焉而辰在大火夾鍾邜之氣也二月建焉而辰在降婁辰與建交錯貿處如表裏然是其合也其相生則以隂陽六體為之黄鍾初九也下生林鍾之初六林鍾又上生大蔟之九二大蔟又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生㽔賓之九四㽔賓又下生大吕之六四大吕又上生夷則之九五夷則又下生夾鍾之六五夾鍾又上生無射之上九無射又下生中吕之上六同位者象夫妻異位者象子母所謂律娶妻而吕生子也黄鍾長九寸其實一籥下生者三分去一上生者三分益一五下六上乃一終矣大吕長八寸二百四十三分寸之一百四大蔟長八寸夾鍾長七寸二千一百八十七分寸之千七十五姑洗長七寸九分寸之一中吕長六寸萬九千六百八十三分寸之萬二千九百七十四㽔賓長六寸八十一分寸之二十六林鍾長六寸夷則長五寸七百二十七分寸之四百五十一南吕長五寸三分寸之一無射長四寸六千五百六十一分寸之六千五百二十四應鍾長四寸二十七分寸之二十文之者以調五聲使之相次如錦繡之有文章播猶揚也揚之以八音乃可得而觀之矣金鐘鎛也石磬也土塤也革鼓鼗也絲琴瑟也木柷敔也匏笙也竹簫管也疏曰黄鍾大蔟姑洗等據左旋而言大吕應鍾南吕等據石轉而説枵虚驕反娵子榆反訾子斯反中音仲教六詩曰風曰賦曰比曰興曰雅曰頌註曰風言聖賢治道之遺化也賦之言鋪直鋪陳今之政教善惡雅正也言今之正者以為後世灋頌之言誦也容也誦今之徳廣以美之鄭司農云古而自有風雅頌之名故延陵季子觀樂於魯時孔子尚幼未定詩書而因為之歌􅆁鄘衛曰是其衛風乎又為之歌小雅太雅又為之歌頌論語曰吾自衛反魯然後樂正雅頌各得其所時禮樂自諸侯出頗有謬亂不正孔子正之比者比方於物也興者託事於物徐氏曰六詩之教敎國子也坡伯兄曰風雅頌者詩之三部賦比興蓋所以為之之體也此所謂六義其於風之下而繼以賦比興乃及雅頌者詩以風為首有風則有三者矣以六徳為之本疏曰凡受教者必以行為本故使先有六徳乃可習六詩也坡伯兄曰六徳中和祗庸孝友也以六律為之音黄文叔曰聲成文謂之音不以六律音不可得而正也坡伯兄曰凡樂以人聲為主人聲生於心而𤼵為言言成文謂之詩歌詩而節之以聲律則樂著矣被之以八音則樂成矣故人聲者主也金石土革絲木匏竹者輔也六律五聲者節乎人聲八音者也言六律五聲八音而歸之於教詩得其本矣大祭祀帥瞽登歌令奏擊拊註曰擊拊瞽乃歌也鄭司農云登歌歌者在堂也樂或當擊或當拊登歌下管貴人聲也𤣥謂拊形如鼓以韋為之著之以穅下管播樂器令奏鼓朄註曰鼓朄管乃作也特言管者貴人氣也鄭司農云下管吹管者在堂下朄小鼓也先擊小鼓乃擊大鼓小鼓為大鼓先引故曰朄朄讀為𨗳引之引𤣥謂鼓朄猶言擊朄詩云應朄縣鼔疏曰聲出曰播謂播揚其聲奏即播亦一也欲令奏樂器之時亦光擊朄道之也大饗亦如之疏曰祭饗及賓射升歌下管一皆大師令奏小師佐之其鐘鼓則大祝令奏故大祝云隋釁逆尸令鐘鼓右亦如之若賓射及饗鐘鼓亦當大祝令與祭同朄音𦙍引之引竝同隋許規反大射帥瞽而歌射節註曰射節主歌騶虞大師執同律以聽軍聲而詔吉凶註曰大師大起軍師兵書曰王者行師出軍之日授將弓矢士卒振旅將張弓大呼大師吹律合音商則戰勝軍士强角則軍擾多變失士心宫則軍和士卒同心徵則將急數怒軍士勞羽則兵弱少威眀鄭司農云以師矌曰吾驟歌北風又歌南風南風不競多死聲楚必無功大喪帥瞽而廞作匶謚註曰廞興也興言王之行謂諷誦其治功之詩故書廞為淫鄭司農云淫陳也陳其生時行迹為作諡凡國之瞽矇正焉註曰從大師之政教小師掌教鼓鼗柷敔塤簫管弦歌教教瞽矇也出音曰鼓鼗如鼔而小持其柄搖之旁耳還自擊柷如漆筩方二尺四寸深一尺八寸中有椎樂始作撞其底及左右擊以起樂敔如伏虎背有二十七刻别有木長尺櫟之以止樂塤燒土為之大如鴈卵銳上平底有六孔以𤼵聲簫編以竹長尺四寸頌簫尺二寸象鳥翼有吹處大者二十四管小者十六管管如篴而小六孔併兩而吹之絃謂琴瑟也歌依詠詩也坡伯兄曰此八者其序蓋自下而及上自觕以及精小師皆敎之而匏與金石不在焉蓋磬師鐘師笙師鎛師掌之矣鍾鎛笙磬其類不一器也故各有専之者筩音動篴音狄大祭祀登歌撃拊註曰亦自有拊擊之佐大師令奏鄭司農云拊者擊石下管擊應鼓註曰應鼙也應與朄及朔皆小鼔也其所用别未聞徹歌註曰於有司徹而歌雍大饗亦如之疏曰其大饗饗諸侯之來朝者徹器亦歌雍若諸侯自相饗徹器即歌振鷺故仲尼燕居云大饗有四焉云徹以振羽振羽當為振鷺是其事也大喪與廞註曰從大師與音預凡小祭祀小樂事鼓朄註曰如大師鄭司農云朄小鼓名掌六樂聲音之節與其和徐氏曰以六代之樂而文之以五聲播之以八音五聲若大不踰宫細不過羽之類八音若升歌在上匏竹在下之類是之謂節然上下大小欲其周旋而相應故曰和瞽矇掌播鼗柷敔塤簫管弦歌註曰播謂𤼵揚其音諷誦詩世奠繫鼓琴瑟註曰諷誦詩謂闇讀之不依詠也鄭司農云諷誦詩主誦詩以刺君過故國語曰瞍賦矇誦謂詩也杜子春云世奠繫謂帝繫諸侯卿大夫世本之屬是也小史主次序先王之世昭穆之繫述其徳行瞽矇主誦詩并誦世繫以戒勸人君也故國語曰敎之世為之昭眀徳而廢幽昏焉以怵懼其動坡伯兄曰此謂人君燕居之時瞽矇主誦詩并誦世繫以戒勸之鼓琴瑟以安樂之也奠音定掌九徳六詩之歌以役大師註曰役為之使眂瞭掌凡樂事播鼗擊頌磬笙磬註曰眂瞭播鼗又擊磬磬在東方曰笙笙生也在西方曰頌頌或作庸庸功也大射禮曰樂人宿縣于阼階東笙磬西面其南笙鍾其南鎛皆南陳又曰西階之西頌磬東南其南鍾其南鎛皆南陳縣音懸下同掌大師之縣註曰大師當縣則為之坡伯兄曰凡縣者鐘磬之屬非瞽矇所職故眂瞭掌之必言大師之縣謂大師當命奏者也凡藥事相瞽註曰相謂扶工大喪廞樂器大旅亦如之註曰旅非常祭於時乃興造其樂器坡伯兄曰凡瞽矇所掌者皆眂瞭代廞之然眂瞭之職既云擊頌磬笙磬又云掌大師之縣則鐘磬之屬亦必眂瞭廞之也故下磬師鐘師獨無廞器之文則知其職具是矣其餘則笙師所廞者竽笙以下鎛師所廞晉鼔籥師羽籥司干干盾典庸器筍簴各以其所掌者廞之也大旅亦如之然惟於眂瞭笙師言之者見例而已自是以下可以義推賓射皆奏其鐘鼓註曰擊朄以奏之其登歌大師自奏之疏曰大師職云下管令奏鼓朄鐘鼓與管俱在下管既擊朄令奏則鍾鼓亦擊朄奏之可知鼜愷獻亦如之註曰愷獻獻功愷樂也杜子春云讀鼜為憂戚之戚謂戒守鼓也擊鼓聲疾數故曰戚鼜音戚典同掌六律六同之和以辨天地四方隂陽之聲以為樂器註曰陽聲屬天隂聲屬地天地之聲布於四方為作也律述氣者也同助陽宣氣與之同皆以銅為之坡伯兄曰六律為陽六同為隂布十有二辰以從八風故能知律同之和者則能辨天地四方隂陽之聲矣樂器金石之類也造八音之器必本於律也凡聲髙聲䃂正聲緩下聲肆陂聲散險聲斂達聲贏微聲韽回聲衍侈聲筰弇聲鬱薄聲甄厚聲石註曰鄭大夫讀䃂為袞冕之袞𤣥謂髙鐘形大上上大也髙則聲上藏袞然旋如裏正謂上下直正則聲緩無所動下謂鐘形大下下大也下則聲出去放肆陂讀為險陂之陂陂謂偏侈陂則聲離散也險謂偏弇也險則聲斂不越也達謂其形微大也達則聲有餘若大放也微謂其形微小也韽讀為飛鉆湼韽之韽韽聲小不成也回謂其形微圜也回則其聲淫衍無鴻殺也侈謂中央約也侈則聲廹筰出去疾也弇謂中央寛也弇則聲鬱勃不出也甄讀為甄燿之甄甄猶掉也鐘微薄則聲掉鐘大厚則如石叩之無聲坡伯兄曰此聲之病也八音之聲皆然䃂古本反陂彼義反韽音庵筰音謫弇音掩甄音震鉆其㢘反殺色界反凡為樂器以十有二律為之數度以十有二聲為之齊量註曰數度廣長也齊量侈弇之所容疏曰數度者律厯志云古之神瞽度律均鍾以律計倍半如黄鍾九寸倍之為尺八寸半之得四寸半總二尺二寸半為鍾口徑及上下之數自外十二辰頭皆然坡謂齊均也量度也吹十二律之聲均度所造器使之相應二者皆以防其䃂緩等之失凡和樂亦如之註曰和謂調其故器也坡伯兄曰或問六律五聲八音别其名合其用者安在曰樂之有五聲也謂夫歌之調之别有此五者而非僅髙下之謂也是故志有喜樂哀怒詩有雅頌國風於是而歌聲之部分焉含宏廣大者謂之宫激揚奮厲者謂之商流動和暢者謂之角敏速疾㨗者謂之徵嘈雜瑣細者謂之羽含宏廣大者君之道也激揚奮厲者臣之操也流動和暢者民之理也敏速疾㨗者事之宜也嘈雜瑣細者物之象也此五聲之分樂之全也今之為五聲者不然曰五聲者以清濁髙下為别而已於是有一章一句而五聲並用夫一章一句五聲之用無不在焉然非其本也清廟之篇則宫音之奏也無衣之什則商聲之謳也是之謂五聲若夫清濁髙下則六律之用也五聲之紀也宫商角徵羽各有清濁髙下焉十二管以律之是之謂六律律既成矣而非吹律以作樂之謂也古者制律備而鑄鐘鑄鐘者象律之聲也戞擊其鐘以為八音之綱紀故國語曰金石以動之絲竹以行之詩以道之歌以詠之匏以宣之瓦以贊之革木以節之又曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾百官軌儀是故鐘灋律磬灋鐘編鐘編磬皆十六為一堵灋律之十二及四清聲也故兼總條貫金聲而玉振之則六律備五聲應八音齊聖人比徳焉然則八音者六律五聲備焉國語謂樂器重者從細輕者從大何謂也曰六律五聲八音者經也輕重鉅細必於和者權也唯人聲則中和之始是故清濁高下有所裁制其次笙管亦以人氣吹之近人聲者也若金石之類其物性既異則洪纎之響率有所偏是故髙者抑之下者揚之細者昭其大也大者鳴其細也大昭小鳴和之道也故其言琴瑟尚宫鐘尚羽石尚角匏竹利制重者謂鐘也尚羽所以從細也輕者謂琴瑟也尚宫所以從大也石音在輕重之間故尚角角在清濁之間也匏則笙也竹則管也尚制者笙管近人聲有所裁制也磬師掌教擊磬擊編鐘註曰教教眂瞭也磬亦編於鐘言之者鐘有不編不編者鐘師擊之杜子春讀編為編書之編劉原父曰宫縣有特磬十二鎛鐘十二皆依辰次陳之以應其方之律編磬編鐘各十有六共為一簴而磬師之職掌教眂瞭擊特磬與編磬而又教之擊編鐘也教縵樂燕樂之鐘磬註曰縵謂雜聲之和樂者也學記曰不學操縵不能安弦燕樂房中之樂所謂隂聲也二樂皆敎其鐘磬疏曰學記鄭註云操縵雜弄即今之調辭曲及祭祀奏縵樂易彦祥曰祭祀奏縵樂亦取其和而已鐘師掌金奏註曰金奏擊金以為奏樂之節金謂鐘及鏄疏曰此鐘師自擊不編之鐘凡作樂先擊鐘故云金奏凡樂事以鐘鼓奏九夏王夏肆夏昭夏納夏章夏齊夏族夏祴夏驁夏註曰以鐘鼓者先擊鐘次擊鼓以奏九夏夏大也樂之大歌有九杜子春云祴讀為陔鼓之陔王出入奏王夏尸出入奏肆夏牲出入奏昭夏四方賓来奏納夏臣有功奏章夏夫人祭奏齊夏族人侍奏族夏客醉而出奏陔夏公出入奏驁夏肆夏詩也春秋傳曰穆叔如晉晉侯享之金奏肆夏三不拜工歌文王之三又不拜歌鹿鳴之三三拜曰三夏天子所以享元侯也使臣不敢與聞肆夏與文王鹿鳴俱稱三謂其三章也以此知肆夏詩也國語曰金奏肆夏繁遏渠天子所以享元侯肆夏繁遏渠所謂三夏矣吕叔玉云肆夏繁遏渠皆周頌也肆夏時邁也繁遏執競也渠思文也肆遂也夏大也言遂於大位謂王位也故時邁曰肆于時夏允王保之繁多也遏止也言福禄止於周之多也故執競曰降福穰穰降福簡簡福禄来反渠大也言以后稷配天王道之大也故思文曰思文后稷克配彼天故國語謂之曰皆昭令徳以合好也𤣥謂以文王鹿鳴言之則九夏皆詩篇名頌之族類也此歌之大者載在樂章樂崩亦從而亡是以頌不能具疏曰鐘師擊鐘而兼鼓者凡作樂先擊鐘次擊鼓見先後次第故兼言之鐘中得奏九夏者謂堂上歌之堂下以鐘鼓應之故左氏傳云晉侯歌鐘二肆齊音齋祴音陔驁五羔反凡祭祀饗食奏燕樂註曰以鐘鼓奏之凡射王奏騶虞諸侯奏貍首卿大夫奏采蘋士奏采蘩註曰鄭司農云騶虞聖獸疏曰言凡射則大射賓射等同用此為射節坡伯兄曰大師帥瞽而歌射節其鐘鼓之事則鐘師奏之故曰奏凡九夏四節之奏大司樂所令者蓋鐘師焉掌鼙鼓縵樂註曰鼓讀如莊王鼓之鼓𤣥謂作縵樂擊鼙以和之疏曰此官主擊鼙於磬師作縵樂則擊鼙以和之笙師掌教龡竽笙塤籥簫箎篴管舂牘應雅以教祴樂教教瞭也竽三十六簧宫管在中長四尺二寸笙長四尺十三簧宫管在左籥如􅅇三孔其中則中聲其上下二孔則聲之清濁所由生也箎長尺四寸圍三寸七孔一孔上出徑三分凡八孔横吹之篴長三尺四寸六孔舂牘以竹大五六寸長七尺短者一二尺其端有兩空髤畫以兩手築地應亦以竹長六尺五寸其中有椎雅狀如􅃮筒而弇口大二圍長五尺六寸以羊韋鞔之有兩紐疏畫祴樂祴夏之樂牘應雅教其舂者謂以築地笙師敎之則三器在庭可知矣賓醉而出奏祴夏以此三器築地為之行節明不失禮坡伯兄曰竽笙以下八者皆笙之屬故笙師敎之塤簫管盖與小師雜教瞽矇其餘或教眂瞭也龡音吹髤香牛反鞔莫官反凡祭祀饗射共其鐘笙之樂註曰鐘笙與鐘聲相應之笙燕樂亦如之大喪廞其樂器及𦵏奉而藏之大旅則陳之註曰陳於饌處而已不涖其縣疏曰其涖縣者大司樂坡伯兄曰眂瞭言興樂器不言陳與蔵者省文也故曰大旅亦如之如其興器而已笙師言與又言藏旅則不藏也故曰大旅則陳之鎛師掌金奏之鼓鄭剛中曰鎛師掌鎛而一職皆言鼓豈為鎛師又擊鼓乎觀鼓人言以晉鼓鼓金奏則此所謂鼓者攷擊以作之之義也當金奏之時鼓人以鼓作之鎛師則以鎛作之故皆以鼓言三鼜皆鼓之是鎛師皆擊鎛而鼓之也鎛師固宜掌鎛今畧無擊鎛之文皆言擊鼓則鼓為鼓作之意明矣先儒之説似非鎛師本意凡祭祀鼓其金奏之樂饗食賓射亦如之王次㸃曰金鐘也鼓者所以擊其鐘也軍大獻則鼓其愷樂凡軍之夜三鼜皆鼓之守鼜亦如之註曰守鼜備守鼓也杜子春云一夜三擊備守鼜也春秋傳所謂賓將趨者音聲相似趨左傳作棷莊九反大喪廞其樂器奉而藏之韎師掌敎韎樂祭祀則帥其屬而舞之註曰舞之以東夷之舞疏曰凡舞夷樂皆門外為之大饗亦如之坡伯兄曰按下旄人舞夷樂又有鞮鞻氏掌四夷之樂與其聲歌此乃特别東夷者或其樂為優與不可考矣旄人掌教舞散樂舞夷樂註曰散樂野人為樂之善者若今黄門倡矣自有舞夷樂四夷之樂亦皆有聲歌及舞疏曰旄人教樂而不掌鞮鞻氏掌樂而不教互相統耳凡四方之以舞仕者屬焉疏曰四方之舞仕即野人能舞者屬旄人選武人當於中取之凡祭祀賓客舞其燕樂疏曰饗燕作燕樂時使四方舞士舞之以夷樂籥師掌敎國子舞羽龡籥註曰文舞有持羽吹籥者所謂籥舞也文王世子曰秋冬學羽籥詩云左手執籥右手秉翟祭祀則鼓羽籥之舞註曰鼓之者恒為之節疏曰祭祀先作樂下神及合樂之時則使國子舞鼓動以羽籥之舞與樂節相應使不相奪倫賓客饗食則亦如之大喪廞其樂器奉而藏之註曰此所廞者惟羽籥而已籥章掌土鼓豳籥註曰杜子春云土鼓以瓦為匡以革為兩面可擊也𤣥謂豳籥豳人吹籥之聲章眀堂位曰土鼓蒯桴葦籥伊耆氏之樂蒯苦對反中春晝擊土鼓龡豳詩以逆暑註曰豳詩豳風七月也吹之者以籥為之聲七月言寒暑之事迎氣歌其類也此風也而言詩詩總名也迎暑以晝求諸陽中秋夜迎寒亦如之註曰迎寒以夜求諸隂中音仲凡國祈年于田祖龡豳雅擊土鼓以樂田畯註曰祈年祈豐年也田祖始耕田者謂神農也豳雅亦七月也七月又有于耜舉趾饁彼南畝之事是亦歌其類謂之雅者以其言男女之正鄭司農云田畯古之先教田者爾雅田畯農夫也疏曰此祈年于田祖并上迎暑迎寒并不言有祀事既告神當有祀事可知但以告祭弗常故不言之耳若有禮物不過如祭灋埋少牢之類耳此田祖與田畯所祈當同日但位别禮殊樂則同故連言之也國祭蜡則龡豳頌擊土鼓以息老物註曰故書蜡為蠶杜子春云蠶當為蜡郊特牲曰天子大蜡八伊耆氏始為蜡歳十二月而合聚萬物而索饗之也蜡之祭也主先嗇而祭司嗇也黄衣黄冠而祭息田夫也既蜡而收民息己𤣥謂十二月建亥之月也求萬物而祭之者萬物助天成歳事至此為其老而勞乃祀而老息之於是國亦養老焉月令孟冬勞農以休息之是也豳頌亦七月也七月又有穫稻作酒躋彼公堂稱彼兕觥萬壽無疆之事是亦歌其類也謂之頌者以其言歲終人功之成王光遠曰逆暑迎寒召其氣之和聲和則氣和故先言擊土鼓以聲為主祈則以言通其意蜡則美其成功故先言雅頌以詞為主坡伯兄曰豳詩豳風之七月也豳雅豳頌者先儒析七月之篇以為風雅頌皆備焉朱子謂雅之甫田大田頌之載芟良耜或其類也然不可考矣又曰豳諸侯之國以其為受命之基故不可夷於列國之樂而特以籥章氏掌之其用之必於田事者后稷以来世勤稼穡實王業所以兆用之嵗事不忘本矣然宗廟之中列國四夷之樂莫不陳而觀焉所以一風俗示無外豳詩王者之本獨不陳之何歟曰王者功成而作樂豳非王者之樂也故不可與韶夏􅇴武比然又不可與燕樂縵樂夷樂混而陳之非所以尊祖宗之徳推受命之符於是用之不亦宜乎以樂音洛饁于輒反鞮鞻氏掌四夷之樂與其聲歌註曰四夷之樂東方曰韎南方曰任西方曰侏離北方曰禁詩云以雅以南是也王者必作四夷之樂一天下也言與其聲歌則云樂者主於舞祭祀則龡而歌之燕亦如之註曰吹之以管籥為之聲典庸器掌藏樂器庸器註曰庸器伐國所𫉬之器若崇鼎貫鼎及以其兵物所鑄銘也及祭祀帥其屬而設筍簴陳庸器註曰設筍簴眂瞭當以縣樂器焉陳功器以華國也杜子春云筍讀為博選之選横者為筍從者為鐻饗食賓射亦如之選胥袞反從子容反鐻音距大喪廞筍簴疏曰案檀弓有鐘磬而無筍簴鄭註云不縣之彼見此文有筍簴明有而不縣以喪事畧故也司干掌舞器註曰舞器羽籥之屬坡伯兄曰舞器者羽籥干戚之類獨名司干者周以武功興大武之樂朱干玉戚以舞故舉干名也祭祀舞者既陳則授舞器既舞則受之註曰既已也受取藏之賓饗亦如之大喪廞舞器及𦵏奉而藏之疏曰此官云干盾及羽籥及其所廞廞干盾而已其羽籥則籥師廞之周禮述註卷十四
