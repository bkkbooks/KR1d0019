body:
  text: 周禮述註卷二十二安溪李光坡撰冥氏掌設弧張註曰弧張罿罦之屬所以扃絹禽獸為阱擭以攻猛獸以靈鼓敺之註曰靈鼓六面鼓敺之使驚趨阱擭若得其獸則獻其皮革齒須備註曰鄭司農云須直謂頣下須備謂搔也冥音覓敺丘于反後同罿昌容反罦音浮扃古滎反絹音犬搔音爪庶氏掌除毒蠱以攻説禬之嘉草攻之註曰毒蠱蟲物而病害人者賊律曰敢蠱人及教令者棄市攻説祈名祈其神求去之也嘉草藥物其狀未聞攻之謂燻之鄭司農云禬除也𤣥謂此禬讀如潰癰之潰疏曰攻説禬之據去其神也嘉草攻之據去其身也字彚曰栁子厚種白蘘荷詩云庶氏有嘉草攻禬事久冺是嘉草即蘘荷也蘘荷春初生葉似丼蕉根似薑芽而肥性好隂凡敺蠱則令之比之註曰使為之又校次之庶註作煮一音章預反禬音潰説如字燻許云反蘘汝陽反穴氏掌攻蟄獸各以其物火之註曰蟄獸熊羆之屬冬藏者也將攻之必先燒其所食之物於穴外以誘出之乃可得之鄭剛中曰魚龍有淵鳥獸有山林窟穴是其所藏之地先王惡其逼人驅而逺之可也乃特設一官攻而取之毋乃暴乎蓋除害者不待其害己及人然後除也惡其為一旦之害必先索而除之可也熊羆之屬不可使之藏於窟穴以俟人之隙則設穴氏以攻未為過矣以時獻其珍異皮革鄭剛中曰若其獸之身可以備珍異之羞如熊掌之類則必獻以為膳羞其皮與革可以為器用之須則亦獻之以為國家之用然獻必以時則不常攻之矣翨氏掌攻猛鳥各以其物為媒而掎之註曰猛鳥鷹隼之屬置其所食之物於絹中鳥下來則掎其腳以時獻其羽翮翨音熾掎居綺反柞氏掌攻草木及林麓註曰林人所養者山足曰麓疏曰此柞氏與薙氏治地皆擬後年乃種田夏日至令刋陽木而火之冬日至令剝隂木而水之註曰刋剝互言耳皆謂斫去次地之皮生山南為陽木生山北為隂木火之水之則使其肄不生疏曰必以夏刋陽木冬剝隂木者夏至隂生冬至陽生陽木得隂而鼓隂木得陽而發故須其時而刋剝之也山虞取其堅韌冬斬陽夏斬隂此欲死之故夏陽冬隂若欲其化也則春秋變其水火註曰化猶生也謂時以種穀也變其水火者乃所火則水之所水則火之則其土和美凡攻木者掌其政令註曰除木有時王氏曰先王之於林麓欲其材為用則設官為厲禁以養蕃之欲其地宅民稼穡則刋剝而化之帝省其山松栢斯兑柞棫斯拔則虞衡之官脩焉作之屏之其菑其翳脩之平之其灌其栵則柞氏之職用焉柞側百反薙他計反後同斫音灼刋苦干反肄羊至反韌音刃翳於計反灌音貫栵音例薙氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之註曰萌之者以兹基斫其生者夷之以鉤鐮迫地芟之也若今取茭矣含實曰繩芟其繩則實不成孰耜之以耜側凍土剗之疏曰此所掌除地從春至冬亦一年之事後年乃可種也若欲其化也則以水火變之註曰謂以火燒其所芟萌之草已而水之則其土亦和羙矣月令季夏燒薙行水利以殺草如以熱湯是其一時著之掌凡殺草之政令鄭剛中曰江南主患閣前草生徐鍇令以桂屑布磚縫中宿草盡死則殺之之灋不必一年矣繩音孕芟所銜反䥥音亷茭音交剗初産反硩蔟氏掌覆夭鳥之巢註曰覆猶毁也夭鳥惡鳴之鳥若鴞鵩鄭剛中曰唐子西云吾少時讀硩蔟氏庭氏以為不急之務後讀聖恵方言有鳥夜飛謂之無辜小兒衣服遭之輒成疾因以無辜名之狀如五疳是以知夭鳥之害有如此者驅而逺之周公之所建置不可謂不切於事以方書十日之號十有二辰之號十有二月之號十有二歲之號二十有八星之號縣其巢上則去之註曰方版也日謂從甲至癸辰謂從子至亥月謂從陬至荼嵗謂從攝提格至赤奮若星謂從角至軫夭鳥見此五者而去其詳未聞王介甫曰日辰月歲星之神凡有氣形者制焉故書其號焉可以勝夭鄭剛中曰鵲忌庚燕避戊巳䗪逢申日則過街鵲作巢則避太歲狐潛上伏不越度阡陌虎豹知衝破然則鳥避此五者制伏之理或爾但非明哲有所不知硩音摘蔟蒼獨反縣音懸覆芳復反鵩音伏陬子侯反荼音徒䗪草夜反翦氏掌除蠹物以攻禜攻之以莽草熏之註曰蠹物穿食人器物者蠹魚亦是也攻禜祈名莽草藥物殺蟲者以熏之則死凡庶蠱之事註曰庶除毒蠱者蠱蠹之類或熏以莽草則去註曰除蠱自是庶氏今此云凡庶蠱者同類相兼左右而掌之鄭剛中曰日南蠻方以五月五日聚百種蟲大者至蛇小者至蝨合置皿缶中餓使相啗其獨存者為蠱以其矢因食入人腹人輒死禜音詠蝨音瑟啗徒濫反赤犮氏掌除牆屋以蜃炭攻之以灰洒毒之註曰洒灑也除牆屋者除蟲豸藏逃其中者擣其炭坋之則走淳之以灑之則死凡隙屋除其貍蟲註曰貍蟲䗪肌蛷之屬犮音跋貍莫皆反豸直氏反坋蒲悶反肌居其反蛷音求蟈氏掌去鼃黽焚牡蘜以灰洒之則死註曰牡蘜蘜不華者齊魯之間謂鼃為蟈黽耿黽也蟈與耿黽尤怒鳴為聒人耳去之以其煙被之則凡水蟲無聲註曰杜子春云假令風從東方來則於水東面為煙令煙西行被之水上蟈古獲反鼃烏瓜反黽米引反蘜弓六反壺􅃰氏掌除水蟲以炮土之鼓敺之以焚石投之註曰水蟲狐蜮之屬炮土之鼓瓦鼓也焚石投之使驚去若欲殺其神則以牡橭午貫象齒而沈之則其神死淵為陵註曰神謂水神龍罔象故書橭為梓午為五杜子春云梓當為橭橭讀為枯枯榆木名書或為樗又云五貫當為午貫疏曰午貫者十字為之以橭為幹穿孔以象牙從橭貫之為十字涿知角反炮步交反橭音沽庭氏掌射國中之夭鳥若不見其鳥獸則以救日之弓與救月之矢夜射之註曰不見鳥獸謂夜來鳴呼為怪者獸狐狼之屬鄭司農云救日之弓救月之矢謂日月食所作弓矢𤣥謂日月之食隂陽相勝之變也於日食則射大隂月食則射大陽與疏曰城郭之所人聚之處不宜有夭鳥故去之若神也則以大隂之弓與枉矢射之註曰神謂非鳥獸之聲若或呌于宋大廟譆譆出出者大隂之弓救月之弓枉矢救日之矢與不言救月之弓與救日之矢者互言之救日用枉矢則救月以恒矢可知也射食亦反下同譆許其反出鄭引作詘劉音出本亦作出銜枚氏掌司囂註曰察嚻讙者為其聒亂在朝者之言語囂五羔反讙呼丸反國之大祭祀令禁無囂註曰令令祭祀者疏曰令主祭祀之官使禁止無得讙囂讙囂則不敬鬼神故也軍旅田役令銜枚註曰為其言語以相誤禁嘂呼歎嗚於國中者行歌哭於國中之道者註曰為其惑衆相感動也嗚吟也鄭剛中曰亦禁其為妖異之聲以惑衆耳􅑧音呌伊耆氏掌國之大祭祀共其杖咸註曰咸讀為函老臣雖杖於朝事鬼神尚敬去之有司以此函藏之既事乃授之耆巨之反軍旅授有爵者杖註曰别吏卒且以扶尊者将軍杖鉞黄文叔曰有爵者皆有統率在軍見王見帥宜當執杖今三衙兵官常朝亦執杖也共王之齒杖註曰王之所以賜老者之杖鄭司農云謂年七十當以王命受杖者今時亦命之為王杖𤣥謂王制曰五十杖於家六十杖於鄉七十杖於國八十杖於朝王氏曰秋物成而養老故列職於此大行人掌大賓之禮及大客之儀以親諸侯註曰大賓要服以内諸侯大客謂其孤卿鄭剛中曰語其體則曰禮見於揖遜周旋則曰儀行禮未嘗不見於威儀威儀未嘗不見於禮其所以異言者别尊卑耳要於遙反下文同春朝諸侯而圖天下之事秋覲以比邦國之功夏宗以陳天下之謨冬遇以協諸侯之慮時㑹以發四方之禁殷同以施天下之政註曰此六事者以王見諸侯為文圖比陳協皆考績之言王者春見諸侯則圖其事之可否秋見諸侯則比其功之髙下夏見諸侯則陳其謀之是非冬見諸侯則合其慮之異同六服以其朝歲四時分來更迭如此而徧時㑹即時見也無常期諸侯有不順服者王将有征討之事則既朝王命為壇於國外合諸侯而發禁命事焉禁謂九伐之灋殷同即殷見也王十二歲一巡狩若不巡狩則殷同殷同者六服盡朝既朝王亦命為壇於國外合諸侯而命其政政謂邦國之九灋殷同四方四時分來歲終則徧矣九伐九灋皆在司馬職司馬灋曰春以禮朝諸侯圖同事夏以禮宗諸侯陳同謀秋以禮覲諸侯比同功冬以禮遇諸侯圖同慮時以禮㑹諸侯施同政殷以禮宗諸侯發同禁陳及之曰諸侯以春來則曰朝以夏來則曰宗以秋來則曰覲以冬來則曰遇耳猶漢律春曰朝秋曰請吴王濞春不朝使人為秋請是也坡謂春朝而圖事者蓋當春朝之時則有圖事之禮來朝者與之面圖不朝者亦當有奏白也若謂朝而圖之則非其朝歲之侯遂不與圖乎夏秋冬倣此時聘以結諸侯之好殷覜以除邦國之慝鄭剛中曰諸侯之事天子則有時聘殷頫之文大宗伯所謂時聘曰問殷頫曰視是也天子之於諸侯亦有以報其禮故此行時聘殷頫之禮以答之但天子遣行人以徃則曰結好除慝此所以不同也諸侯比年小聘三年大聘矣王又以時遣人聘之春秋書天王使凡伯來聘是也聘則有財以為禮所以結好於諸侯頫省視也王者省視其所為慮其有相惡之慝慝者怨惡之匿乎心也積怨不除至於相吞滅者有之為之講解使銷除焉閒問以諭諸侯之志歸脤以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之烖註曰此四者王使臣於諸侯之禮也閒問者閒嵗一問諸侯謂存省之屬諭諸侯之志者諭言語諭書名其類也交或往或來者也贊助也致禬凶禮之弔禮禬禮也補諸侯烖者若春秋澶淵之㑹謀歸宋財朝音潮比毗志反頫通笑反閒記莧反脤上忍反禬音㑹澶市然反以九儀辨諸侯之命等諸臣之爵以同邦國之禮而待其賓客註曰九儀謂命者五公侯伯子男也爵者四孤卿大夫士也易彦祥曰爵命不同如此而曰同者命同於上公皆以九為節命同於侯伯皆以七為節命同於子男皆以五為節以至爵同於孤則皆以四為節爵同於卿大夫而有大國次國小國之異命則亦各眂其命之數而為節以此待賓客則大行人之所掌有定籍而其爵命之上下隆殺各當於禮而舉不敢踰其分其為同也至矣上公之禮執桓圭九寸繅藉九寸冕服九章建常九斿樊纓九就貳車九乘介九人禮九牢其朝位賓主之間九十步立當車軹擯者五人廟中將幣三享王禮再祼而酢饗禮九獻食禮九舉出入五積三問三勞諸侯之禮執信圭七寸繅藉七寸冕服七章建常七斿樊纓七就貳車七乘介七人禮七牢朝位賓主之間七十步立當前疾擯者四人廟中將幣三享王禮壹祼而酢饗禮七獻食禮七舉出入四積再問再勞諸伯執躬圭其他皆如諸侯之禮諸子執穀璧五寸繅藉五寸冕服五章建常五斿樊纓五就貳車五乗介五人禮五牢朝位賓主之閒五十步立當車衡擯者三人廟中将幣三享王禮壹祼不酢饗禮五獻食禮五舉出入三積壹問壹勞諸男執蒲璧其他皆如諸子之禮註曰繅藉以五采韋衣板若奠玉則以藉之冕服著冕所服之衣也九章者自山龍以下七章者自華蟲以下五章者自宗彝以下也常旌斿也斿其屬幓垂者也樊纓馬飾也以罽飾之每一處五采備為一就就成也貳副也介輔已行禮者也禮大禮饔餼也三牲備為一牢朝位謂大門外賓下車及王車出迎所立處也王始立大門内交擯三辭乃乘車而迎之齊僕為之節上公立當軹侯伯立當疾子男立當衡王立當軫與廟受命祖之廟也饗設盛禮以飲賓也問問不恙也勞謂苦倦之也皆有禮以幣致之鄭司農云車軹軹也祼讀為灌再灌再飲公也而酢報飲王也出入五積謂饋之芻米也前疾謂駟馬車轅前胡下垂柱地者𤣥謂三享皆束帛加璧庭實惟國所有朝士儀曰奉國地所出重物而獻之明臣職也朝先享不言朝者朝正禮不嫌有等也王禮王以鬱鬯禮賓也鬱人職曰凡祭祀賓客之祼事和鬱鬯以實彝而陳之禮者使宗伯攝酌圭瓚而祼王既拜送爵又攝酌璋瓚而祼后又拜送爵是謂再祼再祼賓乃酢王也禮侯伯一祼而酢者祼賓賓酢王而已后不祼也禮子男一祼不酢者祼賓而已不酢主也不酢之禮聘禮禮賓是與九舉舉牲體九飯也出入謂從來訖去也每積有牢禮米禾芻薪凡數不同者皆降殺疏曰此一經總列五等諸侯來朝天子天子以禮迎待之灋上公執桓圭九寸繅藉九寸此主行朝禮於朝所執其服則皮弁若行三享則執璧瑞自冕服九章已下至將幣三享見行三享已前之事自王禮已下至三勞見王禮諸公之禮樊馬腹帯纓馬鞅貳車九乗者按覲禮記云偏駕不入王門鄭云左傍與已同曰偏同姓金路異姓象路四衛革路蕃國木路此等不入王門舎於館乗墨車龍旂以朝彼據覲禮覲禮天子不下堂而見諸侯故諸侯不得申偏駕今此春夏受贄在朝無迎灋亦應偏駕不來今行朝後行三享在廟天子親迎並申上車明乗金路之等若不申上車何得有樊纓九就之等以此知皆乗所得之車也但貳車所飾無文未知諸侯貳車得與上車同否立當車軹者軹謂轂末車轅北向在西邊亦去大門九十步公於車東東西相望當轂末擯者五人者大宗伯為上擯小行人為承擯嗇夫為末擯其餘二人是士九獻者王酌獻賓賓酢主人主人酬賓酬後更八獻是為九獻出入五積者謂在路供賓來去皆五積三問者使卿大夫問之有禮以致之所行三處亦當與三勞同處也三勞者案小行人逆勞於畿案覲禮云至于郊王使人皮弁用璧勞註云郊謂近郊其逺郊勞無文但近郊與畿大小行人勞則遠郊勞亦使大行人也前疾謂若輈人輈深四尺七寸軾前曲中是也繅音藻藉在夜反斿音留樊步干反乗繩證反軹之氏反祼古亂反食音嗣積子賜反勞老報反信音申衣板之衣於既反著丁略反幓音衫罽居例反齊側皆反蕃音藩轂音谷輈音舟軾音式凡大國之孤執皮帛以繼小國之君出入三積不問壹勞朝位當車前不交擯廟中無相以酒禮之其他皆視小國之君註曰此以君命來聘者也孤尊既聘享更自以其贄見執束帛而已豹皮表之為飾繼小國之君言次之也朝聘之禮每一國畢乃前不交擯者不使介傳辭交于王之擯親自對擯者也廟中無相介皆入門西上而立不前相禮者聘之介是與以酒禮之酒謂齊酒也和之不用鬱鬯耳其他謂貳車及介牢禮賓主之間擯者將幣祼酢饗食之數疏曰若行正聘則執瑑圭璋八寸以行聘不得執皮帛也但侯伯以下臣無此更見灋惟大國孤尊故天子别見之案趙商問孤執皮帛所尊衆多下云其他眂小國之君以五為節今此亦五下云諸侯之卿各下其君二等以下註云公使卿亦七侯伯亦五子男三不審大國孤五而卿七何答曰卿奉君命七介孤尊更自特見故五介此有聘禮可參之未之思耶又問孤出入三積此即與小國同何須特云三積答曰三積者卿亦然非獨孤也故不在視小國之中然則一勞者亦是卿亦然故須見之牢禮卿亦五視小國君其餘則異案聘禮及掌客可見然則孤聘天子既以聘使受禮又自得禮如是孤灋再重受禮矣也相息亮反齊才計反凡諸侯之卿其禮各下其君二等以下及其大夫士皆如之註曰此亦以君命來聘者也所下其君者介與朝位賓主之間也其餘則自以其爵聘義曰上公七介侯伯五介子男三介是謂使卿之聘之數也朝位則上公七十步侯伯五十步子男三十步與疏曰及其大夫士皆如之者大夫又各自下卿二等也士無聘之介數而言如之者士雖無介與步數至於牢禮之等又降殺大夫聘義惟見卿各下其君二等仍不見大夫下卿二等案聘禮云小聘使大夫其禮如為介三介彼侯伯之大夫三介則亦三十步若上公大夫五介五十步子男大夫一介一十步可知註不言者舉卿則大夫見矣邦畿方千里其外方五百里謂之侯服歲壹見其貢祀物又其外方五百里謂之甸服二嵗壹見其貢嬪物又其外方五百里謂之男服三嵗壹見其貢器物又其外方五百里謂之采服四嵗壹見其貢服物又其外方五百里謂之衛服五嵗壹見其貢材物又其外方五百里謂之要服六嵗壹見其貢貨物註曰要服蠻服也此六服去王城三千五百里相距方七千里公侯伯子男封焉其朝貢之歲四方各四分趨四時而來或朝春或宗夏或覲秋或遇冬祀貢者犧牲之屬故書嬪作頻鄭司農云嬪物婦人所為物也爾雅曰嬪婦也𤣥謂嬪物絲枲也器物尊彝之屬服物𤣥纁絺纊也材物八材也貨物龜貝也疏曰此因朝而貢與大宰九貢及下小行人春入貢者别彼二者是嵗之常貢也九州之外謂之蕃國世壹見各以其所貴寳為摯註曰九州之外夷服鎮服蕃服也曲禮曰其在東夷北狄西戎南蠻雖大曰子春秋傳曰杞伯也以夷禮故曰子然則九州之外其君皆子男也無朝貢之歲父死子立及嗣王即位乃一來耳各以其所貴寳為摯則蕃國之君無執玉瑞者是以謂其君為小賓臣為小客所貴寳見傳者若犬戎獻白狼白鹿是也其餘則周書王㑹備焉絺勅之反纊音曠王之所以撫邦國諸侯者歲徧存三嵗徧頫五嵗徧省七歲屬象胥諭言語協辭命九歲屬瞽史諭書名聽聲音十有一歲達瑞節同度量成牢禮同數器脩灋則十有二歲王巡守殷國註曰撫猶安也存頫省者王使臣於諸侯之禮所謂間問也歲者巡守之明歲以為始也屬猶聚也自五歲之後遂閒歲徧省也七歲省而召其象胥九歲省而召其瞽史皆聚於天子之宮教習之也胥讀為諝王制曰五方之民言語不通嗜慾不同達其志通其慾東方曰寄南方曰象西方曰狄鞮北方曰譯此官正為象者周始有越裳重譯而來獻是因通言語之官為象胥云諝謂象之有才知者也辭命六辭之命也瞽樂師也史大史小史也書名書之字也古曰名聘禮曰百名以上至十一嵗又徧省焉度丈尺也量豆區釜也數器銓衡也灋八灋也則八則也達同成脩皆謂齎其灋式行至則齊等之也成平也平其僭踰者也王巡守諸侯㑹者各以其時之方書曰遂覲東后是也其殷國則四方四時分來如平時疏曰如平時者謂分四方各遂春夏秋冬如平時若六服盡來即與四時别也王光逺曰存者問而存之也頫者問而視之也省者巡而察之也頫則詳於存省則詳於頫徐氏曰十一歲而達同成脩之者為巡守攷制度張本也呂伯恭曰巡守之禮此乃維持政治攝提人心大扺人心久則易㪚政治乆則必有缺一次巡守又提攝整頓一次此所以新新不已之意屬章束反譯音亦諝思叙反鞮丁兮反齎子兮反凡諸侯之王事辨其位正其等協其禮賓而見之註曰王事以王之事來也詩云莫敢不來王孟子曰諸侯有王疏曰位謂九十七十五十步之位等謂尊卑之等冕服旌旗貳車之類也禮謂牢禮饗燕積膳之禮若有大喪則詔相諸侯之禮註曰詔相左右教告之也疏曰諸侯為天子斬其哭位周旋擗踊進退皆有禮灋相息亮反若有四方之大事則受其幣聽其辭註曰四方之大事謂國有兵宼諸侯來告急者禮動不虚皆有贄幣以崇敬也受之以其事入告王也聘禮曰若有言則以束帛如享禮凡諸侯之邦交歲相問也殷相聘也世相朝也註曰小聘曰問殷中也久無事又於殷朝者及而相聘也父死子立曰世凡君即位大國朝焉小國聘焉此皆所以習禮攷義正刑一徳以尊天子也必擇有道之國而就脩之鄭司農説殷聘以春秋傳曰孟僖子如齊殷聘是也疏曰言諸侯邦交謂同方嶽者小行人掌邦國賓客之禮籍以待四方之使者註曰禮籍名位尊卑之書使者諸侯之臣使來者也疏曰大行人待諸侯身小行人待諸侯之使者其邦之禮籍則諸侯及臣皆在焉令諸侯春入貢秋獻功王親受之各以其國之籍禮之註曰貢六服所貢也功考績之功也秋獻之若今計文書斷於九月其舊灋疏曰此云貢即大宰九貢凡諸侯入王則逆勞于畿註曰鄭司農云入王朝於王也故春秋傳曰宋公不王又曰諸侯有王王有巡守及郊勞眂館將幣為承而擯註曰眂館致館也承猶丞也王使勞賓於郊致館於賓至將幣使宗伯為上擯皆為之丞而擯之疏曰此經三事皆為丞而擯之眂者使卿大夫往眂觀其可否郊勞王使大行人勞於郊也惟将幣時大宗伯為上擯凡四方之使者大客則擯小客則受其幣而聽其辭註曰擯者擯而見之王使得親言也受其幣者受之以入告其所為來之事疏曰此時聘殷頫之時要服以内之使臣則擯而見之王蕃國之使臣是夷人不能行禮故直聽其辭而已勞力報反使適四方協九儀賓客之禮朝覲宗遇㑹同君之禮也存頫省聘問臣之禮也註曰適之也協合也黄文叔曰朝覲宗遇㑹同諸侯所以尊天子也而通乎兩君之相朝是則皆君禮也存頫省天子所以撫諸侯也聘問邦交嵗相問殷相聘也是則皆臣禮也達天下之六節山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門闗用符節都鄙用管節皆以竹為之註曰此謂邦國之節也達之者使之四方亦皆齎灋式以齊等之也諸侯使臣行頫聘則以金節授之以為行道之信也虎人龍者自其國象也道路謂鄉遂大夫也都鄙者公之子弟及卿大夫之采地之吏也凡邦國之民遠出至他邦他邦之民若來入由國門者門人為之節由闗者闗人為之節其以徵令及家徙鄉遂大夫及采地吏為之節皆使人執節將之以達之亦有期以反節管節如今之竹使符也其有商者通之以符節如門闗門闗者與市聨事節可同也亦所以異於畿内也凡節有天子之灋式存於國疏曰此經亦是適四方之事言達天下之六節者據侯國而言案掌節云守邦國者用玉節此不言達玉節者文畧亦達可知又掌節貨賄璽節門闗符節各别此中無貨賄文明有商同用符節可知成六瑞王用瑱圭公用桓圭侯用信圭伯用躬圭子用穀璧男用蒲璧註曰成平也瑞信也皆朝見所執以為信疏曰此亦適四方瑱吐電反宜作鎮信音申合六幣圭以馬璋以皮璧以帛琮以錦琥以繡璜以黼此六物者以和諸侯之好故註曰合同也六幣所以享也五等諸侯享天子用璧享后用琮其太各如其瑞皆有庭實以馬若皮皮虎豹皮也用圭璋者二王之後也二王後尊故享用圭璋而特之禮器曰圭璋特義亦通於此其於諸侯亦用璧琮耳子男於諸侯則享用琥璜下其瑞也凡二王後諸侯相享之玉大小各降其瑞一等及使卿大夫頫聘亦如之疏曰此亦小行人至諸侯之國也六者之中馬皮二者本非幣云六幣者二者雖非幣帛以用之當幣處故總號為幣也王光逺曰以其通情而來則謂之好以其因事而來則為之故劉原父曰九儀既正乃達六節以為行道之符乃成六瑞以為朝見之信乃合六幣以致用享之誠琮才宗反琥音虎璜音黄若國札喪則令賻補之若國凶荒則令賙委之若國師役則令槁禬之若國有福事則令慶賀之若國有禍災則令哀弔之凡此五物者治其事故註曰鄭司農云賻補之謂賻喪家補助其不足也若今時一室二尸則官與之棺也槁謂犒師也𤣥謂師役者國有兵宼以匱病者也使鄰國合㑹財貨以與之春秋定五年夏歸粟於蔡是也宗伯職曰以禬禮哀圍敗禍烖水火疏曰凶禮有五唯不見恤禮以義差之當於師役中兼之李子華曰凡此五物者大宗伯雖已具是灋小行人則令行是灋諸侯不得自相往來小行人所以令之坡謂治其事故者如札喪則令賻補凶荒則令賙委之類不得有失且使悉有實惠不如澶淵無歸宋財皆治也事故事之舊式也賻故書作傅槁作犒可奥反禬音㑹及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札喪凶荒厄貧為一書其康樂和親安平為一書凡此五物者每國辨異之以反命于王以周知天下之故註曰慝惡也猶圖也鄭剛中曰康樂謂民之樂和親謂鄰國之交歡安平謂其國之寜静疏曰此總陳小行人使適四方所採風俗善惡之事各各條録别為一書以報上也徐氏曰録其利害則興除之宜在是録其逆順則慶讓之道在是録其悖逆等則征誅之舉在是録其札喪與其康樂等則休戚共之矣凡此五物每國辨異之以為使歸之獻則王必有以處此矣樂音洛司儀掌九儀之賓客擯相之禮以詔儀容辭令揖讓之節註曰出接賓曰擯入贊禮曰相以詔者以禮告王李子華曰儀者禮文也此儀既設人情委曲行乎揖遜儀容之節自然有士君子之行司儀之職特司之而已相悉亮反將合諸侯則令為壇三成宮旁一門註曰合諸侯謂有事而㑹也為壇于國外以命事宮謂壝土以為牆處所謂為壇壝宮天子春帥諸侯拜日於東郊則為壇於國東夏禮日於南郊則為壇於國南秋禮山川邱陵於西郊則為壇於國西冬禮月四瀆於北郊則為壇於國北既拜禮而還加方明於壇上而祀焉所以教尊尊也覲禮曰諸侯覲於天子為宫方三百步四門壇十有二尋深四尺是也王巡守殷國而同則其為宫亦如此與鄭司農云三成三重也爾雅曰邱一成為敦邱再成為陶邱三成為昆侖邱謂三重疏曰令令封人詔王儀南鄉見諸侯土揖庶姓時揖異姓天揖同姓註曰謂王既祀方明諸侯上介皆奉其君之旂置于宫乃詔王升壇諸侯皆就其旂而立諸公中階之前北面東上諸侯東階之東西面北上諸伯西階之西東面北上諸子門東北面東上諸男門西北面東上王揖之者定其位也庶姓無親者也土揖推手小下之也異姓昏姻也時揖平推手也衛將軍文子曰獨居思仁公言言義其聞詩也一日三復白圭之玷是南宫縚之行也夫子信其仁以為異姓謂妻之也天揖推手小舉之疏曰謂諸侯各就位立王在壇亦立司儀乃告王升壇南向見諸侯乃揖之土揖庶姓已下先疎後親為次及其擯之各以其禮公於上等侯伯於中等子男於下等註曰謂執玉而前見於王也擯之各以其禮者謂擯公者五人侯伯四人子男三人也上等中等下等者謂所奠玉處也壇三成深四尺則一等一尺也壇十有二尋方九十六尺則堂上二丈四尺每等丈二尺與諸侯各於其等奠玉降拜升成拜明臣禮也既乃升堂授王玉疏曰下云將幣據三享故知此文擯之據執玉見王也其將幣亦如之其禮亦如之註曰將幣享也禮謂以鬱鬯祼之也皆於其等之上王燕則諸侯毛註曰謂以須髮坐也朝事尊尊上爵燕則親親上齒鄭司農云謂老者在上也老者二毛故曰毛疏曰此乃不問爵之尊卑取以年齒為先後也壝惟癸反鄉許亮反重直龍反下三重重耳同凡諸公相為賓註曰謂相朝也主國五積三問皆三辭拜受皆旅擯再勞三辭三揖登拜受拜送註曰賓所停止則積間濶則問行道則勞其禮皆使卿大夫致之從來至去數如此也三辭辭其以禮來於外也積問不言登受之於庭也旅讀為鴻臚之臚臚陳之也賓之介九人使者七人皆陳擯位不傳辭也賓之上介出請使者則前對位皆當其末擯焉三揖謂庭中時也拜送送使者疏曰再勞一勞在境一勞在遠郊皆使卿其近郊勞當主君親為之也其積問當使大夫故下句云致飱如致積之禮聘禮宰夫朝服設飱宰夫即大夫問亦小禮明亦使大夫也主君郊勞交擯三辭車逆拜辱三揖三辭拜受車送三還再拜註曰主君交勞備三勞而親之也交擯者各陳九介使傳辭也車迎拜辱者賓以主君親來乗車出舍門而迎之若欲逺就之然見之則下拜迎謝其自屈辱來也至去又出車若欲遠送然主君三還辭之乃再拜送之也車送迎之節各以其等則諸公九十步立當車軹也三辭重者先辭辭其以禮來於外後辭辭升堂疏曰三揖者入門及當曲當碑為三揖拜受賓再拜乃受幣主君亦當拜送不言省文也鄭謂各陳九介者以其在道俱不為主故無五擯之事故各陳九介云立當車軹者賓主俱立當軹致館亦如之註曰館舍也使大夫授之君又以禮親致焉疏曰凡云致者皆有幣以致之致飱如致積之禮註曰俱使大夫禮同也飱食也小禮曰飱大禮曰饔餼及將幣交擯三辭車逆拜辱賓車進答拜三揖三讓每門止一相及廟惟上相入賓三揖三讓登再拜授幣賓拜送幣每事如初賓亦如之及出車送三請三進再拜賓三還三辭告辟註曰鄭司農云交擯擯者交也賓三還三辭告辟賓三還辭謝言已辟去也𤣥謂既三辭主君則乗車出大門而迎賓見之而下拜其辱賓車乃前下答拜也三揖者相去九十步揖之使前也至而三讓讓入門也相謂主君擯者及賓之介也謂之相者於外傳辭耳入門當以禮詔侑也介紹而傳命者君子於其所尊不敢質敬之至也每門止一相彌相親也君入門介拂闑大夫中棖與闑之間士介拂棖此為介鴈行相随也止之者絶行在後耳賓三揖三讓讓升也登再拜授幣授當為受主人拜至且受玉也每事如初謂享及有言也賓當為儐謂以鬱鬯禮賓也上於下曰禮敵者曰儐禮器曰諸侯相朝灌用鬱鬯無籩豆之薦謂此朝禮畢儐賓也三請三進請賓就車也主君每一請車一進欲逺送之也三還三辭主君一請者賓亦一還一辭疏曰至將幣謂賓初至館後日行朝禮之時幣即圭璋也交擯三辭者賓去門九十步而陳九介主君在大門外之東陳五擯上擯入受命出請事傳辭與承擯承擯傳與末擯末擯傳與末介末介傳與承介承介傳與上介上介傳與賓賓又傳與上介自下逆上傳至上擯上擯入告君如是者三謂之交擯三辭凡交擯者例皆如此也致饔餼還圭饗食致贈郊送皆如將幣之儀註曰此六禮者惟饗食速賓耳其餘主君親往親往者賓為主人主人為賓君如有故不親饗食則使大夫以酬幣侑幣致之鄭司農云還圭歸其玉也故公子重耳受飱反璧𤣥謂聘以圭璋禮也享以璧琮財也已聘而還圭璋輕財而重禮贈送以財既贈又送至于郊賓之拜禮拜饔餼拜饗食註曰鄭司農云賓之拜禮者因言賓所當拜者之禮也所當拜者拜饔餼拜饗食𤣥謂賓將去就朝拜謝此三禮三禮禮之重者也賓既拜主君乃至館贈之去又送之于郊疏曰案聘禮饔餼燕羞俶獻之明日賓皆拜于朝將去又三拜乗禽于朝彼臣故盡拜謝君畧小惠將去惟拜其大禮也賓繼主君皆如主國之禮註曰鄭司農云賓繼主君復主人之禮費也故曰皆如主國之禮𤣥謂繼主君者儐主君也儐之者主君郊勞致館饔餼還圭贈郊送之時也如其禮者謂玉帛皮馬也有饌陳之積者不如也若饗食主君及燕亦速焉積子賜反旅如字又音臚飱素尊反授幣音受賓亦如之依註作擯辟音避食音嗣凡饗食皆同侑音又闑魚列反棖直庚反行戸剛反諸侯諸伯諸子諸男之相為賓也各以其禮相待也如諸公之儀註曰賓主相待之儀與諸公同也饔餼饗食之禮則有降殺疏曰五等諸侯以命數分為三等其圭璋饔餼飱積步數擯介皆降殺其進退揖讓之儀則一與公同殺色界反下同諸公之臣相為國客註曰謂相聘也則三積皆三辭拜受註曰受者受之於庭也侯伯之臣不致積疏曰案聘禮是侯伯之卿使者經不云積明不致積可知但不以束帛行禮致之豈於道全無積乎明有也及大夫郊勞旅擯三辭拜辱三讓登聽命下拜登受賓使者如初之儀及退拜送註曰登聽命賓登堂也賓當為儐勞用束帛儐用束錦侯伯之臣受勞於庭疏曰案儀禮此亦近郊勞也賓使者如初之儀者謂使傳命訖禮畢出門賓以束錦儐使者如初行勞時之儀致館如初之儀註曰如郊勞也不擯耳侯伯之臣致館于庭不言致飱者君於聘大夫不致飱也聘禮曰飱不致賓不拜及將幣旅擯三辭拜逆客辟三揖每門止一相及廟唯君相入三讓客登拜客三辟授幣下出每事如初之儀註曰客辟逡巡不答拜也唯君相入客臣也相不入矣拜主君拜客至也客三辟三退負序也每事享及有言疏曰將幣亦謂圭璋也旅擯三辭亦謂於主君大門外主君陳五擯客陳七介不傳辭也三辭者辭主君以大客禮當已也拜逆者三辭訖主君遣上擯納賓賓入大門主君在大門内南面拜賓及禮私面私獻皆再拜稽首君答拜註曰禮以醴禮客私面私覿也既覿則或有私獻者鄭司農云説私面以春秋傳曰楚公子棄疾見鄭伯以其乗馬私面疏曰此三者皆於聘之日行之故并言之出及中門之外問君客再拜對君拜客辟而對君問大夫客對君勞客客再拜稽首君答拜客趨辟註曰中門之外即大門之内也問君曰君不恙乎對曰使臣之來寡君命臣于庭問大夫曰二三子不恙乎對曰寡君命使臣於庭二三子皆在勞客曰道路悠逺客甚勞勞介則曰二三子甚勞問君客再拜對曰為敬慎也疏曰賓來主為以君命行聘享是以先行聘享訖乃始行私相慰問之事致饔餼如勞之禮饗食還圭如將幣之儀註曰饗食亦謂君不親而使大夫以幣致之疏曰致饔餼如勞之禮者同使卿威儀進止皆如上郊勞之禮致饗及還玉賓主皆是大夫其將幣主君與使臣行禮如將幣者蓋不盡如之所如者如旅擯主人皮弁賓皮弁襲將幣同自餘則别是以聘禮君使卿皮弁還玉于館賓皮弁襲迎于外門外不拜帥大夫以入大夫升自西階鉤楹賓自碑内聽命升自西階自左南面受圭退負右房而立是與將幣别之序也君館客客辟介受命遂送客從拜辱于朝註曰君館客者客將去就省之盡殷勤也遂送君拜以送客明日客拜禮賜遂行如入之積註曰禮賜謂乗禽君之加惠也如入之積則三積從來至去積子賜反勞老報反辟音避從才用反甚勞如字凡侯伯子男之臣以其國之爵相為客而相禮其儀亦如之註曰爵卿也大夫也士也疏曰諸侯之臣言爵相為客而相禮者不離三等卿大夫士蓋以命數則參差難等畧於臣用爵而已以此三等相禮也其儀亦如之者亦以三等相差七十步七介五十步五介三十步三介小聘使大夫又降殺也相禮息亮反凡四方之賓客禮儀辭命餼牢賜獻以二等從其爵而上下之註曰上下猶豐殺也疏曰二等即與大行人云諸侯之卿各下其君二等大夫士亦如之大夫下卿士下大夫降殺以兩解之同也坡謂上言公與公國君臣相賓客侯伯子男與侯伯子男君臣相賓客其爵等其禮同如上所言也此經則言一國待四方之禮凡賓客送逆同禮註曰謂郊勞郊送之屬凡諸侯之交各稱其邦而為之幣以其幣為之禮註曰幣享幣也於大國則豐於小國則殺主國禮之如其豐殺謂賄用束紡禮用玉帛乘皮及贈之屬疏曰此一經論享幣多少及主國報禮輕重之事稱尺證反凡行人之儀不朝不夕不正其主面亦不背客註曰謂擯相傳辭時也不正東鄉不正西鄉常視賓主之前郤得兩鄉之而已鄉許亮反行夫掌邦國傳遽之小事媺惡而無禮者凡其使也必以旌節雖道有難而不時必達註曰傳遽若今時乘傳騎驛而使者也媺福慶也惡喪荒也此事之小者無禮行夫主使之道有難謂遭疾病他故不以時至也必達王命不可廢也其大者有禮大小行人使之有故則介傳命不嫌不達疏曰行夫者以身自行於外無擯介而單行謂之無禮也媺謂諸侯生男及嫁娶等惡謂民有死喪及年穀不熟若諸侯薨等大事即使卿大夫不使行夫也傳張戀反註同使色吏反難乃旦反居於其國則掌行人之勞辱事焉使則介之註曰使謂大小行人也故書曰夷使鄭司農云夷使使於四夷則行夫主為之介𤣥謂夷發聲焉劉音夷環人掌送逆邦國之通賓客以路節達諸四方註曰通賓客以常事往來者也路節旌節也四方圻上疏曰邦國之賓客謂朝覲㑹同者也云四方圻上者至畿即入諸侯國諸侯國自有通之者也舎則授館令聚􅈀有任器則令環之註曰令令野廬氏也鄭司農云四方人有任器者則環人主令殉環守之疏曰任器謂賓客任用之器殉音循凡門闗無㡬送逆及疆疏曰環人送逆之則賓客出入不見幾象胥掌蠻夷閩貉戎狄之國使掌傳王之言而諭説焉以和親之註曰謂蕃國之臣來頫聘者閩迷巾反使色吏反若以時入賓則協其禮與其辭言傳之註曰以時入賓謂其君以世一見來朝為賓者凡其出入送逆之禮節幣帛辭令而賓相之註曰自來至去皆為擯而相侑其禮儀疏曰夷狄無玉帛來向中國而云幣帛者謂王有賜與之禮也徐氏曰辭令天子誥諭之辭令也賓相音擯相息亮反下同凡國之大喪詔相國客之禮儀而正其位凡軍旅㑹同受國客幣而賓禮之鄭剛中曰國客謂四夷遣其臣來也中國之客自有大小行人掌正其位劉執中曰若其入賓而遇國之大喪則詔相其禮儀以正其位若遇軍旅㑹同則受其幣而賓禮之皆謂蕃國也凡作事王之大事諸侯次事卿次事大夫次事上士下事庶子註曰作使也鄭司農云王之大事諸侯使諸侯執大事也次事卿使卿執其次事也次事使大夫次事使上士下事使庶子王光逺曰凡作事謂作四夷之事王之大事謂有戎事於四夷也諸侯以敵王所愾為事故大事在諸侯次事則非戎事謂威讓之令文誥之辭或施於四夷者則量其事之輕重或以卿大夫或以上士也若夫下事則事之尤小者故以庶子而已掌客掌四方賓客之牢禮餼獻飲食之等數與其政治註曰政治邦新殺禮之屬王合諸侯而饗禮則具十有二牢庶具百物備諸侯長十有再獻註曰饗諸侯而用王禮之數者以公侯伯子男盡在是兼饗之莫敵用也諸侯長九命作伯者也獻公侯以下如其命數疏曰合謂時㑹殷同長知丈反敵丁厯反一作適音的王巡守殷國則國君膳以牲犢令百官百牲皆具從者三公眂上公之禮卿眂侯伯之禮大夫眂子男之禮士眂諸侯之卿禮庶子壹眂其大夫之禮註曰國君者王所過之國君也犢繭栗之犢也以膳天子貴誠也牲孕天子不食也祭帝不用也凡賓客則皆角尺令者掌客令主國也百牲皆具言無有不具備疏曰王巡守則殷同殷同則殷國也王巡守至於四嶽之下當方諸侯或所在經過或至方嶽之下若殷國或在王城出畿外在諸侯之國所在之處皆設禮待王故巡守殷國並言也膳亦謂殷膳時也令百官百牲皆具者此文與下為目百官即三公以下是也從才用反繭古典反凡諸侯之禮上公五積皆眂飱牽三問皆脩羣介行人宰史皆有牢飱五牢食四十簠十豆四十鉶四十有二壺四十鼎簋十有二牲三十有六皆陳饔餼九牢其死牢如飱之陳牽四牢米百有二十筥醯醢百有二十罋車皆陳車米眂生牢牢十車車秉有五籔車禾眂死牢牢十車車三秅芻薪倍禾皆陳乘禽日九十雙殷膳大牢以及歸三饗三食三燕若弗酌則以幣致之凡介行人宰史皆有飱饔餼以其爵等為之牢禮之陳數唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢食大牢卿皆見以羔膳大牢侯伯四積皆眂飱牽再問皆脩飱四牢食三十有二簠八豆三十有二鉶二十有八壺三十有二鼎簋十有二腥二十有七皆陳饔餼七牢其死牢如飱之陳牽三牢米百筥醯醢百罋皆陳米三十車禾四十車芻薪倍禾皆陳乘禽日七十雙殷膳大牢三饗再食再燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮八壺八豆八籩膳大牢致饗大牢卿皆見以羔膳特牛子男三積皆眂飱牽壹問以脩飱三牢食二十有四簠六豆二十有四鉶十有八壺二十有四鼎簋十有二牲十有八皆陳饔餼五牢其死牢如飱之陳牽二牢米八十筥醯醢八十罋皆陳米二十車禾三十車芻薪倍禾皆陳乗禽日五十雙壹饗壹食壹燕凡介行人宰史皆有飱饔餼以其爵等為之禮唯上介有禽獻夫人致禮六壺六豆六籩膳眂致饗親見卿皆膳特牛註曰積皆眂飱牽謂所共如飱而牽牲以往不殺也不殺則無鉶鼎簠簋之實其米實于筐豆實實于罋其設筐陳于楹内罋陳于楹外牢陳于門西車米禾芻薪陳于門外壺之有無未聞三問皆脩脩脯也上公三問皆脩下句云羣介行人宰史皆有牢君用脩而臣有牢非禮也蓋著脱字失處且誤耳飱客始至致小禮也公侯伯子男飱皆飪一牢其餘牢則腥食者其庶羞美可食者也其設蓋陳于楹外東西不過四列簠稻粱器也公十簠堂上六西夾東夾各二也侯伯八簠堂上四西夾東夾各二子男六簠堂上二西夾東夾各二豆菹醢器也公四十豆堂上十六西夾東夾各十二侯伯三十二豆堂上十二西夾東夾各十子男二十四豆堂上十二西夾東夾各六禮器曰天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫六以聘禮差之則堂上之數與此同鉶羮器也公鉶四十二侯伯二十八子男十八非衰差也二十八書或為二十四亦非也其於衰公又當三十於言又為無施禮之大數鉶少於豆推其衰公鉶四十二宜為三十八蓋近之矣則公鉶堂上十八西夾東夾各十侯伯堂上十二西夾東夾各八子男堂上十西夾東夾各四壺酒器也其設於堂夾如豆之數鼎牲器也簋黍稷器也鼎十有二者飪一牢正鼎九與陪鼎三皆設于西階前簋十二者堂上八西夾東夾各二合言鼎簋者牲與黍稷俱食之主也牲當為腥聲之誤也腥謂腥鼎也於侯伯云腥二十有七其故腥字也諸侯禮盛腥鼎有鮮魚鮮腊毎牢皆九為列設于阼階前公腥鼎三十六腥四牢也侯伯腥鼎二十七腥三牢也子男腥鼎十八腥二牢也皆陳陳列也飧門内之實備于是矣亦有車米禾芻薪公飱五牢米二十車禾三十車侯伯四牢米禾皆二十車子男三牢米十車禾二十車芻薪皆倍其禾饔餼既相見致大禮也大者既兼飧積有生有腥有熟餘又多也死牢如飱之陳亦飪一牢在西餘腥在東也牽生牢也陳于門西如積也米横陳于中庭十為列每筥半斛公侯伯子男黍梁稻皆二行公稷六行侯伯稷四行子男二行醯醢夾碑從陳亦十為列醯在碑東醢在碑西皆陳於門内者於公門内之陳也言車者衍字耳車米載車之米也聘禮曰十斗曰斛十六斗曰籔十籔曰秉每車秉有五籔則二十四斛也禾稾實幷刈者也聘禮曰四秉曰筥十筥曰稯十稯曰秅每車三秅則三十稯也稯猶束也米禾之秉筥字同數異禾之秉手把耳筥讀為棟梠之梠謂一穧也皆陳横陳門外者也米在門東禾在門西芻薪雖取數於禾薪從米芻從禾也乗禽乗行羣處之禽謂雉雁之屬於禮以雙為數殷中也中又致膳示念賓也若弗酌謂君有故不親饗食燕也不饗則以酬幣致之不食則以侑幣致之凡介行人宰史衆臣從賓者也行人主禮宰主具史主書皆有飱饔餼尊其君以及臣也以其爵等為之牢禮之數陳爵卿也則飧二牢饔餼五牢大夫也則飧大牢饔餼三牢士也則飱少牢饔餼大牢也此降小禮豐大禮也以命數則參差難等畧於臣用爵而已夫人致禮助君養賓也籩豆陳於戸東壺陳於東序凡夫人之禮皆使下大夫致之於子男云膳視致饗言夫人致膳於小國君以致饗之禮則是不復饗也饗有壺酒鄉皆見者見於賓也既見之又膳之亦所以助君養賓也卿見又膳此聘禮卿大夫勞賓餼賓之類與於子男云親見卿皆膳特牛見讀如卿皆見之見言卿於小國之君有不故造館見者故造館見者乃致膳鄭司農説牽云牲可牽行者也故春秋傳曰餼牽竭矣秅讀為秅秭麻答之秅疏曰此一經並是諸侯自相朝主國待賓之禮若然天子掌客不見天子待諸侯禮而見諸侯自相待者以外􅊶内天子待諸侯亦同諸侯自相待可知鄭剛中曰攷此下文有夫人致禮之事則知為諸侯待賓客之禮無疑積子賜反鉶音刑三十有六及牲十有八當作腥筥姜呂反罋烏弄反籔素口反秅丁故反三食音嗣下食大牢再食壹食註不食同餘如字見賢遍反飪而甚反差初宜反衰初危反相見不見而見皆讀如字行戸剛反稯子工反又音總梠音呂穧才計反造七報反秭音姊凡諸侯之卿大夫士為國客則如其介之禮以待之註曰言其特來聘問待之禮如其為介時然則聘禮凡所以禮賓是亦禮介坡謂自上公五積至此皆詳主國所以待公侯伯子男及其卿大夫士之禮而王之從者公卿大夫士庶子待之之禮舉眂此矣從才用反凡禮賓客國新殺禮凶荒殺禮札喪殺禮禍烖殺禮在野在外殺禮註曰皆為國省用愛費也國新新建國也凶荒無年也禍烖新有兵寇水火也疏曰野外忽遽禮物不可卒備故亦殺之殺色界反凡賓客死致禮以喪用註曰死則主人為之具而殯矣喪用者饋奠之物疏曰如小殮特豚一鼎大殮時特豚三鼎之類是也賓客有喪惟芻稍之受註曰不受饗食饗食加也喪謂父母死也客則又有君焉芻給牛馬稍人廩也其正禮飧饔餼主人致之則受遭主國之喪不受饗食受牲禮註曰牲亦當為腥聲之誤也有喪不忍煎亨正禮飧饔餼當熟者腥致之也稍所教反亨普庚反掌訝掌邦國之等籍以待賓客註曰等九儀之差數訝誤化反若将有國賓客至則戒官脩委積與士逆賓于疆為前驅而入註曰官謂牛人羊人舍人委人之屬士訝士也既戒乃出迎賓及宿則令聚􅈀註曰令令野廬氏及委則致積註曰以王命致于賓至于國賓入館次于舍門外待事于客註曰次如今官府門外更衣處待事于客通其所求索及將幣為前驅註曰道之以如朝至于朝詔其位入復及退亦如之註曰鄭司農云詔其位告客以其位次也𤣥謂入復者入告王以客至也退亦如之如其為前驅疏曰于朝者即是大門外陳擯介之處道音導下同凡賓客之治令訝訝治之註曰賓客之治謂欲正其貢賦理國事也以告訝訝為如朝而理之凡從者出則使人道之註曰從者凡介以下也人其屬胥徒也使道賓客之從者營䕶之及歸送亦如之註曰如之者送至於竟如其前驅聚􅈀待事之屬從才用反註同竟音境凡賓客諸侯有卿訝卿有大夫訝大夫有士訝士皆有訝註曰此謂朝覲聘問之日王所使迎賓客於館之訝疏曰案聘禮記云卿大夫訝大夫士訝士皆有訝賓即館訝將公命又見之以其摯聘問之日亦使之訝天子有掌訝之官即館之訝餘事皆掌主之惟朝覲聘問之日使卿大夫訝諸侯兼官故大夫士為訝賓即館時即為之訝與此掌訝不同也凡訝者賓者至而往詔相其事而掌其治令易彦祥曰上經因訝賓客而及卿大夫即館之訝此復言掌訝之職凡言脩委積以下皆所治之令相息亮反掌交掌以節與幣巡邦國之諸侯及其萬民之所聚者道王之徳意志慮使咸知王之好惡辟行之註曰節以為行信幣以見諸侯也咸皆也辟讀如辟忌之辟使皆知王之所好者而行之知王所惡者辟而不為疏曰案序官掌交中士八人天下九州千六百餘國使皆周徧必無徧理今言之者蓋是國有不知治者徧使知之也好呼報反惡烏路反辟音避註同使和諸侯之好註曰有欲相與脩好者則為和合之疏曰下有結其交好為朝聘則此好謂使為婚姻之好也達萬民之説註曰説所喜也達者達之於王若其國君説音悦掌邦國之通事而結其交好註曰通事謂朝覲聘問也以諭九税之利九禮之親九牧之維九禁之難九戎之威註曰諭告曉也九税所税民九職也九禮九儀之禮九牧九州之牧九禁九灋之禁九戎九伐之戎坡謂下而九税取之有常則民足而君利中之九禮九牧則善鄰而親仁上之九禁九伐則奉灋而畏威夏官之匡人撢人所以消兵於未形也此之掌交刑期于無刑也難乃旦反撢他南反掌察闕掌貨賄闕朝大夫掌都家之國治註曰都家王子弟公卿及大夫之采地也主其國治者平理其來文書於朝者日朝以聽國事故以告其君長註曰國事故天子之事當施於都家者也告其君長使知而行之也君謂其國君長其卿大夫也朝直遙反長丁丈反下同國有政令則令其朝大夫註曰使以告其都家之吏坡謂上文國事故乃天子日所施為者聴之以告其君長使知王之所好惡而辟行之也此政令方是當施於都家者辟音避凡都家之治於國者必因其朝大夫然後聴之唯大事弗因註曰謂以小事文書來者朝大夫先平理之乃以告有司也大事者非朝大事者非朝大夫所能平理凡都家之治有不及者則誅其朝大夫註曰不及謂有稽殿之在軍旅則誅其有司註曰有司都司馬家司馬都則闕都士闕家士闕坡謂右自大司宼小司宼士師三長官而下鄉士主國獄遂士主郊縣士主野方士主都家畿内也訝士主四方獄訟畿外也次以朝士者諸㫁獄弊訟皆於外朝也次以司民者見民者天之所司王之所敬作天之牧受王嘉師當有仁恩憫念也獄訟既弊有五刑以麗其辟故次司刑有刺宥以議其輕重故次司刺有大亂獄則故府之典章在故次司約有疑獄不決則天威之嚴在故次司盟於是罪輕而贖刑者則職金受其入次之罪重而孥戮者則司厲執其灋次之稍重而未麗於灋者則司圜主収教又次之已在刑者則囚而刑殺故掌囚掌戮又次之從坐者恕其死因存其生故司隸罪隸又次之繼以蠻閩夷貉四隸者蓋征伐四夷所得同名為隸皆此意也繼犬人于司厲者司厲治盜犬能逐盜者也雖然刑非得已也禁於未發則民安而上不煩故布憲禁於天下禁殺戮禁暴氏禁于國中野廬氏蜡氏雍氏萍氏司寤氏所以使行者無害死者有主陸走者無險阻水浮者不没溺時其宵晝行止以節皆道路之禁也司烜氏條狼氏脩閭氏皆祭祀軍旅之禁也自冥氏至庭氏十二職草木鳥獸為民害者驅而除之義之盡也繼以銜枚氏司囂者無端歌哭雜氣妖聲人化物者不祥也故次之於是刑事盡矣次以伊耆氏者秋養耆老故也次以大行人等官者賓位於西北天地之義氣屬秋也朱子又曰凡諸侯朝覲㑹同之禮既畢則降而肉袒請刑司寇主刑故屬焉此又較著也大行人小行人主迎賓客賓客既至見於王則有儀故司儀次之而行夫掌小事環人掌送逆象胥掌四夷國使官卑禮簡又次之賓客朝見既畢有饔飧牢禮之歸故掌客次之賓客自來至去皆有訝故掌訝終焉掌交則王所以交於諸侯也附以朝大夫者都家王畿之内也自大司寇至職末凡官六十有六其掌察掌貨賄都則都士家士文闕不敢强為之次貉音陌蜡音聚烜音燬條音滌强其兩反周禮述註卷二十二
