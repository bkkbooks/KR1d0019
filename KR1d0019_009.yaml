body:
  text: 周禮述注卷九安溪李光坡撰載師掌任土之法以物地事授地職而待其政令注曰任土者任其力勢所能生育且以制貢賦也物物色之以知其所宜之事而授農牧虞衡使職之疏曰待其政令者謂因其職事使其賦貢即下經園廛二十而一以下是以廛里任國中之地以場圃任園地以宅田士田賈田任近郊之地以官田牛田賞田牧田任逺郊之地以公邑之田任甸地以家邑之田任稍地以小都之田任縣地以大都之田任疆地注曰鄭司農云民宅曰宅宅田者以備益多也士田者士大夫之子得而耕之田也賞田者賞賜之田司馬法曰王國百里為郊二百里為州三百里為野四百里為縣五百里為都杜子春云五十里為近郊百里為逺郊𤣥謂廛里者若今云邑里居矣廛民居之區域也里居也圃樹果蓏之屬季秋於中為場樊圃謂之園宅田致仕者之家所受田也士相見禮曰宅者在邦則曰市井之臣在野則曰草茅之臣士讀為仕仕者亦受田所謂圭田也孟子曰自卿以下必有圭田圭田五十畝賈田在市賈人其家所受田也官田庶人在官者其家所受田也牛田牧田畜牧者之家所受田也公邑謂六遂餘地夫子使大夫治之自此以外皆然二百里三百里其上大夫如州長四百里五百里其下大夫如縣正是以或謂二百里為州四百里為縣云遂人亦監焉家邑大夫之采地小都卿之采地大都公之采地王子弟所食邑也疆五百里王畿界也皆言任者地之形實不方平如圖受田邑者逺近不得盡如制其所生育賦貢取正於是爾以廛里任國中而遂人職授民田夫一廛田百畝是廛里不謂民之邑居在都城者與凡王畿內方千里積百同九百萬夫之地也有山陵林麓川澤溝瀆城郭宫室涂巷三分去一餘六百萬夫又以田不易一易再易上中下相通定受田者三百萬家也逺郊之內地居四同三十六萬夫之地也三分去一其餘二十四萬夫六鄉之民七萬五千家通不易一易再易一家受二夫則十五萬夫之地其餘九萬夫廛里也場圃也宅田也士田也賈田也官田也牛田也賞田也牧田也九者亦通受一夫焉則半農人也定受田十二萬家也食貨志云農民户一人已受田其家衆男為餘夫亦以口受田如此士工商家受田五口乃當農夫一人今餘夫在遂地之中如此則士工商以事入在官而餘夫以力出耕公邑甸稍縣都合居九十六同八百六十四萬夫之地城郭宫室差少涂巷又狹於三分所去六而存一焉以十八分之十三率之則其餘六百二十四萬夫之地通上中下六家而受十三夫定受田二百八十八萬家也其在甸七萬五千家為六遂餘則公邑賈音古疆疆本字監古銜反率音律凡任地國宅無征園廛二十而一近郊十一逺郊二十而三甸稍縣都皆無過十二唯其漆林之征二十而五注曰征稅也言征者以共國政也鄭司農云任地謂任土地以起賦稅也𤣥謂國宅凡官所有宫室吏所治者也國稅輕近而重逺近者多役也園廛亦輕之者廛無榖園少利也古之宅必樹而疆場有瓜疏曰上經言任地所在此經言地稅多少不同之事甸稍縣都皆無過十二者但此四處出稅不同據上文直言公邑任甸地則甸地之中兼有六遂矣其稍縣都上文推言三等采地為井田助法不見公邑則三者之中皆有公邑此云十二者餘三等采地而言以其鄉遂公邑皆為夏之貢法故也漆林之稅特重以其自然所生非人力所作故也凡宅不毛者有里布凡田不耕者出屋粟凡民無職事者出夫家之征注曰鄭司農云宅不毛者謂不樹桑麻也布泉也宅不毛者有里布民無職事者出夫家之征欲令宅樹桑麻民就四業則無稅賦以勸之也𤣥謂宅不毛者罰以一里二十五家之泉空田者罰以三家之稅粟以共吉凶二服及喪器也民雖有閒無職事者猶出夫稅家稅也夫稅者百畝之稅家稅者出士徒車輦給繇役朱子曰宅不毛為其為亭臺也田不耕為其為池沼也閒音間以時徴其賦坡謂賦田賦也大宰大府所謂九賦司㑹所謂以九賦之法令田野之財用者也蓋惟正之供也㑹古外反問里布既仍鄭注則口泉之說是矣若以口泉為非則里布之注不仍矣曰朱子仍之坡何敢不仍或問里布朱子云亦不可考朱子莫考之坡何能有考而有以易之饒氏云家征是力役之征夫征是粟米之征里布是布縷之征是不以布為泉也不以為泉而以為布縷與不毛之罰似得其倫類然本經凡言布者指泉為多獨於此為布縷饒氏之云亦未有他據也况一字而二三其解又解經之所深避乎仍而闕之不害為慎雖然三代遠矣里布或别有所指為口泉決非也閭師掌國中及四郊之人民六畜之數以任其力以待其政令以時徴其賦國中及四郊六鄉之中自廛里至逺郊也掌六畜數者農事之本且祭祀養老之所必具車乘之所必役也政令賦役皆是也坡謂此所徴賦乃萬民之貢也大宰所謂九職大府所謂九功司㑹所謂以九功之法令民職之財用者也亦稱賦者疏云賦其總名是也凡任民任農以耕事貢九榖任圃以樹事貢草木任工以飭材事貢器物任商以市事貢貨賄任牧以畜事貢鳥獸任嬪以女事貢布帛任衡以山事貢其物任虞以澤事貢其物注曰貢草木謂葵韭果蓏之屬疏曰大宰以九職任萬民有職必有功有功即有貢故此論貢之法也分山澤為二者以山澤出貢不同故分為二以充八通閒民為九耳貢其物者山澤出産多故不名一物凡無職者出夫布載師云任地則無職者惰農也有田不耕故罰重此云任民則無職者遊手也勉以擇業故罰輕夫布者以布代九榖與吳幼清曰賦與貢異賦有常數貢無常數此任民以八貢則隨其地産而貢之其無者不强凡庶民不畜者祭無牲不耕者祭無盛不樹者無椁不蠶者不帛不績者不衰注曰掌罰其家事也盛黍稷也椁周棺也不帛不得衣帛也不衰喪不得衣衰也皆所以恥不勉盛音成强上聲縣師掌邦國都鄙稍甸郊里之地域而辨其夫家人民田萊之數及其六畜車輦之稽三年大比則以考羣吏而以詔廢置注曰郊里郊所居也自邦國以及四郊之內是所主數周天下也萊休不耕者郊內謂之易郊外謂之萊善言近吕伯恭曰先王自封建諸侯外有閒田散在諸侯之國或謂諸侯有罪則削其地以為閒田若有功則以閒田增封之天子平時各命王官以掌之縣師掌邦國都鄙稍甸郊里之地域而兼天下之閒田以總其目此皆古人封建相維之意若將有軍旅㑹同田役之戒則受法於司馬以作其衆庶及馬牛車輦㑹其車人之卒伍使皆備旗鼓兵器以帥而至注曰受法於司馬者知所當徴衆寡邱氏曰作起也起其衆庶馬牛車輦而後㑹其車人之卒伍人有人之卒伍車有車之卒伍坡謂下稍人注云縣師受於司馬邦國都鄙稍甸郊里唯司馬所調帥而至者帥而至司馬也凡造都邑量其地辨其物而制其域疏曰都大都小都邑家邑也物謂地所有也若地無所有不可耕墾若山澤者不授之故王制云名山大澤不以封以嵗時徴野之賦貢坡謂野謂甸稍縣都也所徴貢與閭師同徴賦則二載師也遺人掌邦之委積以待施惠疏曰此與下為總目也鄉里之委積以恤民之囏厄門關之委積以養老孤郊里之委積以待賓客野鄙之委積以待羇旅縣都之委積以待凶荒注曰委積者廩人倉人計九榖之數足國用以其餘共之所謂餘法用也職內邦之移用亦如此也皆以餘財共之少曰委多曰積鄉里鄉所居也囏厄猶困乏也門關以養老孤人所出入易以取餼廩也羇旅過行寄止者待凶荒謂邦國所當通給者也疏曰鄉里據國中郊里即六鄉之民所居郊者賓客至郊與主國使者交接因即與之廩餼故以待賓客也野鄙者六遂在郊外曰野六遂有五百家鄙故以鄙表六遂耳羇旅處處皆有獨於此見惠者甸地在二百里中於內外有羇旅皆得取之故獨見於此也云縣都不見家稍者則縣都中可以兼之特於此三處見凶荒者凶荒則畿內畿外皆有若畿外凶荒則入向畿內取之畿內凶荒則向畿外取之故於近畿三百里之外言待凶荒之事也凡賓客㑹同師役掌其道路之委積凡國野之道十里有廬廬有飲食三十里有宿宿有路室路室有委五十里有市市有候館候館有積注曰廬若今野候徙有庌也宿可止宿若今亭有室矣候館樓可以觀望者也一市之間有三廬一宿疏曰上經委積隨其所須之處而委積此經所陳委積據㑹同師役行道所須故分布於道路薛士龍曰成周封建之制自諸侯祿地及祿士之外其閒田之歸於公上者雖領於王官皆藏於天下故自都達竟有委有積凡糗糧芻茭具焉以待軍旅考之於詩徹申伯土疆以峙其糧而左氏亦云衛取於相土之東都以㑹王之東搜夫糧峙於申㑹搜之備達於衛境天下之賦藏略可覩矣王氏曰遺人㑹同司役之委積邦之大用不領於大府者大府主邦中經費之用有品式式用之餘所餘猶多則隨道里之便收貯之卒然有急而用可無之兼無餽餉輸挽之勞是以雖行千里而若袵席上過師也庌音雅竟音境凡委積之事巡而比之以時頒之疏曰言凡委積上二文委積之事是也以時頒之則以待者是也均人掌均地政均地守均地職均人民牛馬車輦之力政均人所均地政以下總均畿內鄉遂及公邑政讀為征地征九賦也地守虞衡之屬地職農圃之屬二者九貢也力政人民則治城郭涂巷溝渠牛馬車輦則轉委積之屬政音征下同凡均力政以嵗上下豐年則公旬用三日焉中年則公旬用二日焉無年則公旬用一日焉注曰豐年人食四釜之嵗也人食三釜為中嵗人食二釜為無嵗嵗無贏儲也公事也旬均也讀如㽦㽦原隰之㽦易坤為均今書亦有作旬者疏曰此所均力政者即上人民之力政不通牛馬車輦釜房甫反㽦音旬凶札則無力政無財賦無力政恤其勞也無財賦恤其乏困也財賦即九賦地政也疏曰此即廩人云不能人二釜之嵗不收地守地職不均地政無財賦故不平計地征也非凶札之嵗當斂賦乃均之耳獨言不均地政舉其重者其實地守地職既不收亦不均矣三年大比則大均注曰有年無年大平計之若久不修則數或闕師氏掌以媺詔王注曰告王以善道也文王世子曰師也者教之以事而諭諸德者也吕伯恭曰程伊川謂後世知求治而不知正君知規過而不知養德蓋後世諫諍之官所以正君之惡者未嘗不設若從容和緩以養君之德者則闕焉師氏以媺詔王專以從容和緩養君之德不幸君有過則有保氏之官在故二官皆言王舉則從聽治亦如之使人君既有所養又有所畏所以二者不可偏廢媺音美以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長注曰德行內外之稱在心為德施之為行孝在三德之下三行之上德有廣於孝而行莫尊焉疏曰以此三教教國子王太子已下至元士之適子也朱子曰至德云者誠意正心端本清源之事道則天人性命之理事物當然之則修身齊家治國平天下之術也敏德云者彊志力行蓄德廣業之事行則理之所當為日可見之跡也孝德云者尊祖愛親不忘其所由生之事知逆惡則以得於已者篤實深固有以真知彼之逆惡而自不忍為者也吕伯恭曰賢良者國中之先生長者也師長者朝夕與吾處者也黃文叔曰六德三德同此德也六德舉其成德之可名者也三德原始要終使知所由入也六行三行同此行也孝弟而已矣行下孟反知音智居虎門之左司王朝注曰虎門路寢門也王日視朝於路寢門外畫虎焉以明勇猛於守宜也司猶察也察王之視朝若有善道可行者則當前以詔王掌國中失之事以教國子弟注曰教之者使識舊事也中中禮者也失失禮者也故書中為得杜子春云當為得記君得失若春秋是也陳君舉曰教以德行以立其根本又須教以國政使之通達治體凡國之貴遊子弟學焉注曰貴遊子弟王公之子弟遊無官司者疏曰即上之國子弟也李景齊曰國之貴遊子弟皆宿衛者也以其在王宫而於王為近且密師氏以媺詔王則王聞正言知正道固可以格其非心然退而寒之者衆則此心易搖故必教國子以善使之在王所者長幼卑尊無非端士王誰與為不善乎朝直遙反中丁仲反凡祭祀賓客㑹同喪紀軍旅王舉則從注曰舉猶行也疏曰此數事王行之時師氏則從以王所在皆須詔王以美道故也聽治亦如之注曰謂王舉於野外以聽朝疏曰即上數事王所在皆有朝以聽治之故從王亦如上虎門之左同故云亦如之鄭景望曰王之出入起居無不與知隨事而將順救正之則達善於萌止惡於微過易寡而德易成使其屬帥四夷之隸各以其兵服守王之門外且蹕屬即上士府史胥徒之等兵服東方南方其服布其兵劍西方北方其服旃其兵弓矢不同也門外中門之外蹕止行人不得迫王宫也朝在野外則守內列注曰內列蕃營之在內者也其屬亦率四夷之隸守之如守王宫疏曰朝在野外即上文聽治是也保氏掌諫王惡注曰諫者以禮義正之文王世子曰保也者慎其身以輔翼之而歸諸道者也而養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賓客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容道即藝與儀也藝者道之寓使之得於手而應乎心容者道之發使之根於心而生於色莫非養其道心之方也注曰五禮吉凶賓軍嘉也六樂雲門大咸大韶大夏大濩大武也鄭司農云五射白矢參連剡注襄尺井儀也五馭鳴和鸞逐水曲過君表舞交衢逐禽左六書象形㑹意轉注處事假借諧聲也九數方田粟米差分少廣商功均輸方程贏不足旁要今有重差夕桀勾股也𤣥謂祭祀之容齊齊皇皇賓客之容穆穆皇皇朝廷之容濟濟翔翔喪紀之容纍纍顛顛軍旅之容暨暨詻詻車馬之容匪匪翼翼剡羊甚反襄音讓差初佳反重直龍反桀音的濟子禮反暨其器反咨五格反凡祭祀賓客㑹同喪紀軍旅王舉則從聽治亦如之使其屬守王闈注曰闈宫中之巷門鄭剛中曰諫惡之官尤當自宫闈始司諫掌糾萬民之德而勸之朋友正其行而强之道藝注曰朋友相切磋以善道也强猶勸也朱子曰人之大倫其别有五必欲君臣父子兄弟夫婦之間交盡其道而無悖非有朋友以責善輔仁孰能使之然哉此古之聖人修道立教所以必重乎此而不敢忽也行下孟反强其丈反巡問而觀察之以時書其德行道藝辨其能而可任於國事者注曰巡問行問民間也可任於國事任吏職鄭剛中曰巡而問之觀而察之見其德行道藝可書者則以時書之其或才能過人穎脫於倫輩之中他日可任國家之事者又别白而條具之吳氏曰書而辨之以待賓興以考鄉里之治以詔廢置以行赦宥注曰因巡問强勸萬民而考鄉里吏民罪過以告王所當罪否司救掌萬民之邪惡過失而誅讓之以禮防禁而救之注曰邪惡謂侮慢長老語言無忌而未麗於罪者過失亦由邪惡酗醟好訟若抽拔兵器誤以行傷害人麗於罪者誅誅責也古者重刑且責怒之未即罪也疏曰此經與下二經皆總目也誅讓之者即下二文三讓是也以禮防禁而救之者此邪惡過失皆去冠飾役之囚之皆使困苦而令改惡從善是救之也邪音邪酗許御切虛去聲醟音詠凡民之有邪惡者三讓而罰三罰而士加明刑恥諸嘉石役諸司空注曰罰謂撻擊之也加明刑者去其冠飾而書其邪惡之狀著之背也嘉石朝士所掌在外朝之門左使坐焉以恥辱之既而役諸司空使事官作之也坐役之數存於司寇著直略反其有過失者三讓而罰三罰而歸於圜土注曰圜土獄城也過失近罪晝日任之以事而收之夜藏於獄亦加明刑以恥之不使坐嘉石其罪已著未忍刑之凡嵗時有天患民病則以節巡國中及郊野而以王命施惠注曰天患謂烖害也節旌節也施惠賙恤之調人掌司萬民之難而諧和之注曰難相與為仇讎諧猶調也凡過而殺傷人者以民成之注曰過無本意也成平也鄭司農云以民成之以鄉里之民共和解之鳥獸亦如之注曰過失殺傷人之畜産者王氏曰鳥獸謂畜産猛鷙殺傷人也凡和難父之讎辟諸海外兄弟之讎辟諸千里之外從父兄弟之讎不同國君之讎視父師長之讎視兄弟主友之讎視從父兄弟注曰和之使辟於此不得就而仇之九夷八蠻五戎六狄謂之四海主大夫君也疏曰此經略言其不言者皆以服約之伯叔父母姑姊妹女子子在室及兄弟子衆子一與兄弟同其祖父母曾祖父母髙祖父母其孫承後皆斬衰皆與父同其不承後者祖與伯叔同曽祖髙祖齊衰三月皆與從父兄弟同以其同繩屨故也自外不見者據服為斷也其兄弟及從父兄弟師長主友皆謂無子復無親於己者故據己親疏為逺近若有子及親於己則自從親為斷復讎之法可盡五世之內五世之外施之於己則無義施之於彼則無罪所復者唯謂殺者之身乃在被殺者子孫可盡五世得復之坡謂此經為過而殺傷人者立法虞書曰宥過無大康誥曰大罪非終乃不可殺正謂此也故過而殺傷人者律之以王法則無死本之以忠臣孝子之心則無生惟辟而去焉因其可生而生之非惜一人之命而縱逆惡非墮王章以弛忠孝之倫也讎者已逺則臣子之憾亦可少泐已所以酌情理之中而為是權法耳君師主友乃因父兄之讎比類及之不通上文和難為義蓋君無過而殺傷之事也嗚呼無關雎麟趾之意而欲行斯法也吾恐故殺者布財於官吏將託為過殺而出之矣是啓之也又在善用之者弗辟則與之瑞節而以執之注曰瑞節玉節之剡圭也和之而不肯辟者是不從王命也王以剡圭使調人執之治其罪辟音避下同從才用反凡殺人有反殺者使邦國交讎之注曰反復也復殺之者此欲除害弱敵也邦國交讎之明不和諸侯得者即誅之鄭司農云有反殺者謂重殺也凡殺人而義者不同國令勿讎讎之則死兩下相殺曰殺義宜也此乃為寇攘誘臣妾之小人身其害而殺之者為得其宜雖所殺者人之父兄不得讎也使之不同國而已如今時王法殺姦盜於室中律置不問其此類與凡有鬬怒者成之不可成者則書之先動者誅之注曰鬬怒辨訟者也不可成不可平也書之記其姓名辨本也鄭司農云成之謂和之也和之猶今二千石以令解仇怨後復相報移徙之此其類也媒氏掌萬民之判注曰判半也得耦為合主合其半成夫婦也喪服𫝊曰夫妻判合鄭司農云主萬民之判合凡男女自成名以上皆書年月日名焉注曰鄭司農云成名謂子生三月父名之令男三十而娶女二十而嫁注曰二三者天地相承覆之數也易曰參天兩地而竒數焉疏曰王肅曰家語哀公問於孔子男子十六精通女子十四而化是則可以生民矣聞禮男三十而有室女二十而有夫豈不晚哉孔子曰夫禮言其極亦不是過男子二十而冠有為人父之端女子十五許嫁有適人之道於此以往則自婚矣然則三十之男二十之女中春之月者所謂言其極法耳竒音倚中音仲凡娶判妻入子者皆書之鄭剛中曰判之為言謂夫妻反目分别而去也入子者已無嗣子或入同宗之子以為嗣如今世之立嗣坡謂娶判妻書之防姦私也入子書之恐收養異姓則他日之婚姻無别也中春之月令㑹男女注曰中春隂陽交以成昏禮順天時也於是時也奔者不禁坡謂六禮備為漸易曰漸女歸吉是也六禮不備為奔奔者迅疾之意不以漸也古者夫婦有别而後父子有親一禮不備不可以行今之奔者不禁何容有三十之男二十之女可以判合而未合者雖不備禮猶許之非慕說相奔就之說也若無故而不用令者罰之故謂凶荒札喪也令以時以禮之令也有喪荒者娶不備禮不用中春大司徒荒政十曰多昏雜記曰已雖小功既卒哭可以冠子娶妻中音仲慕說之說音悅司男女之無夫家者而㑹之坡謂司猶察也無夫家謂未有夫家也男無家者或單或貧而不能娶女無夫者或屈於孤賤過期而不行且時有天患民病男女仳離如此之類皆司而㑹之也若夫鰥寡聖人亦各從其志耳豈有抑其貞操强使判合乎嗚呼餓死事極小失節事極大曽謂周公而不見此與㑹古外反仳普弭反强上聲凡嫁子娶妻入幣純帛無過五兩注曰純實緇字也古緇以才為聲納幣用緇婦人隂也凡於娶禮必用其類五兩十端也必言兩者欲得其配合之名十者用五行十日相成也士大夫乃以𤣥纁束帛天子加以榖圭諸侯加以大璋雜記曰納幣一束束五兩兩五尋然則每端二丈疏曰凡嫁子娶妻含尊卑但曰緇帛文主庶人耳若餘行禮則用制幣丈八尺取儉易共此昏禮取誠實之義故以二丈整數為之也純音緇禁遷葬者與嫁殤者注曰遷葬謂生時非夫婦死既葬遷之使相從也殤十九以下未嫁而死者生不以禮相接死而合之是亦亂人倫者也凡男女之隂訟聽之於勝國之社其附於刑者歸之于士注曰隂訟爭中冓之事以觸法者勝國亡國也亡國之社奄其上而棧其下使無所通就之以聽隂訟之情明不當宣露其罪不在赦宥者直歸士而刑之不復以聽士司寇之屬詩云牆有茨不可掃也中冓之言不可道也所可道也言之醜也冓古候反棧才産反司市掌市之治教政刑量度禁令注曰量豆區斗斛之屬度丈尺也劉原父曰治謂正萬民交易之法教謂使三市信義不欺政謂平百物輕重之價刑謂制盜賊姦僞之民量平榖米度定布帛禁謂壞法亂俗之物不儥於市令謂宣教立政之事必憲於民儥音育後同憲音懸以次叙分地而經市注曰次謂吏所治舍思次介次也若今市亭然叙肆行列也經界也以陳肆辨物而平市陳猶次也辨物物異肆也美惡不混其價自顯而平即天官內宰所云正其肆陳其貨賄之事也以政令禁物靡而均市注曰物靡者易售而無用禁之則市均鄭司農云靡謂侈靡也疏曰物靡買之者多貴而無用令使用物買之者少而賤則市賈不均故禁之以商賈阜貨而行布注曰通物曰商居賣物曰賈阜猶盛也鄭司農云布謂泉也王光逺曰布者所以權百物而通之貨苟不阜則布無所通故必以商賈阜貨而行之以量度成賈而徴儥注曰徴召也儥買也物有定價則買者來也以質劑結信而止訟注曰質劑謂兩書一札而别之也若今下手書言保物要還矣以賈民禁僞而除詐注曰賈民胥師賈師之屬必以賈民為之者知物之情僞與實詐疏曰僞據物而言詐據人而說也以刑罰禁暴而去盜注曰刑罰憲徇撲以泉府同貨而斂賖注曰同共也同者謂民貨不售則為斂而買之民無貨則賖貰而豫之坡謂次叙陳肆先定其規畫也而後興利故政令商賈次之利聚而後賣者買者資焉故次之以量度質劑則市事盡矣賈民刑罰去市之害泉府通市之窮故又次於後商賈賈民注曰賈賈師同音古成賈注市賈同音嫁行户剛反下同貰音世大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主注曰日昃昳中也市雜聚之處言主者謂其多者也百族必容來去商賈家於市城販夫販婦朝資夕賣因其便而分為三時之市所以了物極衆鄭司農云百族百姓也疏曰案匠人市朝一夫各方百步就百步而分為三時之市恐不可若然則一夫者據市亭置次司市及賈師胥師聽事之處取其列行肆之處則居地多矣此三市皆於一院內為之大市於中朝市於東偏夕市於西偏郊特牲所云是也凡市入則胥執鞭度守門市之羣吏平肆展成奠賈上旌於思次以令市市師涖焉而聽大治大訟胥師賈師涖於介次而聽小治小訟凡市入謂三時之市市者入也胥守門也察詐僞也必執鞭度以威正人衆也繫鞘於上則為鞭因刻丈尺則為度羣吏胥師以下也平肆平賣物之行列使之正也展整也成平也所以成平市物者即今之牙儈也奠讀為定整敕㑹者使定物賈防誑豫也上旌者以為衆望也見旌則知當市也思次若今市亭也市師司市也介次市亭之屬别小者也涖視也思當為司字聲之誤也凡萬民之期于市者辟布者量度者刑戮者各於其地之叙期謂欲買賣期决於市也辟法也法布者鑄泉之處也量度者成賈之處也刑戮者决罪之處也各赴於其叙則事雖繁而人不雜矣凡得貨賄六畜者亦如之三日而舉之注曰得遺物者亦使置其地貨於貨之肆馬於馬之肆則主求之易也三日而無識認者舉之沒入官坡謂自大市至此唯次叙分地而經市乃可如此昃昃同奠音定奠賈之賈音嫁辟音璧昳音絰鞘所交反儈古外反易以豉反凡治市之貨賄六畜珍異亡者使有利者使阜害者使亡靡者使微注曰利利於民謂物實厚者害害於民謂物行苦者使有使阜起其賈以徴之也使亡使微抑其賈以郤之也侈靡細好使富民好奢微之而已鄭司農云亡者使有亡此物則開利其道使之有坡謂此一節乃以政令禁物靡而均市也亡音無下同賈音嫁好奢之好呼報反凡通貨賄以璽節出入之注曰璽節印章如今斗檢封矣使人執之以通商以出貨賄者王之司市也以內貨賄者邦國之司市也國凶荒札喪則市無征而作布注曰有災害物貴市不稅為民乏困也金銅無凶年因物貴大鑄泉以饒民陳及之曰市既無征則物聚多物多則錢重錢重則物反輕非所以便商旅也作布則物雖多而錢不重商賈獲其利則來者多矣坡謂自凡通貨賄至此乃以商賈阜貨而行布也內音納凡市僞飾之禁在民者十有二在商者十有二在賈者十有二在工者十有二注曰鄭司農云所以俱十有二者工不得作賈不得粥商不得資民不得畜𤣥謂王制曰用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市五穀不時果實未熟不粥於市木不中伐不粥於市禽獸魚鱉不中殺不粥於市亦其類也於四十八則未聞數十二焉坡謂此一節乃禁僞而除詐也賈音古粥音鬻下同中丁仲反市刑小刑憲罰中刑徇罰大刑撲罰其附于刑者歸于士注曰徇舉以示其地之衆也撲撻也鄭司農云憲罰播其肆也疏曰徇既將身以示之則憲是以文書表示於肆國君過市則刑人赦夫人過市罰一幕世子過市罰一帟命夫過市罰一蓋命婦過市罰一帷注曰謂諸侯及夫人世子過其國之市大夫內子過其都之市也市者人之所交利而行刑之處君子無故不遊觀焉若遊觀則施惠以為說也國君則赦其刑人夫人世子命夫命婦則使之出罰異尊卑也所罰謂憲徇撲也必罰幕帟蓋帷市者衆也此四物者在衆之用也此王國之市而說國君以下適市者諸侯之於其國與王同以其足以互明之疏曰憲徇刑之輕者而赦之使出帷幕難備之物者出物雖重而無恥憲徇雖輕而有愧故以出物為輕也王介甫曰市人犯刑以利而已國君近利則市人何誅焉故赦之罰之坡謂自市刑至此乃以刑罰禁暴而去盜也至量度質劑司在質人陳肆辨物職之肆長同貨斂賖專自泉府各於當官詳之帟音繹說如字解說也凡㑹同師役市師帥賈師而從治其市政掌其賣儥之事注曰市司司市也儥買也會同師役必有市者大衆所在來物以備之質人掌成市之貨賄人民牛馬兵器珍異注曰成平也㑹者平物價而來主成其平也人民奴婢也珍異四時食物凡賣儥者質劑焉大市以質小市以劑掌稽市之書契注曰質劑者為之劵藏之也大市人民牛馬之屬用長劵小市兵器珍異之物用短劵稽猶考也治也書契取豫市物之劵也其劵之象書兩札刻其側坡謂此節所謂以質劑結信而止訟也質劑與書契有别質劑者民既貿易各有執信若今之買牛契之類也書契者取豫之劵若今之借字限字也書契或有虛名詭書或取者有契而不還其貸或豫者已收責而靳其契亦皆不信而可致訟者故又掌稽之豫音與同其度量一其淳制巡而考之犯禁者舉而罰之注曰杜子春云淳當為純純謂幅廣制謂匹長也皆當中度量𤣥謂淳讀如淳尸盥之淳坡謂此節所謂以量度成賈而徴儥也同之一之則無長短多少之差而賈自定矣中丁仲反賈音嫁凡治質劑者國中一旬郊二旬野三旬都三月邦國朞期內聽期外不聽注曰謂齎劵契者來訟也以期內來則治之後期則不治所以絶民之好訟且息文書也郊逺郊也野甸稍也都大都小都疏曰此經總上質劑與書契來訴者齎音賫廛人掌斂布絘布總布質布罰布廛布而入於泉府注曰布泉也鄭司農云絘布列肆之稅布杜子春云總當為儳謂無肆立持者之稅也質布者質人之所罰犯質劑者之泉也罰布者犯市令者之泉也廛布者貨賄諸物邸舍之稅絘音次總讀儳音才凡屠者斂其皮角筋骨入於玉府注曰以當稅給作器物也疏曰屠者其人亦有地稅因其屠即取皮角筋骨堪飾器物者使入玉府以當邦賦凡珍異之有滯者斂而入於膳府注曰故書滯或作廛𤣥謂滯讀如沈滯之滯珍異四時食物也不售而在廛久則瘦癯腐敗為買之入膳夫之府所以紓民事而官不失實癯其俱反胥師各掌其次之政令而平其貨賄憲刑禁焉察其詐僞飾行儥慝者而誅罰之刑憲徇撲也禁僞飾之禁也坡謂行不堅固也唐韓琬傳云器不行窳飾行巧飾其行也儥賣也慝惡也聽其小治小訟而斷之憲刑之憲音懸行下孟反賈師各掌其次之貨賄之治辨其物而均平之展其成而奠其賈然後令市鄭剛中曰在肆之物美惡混淆故使之辨賈師之賈音古下同奠音定其賈之賈音嫁凡天患禁貴儥者使有恆賈注曰恆常也謂若貯米榖棺木而睹久雨疫病者貴賣之因天災害厄民使之重困史直翁曰物價翔踴不可禁禁之則深藏而不出求者多則賈不得不貴雖有知巧何以弭之先王之市已先知其貨賄多寡有無之所在故能使其必儥而市價可使不二故曰使有常價後世無法以處徒肆其刑威以禁之欲求其賈之有常不可得已四時之珍異亦如之注曰薦宗廟之物疏曰此珍異亦是富人賤時豫貯而後貴時賣之賈音嫁注同貯貯同重直龍反凡國之賣儥各帥其屬而嗣掌其月注曰儥買也故書賣為買鄭司農云謂官有所斥令賣賈師帥其屬而更相代直月為官賣之均勞逸凡師役㑹同亦如之疏曰此亦從行所在當直為官買賣也司暴掌憲市之禁令禁其鬬囂者與其暴亂者出入相陵犯者以屬遊飲食于市者注曰囂歡也徐氏曰鬬者以力爭囂者以口競暴者虐物亂者悖理出入陵犯謂恃强以相陵屬遊飲食謂羣飲而敗禮若不可禁則搏而戮之邱氏曰搏伺而禽之史直翁曰先王有心於愛民故設吏以禁暴後世有心於取利故設吏以為暴民有一物吏思得之既不可以自取必借姦民以為囊橐民或不從則鬬囂暴亂陵犯無所不至民不得已而豫之吏既受矣姦民於是愈肆吏方拱手聽命而敢搏而戮之乎是以欲行禁暴當先擇吏之良者以處於上而下之姦民自化矣囂五羔反搏音博同捕豫音與司稽掌巡市而察其犯禁者與其不物者而搏之注曰不物衣服視占不與衆同及所操物不如品式掌執市之盜賊以徇且刑之疏曰市之盜賊亦無過小盜徇撲而已胥各掌其所治之政執鞭度而巡其前掌其坐作出入之禁令襲其不正者注曰作起也坐起禁令當市而不得空守之屬杜子春云襲謂掩捕其不正者凡有罪者撻戮而罰之注曰罰之使出布肆長各掌其肆之政令陳其貨賄名相近者相逺也實相近者相爾也而平正之注曰爾亦近也俱是物也使惡者逺善善自相近鄭司農云謂若珠玉之屬俱名為珠俱名為玉而賈或百萬或數萬恐農夫愚民見欺故别異令相逺使賈人不得雜亂以欺人坡謂此官所謂以陳肆辨物而平市也斂其總布掌其戒禁注曰杜子春云總當為儳逺於萬反注同而賈音嫁賈人音古泉府掌以市之征布斂市之不售貨之滯於民用者以其賈買之物楬而書之以待不時而買者買者各從其抵都鄙從其主國人郊人從其有司然後豫之注曰鄭司農云物楬而書之物物為箋書書其賈楬著其物也不時買者謂急求者也主者别治大夫也𤣥謂抵實柢字柢本也本謂所屬吏主有司是也疏曰征布者即上廛人絘布已下之布並入泉府而藏之故總云征布也賈音嫁豫音與箋音箋凡賖者祭祀無過旬日喪紀無過三月注曰鄭司農云賖貰也以祭祀喪紀故從官貰買物凡民之貸者與其有司辨而授之以國服為之息注曰有司其所屬吏也與之别其貸民之物定其賈以豫之疏曰此經不言都鄙主者有司中兼之坡謂國服為息儒者因青苗之害改為說者不一抑無庸也其時孫覺奏曰成周賖貰特以備民之緩急不可徒與也故與國服為之息然國服之息說者不明鄭氏釋經乃引王莽為據不應周公取息重於莽時况國用專取具於泉府則冡宰九賦將安用取聖世宜講求先王之法不當取疑文虛說以圖治安善哉言也古今異宜微文難知後聖有作或在損益此語似可闕疑賈音嫁豫音與凡國事之財用取具焉嵗終則㑹其出入而納其餘注曰㑹計也納入也入餘於職幣坡謂邦之大用內府待之小用外府待之則此國事之財用者專指王之膳服也㑹古外反陳君舉曰王荆公嘗謂周禮一書理財居其半自有周禮以來劉歆輔王莽專為理財至荆公熙寧亦專理財所以先儒多疑於周禮今細考之亦誠有可疑者且以廛人一官論之所謂絘布者鄭氏謂列肆之稅即今之房廊錢所謂廛布者鄭氏謂諸物邸舍之稅即今之白地錢又有罰布者賣買不平之罰質布者質人巡考犯禁之罰即今之搭地錢又有總布者子春謂無肆立持之稅若熙寧間不係行錢人凡屠者斂皮角筋骨入於玉府即今所謂納筋骨者斂珍異之滯者入於膳府則以供一人之玩好者德宗宫市之弊其初只教官與百姓交易後乃用宦者為使買之多不償其本錢熙寧不係行錢鄭俠奏議謂負水拾髮擔粥提茶皆有免行然則廛人之弊安得不至於此其他自山虞以至澤虞自草人以至掌炭又有上項征稅如此其未至市肆者在川則有川禁澤則有澤禁金玉鉛錫則有禁齒革羽毛則有禁絺綌薪炭則有禁所以取民者無一不備與夫司門犯禁之財司關舉貨之罰巾車之車折則入齎馬質之馬死則物更先王所以不與民爭利者全不見於此書所以王莽用周禮遂有五均六幹列肆里區無不征之荆公用周禮遂有坊場河渡白地房廊搭罰六色免行市例之類無所不有至使周禮之書後人不得嘗試夫周禮之法果如是耶抑用之者失其實耶坡謂此論詳贍明快然劉王果能使其君自冡宰頭一段漸次行到司市即無此患草音礦鉛鉛同周禮述注卷九
