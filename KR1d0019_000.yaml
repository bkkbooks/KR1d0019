body:
  text: 周禮述註禮類一周禮之屬提要臣等謹案周禮述註二十四卷國朝李光坡撰光坡字耜卿號茂夫安溪人大學士光地之弟也杭世駿榕城詩話稱其家居不仕潛心經學著有三禮述註此即其一也其書取註疏之文刪繁舉要以著訓詁之源又旁採諸家參以己意以闡制作之義雖於鄭賈名物度數之文多所刋削而析理明通措詞簡要頗足為初學之津梁考其兄光地榕村集中有周官筆記一卷皆標舉要義不以考證辨難為長其姪鍾倫亦有周禮纂訓與光坡此書體例相近葢其家學如是也宋儒喜談三代故講周禮者恒多又鑒於熙寧之新法故恒牽引末代弊政支離詰駁於註疏多所攻擊議論盛而經義反淆光坡此書不及漢學之博奥亦不至如宋學之蔓衍平心静氣務求理明而詞達於説經之家亦可謂適中之道矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:d2213eb8f20df88bc42eb88295e786f00e19cd9ebc5085d5d4cc5996ad679513
