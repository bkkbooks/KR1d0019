front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1d0019_WYG_020-1a, image: WYG0100/WYG0100-0388a.png}
body:
  text: 周禮述注卷二十安溪李光坡撰秋官司寇第五鄭目録云象秋所立之官寇害也秋者遒也如秋義殺害收聚斂藏於萬物者也天子立司寇使掌邦刑刑者所以驅恥惡納人於善道也惟王建國辨方正位體國經野設官分職以為民極乃立秋官司寇使帥其屬而掌邦禁以佐王刑邦國注曰禁所以防姦者也刑正人之法孝經説曰刑者侀也過出罪施侀音刑刑官之屬大司寇卿一人小司寇中大夫二人士師下大夫四人鄉士上士八人中士十有六人旅下士三十有二人注曰士察也主察獄訟之事者鄭司農説以論語曰柳下惠為士師鄉士主六鄉之獄府六人史十有二人胥十有二人徒百有二十人遂士中士十有二人府六人史十有二人胥十有二人徒百有二十人注曰遂士主六遂之獄者縣士中士三十有二人府八人史十有六人胥十有六人徒百有六十人注曰距王城三百里至四百里曰縣縣士主縣之獄者方士中士十有六人府八人史十有六人胥十有六人徒百有六十人注曰方士主四方都家之獄者訝士中士八人府四人史八人胥八人徒八十人注曰訝迎也士官之迎四方賓客疏曰案其職云掌四方之獄訟非直迎賓客以獄訟為主故亦士言之也朝士中士六人府三人史六人胥六人徒六十人注曰朝士主外朝之法司民中士六人府三人史六人胥三人徒三十人注曰司民主民數疏曰司民掌登萬民之數凡斷獄弊訟必須知民年幾老幼是以司民雖非刑獄連類在此也訝五嫁反司刑中士二人府一人史二人胥二人徒二十人司刺下士二人府一人史二人徒四人注曰刺殺也三訊罪定則殺之劉迎曰刺蓋刺舉之刺也刺史謂之刺以其掌刺舉故耳訊羣臣謂刺訊羣吏訊萬民亦謂刺既曰訊矣而又曰刺者訊其果無罪則刺舉於上而行赦宥也司約下士二人府一人史二人徒四人注曰約言語之約束嶭平仲曰或以司約司盟非盛世之事遂因以疑周官之書風氣之開久矣使天下或私相為約私相為盟以紛紛於下孰若設官於上以司之使不可逾乎盟約不逾則獄訟可息獄訟可息則刑法可措甚矣先王之不得已也司盟下士二人府一人史二人徒四人注曰盟以約辭告神殺牲歃血明著其信也曲禮曰涖牲曰盟鄭剛中曰説者見春秋書盟謂為衰世之事其説出於榖梁所謂盟詛不及三王也考之書載苖民罔中于信以覆詛盟則五帝之世已有是事第苗民覆之故數之以為罪也詩云君子屢盟亂是用長非謂不可盟謂其盟之屢而無信學者不察以周官太平之書胡為玉府有珠盤玉敦之事戎右有贊牛耳桃茢之文於此又設司盟之官遂信何休戰國陰謀之説不考之於詩書耳古者結繩足以示信盟詛雖有而未必用去古稍逺淳厚一散世未嘗皆君子而無小人皆善良而無嵬瑣此司盟之官所由設刺千賜反敦音對嵬音巍職金上士二人下士四人府二人史四人胥八人徒八十人注曰職主也司厲下士二人史一人徒十有二人注曰犯政為惡曰厲厲士主盜賊之兵器及其奴者夫人下士二人府一人史二人賈四人徒十六人黃文叔曰犬逐盜故以犬人次司厲六牲之官皆以義類相從如春官雞人掌雞牲而以呼旦序於鬱鬯之後司圜中士六人下士十有二人府三人史六人胥十有六人徒百有六十人注曰鄭司農云圜謂圜土也圜土謂獄城也今獄城圜掌囚下士十有二人府六人史十有二人徒百有二十人注曰囚拘也主拘繫當刑殺之者掌戮下士二人史一人徒十有二人注曰戮猶辱也既斬殺又辱之賈音嫁司隸中士二人下士十有二人府五人史十人胥二十人徒二百人注曰隸給勞辱之役者漢始置司隸亦使將徒治道溝渠之役後稍尊之使主官府及近郡罪隸百有二十人注曰盜賊之家為奴者蠻隸百有二十人注曰征南夷所獲閩隸百有二十人注曰閩南蠻之别夷隸百有二十人注曰征東夷所獲貉隸百有二十人注曰征東北夷所獲凡隸衆矣此其選以為役員其餘謂之隸民王次點曰四翟之民南方之蠻而閩乃東南之别種東方之夷而貉乃東北之聚落獨不見西戎北狄之隸者蓋自文王時西有昆夷之患北有玁狁之難而道化先被于南至武王通道于九夷八蠻所獲之民其服屬有素故帥而為隸貉音陌布憲中士二人下士四人府二人史四人胥四人徒四十人注曰憲表也主表刑禁者禁殺戮下士二人史一人徒十有二人注曰禁殺戮者禁民不得相殺戮禁暴氏下士六人史三人胥六人徒六十人野廬氏下士六人胥十有二人徒百有二十人注曰廬賓客行道所舍蠟氏下士四人徒四十人注曰蠟骨肉腐臭蠅蟲所蠟也月令曰掩骼埋胔此官之職也蠟讀如狙司之狙雍氏下士二人徒八人注曰雍謂隄防止水者也萍氏下士二人徒八人注曰萍氏主水禁萍之草無根而浮取名於其不沈溺司寤氏下士二人徒八人注曰寤覺也主夜覺者蠟音娶雍於用反萍音平骼更白反埋亡皆反胔似賜反狙七慮反覺音教司烜氏下士六人徒十有二人注曰烜火也讀如衛侯燬之燬條狼氏下士六人胥六人徒六十人注曰杜子春云條當為滌器之滌玄謂滌除也狼狼扈道上修閭氏下士二人史一人徒十有二人注曰閭謂里門烜音燬條音滌冥氏下士二人徒八人注曰鄭司農云冥讀為冥氏春秋之冥玄謂冥方之冥以繩縻取禽獸之名嶭平仲曰自修閭而上達於布憲之官凡十有一皆先王所以盡乎人也自冥氏以下至於庭氏之官凡十有二人又先王所以盡乎物夫大而人之為民害者既革微而物之為民害者已消則先王之用刑通乎天地之心矣庶氏下士一人徒四人注曰庶讀如藥煮之煮驅除毒蠱之言書不作蠱者字從聲劉執中曰毒蠱蠱病人非一種而下士一人者掌其方書治禁之法穴氏下士一人徒四人注曰穴摶蟄獸所藏者翨氏下士二人徒八人注曰翨鳥翮也鄭司農云翨讀為翅翼之翅柞氏下士八人徒二十人注曰柞除木之名除木者必先刋剝之鄭司農云柞讀為音聲唶唶之唶屋笮之笮剃氏下士二人徒二十人注曰書剃或作夷鄭司農云掌殺草故春秋傳曰如農夫之務去草芟夷藴崇之又今俗間謂麥下為夷下言芟夷其麥以其下種禾豆也玄謂剃讀如剃小兒頭之剃書或作夷此皆剪草也字從類耳月令曰燒剃行水謂燒所芟草乃水之硩蔟氏下士一人徒二人注曰鄭司農云硩讀為擲蔟讀為爵蔟之蔟謂巢也玄謂硩古字從石折聲翦氏下士一人徒二人注曰剪斷滅之言也主除蟲蠧者赤犮氏下士一人徒二人注曰赤犮猶言捇拔也主除蟲豸自埋者蟈氏下士一人徒二人注曰鄭司農云蟈讀為蜮蜮蝦蟇也月令曰螻蟈鳴故曰掌去蛙黽蛙黽蝦蟇屬書或為掌去蝦蟇玄謂蟈今御所食蛙也字從蟲國聲也蜮乃短狐與壺涿氏下士一人徒二人注曰壺謂瓦鼓涿擊之也庭氏下士一人徒二人注曰庭氏主射妖鳥令國中潔清如庭者也銜枚氏下士二人徒八人注曰銜枚止言語嚻歡也枚狀如箸橫銜之為之繣結於項冥迷形反庶音煮翨音熾柞側百反注唶笮音同剃它計反注剃同硩音摘蔟蒼獨反犮音拔蟈音國先鄭讀域音或涿陟角反又音濁捇七迹反豸直氏反蝦音遐蟇音麻螻音樓蛙戶蝸反黽莫辛反射食亦反嚻五髙反繣戶卦反伊耆氏下士一人徒二人注曰伊耆古王者號始為蠟以息老物此主王者之齒杖後王識伊耆之舊德而以名官與今姓有伊耆氏疏曰在此者案其職云掌共杖杖老者所依秋是長老之方故在此耆巨之反蠟仕詐反大行人中大夫二人小行人下大夫四人司儀上士八人中士十有六人行夫下士三十有二人府四人史八人胥八人徒八十人注曰行夫主國使之禮環人中士四人史四人胥四人徒四十人注曰環猶圍也主圍賓客任器為之守衛象胥每翟上士一人中士二人下士八人徒二十人注曰通夷狄之言者曰象胥其有才知者也此類之本名東方曰寄南方曰象西方曰狄鞮北方曰譯今總名曰象者周之德先致南方也嶭平仲曰大行人以中大夫二人掌禮之綱小行人以下大夫四人掌禮之籍威儀煩縟屬之司儀小事纎悉達之行夫衛其行李以送迎之責之環人及夫五服之外若蕃國之入見雖不能盡同於中國之禮先王待之又特建夫象胥之官無所往而不接於禮天下亦何事於刑禁之防哉掌客上士二人下士四人府一人史二人胥二人徒二十人掌訝中士八人府二人史四人胥四人徒四十人注曰訝迎也賔客來主迎之鄭司農云訝讀為跛者訝跛者之訝知音智鞮丁兮反譯音亦蕃音藩跛波可反掌交中士八人府二人史四人徒三十有二人注曰主交通結諸侯之好掌察四方中士八人史四人徒十有六人掌貨賄下士十有六人史四人徒三十有二人疏曰在此者蓋督察邦國之事及掌邦國所致貨賄但二官闕不可強言也朝大夫每國上士二人下士四人府一人史二人庶子八人徒二十人注曰此王之士也使主都家之國治而命之朝大夫云疏曰庶子者蓋亦主采地之諸子今在府史之下蓋官長所自辟除也都則中士一人下士二人府一人史二人庶子四人徒八十人注曰都則主都家之八則者也當言每都如朝大夫及都司馬云都士中士二人下士四人府二人史四人胥四人徒四十人家士亦如之注曰都家之士主治都家吏民之獄訟以告方士者也亦當言每都周禮述注卷二十
