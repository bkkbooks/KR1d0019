body:
  text: 周禮述註卷十六安溪李光坡撰大史掌建邦之六典以逆邦國之治掌灋以逆官府之治掌則以逆都鄙之治註曰六典八灋八則冢宰所建以治百官大史又建焉以為王迎受其治也大史日官也凡辨灋者攷焉不信者刑之註曰謂邦國官府都鄙以灋爭訟來正之者疏曰不信事理妄冒不信者凡邦國都鄙及萬民之有約劑者藏焉以貳六官六官之所登註曰約劑要盟之載辭及劵書也貳猶副也藏灋與約劑之書以為六官之副其有後事六官又登焉坡謂六官之所登六官二字疑衍葢此約劑各為一通登于六官副寫一通上于大史藏焉以貳六官之所登若約劑亂則辟灋不信者刑之註曰謂抵冒盟誓者辟灋者攷按讀其然不疏曰辟開也灋則約劑也為之開約劑考按其然否不信者不依約劑辟婢亦反正嵗年以序事頒之于官府及都鄙註曰中數曰嵗朔數曰年中朔大小不齊正之以閏若今時作厯日矣定四時以次序授民時之事疏曰中數曰嵗朔數曰年一年之内有二十四氣正月立春節雨水中至十二月小寒節大寒中皆節氣在前中氣在後節氣一名朔氣中數一名中氣節氣有入前月灋中氣無入前月灋中氣帀則為嵗朔氣帀則為年鄭剛中曰周以建子為正而四時之事有用夏正建寅者用建寅謂之嵗用建子謂之年爾雅云夏曰嵗周曰年大史正嵗與年而次序其事頒于官府都鄙使以次舉先後不失其序頒告朔于邦國註曰天子頒朔于諸侯諸侯藏之祖廟至朔朝于廟告而受行之閏月詔王居門終月註曰門謂路寢門也鄭司農云月令十二月分在青陽明堂總章𤣥堂左右之位惟閏月無所居居于門故於文王在門謂之閏疏曰明堂路寢及宗廟皆有五室十二堂四門十二月聴朔於十二堂閏月各於時之門大祭祀與執事卜曰註曰執事大卜之屬與之者當視墨戒及宿之日與羣執事讀禮書而協事註曰協合也合謂習録所當共之事也疏曰戒謂散齋七日宿謂致齋三日讀禮書而協事恐事有失錯物有不供故也祭之日執書以次位常註曰謂挍呼之教其所當居之處疏曰言執書者謂執行祭祀之書以次位常者各居所掌位次常者此禮一定常行不改故云常也辨事者攷焉不信者誅之註曰謂抵冒其職事疏曰此謂助祭之人大會同朝覲以書協禮事註曰亦先習録之也及將幣之日執書以詔王註曰將送也詔王告王以禮事疏曰使不錯誤大師抱天時與大師同車註曰鄭司農云大出師則大史主抱式以知天時處吉凶史官主知天道故國語曰吾非瞽史焉知天道春秋傳曰楚有雲如衆赤烏夾日以飛楚子使問諸周大史大史主天道𤣥謂瞽即大師大師瞽官之長大遷國抱灋以前註曰灋司空營國之灋也抱之以前當先王至知諸位處大䘮執灋以涖勸防註曰鄭司農云勸防引六紼遣之日讀誄註曰遣謂祖廟之庭大奠將行時也人之道終於此累其行而讀之大師又帥瞽廞之而作諡瞽史知天道使共其事言王之誄諡成於天道疏曰案禮記曽子問惟天子稱天以誄之瞽史既知天道又於南郊祭天之所稱天以誄之是王之諡成於天道也若然先於南郊制諡乃於遣之日讀之葬後則稱諡凡䘮事攷焉註曰為有得失小䘮賜諡註曰小䘮卿大夫也疏曰君親制諡使大夫將往賜之此直言小䘮賜諡則三公諸侯亦在焉行下孟反凡射事飾中舍算執其禮事註曰舍讀曰釋鄭司農云中所以盛筭也𤣥謂設筭於中以待射時而取之中則釋之鄉射禮曰君國中射則皮豎中於郊則閭中於竟則虎中大夫兕中士鹿中天子之中未聞疏曰執其禮事者大史主禮者天子諸侯射先行燕禮後乃射其中禮事皆大史掌之中丁仲反舍音釋盛音成竟音境小史掌邦國之志奠繫世辨昭穆若有事則詔王之忌諱註曰鄭司農云志謂記也春秋傳所謂周志國語所謂鄭書之屬是也史官主書故韓宣子聘于魯觀書大史氏繫世謂帝繫世本之屬是也小史主定之瞽矇諷誦之先王死日為忌名為諱𤣥謂王有事祈祭於其廟疏曰辨昭穆者帝繫世本之上皆自有昭穆親疎故須辨之坡謂鄭剛中曰邦國之志非雜記邦國之事乃志天子諸侯所出之繫世與其廟祧之昭穆小史掌其志定其繫世又辨其昭穆是也若有事則詔王忌諱祈祭其一耳更如男女辨姓東郭偃所云君出自丁臣出自桓如此之類皆所當詔大祭祀讀禮灋史以書叙昭穆之爼簋註曰讀禮灋者大史與羣執事史此小史也言讀禮法者小史敘爼簋以為節故書簋或為几鄭司農云几讀為軌書亦或為簋古文也大祭祀小史主敘其昭穆以其主定繫世祭祀史主敘其昭穆次其爼簋𤣥謂爼簋牲與黍稷以書次之挍比之疏曰此言敘昭穆之爼簋則非外神耳則大祭祀惟謂祭宗廟三年一祫之時有尸主兼叙昭穆爼簋也大喪大賓客大會同大軍旅佐大史凡國事之用禮灋者掌其小事卿大夫之䘮賜諡讀誄註曰其讀誄亦以大史賜諡為節事相成也馮相氏掌十有二嵗十有二月十有二辰十日二十有八星之位辨其序事以會天位註曰嵗謂大嵗嵗星與日同次之月斗所建之辰樂説説嵗星與日常應大嵗月建以見然則今厯大嵗非此也嵗日月辰星宿之位謂方面所在辨其序事謂若仲春辨秩東作仲夏辨秩南譌仲秋辨秩西成仲冬辨在朔易會天位者合此嵗日月辰星宿五者以為時事之候若今厯日大嵗在某月某日某甲朔日直某也國語曰王合位于三五孝經説曰故勅以天期四時節有晚早趣勉趣時無失天位皆由此術云馮音慿譌五和反直音植冬夏致日春秋致月以辨四時之敘註曰冬至日在牽牛景丈三尺夏至日在東井景尺五寸此長短之極極則氣至春分日在婁秋分日在角而月弦於牽牛東井亦以其景知氣至不春秋冬夏氣皆至則是四時之敘正矣坡謂日在南陸行疾厯故當春分而日已過交二度日在北陸行縮厯故當秋分而日猶未及交二度古來欲得氣至之正為難惟今西厯以春秋二仲月日月對望之時以求二分葢冬行南陸則地上之天少地下之天多夏行北陸則地上之天多地下之天少其日月之東西相對者或非望也惟春秋分行於中道則日月對衡於地平天體上下適均乃真望矣然雖真望而日月之望有對宫不同道苟平分天度皆為望限若對望未及夘酉之交或過交而後望以至前後月有閏春分或在月首或在月杪則因真望増損檢日至交晷刻以得氣至之正豈有過不及之患乎秋分亦然此灋自侈其秘而不知古之聖人知此久矣景音影保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉㓙註曰志古文識識記也星謂五星辰日月所會五星有贏縮圜角日有薄食暈珥月有盈虧朓側匿之變七者右行列舍天下禍福變移所在皆見焉疏曰上馮相氏掌日月星辰不變依常度者此官掌日月星辰變動與常不同以見吉凶之事識音志朓他了反以星土辨九州之地所封封域皆有分星以觀妖祥註曰星土星所主土也封猶界也鄭司農説星土以春秋傳曰參為晉星商主大火國語曰嵗之所在則我有周之分野之屬是也𤣥謂大界則曰九州州中諸國中之封域於星亦有分焉其書亡矣堪輿雖有郡國所入度非古數也今其存可言者十二次之分也星紀吴越也𤣥枵齊也娵訾衛也降婁魯也大梁趙也實沈晉也鶉首秦也鶉火周也鶉尾楚也壽星鄭也大火宋也析木燕也此分野之妖祥主用客星彗孛之氣為象娵子須反訾子斯反彗以嵗反孛音佩以十有二嵗之相觀天下之妖祥註曰嵗謂大嵗嵗星與日同次之月斗所建之辰也嵗星為陽右行於天大嵗為陰左行於地十二嵗而小周其妖祥之占甘氏嵗星經其遺象也鄭司農云大嵗所在嵗星所居春秋傳曰越得嵗而吳伐之必受其凶之屬是也鄭剛中曰嵗星色欲明光潤澤赤而角則其國昌赤黄而沈其野大穰故其占色相色相變異則天下之妖祥皆可得而知相息亮反下同以五雲之物辨吉㐫水旱降豐荒之祲象註曰物色也視日旁雲氣之色降下也知水旱所下之國鄭司農云以二至二分觀雲色青為蟲白為䘮赤為兵荒黒為水黄為豐故春秋傳曰凡分至啓閉必書雲物為備故也故曰凡此五物以詔救政坡謂降其祲象于所當備之國者知使備之以十有二風察天地之和命乖别之妖祥註曰十有二辰皆有風吹其律以知和不其道亡矣春秋襄十八年楚師伐鄭師曠曰吾驟歌北風又歌南風南風不競多死聲楚必無功是時楚師多凍其命乖别審矣疏曰艮為條風震為明庶風㢲為清明風離為景風坤為凉風兑為閶闔風乾為不周風坎為廣莫風四維之風主兩月吴氏曰乖則異别則離此天地之不和而為妖祥也故命之使知所趨避坡謂日月星辰常居而有變動則天下之大異也星土之妖祥占在一國嵗之相五雲之物嵗可占十有二風月可占葢以大小久近為序凡此五物者以詔救政訪序事註曰訪謀也見其象則當預為之備以詔王救其政且謀今年天時占相所宜次序其事疏曰凡此五物者謂從掌天星以下五經竝是已見之物有此五事坡謂詔救政者補既往訪序事者慎將來内史掌王之八枋之灋以訪王治一曰爵二曰禄三曰廢四曰置五曰殺六曰生七曰予八曰奪註曰大宰既以詔王内史又居中貳之疏曰案大宰有誅無殺此有殺無誅者誅與殺相因欲見為過不止則殺之坡謂自三曰已下不與大宰次第同者大宰以賞罰自相從為類此則以一賞一罰相間為類也廢置榮辱而已生殺止其身予奪及子孫亦有輕重之敘焉枋本作柄予音與間去聲執國灋及國令之貳以攷政事以逆會計註曰國灋六典八灋八則坡謂國令即天官司會職令田野令民職之令也執國灋之貳以攷政事執國令之貳以逆會計掌敘事之灋受納訪以詔王聴治註曰敘六敘也納訪納謀於王也坡謂天官宰夫職云敘羣吏之治以待諸臣之復萬民之逆此言敘事之法與敘羣吏之治一也受納訪與待復逆一也葢貳宰夫凡命諸侯及孤卿大夫則䇿命之註曰鄭司農説以春秋傳曰王命内史興父䇿命晉侯為侯伯䇿謂以簡䇿書王命疏曰周灋爵及士餘文更不見命士之灋明士亦内史命之不言者以其賤畧之也父音甫凡四方之事書内史讀之註曰若今尚書入省事疏曰言四方之事書者諸侯凡事有書奏白於王王制禄則贊為之以方出之註曰贊為之為之辭也鄭司農云以方出之以方版書而出之上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其禄以是為差諸侯之下士視上農夫禄足以代其耕也中士倍下士丄士倍中士下大夫倍上士卿四大夫禄君十卿禄杜子春云方直謂今時牘也𤣥謂王制曰王之三公視公侯卿視伯大夫視子男元士視附庸賞賜亦如之項平甫曰賞賜或以土田或以車服或以器物皆贊其等書之於方出而命之内史掌書王命遂貳之註曰副寫藏之坡謂書王命即上所書爵禄之命也外史掌書外令註曰王令下畿外掌四方之志註曰志記也謂若魯之春秋晉之乗楚之檮杌掌三皇五帝之書註曰楚靈王所謂三墳五典掌達書名于四方註曰謂若堯典禹貢達此名使知之或曰古曰名今曰字使四方知書之文字得能讀之徐氏曰掌四方之志則下以知其政俗之舊掌三皇五帝之書則上以攷古昔之所行掌達書名于四方所以使書同文若以書使于四方則書其令註曰書王令以授使者王光逺曰掌外令故也御史掌邦國都鄙及萬民之治令以贊冢宰註曰王所以治之令冢宰掌王治王光逺曰邦國都鄙及萬民之治令所謂六典以治邦國八則以治都鄙官成以待萬民其法則冢宰以道治之其命則御史掌之故以贊冢宰為職凡治者受灋令焉註曰為書寫其治之法令來受則授之掌贊書註曰王有命當以書致之則贊為辭若今尚書作詔文吴氏曰内史書王命外史書外令御史為之屬則贊二官之書凡數從政者註曰自公卿以下至胥徒凡數及其現在空缺者鄭司農讀言掌贊書數書數者經禮三百曲禮三千灋度皆在𤣥以為不辭故改之云邱氏曰自公卿以下至於庶人在官者皆從政也不可不知登下多寡之計故有凡有數御史當糾察之巾車掌公車之政令辨其用與其旗物而等敘之以治其出入註曰公猶官也用謂祀賓之屬旗物大常以下等敘之以封同姓異姓之次序疏曰出入謂若下文凡車之出入則會之冬官造車訖來入巾車又當出封同姓之等亦是也王之五路一曰玉路錫樊纓十有再就建大常十有二斿以祀註曰王在焉曰路玉路以玉飾諸末錫馬面當盧額刻金為之所謂鏤錫也樊讀如鞶帶之鞶謂今馬大帶也鄭司農云纓謂當胸士䘮禮下篇曰馬纓三就禮家説曰纓當胸以削革為之三就三重三匝也𤣥謂纓今馬鞅夾馬頸者玉路之樊及纓皆以五采罽飾之十二就就成也大常九旗之畫日月者正幅為縿斿則屬焉金路鉤樊纓九就建大旂以賓同姓以封註曰金路以金飾諸末鉤婁頷之鉤也金路無錫有鉤亦以金為之其樊及纓以五采罽飾之而九成大旂九旗之畫交龍者以賓以㑹賓客同姓以封謂王子母弟率以功徳出封雖為侯伯其畫服猶如上公若魯衛之屬其無功徳各以親疎食采畿内而已疏曰詩云鉤膺鈎連言膺明鈎在膺前象路朱樊纓七就建大赤以朝異姓以封註曰象路以象飾諸末象路無鈎以朱飾勒而已其樊及纓以五采罽飾之而七成大赤九旗之通帛以朝以日視朝異姓王甥舅革路龍勒條纓五就建大白以即戎以封四衛註曰革路鞔之以革而漆之無他飾龍駹也以白黒飾韋雜色為勒條讀為絛其樊及纓以絛絲飾之而五就不言樊字葢脱爾以此言絛知玉路金路象路飾樊纓皆不用金玉象矣大白殷之旗即戎謂兵事四衛四方諸侯守衛者蠻服以内疏曰自玉金象四者皆以革鞔但象路以上更有玉金象為飾此革路亦用革鞔以無他飾則名為革路也勒馬頭絡銜也此四衛非謂在衛服者以其諸侯非同姓與王無親即是庶姓在四方六服已内衛守王木路前樊鵠纓建大麾以田以封蕃國註曰木路不鞔以革漆之而已前讀為緇翦之翦翦淺黒也木路無龍勒以淺黒飾韋為樊鵠色飾韋為纓不言就數飾與革路同大麾不在九旗中以正色言之則黒夏后氏所建田四時田獵蕃國謂九州之外夷服鎮服蕃服錫音陽樊讀鞶條讀絛他刀反前讀翦朝直遥反鞅音怏罽居例反縿所銜反則屬音燭率音律鞔莫官反駹音尨王后之五路重翟錫面朱總厭翟勒面繢總安車彫面鷖總皆有容葢註曰重翟重翟雉之羽也厭翟次其羽使相迫也勒面謂以如王龍勒之韋為當面飾也雕者畫之不龍其韋安車坐乗車凡婦人車皆坐乗鄭司農云錫馬面錫鷖讀為鳬鷖之鷖鷖總者青黒色以繒為之總著馬勒直兩耳與兩鑣容為幨車山東謂之裳幃或曰潼容𤣥謂朱總繢總其施之如鷖總車衡輨亦宜有焉繢畫文也葢如今小車葢也皆有容有葢則重翟厭翟謂蔽也重翟后從王祭祀所乗厭翟后從王賓饗諸侯所乗安車無蔽后朝見於王所乗謂去飾也詩國風碩人曰翟蔽以朝謂諸侯夫人始來乗翟蔽之車以朝見於君盛之也此翟蔽葢厭翟也然則王后始來乗重翟乎疏曰云車衡輨亦宜有者以其皆是革飾之事故兼施於車也翟車貝面組總有握註曰翟車不重不厭以翟飾車之側爾貝面貝飾勒之當面也有握則此無葢矣如今軿車是也后所乗以出桑疏曰凡言翟者皆謂翟鳥之羽以為兩旁之蔽重翟者二重厭翟者謂相次以厭其本翟車者乂不厭其本也龍勒馬之轡飾勒面則在面組總以組絛為總凡言總者謂以總為車馬之飾若婦人之總亦既繫其本又垂為飾故皆謂之總也邱氏曰有握有帷幕也輦車組輓有翣羽葢註曰輦車不言飾后居宫中從容所乗但漆之而已為輇輪人輓之以行有翣所以禦風塵以羽作小葢為翳日也鷖烏兮反輓音晚翣所甲反著直略反幨昌亷反輨音管軿薄經反輇市専反翳烏帝反王之䘮車五乗木車蒲蔽犬䄙尾櫜疏飾小服皆疏註曰木車不漆者鄭司農云蒲蔽謂臝蘭車以蒲為蔽天子䘮服之車漢儀亦然犬􅍜以犬皮為覆笭𤣥謂蔽車旁禦風塵者犬白犬皮既以皮為覆笭又以其尾為戈㦸之弢麤布飾二物之側為之縁服讀為箙小箙刀劍短兵之衣此始遭䘮所乗為君之道尚㣲備姦臣也書曰以虎賁百人逆子釗亦為備焉素車棼蔽犬􅍜素飾小服皆素註曰素車以白土堊車也棼讀為薠薠麻以為蔽其􅍜服以素繒為縁此卒哭所乗為君之道益著在車可以去戈㦸薻車薻蔽鹿淺􅍜革飾註曰薻水草蒼色以蒼土堊車以蒼繒為蔽也鹿淺􅍜以鹿夏皮為覆笭又以所治去毛者縁之此既練所乗駹車雚蔽然􅍜髤飾註曰駹車邊側有漆飾也雚細葦席也以為蔽者漆則成藩即吉也然果然也猿屬髤赤多黒少之色韋也此大祥所乗漆車藩蔽豻􅍜雀飾註曰漆車黒車也藩今時小車藩漆席以為之豻胡犬雀黒多赤少之色韋也此禫所乗疏曰天子至士䘮車五乗尊卑等則大夫士禫亦得乗漆車所以大夫士禫即乗漆車與吉同者禮窮則同也􅍜莫厯反櫜音羔薻音藻雚音丸髤香求反豻五旦反笭力丁反􅋶吐刀反箙音服堊烏路反薠扶文反禫直感反服車五乗孤乗夏卿乗夏縵大夫乗墨車士乗棧車庶人乗役車註曰服車服事者之車鄭司農云夏讀為圭瑑之瑑夏轂有約也𤣥謂夏五采畫轂約也夏縵亦五采畫無瑑爾墨車不畫也棧車不革鞔而漆之役車方箱可載任器以供役疏曰后别見車五乗此孤卿以下不見婦人車者婦人與夫同故昏禮云婦車亦如之凡良車散車不在等者其用無常註曰給遊燕及恩惠之賜疏曰不在等者不在於服車五乗之等列作之有精麤故有良散之名棧仕限反轂音谷凡車之出入嵗終則會之註曰計其完敗多少疏曰車之出謂給官用車之入謂用罷歸官凡賜闕之註曰完敗不計疏曰以其賜人以後完敗隨彼受賜之人在官不復須知故闕之不㑹計毁折入齎于職幣註曰計所傷敗入其直杜子春云齎讀為資資謂財也乗官車毁折者入財以償繕治之直大喪飾遣車遂廞之行之註曰廞興也謂陳駕之行之使人以次舉之以如墓也遣車一曰鸞車疏曰遣車謂將葬遣送之車入壙首也言飾者還以金象革飾之如生存之車但麤小為之耳及葬執蓋從車持旌註曰從車隨柩路持葢與旌者王平生時車建旌雨則有葢今蜃車無葢執而隨之象生時有也所執者銘旌疏曰蜃車既設帷荒不得設葢是以執而隨柩車旌在柩車前亦使巾車之官執持因言之耳非謂持旌亦從車也及墓嘑啓闗陳車註曰闗墓門也車貳車也士䘮禮下篇曰車至道左北面立東上小䘮共匶路與其飾註曰匶路載柩車也飾棺飾也嵗時更續共其弊車䟽曰嵗時更續者謂一嵗四時皆有受官車更謂車雖未破日月已久舊壞者更易以新者續謂雖未經久其有破壞不中用者復以新車續之共其弊車者既更續以新車其本或舊或壊皆是弊車巾車受取以共冬官車人材或有中用之大祭祀鳴鈴以應雞人註曰雞人主呼且鳴鈴以和之聲且警衆必使鳴鈴者車有和鸞相應和之象典路掌王及后之五路辨其名物與其用説註曰用謂將有朝祀之事而駕之鄭司農云説謂舍車也疏曰上巾車已主王后之五路今此又掌之者以其冬官造得車訖以授巾車飾以玉金象之等其王及后所乗者又入典路别掌之説書鋭反下駕説同若有大祭祀則出路贊駕説註曰出路王當乗之贊駕説贊僕與趣馬也大䘮大賓客亦如之註曰亦出路當陳之鄭司農説以書顧命曰成王崩康王既陳先王寳器又曰大路在賓階面贅路在阼階面先路在左塾之前次路在右塾之前漢朝上計律陳屬車於庭故曰大䘮大賓客亦如之趣倉口反凡會同軍旅弔于四方以路從註曰王出于事無常王乗一路典路以其餘路從行亦以華國易彦祥曰謂因會同軍旅而行弔事從才用反車僕掌戎路之萃廣車之萃闕車之萃苹車之萃輕車之萃註曰萃猶副也此五者皆兵車所謂五戎也戎路王在軍所乗也廣車横陳之車也闕車所用補闕之車也苹猶屏也所用對敵自蔽隐之車也輕車所用馳敵致師之車也春秋傳曰公䘮戎路又曰其君之戎分為二廣則諸侯戎路廣車也又曰帥斿闕四十乗孫子八陳有苹車之陳又曰馳車千乗五者之制及萃數未盡聞也書曰武王戎車三百兩疏曰戎路則巾車所云革路也此車僕惟掌五戎之萃其五戎之正不言所掌者巾車雖掌正戎之一其下四戎之正亦巾車掌之矣萃七内反苹薄輕反凡師共革車各以其萃註曰五戎者共其一以為王優尊者所乗也而萃各從其元焉疏曰經不云革路總云共革車則革車之言所含者多五戎皆是會同亦如之註曰巡守及兵車之會則王乗戎路乗車之會王雖乗金路猶共以從不失備也大喪廞革車註曰言興革車則遣車不徒戎路廣闕苹輕皆有焉疏曰王䘮遣車九乗除此五乗之外加以金玉象木四者則九乗矣大射共三乏疏曰以其為革車用皮其乏亦用皮故因使為之大射共乏至於賓射燕射之等則亦使共矣舉大射尊者而言司常掌九旗之物名各有屬以待國事日月為常交龍為旂通帛為旜雜帛為物熊虎為旗鳥隼為旟龜蛇為旐全羽為旞析羽為旌註曰物名者所畫異物則異名也屬謂徽識也大傳為之徽號今城門僕射所被及亭長著絳衣皆其舊象通帛謂大赤從周正色無飾雜帛者以帛素飾其側白殷之正色全羽析羽皆五采繫之於旞旌之上所謂注旄於干首也凡九旗之帛皆用絳疏曰引注旄於干首者明此旞旌非直有羽亦有旄雖據旞旌至於大常已下首皆有之故衛之臣雖㫋物而有旄羽則大常已下皆有明矣全羽析羽直有羽而無帛而註云九旗之帛者據衆有者而言旜之然反隼息允反旟音餘旐音兆旞音遂識式志反及國之大閲贊司馬頒旗物王建大常諸侯建旂孤卿建旜大夫士建物師都建旗州里建旟縣鄙建旐道車載旞斿車載旌註曰仲冬教大閲司馬主其禮自王以下治民者旗畫成物之象王畫日月象天明也諸侯畫交龍一象其升朝一象其下復也孤卿不畫言奉王之政教而已大夫士雜帛言以先王正道佐職也畫熊虎者象其守猛莫敢犯也州里鄉遂之官鳥隼象其勇健也龜蛇象其扞難避害也道車象路也王以朝夕燕出八斿車木路也王以田以鄙全羽祈羽五色象其文徳也大閲王乗戎路建大常焉玉路金路不出疏曰此九旗𤼵首雖總為大閲而言其道車載旞斿車載旌非為軍事也道車在朝則建大赤今以朝夕燕出入則建旞也斿車正田時建大麾今以小田及巡行縣鄙則建旌為異耳鄭剛中曰此旗物司常與大司馬或頒之或辨之然王與諸侯或建或載不出乎大常與旂至於旜則孤卿建之矣師都又載之物則大夫士建之矣鄉遂又載之旗則師都建之矣軍吏又載之旟則州里建之矣百官又載之旐則縣鄙建之矣郊野又載之何也余以為軍吏也孤卿也師都也三者不同名攷其實則皆孤卿而已平日為孤卿有事則命為軍將所謂軍將者非軍吏乎在朝為孤卿食采皆在師都所謂師都者非孤卿乎孤卿可以謂之軍吏又可以謂之師都故所互建者旗也旜也所迭載者亦旗也旜也鄉遂也大夫士也百官也州里也四者不同名攷其實皆大夫士而已判而言之則曰大夫曰士合而言之則曰百官鄉則有州遂則有里曰鄉遂者總名也曰州里者各舉其一以名之其實則鄉遂也鄉遂州里之官皆大夫士為之為大夫士者乃所謂官也故所互建者物也旟也所迭載者亦物也旟也郊野也縣鄙也二者不同名攷其實皆公邑之吏而已鄉遂餘地與夫封王子弟之餘地謂之公邑亦謂之閒田自其地言之名曰郊野自天子使吏治言之名曰縣鄙夫公邑閒田之地既名郊野又名縣鄙何也葢是田邑也有在六遂之縣者有采地之縣者康成所謂二百里為州四百里為縣者謂此地爾故所互建者旐也所迭載者亦旐也皆畫其象焉官府各象其事州里各象其名家各象其號註曰事名號者徽識所以題别衆臣樹之於位朝各就焉覲禮曰公侯伯子男各就其旂而立此其類也或謂之事或謂之名或謂之號異内外也三者旌旗之細也士䘮禮曰為銘各以其物亡則以緇長半幅赬末長終幅廣三寸書名於末此葢其制也徽識之書則云某某之事某某之名某某之號今大閲禮象而為之兵凶事若有死事者亦當以相别也杜子春云畫當為書𤣥謂畫畫雲氣也異於在國軍事之飾疏曰云大閲象為之者此在軍之旌綴於身大小象銘旌及在朝者為之亡音無赬音稱凡祭祀各建其旗註曰王祭祀之車則玉路疏曰乗玉路則建大常經云各建其旗則諸侯已下所得路各有旗項平甫曰各建其旗所以屬衆王則建大常諸侯助祭者百官執事者各有之會同賓客亦如之置旌門註曰賓客朝覲宗遇王乗金路巡守兵車之會王乗戎路皆建其大常掌舍職曰為惟宫設旌門疏曰引掌舍職者彼官設之此官供旌大䘮共銘旌註曰銘旌王則大常也士䘮禮曰為銘各以其物建廞車之旌及葬亦如之註曰葬云建之則行廞車解説之疏曰此謂在廟陳時以廞旌建於遣車之上及葬亦如之此謂八壙亦建之説吐活反凡軍事建旌旗及致民置旗弊之註曰始置旗以致民民至仆之誅後至者甸亦如之仆薄北反一音赴凡射共𫉬旌註曰𫉬旌𫉬者所持旌疏曰謂若大射服不氏唱𫉬所持之旌三侯皆有𫉬旌也嵗時共更旌註曰取舊子新都宗人掌都祭祀之禮凡都祭祀致福于國註曰都或有山川及因國無主九皇六十四民之祀王子弟則立其祖王之廟其祭祀王皆賜禽焉主其禮者警戒之糾其戒具其來致福則率而以造祭僕正都禮與其服註曰禁督其違失者服謂衣服及宫室車旗若有寇戎之事則保羣神之壝註曰守山川邱陵墳衍之壇域國有大故則令禱祠既祭反命于國註曰令令都之有司也祭謂報塞也反命還白王塞西代反家宗人掌家祭祀之禮凡祭祀致福註曰大夫采地之所祀與都同若先王之子孫亦有祖廟國有大故則令禱祠反命祭亦如之註曰以王命令禱祠歸白王於𫉬福又以王命令祭之還又反命掌家禮與其衣服宫室車旗之禁令註曰掌亦正也不言宼戎保羣神之壝則都家自保之都宗人所保者謂王所祀明矣凡以神仕者掌三辰之灋以猶鬼神示之居辨其名物註曰猶圖也居謂坐也天者羣神之精日月星辰其著位也以此圖天神人鬼地示之坐者謂布祭衆寡與其居句國語曰古者民之精爽不攜貳者而又能齊肅中正其知能上下比義其聖能光逺宣朗其明能光照之其聰能聴徹之如是則神明降之在男曰覡在女曰巫是以使制神之處位次主而為之牲器時服巫既知神如此又能居以天灋是以聖人用之今之巫祝既闇其義何明之見何法之行正神不降或於淫厲苟貪貸食遂誣神人令此道滅痛矣徐氏曰三辰日月星所至次舍天神人鬼地示皆一氣其本在地其精在天而各有常居若五帝座及北辰大乙常居也輿鬼下天社天稷地示所居虚危宗廟人鬼居也明者能按三辰所臨之時日謀猶鬼神示之處位次主而辨其名牲牢器服各以其物享焉居紀慮反句紀具反齊側皆反知音智覡胡厯反以冬日至致天神人鬼以夏日至致地示物鬽以禬國之凶荒民之札䘮註曰天人陽也地物陰也陽氣升而祭鬼神陰氣升而祭地示物鬽所以順其為人與物也百物之神曰鬽春秋傳曰魑魅魍魎杜子春云禬除也𤣥謂此禬讀如潰癰之潰薛士龍曰致天神而人主與之荀卿所謂郊則并百王於上而祭之是已郊天合百王則祭地合物鬽宜矣用祭天地之明日於經無據黄文叔曰是必有推候之灋可睹之實至漢郊祀猶候神先下天子望拜則司樂六變天神降八變地示出九變人鬼格非無其事鬽眉秘反易彦祥曰春官設屬最有統紀所典之禮五禮為先五禮之中吉禮為本是葢天秩天敘自然之理觀大宗伯其用亦博矣實以天神人鬼地示為主然後小宗伯為之建國之神位肆師為之立國祀之禮而五禮從之自其設屬而言雖五禮之用為不同莫先於祭祀之禮於是因禮事之緩急而為職掌之先後坡謂大宗伯至職末為官七十宗伯雖曰掌邦禮治神人和上下要則事神為重故其設官先後皆以神事次之焉小宗伯立鬼神示之位肆師掌其玉帛牲牷所以貳大宗伯也祭莫先於祼故首以鬱人鬯人司尊彛鋪筵設同几為依神故司几筵次之陳其宗器故天府次之禮之以玉故典瑞又次之祭有尊卑服有等差次之以司服先雞人於司尊彛者明禴祠烝嘗欲及時事也先典命於司服者古者於禘𤼵爵賜服所謂祭有十倫此其一也典祀守祧未祭守之職之専也當祭巡之藏之亦職之微也次之世婦至外宗贊王后内事也又次之為之宗廟以鬼享之卜其宅兆而安厝之祭事致敬䘮事致哀次之以冢人至職䘮葢其意與禮交動乎上樂交應乎下故大司樂至師千二十官繼之焉貞諸夢卜以知其情故有大卜八官紛若告䖍得能享之故有祝巫八官知器知來謹於若之故有大史四官凡此三者原反諸幽求諸鬼神之道也於此竭情盡慎者以為無餘耳次以内史三官猶典命之意也抑亦治人之禮也祭必乗大路載大常故繼以自巾車至司常四職都宗人家宗人祭有賜禽有事命禱非王祭之常而亦王祭之所及故特附見焉終之以凡以神仕者猶鬼神示之居與始之以大宗伯掌建邦之三禮則終始見春官一職皆事神之重矣雖其間名分之嚴教育之方凶賓軍嘉之禮莫不備舉而無非推仁孝誠敬之心以及於天下黙契天親之理以順其秩序命討之公此天道之至教聖人之至徳也周禮述註卷十六
