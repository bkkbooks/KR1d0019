body:
  text: 周禮述註卷十三安溪李光坡撰肆師之職掌立國祀之禮以佐大宗伯立大祀用玉帛牲牷立次祀用牲幣立小祀用牲註曰鄭司農云大祀天地次祀日月星辰小祀司命以下𤣥謂大祀又有宗廟次祀又有社稷五祀五嶽小祀又有司中風師雨師山川百物疏曰宗廟次祀即先公是也小祀馬君云殤與無後也立大祀用玉帛牲牷者天神中非直有升禋玉帛牲亦有禮神者也地示中非直瘞埋中有玉帛牲亦兼有禮神玉帛牲也宗廟中無禋瘞埋直有禮神幣帛與牲又不見有禮神之玉或可以灌圭當之以嵗時序其祭祀及其祈珥註曰序第次其先後大小疏曰嵗時序其祭祀者即上立大祀至小祀皆依嵗之四時次序之易彦祥曰小子職珥于社稷祈于五祀羊人職祈珥共羊牲與此文同至秋官士師職則曰凡刉珥奉犬牲後鄭皆改祈為刉且以珥之字當從血為衈引雜記釁廟之説然羊人小子有言釁積釁邦器軍器之事皆直謂之釁不應宫兆始成之釁而獨謂之祈珥况祈珥見於經者三不應以三出之祈盡改為刉劉中義云珥弭字之誤也祈謂小祝之祈福祥弭謂小祝之弭兵災今從之大祭祀展犧牲繫于牢頒于職人註曰展省閲也職讀為樴樴可以繫牲者此職人謂充人及監門人疏曰肆師以將有天地宗廟大祭祀牧人以牲與充人之時肆師省閲其牲看完否及色堪為祭牲乃繫于牢頒付于職人也牷音全珥音二職之弋反註樴同瘞壹計反刉居依反衈而志反監古咸反凡祭祀之卜日宿為期詔相其禮眂滌濯亦如之註曰宿先卜祭之夕疏曰詔相其禮者謂肆師詔告相助其卜之威儀及齊戒之禮眂滌濯祭前之夕也李嘉會曰内而六宫外而有司其滌濯摡拭之類大小次第之節不可紊也故亦詔相祭之日表齍盛告絜展器陳告備及果築䰞相治小禮誅其慢怠者註曰粢六榖也在器曰盛陳陳列也果築䰞者所築䰞以祼也表徽識也鄭司農云築煮築香草煮以為鬯疏曰展器陳告備者謂祭日於堂東陳祭器實之又省視之而告備具也宗廟有果鬱人掌鬱此又掌之者彼官正職此肆師察其不如儀者也掌兆中廟中之禁令註曰兆壇域劉原父曰兆中廟中執事者衆欲其行事致肅故有禁令凡祭祀禮成則告事畢果古亂反下同鬻音煮相息亮反下同識式志反大賓客涖筵几築䰞註曰此王所以禮賓客疏曰筵几云涖謂司几筵設之肆師臨之也贊果將註曰酌鬱鬯授大宗伯載祼鄭剛中曰小宗伯言祭祀賓客以時將瓚祼肆師言贊果明贊小宗伯矣大朝覲佐儐疏曰此言大朝覲為承儐謂大會同朝覲時若四時常朝則小行人為承儐小行人所云者是也共設匪罋之禮註曰設於賔客之館公食大夫禮曰若不親食使大夫以侑幣致之豆實實于罋簋實實于筐匪其筐字之誤與禮不親饗則以酬幣致之或者匪以致饗疏曰肆師不掌飲食而共設者肆師主禮事謂依禮使掌客之等及諸官共設之也饗食授祭註曰授賓祭肺疏曰饗大牢以飲賓獻依命數食者亦亨大牢以食賓舉依命數祭謂祭先造食者與祝侯禳于畺及郊註曰侯禳小祝職也畺五百里逺郊百里近郊五十里疏曰侯者候迎善祥禳者禳去殃氣大䘮大渳以鬯則築䰞註曰築香草煮以為鬯以浴尸香草鬱也令外内命婦序哭疏曰哭灋以服之輕重為先後若然則内命婦為王斬衰居前諸臣之妻從服齊衰者居後也禁外内命男女之衰不中灋者且授之杖註曰外命男六鄉以出也内命男朝廷卿大夫士也其妻為外命女喪服為夫之君齊衰不杖内命女王之三夫人以下不中灋違升數與裁制者鄭司農云三日授子杖五日授大夫杖七日授士杖此舊説也喪大記曰君之喪三日子夫人杖五日既殯授大夫世婦杖無七日授士杖文𤣥謂授杖日數王喪依諸侯與七日授士枝四制云衰七雷反中丁仲反凡師甸用牲于社宗則為位註曰社軍社也宗遷主也尚書傳曰王升舟入水鼓鍾亞觀臺亞將舟亞宗廟亞疏曰用牲社宗者二者在外或有祈請也坡謂甸字疑衍類造上帝封于大神祭兵于山川亦如之註曰造猶即也為兆以類禮即祭上帝也類禮依郊祀而為之者封謂壇也大神社及方嶽也山川葢軍之所依止大傳曰牧之野武王之大事也既事而退柴於上帝祈於社設奠於牧室疏曰上經用牲於社宗據在軍下云師不功據敗退後即此經據尅勝後事告天及社之事凡師不功則助牽主車註曰助助大司馬也故書功為工鄭司農工讀為功古者工與功同字謂師無功肆師助牽之恐為敵所得疏曰主中有二為社之石主遷廟木主也甸音田下同凡四時之大甸獵祭表貉則為位註曰貉師祭也貉讀為十百之百於所立表之處為師祭造軍灋者禱氣勢之增倍也其神葢蚩蚘或曰黄帝貉音陌蚘音尤嘗之日涖卜來嵗之芟註曰芟芟草除田也古之始耕者除田種榖嘗者嘗新榖此芟之功也卜者問來嵗宜芟不詩云載芟載柞其耕澤澤疏曰餘事卜則大宗伯涖卜或大卜涖卜此及下三事皆肆師涖卜也獮之日涖卜來嵗之戒註曰秋田為獮始習兵戒不虞也卜者問後嵗兵寇之備社之日涖卜來嵗之稼註曰社祭土為取財焉卜者問後嵗稼所宜疏曰類上文嘗獮是秋則此社亦是秋祭社之日也獮思淺反柞側百反若國有大故則令國人祭註曰大故謂水旱凶荒所令祭者社及禜酺嵗時之祭祀亦如之註曰月令仲春命民社此其一隅凡卿大夫之喪相其禮註曰相其適子凡國之大事治其禮儀以佐宗伯註曰治謂如今每事者更奏白王禮也故書儀為義鄭司農云義讀為儀古者書儀但為義今時所謂義為誼凡國之小事治其禮儀而掌其事如宗伯之禮疏曰此一經於職末總結之也鬱人掌祼器註曰祼器謂彜及舟與瓚凡祭祀賓客之祼事和鬱鬯以實彜而陳之註曰築鬱金煮之以和鬯酒鄭司農云鬱草名十葉為貫百二十貫為築以煮之鐎中停於祭前鬱為草若蘭疏曰天地大神至尊不祼至於山川及門社等事在鬯人亦無祼事此云祭祀惟據宗廟耳凡祼玉濯之陳之以贊祼事註曰祼玉謂圭瓚璋瓚詔祼將之儀與其節註曰節謂王奉玉送祼早晏之時凡祼事沃盥疏曰言凡非一若賓客則大宗伯祼若祭祀王及后祼者鬱人沃以水盥手及洗瓚也鐎子遥反大喪之渳共其肆器註曰肆器陳尸之器喪大記曰君設大盤造氷焉大夫設夷盤造氷焉士併瓦盤無氷設牀襢笫有枕此之謂肆器天子亦用夷盤及葬共其祼器遂貍之註曰遣奠之彜與瓚也貍之於祖廟階間明奠終於此襢章善反笫側几反貍埋同亡皆反大祭祀與量人授舉斝之卒爵而飲之註曰斝受福之嘏聲之誤也王酳尸尸嘏王此其卒爵也小牢饋食禮主人受嘏詩懷之卒爵執爵以興出宰夫以籩受嗇黍主人嘗之乃還獻祝此鬱人受王之卒爵亦王出房時也必與量人者鬱人贊祼尸量人制從獻之脯㸋事相成疏曰與大夫士獻祝及佐食同節斝古雅反㸋音煩鬯人掌共秬鬯而飾之註曰秬鬯不和鬱者飾之謂設巾凡祭祀社壝用大罍註曰壝謂委土為墠壇所以祭也大罍瓦罍禜門用瓢齎註曰禜謂營酇所祭門國門也春秋傳曰日月星辰之神則雪霜風雨之不時於是乎禜之山川之神則水旱癘疫之不時於是乎禜之魯莊二十五年秋大水鼓用牲于社于門瓢謂瓢蠡也齎讀為齊取甘瓠割去柢以齊為尊廟用脩凡山川四方用蜃凡祼事用概凡疈事用散註曰祼當為埋字之誤也蜃水中蜃也脩蜃概散皆漆尊也蜃畫為蜃形蚌曰合漿尊之象概尊以朱帶者無飾曰散坡謂鬯人一官所共者皆祭地示之事自社稷至百物備之矣獨五祀五嶽之尊無聞焉葢祼事即五祀也本經故書祀作禩與祼似而訛耳廟疑作嶽葢嶽與岳同儀禮廟作庿又今北方有讀嶽音如益者三樂之樂則廟或方音或字磨之傳失也脩亦尊名勿讀卣矣祭四方百物以疈辜今既有四方又曰疈事者此疈事葢專指百物也以用器有異故復别言之齎在兮反柢音帝卣音酉大喪之大渳設斗共其釁鬯註曰斗所以沃尸也釁尸以鬯酒使之香美者鄭司農云釁讀為徽凡王之齊事共其秬鬯註曰給淬浴疏曰鬯非如三酒可飲之物大喪以浴尸明此亦共以給王浴而已齊音齋淬七内反凡王弔臨共介鬯註曰以尊適卑曰臨春秋傳曰照臨敝邑曲禮曰摯天子鬯王至尊介為執致之以禮於鬼神與檀弓曰曰臨諸侯畛於鬼神曰有天王某父此王適四方舍諸侯祖廟祝告其神之辭介於是進鬯父音甫雞人掌共雞牲辨其物註曰物謂毛色也辨之者陽祀用騂隂祀用黝大祭祀夜嘑旦以嘂百官註曰夜夜漏未盡雞鳴時也呼旦以警起百官使夙興凡國之大賓客會同軍旅喪祀亦如之凡國事為期則告之時註曰象雞知時也告其有司主事者少牢曰宗人朝服北面曰請祭期主人曰比於子宗人曰旦明行事告時者至此旦明而告之坡謂凡國事通上文祭祀賓客五者皆是引少牢者其一隅嘑音呼􅑧古弔反比毗志反凡祭祀面禳釁共其雞牲註曰釁釁廟之屬釁廟以羊門夾室皆用雞鄭司農云面禳四面禳也釁讀為徽疏曰祭祀謂宗廟之屬面禳謂祈禱之屬司尊彝掌六尊六彝之位詔其酌辨其用與其實註曰位所陳之處酌泲之使可酌各異也用四時祭祀所用亦不同實鬱及醴齊之屬泲子里反齊才計反春祠夏禴祼用雞彝鳥彝皆有舟其朝踐用兩獻尊其再獻用兩象尊皆有罍諸臣之所昨也秋嘗冬烝祼用斚彝黄彝皆有舟其朝獻用兩著尊其饋獻用兩壺尊皆有罍諸臣之所昨也凡四時之間祀追享朝享祼用虎彝蜼彝皆有舟其朝踐用兩大尊其再獻用兩山尊皆有罍諸臣之所昨也註曰祼謂以圭瓚酌鬱鬯始獻尸也后於是以璋瓚酌亞祼郊特牲曰周人尚臭灌用鬯臭鬱合鬯臭陰達於淵泉灌以圭璋用玉氣也既灌然後迎牲致陰氣也朝踐謂薦血腥酌醴始行祭事后於是薦朝事之豆邊既又酌獻其變朝踐為朝獻者尊相因也朝獻謂尸卒食王酳之再獻者王酳尸之後后酌亞獻諸臣為賓又次后酌盎齊備卒食三獻也於后亞獻内宗薦加豆籩其變再獻為饋獻者亦尊相因饋獻謂薦熟時后於是薦饋食之豆籩此凡九酌王及后各四諸臣一祭之正也以今祭禮特牲少牢言之二祼為奠而尸飲七矣王可以獻諸臣祭綂曰尸飲五君洗玉爵獻卿是其差也明堂位曰灌用玉瓚大圭爵用玉琖加用璧角璧散又鬱人職曰受舉斚之卒爵而飲之則王酳尸以玉爵也王酳尸用玉爵而再獻者用璧角璧散可知也雞彝鳥彝謂刻而畫之為雞鳯凰之形皆有舟皆有罍言春夏秋冬及追享朝享有之同昨讀為酢字之誤也諸臣獻者酌罍以自酢不敢與王之神靈共尊鄭司農云舟尊下臺若今時承槃獻讀為犧犧尊飾以翡翠象尊以象骨飾尊明堂位曰犧象周尊也尊以祼神罍臣之所飲也斚讀為稼稼彝畫禾稼也黄彝黄目尊也明堂位曰夏后氏以雞彝殷以斝周以黄目爾雅曰彝卣罍器也著尊著地無足明堂位曰著殷尊也壺者以壺為尊春秋傳曰尊以魯壺追享謂禘祫也在四時之間故曰間祀大尊大古之瓦尊山尊山罍也明堂位曰泰有虞氏之尊也山罍夏后氏之尊𤣥謂黄目以黄金為目郊特牲曰黄目鬱氣之上尊也黄者中也目者氣之清明者也言酌於中而清明於外朝享謂朝受政於廟春秋傳曰閏月不告朔猶朝於廟蜼禺屬仰鼻而長尾山罍亦刻而畫之為山雲之形兩獻註作犧同素何反昨音酢下同著直畧反朝享直遥反蜼音誄兩大音泰註同琖莊産反禺音遇凡六彝六尊之酌疏曰六彝與鬱齊為目六尊與醴齊盎齊為目下有凡酒而上不言罍者文不具也凡言酌者皆是泲之使可酌鬱齊獻酌醴齊縮酌盎齊涚酌凡酒脩酌註曰禮運曰𤣥酒在室醴醆在戸粢醍在堂澄酒在下以五齊次之則醆酒盎齊也郊特牲曰縮酌用茅明酌也醆酒涚於清汁獻涚于醆酒猶明清與醆酒于舊澤之酒也此言轉相泲成也獻讀為摩莎之莎齊語聲之誤也煮鬱和秬鬯以醆酒摩莎泲之出其香汁也醴齊尤濁和以明酌泲之以茅縮去滓也盎齊差清和以清酒泲之而已其餘三齊泛從醴醍沉從盎凡酒謂三酒也脩讀如滌濯之滌滌酌以水和而泲之今齊人命浩酒曰滌明酌酌取事酒之上也澤讀曰醳明酌清酒醆酒泲之皆以舊醳之酒凡此四者祼用鬱齊朝用醴齊饋用盎齊諸臣自酢用凡酒唯大事于大廟備五齊三酒鬱齊醴齊盎齊俱才計反獻酌素何反涚舒鋭反脩讀如滌醆莊産反醍音體醳音亦大喪存奠彝註曰存省也謂大遣時奠者朝設夕乃徹也大旅亦如之註曰旅者國有大故之祭也亦存其奠彝則陳之不即徹疏曰案小宰註天地至尊不祼此得用彝者此告請非常亦如大遣奠之而已亦非祼耳司几筵掌五几五席之名物辨其用與其位註曰五几左右玉彫彤漆素五席莞藻次蒲熊用位所設之席及其處凡大朝覲大饗射凡封國命諸侯王位設黼依依前南鄉設莞筵紛純加繅席畫純加次席黼純左右玉几註曰斧謂之黼其繡白黑采以絳帛為質依其制如屏風然於依前為王設席左右有几優至尊也鄭司農云紛讀為豳又讀為和粉之粉謂白繡也純讀為均服之均純縁也繅讀為藻率之藻次席虎皮為席𤣥謂紛如綬有文而狹者繅席削蒲蒻展之編以五采若今合歡矣畫謂雲氣也次席桃枝席有次列成文祀先王昨席亦如之註曰昨讀曰酢謂祭祀及王受酢之席尸卒食王酳之卒爵祝受之又酌授尸尸酢王於是席王於戸内后諸臣致爵乃設席鄉許亮反純章允反下同繅讀藻昨讀酢率音律蒻音弱諸侯祭祀席蒲筵繢純加莞席紛純右彫几註曰繢畫文也不莞席加繅者繅柔嚅不如莞清堅又於鬼神宜昨席莞筵紛純加繅席畫純筵國賓于牖前亦如之左彤几註曰昨讀亦曰酢國賓諸侯來朝孤卿大夫來聘後言几者使不蒙如也朝者彫几聘者彤几坡謂國賓之席如尸酢主君昨席而别言左彤几則昨席無几可知也諸侯祭祀席有右彫几則王祀先王有几可知也然則王之祀先王及昨席經雖綂承上文三席左右玉几曰亦如之而祀先王之有左右玉几昨席無左右玉几者可以類得矣鄭言朝者彫几然生人几在左鬼神几在右則朝雖如祭祀之彫几亦如彤几之左也繢胡内反嚅如兗反甸役則設熊席右漆几註曰謂王甸有司祭表貉所設席甸音田凡喪事設葦席右素几其柏席用萑黼純諸侯則紛純每敦一几註曰喪事謂凡奠也萑如葦而細者鄭司農云柏席迫地之席葦居其上或曰柏席載黍稷之席𤣥謂柏椁字磨滅之餘椁席藏中神坐之席也敦讀曰燾燾覆也棺在殯則椁燾既窆則加見皆謂覆之周禮雖合葬及同時在殯皆異几體實不同祭於廟同几精氣合萑音丸敦讀燾音導凡吉事變几凶事仍几註曰鄭司農云變几變更其質謂有飾也仍因也因其質謂無飾也爾雅曰儴仍因也𤣥謂吉事王祭宗廟祼於室饋食於堂繹於祊毎事易几神事文示新之也凶事謂凡奠几朝夕相因䘮禮畧疏曰凡几之長短阮諶云几長五尺髙二尺廣二尺馬融以為長三尺舊圖以為几兩端赤中央黑也儴如羊反祊補耕反天府掌祖廟之守藏與其禁令註曰祖廟始祖后稷之廟其寶物世傳守之若魯寳玉大弓者徐氏曰禁令謂防守及陳蔵之灋蔵才浪反凡國之玉鎮大寳器藏焉若有大祭大喪則出而陳之既事藏之註曰禘祫及大喪陳之以華國也鄭司農云書顧命曰王崩陳寶此其行事見於經鄭剛中曰玉鎮如洪璧琬琰夏后氐之璜之類大寶器如崇鼎貫鼎大貝鼖鼓和弓垂矢之類凡官府鄉州及都鄙之治中受而藏之以詔王察羣吏之治註曰察察其當黜陟者鄭司農云治中謂其治職簿書之要疏曰經雖言治中兼有不中在其間中者陟之不中黜之經直言中偏舉一邊而言也鼖扶云反上春釁寶鎮及寶器註曰上春孟春也釁謂殺牲以血血之凡吉凶之事祖廟之中沃盥執燭註曰吉事四時祭也凶事王后喪朝于祖廟之奠疏曰小祝大祭祀沃尸盥小臣大祭祀沃王盥此二官所沃盥在祖廟中則天府為之執燭若士師祀五帝沃尸盥非祖廟事則不與執燭也季冬陳玉以貞來嵗之媺惡註曰問事之正曰貞問嵗之美惡謂問於龜大卜職大貞之屬陳玉陳禮神之玉凡卜筮實問于鬼神龜筮能出其卦兆之占耳龜有天地四方則玉有六器者與言陳者既事蔵之不必貍之也鄭司農云貞問也國語曰貞於陽卜若遷寶則奉之疏曰遷寳謂王者遷都則寶亦遷天府奉送之於彼新廟之天府蔵之如故也若祭天之司民司祿而獻民數榖數則受而藏之註曰司民軒轅角也司祿文昌第六星或曰下能也禄之言榖也年榖登乃後制禄祭此二星者以孟冬既祭之而上民榖之數於天府坡謂秋官有司民之職掌民數及大比以詔司寇司寇及孟冬祀司民之日獻其數於王登于天府然則地官有司禄之職獻穀數者必司徒也司禄文闕凡此一職上下文理相足寶鎮寶器既蔵之及上春釁之喪祭陳玉而兼陳於貞媺惡受蔵治中而復蔵民數穀數蓋互言以盡此官之職王氏曰賢能之書登于天府見於鄉大夫而此不見者互文也典瑞掌玉瑞玉器之藏辨其名物與其用事設其服飾註曰人執以見曰瑞禮神曰器瑞符信也服飾服玉之飾謂繅藉坡謂天府所藏玉乃先王之遺物謂宗器也典瑞之玉乃今王所用以有事者疏謂美者入天府平者在典瑞未詳王晉大圭執鎮圭繅藉五采五就以朝日註曰繅有五采文所以薦玉木為中幹用韋衣而畫之就成也王朝日者示有所尊訓民示君也天子常春分朝目秋分夕月覲禮曰拜日於東門之外鄭司農云晉謂插於紳帶之間若帶劍也玉人職曰大圭長三尺杼上終葵首天子服之鎮圭尺有二寸天子守之繅讀為藻率之藻五就五帀也一帀為一就公執桓圭侯執信圭伯執躬圭繅皆三采三就子執榖璧男執蒲璧繅皆二采再就以朝覲宗遇㑹同於王註曰三采朱白蒼二采朱綠也鄭司農云以圭璧見于王覲禮曰侯氏入門右坐奠圭再拜稽首侯氏見于天子春曰朝夏曰宗秋曰覲冬曰遇時見曰㑹殷見曰同諸侯相見亦如之註曰鄭司農云亦執圭璧以相見故邾𨼆公朝於魯春秋傳曰邾子執玉髙其容仰帀匝本字瑑圭璋璧琮繅皆二采一就以覜聘註曰璋以聘后夫人以琮享之也大夫衆來曰頫寡來曰聘鄭司農云瑑有圻鄂瑑起疏曰此遣臣行聘問之所執者若本君親自朝所執上文桓圭之等是若遣臣聘不得執君之圭璧無桓信躬與蒲榖之文直瑑之而已此謂公侯伯之臣也若子男之臣豈得過本君用以圭璋乎明子男之臣亦用瑑璧琮也四圭有邸以祀天旅上帝註曰鄭司農云於中央為璧圭著其四面一玉俱成爾雅曰邸本也圭本著於璧故四圭有邸圭末四出故也或説四圭有邸有四角也邸讀為抵欺之抵王光逺曰祀天謂圜丘之祀大神也兩圭有邸以祀地旅四望註曰兩圭者以象地數二也僢而同邸王光逺曰祀地謂方澤之祭大示也坡謂大宗伯六器與六瑞六摰相次則蒼璧黄琮疑或初致其神奠玉而禮之如執贄以見者故曰禮天禮地此四圭有邸兩圭有邸與祼圭有瓚為類是邸當亦瓚屬瓚注鬱鬯者然表記曰秬鬯以祀上帝則此邸疑或注秬鬯者雖不以祼而奠以享神故曰祀天祀地推之下文圭璧者是於圭頭為器如璧璋邸射者是於璋頭為器如邸而射皆挹鬯爵也以類次之或近鄭子見大宗伯有蒼璧黄琮之文此官無之而别云四圭有邸兩圭有邸遂以蒼璧所禮者冬至圜丘之祀四圭則夏正郊天黄璜所禮者崑崙之祭兩圭則神州之神或者嫌出於緯書不從又見明有四器因合而一之曰蒼璧為邸四圭託焉黄琮為邸兩圭託焉更無他據今且闕之祼圭有瓚以肆先王以祼賓客註曰鄭司農云於圭頭為器可以挹鬯祼祭謂之瓚故詩曰䘏彼玉瓚黄流在中國語謂之鬯圭以肆先王祼先王祭也𤣥謂肆解牲體以祭因以為名爵行曰祼漢禮瓚槃大五升口徑八寸下有槃口徑一尺圭璧以祀日月星辰註曰圭其邸為璧取殺於上帝璋邸射以祀山川以造贈賓客註曰璋有邸而射取殺於四望鄭司農云射剡也疏曰造贈賔客者謂致稍餼之時造館贈之言贈則使還之時所贈賄之等亦執以致命耳肆他歴反射食亦反著直畧反僢昌絹反䘏音瑟殺色界反土圭以致四時日月封國則以土地註曰以致四時日月者冬夏以致日春秋以致月土地猶度地也珍圭以徴守以䘏凶荒註曰杜子春云珍當為鎮書亦或為鎮以徴守者以徴召守國諸侯若今時徴郡守以竹使符也鎮者國之鎮諸侯亦一國之鎮故以鎮圭徴之也凶荒則民有逺志不安其土故以鎮圭鎮安之𤣥謂王使人徴諸侯憂凶荒之國則授之執以往致命王焉䘏者闓府庫振救之凡瑞節歸又執以反命坡謂掌節之節守國行道之用也典瑞之瑞作事之信也司者異官器亦各掌謂瑞即節疑於漏矣詳見掌節王氏牙璋以起軍旅以治兵守註曰鄭司農云牙璋瑑以為牙牙齒兵象故以牙璋𤼵兵若今時以銅虎符𤼵兵𤣥謂兵守用兵以守若齊人戍遂諸侯戍周璧羨以起度註曰鄭司農云羨長也此璧徑長尺以起度量玉人職曰璧羨度尺以為度𤣥謂羨不圓之貎葢廣徑八寸袤一尺李子華曰此璧本徑九寸今言羡則旁減一寸以益上下故髙一尺横徑八寸十寸尺也八寸亦尺也一縱一横皆可以為尺度駔圭璋璧琮琥璜之渠眉疏璧琮以歛尸註曰以歛尸者於大歛焉加之也駔讀為組與組馬同聲之誤也渠眉玉飾之溝瑑也以組穿聨六玉溝瑑之中以歛尸圭在左璋在首琥在右璜在足璧在背琮在腹葢取象方明神之也疏璧琮者通於天地疏曰此六玉兩頭皆有孔又於兩孔之間為溝渠於溝之兩畔稍髙為眉瑑榖圭以和難以聘女註曰榖善也其飾若粟文然難仇讐和之者若春秋宣公及齊侯平莒及郯晉侯使瑕嘉平戎于王其聘女則以納徴焉琬圭以治徳以結好註曰諸侯有徳王命賜之及諸侯使大夫來聘既而為壇會之使大夫執以命事焉大行人職曰時聘以結諸侯之好鄭司農云琬圭無鋒芒故治徳以結好琰圭以易行以除慝註曰鄭司農云琰圭有鋒芒傷害征伐誅討之象故以易行除慝易惡行令為善者以此圭責讓諭告之也𤣥謂除慝亦於諸侯使大夫來頫既而使大夫執而命事於壇大行人職曰殷頫以除邦國之慝駔音祖難乃旦反行下孟反度待洛反闓音開戍傷遇反袤音茂郯音談大祭祀大旅凡賓客之事共其玉器而奉之註曰玉器謂四圭祼圭之屬大喪共飯玉含玉贈玉註曰飯玉碎玉以雜米也含玉柱左右顛及在口中者雜記曰含者執璧將命則是璧形而小耳贈玉葢璧也贈有束帛六幣璧以帛顛儀禮作齻音顛牙也此作顛疑或通用凡玉器出則共奉之鄭剛中曰上言共奉主於祭祀賔客嫌其他事之時或不共奉故言此以結之見其無往而不共奉典命掌諸侯之五儀諸臣之五等之命註曰五儀公侯伯子男之儀五等謂孤以下四命三命再命一命不命也或言儀或言命互文也上公九命為伯其國家宫室車旗衣服禮儀皆以九為節侯伯七命其國家宫室車旗衣服禮儀皆以七為節子男五命其國家宫室車旗衣服禮儀皆以五為節註曰上公謂王之三公有徳者加命為二伯二王之後亦為上公國家國之所居謂城方也公之城葢方九里宫方九百步侯伯之城葢方七里宫方七百步子男之城葢方五里宫五百歩大行人職則有諸侯圭藉冕服建常樊纓貳車介牢禮朝位之數焉王之三公八命其卿六命其大夫四命及其出封皆加一等其國家宫室車旗衣服禮儀亦如之註曰四命中下大夫也出封出畿内封於八州之中加一等褒有徳也大夫為子男卿為侯伯其在朝廷則亦如命數耳王之上士三命中士再命下士一命凡諸侯之適子誓於天子攝其君則下其君之禮一等未誓則以皮帛繼子男註曰誓猶命也言誓者明天子既命以為之嗣樹子不易也春秋桓九年曹伯使其世子射姑來朝行國君之禮是也公之子如諸侯而執圭侯伯之子如子男而執璧子男之子與未誓者皆次小國之君執皮帛而朝㑹焉其賓之皆以上卿之禮焉疏曰若行朝禮擯介依諸侯其饔餼饗一與卿同也此經誓與未誓皆據父在而言若父卒後得誓者皆得與諸侯序以無父得與正君同故也若未誓則亦當執皮帛也適丁歴反射音亦朝直遥反公之孤四命以皮帛眂小國之君其卿三命其大夫再命其士一命其宫室車旗衣服禮儀各眂其命之數侯伯之卿大夫士亦如之子男之卿再命其大夫一命其士不命其宫室車旗衣服禮儀各眂其命之數註曰眂小國之君者列於卿大夫之位而禮如子男也鄭司農云九命上公得置孤卿一人春秋傳曰列國之卿當小國之君固周制也𤣥謂王制曰大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人司服掌王之吉凶衣服辨其名物與其用事註曰用事祭祀視朝甸凶弔之事衣服各有所用王之吉服祀昊天上帝則服大裘而冕祀五帝亦如之享先王則衮冕享先公饗射則鷩冕祀四望山川則毳冕祭社稷五祀則希冕祭羣小祀則𤣥冕註曰六服同冕者首飾尊也先公謂后稷之後大王之前不窋至諸盩饗射饗食賔客與諸侯射也羣小祀林澤墳衍四方百物之屬鄭司農云大裘羔裘也衮卷龍衣也鷩裨衣也毳罽衣也𤣥謂書曰予欲觀古古人之象日月星辰山龍華蟲作繢宗彝藻火粉米黼黻希繡此古天子冕服十二章舜欲觀焉華蟲五色之蟲繢人職曰鳥獸蛇雜四時五色以章之謂是也希讀為絺或作黹字之誤也王者相變至周而以日月星辰畫於旌旗所謂三辰旂旗昭其明也而冕服九章登龍於山登火於宗彝尊其神明也九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝皆畫以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆希以為繡則衮之衣五章裳四章凡九也鷩畫以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼其衣三章裳二章凡五也希刺粉米無畫也其衣一章裳二章凡三也𤣥者衣無文裳刺黻而已是以謂𤣥焉凡冕服皆𤣥衣纁裳黄文叔曰宗伯序社稷五祀先於五嶽司服序四望山川先於社稷祭之秩當如宗伯司服自以服為序地祭以社稷見不别出則方丘不服大裘矣諸儒紛紛葢未嘗攷先王制祀之義劉執中曰書稱舜曰予欲觀古人之象舜而欲觀乎古則天子衣裳之章十有二其來逺矣且交龍為旂周之衣不去其龍熊虎為旗周之裳不去其虎蜼何獨日月為常而去衣章日月星辰乎典命上公九命以九為節則其衣裳九章推而上之天子衮冕十有二章明矣鷩必滅反盩直留反罽居例反黹張里反蜼音誄凡兵事韋弁服註曰韋弁以韎韋為弁又以為衣裳春秋傳曰晉郤至衣韎韋之跗注是也鄭剛中曰韋弁服者爵弁也眂朝則皮弁服註曰眂朝眂内外朝之事皮弁之服十五升白布衣積素以為裳王受諸侯朝覲於廟則衮冕凡甸冠弁服註曰甸田獵也冠弁委貎其服緇布衣亦積素以為裳諸侯以為眂朝之服詩國風曰緇衣之宜兮謂王服此以田王卒食而居則𤣥端疏曰言凡甸冠弁服者據習兵之時若正四時則當戎服習兵月令之習五戎是也凡凶事服弁服註曰服弁喪冠也其服斬衰齊衰凡弔事弁絰服註曰弁絰者如爵弁而素加環絰論語曰羔裘𤣥冠不以弔絰大如緦之絰其服錫衰緦衰疑衰凡喪為天王斬衰為王后齊衰註曰王后小君也諸侯為之不杖期王為三公六卿錫衰為諸侯緦衰為大夫士疑衰其首服皆弁絰註曰君為臣服弔服也鄭司農云錫麻之滑易者十五升去其半有事其布無事其縷緦亦十五升去其半有事其縷無事其布疑衰十四升衰𤣥謂無事其縷衰在内無事其布衰在外疑之言擬也擬於吉疏曰君為臣無服直弔服既葬除之不見三孤者與六卿同又不辨同姓異姓亦以臣故也凡弔皆不見婦人弔服者以婦與夫同故喪服云大夫弔於命婦錫衰命婦弔於大夫錫衰是婦與夫同其首服即鄭註喪服云凡婦人弔服吉笄無首素總是也大札大荒大烖素服註曰大札疫病也大荒饑饉也大烖水火為害君臣素服縞冠若晉伯宗哭梁山之崩公之服自衮冕而下如王之服侯伯之服自鷩冕而下如公之服子男之服自毳冕而下如侯伯之服孤之服自希冕而下如子男之服卿大夫之服自𤣥冕而下如孤之服其凶服加以大功小功士之服自皮弁而下如大夫之服其凶服亦如之其齊服有𤣥端素端註曰自公之衮冕至卿大夫之𤣥冕皆其朝聘天子及助祭之服諸侯非二王後其餘皆𤣥冕而祭於已雜記曰大夫冕而祭於公弁而祭於已士弁而祭於公冠而祭於已大夫爵弁自祭家廟惟孤爾其餘皆𤣥冠與士同𤣥冠自祭其廟者其服朝服𤣥端諸侯之自相朝聘皆皮弁服此天子日視朝之服喪服天子諸侯齊斬而已卿大夫加以大功小功士亦如之又加緦焉士齊有素端者亦為札荒有所禱請變素服言素端者明異制鄭司農云衣有𥜗裳者為端𤣥謂端者取其正也士之衣袂皆二尺二寸而屬幅是廣袤等也其袪尺二寸大夫以上侈之侈之者葢半而益一焉半而益一則其袂三尺三寸袪尺八寸疏曰此文自衮冕以下差次如之上得兼乎下下不得僭上也舊説天子九章據大章而言其章别小章章依命數則皆十二為節上公亦九章與天子同無升龍有降龍其小章章别皆九而已自餘鷩冕毳冕以下皆然必知有小章者若無小章絺冕三章則孤有四命六命卿大夫𤣥冕一章卿大夫中則有三命二命一命天子之卿六命大夫四命明中有小章乃可得依命數鄭剛中曰子男毳而下如侯伯則上不服鷩可知侯伯自鷩而下如公則上不服衮可知公自衮而下如王則上不服日月星辰可知經文謂自衮冕而下如王之服則衮冕而上之章非日月星辰而何齊側皆反𥜗音儒屬音燭凡大祭祀大賓客共其衣服而奉之註曰奉猶送也送之於王所疏曰大祭祀則中兼有次小祭祀以其皆是王親祭故舉大而言賔客言大者據諸侯來朝也王者不敢遺小國之臣則其臣來聘亦有接待之灋亦畧舉大而言大喪共其復衣服歛衣服奠衣服廞衣服皆掌其陳序註曰奠衣服今坐上魂衣也鄭司農云廞陳也𤣥謂廞衣服所蔵於槨中疏曰大喪中兼小䘮也典祀掌外祀之兆守皆有域掌其禁令外祀謂所祀於四郊者即小宗伯所云兆五帝至山川邱陵已下皆是典祀掌之也兆域據壇外為溝渠為表塋域者也若以時祭祀則帥其屬而脩除徴役于司𨽻而役之註曰屬其屬胥徒也脩除芟掃之徴召也役之作使之及祭帥其屬而守其厲禁而蹕之註曰鄭司農云遮列禁人不得令入守祧掌守先王先公之廟祧其遺衣服藏焉註曰廟謂大祖之廟及三昭三穆遷主所蔵曰祧先公之遷主蔵于后稷之廟先王之遷主蔵于文武之廟遺衣服大歛之餘也此王者之宮而有先公謂大王以前為諸侯若將祭祀則各以其服授尸註曰尸當服卒者之上服以象生時程子曰古人祭祀用尸極有意人之魂氣既散必求其類而依之人與人既為類骨肉又為一家之類已與尸各既心齊潔至誠相通以此求神宜其享之後世直以尊卑之勢遂不肯行其廟則有司脩除之其祧則守祧黝堊之註曰廟祭此廟也祧祭遷主有司宗伯也脩除黝堊互言之有司恒主脩除守祧恒主黝堊鄭司農云黝讀為幽幽黑也堊白也爾雅曰地謂之黝牆謂之堊既祭則藏其隋與其服註曰隋尸所祭肺脊黍稷之屬蔵之以依神堊烏路反隋許恚反世婦掌女宫之宿戒及祭祀比其具註曰女宫刑女給宫中事者宿戒當給事豫告之齊戒也比次也具所濯溉及粢盛之爨鄭司農比讀為庀庀具也鄭剛中曰天官世婦祭之日涖陳女宫之具涖陳在彼而校比之在此也詔王后之禮事註曰薦徹之節帥六宫之人共齍盛註曰帥世婦女御鄭剛中曰天官世婦言帥女宫濯摡為齍盛所帥者刑女耳為之於未共之前此所帥者六宫之人共之於正祭之日相外内宗之禮事註曰同姓異姓之女有爵佐后者疏曰禮事者外宗之佐后薦徹豆籩内宗之佐傳豆籩是也比音庇相息亮反大賓客之饗食亦如之註曰此帥詔相其事同大喪比外内命婦之朝莫哭不敬者而苛罰之註曰苛譴也莫音暮下同凡王后有􅉔事於婦人則詔相拜拜謝之也喪大記曰夫人亦拜寄公夫人於堂上知天子之喪世子亦拜二王後於堂下后亦拜二王後夫人於堂上也夫人有赴王喪者或家在畿内來歸寧值王喪則弔赴也􅉔古拜字凡内事有達於外官者世婦掌之註曰主通之使相共授黄文叔曰掌之葢得糾正之也内宗掌宗廟之祭祀薦加豆籩註曰加爵之豆籩疏曰天子禮以尸既食后亞獻尸為加爵此時薦之即醢人籩人加豆加籩之實是也及以樂徹則佐傳豆籩註曰佐傳佐外宗賓客之饗食亦如之王后有事則從王光逺曰有事則從者則吉凶之事皆在焉從才用反大喪序哭者註曰次序内外宗及命婦哭王哭諸侯亦如之凡卿大夫之喪掌其弔臨註曰王后弔臨諸侯而已是以言掌卿大夫云疏曰此諸侯來朝薨於王國王為之緦衰者也若檀弓云以爵弁絰䊷衣哭諸侯彼謂薨於本國王遥哭之則婦人不哭之婦人無外事故也天官世婦云掌弔臨于卿大夫之喪者彼為王此内宗掌弔臨之事乃為后掌之䊷緇同外宗掌宗廟之祭祀佐王后薦玉豆眂豆籩及以樂徹亦如之疏曰薦玉豆者凡王之豆籩皆玉飾之不云籩者文畧眂豆籩者謂在堂東未設之時眂其實也王后以樂羞齍則贊疏曰后進黍稷之時依樂以進則佐之案九嬪職凡祭祀贊玉齍贊后薦徹豆籩則薦徹俱言玉齍玉敦盛黍稷言贊不言徹則后薦而不徹也其徹諸官為之若然籩豆與齍此官已贊九嬪又贊者以器多故諸官共贊凡王后之獻亦如之註曰獻獻酒於尸王后不與則贊宗伯註曰后有故不與祭宗伯攝其事與音預敦音對小祭祀掌事賓客之事亦如之疏曰小祭祀謂在宫中后無外事故也賔客饗食亦掌事如小祭祀大喪則叙外内朝莫哭者哭諸侯亦如之註曰内内外宗及外命婦疏曰若内命婦則九嬪叙之冡人掌公墓之地辨其兆域而為之圖先王之葬居中以昭穆為左右註曰公君也圖謂畫其地形及邱壟所處而蔵之先王造塋者昭居左穆居右夾處東西疏曰子孫據昭穆夾處左右若兄死弟及俱為君則以兄弟為昭穆以其弟已為臣臣子一例則如父子故别昭穆也凡諸侯居左右以前卿大夫士居後各以其族註曰子孫各就其所出王以尊卑處其前後而亦併昭穆疏曰此因上而言以其王之子孫皆適為天子庶為諸侯卿大夫士若出封畿外者彼因國葬而為造塋之主矣此則言先王之子孫為畿内諸侯王朝之卿大夫士死者則居先王前後之左右也各以其族者謂次第假令同昭穆則兄近王墓弟逺王墓為次第諸侯言左右卿大夫士下云各以其族互相通也坡謂以前在卿大夫士之墓前居後在諸侯之墓後凡死於兵者不入兆域註曰戰陳無勇投諸塋外以罰之凡有功者居前註曰居王墓之前處昭穆之中央疏曰居前則不問諸侯與卿大夫士但是有功則皆得居前以表顯之也此則死寇曰兵者兼餘功若司勲六功之等皆是也以爵等為丘封之度與其樹數註曰别尊卑也王公曰邱諸臣曰封漢律曰列侯墳髙四丈闗内侯以下至庶人各有差疏曰此文自王以下皆有而云爵等者則天子亦爵號也大喪既有日請度甫竁遂為之尸註曰甫始也請量度所始竁之處地鄭司農云既有日既有葬日也始竁時祭以告后土冢人為之尸疏曰天子七月而葬葬用下旬請請於冡宰及竁以度為丘隧共喪之窆器註曰隧羨道也度邱與羨道廣袤所至窆器下棺豐碑之屬喪大記曰凡封用綍去碑負引君封以衡大夫以咸及葬言鸞車象人鸞車巾車所飾遣車也亦設鸞旗象人俑也言猶語也語巾車之官將明器鸞車及象人使行向壙及窆執斧以涖疏曰案鄉師執斧以涖匠師則此亦臨匠師葬事大故二官共臨也遂入藏凶器註曰凶器明器正墓位蹕墓域守墓禁註曰位謂邱封所居前後也禁所為塋限凡祭墓為尸疏曰上文祭墓謂始穿地時此文據成墓為尸王光逺曰凡祭墓為尸非特甫竁為之尸張子曰墓祭非古也體魄則降知氣在上故立之主以祀之以致其精神之極而謹蔵其體魄以竭其深長之思此古人明於鬼神之情狀而篤於孝愛之誠實者也然攷之周禮則有冡人之官凡祭於墓為尸是則成周之盛亦有祭於墓者雖非制禮之本經而出於人情之所不忍而於義理不至於甚害則先王亦從而許之其必立之尸者乃所以致其精神而示享之者非體魄之謂其為義益精矣度待洛反竁充芮反隧音遂窆彼騐反凡諸侯及諸臣葬於墓者授之兆為之蹕均其禁疏曰上文惟見王及子孫之墓地不見同姓異姓諸侯之墓地故此經總見之若然此墓地舊有兆域今新死者隨即授之耳墓大夫掌凡邦墓之地域為之圖註曰凡邦中之墓地萬民所葬地令國民族葬而掌其禁令註曰族葬各從其親疏曰經云族葬則據五服之内親者共為一所而葬異族即别塋左傳云同族於禰廟故知族是服内正其位掌其度數註曰位謂昭穆也度數爵等之大小疏曰鄭見有爵者謂本為庶人設墓其有子孫為卿大夫士其葬不離父祖使皆有私地域註曰古者萬民墓地同處分其地使各有區域得以族葬使相容凡爭墓地者聽其獄訟註曰爭墓地相侵區域帥其屬而巡墓厲居其中之室以守之註曰厲塋限遮列處鄭司農云居其中之室有官寺在墓中劉執中曰聖人父母斯民生則富其衣食而教以仁義死則為之地域而守其邱樹則子孫者其有不忠於君而不服其教者乎職喪掌諸侯之喪及卿大夫士凡有爵者之喪以國之喪禮涖其禁令序其事註曰國之喪禮喪服士喪既夕士虞今存者其餘則亡事謂小歛大歛葬也凡國有司以王命有事焉則詔贊主人註曰有事謂含襚贈賵之屬詔贊者以告主人佐其受之國有司有司從王國以王命往賵芳鳳反凡其喪祭詔其號治其禮註曰告以牲號齍號之屬當以祝之疏曰喪祭餘文皆為虞此言凡者以其喪中自相對則虞為喪祭卒哭為吉祭若對二十八月為吉祭則祥禫以前皆是喪祭故言凡以該之凡公有司之所共職喪令之趣其事註曰令令其當供物者給事之期也有司或言公或言國言國者由其君所來居其官曰公謂王遣使奉命有贈之物各從其官出職喪當催督也周禮述註卷十三
