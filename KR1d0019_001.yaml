body:
  text: 周禮述註卷一安溪李光坡撰周禮六篇其冬官一篇缺漢藝文志序列於禮家後人名之曰周禮周禮最後出盖秦自孝公已下用商君之灋其政酷烈與周官相反故始皇禁挾書特疾惡欲絶滅之搜求焚燒之獨悉漢文帝嘗召至魏文侯時老樂工因得春官大司樂之章景帝子河間獻王好古學得周官五篇失其冬官一篇乃購千金不得取攷工記以補其缺武帝求遺書得之藏於秘府禮家諸儒皆莫之見哀帝時劉歆校理秘書始著於録畧歆門人河南杜子春能通其讀鄭衆賈逵受業於杜漢末馬融𫝊之鄭子𤣥𤣥所註行於世宋程子張子甚尊信之朱子謂此經周公所作但當時行之恐未能盡後聖雖復損益可也至若肆為排觝毁訾之言則愚陋無知之人耳以冬官之缺五篇頗為諸儒所亂深疑其附離非實故仍舊本天官冢宰第一坡聞之兄曰天者君也官猶司也冢宰所司者君之事故曰天官宰者調和膳羞之名冢大也君徳者萬化之本而飲食盡道者又君徳之本也冢宰掌王之飲食男女之事使皆有其節度此體信之道其為宰也大矣君正而推以均四海不過用水火金木飲食必時合男女頒爵位必當年徳而萬物自育天地自位是調和膳羞其事至小而實大其義至近而實逺以此名官非喻也深哉知孔子無間於禹之心即得周公立冢宰之意惟王建國註曰建立也疏曰自此至以為民極五句六官之首同此序者以其建國設官為民不異故也辨方正位坡謂辨方辨其山林川澤邱陵墳衍原隰之方也正位致日景求地中正王國之位也體國經野坡謂體猶分也體國分五百里至百里五等之國也經謂為之里數野都鄙之地也設官分職鄭司農曰置冢宰司徒宗伯司馬司寇司空各有所職而百事舉以為民極朱子曰極者標準之名王次㸃曰宅中建國四方輻凑至斯為極詩曰商邑翼翼四方之極是也設官分職治教禮政刑事無不畢舉何往非民之極書曰皇建其有極是也乃立天官冢宰使帥其屬而掌邦治鄭司農曰邦治謂總六官之職也以佐王均邦國註曰佐助也吕伯恭曰天之所以立君命相不過欲均平天下之不平者爾令四海之内貴者貴賤者賤士農工商鰥寡孤獨事事物物咸適其宜則均道盡矣帥音率後同輻音福治官之屬疏曰别言此句與下六十官為總目不唯指此一經而已大宰卿一人小宰中大夫二人宰夫下大夫四人上士八人中士十有六人旅下士三十有二人註曰變冢言大進退異名也百官總焉則謂之冢列職於王則稱大冢大之上也山頂曰冢旅衆也下士治衆事者自大宰至旅下士轉相輔貳皆王臣也王之卿六命其大夫四命士以三命而下為差府六人史十有二人註曰府治藏史掌書者凡府史皆其官長所自辟除陳君舉曰上之不可以為士下之不止於為農則任以府史之職疏曰府史大例皆府少而史多而府又在史上惟有御史百二十人特多而在府上以其掌贊書數多也有府有史者以其當職事繁故也有史無府者以其事少得史即足故也角人羽人等直有府無史以其文書少而有稅物須藏之也腊人食醫等府史俱無者以其専官行事更無所須故也惟有天府一官特多於史以其所藏物重故也胥十有二人徒百有二十人註曰此民給徭役者若今衛士矣胥讀如諝謂其有才知為什長疏曰有胥必有徒胥為什長故也腊人之類有徒無胥者得徒則足不假長帥也食醫之類胥徒並無者専官行事不假胥徒也禮記王制云下士視上農夫食九人禄足以代耕則府食八人史食七人胥食六人徒食五人禄其官竝亞士故號庶人在官者也大音泰後皆放此諝音胥或問辨方正位體國之説異於註何也曰非敢臆解據從大司徒成文也今試即是而推言之則見王者立國先辨方土民物之宜相民宅知利害而後正王國是其天下為家厚下安宅而不徒於一人計安享之利矣次之以體國經野則建邦設都以蕃王室以亂兆民指臂之勢成而中土永奠八字之中廣大精密規模宏逺焉註説雖善然緣文生義或偶未察於司徒之全文也或問典命文夫夫無中下之别此序官則有中下大夫何也曰疏云四命大夫自分為中下似若侯伯同七命子男同五命爵則有高下不同也曰註言士以三命而下為差信乎曰信王之士命數不著於典命惟大行人掌客職云士眂諸侯之卿禮參於典命所謂公之卿三命子男之卿再命則註信矣宫正上士二人中士四人下士八人府二人史四人胥四人徒四十人註曰正長也宫正主宫中官之長宫伯中士二人下士四人府一人史二人胥二人徒二十人疏曰伯長也主宫中卿大夫士之適子庶子凡六官序官之灋其義有二一則以義類相從謂若宫正宫伯同主宫中事膳夫庖人内外饔同主造食之類故連類序之二則凡次序六十官不以官之尊卑為先後皆以緩急為次第故此宫正之第士官為前内宰等大夫官為後也膳夫上士二人中士四人下士八人府二人史四人胥十有二人徒百有二十人註曰膳之言善也今時美物曰珍膳膳夫食官之長禮庫曰宫正宫伯之下即以食官系之緣此事甚繫利害非惟是養人主氣體専是正君之心防君之欲記曰飲食男女人之大欲存焉使下之所共必以之正人主雖欲少肆其欲亦不可得若無常制而共之者惟求以投其好則縱欲何極若周官所共各有定灋又且一一闗渉冢宰冢宰得人則食官皆正誰敢以四方珍味私投主欲古者格君心皆在此處庖人中士四人下士八人府二人史四人賈八人胥四人徒四十人註曰庖之言苞也裹肉曰苞苴賈主市買知物賈内饔中士四人下士八人府二人史四人胥十人徒百人註曰饔割亨煎和之稱疏曰掌王后世子及宗廟皆在内之事外饔中士四人下士八人府二人史四人胥十人徒百人疏曰掌外祭祀及饗孤子耆老皆在外之事亨人下士四人府一人史二人胥五人徒五十人註曰主為内外饔煑肉者賈音嘏亨普庚反註同物賈之賈與價同甸師下士二人府一人史二人胥三十人徒三百人註曰郊外曰甸師猶長也甸師主共野物官之長疏曰此官主地事不在地官者以其供野之薦又給薪蒸以供亨飪故在此次亨人也徒三百人特多者天子藉田千畝藉借此三百人耕耨故多也獸人中士四人下士八人府二人史四人胥四人徒四十人䱷人中士二人下士四人府二人史四人胥三十人徒三百人疏曰徒亦三百人者馬融云池塞苑囿取魚處多故也鼈人下士四人府二人史二人徒十有六人腊人下士四人府二人史二人徒二十人疏曰註腊之言夕也或作久字久乃乾成義亦通坡謂自甸師至此以備膳夫之食用六榖膳用六牲珍用八物羞用百有二十品者也䱷音魚腊音昔食音嗣醫師上士二人下士四人府二人史二人徒二十人註曰醫師衆醫之長疏曰醫亦有齊和飲食之類故設在飲食之間也食醫中士二人註曰食有和齊藥之類黄文叔曰秦醫和謂趙孟曰國之大臣榮其寵禄全其大節有禍災興而無改焉必受其咎今君至於淫以生疾主不能禦吾是以云良臣將死也夫師之敎訓傅之徳義保其身體冢宰之事也周冢宰必兼三公使其燥濕寒暑之不戒飲食起居之不節而疾生焉則何以為師保故食藥之調適飲膳為詳而醫師奉王之事屬於冢宰豈可苟而已哉疾醫中士八人瘍醫下士八人註曰瘍創癕也獸醫下士四人註曰獸牛馬之類瘍音羊後同創音瘡酒正中士四人下士八人府二人史八人胥八人徒八十人註曰酒正酒官之長酒人奄十人女酒三十人奚三百人奄精氣閉藏者不稱士則亦府史之類以奄為異也女酒女奴曉酒者古者從坐男女沒入縣官為奴其少才知者以為奚女酒三十人與奚為什長若胥徒也奚三百人以其造酒故多也漿人奄五人女漿十有五人奚百有五十人凌人下士二人府二人史二人胥八人徒八十人註曰凌冰室也籩人奄一人女籩十人奚二十人註曰竹曰籩醢人奄一人女醢二十人奚四十人註曰醢豆實也不謂之豆此主醢豆不盡于醢也疏曰天子豆百二十公四十侯伯三十二子男二十四上大夫二十下大夫十六彼有膷臐膮胾炙膾之屬其數甚多是豆不盡盛醢而已醯人奄二人女醯二十人奚四十人鹽人奄二人女鹽二十人奚四十人幂人奄一人女幂十人奚二十人註曰以巾覆物曰幂坡謂自酒正至此又以備膳夫之飲用六清醤用百有二十罋者也幂莫歴反膷音香臐音熏膮音鴞胾音恣宫人中士四人下士八人府二人史四人胥八人徒八十人薛平仲曰太宰為人君身心之防自宫正至宫伯自膳夫至腊人自酒正至幂人所以密邇於王者夫皆王宫内人而猶未及于外也宫人掌六寢之脩而及于四方之舍事掌舍而下又皆為王之㑹同于國外者設焉則内外出入之際其為王躬之是保者始悉掌舍下士四人府二人史四人徒四十人註曰舍行所解止之處幕人下士一人府二人史二人徒四十人註曰幕帷覆上者掌次下士四人府四人史二人徒八十人註曰次自修止之處鄭剛中曰舍者久留之辭次者暫止之義幕武博反大府下大夫二人上士四人下士八人府四人史八人賈十有六人胥八人徒八十人註曰大府為王治藏之長若今司農矣疏曰洪範云一曰食二曰貨已上皆言飲食此次言貨賄故大府在此也有賈者府官須有市買并須知物貨善惡故也禮庫曰自大府至外府掌守財賦玉府上士二人中士四人府二人史二人工八人賈八人胥四人徒四十有八人註曰工能攻玉者内府中士二人府一人史二人徒十人註曰内府主良貨賄藏在内者外府中士二人府一人史二人徒十人註曰外府主泉藏在外者大如字司㑹中大夫二人下大夫四人上士八人中士十有六人府四人史八人胥五人徒五十人註曰㑹大計也司㑹主天下之大計計官之長若今尚書禮庫曰自司㑹至職歲掌㑹計財賦司書上士二人中士四人府二人史四人徒八人註曰司書主㑹計之簿書職内上士二人中士四人府四人史四人徒二十人坡謂職内主賦入之簿書職歲上士四人中士八人府四人史八人徒二十人坡謂職歲主賦出之簿書謂之歲者歲計之也職幣上士二人中士四人府二人史四人賈四人胥二人徒二十人司裘中士二人下士四人府四人史四人徒四十人掌皮下士四人府二人史四人徒四十人列職于此者皮幣相次也陳君舉曰古之皮幣乃國家所重天府所用甚廣故禮䞇皆以皮幣為主觀當時皮事無所不㑹惟王不㑹故知出入之數極多大較與貨賄相敵此所以亦屬宰府皆司㑹為之長㑹古外反内宰下大夫二人上士四人中士八人府四人史八人胥八人徒八十人註曰内宰宮中官之長陳君舉曰婦人女子常與至尊幽居九重人弗得見驕恣何所不至故使之分職于六宫附屬于大宰而天官内宰春官世婦又得以參檢其事與夫婦妾賤人自相使令而無畏忌者不同矣漢髙愛戚夫人子留侯曰骨肉之間雖臣等百人何益袁盎郤慎夫人坐文帝怒説以人彘乃從使大臣得與内事其如是乎内小臣奄上士四人史二人徒八人註曰奄稱士者異其賢李氏曰周禮其餘奄皆不命也唯内小臣則有奄上士四人而已夫宦官指其居次則或在帷薄之内論其職掌則或聞牀笫之言固不可以詘辱俊乂渾淆男子其用奄人是乃制事之宜徐氏曰王左右前後罔非正人使王出入起居罔有不欽後世尚有講明此事者若后之左右前後擇人而任之則千載之曠事無有明君賢相念及于此何也閨門出治之原闗雎王化之始有内聖外王之學者必不忽于斯閽人王宫每門四人囿游亦如之註曰閽人司昏晨以啓閉者刑人墨者使守門囿御苑也游離宫也寺人王之正内五人寺之言侍奄人也故寺人披自稱刑人正内后之路寢也若王之路寢不稱内内豎倍寺人之數註曰豎未冠者之官名九嬪註曰嬪婦也昏義曰古者天子后立六宫三夫人九嬪二十七世婦八十一御妻以聽天下之内治以明章婦順故天下内和而家理也不列夫人于此官者夫人之于后猶三公之于王坐而論婦禮無官職世婦註曰不言數者君子不苟于色有婦德者充之無則闕女御註曰昏義所謂御妻御猶進也侍也女祝四人奚八人女史八人奚十有六人劉執中曰女史八人葢擇嬪御之賢者為之鄭剛中曰古者天子有史官左記言右記動故為天子者不敢有過舉后與王同體言動不謹則家道不齊無以舉天下之内治故有女史嬪皮賓反後同典婦功中士二人下士四人府二人史四人工四人賈四人徒二十人註曰典主也典婦功者主婦人絲枲功官之長典絲下士二人府二人史二人賈四人徒十有二人典枲下士二人府二人史二人徒二十人枲絲里反後同内司服奄一人女御二人奚八人註曰内司服主宫中裁縫官之長有女御者以衣服進或當于王廣其禮使無色過縫人奄二人女御八人女工八十人奚三十人染人下士二人府二人史二人徒二十人追師下士二人府一人史二人徒四人註曰追治玉石之名屨人下士二人府一人史一人工八人徒四人疏曰追師専掌婦人首服此兼男子屨舄者下體賤故同在此官也追丁回反一曰雕舄音昔夏采下士四人史一人徒四人註曰夏采夏翟羽色禹貢徐州貢夏翟之羽有虞氏以為緌後世或無故染鳥羽象而用之謂之夏采坡謂自治官之屬至此辨其内外之職名次其爵秩之貴賤列其正師司旅之多寡等其府史胥徒之繁簡則設官之事也後倣此夏户雅反緌如誰反周禮述註卷一
